body:
  text: 京都拈華寺賢宗後學達天通理敬述嗣法門人興宗祖旺謄清懷仁祖毓較字第九總釋名題者謂名者實之賓題者經之綱一經大義萃在名題故言總釋謂總釋一經大義於名題中也又名謂能譯人名題謂所譯經題而言總釋者謂人名經題以總釋之也即分為二一經題二譯人初大佛頂如來密因修證了義諸菩薩萬行首楞嚴經卷第一釋此經題略作五義一先會五名二正釋現題三略備古法四重申西名五附釋卷次初按經中佛自所說有五種題名一曰大佛頂悉怛多般怛羅無上寶印十方如來清淨海眼正脈云境智為名謂大等是境十方下屬智二曰救護親因度脫阿難及此會中性比丘尼得菩提心入徧知海正脈云機益為名謂阿難性尼為機得菩提等是益三曰如來密因修證了義正脈云性修為名以如來密因屬性具修證了義屬修得四曰大方廣妙蓮華王十方佛母陀羅尼呪正脈云要妙為名蓋上七字為顯為最妙下八字為密為最要五曰灌頂章句諸菩薩萬行首楞嚴正脈云因果為名以菩薩萬行為因首楞嚴即果也今此題者於五名中略取十九字擇要該廣次第攝經乃結集者善巧所成二正釋現題四一指法宗體即大之一字也所言大者即眾生心是心則攝一切世間出世間法故稱為大在華嚴即一真法界而一真法界該四法界統攝乎因因果果無量妙門無邊妙義不其大乎諸經或目為實相或目為佛性或目為圓覺或目為真如等其實皆一心也在本經即如來藏心而如來藏心非一切法一切法莫能收攝即一切法一切法莫能逃遁離即離非是即非即言語道斷心行處滅不得已強名為大非對小言大以對小言大則大有分限非真大故亦非先小後大以先小後大則大有始終非本大故是知此大十方無盡三際莫窮在迷為如來密因在悟為修證了義在因為菩薩萬行在果為首楞嚴王一經要妙不出此宗十界紐樞無踰茲體以之冠首良有以焉二顯法勝妙即佛頂二字所言佛頂者即肉髻相上無見頂也肉髻相為三十二相之一在青螺紺髮正中如春山吐日而頂不可見如佛初降生嵐毗尼林神為佛乳母捧持諦觀不見其頂又佛成道後遊波羅奈東方應持菩薩欲窮佛頂上歷沙界終不能見乃八十隨好之一無見頂好也用斯顯法者略有二義一佛頂最勝無上顯此法最勝依之修習直趣無上菩提故二佛頂最妙無見顯此法至妙唯佛究盡一切所不能了故又上但顯大此復顯其勝妙蓋直指法體為大為佛頂耳又佛頂亦可作喻但不如直指之為親也三別出義相曲分四一正因密熏即如來密因句也如來者十號之一倣同先德號釋有二義一隨相釋謂佛佛道同後佛出世宛同先佛再來故名如來二入理釋隨教淺深難盡多種今據終實謂如為本覺來為始覺始覺究竟即同本故亦倣同先德義也對下菩薩即是果人乃諸菩薩道後之號密因者即正因佛性眾生等有迷而不知雖迷而不知由內熏力故遇緣信發究竟可以成佛正以可成佛故名如來因在迷不知故復名為密又因稱如來復名為密者為遣兩種人過一如來二字遣小教二乘抱迷絕分之過以彼不達即心即佛自甘絕分一向沈空今聞因即如來頓然夢覺醉醒迴小向大成佛有分二密之一字遣圓教狂慧廢置進修之過以彼纔信自心便謂是佛一向廢修今聞但是密具自知非是已成從性起修冀果方能然此即是二根本中真本所謂識精元明能生諸緣緣所遺者至文中十番顯見且從眼根指出以一例五六根皆具若擴而充之不唯近具根中實為遠該萬法迨後會四科融七大明生續之因示圓融之故全彰三藏不離一心如來密因之旨顯發無餘蘊矣經文首從請定至四卷前半身意輕安得未曾有如來重重開示令修奢摩當機方以信順四分中開示奢摩成信分義齊於此二了因顯發即修證了義句也因信起觀曰修蓋即以觀行為修非歷事造修也由行成解曰證蓋即以解悟為證非歷位取證也良以圓頓行人信時即兼解悟解時已有證入故前分末即許阿難等心悟實相而此段即云修證了義其實前方是信此方是解蓋以行布不礙圓融取勝為言然謂之了義者有二義一者了悟前義二者了無餘義了悟前義者由前段當機信順雖知有如來密因猶未能現量體悟故自喻云我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入請觀門求悟入也如是如來為之分門以定二義驗證以釋二疑綰巾以示倫次冥授以選本根蓋即令其以耳門三昧修習證入了悟前段如來密因義也了無餘義者謂耳根圓通超二十四聖而獨妙依此修證則因該果海果徹因源一修一切修一證一切證了無餘義可修可證至下菩薩萬行亦不過圓融中略示行布之義經文義分兩段首從四卷後半請華屋之門至六卷中十恒沙眾皆得本心遠塵離垢獲法眼淨等為開示理觀次從六卷後半請安立道場至七卷中頂光說呪顯示利益兩眾願護等為開示事儀總為令修三摩四分中開示三摩成解分義齊於此三緣因助修即諸菩薩萬行句也菩薩略梵語具云菩提薩埵此云覺有情釋有三義一約自利謂覺雖分證尚有情識故二約利他謂覺彼有情令他同己故三約兩利謂上求大覺下化有情故對上如來即是因人乃如來道前之號而言諸者通指禪那中分證諸聖五十五位之數歷位所修行應無量如十信全根力而植佛種十住生佛家而成佛子十行廣六度而行佛事十迴向迴佛事而向佛心四加行泯心佛而滅數量十地契真如而覆涅槃等覺齊佛際而破生相一具一切主伴重重緣起無礙猶如帝網今言萬明多非局定數也準前釋了義云一修一切修一證一切證了無餘義可修可證今又言萬行者良以行布既不礙於圓融圓融又何嫌於行布前為推重初心解時即言證入令知理由頓悟此為對治狂慧悟後仍分階差令知事必漸修但悟後之修無勞肯綮如彼鵬飛萬里培風於未徙之先龍驟千江奮力在將行之際是知圓頓行人功業惟在初心乾慧以後即屬任運流入故後識陰文云從互用中能入菩薩金剛乾慧於是乃超十信十住十行十迴向四加行十地等覺圓明入於如來妙莊嚴海然既曰超入自非蟻山蠖樹可比蟻子登山尺蠖上樹皆用力難到者經文自七卷後半阿難請位至八卷結示五名中間歷談位行皆為令修禪那四分中開示禪那成行分義齊於此四妙果究證即首楞嚴三字也梵語首楞嚴涅槃經佛自釋云首楞者名一切事畢竟嚴者名堅一切畢竟而得堅固名首楞嚴古德依此遂明其為徹法底源不動不壞據古德意言一切事畢竟者即是窮徹諸法根底本源如法華究竟諸法實相之義或有翻為健相三昧者亦以能究竟諸法實相故也而得堅固者謂事到畢竟即性常住故即明其為不動不壞以既能窮徹諸法根底本源法法無非實相求於去來生滅了不可得有何動壞如法華所謂世間相常住是也承上即是歷前諸位修練治習至斯乃窮徹諸法根底本源不動不壞證一切智而成常住果矣若以本經現文釋之與上稍異謂凡一切事畢竟堅固即名首楞嚴故古德亦有直翻為究竟堅固者良以如來密因久淪七趣修證了義動招五魔菩薩萬行多緣理障由是如來精研七趣而明其原無詳辨五魔而教以預識重明五陰而示以漸修知此則七趣不淪五魔不擾理障不蔽奢摩三摩禪那始終不壞故直目之曰究竟堅固所謂首楞嚴是也是知首楞嚴義通乎前之三分以從前三離障得名故初卷中阿難所請者乃妙奢摩他三摩禪那而如來所許者乃首楞嚴王經文自八卷半請談七趣至正宗分盡無非令其成就乎此四分中當開示楞嚴成證分也已上別出義相竟四結示詮體即經之一字也華梵名義略見於藏乘分攝門中雜心論出五義一涌泉義味無盡故二出生出生諸法故三顯示顯示教理故四繩墨辨析邪正故五結鬘結成文相故佛地論有二義一貫穿謂貫穿所說法義二攝持謂攝持所化眾生此方訓釋有四義一常三世不易故二法十方同遵故昭明太子意也三徑修行徑路故四典攝生定典故隱士劉虬意也此屬能詮以大佛頂等是所詮故通收聲名句文故為體也已上正釋現題竟三略備古法二一立題法謂諸經立題人法喻單複具足例有七種一單人如淨名二單法如涅槃三單喻如寶積四法喻複如妙法蓮華五人法複如勝天王般若六人喻複如佛說梵網七具足三如大方廣佛華嚴今例華嚴謂佛頂亦可作喻如來菩薩為人餘皆是法然既法喻合明足顯幽深況是如來菩薩境界自非權小諸經可比二釋題法正脈云古式有二一作對釋二離合釋今作對有五一法喻對謂大字是法佛頂是喻二體用對謂大佛頂是體如來密因等是用以有生信發解成行致果等用故三性修對謂如來密因屬性修證了義屬修四因果對謂萬行是因楞嚴為果亦動靜對可知五通別對謂經是通題以修多羅藏皆名經故上屬別題以大佛頂等非餘經故又諸經通五人說故名為通大佛頂等局在佛說故名為別離合亦五一大字是法約理故勝佛頂是喻約相故劣佛頂上加之字依主釋也二如來密因屬性修證了義屬修兩別雙舉相違釋也下二句因果相違可知三萬字是數行字是體萬下加即字體挾數量帶數釋也四經字是體如來密因等是用經上加即字體持業用持業釋也五大佛頂等是經之所有經上加非字分取他名有財釋也隣近一釋文不明顯必欲作者應云大佛頂等是修多羅藏故稱為經即居近隣強隣近釋也正脈云此不廢古釋略備參考餘不悉四重申西名謂此經亦名中印土那爛陀大道場經於灌頂部錄出別行釋曰此別行題目也印土即是天竺於下譯人中釋那爛陀此云施無厭西域記云此伽藍南菴沒羅林有池其龍名那爛陀據此乃是以龍名池依池名伽藍以其近彼池故佛滅度後六帝緝興園林紺宇都建一門主客萬僧住持高俊印土名藍無過此者故以大道場稱之經依道場故即以道場名經灌頂部者彼經五部之一此一部中仍該多經今此經者乃於中錄出各別行持尤見其為至精至要法也五附釋卷次卷者對舒而言謂舒之以便誦持卷之以便供奉也又古經書多以軸為卷今易制未易其名耳第謂次第一者數之始也此經文有十卷以次第論此卷為始故云第一後卷次例知經題竟二譯人四一主譯人二譯語人三證譯人四筆受人初唐中天竺沙門般剌密諦譯首言唐者紀譯經時也按譯經圖記此經翻譯在則天罷政中宗嗣位神龍元年時故中天竺標譯人處也灌頂云天竺或云乾竺乾豆身毒印度等皆梵音輕重耳此云月以其有聖賢繼軌導凡御物如月照臨故又以此大國形諸小國如星中月故或云三垂大海北背雪山北廣南狹如半月形故地當閻浮中心周九萬餘里東西南北及中皆名天竺譯主乃中天竺人也沙門者釋子通稱此云勤息謂勤修戒定慧息滅貪瞋癡故般剌密諦者譯主別名此云極量謂自行化他皆極盡其量故或云到彼岸或云成辦究竟皆極盡其量之義末言譯者紀譯經之事也譯謂翻易謂翻易西梵之語而為東華語故正脈云特科為主譯者以此經未來盛名先至天台西向拜求一十八年竟未諧願彼國禁為國寶師潛匿航海賷來於唐中宗初年達廣州適遇房相請於制止寺譯成速回以解責邊之難國王因師潛過罪責守邊官吏故也夫大師冒禁艱苦志益此方且具通方智辯總統譯場雖功成身退而名不可泯故首標主譯以重元勳也二譯語人烏萇國沙門彌伽釋迦譯語烏萇奘傳名烏仗那唐言苑阿輸迦王之苑囿也舊曰烏場或烏茶在北天竺境彌伽釋迦此云能降伏以於內外魔怨皆能降故譯語即是翻音言西梵語字與此全殊若觀梵本非唯不知其語兼亦不識其字須先隨其梵音以此方之字易之名為翻字翻字之後方可讀之然同於呪語却須兼通兩國言音者變梵語為華言名為翻音今云譯語是也亦云度語謂酌度兩國言音務使彼此相當定言詞成章句故不先列翻字人者以私譯不備員亦此師代之耳三證譯人羅浮山南樓寺沙門懷廸證譯摸象云古本並有第三羅浮沙門懷廸證譯一行不知今本何以不載後刻經者宜增入之灌頂云廸師循州人因住羅浮山南樓寺故山寺俱稱令遠近皆知故廸者進也循也沙門名懷廸者取其常懷精進循道而行之意證譯者謂於翻字翻音二中總為參詳較正以師久習經論備諳五梵故於譯場之中獨充此職然前二師身生西國語精梵言雖亦兼美唐文乍來恐未盡善經師參詳較正不唯不謬佛意兼亦善合機心佛法流通厥功非細願諸後賢各思報本四筆受人菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受菩薩戒大乘戒也梵網經云欲受國王位時百官受位時應先受菩薩戒一切鬼神救護王身百官之身房相遵此受此以菩薩為兄以佛為父故自以弟子稱之此法銜也次下明世職前者先也以下官名皆其先任舊職故正議史稱正諫言官之名大夫者大正風化扶樹人才有維持世道之任舉薦賢能之責也同者兼同協理之義中書門下二俱內省左右相府之名中書省多掌王言門下省多出政事融乃權兼兩省故並書之平章者書曰平章百姓平均也章顯也謂均理政務章顯法度也事即政務法度之事不言現職者為諱被謫事故清河地名房相之梓里也房相名融其子名琯父子俱相而融事略出琯之傳文筆受者謂前三師已成草本房相受之秉筆潤色務使文質相當雅俗兼利故正脈以潤文科之夫如來滅度佛法付囑王臣因緣會遇遭際各殊詳融事為相於武后末年被謫於中宗元年纔至廣州便遇斯典請譯筆受成此莫大功德以世情觀之似可悲以佛法觀之則慶甚矣總釋名題竟第十別解文義者謂文分十卷義派干差若不解千差之義難以銷十卷之文空說名題徒誦詞句信解無以行果安成為此別解不避煩分然道安雄判既雅合於親光而指掌新疏亦承用乎三分一敘分二正宗分三流通分初二一六成證信敘二二緣發起敘初六成者六種成就謂信聞時主處眾也六種闕一大教不興故云成就言證信者謂標記主伴指說時方證法有所授令人生信故二一總標五成二別列聽眾初如是我聞一時佛在室羅筏城祇桓精舍如是者信成就為順此義作信順之詞以信者言如是不信者則言不如是故此隨相釋也又一切事究竟堅固名如離生滅去來等見名是此入理釋也又無上法王是真實語如所如說名如不誑不妄名是此據文釋也又如佛所說無有不是亦信順義智論云佛法大海信為能入故為第一若對下文應作指法之詞即指者一部經說我聞者聞成就亦結集者自述法有所授故夫聖人無我而云我聞者蓋是隨世假我亦法身真我揀非妄我及於邪我聞謂親聞非私淑讀古者可比下云此方真教體清淨在音聞故為第二若連上為句應云如是一經我從佛聞一時者時成就不紀年月但云一時者以如來說法處無定方滅後結集傳通異域約東西正建不同約上下延促不等彼此差互難以考稽故總言之蓋取師資合會說聽究竟為一時也古德云欲識佛性義當觀時節因緣時節若至其理自彰故為第三若對上句應是追憶昔聞漫言彼一時也佛者主成就梵語佛陀此云覺者十種通號之一覺有三義一自覺揀凡夫二覺他揀二乘三覺滿揀菩薩者字訓人通指能覺人說若就今經別指釋迦以楞嚴會主非餘佛故法華云唯有如來我等所歸故為第四在室下處成就室羅筏具云室羅筏悉底舊云舍衛或云舍婆提此翻豐德或翻聞物謂國豐四德財寶五欲多聞解脫為物所聞故祇桓精舍在室羅近境祇即祇陀亦云逝多匿王太子也此翻戰勝以太子生時匿王凱旋故名桓林也是其所施故精舍給孤園也園中置舍最極精奇捨園從舍稱故原園林俱屬太子給孤長者買園建舍請佛說法不辭布金之費遂感太子并林施之君尊臣卑故桓先舍次諸經多言祇樹給園此稱校雅下云屬諸比丘休夏自恣佛僧安居非此不可故為第五長者買園事詳涅槃阿含賢愚等經非急不載總標五成竟二別列聽眾二一聲聞眾二辟支眾初三一舉類標數二明位歎德三略出上首初與大比丘眾千二百五十人俱初舉類顯勝與者并與兼及義也大者揀小非有學故又三義名大謂大多勝大者天王大人所共敬仰非小德故多者內外典籍無不博通非寡解故勝者超出九十六種外道非劣器故比丘名含三義一乞士謂乞食乞法資益身心故二破惡謂破見破思滌除諸惡故三怖魔謂出家出界魔怖失黨故眾者梵語僧伽此云和合眾和合有二一事和謂戒見利身口意六事俱和故二理和謂同證擇滅無為法故今但言眾不言和合者以眾則必和不和非眾也下句標數顯同報恩經云初度陳如五人次度耶舍門徒五十人次度優樓頻螺門徒五百次度伽耶門徒三百次度那提門徒二百次度身子門徒一百次度目連門徒一百共計一千二百五十五人今減五人者略零數故俱猶同也此等皆久修異道空無所獲遇佛得益感恩常隨今亦同聽故云與俱舉類標數竟二明位歎德皆是無漏大阿羅漢佛子住持善超諸有能於國土成就威儀從佛轉輪妙堪遺囑嚴淨毗尼弘範三界應身無量度脫眾生拔濟未來越諸塵累初據迹明位皆是者無異眾故漏謂三漏謂欲漏欲界煩惱有漏上二界煩惱無明漏三界無明也具此者如漏器不堪用故又於生死中有漏落故此眾已斷故云無也大有三義一揀定性能回心故二揀實行是權現故三揀同類稱上首故阿羅漢亦三義一應供堪為福田故即乞士果二殺賊殺煩惱賊故即破惡果三無生永絕後有故即怖魔果小乘久擅斯名故為迹也佛子下約本歎德明位據迹歎德約本者引小乘向大乘故外現聲聞內祕菩薩故稱佛子既稱佛子不屑逃形自守故云住持謂住世間持佛法化眾生故雖住世間不為諸有所繫故曰善超若一向沈空滯寂者縱超非善諸有者略明有三處中說九廣演成二十五其中因果不亡故稱為有國土王都也繁華射眼勝欲牽心具威具儀不易可得曰能於曰成就者自是塵中作主非彼勉強詐飾者可比從隨也佛轉法輪教化眾生此眾常隨引攝同類故超有則不著於有具儀則不淪於空空有不覊故以妙稱又以其從佛轉輪緣結有素故堪遺囑謂遺命成佛囑累度生二俱堪故此上歎自利之德雖兼利他乃借物成已仍屬自利毗尼者戒律之總名治身曰嚴治心曰淨又事戒則嚴理戒則淨今顯理事雙持身心并治故曰嚴曰淨然亦非徒自利故曰弘範三界謂弘開法範於三界中也應身者隨機應現無量者機有無量應身亦無量故度脫眾生者不惟現身亦兼說法如法華妙音觀音之類未來者總該盡際塵累者通攝塵勞言眾生塵勞累墜輪轉生死如墮深淵如沈巨溺此眾能挽之令起渡之令過故曰拔曰濟此上歎化他之德雖兼自利乃以己成物仍屬化他此化他德中初云弘範三界似局一土次云應身無量則該十方末云拔濟未來乃通盡際則橫竪無不可化之生矣問法華歎德顯然聲聞此經歎德明是菩薩古德據此判楞嚴在法華之後似為當理若在前者此云何通答結集善權本迹互影法華處處顯本故歎德惟迹楞嚴在在皆迹故歎德惟本本迹原自無礙互影方顯不遺若不爾者則法華惟本不顯攝生之權楞嚴惟迹全迷實證之深豈盡善哉諸經亦有不爾或但為一類機故明位歎德竟三略出上首其名曰大智舍利弗摩訶目犍連摩訶拘絺羅富樓那彌多羅尼子須菩提優波尼沙陀等而為上首舍利尊者母也此云鶖鷺以其母眼淨口利可比此鳥故以為名弗翻為子尊者是其所生連母為號亦云身子以其母身形端正猶云端正身者之子故阿含云我佛法中智慧無窮決了諸疑者舍利弗為第一故今以大智稱之目犍連此云採菽氏姓也上古有仙居山採菽而食因以為姓尊者其苗裔耳名尼拘律陀此云無節樹以父母無子禱樹神而生即以名焉阿含云我佛法中神通輕舉飛到十方者目犍連為第一以其有大神化故不名其名惟姓上以摩訶揀之摩訶拘絺羅此云大膝身子舅也往論勝姉姊孕身子則不能及知其所懷智人生必勝我因而發憤遊學南竺讀十八種經無暇剪爪世稱長爪梵志學優還家詣佛索甥佛令立論乃曰我以一切法不受為宗佛曰還受是見否自思若受是見自宗相違以立不受宗故若不受是見自宗則壞以不受故還同眾見不應立是宗故義墮詞屈向佛謝罪佛令出家證無學果阿含云我佛法中得四辯才觸問能答者拘絺羅為第一富樓那此云滿願尊者父也彌多羅尼此云慈女尊者母也尊者是其所生稱謂從略故但云滿慈子阿含云我佛法中善能廣說分別義理者滿慈子為第一須菩提此云空生以尊者生時其家庫藏皆空父母疑之庫藏復現故又名善現相師占曰既善且吉故亦名善吉常修無諍三昧佛弟子中解空第一優波尼沙陀此云塵性觀塵性空而得道故又云近少白骨微塵色將盡故自陳圓通文云以從不淨白骨微塵歸於虗空空色二無成無學道如來印我名尼沙陀餘眾不能俱列故置等言並是法門頭角大眾綱領故云而為上首聲聞眾竟二辟支眾復有無量辟支無學并其初心同來佛所屬諸比丘休夏自恣初正敘無學楞嚴聽眾非止聲聞一類故云復有數稱無量者極言其多故辟支具云辟支迦羅名含二義一獨覺出無佛世隨時觀變體物自覺者二緣覺出有佛世稟教觀緣緣斷證真者慈恩云釋尊出世五百獨覺從山中來出無佛世住山待佛者仁王云八百萬億緣覺大仙皆來集會今二類俱有故存梵言無學者真窮惑盡於自類中無所學故并其下兼明有學師偕其資故云并也初心即是有學謂初發取證辟支心故同來者資隨其師亦風行草偃義也屬諸下總陳來意屬附也言此眾既非常隨許於異處安居今相將而來意為附諸比丘作自恣法耳諸比丘指常隨眾以是聲聞律儀僧故休竟也佛制比丘夏月安居一為結制辦道一為護生避嫌今當竟夏之日即九旬解制時也佛制於七月十五或十四十六日解制考劾九旬德業自知己過者自己陳說自不知過者恣任僧舉故曰自恣葢恐稍有瑕玼即玷清眾故也然此中辟支與上科聲聞俱屬當機以此經原為融其小心成就大志古德云子期不遇伯牙絕絃法若無人說將誰聽故為第六此上六種成就亦名通序通於諸經故亦名經後序結集建立故結集建立有因有意繁見諸疏解中不錄六成證信敘竟二二緣發起敘諸教興起各有感發之緣或多或少各有取意今具二緣二一菩薩發起二聲聞發起初二一略示類引二新舊機發初咨決心疑引發戒學敷座晏安引發定學宣示深奧引發慧學葢如來將示真戒定慧先以一類之緣引動本機至正說時自如時雨之化矣十方菩薩咨決心疑欽奉慈嚴將求密義即時如來敷座晏安為諸會中宣示深奧初妙機冥啐菩薩奉命度生各據一域故以十方稱之離佛既久就正無緣於諸大乘律儀未能心無疑懼今當休夏歸來自恣故云咨決謂咨問於佛請求決斷也欽敬承奉遵依也佛具折攝二門於所咨決應析伏者則如父之嚴應攝授者則如母之慈而菩薩敬承遵依無敢違越以本為自恣來故自恣已畢妙機冥動故曰將求將求者存諸心未及言也密義者定慧均等之義良以二乘人等不達自性本定縱修禪寂俱墮偏枯及乎般若却又惟尚虗慧遂令定慧均等之學轉成密義菩薩知此欲為引發口雖未形而意已彰著故直記之曰將求密義即時下深應時啄佛智鑑機應不失候故云即時真啐啄無違也敷座者敷具而坐晏安者晏靜而安葢將有所說少時入定審機觀法為物示軌耳又晏而云安者從容自然不假造作即天然本具之定也出定酬機故云為諸會中會中亦兼聲聞謂能引所引兩俱為故宣示者宣演指示深奧者深微奧妙即應前密義之求而說定慧均等法故準法華發起敘初先說無量義經次入無量義定而為正說類引今經先定後說但未出經定名目以義揆之必是楞嚴一類所謂先以定動後以智發也略示類引竟二新舊機發法筵清眾得未曾有迦陵仙音徧十方界恒沙菩薩來聚道場文殊師利而為上首初舊住機發敷座設筵為眾說法故曰法筵清眾者常隨眾及先來眾也已經自恣故曰清眾對下新來因稱舊住密義深奧向所不說故曰未有菩薩極領妙旨二乘方聞絕唱故云得也迦陵具云迦陵頻伽此翻妙聲鳥名也音聲微妙和雅不倫故以仙音稱之正脈云在𣫘發聲已踰眾鳥知非凡鳥可比取喻佛音者以佛音之形眾聲與迦陵之比凡鳥略相似耳其實佛音圓徧豈迦陵可及哉如寶積第十目連試佛音聲以神足力飛過西方恒沙國土還同近聞今云徧十方界可以例知恒沙下新來機發恒即恒河正音殑伽河此云天堂來源自雪山頂阿耨達池流出狀其來處最高故河中沙細如麵用計菩薩極顯其數之多也道場即指桓舍以是佛僧辦道處故來聚者聞音而來會聚於此乃不約而同也文殊師利亦云曼殊室利此翻妙吉祥以菩薩生時有祥光滿室之兆故或云妙德或云妙首以其具勝妙德為羣賢首故古德云過去成佛號龍種尊王現在北方為歡喜摩尼寶積當來成佛名曰普現葢為影嚮大化示居因門華嚴表根本智今經作擇法眼且為發起性定率眾來茲故以上首稱之然舊住之眾既得略教自應進希廣談新來菩薩聞音而聚明是要聆深法機發之義可以意會此上兩科雖為引發正說而亦為顯楞嚴會上眾有菩薩列眾中不敘菩薩者以此菩薩發起竟二聲聞法起三一王臣齋供二阿難誤墮三如來救度初二一匿王齋佛二臣民供僧初時波斯匿王為其父王諱日營齋請佛宮掖自迎如來廣設珍羞無上妙味兼復親延諸大菩薩初正請如來時即眾僧自恣之時諸佛歡喜之日此日薦親功倍尋常如盂蘭經俱悉波斯匿本國王名此翻勝軍謂軍旅最勝諸國無能敵故為其下尋常作句欠妥當於諱日下作句請佛下作句如來下作句於詞既通於理亦順諱日者親喪之日諱有二義一忌諱謂忌舉吉事哀切不勝故二隱諱謂隱而不言言之即慟故世禮如是佛教則令修冥福以資神道匿王遵此故云為其云云營齋者營辦齋供請佛者祈資冥福以佛具大神力有大慈悲能追異世之魂與當來之樂故宮掖者內庭左右門也佛由中門王不敢並故但於左右迎之言自迎者為迓萬德之尊自屈萬乘之貴故珍羞者貴重食品廣設者諸般俱備盡世所有以供甘旨故稱無上妙味兼復下兼延菩薩既已隨佛而重標親延者但是神顧語及非另迎也正脈云請佛以下有六重見敬之至謂其處則內其迎則親其設則廣其羞則珍其味則妙其伴則同愚謂非世尊無以成匿王之信非匿王無以見世尊之德請者受者均為典型匿王齋佛竟二臣民供僧城中復有長者居士同時飯僧佇佛來應佛勅文殊分領菩薩及阿羅漢應諸齋主初延僧佇佛盂蘭儀範上行下效故云城中復有等長者齒高德隆居士守道居正二皆有臣有民如須達東坡耶闍龐公之類須達有位長者東坡有位居士耶闍無位長者龐公無位居士同時者不惟眾同亦與王同葢以僧自恣日佛歡喜日乃合正制故飯僧者以飯供僧佇佛者引領望佛然飯僧必佇佛者以佛來僧方至故又分應須佛勅故佛勅下佛勅分應文殊身兼賓主且為上首故獨勅之又佛勅分領者非勅文殊自領葢令其分派兩乘上首各領大眾依次赴請如今主叢林者命執事次第差僧之類隨請者意分眾多少故云應諸齋主此上兩科雖為引敘阿難墮事而亦為顯楞嚴會上眾有王臣列眾中不敘人天者以此王臣齋供竟二阿難誤墮二一誤墮之由二誤墮之事初三一不矜小制二妄擬大乘三臨事假飾初唯有阿難先受別請遠遊未還不遑僧次既無上座及阿闍黎途中獨歸初離眾受請唯有二字直聲其過言眾皆不爾唯有阿難如此豈得無過別請者別種事緣所請如懺罪施物等言先受者受請在先似應無過但自恣在邇海眾咸集縱遇別請亦不應受此其不矜小制者一也遠遊下故意愆期遠遊二字亦直聲其過言縱受別請事畢即宜速歸乃乘便遠遊屆期未還豈得無過遑暇也不遑僧次者謂自恣赴齋俱不暇及眾僧班次此其不矜小制者二也既無下不依常度上座者坐次居上或齒尊或戒先或智廣或德重為眾所推皆可稱之論明三種一生年即齒尊二福德即德重三法性兼智廣戒先阿闍黎唐翻軌範隋言正行謂能行軌範糾正弟子行故四分開五一出家即剃度師二教授即受具教儀三羯磨即稟白羯磨四受經即依之受經五依止依住乃至一宿首言既無者亦直聲其過言律制一僧遠出必以二師翊從所以嚴行止也今言俱無豈得無過途中獨歸者顯信意無拘違越毗尼致非招難此其不矜小制者三也如此行履深位猶難方證初果便爾無忌則下之誤墮婬室者非無故也二妄擬大乘三一無供循乞二展轉釋意三總出其由初其日無供即時阿難執持應器於所遊城次第循乞其日無供者謂歸來之日無人供齋此有二因一無侶獨歸人不知故二佛勅分應數各備故即時者即於食時應器者受食之具梵語鉢多羅此翻應量器應己食量而為大小故又體色量三皆應法故執而持之者用以乞食翼三寶備六德也聞物之國地廣人稠一人乞食豈能徧歷故但云於所遊城顯經遊不到處則不乞故次第者從外向內循乞者順序而乞順序而乞則持心平等從外向內則不揀種族此菩薩行履而阿難擬之將必有畫鵠類烏之羞矣二展轉釋意心中初求最後檀越以為齋主無問淨穢剎利尊姓及旃陀羅方行等慈不擇微賤發意圓成一切眾生無量功德初釋循乞意言小乘乞食向揀五家官唱屠沽婬今一旦次第循乞其意何居故以心中初求等釋之檀越此翻施主或云檀翻為施越是華言謂以施福越貧窮海故言最後者指至穢至賤之家雖至穢至賤若等心觀之皆為檀越但向所不乞今始發是心欲得彼供以為齋主故曰心中初求穢賤尚求何況淨貴故總以無問剎利者具云剎帝利此翻王種或翻田主謂帝王種族奕世相承主國田者四姓中尊故曰尊姓此淨而貴者也旃陀羅此翻屠者亦名嚴幟謂屠殺為業不許與良民共處行則持幟為嚴見者避之此穢而賤者也方行下釋初求意言初果力微乞食應遵常法初求最後檀越何所為乎故以方行等釋之方行等慈者謂倣效菩薩行平等慈也行平等慈自應無所揀棄故曰不擇微賤發意句釋方行意言小貴安小必欲方行菩薩取何益耶故以發意等釋之發意者發大乘意圓成者圓滿成就一切眾生總該淨穢貴賤言菩薩等慈而乞眾生隨意而施各得無量功德若乞者揀擇則令一切眾生有得圓成有不得者阿難不屑於此所以方行菩薩然善則善矣第恐從井救人非智者之所為耳展轉釋意竟三總出其由阿難已知如來世尊訶須菩提及大迦葉為阿羅漢心不均平欽仰如來開闡無遮度諸疑謗初曾見被訶言如上所說已知次第循乞意矣但意不自興感發有由故云阿難已知等也訶二聖事古德指在淨名又自會云淨名訶即知如來亦訶又云彼是金粟如來與釋迦何別此說雖亦可通終不穩順愚謂不必定指良以三藏聖教未來此土者尚多即已來此土目所不及者亦有安知餘經餘論別無訶責二聖之處再俟參考如來者十號之首世尊者十號之末為攝中間故爾雙稱正脈云須菩提捨貧乞富意在與續善根恐將墮落且無減尅之難大迦葉捨富乞貧意在憐其久苦與植樂因且無趨富之議是以無學尊位而為此不平之事故佛訶責其非也欽仰下欽仰改轍如來訶彼二聖言猶在耳敢不欽敬佛為銷其偏私融歸平等可不仰慕正由欽敬仰慕所以頓興大意一則開啟闡揚無遮限之普心一則度諸世間難聲明之疑謗葢以心有遮限則疑謗難免謂偏貧多致疑偏富多致謗也妄擬大乘竟三臨事假飾經彼城隍徐走郭門嚴整威儀肅恭齋法初入城之儀城隍者城外濠壍有水為池無水為隍從外而入故先經此郭門者門外護門即今甕城門也將入城內略加矜持故曰徐步謂安詳徐徐而步履也嚴整下正乞之儀嚴者慎其容整者斂其服慎其容則有威可畏斂其服則有儀可仰故曰威儀肅謂嚴其心恭謂敬其事嚴其心則齋誠不亂敬其事則法則不失故曰齋法戒經云此丘入聚落無違戾他事但自觀身行若正若不正楞伽云乞食出遊行前視一尋地攝念而行乞猶如蜂採華今阿難非不符式但此要習之有素用於臨期自然從容中道不思不勉看他般若經中世尊臨乞食時着衣持鉢便入舍衛何曾有絲毫加意而此中曰經彼曰徐步曰嚴整曰肅恭一味有心全屬假飾安得不令摩登伽女伺得其便哉此論實行若就權現者阿難實不如是葢為詐現威儀已向不矜者作覆轍耳誤墮之由竟二誤墮之事爾時阿難因乞食次經歷婬室遭大幻術摩登伽女以娑畏迦羅先梵天呪攝入淫席淫躬撫摩將毀戒體爾時即加意嚴肅時也次謂鱗次不相越踰之義因乞食不相越踰淨穢無問所以經歷淫室遭遇也墮也謂不期而遇墮落其中也幻術者虗幻呪術眩惑心目登伽經云有摩登伽神語符呪能移日月墮地亦能呪梵天使下況沙門阿難耶據此知非尋常幻術故以大稱依戒因緣經摩登伽翻小家種亦下賤種是其母名女名鉢吉蹄此翻本性謂雖墮淫女本性不失故或翻石性謂其性如石不可轉移故在俗名性女出家名性尼今云摩登伽女者依母彰名故以用也上為能用人下為所用術故娑毗迦羅冥性外道也此云黃髮亦云金頭謂頭髮黃如金色故先梵天指過去梵天呪祝詞也本是邪呪偽稱過去梵天所說金頭傳登伽用故逆次標之攝入者準戒因緣經鉢吉蹄白母願以阿難為婿其母即以牛糞塗地結綵然燈燒香誦呪阿難意便恍惚隨其呪術竟至其家婬席者登伽寢席淫躬者登伽欲身撫摩者撫揉摩按言阿難既入席臨身登伽自欲燄飛揚其撫揉摩按之態勢所不免但如扶醉抱屍莫可如何耳戒體者律儀戒無作體也謂於受戒時心力巨大能生妙善無漏色法由此從思種上便有一分防發功能名無表色故曰戒體是非色非心聚持之則肥犯之則羸若破根本則戒體毀矣下云心雖明了力不自由又云心清淨故尚未淪溺故知阿難戒體雖曰未毀然已至危故曰將也問聲聞眾中僧尼甚多發起此經必以阿難及登伽者何也答各有二義阿難二義者一顯聞不足恃二顯他不足恃聞不足恃者謂阿難多聞第一一遭幻術便不能免況夫纔登講肆方學讀文遇境逢緣寧不懼乎他不足恃者謂阿難是佛堂弟從佛出家彼此身心尚不相代況夫師非聖賢遇若萍水恃而不修豈不誤哉登伽二義者一謂策發初心二謂勉勵久修策發初心者以登伽破他淨戒無自修心一蒙呪力便證三果欲愛乾枯成精進林何況發菩提心求佛利生若更加持呪則風帆順水薩婆若海不患其不至矣勉勵久修者以登伽宿為淫女業障最深一念熏修無漏善故或得出纏或蒙授記況夫久修淨行惑習已薄若奮起精進則斬絲染色生死苦輪誰謂其不出乎阿難誤墮竟三如來救度三一佛歸眾隨二化佛說呪三勅救歸來初如來知彼淫術所加齋畢旋歸王及大臣長者居士俱來隨佛願聞法要初佛知速歸彼指阿難如來法眼鑑徹故能知也淫術所加事在危急戒體將毀救不容緩故齋畢旋歸謂事訖作速轉來也王及下眾隨希益資中云如來常儀受請齋了皆為說法今日速歸必有所為故王臣等俱來隨佛其意以佛頓越常儀必談最勝之法心要之義各皆仰望故曰願聞法要正大機冥動也二化佛說呪於時世尊頂放百寶無畏光明光中出生千葉寶蓮有佛化身結跏趺坐宣說神呪阿難被術王等機動救應無違故即於此時放光光從頂放者亦表所說神呪最勝無上最妙無見之意光具百寶利益之色表呪具攝授之慈無善不成光具無畏威烈之相表呪具折伏之嚴無惡不摧光明有破暗照物之功表神呪有破惑照真之用既有破惑照真之用自能出生無礙圓因以千葉蓮華表圓因無礙一具一切一切即一故也既能出生無礙圓因自能成就無為妙果以有佛化身表妙果無為非空非有有佛非空化身非有空有無礙故也結跏趺坐者雙疊其足如龍盤結諸坐法中最安隱不疲極攝手足心不散故佛如此坐化佛亦然表此呪即是權實同歸不動法故能表既備所表斯彰故以化佛無障礙心而宣說之呪而言神者力用難思至下自見三勅救歸來勅文殊師利將呪往護惡呪銷滅提獎阿難及摩登伽歸來佛所上命曰勅人王法王皆可稱之文殊所勅人也佛不自救者足三寶作將來式故如來佛寶神呪法寶文殊僧寶法雖佛說非僧不傳僧寶所係亦大矣哉必勅文殊者以阿難邪術魘非大智莫能醒登伽淫癡縛非大智莫能解故將猶持也義通口意謂口誦演意觀念也若兼身往則三業俱持護謂遮護遮邪術護正心故真法幻術力用霄壤故神呪纔及惡呪便銷湯雪日暗可為譬矣所謂力用難思者以此提謂提擕獎謂獎勸言阿難如醉初醒不能自歸故須提擕登伽知非含羞未便肯來故須獎勸總以大權示現引發實行曲盡其情耳此上二緣發起亦名別序別在當經故亦名經前序經前發起故敘分竟二正宗分正說本經性定宗旨二一阿難哀求成佛妙定二如來委示始終因果初二一阿難悲悔誠請二大眾普同希益初阿難見佛頂禮悲泣恨無始來一向多聞未全道力慇勤啟請十方如來得成菩提妙奢摩他三摩禪那最初方便初悲悔前非特標見佛者幸得復面故頂禮者頭面接足雖是常儀亦感謝佛恩悲泣者哀切涕泗雖是慚惶亦感傷自失感傷不已轉成怨悔故曰恨也恨者隨惑之一障慈助瞋似不應有若今日之恨誠不可少以阿難回小向大反妄歸真乃至當來成佛皆由此恨以為前驅無始一向等正敘所恨不得其始故曰無始極言其迷之遠故一向者一味趣向多聞者多於聞持要知多聞無過唯無始一味趣向有誤真修四果道力尚未成全固可恨也慇勤下誠請妙定慇勤諄切也啟白請求也十方如來等正敘所求言阿難已覺前非重發深醒縱全四果亦非所願故求十方如來得成菩提之法此處有兩重揀別一得成菩提揀小教二乘以彼所修縱得滅盡不成菩提故二妙之一字揀權教菩薩以彼所修縱入唯識不成圓妙故良以奢摩等三諸乘共有錯亂修習毫釐千里故須揀也奢摩他此云止以寂靜為義謂止散亂入寂靜故若依今經則了識非心名止以了識非心不須強制自然不隨乃真止故識法皆性名寂以識法皆性不須強離自然不動乃真寂故是知此之奢摩與彼強制識心閉目想空者大不同也三摩具云三摩提或三摩地或三摩波提三摩鉢底等皆梵音賒切耳此云等至以銷幻為義謂平等至定銷幻妄故若依今經則動靜根解名等至以動解不有靜解不無根解定深乃真等至故覺空滅解名銷幻以覺解離照空解離寂滅解性現乃真銷幻故是知此之三摩與彼暫住似定根不盡名似定竟守似真者滅不解名似真大不同也禪那此云靜慮以寂滅為義謂由靜起慮思惟修習至寂滅即涅槃也故若依今經則止觀平等名靜慮以金剛觀察十種深喻奢摩他中毘婆舍那乃真靜慮故從因至果名寂滅以到茶無字可說乃真寂滅故是知此之禪那與彼以悟為修以分為滿者大不同也然成佛妙定修之誠難須知漸進之由乃無躐等之弊故繫之以最初方便葢欲借方便以造正修故古有多釋莫決從違繁言亂心一槩不錄今以三名所屬之文各開為四一最初方便二初方便三正修四究竟如奢摩中以了識非心為最初方便領見是心為初方便會四科融七大究生續之因辨圓融之故為正修備顯一心三藏無礙圓融為究竟三摩中以嚴持禁戒為最初方便建立道場為初方便解六結而越三空為正修獲二勝而發三用為究竟禪那中除亂想而修三漸為最初方便由乾慧而發十心為初方便三賢加地為正修由等趣妙為究竟至下自見阿難悲悔誠請竟二大眾普同希益於時復有恒沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨於時者即於阿難啟請時也成佛之法海眾共仰故云復有等恒沙菩薩者音感後至眾及諸十方者咨決先來眾十方下應有菩薩二字或譯者脫耳羅漢者常隨聲聞辟支者雲集二覺等該初心及與人天二序互影之眾此則全出菩薩隨位增進二乘厭小求大人天隨喜故俱願樂聞退坐默然者凝神息慮承受聖旨者敬候佛音樂聞之意於此可見華嚴云如病思良藥如饑思美食如渴思冷水如眾蜂依蜜我等亦如是願聞甘露法智論云聽者端視如渴飲一心入於語義中皆此義也阿難哀求成佛妙定竟二如來委示始終因果四一開示奢摩成信分二開示三摩成解分三開示禪那成修分四開示楞嚴成證分初三一為銷倒想說空藏二為除細惑說二藏三為發圓信說三藏初銷倒想者取阿難謝佛語也認妄為真以真為妄皆為倒想此想不銷何以捨妄心而取真心乎空如來藏即是真心葢以一心有真如生滅二門今約真如門說空藏也然此空非斷非滅色非相外等空以一切法不動不壞當體即真更無絲毫外法如金獅子不鎔不毀全相皆金更無雜質所謂彌滿清淨中不容他即是第一義空今以四科七大俱有如來藏名故科為空藏也二一斥破所執妄心以開奢摩他路二顯示所遺真性令見如來藏體初認見為心即是奢摩他路以三如來藏皆由此而進故向以執識為心錯亂修習則奢摩他路茅塞之矣今令了識非心將必認見為是故云開也三一取心顯錯二備破三迷三結斥誤認初二一探取所用之心二形顯所用之錯初二一敘情探問二據實酬答初佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛初敘情安慰佛與阿難不同父而同祖故曰同氣謂同一祖宗氣分來故父子兄弟皆稱天倫以是天合之倫次故情眷愛也言不但同氣其眷愛之私實與孫陀羅等無有異視故置均言是先以世情而安慰之其意有二一者憐其悲哀安慰令息此承上也二者令其無懼據實答問此起下也當初下探問發心心分真妄定別實虗故問當初發心乃欲得其所用之心而破斥之如探病施藥也見何勝相者雖問所見實為探其見後作麼生會故深重恩愛應云深恩重愛葢世間恩之最深莫過父母愛之最重莫過妻子頓然俱捨發心出家非於佛法中的有所見者不能故為此問二據實酬答阿難白佛我見如來三十二相勝妙殊絕形體映徹猶如琉璃常自思惟此相非是欲愛所生何以故欲氣麤濁腥臊交遘膿血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落初答所見之相能見之性即是真心所謂菩提涅槃元清淨體阿難習矣不察空言我見三十二相者始於頂上肉髻終至足下平滿皆因修百福所感相必具好故不更言輪王不及曰勝菩薩莫比曰妙殊者勝之至絕者妙之極也長短大小曰形百骸四肢曰體一一皆能外照內現故曰映徹琉璃青色寶也內映外徹同佛形體故以為喻常自下明見後思惟即思惟體便是妄心所謂無始生死根本阿難一向誤認故曰常自此相亦兼形體定慧熏修故曰非欲愛生徵起可知釋中欲氣者淫欲之氣猥褻混淆故曰麤濁此總釋也母血父精會合成孕故曰腥臊交遘此別釋麤義羯羅藍位凝結滑膩故曰膿血雜亂此別釋濁義然麤則不淨濁則不明況云勝妙故直斷以不能發生紫金光聚總指佛身以佛身如紫金光聚故又此中思惟略具二識此相非欲愛生乃隨念分別尚屬明了至云欲氣麤濁等則是計度分別仍落獨頭是阿難無始病源而世尊已得其脈矣末二句結出家所以佛身生身淨穢懸殊既常思惟寧不傾慕故云是以渴仰欲以生身而易佛身學出家法故云從佛剃落圓覺云棄愛樂捨還滋愛本阿難以愛捨愛發心豈盡善哉探取所用之心竟二形顯所用之錯佛言善哉阿難汝等當知一切眾生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉初警指輪轉佛言善哉者有三義一者似讚實怪意言汝竟用如是心耶二者讚善自喜意以得其心可施教矣三者善言安慰意以安其心好施破矣遺真認妄已向不覺今將次破顯故教以汝等當知葢深警之也一切眾生總該凡外權小至下普示二本中自見無始來者謂自有無明以來無明初相叵得故云無始生死相續者輪轉不息之義皆由下出其深故正脈云常住則非生滅真心則非妄心性淨者本自無染明體者本自不昏即後文根中指出漸次開顯如來藏妙真如性此其所迷之真故曰不知妄想者識心分別即上文所取思惟下文所破緣塵此其所執之妄故曰用諸諸助語詞也末二句結示令知良以此想本非真實故眾生一向錯認遭其誤賺輪轉生死浩劫漩澓汝等其知之哉取心顯錯竟二備破三迷正脈云此妄識有三種非真一者本非是心而似是心眾生迷執以為是心二者本非有體而似有體眾生迷執以為有體三者本非有處而似有處眾生迷執以為有處如來為之備悉俱破三一密示妄識無處二顯呵妄識非心三推破妄識無體初密示者明知無處而故意推徵是佛密意令其自悟三迷中不直破前二非心無體且但就其所執心處令其一一審察自覺其妄必待七番情盡終不自悟然後呵其非心明其無體試喻明之譬如有賊自據藪澤以為巢穴時時侵擾良民致于國怒發兵討除應先搗其巢穴令其無歸寧地或可自此改業倘猶不軌隱匿鄉井乍稱良民密結餘黨欲復舊業有國者必當處處宣令布告其名聲正其罪令其無所容於疆土若歸心則已設不爾者再發強兵勁敵必盡殺乃止佛亦如是今先搗其巢穴四一教以直答二問出心目三徵定處所四約識獨破初汝今欲研無上菩提真發明性應當直心酬我所問十方如來同一道故出離生死皆以直心心言直故如是乃至終始地位中間永無諸委曲相初正教直答前阿難啟請妙定意欲研求無上菩提真實發明自性故如來原其意而教之曰汝今欲研無上菩提云云而教以直心酬問者恐其口是心非難以施教故十方下引佛示勸意謂我今教汝直心酬問者以十方如來同一道故出離生死所謂皆以直心良以心直則志猛志猛則信堅願固無行不成無果不就如淨名云隨其直心則能發行華嚴云菩提妙法樹生於直心地是知出離生死捨此無由矣心言下結顯利益言直心一道何以便出生死謂以是心直則言直故如是歷位進修乃至成佛之時終於其始地位中間斷證勢如破竹永無委折曲屈之相意顯若不如是則因地不真果招紆曲不成無上菩提滯窒權小流入魔外者皆是也文中不言始終而言終始者謂縱成佛果亦唯終其始初所發之心上雖依此銷文恐猶未明故此重申教以直答竟二問出心目阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂阿難白佛言世尊如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死初雙問見愛重呼其名者另申問端故意謂汝果如我所教我今還要問汝據汝所說當汝最初發心緣於如來三十二相乃至云是以渴仰從佛剃落然渴仰即是愛樂但不知正當見我時將何所見渴仰我相時誰為愛樂必作是問者為審見愛二種迷故良以見本是心眾生迷見為眼愛本非心眾生迷愛為心棄子認賊不可不辯阿難下具答心目文有四句上二句合答下二句分釋可知故我下結顯發心文有二句上句承上結顯下句顯發心真實以是為捨生死發故要知迷見為眼認愛為心正是生死根本乃依之願捨生死其猶以薪益火欲其速滅豈可得哉問出心目竟三徵定處所二一躡訶徵處二承徵引答初佛告阿難如汝所說真所愛樂因於心目若不識知心目所在則不能得降伏塵勞譬如國王為賊所侵發兵討除是兵要當知賊所在使汝流轉心目為咎吾今問汝唯心與目今何所在初躡詞按定前阿難答佛愛樂因於心目佛欲施破乃告之曰如汝上來所說果真愛樂因於心目者吾將有以示之葢是按定其詞恐其改轉耳若不下顯處應知良以由目觀見心生愛樂由愛樂故塵勞競起塵勞即是煩惱有染污義名塵有擾動義名勞要必知心目處所始可以降伏塵勞故曰若不識知等乃反顯以決其應知之意譬如下借喻助明國王喻見性真心本為一體故惟以王喻媒賊相依俱稱為賊喻妄見妄心由妄見而引起妄心奔色塵而起諸塵勞葢覆真心擾亂性境故以為賊所侵喻之兵喻妙奢摩他三摩禪那發喻依真而修討除喻破妄顯真是兵要當知賊所在者喻修定之時要必知妄所起處斷其本而枝末自盡矣此下徵破識心顯見後即剖妄見皆為得其處而破之也使汝下指過徵處流轉由於塵勞塵勞起自妄心心不自舉依妄見生是知目為賊媒心為賊主塵勞則為賊伴媒牽主動伴乃為亂心目為咎可思而知既知心目為咎相應辯其處所故即就其心目雙徵兩在此下本為破識而心目雙徵者其意有三一為顯眼是浮塵令覺別有見性故葢以面上之眼體是浮塵阿難既認見為眼必至遺彼見性故此雙徵令其於面上觀察了得浮塵無見自覺別有見體其奈阿難不悟必待十番顯示方以漸領二為顯眼是賊媒令知防媒破主故正脈云阿難既認賊為子佛欲破賊指迷其奈眼實賊媒引識奔色欲破其識須防乎眼故此雙徵令知眼若不馳則識無所用而自破矣三為顯眼有定處令說識有定處故正脈云佛知眾生迷識為心決定惑為色身之內恐阿難逃遁不肯直言故借眼之顯然在面取例而徵心在何處葢是要其說出心處必如眼之在面顯然不混此之三義依後十番顯見別有見性則初義為正依上由目觀見心生愛樂則次義為正依下如是識心實居身內則後義為正或云此處雙徵後文雙破義亦可通以下十番顯見之後別有剖除妄見文故躡詞徵處竟二承徵引答阿難白佛言世尊一切世間十種異生同將識心居在身內縱觀如來青蓮華眼亦在佛面我今觀此浮根四塵秪在我面如是識心實居身內初引他為例一切世間雖通三種今且約器指依報言十種異生乃約有情指正報言隨業感報受生不同故曰異生言十種者十二類生中除無色無有身相無想無有心相以彼不作心在身內計故識心指第六意識揀非前五故居身內此引生心在內例己心也生眼在面姑置勿論故曰縱觀如來等西域有青蓮華其瓣纖長佛眼似之故以為名且指浮塵色相揀非勝義故亦在面此引佛眼在面例己眼也我今下指已結答浮根揀非勝義以勝義淨色不可見故此以可見名為浮塵體通色香味觸故言四塵葢名體各稱合論即是浮塵根也秪在我面者謂己眼雖劣而在面與佛無異非有別在故置秪言如是二字例眼而言良以眼既同佛識心亦應同生如是例知識心實居身內正脈云此乃本計如後云一迷為心決定惑為色身之內足證此義其餘六處但是因佛一時破奪逼成轉計於中亦有同外異計故須盡之徵定處所竟四約識獨破七一破在內二破在外三破根裏四破救內五破合處六破中間七破無著初四一密設破法二許定安心三定非反難四指計結破初佛不直破其非且就現前所見分內分外復於能見分先分後阿難隨口應答亦不知其所以及被如來逐一反難自覺所計之非始知如來不是等閑說話葢是密設破計之法令以無所逃遁如彼孔明八陣當其設置時人皆不知其故乃後陸遜身陷其中始知孔明當時不是等閑排布耳佛告阿難汝今現坐如來講堂觀祇陀林今何所在世尊此大重閣清淨講堂在給孤園今祇陁林實在堂外阿難汝今堂中先何所見世尊我在堂中先見如來次觀大眾如是外望方矚林園阿難汝矚林園因何有見世尊此大講堂戶牖開豁故我在堂得遠瞻見初定境內外汝指阿難現在講堂密顯所計心在身內應同乎此祇陀林明在堂外故意施問者令其自說至後反難中無所逃故重閣者簷廡層飛清淨者煩塵不到講堂者佛據談經重閣言其相清淨顯其德講堂標其名也在給孤園密顯身在世界中應同乎此林在堂外密顯眼前所有一切諸法俱在身外應同乎此阿難下定見先後問以先何所見者亦明知故問令其自說以備反難在堂先見如來次觀大眾者密顯心在身內即應先見心肝脾胃次覩爪生髮長筋轉脈搖外望方矚林園者密顯心在身中即應最後方見身外一切諸法至後反難中一一皆不如是而阿難只知順口答話不知己之所計已墮世尊羅籠中矣阿難下定外見由因何有見亦明知故問也講堂戶牖開豁故得遠見者密顯心在身內其計不成以此身不如講堂之戶牖開豁也密設破法竟二許定安心前阿難哀求妙定如來且問發心葢以心分真妄定別實虗恐阿難認妄為真錯亂修習蒸沙作飯終無實果今徃復問答再四徵詰既得其所用之妄心復探定所執之妄處將次破斥慮生驚惶將謂不與說定但見斥非空懷攀仰終成絕分故如來許以有三摩提等而阿難頂禮伏受則內心既安至下重重破斥乃不為怪矣爾時世尊在大眾中舒金色臂摩阿難頂告示阿難及諸大眾有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路汝今諦聽阿難頂禮伏受慈旨初出定總名舒臂摩頂示憐愛安其心故三摩提義通總別若三名鱗次則是別義若三摩孤標則是總義別義翻為等至如前所釋總義翻為等持或翻徧攝受謂等徧攝持一切諸三昧故如智論云一切禪定攝心皆名三摩提此約總義總攝前三故復是通名通於諸定故首楞嚴對前名總對他名別以雖總前三別在當經故其體即是一心故名為大論理最勝最妙故譬佛頂義詳名題益之以王者有二義一者超出義超出一切諸三昧故二者自在義任運成佛無障礙故具足下義具別目具足者圓滿義謂依此立位斷惑證真如斬絲染色一斷一切斷一證一切證故此即禪那中萬行義也捨此而求歷劫終無實果故曰一門依此而修彈指可超無學故曰超出此又奢摩中密因三摩中了義義也據此則生信發解起行全依乎此故曰妙莊嚴路佛果萬德莊嚴全修即性名妙然阿難請處唯別而世尊答處兼總者葢以首楞嚴不共之名阿難不知故請處唯以奢摩等共名特加妙字揀之佛智鑑機總別具示別三總一故大章開為四分汝今下誡聽禮受諦有二義一審詳義謂審詳語義勿令漏失故二真實義謂真實心聽離生滅心故頂禮者聞許暫謝伏受者伏俯領受佛諭曰旨以從真慈流出故曰慈旨許定安心竟三定非反難二一定不次見之非二難在內不次見初佛告阿難如汝所言身在講堂戶牖開豁遠矚林園亦有眾生在此堂中不見如來見堂外者阿難答言世尊在堂不見如來能見林泉無有是處初按定前答如汝所言等按定是其所說令其無所逃故身在講堂下應有先見如來次觀大眾之語乃超略說故亦有下故意反問昧內見外明知無有故為反問令其自說阿難下知不次非在堂不見如來能見林泉不次第也已知其非故云無有是處此既無有而心在身中之謬自見以昧內知外同乎此故二難在內不次見阿難汝亦如是汝之心靈一切明了若汝現前所明了心實在身內爾時先合了知內身頗有眾生先見身中後觀外物縱不能見心肝脾胃爪生髮長筋轉脈搖誠合明了如何不知必不內知云何知外初句斥蹈前非意言昧內見外汝謂無有想應有之葢汝亦如是也汝之下定理難問汝之心靈者心性靈變一切明了者遇事便通實在身內先合知內者判其正理明知無有問以頗有者故為難問頗猶還可謂徧觀世間還可有是人否意言有則在內之理成無則所計之處非矣縱不下暫縱終奪心指肉心火藏也肝木藏脾土藏胃穀府藏中舉三腑中舉一此皆近於內者恐阿難逃云目不見眉只緣太近今心肝脾胃等於心太近云何令見故縱許之謂心肝脾胃縱許其不能見也此是暫縱下乃終奪言在內甚近者不知可爾至於爪云何生髮云何長筋云何轉脈云何搖此皆皮裏肉外於心不甚近者是誠所當明了如何并此亦不能知想究竟不能知內在內之謬已可見矣末二句轉顯其謬言甚近次近皆不能知莫是為彼心肝脾胃所障必不能在內有知若爾則身外諸境亦不應知以不知講堂之戶牖開豁而今云何反能知外不益見其謬乎定非反難竟四指計結破是故應知汝言覺了能知之心住在身內無有是處是故者謂以是昧內知外之故應知者謂應知所計之非也覺了能知者謂纔有覺了即便分別能知似兼明了及獨頭意識言之亦為顯心性靈變一切明了之義住在身內相應先見身中後觀外物今既不爾故曰無有是處破在內竟二破在外二一阿難轉計在外二如來引事例破初阿難稽首而白佛言我聞如來如是法音悟知我心實居身外所以者何譬如燈光然於室中是燈必能先照室內從其室門後及庭際一切眾生不見身中獨見身外亦如燈光居在室外不能照室是義必明將無所惑同佛了義得無妄耶初承前轉計稽首即是頂禮謂以首至地稽留少時也如是法音指前破內所說悟知等者正脈云於不見身內悟知不在身內於了見身外悟知必在身外奪內執外凡情必然所以下徵引燈喻徵起可知譬如者宗法既定借喻以顯也識是有法居在身外宗因云昧內知外故同喻室外燈異喻室內燈燈然室中先照室而後及庭際室外屏內也此為正理識既不爾知非在內一切眾生不見內而獨見身外識在身外是其正理故引燈在室外不能照室為喻是義下自決同佛是義即心在身外之義法喻合顯宗因極成是為真量故曰必明將猶得也非同似量故無所惑佛說不在身內今亦知不在身內故云同佛了義了義者如來所說義無不盡故得無者猶言莫不是也耶字非疑詞葢是恐見破斥預杜佛口之意意言若不同佛或有虗妄今既同佛莫不是仍有虗妄耶想必無是理可以自信阿難轉計在外竟二如來借事例破四一借事問答二例出謬理三驗證令覺四指計結破初二一非理故問二據理正答初佛告阿難是諸比丘適來從我室羅筏城循乞摶食歸祇陀林我已宿齋汝觀比丘一人食時諸人飽不是諸比丘唯約聲聞言之以菩薩事事無礙自他融即不成非問故適來猶云方纔佛及菩薩赴匿王請羅漢隨佛入城分應齋主故云從我循乞二句應作一氣讀之循順也言今雖赴請仍順常儀乞得摶食歸林同眾食故摶食亦名段食謂有形段可摶取故揀非觸食鬼神觸氣而飽思食色天禪思資神及識食空天識想相續故宿留也比丘皆歸來方食唯佛及菩薩齋畢而歸故云我已宿齋謂已於王宮留齋也借此除佛亦避自他融即非問不成之意比丘雖能空我未得亡身明知一人食時諸人不飽而故為非問以顯心在身外之謬至下自見非理故問竟二據理正答阿難答言不也世尊何以故是諸比丘雖阿羅漢軀命不同云何一人能令眾飽初直答何以句徵起是諸下釋成是諸比丘雖證阿羅漢果而身軀性命各各不同以子縛雖斷果縛猶存故如後云各各有身皆有所生氏族名字足證此義云何一人等決言其必無是理可惜阿難只知隨口答話不知自己舌頭已墮世尊手裏借事問答竟二例出謬理佛告阿難若汝覺了知見之心實在身外身心相外自不相干則心所知身不能覺覺在身際心不能知初按定所計之語覺了者隨前五識覺了前境即明了識因事會意曰知似指獨頭遇境取相曰見似指前五以同為虗妄破則俱破心在身外是其所計加以實字則按定莫轉矣身心下例彼相應無干言心既外身身亦外心故曰身心相外既身心相外自然彼此不相干涉同彼羅漢軀命不同食不互飽如此則心所知者身應不覺覺在身者心應不知果其互不相知可說心在身外恐未必然也例出謬理竟三驗證令覺我今示汝兜羅綿手汝眼見時心分別不阿難答言如是世尊佛告阿難若相知者云何在外初示手令驗示謂伸而示之也西竺有綿名兜羅約義翻為細香謂細軟香潔故佛手似之故以為名眼見身之知心別心之知纔見即別似非身心相外明知故問令自驗之阿難下依問實答如是者謂如佛所問眼見心別實是爾也佛告下就示其謬言既說眼見心別則是身心相知若果身心相知義不同彼食不互飽云何而言心在身外其亦未之思耳驗證令覺竟四指計結破是故應知汝言覺了能知之心住在身外無有是處是故者以是眼見心別之故眼見心別明知此心不在身外故教以應知而以無有是處破之破在外竟三破根裏二一阿難承前轉計二如來就喻難破初三一領前轉計一處二承徵指在根裏三脫前在內二謬初阿難白佛言世尊如佛所言不見內故不居身內身心相知不相離故不在身外我今思惟知在一處如佛所言者通指破內破外所說不見二句別指破內之語身心三句別指破外之語我今思惟者二俱被破另覓心處知在一處者知在非內非外不墮二謬處也然妄心本無處所真心不容思惟則思惟已非況云知處無怪乎為世尊所破矣二承徵指在根裏佛言處今何在阿難言此了知心既不知內而能見外如我思忖潛伏根裏猶如有人取琉璃椀合其兩眼雖有物合而不留礙彼根隨見隨即分別初因計就徵一處之言籠同難破故徵以處今何在阿難下躡前定處既不知內固知不在於內而能見外却又不在於外如我捨此兩途更用思忖必是潛伏根裏猶如下借喻顯理瑠璃椀眼鏡類喻眼根所合眼即眼根喻識心然瑠璃雖是有物合眼而不礙眼見喻眼根雖是有相合心而不礙心知故曰彼根隨見隨即分別葢是以彼根隨見合琉璃隨物能照隨即分別合眼根隨琉璃能見法喻合明自謂理極成矣三脫前在內二謬初計在內如來以昧內知外為破因轉計在外今以在外被破無可遮救遂依如來所說昧內知外之義而忖度之其意以為潛伏根裏則昧內知外二謬俱脫矣然我覺了能知之心不見內者為在根故分明矚外無障礙者潛根內故覺了能知重舉前心也此心所以不見內者為在根而不在內故此脫昧內之謬既以昧內却又分明矚外無障礙者潛根內而根如椀故此脫知外之謬要知在內之計唯乖自宗在外之執猶通外計至於在根之謬展轉虗妄自宗他宗無不相違總以自恃小慧不務真脩以致問著拶著東觸西觸妙哉權人吾徒龜鑑阿難承前轉計竟二如來就喻難破三一就喻定見二難法不齊三指計結破初佛告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼當見山河見琉璃不如是世尊是人當以琉璃籠眼實見琉璃初按定其喻如汝所言者按定是其所說葢潛根之計琉璃之喻本不相齊如來將欲施破故先按定以發其詞彼人下問見琉璃言彼人當以琉璃籠眼琉璃固不礙於眼矣雖不礙於眼而非無體之物彼眼根者尚能遠見山河豈不近見琉璃乃故問見不者令其自說以備法中成難如是下答以實見如是者先渾答謂如佛所問者是矣是人下次應問謂琉璃籠眼實見琉璃乃應其所問答故就喻定見竟二難法不齊佛告阿難汝心若同琉璃合者當見山河何不見眼若見眼者眼即同境不得成隨若不能見云何說言此了知心潛在根內如琉璃合初正難不齊意謂汝心在根若同琉璃合眼者則汝心同眼眼根應同琉璃汝心現今正當外見山河先應見眼乃何故不見既法喻不齊以喻中琉璃籠眼實見琉璃法中眼根籠心不能見眼故則所計在根者不極成矣若見下兼防謬應恐謬應云當見山河亦能見眼故為此防言汝心若能見眼則眼同所對之境設許同境是對非隨汝前所云彼根隨見隨即分別者亦不極成矣若不下還歸正破恐聞見眼之非還計不見故歸正破言心若不能見眼則非潛根以不同眼根在琉璃中故云何說言心在根內如琉璃合真妄計也三指計結破是故應知汝言覺了能知之心潛伏根裏如琉璃合無有是處見與不見俱無潛根之義以是之故應知所計之非故曰無有是處破根裏竟四破救內舊云破內外細詳其文阿難固無雙計之語如來亦無並破之詞正脈云確論此計仍歸最初在內之執但惟脫前二謬為異又云名雖別列實惟救前在內負墮之失故今疏以破救內科之二一阿難轉救在內二如來就詞難破初阿難白佛言世尊我今又作如是思惟是眾生身腑臟在中竅穴居外有藏則暗有竅則明今我對佛開眼見明名為見外閉眼見暗名為見內是義云何初思惟申理在外固錯在根尤非仍還在內之執轉思脫過之理故云又作如是思惟腑同府謂六府也胃為水穀之府小腸為盛受之府大腸為行道之府膀胱為津液之府膽為清淨之府三焦為孤府素問曰其傳化物而不藏者曰府臟亦作藏謂五藏也腎為精藏心為神藏肝為魂藏肺為魄藏脾為志藏素問曰能藏精氣而不泄者曰藏故次下即用藏字然腑臟皆身內之物故曰在中竅穴謂七竅孔穴也眼二耳二鼻二口一皆面上所有故曰居外藏者包藏義故有處則暗竅者通洞義故有處則明此阿難欲脫前過先申內暗外明之理今我下救難請決因前計在內如來難以二謬一者在內昧內謬二者在內知外謬今以有竅則明正同戶牖開豁故開眼見明名為見外此脫在內知外之謬又以有藏則暗暗者即是臟腑故我閉眼見暗名為見內此脫在內昧內之謬其意以如來前難非理依然以在內為是但屢被破奪不敢自決故曰是義云何是又向世尊口角邊討分曉也阿難轉救在內竟二如來就詞難破三一就詞開欵二依欵成難三指計結破初佛告阿難汝當閉眼見暗之時此暗境界為與眼對為不對眼此就其所計之詞雙開對眼與不對眼為難欵也二依欵成難二一難對眼之非二難不對之謬初若與眼對暗在眼前云何成內若成內者居暗室中無日月燈此室暗中皆汝焦腑初正難對眼相對成見世間共許故先約對眼難之對則在前成外故難以云何成內若成下兼難成內謂設許在前成內則暗室無光時此暗亦在眼前亦許成內如此則室是汝身暗中所有皆汝焦腑豈理也哉焦腑者三焦也黃帝難經云三焦者水穀之道路氣之所終始也上焦在胃上中焦在胃臍之間下焦在臍下六腑中一故曰焦腑謂焦即是腑耳二難不對之謬三一正難不對二兼防謬辯三展轉顯謬初若不對者云何成見對既不成自計不對故次約不對難之不對而見世間相違故難以云何成見二兼防謬辯恐謬辯云我言閉眼見暗名見內者謂閉眼之時此心已離外見旋轉內對臟腑所以成見是仍歸在內之計故世尊以此防之若離外見內對所成合眼見暗名為身中開眼見明何不見面若不見面內對不成初原謬縱許意云若汝謬謂閉眼之時此心離於外見旋轉內對臟腑所以成見者則汝所計合眼見暗名為身中者是矣令眼二句即前所計閉眼見暗名為見內異變其文開眼下取例顯非意云閉眼之時此心既能旋轉內見臟腑開眼之時亦應旋轉內見面目汝今正當開眼見明何不見面若謂開眼之時不能見面是不能旋轉也以此為例則閉眼之時亦不能旋轉則汝所言內對之義亦不得成內對不成云何而言閉眼見暗名為見內是固知所計者非矣三展轉顯謬見面若成此了知心及與眼根乃在虗空何成在內若在虗空自非汝體即應如來今見汝面亦是汝身汝眼已知身合非覺必汝執言身眼兩覺應有二知即汝一身應成兩佛初心眼在空謬本為辯心兼帶於眼者以凡小等通計心隨於眼如前云彼根隨見隨即分別是也意云設許開眼亦能旋轉則見面之義成矣若此則心與眼根乃在虗空以相對方能成見對面豈不在空乎設許在空乃屬於外故難以何成在內正脈云阿難本計心仍在內故今結難心與眼根俱不成在內責其自語相違也若在下轉自成他謬意云若定執心眼在空者不唯不成在內且在空離汝自非汝體乃成他心矣即應下轉他成自謬意云若強謂雖離於汝不妨還是汝體者即應如來今見汝面亦是汝身以既許離汝還是應通許故此上二謬乃責其壞世間相也汝眼下身成不覺謬意云自他互轉已壞世相況夫汝心隨眼彼眼離身已具覺知則汝身合同無情非有覺知以一人唯有一心在眼則不在身故必汝下一身二果謬意云必汝執言在身在眼兩俱有覺則汝阿難應有二知人唯憑此覺知修因證果汝今既有二知即汝一身當來成佛時應成兩佛此理所必無唯是謬妄而已依欵成難竟三指計結破是故應知汝言見暗名見內者無有是處以是對眼與不對眼展轉謬妄之故則見內之義不成故曰無有是處然閉眼見內既其不成已足破其救內至開眼見外之義無勞更破正脈云單結見內足見此計同在內矣破救內竟五破合處二一阿難引教謬計二如來牒計難破初阿難言我常聞佛開示四眾由心生故種種法生由法生故種種心生我今思惟即思惟體實我心性隨所合處心則隨有亦非內外中間三處初謬引昔教常聞者昔教曾聞以心生法生等通大小乘昔教共說故今約二乘且指六識為心六塵為法灌頂云由內心而攀緣外境境隨心起故曰心生法生由外塵而激發內心心逐境現故曰法生心生正脈義云心生法生見法不自生也法生心生見心不自生也正顯心法互倚妄現俱無實體阿難失旨反證緣心隨合隨有可謂迷之甚矣我今下妄計隨有思惟者思惟心法互生義也然正當思惟時妄識力用行相昭然自覺別無心性認此為真故曰即思惟體實我心性而不知如來重重破斥皆為此想不真故有輪轉是阿難孤負如來為不少矣隨合隨有者隨所攀緣何法心則隨有如現今思惟佛所說法儼有心生若更思惟別法心生亦爾例而推之豈非隨所合處心隨有乎正脈義引經云聚緣內搖趨外奔逸昏擾擾相以為心性古德謂攀緣妄想狀如野燒豈可謂之真心今阿難四番被斥乃認隨合隨有宛爾內搖外奔真稱昏擾正是攀緣妄想何異野燒良由屢被挨拶露出本相然猶不覺其妄亦曲盡迷態而已亦非句總遮前非言隨合隨有處乃無定非定在三處也中間且指根裏以根內臟外為中間故阿難引教謬計竟二如來牒計難破三一牒其所計二分宗兩難三指計結破初佛告阿難汝今說言由法生故種種心生隨所合處心隨有者前阿難所引雖有四句其意但取後二句以前二句心先有故不可言隨合隨有故此如來亦唯約後二句牒之二分宗兩難二一難無體非合二難有體無據初是心無體則無所合若無有體而能合者則十九界因七塵合是義不然初正難非合承上法生而心始生則心無自生之體體尚不有憑誰說合故曰無所合也是則隨合已非況云隨有不益妄乎若無下防其謬執恐謬執云心雖無體不妨暫現能合故為此防意謂凡言合者必二俱有體如十八界因六塵合謂六根六識以六塵合之則成十八界此昔教所許若必謂無體而能合者則如妄計十八界外有十九界且說因七塵合今教昔教皆所不許以界唯十八塵唯有六本無十九及七之說豈有能合之義故曰是義不然難無體非合竟二難有體無據二一約二義成難二約四相成難初二一正難二義二兼破謬辯初若有體者如汝以手自挃其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面初按定令驗所自承上無體既不成合自執有體故又約有體以難意謂汝今若言此心有體者當自驗之如汝以手自己挃觸其體當正挃時自有知痛知痒之心汝即驗其所以能知之心為復內出為從外入要必有所據乃可言有體耳若復下分途取前例破意謂若復內出同前在內還應先見身中若從外來同前內對先合遠見汝面今俱不爾則杳無所據所謂有體者唯虗妄計度而已二兼破謬辯二一阿難謬辯二如來難破初阿難言見是其眼心知非眼為見非義因被如來內出見中外來見面之難遂謬辯云見是眼家之用心但能知非同眼之能見如佛所云內出還見身中外來先合見面者是欲責心為見如果能見則非心之義矣如來其欺我哉二如來難破佛言若眼能見汝在室中門能見不則諸已死尚有眼存應皆見物若見物者云何名死初約人生識在破言心在身中如人在室內眼唯通明而能見者是身內之心喻門唯通明而能見者是室內之人法中若謂眼能見者喻中須是門亦能見但眼之能見二乘猶不知非門之能見舉世盡覺其謬故就喻為難令自覺其非則諸下約人死識去破言既以喻問仍不知非必謂眼能見者喻中須是死人能見故約已死者為難已死者心離其身時也心雖離身尚有眼存此時若能自見則是眼見故難以應皆見物葢明知必不能見而故意為難末二句約義不符名破言人唯不能見物方可名死若見物者即是生人故難以云何名死如是則人死無見眼唯空存以識去故知此義者而見是其眼心知非眼之謬益可見矣約二義成難竟二約四相成難二一牒體總徵二約相別難初阿難又汝覺了能知之心若必有體為復一體為有多體今在汝身為復徧體為不徧體前難二義已顯有體之謬恐未心服定執有體故重牒再徵下乃一一難破一體者四支共一心體多體者四支各有心體此約數徵徧體者一心徧滿四體不徧者局在一體不徧此約量徵葢必有數有量有體之宗方可成立二約相別難二一難數二相二難量二相初若一體者則汝以手挃一支時四支應覺若咸覺者挃應無在若挃有所則汝一體自不能成若多體者則成多人何體為汝初難一體不成四支一體有生通計故先約一體為難意謂若四支共一心體者即今挃一支時四支應當咸覺以一體故若汝聞我此語謬謂咸覺者則所挃之處即應無所偏在以成覺故若其觸頭頭知觸足足覺而挃有所偏在者則汝所計一體之義自不能成以四支不共故若多下難多體仍非破一計多情所必至故又約多體為難意謂一人一心是其正理若謬謂心有多體者則汝阿難應成多人設許成多應有多名今汝現前四體中何體為汝以當阿難之名試自思之唯是展轉虗妄無可憑據則多體仍非矣難數二相竟二難量二相若徧體者同前所挃若不徧者當汝觸頭亦觸其足頭有所覺足應無知今汝不然初難徧體不成同前所挃者取例一體中難良以一體者四支共一心體徧體者一心徧滿四支雖能所往復而會義無殊不須別立難詞故但取例於前而云同前所挃謂同前挃一支時四支應覺等也問既一體徧體會義無殊何必重列答數量異故又為與不徧作對說故若不下難不徧仍非徧體招難自計不徧故次約不徧以難意云若謂此心不徧體者理應局在一支請試驗之當汝觸頭之時亦觸其足若頭有所覺則是汝心局在於頭則足應無知若足有所知例此可思無煩具說此先斷定其理今汝不然句乃破斥其非謂齊觸齊覺不如上之所說不徧之宗豈能成立所謂有體者此又無所據矣分宗兩難竟三指計結破是故應知隨所合處心則隨有無有是處是字指上所辯無體非合有體無據二義故字起下應知隨所合處心則隨有二非言無體非合隨合之義不成有體無據隨有之義安在故斥云無是處也破合處竟六破中間二一阿難引教立中二如來就中難破初二一謬引昔教二思惟立中初阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相時世尊亦言心不在內亦不在外例上常聞故曰亦聞雖未的指何經然追述昔聞應在般若會之前半及方等深密時也與文殊等者以方等深密般若會中時常以文殊等為當機故方等如淨名般若如文殊問等諸法王子指文殊一類如普賢觀音等迹示隣極者言之所談實相略明有三一者無相之相名為實相如般若云是實相者即是非相始教意也二者諸法皆真名為實相如淨名云觀身實相觀佛亦然終教意也三者真空絕相名為實相如無量義云其一法者所謂無相無相不相名為實相頓教意也若據阿難得聞應屬第一以是引小乘入大乘故若約一聞異解無妨兼聞後二觀下謬引無庸過揀非內非外方等般若諸會歷有是語多約真心言之如淨名舍利章云心不住內亦不在外阿難真妄不分謬引謬證多聞人循名昧義固如是也其自意以昔亦曾聞今仍計內計外無怪乎為世尊所破矣謬引昔教竟二思惟立中如我思惟內無所見外不相知內無知故在內不成身心相知不相離故在外非義今相知故復內無見當在中間初思前兩非如我思惟者依佛昔教詳佛今說也今因我計在內佛以內無所見難之以不能見心肝脾胃等故又因我計在外佛以應不相知難之以應同彼一食不飽眾故據佛之意葢以內無知故在內不成身心相知不相離故在外非義仍符昔教不在內不在外之義也今相下待成中相言昔教今說既已相符我又驗之於己現今身心相知故亦知不在身外復於身內無見故亦知不在身內捨此兩途更用思惟當在中間無可議矣阿難引教立中竟二如來就中難破三一正難在中二兼遮謬救三指計結破初二一就中徵在二依在成難初佛言汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身初據理定有言中中必不迷者以迷則不言言則必能了故非無所在者能了必能指授指授必有所在今汝下雙徵兩在言在雖不無答應珍重故教以推中謂細推中相也中何為在句謂總徵中相以何為在為復在處等者言一切諸法不出內之根身外之塵處故別約身處兩問要必有定在乃可以施破耳二依在成難二一在身不成二在處亦非初若在身者在邊非中在中同內首句按定在身下二句中邊皆過邊附皮中據內也言在身有中有邊如謂在邊則不可言中是自宗相違如謂在中則還同在內於前來已破既二俱有過在身尚非況夫言中自不成矣二在處亦非若在處者為有所表為無所表無表同無表則無定何以故如人以表表為中時東看則西南觀成北表體既混心應雜亂首句按定在處次二句徵表有無有表色處無表空處也言在處有有表有無表如在無表則同於空無汝心乃成斷滅如在有表則絕無定相汝心廼成雜亂既二俱有過在處已謬況夫言中憑何立乎何以故等廼徵釋表則無定之義良以無定言渾非釋莫諭故須徵釋相連二表字上表字指能表之物下表字謂表顯中相故云以表表中正脈云表者標竿修房舍者立之以表中位灌頂云如周官土圭測景立標之類東看則西南觀成北文影西看則東北觀成南可以意會末二句言能表之體既其四方混淆所表之心豈能自立中相故應雜亂謂四方交雜稱謂混亂所謂無定者以此正難在中竟二兼遮謬救二一阿難謬救中相二如來就謬遮中初阿難言我所說中非此二種如世尊言眼色為緣生於眼識眼有分別色塵無知識生其中則為心在初異佛現說意言我所說中另是一理非此如來所說二種謂身中處中也如世下同佛昔教世尊言者指在深密教中如唯識第五云此中教者如契經言眼色為緣生於眼識又契經說若根不壞境界現前作意正起方能生識葢眼能發識是增上緣色能牽生為所緣緣雖有餘緣此二為要以根境和合識乃得生故眼有下妄斷謬理破合處中以門喻眼已顯眼無分別而此又云眼有分別固為妄斷其意以眼有分別屬內身色塵無知屬外境內外各有定相識生其中歷然不混故曰則為心在然謂之謬理者略明其謬有三一者眼色為緣生於眼識是昔教所說今於實教一一破其相妄顯其性真而為奢摩他體阿難求此而乃引彼為證是權實不分謬二者眼根浮勝俱屬色法無有分別識乃有別縱指根性後文亦云其目周視但如鏡中無別分析汝識於中次第標指今云眼有分別是根識不分謬三者前云心生愛樂屬於意識此云識生其中乃是眼識徵者在彼答者引此是五六不分謬此亦多聞人循名昧義之故阿難謬救中相竟二如來就謬遮中明知其謬且不與之分析但且遮其中相二一按定總問二分遮兩中初佛言汝心若在根塵之中此之心體為復兼二為不兼二汝心句先以按定謂按定阿難謬救之語此之下方乃總問謂總問心體兼二與不兼二也然阿難計帶三謬如來不與分析即就謬為問者亦有三義一者不了義教素所習聽了義之教難以遽領姑且破其舊見新悟尚待後聞二者眼無分別前已喻明今復重執知難頓革姑且破其中相餘容悟後自分三者眼意二識用異體同破則俱破阿難既認眼為意如來即就便為破阿伽他遇病即除初無論先之與後二分遮兩中二一遮兼二之中二遮不兼二中初若兼二者物體雜亂物非體知成敵兩立云何為中兼猶連帶兼二者謂外連塵物內帶根體也外連塵物則雜內帶根體則亂曰雜曰亂難以分中此約兩合言之若約兩離者物塵無知非同根體有知汝心在中一半外連塵物則相敵一半內帶根體則相成半敵半成分中兩立自無中相是則兩合兩離俱不可言中故總以結難云何為中二遮不兼二中兼二不成非知不知即無體性中何為相兼二不成即是不兼二也然根是有知塵是無知各有相狀心若不兼於二非同有知之根無知之塵相狀可見故曰非知不知如此則漫說無心縱使有心亦同龜毛兔角故曰即無體性體性尚無況復云中故難以中何為相兼遮謬救竟三指計結破是故應知當在中間無有是處承上在身在處言中招過兼二不兼立義不成是故應知汝言當在中間者唯是妄計無有是處可憑破中間竟七破無著二一阿難引教謬計二如來據理難破初阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在一切無著名之為心則我無著名為心不初引昔所說我昔見佛指在般若以般若時佛勅轉教故置與言如大品云如是種種法門汝當為菩薩說即佛勅轉教義也目連等華梵釋見敘分學後曰弟謂學在師後也法生曰子謂智從法生也僧首稱大謂佛弟子中四人為上首也領受佛勅從佛轉教故置共言說般若法摧無明惑故以輪喻如法華云我乘佛教為大菩薩以諸因緣說無上道即指般若會上領受佛勅共轉法輪義也般若宗於無住故曰常言覺知分別即是妄心圓覺呼為六塵緣影此經斥是虗妄相想既無實體焉有定在故於內之根處外之塵處中之識處覓心了不可得是曰不在雖已各言不在猶恐稍涉簾纖有礙放捨故復總結云俱無所在大品云若住一切法不住般若不住一切法方住般若又云般若者是無住義金剛般若云應生無所住心若心有住即為非住然既曰常言似是義引或諸部般若中亦照樣有是語也一切下臆斷請決言佛意葢以俱無所在以顯識心虗妄而阿難不諭其旨反以一切無著名之為心真憑臆妄斷也雖憑臆妄斷因屢被破奪不敢自是依然請決於佛故曰則我無著名為心不昔二祖於達磨大師處請求安心師云將心來與汝安祖云覓心了不可得師云與汝安心竟葢必到覓心了不可得處方是真無著妙明寂常心性亦即於此顯現今阿難實未到此強說無著而又不敢體認脚根不點地者類多如此阿難引教謬計竟二如來據理難破三一按定雙徵二有無並難三指計結破初佛告阿難汝言覺知分別心性俱無在者世間虗空水陸飛行諸所物象名為一切汝不著者為在為無初按定所言雖是佛語阿難引用即是阿難之語故云汝言此將為破斥先以按定也世間下徵境有無意謂汝言俱無在者即是一切無著然無著且置何為一切如世間虗空屬於依報水陸飛行屬於正報依正二報品類差別名為諸所物象諸所物象總統該括此即名為一切汝前言不著者為是一切俱在汝自不著為是一切俱無汝故不著葢明知二俱不成乃故問以發其端二有無並難上云在者即是有也無則同於龜毛兔角云何無著有不著者不可名無無相則無非無則相相有則在云何無著初正難有無意謂若言俱無名無著者其意不成以無則同於龜毛兔角有名無實且道不著何法故難以云何無著若言俱有自無著者義亦不成以既執為有早已是著故難以不可名無無相下轉釋難詞意謂我言無則同於龜毛兔角者以既云無相則全無實體非龜毛兔角而何我言有則不名無著者以非無則相相有則在言非無則相者非無即有猶云有則有相也相有則在者在即是著猶言相有則著也相有則著故不可名無是則為在為無俱無無著之義故總以云何無著難之無著尚不可說況夫認為是心不益妄乎有無並難竟三指計結破是故應知一切無著名覺知心無有是處是故等者謂以是有無俱非無著之故應當了知若計無著名心者渾然俱非無有一是處也問賊人改業即是良民念舊而殺豈稱善治然識心之所以為害者為有著故今既無著妄即是真認此為心何必更破答真心如海妄心如浪浪起拍舟所以為害若不拍舟須待浪息浪息風停唯覩湛海諸有智者豈復離海尋浪今阿難果其無著自然覓心叵得覓心叵得自見真心豈復遺真認妄既猶認妄則其所言無著亦未足信故我前言阿難實未到此亦如賊人口說改業心實未革有討賊之責者豈可置而不問此如來所以為之更破正脈云詳此七番確定成處者一內二外三根裏六中間四處而已以四還在內五則無定處第七則并處亦無也又一四引眾同計二三己意推度後三引教謬釋孤山曰總上七番似破四性在內潛根救內破自性在外破他性中間破共性隨合無著破無性龍樹云諸法不自生亦不從他生不共不無因是故說無生據此則七番情盡全身放捨即入無生忍矣阿難雖未及此而平日所恃以為心者亦杳無住處可跟究矣密示妄識無處竟二顯呵妄識非心前已搗其巢穴此方聲正其罪二一阿難責躬請教二如來示本呵非初二一自責己誤當迷二求佛開示修路初爾時阿難在大眾中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟蒙佛慈愛雖今出家猶恃憍憐所以多聞未得無漏不能折伏娑毗羅呪為彼所轉溺於淫舍當由不知真際所詣初經家敘儀爾時者七處破竟時也情盡計窮望佛哀愍故即從座而起露肉曰袒偏袒右肩者偏露肉於右邊之肩也右表順從亦表便於服役意故灌頂云此土謝罪順命則肉袒西域覲王請命則偏袒今阿難求佛禮同覲王顯至敬也右膝著地者涅槃疏有三義一右膝有力跪能安久二右膝有力起止便易三右膝躁動著地令安古德云三處翹聳右膝著地名為互跪如此者表謙卑遜順合掌者表收攝散動上皆身業嚴肅曰恭尊重曰敬屬意業上示曰告下啟曰白屬口業三業虔誠足以感佛故特為敘出我是下自責己誤四王八子阿難居末是故最小之弟小則偏邀眷注故蒙佛慈愛出家尚帶俗情故猶恃憍憐恃倚仗憍矜恤憐愍念也由有此恃所以從侍佛來未受惡辣楗槌養成憍恣情態專尚多聞不務真修未得無漏方證初果一遇娑毗羅呪不能屈折治伏而反為彼所轉溺於淫舍不能自出若非如來呪護文殊提獎唯有遠遁何顏見佛此猶已往之誤然已不可挽矣當由下猶慮當迷由字註多不訓講者率以因義釋之細玩上文殊無著落良以歷敘前誤次第各有因起初則因最小而蒙佛慈愛繼則因蒙愛而久恃憍憐次則因恃憐而尚聞誤證後則因誤證而力不勝邪既次第各有因起而又云當由若作因義如何銷會今釋當由者謂當來之所經由真際者真心實際是即以妄識為真心以所在為實際實不知別有真心實際耳詣者在也謂究竟所在處也其意以從前已誤知不可諫當來所由冀猶可追但自覺七番情盡尚不知真心實際究竟所在憑何進修是所慮焉觀下請示奢摩他路其為慮當來所由意自可見自責已誤當迷竟二求佛開示修路惟願世尊大慈哀愍開示我等奢摩他路令諸闡提隳彌戾車作是語已五體投地及諸大眾傾渴翹佇欽聞示誨初正求修路除佛一人無可歸投故云惟願世尊不求小乘之樂故望大慈哀愍以必興大慈方能與大樂故哀者哀前已誤愍者愍後尚迷請示奢摩路者即求知心處以不知心處奢摩無路可修故然阿難只知求路不知認見為心即是進步坦衢只知求開不知了識非心即是闢道良吏至下呵心顯見乃如來密符其請令諸下兼隳惡見闡提此云信不具不信因果無慚愧故亦云斷善根人如楞伽云闡提者焚燒一切善根彌戾車或翻邊地或翻惡奴或名弊惡地處或名樂垢穢人此皆不符本經興福曰惡見資中云邊邪不正見人二說合會是今經義以闡提知見不正非邊即邪甚至謗佛謗法撥因撥果惡見特甚故隳壞滅也言向以奢摩路壅正修人亡類多流入邊邪積成惡見永墮一闡提中今示修路不唯阿難等從此離妄證真亦令闡提輩自是改邪歸正故惡見自隳也按如來行菩薩道時凡遇加害者不唯不報且憐其愚迷發願度彼今阿難無力勝邪身受其辱而乃請示修路令隳惡見亦菩薩願度之意作是下同眾佇誨五體投地者肘膝首俱投於地七禮中恭敬禮也將請互跪合掌請已撫心結拜亦常儀耳請意及他故上云我等佇誨兼眾故此云及諸乃經家敘事精詳前後相照傾渴者傾心渴仰翹佇者翹首佇望正脈云如渴思水如鳥張望欽敬也知如來將為示誨敬心承聽揀彼隨班備數漫不經意聞也阿難責躬請教竟二如來示本呵非二一普示二本二直呵非心初二一現相密示二發言顯示初爾時世尊從其面門放種種光其光晃耀如百千日普佛世界六種震動如是十方微塵國土一時開現佛之威神令諸世界合成一界其世界中所有一切諸大菩薩皆住本國合掌承聽初密示根性將現面上眼耳鼻口近通身處遠通意處故名為門能所合論即表六處根性言六根各具根性即是二根本中真本所謂菩提涅槃元清淨體亦復各具自性光明如眼見耳聞等但眾生遺此本明一向不覺性雖不無光乃不現今將捨妄求真從眼顯現例餘五顯現亦爾故以放種種光表之種種者青黃赤白等交映互現色乃無盡故此性一現諸法頓朗如後四科七大全彰自性光明十界三藏無非本體朗照故以其光晃耀表之一日在空照四天而無遺況夫百千明耀罔及用表自性光明輝天鑑地一切光無能匹故普佛下密示六識將破佛世界一佛化境也統該四方上下可表六處識心言六處識心即是二根本中妄本所謂用攀緣心為自性者然既屬攀緣即非自性其柰眾生一向堅執難為動搖阿難時節已至不久放捨故以六種震動表之六種者震兼吼擊動兼起誦形聲各具三動共為六也如是下密示化他同己如是者承上一界震動而言一界震動展轉及他如是相連十方微塵國土俱於一時開通顯現若作表法者言阿難捨妄會眾同聞見賢思齊通行放捨仍復展轉化導有生皆然故以塵國開現表之佛之下密示融妄歸真言上雖開現猶有分隔見量雖通畛域宛在復以佛之威神擲鐵圍而偃須彌會江湖而通香海無復多地唯有一天故云令諸世界合成一界若作表法者融妄歸真須憑三昧之力故以佛威令合表之諸界表妄一界表真合會融通能表所表義亦相似其世下密示三昧成就其世界仍指十方塵國塵國已合仍云其界者以未合時各有分齊從先為言大菩薩者揀非初心必至登地以上廼可名大本國承聽者既成一界無復隔越在彼即同在此常得聞故若作表法者融妄歸真識心本自無礙故仍以其界表之化眾同己有生從此發心故即以菩薩表之既已歸真無復真妄之別識即是智常契本覺故以本國承聽表之智契本覺即是三昧若時時常契即是首楞嚴三昧也現相密示竟二發言顯示上智之人目擊而道存故上以相示中根者流耳聞而心會故此以言顯若有眼不見有耳不聞者則是下根亦令隨分結緣二一歎迷標本二總徵別示初二一指所歎人二標所迷本初佛告阿難一切眾生從無始來種種顛倒業種自然如惡叉聚諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬初無知造業者一切眾生通指汎爾凡夫不知修行之人從無始來者指自有妄識已來違真逐妄背覺合塵無我計我無法計法等故云種種顛倒此屬惑道由顛倒故造種種業作將來因故名為種此屬業道惑道如薪業道如火依薪逸火自相燒然法身受其熏蒸慧命由茲懸危此屬苦道起惑造業苦果隨之三事相因故云如惡义聚惡叉聚西域果名灌頂云此云綿貫珠一蒂三果同聚而生相似三道故以為喻諸修下有志修行者凡夫起惑造業輪轉生死固為可愍縱令有志修行中道紆曲猶在可傷諸者大率義雖云修行乃指不依正修者言菩提此云覺道三乘皆有深淺不同唯佛無上所以不能成者正由不依正覺修故乃至者超略權教菩薩大乘也聲聞緣覺釋見敘分小乘也雖別成乎此猶是出世聖賢然更有誤之甚者故云及成外道等外道心遊道外趣邪修者諸天三界諸天著有漏者魔王居欲界頂躭欲樂者魔眷精靈妖魅侶魔羅者此等亦是住世凡夫但較彼無知造業者猶為難救不益可傷乎哉指所歎人竟二標所迷本皆由不知二種根本錯亂修習猶如煑沙欲成嘉饌縱經塵劫終不能得初出由標迷言如上所說無知造業者固無論矣至於諸修行人本期得道得果而乃中途紆曲滯窒權小甚至誤入魔外欲潔偏染求昇反墜其故何哉故云皆由不知云云二本者一真本至下十番所顯者是二妄本如上七處所破者是前取心顯錯文云從無始來生死相續皆由不知常住真心用諸妄想義亦同此但未明其為本今言本者以一切真因真果妄因妄果無不由此生故錯亂修習者用妄想為真心指偽果作實證不唯錯真用妄且以妄亂真也猶如下舉喻顯錯言諸修行人用妄想為因心期證真果如煑沙欲成嘉饌沙非饌本經劫徒勞故曰終不能得妄非真因亦復如是由此所以不成菩提誤入權小及外道天魔隊耳歎迷標本竟二總徵別示二一總徵二別示初云何二種將欲別示先總徵以發其詞二別示二一先示妄本二後示真本初阿難一者無始生死根本則汝今者與諸眾生用攀緣心為自性者初出名無始以來浩劫生死遡流窮源不出妄心故曰根本則汝下示相欲令悟妄指在現前故云則汝今者凡未了真者無不認妄故云與諸眾生攀緣心即六識心也六識緣境隨處生著如猿猴攀樹似尺蠖緣木故以為名然此本非是心亦非自性而眾生執為心性故前云即思唯體實我心性後云即能推者我將為心今則分明指出是生死本而阿難猶自不覺亦可悲矣二後示真本二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸眾生遺此本明雖終日行而不自覺枉入諸趣初出名此中無始與上科不同上科兼於中間謂無始至今也此科惟指初際謂無始之時也菩提有三一實智二方便三真性此是真性菩提以性本自覺即菩提故涅槃亦三一性淨二方便淨三圓淨此是性淨涅槃以性本自淨即涅槃故元清者非澄之使清謂本來離生死濁即顯其為性淨涅槃元淨者非治之使淨謂本來離煩惱染即顯其為真性菩提能為一切淨法之本故名為體餘二菩提及二涅槃亦依此故是體即根本義也又二本應作二釋妄本中生死下加之字作依士釋真本中清淨下加即字作持業釋則汝下示相欲令現前體認故云今者不言與眾者不比妄心有生同認故識精即是第八賴耶本經呼為陀那細識最極微細故曰識精於諸識中最為精故又精者精瑩有明照義以此明非磨之使明乃本來自明故曰元明如後云見精映色聞精映聲等又揀選圓通偈云元依一精明分成六和合是知體唯賴耶應根成六故下文破識之後即於根中指出能生諸緣等者正脈云諸緣者前六轉識也楞伽云藏識海常住境界風所動種種諸識浪騰躍而轉生是知前六皆此識海所生諸浪但前六能徧緣一切而獨於本生識海自緣不及如眼所起見能徧見一切而自不見眼故云緣所遺者縱使悟時須一念不生方能默契六識若動體即隱矣故學人不捨緣心畢竟如生盲不見性也愚謂前六轉識六字應是七字如八識頌云淵深七浪境為風則七識皆是識海中浪也且彼疏亦自問云唯識何言七緣第八見分為我答偈云隨緣執我量為非既是非量豈真能緣此以第七緣八不合緣所遺者故為此問若既唯約前六則此問無從或交師意是而筆誤耳智者詳之然此本是真心而眾生不知今已分明指其為菩提涅槃元清淨體至下阿難猶未敢認如云我雖識此見性無還云何得知是我真性又云見必我真我今身心復是何物所謂把手相牽行不得也由諸下顯過良以阿難不能捨妄全由迷真故如來於示真本後特顯其過過在遺真之故故曰由諸眾生遺此本明行猶歷也謂六根各歷自所緣境如眼見色耳聞聲等無時暫歇故曰終日行也見色不知能見者誰聞聲不知能聞者誰等故曰而不自覺既不覺真必至妄認緣塵起惑造業隨業受報故曰枉入諸趣諸趣即是六道謂生而趣此死而趣彼如旋火輪無休息故枉謂自屈言眾生本具菩提涅槃元清淨體而乃流入諸趣豈非自屈乎哉葢深警之也普示二本竟二直呵非心二一阿難依舊遺認二如來痛呵非心初二一依舊遺真二依舊認妄初二一乍驗似領二再勘實迷初阿難汝今欲知奢摩他路願出生死今復問汝即時如來舉金色臂屈五輪指語阿難言汝今見不阿難言見初將問預示意謂汝若不求奢摩他路則是甘受生死無庸問矣據汝今者所請是欲知奢摩他路依之願出生死但此事大非草草今復問汝汝宜悉之即時下作相驗問佛身金色其臂亦然千輻輪相指端俱有即時舉屈者先以相驗若不循塵流轉自然從此見性故溫陵云金拳舉處直下要識本明天龍一指竊比此耳語言見不者既驗復問令其無所假飾所謂放過即不可也阿難言見者見中迷悟雙關迷則見塵悟則見性科為似領者以此二再勘實迷佛言汝何所見阿難言我見如來舉臂屈指為光明拳耀我心目佛言汝將誰見阿難言我與大眾同將眼見初勘定循塵因上來阿難答見塵性未分故復問以汝何所見其意以見性者必能忘塵見塵者自然迷性也答以見拳足見循塵且言耀我心目更是流轉所謂依稀似曲纔堪聽又被風吹別調中也佛言下勘定迷見明知阿難不悟未便放捨仍復親切提持故問以汝將誰見誰字最宜珍重肘後具符者自能薦取阿難不悟見性依舊認見為眼但前云見是其眼已被佛破若唯言我者恐見呵斥故曰與眾同將所謂臨坑拉伴者阿難是矣正脈義云此上有三審試太煞叮嚀一問見不二問見何三問誰見而阿難初答能見次答見拳末答眼見如來可謂重重顯示阿難可謂頭頭錯過矣依舊遺真竟二依舊認妄佛告阿難汝今答我如來屈指為光明拳耀汝心目汝目可見以何為心當我拳耀阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心初牒答縱見徵心屈指為拳光耀心目是前阿難答佛之語今欲就此徵心故言汝今答我等以牒之也唯目本不能見因其引眾同計暫以縱許故曰汝目可見至下盲燈二喻終顯其謬當猶對也重徵對境之識故曰以何為心當我拳耀然如來於密示科中已知阿難認取思惟為心今復重徵者以屢施破斥將謂有所移耳阿難下答以能推即是徵心所在即指前來密示七徵應徵察思曰推計盡再搜曰窮反復義路曰尋七處跟究曰逐然正當推窮尋逐之時似有心相且覺現前得力便爾誤認不知生死過患正在乎此故溫陵云塵相未除依舊認賊為子去指見性良有以也阿難依舊遺認竟二如來痛呵非心佛言咄阿難此非汝心阿難矍然避座合掌起立白佛此非我心當名何等佛告阿難此是前塵虗妄相想惑汝真性由汝無始至於今生認賊為子失汝元常故受輪轉初振喝直斥咄振威痛喝也臨濟一喝具四義一如金剛王寶劒今則斬除妄本即金剛劒也二如踞地師子今則驚散狐疑即師子吼也三如探竿影草今則試聞遮解試探聞性遮障解路即探竿影草也四不作一喝用今則隨心薦取即不作一喝用也座有知音自應吐舌而又呼名示以非心者因其耳尚未聾帶累世尊墮老婆禪也阿難下驚索名目矍然者驚愕貌正脈云經久自恃唯知有此一旦奪之無有不驚者矣避離也離座者恐懼不安之貌無可如何唯有待教故合掌起立合掌者待教之意起立者白佛之儀白佛者反以質索索以此非我心當名何等者以阿難雖聞非心猶未悟妄無所稱謂恐落斷滅故佛告下指以妄名前塵色聲等性境也虗妄相法塵獨影境也想有二釋一通指六識以前五識對性境起第六識對獨影境起故合云前塵及虗妄相上之想同為妄本破則俱破二唯指第六以第六意識是前塵落謝虗妄影相上所起之想正顯境且至虗意識豈實有哉一向遺真皆由認此故云惑汝真性由汝下出其過患亦是釋上惑真之義如來意謂我言惑汝真性者由汝於無始來至於今生以妄作真猶如認賊為子其禍患可勝言哉然如來以賊喻妄心者以能損法財滅功德故以子喻真心者以能持性德續佛果故既唯認妄必至遺真故云失汝元常元常者即真心對彼妄心無常立名正脈云失元常者如人既認賊為子更不求覓真子矣受輪轉者元常之心既失無常之心益熾起惑造業六道往復如人真子既失賊子益縱必至家私蕩盡馳騁求食知此者當預為辯之不受其惑則輪轉息而元常立矣顯呵妄識非心竟三推破妄識無體上已聲正其罪此乃斬其首級族其餘黨三一阿難驚怖求示二如來示有推無三會眾知非無辯初二一歷述得力二怖無求開初二一已往由心二例知將來初阿難白佛言世尊我佛寵弟心愛佛故令我出家寵者重愛義前云我是如來最小之弟因小見寵亦常情也心愛佛故令我出家者見佛相好知非欲生故愛願得佛身厭家思修故出又出家義含供佛以現為侍者故觀下何獨句可知二例知將來我心何獨供養如來乃至徧歷恒沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心縱令謗法永退善根亦因此心初作善由心意謂我言心愛佛故令我出家是出家唯用此心出家後為侍供佛例此可知此且約已往言之若從此迴小向大我心何獨供養如來一佛或更供多佛乃至徧歷恒沙國土親承供事一切諸佛亦用此心不唯供佛或有具正知見兼大智識者亦必親承供事又不唯親承供事仍復於彼諸佛及善知識所披精進鎧發大勇猛立堅固志上求下化於諸一切難行法事周徧修行一一皆用此心設離此心則無所能為矣縱令下作惡由心縱令者必無之事而設言之也意謂我今只是不敢謗法縱令被呵生瞋從此不信佛法反生誹謗因而退失善根墮一闡提亦因此心所使是知此心功魁罪首既得力於已往知必需乎將來呵為非心詎能忘情因歷歷敘述希將有以教我矣歷述得力竟二怖無求開若此發明不是心者我乃無心同諸土木離此覺知更無所有云何如來說此非心我實驚怖兼此大眾無不疑惑惟垂大悲開示未悟初按定佛語若此者指前呵示而言如來既呵其非又斥為虗妄相想皆發明不是心義我乃下自申怖由意謂功魁罪首唯是此心已往將來勢所必用此既非是而我乃成無心之人人若無心自應同諸土木以離此覺知更無所有故云何下正述驚怖云何說非者怪如來所說不宜我實驚怖者明自己聞之失措兼此大眾者仍指小乘一類以彼唯以六識建立染淨根本乍聞非心無不疑惑末二句結請開示驚疑不安殊屬可愍故惟冀垂大悲心未悟有二一者未悟此識何故不得名心二者未悟離此何得不同土木為釋自怖及決眾疑故求佛開示至下安慰示有正開示不同土木驚怖釋焉對塵推無正開示不得名心疑惑決矣阿難驚怖求示竟二如來示有推無二一安慰示有二就塵推無初二一摩頂引說惟心二況顯真心有體初爾時世尊開示阿難及諸大眾欲令心入無生法忍於師子座摩阿難頂而告之言如來常說諸法所生唯心所現一切因果世界微塵因心成體初經家敘意開示阿難者以驚怖故及諸大眾者以疑惑故欲令句原佛開示本意言阿難等向以識心分別妄見生滅今開示無體令其離於分別則入無生忍矣華嚴云無生忍者不見有少法生仁王云一切法空得無生忍又忍者信也謂深信諸法無生義故於師下摩頂為說師子座者製座像師或不必像但以師名座表說法無畏義故以其驚怖故摩頂相告示安慰意也三界唯心萬法惟識是佛教之大宗故云常說灌頂云諸法者略唯色心二種所生者所以得生也所以得生不離藏識故曰惟心所現楞伽云心亦是唯心非心亦心起解深密云諸識所緣唯心所現下文亦云色心諸緣及心所使諸所緣法唯心所現足證常說一切下據說以斷謂據常所說斷定因心成體義故一切因果約正報言有二釋一聖凡各有因果二從劣向勝前因後果世界微塵約依報言亦因果義以聚塵為因成界為果如是皆依藏識所現意顯心必不無至下自見故曰因心成體摩頂引說惟心竟二況顯真心有體阿難若諸世界一切所有其中乃至草葉縷結詰其根元咸有體性縱令虗空亦有名貌何況清淨妙淨明心性一切心而自無體初舉諸有體若諸者統舉現前諸法於中有總有別總惟世界別則一切所有其中者一切所有之中兼顯微該巨細言乃至者超略之詞言顯者巨者固自有體乃至最微最細如草之一葉縷之一結若詰其根本元始咸有體性可據如葉以草為體結以縷為性故然此猶屬有色有礙縱令無色之虗無礙之空亦有狀之可名相之可貌以虗空即名蒼翠即貌故何況下況顯真心此中清淨即指下帶妄所示之見以性本無染故妙淨即指下剖妄所出之真以離染獨妙故清淨故在纏不昏妙淨故出障圓明故總號明心性徧四科七大而為如來藏體故又名性一切心統為一真心也如此之心豈當無體取例況顯令易發明言葉結尚有體性虗空且具名貌如何比況反說真心而自無體葢深怪阿難不應作是說故安慰示有竟二就塵推無三一據理應有全性二就塵驗其虗偽三教以微細推審初若汝執恡分別覺觀所了知性必為心者此心即應離諸一切色香味觸諸塵事業別有全性初按定所執執謂堅執舊見恡謂慳恡不捨分別覺觀等正所執所恡之心分別者對境起念覺觀者內守幽閑至下驗偽中自見灌頂云粗心初念名覺細心後念名觀所了知性者謂正當分別覺觀時所有能了知性也然此性全是識心正屬妄本而阿難堅執不捨認為是心如來將欲施破故先按定如文中曰若曰必皆按定意此心下就執以難即應者據理論謂上已況顯故色香味觸略舉四塵餘有聲法二塵總以諸塵該之事業者世間所作初營曰事既辦為業言世間所作事業皆依塵成能所合論故云諸塵事業對此分別覺觀方顯所了知性須臾有離了知便虧豈能別有全性乃故意為難二就塵驗其虗偽如汝今者承聽我法此則因聲而有分別縱滅一切見聞覺知內守幽閒猶為法塵分別影事如汝句指在現前謂欲顯虗偽指現前為驗故承聽我法因聲有別例知瞻仰我相因色有別齅我爐烟因香有別等超略言之故曰縱滅等也見聞眼耳二識鼻舌身三通名為覺以同是合中知故知即意識此復有二一明了識與前五識俱時而起亦名五俱意緣境明了親得法之自體故以為名二獨頭識此復有三一散位獨頭緣獨影境二夢中獨頭緣夢中境三定中獨頭緣定中境今云滅者約定中言以定中眼不觀色耳不聽聲等亦無散心及與夢想則前五識與五俱意及散夢獨頭一切皆悉不行然縱能如此亦非真滅以猶有定中獨頭守定中境故曰內守幽閑葢內守之心即是定中獨頭幽深閑靜即是定中之境定中之境雖微細不離法塵定中獨頭即綿密亦屬分別不唯分別且屬影事以離於法塵即無體性故三教以微細推審我非勅汝執為非心但汝於心微細揣摩若離前塵有分別性即真汝心若分別性離塵無體斯則前塵分別影事勅強命也如來意謂汝前執為是心我雖重重破奪亦非強命於汝令汝轉執此為非心但不可錯認汝自於心微細揣摩設若離塵有性即真汝心以真心必有體故若如我上來所說離塵無體斯則依附前塵所起分別乃屬虗妄影事豈真心哉如來示有推無竟三會眾知非無辯塵非常住若變滅時此心則同龜毛兔角則汝法身同於斷滅其誰修證無生法忍即時阿難與諸大眾默然自失初出過顯非承上既屬影事又惟依附前塵執為是心則有二過一者塵是緣生非常住法設若緣盡變滅時此心無所依附則同龜毛兔角化為烏有此有名無體過也二者心即法身屬於性具依之修習證無生忍屬於修得心既無體則法身同於斷滅法忍憑誰修證此性修俱失過也即時下知已無辯即時者如來教以推審時也微細揣摩已知無體又聞成過情盡詞窮阿難既爾法會亦然故云與諸大眾既不知何者為真又不敢依舊認妄唯有默然自覺兩失觸藩之羊可為譬也總結備破三迷竟三結斥誤認佛告阿難世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實是故汝今雖得多聞不成聖果初結斥大眾世間學人前三果也三界未出故稱世間四果未證故稱學人現前者從是進修成次第定第四果也以前八四禪四空凡位所成後一滅盡定也若但滅六識名無心定兼滅七識名滅盡定又偏厭受想亦名滅受想定聖位所成故若論四果於小乘法中已為漏盡即是羅漢今云雖成不得等者以向屬權許理實未得皆由執此等乃出其未得之故妄想即指六識以是生死根本故稱生死妄想誤為真實者不了識空正由不了識空雖成滅盡不過如石壓草似繩縛賊縱能度百千劫終有壞時然滅定既非真實所謂漏盡羅漢者豈真實哉是故下結斥阿難是故者承上羅漢非真言之言羅漢深修滅定漏盡尚屬權許阿難唯事多聞聖果豈是實證故斥以雖得不成問正脈釋九定云前八凡位所成第九無漏聖位所成今云不得漏盡成羅漢者當知彼所謂無漏聖位者乃一時權許耳今疏亦云向屬權許理實未得與交師為同為異答語雖似同意實有異葢正脈以五住究竟方為漏盡故深許長水以十地為漏盡無可疑也殊不知若以五住究盡為漏盡者唯佛一人可當此名故十號中第二名阿羅訶而訶字即漢字之變音至等覺猶存生相尚非漏盡況十地乎今之所釋但以妄心不除斷總非真若能達妄識本空則一斷永斷滅盡正當四果多聞堪入聖流所謂但去其病不毀其身此則與交師異耳通結大科斥破所執妄心以開奢摩他路竟二顯示所遺真性令見如來藏體正脈云上科即是妄本已破而不用矣此科即是真本正修必用佛云眾生遺此本明故科名承用遺字然而現具六根之中遍為一切法體故此科始從眼根開顯以至四科七大也三一阿難捨妄求真二如來極顯真體三會眾同信空藏初二一悲感悔責二知過請求初阿難聞已重復悲淚五體投地長跪合掌而白佛言自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代失我本心雖身出家心不入道譬如窮子捨父逃逝初悲前迷妄阿難聞已者聞如來備破三迷已竟也中有所感不覺悲泣流淚對前淫室歸來頂禮悲泣故云重復正脈云凡深悟者而後發悲或悟妄而悲久苦或悟真而悲久失今是悟妄之悲五體投地者有所進求應再拜故長跪者兩膝齊跽合掌者一心歸命而白佛言者備述迷遺此上皆進求之儀耳自我二句從初敘起顯打頭即錯也佛之威德能遮魔障佛之神力能資果證己向蒙佛慈愛故自以為恃常自思惟者思惟有佛無勞我修者加被即是殊不知思惟即是妄想不修終無實證此正阿難迷妄為妄所轉也將謂下悔現遺真言當其思惟之時將謂如來慈惠施我三昧自然道成何勞自修為哉此自追昔誤也不知二字反上將謂二字言將謂如彼不知竟不能也身心句正明其不能之義言佛與阿難雖屬天倫身心各異身異故食不互飽心異故智不互明至於修因證果豈能相代此語亦今日方能言之失我本心有二釋一者身心不相代失我望佛慈惠之本心此義於上似順以上有將謂惠我之意故二者三昧不能得失我寂常妙明之本心此義於下似合以下有寂常妙明之請故若按下捨父逃逝之喻後義為正雖身下責當受輪葢以失本心故蓄聞成過有剃髮染衣之相無修因證果之實故曰身雖出家心不入道不入道故依舊輪轉故向下以喻明之窮子即阿難自喻失三昧福乏功德財故以窮喻幸唯佛性不斷可以子稱捨父即喻失心逃逝即喻背道以背道不入枉受輪轉如彼逃逝他國馳騁四方者無以異故然阿難以如來為兄且又依之出家彼此身心尚不相代故正脈云觀此則不知修行而但求加被者可以知警矣悲感悔責竟二知過請求今日乃知雖有多聞若不修行與不聞等如人說食終不能飽世尊我等今者二障所纏良由不知寂常心性唯願如來哀愍窮露發妙明心開我道眼初知聞無功今日乃知者因誤墮始知也言阿難已向恃佛專事多聞將謂佛所說法聞而能說即是及乎登伽事起乃知說丈不及行尺少修勝似多聞故云雖有多聞不修與不聞等阿難身受其誤作如是說尚恐好聞一類未便革習故次下仍以喻明言如來法味聞而能說宛似說食不修無功聖果失望何異不飽蓮師彌陀疏云話餅何益饑腸亦是此意夫阿難以多聞得名且歷劫憶持妙嚴尚曰若不修行與不聞等故正脈云觀此則徒恃學問而不務實修者亦可以知警矣世尊下知障由迷我等者自指同等一類即就現前地位言之故曰今者二障者唯識論云一煩惱障謂執徧計所執實我薩迦耶見即身見也而為上首百二十八根本煩惱及彼等流諸隨煩惱此皆擾惱有情身心能障涅槃名煩惱障二所知障謂執徧計所執實法薩迦耶見而為上首見疑無明愛恚慢等覆所知境無顛倒性能障菩提名所知障又煩惱障亦名事障續諸生死所知障亦名理障礙正知見圓覺云先除事障未斷理障但能悟入二乘境界若事理障已永斷滅則入如來大圓覺海又煩惱即界內見思見謂分別起者思乃任運起者所知即界外塵沙無明塵沙謂於外境不達唯心遇事生執無明謂於所修證不達性空隨分起愛又煩惱障即是我執依我執起能障我空理故所知障即是法執依法執起能障法空理故此時阿難方證初果所知固是俱在煩惱亦未全離況不了識空斷非真斷故如來斥以不成聖果而自己謂為二障所纏然障不自起纏非無因故次下出其所由良猶誠也寂常心性是其意中所求葢自覺妄識搖動生滅無常想應別有寂常心性誠由不知此性方乃認彼妄識執我執法無由解脫所謂二障所纏是也唯願下請求開發其意以二障所纏無由解脫乏功德財離涅槃舍故曰窮曰露窮則修證無資故求哀露則輪轉無依故求愍也發謂啟發妙明心者二死不能繫二障不能昏故必求發此者以不得此心妄識難捨奢摩無路可修菩提涅槃無緣可證故問上迷寂常此發妙明何緣迷發不相應耶答在迷屬本覺既發成始覺本覺惟寂惟常始覺便妙便明前後異稱其實唯一心耳開謂開通道眼者見道之眼即是始覺仍前妙明心也妙明雖發前途尚遙稍有絲毫凝滯便是道眼未通故此求開葢為由始覺而至究竟覺故阿難捨妄求真竟二如來極顯真體二一現相密顯二發言顯發初二一正為現相二教以親領初即時如來從胸卍字湧出寶光其光晃昱有百千色十方微塵普佛世界一時周徧徧灌十方所有寶剎諸如來頂旋至阿難及諸大眾初密顯全體俱現如來胸前有紋十字右旋名萬德吉祥相謂有此相者必具萬德為吉祥人故因翻為萬但翻音不翻字以字是佛相翻則失其相故前從面門放光表六根各局之性此從胸前湧出表藏性渾然之體恒沙性德悉皆具足故又以卍字表之其光下密顯大用全彰言其體既現其用自顯故以其光晃昱表之晃昱者明耀義也百千色者表用隨緣變之義用隨緣變法法全彰故又以塵界周徧表之徧灌下密顯上合下同寶剎者名譯集云剎摩正音掣多羅此翻土田謂一佛化境也是則仍指塵界但從佛尊稱名為寶剎灌注也徧灌佛頂者表此用一現上合佛界所謂與諸如來同一慈力是也旋者迴注義至阿難及大眾者表此用一現不唯上合佛界亦且下同眾生所謂與諸眾生同一悲仰是也據此則藏性全體圓通勝用皆於一光處現矣正為現相竟二教以親領告阿難言吾今為汝建大法幢亦令十方一切眾生獲妙微密性淨明心得清淨眼此科義有兩向一指前令其現領二許後教以預知科依初義應先明之既已現相又復告言者恐密顯不薦仍用顯教故藏性全體圓通勝用即是大法藏性顯而妄識摧圓通立而邪行滅故喻如幢以幢有顯立摧滅義故卍字流光正為顯此體用故云建也法幢既建流光則已必令十方塵界一時周徧者應另有所表故云亦令十方眾生云云獲得也妙等七字即前所求心性始本異稱迷悟同體曰妙此心性合讚也微密性淨明心乃各別立名性即本覺無動搖生滅之相故稱微密即前寂常義也心即始覺有內瑩外照之功故稱淨明即前妙明義也依此心性起於觀照觀智現前明見心性為清淨眼即前道眼義也是則阿難所求一光俱應恐猶未明此復明明告示令其親領若作許後釋者義通奢摩盡處及三摩禪那之文如吾今為汝等許示奢摩他體以建大法幢即該三如來藏之全體大用亦令十方等許示奢摩他路以微密淨明即該近具根中遠通萬法之妙真如性得清淨眼者許示三摩禪那以三摩中從根入圓禪那中中中流入皆清淨眼也佛音圓妙或領前或佇後一點水墨兩處成龍信有之矣現相密顯竟二發言顯發三一就根性以指真心二會四科而歸藏性三融七大以拂情計初就根指心者以此經最殊勝處全在破識心而不用取根性為因心良以用識用根乃權實兩教之所由分如云以生滅為因心如蒸沙作飯以不生滅為因心如依金作器今阿難欲求無上菩提故先就根指出令其取為因心則果地圓成可希冀矣二一帶妄顯真二剖妄出真初良以根中之性其體即是阿賴耶識真妄和合非純真者因阿難急欲捨妄求真其如眾生位中別無純真之心可指若先言有妄恐其不敢認取姑且帶之但唯顯其是真而已十一顯見是心二顯見不動三顯見不滅四顯見不失五顯見無還六顯見不雜七顯見無礙八顯見不分九顯見超情十顯見離見初六根中性雖同一精明而就眾生位中最便於領略者無踰眼中見性故唯從此顯發餘可例知三一取例引發二正與辯見三結顯是心初欲辯見乃是心無由發端故取拳例見引起正辯義也二一徵定拳見二取例問答初阿難汝先答我見光明拳此拳光明因何所有云何成拳汝將誰見阿難言由佛全體閻浮檀金赩如寶山清淨所生故有光明我實眼觀五輪指端屈握示人故有拳相初雙徵拳見汝先答我等者是前直呵非心中語此以阿難見相不悟故重理前話而勘問之見光明拳正是見性家用明知阿難不諭必至循塵流轉故問以光因何有云何成拳所謂也須驗過也汝將誰見者以正當見拳之時真妄二心同時俱現若但如鏡中無別分析則是真心若推窮尋逐光因何有拳云何成即是妄心故重為此問欲其真妄分明一無所混耳阿難下各答其由閻浮檀樹名也須彌山南有此樹果汁入水沙石成金此金最勝故古德義翻勝金由佛全體同此故赩如寶山赩赤𦦨也以金體而具赤𦦨如十寶山故多劫熏修非欲愛致故云清淨所生正由清淨所生故得全體同金而有光明全體既爾手拳可知此答光因何有之問我實眼觀者不知見乃是心謬計為眼此答汝將誰見之問輪指屈握故有拳相廼答云何成拳之問不依問次答者隨語便故二取例問答佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟阿難譬如我拳若無我手不成我拳若無汝眼不成汝見以汝眼根例我拳理其義均不阿難言唯然世尊既無我眼不成我見以我眼根例如來拳事義相類初許以說喻如上徵拳問見無非指示因其不能薦取故許以實言謂據實而言不同上文猶帶密意說故諸眾也有智即指中根以上智無多不言諸故要以等者謂出廐良駒已搖鞭影沈水俊鯉須設香鈎如法華譬喻品初亦云諸有智者以譬喻得解則有智指中根明矣阿難下取例問均無手無拳無眼無見迷觀似同悟見實異今如來以見例拳用手譬眼問以其義均不者正勘其為迷為悟耳此中眼根應是眼所成見拳理應是手所成拳能例所例各有不足應善會之可也阿難下答以相類見不屬眼之理究竟不悟故曰既無我眼不成我見正以究竟不悟故曰以眼例拳事義相類佛意亦為問出此語引發下文辯見之義取例引發竟二正與辯見二一辨無眼有見二辯無明有見初佛告阿難汝言相類是義不然何以故如無手人拳畢竟滅彼無眼者非見全無所以者何汝試於途詢問盲人汝何所見彼諸盲人必來答汝我今眼前唯見黑暗更無他矚以是義觀前塵自暗見何虧損初斥其所答不類答類故斥以不然何以下徵辯不類正脈云手外無拳故手無拳滅眼見各體故眼滅見存非全無者見體無虧唯見明之用根闕不現也所以下教以事驗將令取事驗證故重徵所以試即驗義必令於途者眾所同聽乃可憑信故特教詢問盲人者以無眼有見非盲人無以證也汝何所見句乃示以詢問之法猶云你問他何所見也彼必答汝等是諒其所答不出此故唯見黑暗者見暗之用故在更無他矚者見明之用暫隱所謂非見全無者信矣以是下結顯有見意謂以是盲人矚暗之義觀之葢由根缺障明而前塵自暗既依然矚暗而見何虧損理既如是誰不憑信所以汝言相類我謂不然者此也噫夫眾生聚見於眼迷性為根但謂眼見不知性明所謂終日行而不自覺今以此喻顯彼見性判然有離眼之體全不係根而為有無曉了此者豈唯根具根缺此性了不相關乃至捨身受身亦湛然不動下之所顯不動不滅不失等義亦即於此可見辯無眼有見竟二辯無明有見阿難言諸盲眼前唯覩黑暗云何成見佛告阿難諸盲無眼唯觀黑暗與有眼人處於暗室二黑有別為無有別如是世尊此闇中人與彼羣盲二黑校量曾無有異初不許暗見阿難意以見明為見人所共許覩暗成見世間相違故諍以唯覩黑暗云何成見葢不許無明有見也佛告下取例令審無眼見黑有眼處暗約見似異根有具缺故論境實同均稱黑暗故問以有別無別者令其自審即有眼見暗成見知無眼見暗亦成見也如是下答以無異校量者比校量度無異者總是暗塵然阿難既答二暗無異自覺二見是同故如來不復更結設結之者應云以是義觀無明有見噫夫眾生自結見為根以來一向迷己為物見不超色聽不出聲不唯無眼謂其無見而無明亦謂無見今以二黑校量顯彼見性歷然有離塵之體全不係塵而為有無曉了此者豈唯明去暗來此見一無所礙乃至神入重泉識沈幽冥亦全不相妨古德所謂不是上天堂定將下地獄者亦唯此可恃耳正與辨見竟三結顯是心阿難若無眼人全見前黑忽得眼光還於前塵見種種色名眼見者彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見若燈見者燈能有見自不名燈又則燈觀何關汝事是故當知燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼初恐辯牒防恐辨云見暗之見或不係眼若謂見明定屬眼根如無眼全黑得眼見色既因眼見色非眼見而何故為此防若無眼人全見前黑乃至見種種色句全是牒其致辨之詞名眼見者句乃是按定所立之宗欲破其宗特用異喻反難故曰彼暗中人云云意以無眼得眼而後見既名眼見無燈得燈而後見應名燈見葢燈不名見人所共知眼不名見人所共迷故用燈反難令自知眼見之謬若燈下展轉成謬言設許燈見則有二謬一有見自不名燈為轉燈成眼謬二燈觀何關汝事為轉見成他謬既展轉成謬則燈不名見明矣眼不名見例此可知是故下正為結顯是故當知者謂以是展轉成謬之故應當了知自有正義可申所謂燈能顯色是眼見非燈見例知眼能顯色是心見非眼見然如來如是顯發可謂婆心太煞聞者極宜深省試徧觀外教經書及問諸明人達士凡未親佛教者誰不曰見屬於眼今乃顯其是心且明其為逈脫根塵靈光獨耀盡古今之迷根啟凡聖之性源劈破天荒之論唯吾佛有之耳顯見是心竟二顯見不動三一未悟更希進示二如來借昔顯今三普責知而故違初阿難雖復得聞是言與諸大眾口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨正脈云是言者是心非眼之言默然者此中亦有微解仍具三重一者已向但知有眼有見無眼便謂無見今驗盲人覩暗始知無眼有見二者已向但知見明成見見暗不得成見今例有眼暗同始知見暗成見三者已向但知見唯是眼不名為心今聞眼但顯色始知見乃是心默然中反復研味此意耳心未開悟者未大開悟意謂我前原以妄識動搖生滅粗浮昏暗別求寂常妙明之心今雖知見性是心不知此心還具寂常妙明等義與否所謂似悟非真悟也冀猶望也如來凡有音聲無非與樂故以慈稱宣示者宣演指示冀因之而得樂故合掌者收攝散動清心者專注一境如來凡有訓誨總為拔苦故置悲言佇者翹首以待冀依之而離苦故又音但言慈誨但言悲者以與樂必能拔苦離苦自然得樂相因不離互影說故二如來借昔顯今謂借昔客塵顯今身境動搖借昔主空顯今見性不動也二一辨定昔悟二啟發今迷初三一如來詢究原悟二陳那詳辯客塵三如來印許其說初爾時世尊舒兜羅綿網相光手開五輪指誨勅阿難及諸大眾我初成道於鹿園中為阿若多五比丘等及汝四眾言一切眾生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟今成聖果初引見現前兜羅輪指於前已釋手稱網相光者以如來兩手指間皆有縵網相連之相兼有光明即三十二相中指間縵網相也無端舒開者將欲顯見不動引令現前之意言當時阿難大眾正爾合掌清心翹首佇望而如來舒手開指一眾同見各有能見之性湛然分明設能於此直下承當則無勞費詞矣誨勅下述昔所說誨勅二字義攝不動科盡謂誨以見性不動勅令勿更錯認也我初成道句指昔說時謂三七日後猶是初成時故於鹿園中者指昔說處此處在波羅柰境上古國王曾養鹿於此相沿立名為阿若多等指昔聽眾五比丘者一阿若多此云最初解或云已知謂如來初轉四諦法輪尊者最初稱解自言我已知故二十力迦葉十力華梵未定迦葉此云龜氏此是母族二人三頞此云馬勝四䟦提此云小賢五拘力華言未詳即摩訶男斛飯王長子也此是父族三人如來初出家時淨飯王命五人伴修後以不耐苦行自奔鹿園各修異道佛初成道演大華嚴雖稱本懷不契時機欲開方便之門乃思誰應先度悲二仙而已逝喜五人而猶在三七日後就彼園中轉四諦法輪令五人得度今之所述即其事也等該八萬諸天四眾指僧俗弟子彼時僧俗弟子即今現前四眾對今述昔故云及汝四眾云云眾生言富總該凡外及諸學人故云一切菩提大乘果羅漢小乘果也客塵煩惱即見思二惑見惑分別行相不停如客思惑任運行相微細如塵此是三乘通惑大小共斷如不斷此小果尚不能成況復大果故云皆由此誤此如來於四諦法中略述集諦語耳汝等下正問悟由當時者當彼鹿園說是時也本以佛說客塵煩惱開悟證果乃故問因何等者佛意欲令詳敘客塵主空用例現前身境見性動不動之義耳此中今字欠妥或是得字以五人一時證果非今成故再詳如來詢究原悟竟二陳那詳辨客塵二一總答悟由二別明二義初時憍陳那起立白佛我今長老於大眾中獨得解名因悟客塵二字成果憍陳那亦云憍陳如亦云拘鄰如即阿若多之姓也此云火器以先世事火命族起立白佛者承佛下問擬將有對故我今長老者語帶自負之意意謂設言別事則某不敢對今問鹿園之事則我今為長老矣以我當時最初稱解於彼大眾之中獨得以解為名法性長老聊可自信佛既有問敢不實答然我當時即因悟得客塵二字得成聖果據此則陳那於四諦法中從集諦入也二別明二義二一先明客義二次明塵義初世尊譬如行客投寄旅亭或宿或食食宿事畢俶裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義初即喻觀惑當時陳那聞說客塵煩惱不知煩惱何以名客故即以客字觀之已知客是比語故云譬如名利所牽離鄉在外曰行客喻境牽心生背真逐妄名見惑也見惑分別對境橫生如彼投寄旅亭旅亭者途旅亭舍即行客食宿處也見惑緣境久暫無定如彼或宿或食以宿喻長時分別食喻少時分別故食宿事畢者食則既飽宿則既翌喻或久或暫分別一定也俶裝前途者整頓行李預備他往喻印定舊境轉思新境也遑猶暇也新境既現分別從起如彼不遑安住攸猶所往猶去也若實主人自無攸往者謂果是旅亭主人自無所去喻偏真法性在小乘中即許其為常住不滅性故如是下思惟開悟如是思惟者既觀察已即以如是客義思惟所言客煩惱者葢以見惑不住名客法性常住名主是我當時開悟以不住者名為客義二次明塵義又如新霽清暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義初即喻觀惑已知客義復不知煩惱何以名塵故又以塵字觀之亦知塵是比語故云又如雨後初晴曰新霽喻見惑已斷初入見道位也清暘者日從雲中初出喻見道之智乍離分別見也乍離分別顯現於見道心中故以升天喻之初入見道其智眇劣於法性理亦惟少分相應故以光入隙中喻之隙謂門窗縫間空處少分法性義同於此由有少分相應乃覺思惑任運故以發明空中諸有塵相喻之空中塵相微細難見云何發明葢以塵質搖動虗空寂然相形易見其意乃以塵質搖動喻思惑任運虗空寂然喻法性不動也如是下思惟開悟如是思惟者既觀察已即以如是塵義思惟所言塵煩惱者葢以法性澄寂名空思惑搖動名塵是我當時開悟以搖動者名為塵義然陳那既悟客塵主空必能捨客塵而取主空斷見思而證法性今之身境見性動寂亦然若果能觸類旁通即客塵而悟身境動搖即主空而悟見性寂然始知如來詢究原悟不是等閒說話耳陳那詳辨客塵竟三如來印許其說佛言如是此但印其所說客塵主空動靜分明堪以啟發現悟非印其當日所證也辨定昔悟竟二啟發今迷二一約外境啟發二約內身啟發初三一例示客主二啟發開悟三一言印定初即時如來於大眾中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌眾中開合既已印定昔說就此啟發現會故云即時如來觀彼大眾望其觸類旁通故例彼所說先約外境見性以示客主義也如來輪指以阿難觀之則為外境屈開反復正顯外境不住義故問以何見者為是見境為是見性耶答以見掌等只是見境不復見性也掌稱百寶輪者如來掌中有千輻輪相可尊可貴擬百寶故然如來於詢究原悟之前舒手開指大眾俱見至此屈已復開開已又屈大眾又俱見是則始終無異者見也屈開無定者境也宛爾主客宜應類悟乃竟只是見境不復見性所謂絲毫假飾不得者唯此事耳二啟發開悟佛告阿難汝見我手眾中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手眾中開合我見如來手自開合非我見性有開有合佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住初啟悟開合佛告阿難者因其不悟仍欲向親切處提持也問以手有開合見有開合者提醒阿難類會客主義故答以手自開合非見開合者因如來提醒始覺現前境性宛同昔日客主故其詞不謬佛言下啟悟動靜阿難答處依稀如來未便儱侗故復問其誰動誰靜要知動靜二字較前開合無開合更深一層言開合者暫時動猶有不動之時無開合者暫時靜猶有不靜之時今問誰動誰靜者令知誰為永動誰為永靜也答以佛手不住者不惟目前開合名為不住即當未開合前既開合後亦始終不住以本是不住法故答以見性尚無等者上說無有開合乃對動言靜其實見性從本以來無有動時對誰說靜故云尚無有靜靜相尚無況復說動亦不可得故曰誰為無住無住即動也是則動靜二相逈無所有乃真不動曉了此者則楞嚴大定常住妙果不患其不得矣三一言印定佛言如是談理入微見處自真故印言如是正脈云當知此中但舉佛手為一切外境之例既知佛手開合與見性無干則凡一切萬象及諸世界任其紛亂動止皆與見性無干矣若人於萬象中忽然覰見此不動之性常恒不昧何至為境所奪妙之至也約外境啟悟竟二約內身啟悟外境與性尚疎動靜易見內身與性最親動靜難分故此復約內身啟悟三一例示塵空二啟發開悟三一言印定初如來於是從輪掌中飛一寶光在阿難右即時阿難迴首右盻又放一光在阿難左阿難又則迴首左盻阿難已悟外境同客見性同主正當舉一三反之時故如來即於是時例彼所說次約內身見性而示塵空義也飛光左右者為欲引頭令動乃因之以辨見性耳頭在阿難即為內身迴首左右者光引頭動宛同空裏之塵左盻右盻者頭動見靜宛同塵外之空但此義人所難知其猶雲駛舟行宛似月移岸動究竟月岸本無移動只可以意會不可以見分今頭動見靜亦然唯有慧心者乃可神契二啟發開悟佛告阿難汝頭今日何因搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動阿難汝盻佛光左右動頭為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動初啟悟頭動明知頭因光動乃故意為問者令知一向循塵因而身不自在設不循塵則內身自若矣答以見妙寶光來我左右者已知循塵也故左右觀頭自搖動者既已循塵隨觀頭自然動設欲不動亦不可得以此為例則此身從朝至暮勞碌奔波竟年無休息之日畢世絕安逸之時總為循塵更無他故此自悟頭隨境轉宛同空裏之塵也阿難下啟悟見靜以阿難雖悟頭隨境轉未說見性無干恐墮似是終非真領故復問其為汝頭自動耶為復兼見亦動答以頭自動搖而我見性尚無有止等者自字與上不同上是自然義此是揀他義言一向迷見為眼只說頭搖眼轉并見亦動今則不然明其頭為自動與彼見性了不相關以此為例則此身千里萬里乃至死此生彼亦唯自動逈然與見性無關此悟頭動見靜宛同塵外之空也又自者由來義言我頭自動者不唯顧盻佛光名之為動即在未顧盻前既顧盻後亦無不動以由來便是動轉法故而我見性尚無有止者止即是靜對動而言言此見性不唯於未顧盻前既顧盻後名之為靜即正顧盻時亦無有動以由來元自無有動故對誰說靜故云尚無有止止相尚無況復動搖益不可說故云誰為搖動此亦深一層義也三一言印定佛言如是如是者印其所說身見塵空動靜酷似將必捨動搖之身而取不動之見矣正脈云若人悟此恒常不隨身轉則日用動用中行住坐臥皆在自性定中其與閉目想空自墮法塵之影者天淵懸絕誌公云無相光中常自在即斯義也如來借昔顯今竟三普責知而故違二一料其必知取捨二責以故相違背初於是如來普告大眾若復眾生以搖動者名之為塵以不住者名之為客汝觀阿難頭自動搖見無所動又汝觀我手自開合見無舒卷初料其悟昔於是普告者因陳那已悟客塵阿難俱識動靜欲令大眾同悟同識與彼二士把手共行也若復眾生等者雖泛言眾生而意指現會言陳那詳辯客塵義亦甚悉若復現前眾生聞其所說自應同彼以搖動者名塵以不住者名客此料其於昔必悟也汝觀下料其知今言於昔既悟於今自應類知汝觀阿難頭自動搖見無所動明是塵空又汝觀我手自開合見無舒卷明是客主此何所不明想已知取捨矣二責以故相違背云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事性心失真認物為己輪迴是中自取流轉初責以故違云何者怪責意意謂設若不知身境動搖之義則是徹底迷昧取捨顛倒無足怪矣云何汝今亦知以動為身同彼塵義以動為境同彼客義猶故不捨乃從始初生洎終將死一期在身境中執我我所念念生滅反將眼根中真常不動之性遺而失之明是知而故違真為顛倒行事成可怪也性心下判其失利性心失真牒上遺失真性認物為己牒上念念生滅以身境皆物於中執我我所則是認物為己耳性心失真必墮生死認物為己不出身境故曰輪迴是中是中即身境中也無邊生死浩劫往復非有魔驅鬼制豈是地設天成原其所由唯以知而故違取捨顛倒故曰自取流轉言自取者亦深警之意也顯見不動竟
