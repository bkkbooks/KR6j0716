body:
  text: 京都拈華寺賢宗後學達天通理敬述嗣法門人興宗祖旺騰清懷仁祖毓較字二觀音廣陳此菩薩獨廣陳者以正對此方機故如文殊揀選偈云堪以教阿難及末劫沈淪是也三一作禮陳白二歷述二證三結答圓通初爾時觀世音菩薩即從座起頂禮佛足而白佛言梵語阿那婆婁吉底輸此云觀世音釋有二義一觀聲救苦二觀聲反聞觀聲救苦者如法華普門品佛答無盡意云若有眾生受諸苦惱一心稱名菩薩即時觀其音聲皆得解脫是知能觀者耳根所觀者指世間稱名音聲此偏約果中利他言之觀聲反聞者如後結答圓通文云我從耳門因入流相得三摩提彼佛如來於大會中授記我為觀世音號是知世音二字通該世間音聲但於正觀之時不復循塵惟假之以反觀聞性此偏約因中自脩言之二歷述二證為對初機權分悟脩若據菩薩悟證即同修證二一述悟證二述脩證初二一遇佛教觀二依教悟證初世尊憶念我昔無數恒河沙劫於時有佛出現於世名觀世音我於彼佛發菩提心彼佛教我從聞思修入三摩地憶念者以宿命智憶念過去事也劫經無數恒沙者極言其時之遠故佛名觀世音者亦二義一果顯因德謂此佛因中亦由耳門入故二名隨機立謂佛鑒時機應從耳門入故正脈云菩提心不越三心四願一者善心即煩惱誓斷法門誓學二者悲心即眾生誓度三者直心即佛道誓成又起信論第一直心謂正念真如法故第二深心謂樂集一切諸善法故第三大悲心謂廣度一切諸眾生故然真如佛道雖性脩異旨而因該果海果徹因源亦不相違至於樂集善法雖不言斷惱而善惡勢不並立亦無妨該攝是則三心既發四願必成華嚴云不發此心所修諸行盡為魔所攝持是故凡欲脩行必先發心佛教從聞思修入三摩地者欲令速成菩提圓滿三心及四願故聞謂聞慧謂初聆密因之教相似信發思謂思慧謂相似非真展轉深思修謂修慧謂深思諦信觀行修習按本經如來破妄顯真之後阿難等雖云各各自知心徧十方其實但是相似信發唯齊聞慧以四卷初滿慈尚云於百步外聆於蚊蚋況夫阿難等豈真能諦信哉至如來圓彰三藏兼釋二種深疑阿難等雖云大悲寶王善開我心其實但是深思諦信唯齊思慧以下文喻屋求門方乃依思慧而求觀行是知如來分門以定二義驗證以釋二疑綰巾以示倫次冥授以選本根正教以觀行修習乃齊脩慧蓋觀音之在彼佛亦如阿難之在釋迦皆是教以從聞思修入三摩地然必至道場加行尅期精修解六結而越三空乃為入三摩地也二依教悟證初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅生滅既滅寂滅現前初先解麤相三結初於聞中者謂聞思既成信知耳根實有能聞之性於是初起修慧即於聞性中修也入流亡所者謂正當聞聲時不復循聲流轉惟是反觀聞性蓋對彼一向循塵出流於外名為入流入流功純觀照不昧絲竹交陳而常靜鐘鼓並聲而不擾故曰亡所謂亡其所緣聲塵第一解於動結正脈云動塵有二一者屈曲聲謂有意味聲如言語歌曲之類二者徑直聲謂無意味聲如水流風動之類其最有力能牽心者屈曲聲也先須斷此又於屈曲聲中分為世俗屈曲道理屈曲復於世俗屈曲中分為有力無力種種辨析備在彼疏愚謂修習觀行貴在致心一處且經中既云入流亡所而行人但只一味入流反照無間自然一切諸聲一時俱亡若必於中揀典何者先斷何者後斷則是妄識紛糺生滅不停尚望其聞性現前而成三昧之益乎恐礙正修不得不言智者鑒之所入既寂者謂所緣之聲既亡入流之功漸化二俱寂也然所寂尚餘靜結入寂則并靜亦亡故曰動靜二相了然不生又了字有二義一者逈義謂逈然俱無二者明義謂了然分明但不見有生二義中初義於文似順次義於理似深此當第二并靜結亦解如是漸增等謂雖動靜俱解聞性獨存但以結滯在根非圓通體故須於如是漸增如是者仍依前觀離於動靜而更觀也漸增者觀久功深漸以增明也漸以增明頓覺塵既不緣根無所偶塵既不緣所聞之動靜不生根無所偶能聞之根性亦泯故曰聞所聞盡此當第三并根結亦解前云此根初解先得人空正此分齊以塵亡根盡人無所依故按起信十惑此當麤相中後四蓋動靜即是苦相亦該計名起業以是苦因故根結即是執取以根有取境義故前云勞見發塵勞見即根結發塵即動靜今三結既解則塵不復發見不復勞矣盡聞下次解細相二結盡聞者謂既盡所聞動靜復盡能聞根也如是則六用不行唯餘一覺覺得聞盡也但既有能覺所覺亦未全離故須不住謂進觀此覺畢竟何所依故久久觀之所覺三相動靜根也既盡能覺又復誰名故曰覺所覺空此當第四并覺結亦解空覺者謂既空所覺之三復空能覺之一如是則惟有一空空諸三一也但既有能空所空亦非實盡故須極圓謂究而極之必求圓滿空性也究之又究頓悟能空所空俱不可得故曰空所空滅此當第五并空結亦解前云空性圓明成法解脫正此分齊謂覺所覺空空性始圓對上但得人空為偏空故空所空滅空性如明對上覺所覺空為昧空故既圓且明不惑於法故云成法解脫按起信十惑覺所覺空當麤相中續智二相及細相中現轉二相以初盡根時覺相顯著即續智二相觀行轉深覺相隱微即現轉二相前云知見妄發發妄不息能知見與所知見虗妄發起即現轉二相依此發起虗妄分別相續不息即續智二相今覺結既解則相續息而妄不復發發無妄而知見泯矣空所空滅當細相中業相以業相初起能所未分即空結故前云由汝無始心性狂亂一念妄動曰狂義當滅結真妄和合曰亂義當空結今空結既解是先且無復亂矣生滅下後解最細一結生滅既滅者謂空性既滅惟有滅相獨存若即以滅為真更是頂墮細障故須進觀此滅乃對生言滅故曰生滅若了對生言滅滅亦非真是生滅之滅已既滅矣如是則靈心絕待妙體孤朗寥矣不動閴爾無跡故曰寂滅現前此當第六解於滅結向去乃無結可解矣前云解脫法已俱空不生正此分齊以俱空正是滅相并此不生即寂滅故按起信十惑對生言滅當最初無明以最初無明約初起為生相約還滅為滅相故前云心性狂亂今滅結既解乃無復狂矣正脈云此中以三空六結分之者蓋三空是五卷中佛自所說長水亦知順此但未能發揮委悉至於六結乃以義推知非穿鑿也良以佛綰巾時特以詳彰結解俱有次第而說解次第但列三空似唯三重而義含六結前釋稍明今此正是解結正文豈不投前所說況細尋文理六節分明非強分也然正脈但知三空義含六結而不知六結理貫十惑今疏於前文由汝無始心性狂亂一段次第以起信十惑配之至三空文中不及詳悉會合至此釋六結乃取三空分齊一一會合詳明又段段皆以十惑及前由汝無始心性等義而逆結之是不唯顯本經前後一致抑亦見論主教主祖佛同一鼻孔出氣也述悟證竟二述修證依二勝而發三用借利生以嚴自果即脩證也二一承獲二勝二依發三用初謂承前悟證而獲二殊勝也忽然超越世出世間十方圓明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力二者下合十方一切六道眾生與諸眾生同一悲仰全體既現大用自彰故得超越世出世間正脈云超越即解脫纏縛之意愚謂即無能為礙之意言寂滅性體本自圓明但以凡夫執我為世間所礙權小執法為出世所礙由此不能超越無復圓明今以解六結越三空世出世法無能為礙故云超越而云忽然者謂寂滅正現前時即是超越世出世時無勞更用力故十方亦該諸法圓明者圓徧照明以能超越世出世故十方所有諸法無非自性光明周徧圓滿古德所謂盡大地是自己光明無一法不在光明裏者以此如是則上與諸佛同體下與眾生同根故得獲二種殊勝二種者如下所說殊勝者權小莫及此總標也下乃別列一者正由超越出世出世法不能為礙故能上合佛心所謂因該果海是也佛心稱本妙覺者以其在六結而不繫本來自妙處迷位而常明本來自覺所謂果徹因源是也與佛如來同一慈力者佛與眾生同體因眾生而起同體之慈菩薩與諸佛同體隨諸佛而現同體之用故二者乃以超越世間世間法不能為礙故能下合生心文中不言心者上合既爾可例知故與諸眾生同一悲仰者眾生與諸佛同根仰諸佛而起同根之悲菩薩與眾生同根為眾生而起同根之用故問同體之慈同體之用同根之悲同根之用可得聞乎答佛觀眾生等有佛性與我同體我既得樂亦應令眾生得樂是為同體之慈同體之用者菩薩觀佛本妙覺心與我同體佛既為眾生起慈我亦應隨諸佛起慈故文中言同一慈力眾生觀佛本是凡夫與我同根佛既離苦我如何猶在苦中是為同根之悲同根之用者菩薩觀生本妙覺心與我同根眾生既悲感仰佛我亦應代眾生悲感故文中言同一悲仰承獲二勝竟二依發三用謂依上二勝而發三妙用也三一依上合而成三十二應二依下合而成十四無畏三兼二勝而成四不思議初三一牒由標數二依數別明三結身指成初世尊由我供養觀音如來蒙彼如來授我如幻聞熏聞脩金剛三昧與佛如來同慈力故令我身成三十二應入諸圓土初由佛授觀供養亦該親近是菩薩機感授觀亦該教修是如來教應如幻者知真本有修即無修也聞熏聞脩者唯以反聞熏變執習惟以反聞修治自性無修而修也金剛三昧者執習既盡自性圓明成就正定同於金剛能壞一切一切無能壞故與佛下獲勝成用三昧既成出世法不能為礙上合佛心故能與佛同一慈力以是之故能隨諸佛具現同體之用故曰令我身成云云三十二應對機類分如下所說不唯應化娑婆亦復遍遊十方故云入諸國土二依數別明五一能應四聖二能應七天三能應十人四能應二童五能應九部初四一能應佛身二能應獨覺三能應緣覺四能應聲聞初世尊若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為說法令其解脫若諸菩薩者如前圓通諸聖各依一門修習成定故云入三摩地進修無漏者謂漸次增進修治煩惱以期無漏如云入流亡所乃至空所空滅是也勝解現圓者無漏之理勝妙解悟漸現圓滿之相如云先得人空乃至成法解脫是也為對此機故現佛身以菩薩為求佛機故而為說法者為說勝進之法令其解脫者令脫頂墮細障如云生滅既滅寂滅現前及云解脫法已俱空不生是也問觀音是菩薩豈能遽現佛身答前云上合諸佛本妙覺心與佛如來同一慈力是悟證已齊佛境豈不能現況華嚴初住即能八相成道而觀音帶果行因復何疑哉總以圓人境界不可思議勿得以常途論之二能應獨覺若諸有學寂靜妙明勝妙現圓我於彼前現獨覺身而為設法令其解脫溫陵曰獨覺者出無佛世觀物變易自覺無生故號獨覺今云諸有學者指願求獨覺一類凡未入證道者皆是也寂靜妙明似當修道法華云樂獨善寂求自然慧蓋樂獨者樂於獨處離諠求寂即此中寂義善寂者時窮物理善修靜慮即此中靜義求自然慧無師自悟即此中妙明義然修道已稱妙明證道則妙而復勝故云勝妙現圓謂證道位中殊勝妙明之慧預現圓滿之相如未雨先雲未火先烟相似現獨覺身者應其所求令信從故而為說法者說加功用行之法令入無間道故令其解脫者解脫見思煩惱更侵二習證入無學道也三能應緣覺若諸有學斷十二緣緣斷勝性勝妙現圓我於彼前現緣覺身而為說法令其解脫灌頂引華嚴音義云梵語畢勒支底劫此翻獨覺梵語鉢羅底迦此翻緣覺梵語辟支迦羅雙通二名料揀有五一前名麟角此名部行二前不值佛此則值佛三前但自悟此依教悟四前觀外境此觀內緣五前則根性明利此則根性暗鈍今云有學者指願求緣覺一類未入證道者也稟教觀緣有其二門一順觀流轉知生起因二逆觀還滅悟無生理今云斷十二緣乃約還滅門說以是發悟親因故偏言之勝性即無生理也超出世間故名勝性此性以緣斷而顯故云緣斷勝性然修道已稱勝性而證道位中不但言勝且臻於妙故云勝妙現圓謂證道位中殊勝微妙之性預現圓滿之相現身說法令脫義俱準上以二覺斷證同故四能應聲聞若諸有學得四諦空修道入滅勝性現圓我於彼前現聲聞身而為說法令其解脫四果以前三果四向皆名有學以有惑可斷有真可研故得四諦空者謂初於佛邊得聞四諦之法及空無我理也由聞四諦法故知三界苦修出世道分斷見思分證涅槃故云修道入滅勝性現圓者謂羅漢向中四果最勝滅性預現圓滿相故現聲聞身者投其所好而為說法者說勝進法令其解脫者脫見思縛及分段苦也能應四聖竟二能應七天七一能現梵王身二能現帝釋身三能現自在天四能現大自在五能現天將軍六能現四天王七能現天太子初若諸眾生欲心明悟不犯欲塵欲身清淨我於彼前現梵王身而為說法令其解脫若諸眾生指欲界眾生願生梵天者也欲雖通於三五三謂飲食睡眠婬五謂色聲香味觸而淫為上首故偏言欲心謂淫欲心也明悟者不為欲事昏迷正脈云謂深達淫欲為眾苦之本也淫欲以染污為性故名為塵永斷妻室乃為不犯蓋上句為深知此句乃痛戒耳欲身清淨者明其不犯之故乃為欲現身清淨為將來生梵因也於彼現梵身者應其所求故灌頂云具云梵摩此翻離繫謂離下地繫上升色界故或名淨行謂能行梵德欲想俱無故亦稱高淨謂高超欲界愛染不生故而云王者即色界天主也而為說法者說四禪法修證次第如後天趣中明令其解脫者解脫下界繫縛成就上升色界事故正脈云此解脫乃成就其決定捨欲生梵之事是雖捨求皆具而重在希求即同下科成就且所修背捨亦名解脫灌頂引金光明云大梵天王說出欲論令其離欲生於梵世即說法義也二能現帝釋身若諸眾生欲為天主統領諸天我於彼前現帝釋身而為說法令其成就若諸眾生指人間眾生願生忉利者也忉利梵語也此云三十三即欲界第二天也此天在須彌山頂四方各有八天中為善見天即天主所居主輔合論共為三十三天今云欲為天主者不唯願生且欲為忉利天之主故統領諸天者不惟統領忉利諸天即下之天大將軍及四天王皆其臣屬亦皆為所統也應其所求故於彼前現帝釋身帝釋略梵語也具云釋迦提桓因陀羅此云能主以能為天主故說法者說上品十善金光明云釋提桓因種種善論是也成就者依十善因成就帝釋果也三能現自在天若諸眾生欲身自在遊行十方我於彼前現自在天身而為說法令其成就自在天愚先著法華依大成謂是化樂天以此天欲受五欲樂時隨意變化得自在故孤山云是欲界頂天梵語婆舍提此云他化自在謂假他所作以成己樂即魔天也或云六欲天上別有魔王居處亦他化自在天攝今云若諸眾生即求生他化者也欲身自在者願求正報如意遊行十方者更求依報無礙正脈云六欲四洲之十方也說法成就者為說上上品十善令其成就欲界最勝他化自在報故按欲界六天此先在上前之帝釋後之四王在下中非不現例上下可知故四能現大自在若諸眾生欲身自在飛行虗空我於彼前現大自在天身而為說法令其成就大自在依法華大成謂是他化天以此天欲受五欲樂時餘天為化自在勝前故孤山曰即色頂摩醯首羅天大論云三目八臂騎白牛執白拂者是也前云遊行此云飛行者遊行或有紆曲飛行一向直捷又行十方或憑高就下行虗空唯乘雲御風二天自在勝劣自見眾生欲此即願生大自在天者也說法成就者說四禪及四無量心令成色頂最勝大自在報也按此天在色界最上前初禪梵王在色界最下中可例知亦非不現問上二天古有三釋有以欲界五六二天分配者法華文句也大成依之有以化樂他化魔王摩醯四天總攝者慈恩玄贊也長水依之有以欲頂色頂二天解釋者觀音義疏也孤山溫陵依之然文句義疏並智者說文句云大自在有人言是色界頂大自在此不應超至彼也義疏又云大自在故非第六天也前後語違究何適從答愚昔註法華依大成說心且疑之但以其承用天台未敢擅易今據灌頂辨之甚悉於天台二說準後不準前以前說或非後因知非異前說故又諸經論中多稱大自在是色頂天故正脈云統論諸天皆可該攝梵王攝四禪帝釋四王等攝六欲二自在別舉欲頂色頂二天為以別上下之分齊也但缺四空以此論現身而四空不樂身相故不為現縱別有方便利益不入此例灌頂云理實菩薩利生難以凡情測度欲色空天縱不俱列至下八部中天悉該攝矣五能現天將軍若諸眾生愛統鬼神救護國土我於彼前現天大將軍身而為說法令其成就天大將軍者正脈云四王主帥各有八將韋䭾為上首灌頂引金光明經散脂為大將二十八部巡遊世間皆散脂所管今云愛統鬼神即欲求散脂等流果也鬼神者鬼中之神肇曰神受善惡雜報現形勝人劣天身甚輕微人難見故此鬼神道也救護國土者即巡遊世間除妖孽降福祥耳說法成就者說五戒十善及秘密呪印呼召鬼神之法令其成就天將軍位隨保護國土心也六能現四天王若諸眾生愛統世界保護眾生我於彼前現四天王身而為說法令其成就四天王註見二卷灌頂云此是帝釋外臣武將住須彌腰各領二部鬼神不令惱人金光明云我等四王二十八部百千鬼神以淨天眼常觀擁護此閻浮提是故我等名護世王今云愛統世界即願為天王分統四天下也不令鬼神惱害於人即是保護眾生說法成就者說上品十善及護國安民之法令其成就四王隨統世護生願也七能現天太子若諸眾生愛生天宮驅使鬼神我於彼前現四天王國太子身而為說法令其成就若諸眾生亦指人道中者因在人道見諸鬼神作祟擾民亂國發願生於四天王宮制諸鬼神不令作祟故云愛生天宮設有違制作祟還能驅使大力鬼神而降伏之故云驅使鬼神隨其所樂而為示現故曰現四天王國太子身溫陵曰四天太子即那吒之類大吉義經云護世四王各有九十一子四王合有三百六十四子智論亦如是說灌頂云唐天寶間西番五國來宼安西元宗詔不空三藏入內持念護國仁王陀羅尼方二七徧忽見神將五百荷戈殿前對曰北方天王第二子獨徤往救安西隨後表奏因敕諸道府州西北隅置天王像永護國界是天王有子明矣說法成就者說歸戒齋善及符呪印訣之法令其成就四王太子以遂驅使鬼神願也能應七天竟三能應十人十一能現人王身二能現長者身三能現居士身四能現宰官身五能現婆羅門六能現比丘身七能現比丘尼八能現優婆塞九能現優婆夷十能現女人身初若諸眾生樂為人王我於彼前現人王身而為說法令其成就樂為人王者有德懷仁不忍世亂發願為有道之君以理國者也說法令成者為說生貴之因及帝王德業以熏隔生之種而已若彼不自忖量妄竊神器而求篡奪之術者菩薩豈應之哉溫陵曰自金輪至散粟皆為人王若依普門品惟是散粟以彼云小王故也二能現長者身若諸眾生愛生族姓世間推讓我於彼前現長者身而為說法令其成就在人道中見有位尊年高德重者為同族之所尊崇故亦愛主族姓孟子曰朝廷莫如爵鄉黨莫如齒輔世長民莫如德是知位尊年高德重者不獨為同族尊崇亦能為世間推讓謂到處推重讓以居左也正脈云西域稱長者不止年高蓋世臣大家而兼有德望者之號說法成就者說博施濟眾親親仁民之法令其成就長者以遂主族世推願也三能現居士身若諸眾生愛談名言清淨自居我於彼前現居士身而為說法令其成就名言謂古今典章欲以訓世故愛談自居謂不事功名欲以守道故清淨灌頂以立言訓世守道居貞隱居潔操通稱居士但如次分上中下耳說法成就者說韜光晦跡垂文作則等法令其成就居士以遂訓世守道等願也四能現宰官身若諸眾生愛治國土剖斷邑我於彼前現宰官身而為說法令其成就國土王都也愛治者輔君修政溫陵謂三台輔相是也邑分封也剖斷者理民折獄溫陵謂州牧縣長是也宰者剖斷義故上云剖斷邑官兼管攝義故上云愛治國土又宰亦名官剖斷即兼管攝官亦名宰管攝即兼剖斷故灌頂以上至卿相三台下至州牧百僚皆號宰官說法成就者說脩齊治平忠愛廉明等法令其成就宰官以遂致君澤民願也正脈云上三科似此方儒教所攝五能現婆羅門若諸眾生愛諸數術攝衛自居我於彼前現婆羅門身而為說法令其成就天文地理陰陽度算曰數巫醫相卜符水呪印曰術愛謂好樂精習為其可以竦世可以濟己也煉神脩丹執持生命曰攝固精養氣防護損傷曰衛自居者不事外學為其可以長壽可以固形也婆羅門此云淨裔其人自謂從梵天口生是梵天苗裔故或云梵志其人自謂承襲梵天之法志生梵天故或云淨行其種別有經書世世相承以道學為業故說法成就者為說差別智慧及煉神調氣之法令其成就數術攝衛之學也正脈云此科似此方醫卜雜技所攝問法華云十方佛土中惟有一乘法無二亦無三又云惟此一事實餘二則非真是知聲聞緣覺尚屬化城況夫諸天及人王宰官長者居士等治世訓世等法又況夫諸婆羅門種種異學菩薩何不革其舊習示以出世正道而乃順情說法反以成就其有漏之志豈慈悲心者之所為耶答有漏法中有善有惡設不能成就其善勢必流而為惡故菩薩姑且順其欲成就善果待其根器成熟然後示以出世正道所謂先以欲鈎牽後令入佛慧也下皆倣此六能現比丘身若有男子好學出家持諸戒律我於彼前現比丘身而為說法令其成就在家男子心厭塵勞故好學出家諸戒律謂沙彌十戒比丘二百五十戒也比丘此云乞士謂上乞佛法以資慧命下乞飲食以資色身故或翻除饉謂出家持戒是良福田能生物善除饑饉故說法者說出家法如稱揚持戒讚歎梵行之類成就者成就五德而為眾中尊也七能現比丘尼若有女人好學出家持諸禁戒我於彼前現比丘尼身而為說法令其成就在家既厭塵勞女人仍嫌五障故好學出家諸禁戒謂三百四十八戒餘諸八敬及式叉摩那等戒皆為禁戒方便善見律云尼女也謂女人出家受具稱比丘尼說法同上成就者捨在家法受出家法現轉五障之軀頓成五德之侶故八能現優婆塞若有男子樂持五戒我於彼前現優婆塞身而為說法令其成就欲求人天勝報故樂持五戒以五戒為人天因故五戒者殺盜婬妄酒也前四屬性罪性即是罪故飲酒是遮罪違遮成罪故又以其能遮前四故名遮罪如因酒破五戒是也古德云五戒即同五常以仁則不殺生義則不偷盜禮則不邪淫信則不妄語智則不飲酒故優婆塞亦名鄔波索迦唐翻近事男謂親近承事佛法僧故說法者說居家法如說不離塵勞而作佛事不捨妻子而修梵行之類成就者遵教受行成就歸戒而種人天因也九能現優婆夷若有女子五戒自居我於彼前現優婆夷身而為說法令其成就不惟欲求勝報兼復為脫女身故以五戒自居自居云者謂雖無師授自居然如己授也優婆夷亦云鄔波斯迦此云近事女近事同上唯男女異故說法者不惟說居家法兼復為說雖五戒自居要必師授方成近事法也成就者不惟成就近事作人天因兼復解脫女身成就丈夫相故灌頂引戒消災經云印土一男堅持五戒出外親友苦勸飲酒遠至他宿啖人鬼婦家雖破酒戒餘四戒全天神護之鬼不能啖即與鬼婦父母說佛五種戒法領同見佛除諸災障是知男女皆應持戒菩薩為之現身良有以也十能現女人身若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為說法令其成就孝敬仁慈以事上下名曰內政謂行於內而感化於外故貞靜勤儉以修女德名曰立身謂德無玷而自身可立故修治也正脈云閨門為萬化之源故關於家國之治亂家通大夫以下國通諸侯以上孤山曰女主即天子之后國夫人謂君之妻命婦謂妻因夫榮有誥命者家訓姑大家謂才德兼備為內師者如後漢扶風班彪之女曹世叔之妻和帝數詔入宮令皇后貴人師事之世稱曹大家也說法者說三從四德端風正己之法成就者內感外孚成就修治家國事故能應十人竟四能應二童二一能現童男身二能現童女身初若有眾生不壞男根我於彼前現童男身而為說法令其成就不壞男根者謂於諸欲境從未染犯所謂童真是也有志終身保守恐其未能故菩薩隨其所樂為現童男之身說法者說離欲法成就者令其守真抱撲固精保元成就童真體故二能現童女身若有處女愛樂處身不求侵暴我於彼前現童女身而為說法令其成就處女亦云處子幼女未嫁者之稱愛樂處身者願終身為處女堅貞自守如詩云之死矢靡他是也男願有室女願有家人之常情今則視迎娶為侵凌以聘嫁為暴棄深生厭患故曰不求侵暴雖曰不求恐有強施侵暴勢不自由故菩薩為之現童女身說法者說離欲法成就者令其增益堅貞矢志自守侵暴不能強施成就清淨處女身故能應二童竟五能應九部九一能現諸天身二能現諸龍身三能現藥叉身四能現乾闥婆五能現阿脩羅六能現緊那羅七能現摩呼羅八能現常人身九能現非人身初若有諸天樂出天倫我現天身而為說法令其成就此中諸天有二一上所未出者此復總收二樂出天倫者此復重應謂上應求入此應求出雖同現天身而說法成就異故灌頂云說法者為說無常苦空等法正脈云成就者令其成就脫離願也問脫離天倫成就何報答此有二義一者諸天著樂不得聞法願生人間者令其成就人倫以六道之中整心慮趣菩提惟人道為能故二者五衰相現厭離有漏願求無漏者令其成就聖倫以分段生死雖天上不免惟入聖乃出故龍等諸部例此可知二能現諸龍身若有諸龍樂出龍倫我現龍身而為說法令其成就灌頂云梵語那伽此云龍有四一守天宮殿二興雲降雨三開瀆決江四守護伏藏類復有異故云諸也僧祇律明龍有五苦謂生眠婬瞋死五時不免蛇形復有三苦謂雖食百味最初一口化為蝦蟇二背布鱗道砂石雨時痛乃連心三蜈蚣食腦細蠱鑽身長阿含經亦明龍有三患一熱砂炙身二風壞宮衣三金翅鳥啖因有多苦故樂出倫罵意經云墮龍有四因緣一布施二瞋恚三輕人四自高阿含云先多瞋恚心曲不端犯戒鬬諍故墮龍中由大行布施福力故七寶為殿據此則說法者說施戒仁慈正直和敬等法成就者成就人倫若能不住於相修施戒等則聖倫亦可成就三能現藥叉身若有藥叉樂度本倫我於彼前現藥叉身而為說法令其成就灌頂云藥叉此云捷疾其行捷疾故亦名夜叉此云勇徤勇猛強徤故或翻暴惡其形暴惡故有地行空行飛行不同最勝王經云是等藥叉悉皆愛樂如來正法深心護持今云樂度本倫者亦由佛法熏習知暴惡為墮緣深厭之也度亦同出皆超脫義說法者說柔順慈善持戒脩福等法成就者成就人倫若更兼修慧則成就聖倫也四能現乾闥婆若乾闥婆樂脫其倫我於彼前現乾闥婆身而為說法令其成就灌頂云乾闥婆此云香陰不啖酒肉惟以香資陰故清涼云食香止十寶山食諸香粖故或翻尋香行在須彌山南金剛窟住帝釋須樂燒沈水香此神尋香而至什曰是天主倒幢俗樂神也然既為帝釋樂神自應劣於諸天諸天尚樂出倫況復此神故亦樂脫說法者說離於放逸及中品十善等法成就者脫於本倫成就人倫以離於放逸則本倫不繫中品善成而人倫可獲也五能現阿脩羅若阿脩羅樂脫其倫我於彼前現阿脩羅身而為說法令其成就阿脩羅此云無端正以其類有端正女無端正男故亦云非天以其類有天福無天德故據本經有胎生卵生濕生化生不同於後七趣中見長阿含經云南洲金剛山中有修羅宮六千由旬欄楯行樹然一日一夜三時受苦苦具自來入其宮中是知樂脫其倫亦為受苦生厭離心也阿毗曇論云不能忍善不能下意諦觀種種教化以憍慢故非善徤兒又非天行名阿脩羅名義集云由在因時雖行五常懷猜忌心欲勝他故作下品十善感修羅身是知說法者說柔和善順慈忍謙敬虗心受教及中品十善等法成就者成就人倫以因轉果自轉故按諸經修羅之後應有迦樓羅部今不具者於後非人中攝故六能現緊那羅若緊那羅樂脫其倫我於彼前現緊那羅身而為說法令其成就緊那羅此云疑神其形似人頭有一角見者生疑故唐翻歌神是帝釋法樂神也菩薩處胎經云須彌山北十寶山間有緊那羅於中治化由昔布施之力居七寶殿壽命甚長天欲奏樂腋下汗流便自上天帝釋請佛諸天弦歌而頌法門者即是此神樂脫其倫者或由歌頌法門熏習力故說法者說歌咏亂心欲樂不常及中品十善等法成就者脫於本倫成就人倫整心慮趣菩提也七能現摩呼羅若摩呼羅伽樂脫其倫我於彼前現摩呼羅伽身而為說法令其成就摩呼羅伽什曰地龍肇云大蟒神長水云田蚥腹行之類然天龍自在無礙尚有多苦況地龍腹行其苦自倍故亦樂脫其倫又此類聾騃無知含毒傷生多從癡恚中來菩薩為之現身說修慧修慈等法令其永捨癡恚成就人倫則整心慮趣菩提可希冀矣八能現常人身若諸眾生樂人脩人我現人身而為說法令其成就眾生者六道通稱今就人道言按前人王宰官等皆名為人今約無有異求者言無有異求生生世世願在人中故曰樂人脩人法苑云人忍也違順能忍故孟子曰人仁他無惻隱之心非人也頂生王經云人意也能善思惟能憶念故婆沙云人能息意能修道得達分故是知內教外教皆重人倫故樂修也又灌頂云樂修含八意一人身難得故求不失二世世為人易於修證三三乘聖人並生人中四唯於人世可值佛法五八部皆慕人豈不願六惟人道中能趣菩提七諸天著樂餘趣多苦八佛菩薩道皆從人得據此則現在人中者宜知自重說法者說中品戒善為等流因成就者成中品色心為等流果故九能現非人身若諸非人有形無形有想無想樂度其倫我於彼前皆現其身而為說法令其成就上科人倫統收人王宰官等不盡之類此科非人統收天龍鬼神等不盡之類以彼所不攝者皆此攝故長水曰有形如休咎精明等無形如空散銷沈等有想如鬼神精靈等無想如精神化為土木金石等於後七卷中明現身則各隨其類說法則各應其機成就者各如其願依數別明竟三結身指成是名妙淨三十二應入國土身皆以三昧聞熏聞修無作妙力自在成就是名句指上應前謂指上別列應前總標之數而結成之一時頓現曰妙徧應無私曰淨三十二應與普門品互為出沒如天中此有四王太子彼經則無婦中此有女主及國夫人彼經亦略八部中彼有迦樓羅名八部外彼有執金剛神此並不列蓋以菩薩妙應無方神化莫測況夫人與非人無機不收兩經隨意取捨以成三十二數實各無盡勿過拘執應徧塵剎故稱入國土身普門品中為應無盡意問唯言遊化娑婆非謂菩薩妙應只在娑婆故彼重頌中亦言十方諸國土無剎不現身也皆以三昧等者出其所以能得妙應之故三昧即耳門三昧聞熏聞修者熏變執習修治自性惟用反聞也六結既解妙用自現不假造作故曰無作妙力任運而應故曰自在成就依上合而成三十二應竟二依下合而成十四無畏三一牒由標數二依數別明三結力顯益初世尊我復以此聞熏聞修金剛三昧無作妙力與諸十方三世六道一切眾生同悲仰故令諸眾生於我身心獲十四種無畏功德初因修成力聞熏聞修同上能解諸結名金剛三昧淨極光通曰無作妙力與諸下獲勝成用淨極光通寂照含虗世間法不能為礙下合生心故能與一切眾生同一悲仰以是之故能與眾生現同根之用故云令諸眾生等也十四無畏如下所說我者菩薩自稱言菩薩以身心加被能以無畏施與眾生令諸眾生於菩薩身心上獲十四種無畏以成脫苦功德功德即利益也二依數別明十四一苦惱無畏至十四持名無畏初一者由我不自觀音以觀觀者令彼十方苦惱眾生觀其音聲即得解脫不自觀音者不似眾生一向循塵也以觀觀者句謂就彼能觀反觀自性也自能如是修習亦能令彼苦惱眾生聞名感發稱我名號故云觀其音聲不言稱名而言觀聲者稱名但屬事念觀聲亦兼理持蓋由菩薩慈力加被能令理事兼修故普門品一心稱名古德亦言有事有理但以事修未必契理理修無不攝事故但言觀聲即兼稱名然事修稱名機心與聖心相交理修忘塵苦性與聲性俱寂故曰即得解脫此經與普門品所以不盡同者以此經偏重勸修故觀其音聲指在機感普門唯為顯用故觀其音聲指在聖應同中有異幸勿刻舟正脈云苦惱雖通分約身心亦可謂苦楚其身而惱亂其心也又云別列不盡一切苦惱皆攝此中灌頂云此一為總下十三為別別中前七苦也後六惱也二火難無畏二者知見旋復令諸眾生設入大火火不能燒知見旋復者謂六根互通菩薩既旋聞復性知見亦隨聞而旋復所謂一根反元六處解脫是也然見覺屬火與一切火性相通故見業交則見猛火今知見既旋亦能隨感旋彼餘火故令眾生入火不燒普門品言威神之力者亦由旋復功極異中有同應須善會正脈云證極法界威神無量故令一心稱名者即為大悲威光所攝不墮火難如入山陰暑不能侵也三水難無畏三者觀聽旋復令諸眾生大水所漂水不能溺觀聽旋復者謂反觀聽聞之性旋妄聞復真聞也然聞聽屬水與一切水性相通故聞業交則見大水今既旋聞復性亦能隨感旋彼餘水故令眾生入水不溺四鬼難無畏四者斷滅妄想心無殺害令諸眾生入諸鬼國鬼不能害正脈云鬼神以陰隱為想因以殺害為墮緣今菩薩於反聞時內滅妄想心無殺害全超鬼神心行以此全超威力能令稱名者免於鬼難五刀兵無畏五者熏聞成聞六根銷復同於聲聽能令眾生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無搖動熏聞成聞者以反聞力熏脩妄聞以成究竟堅固之真聞也六根銷復同於聲聽者謂其餘五根銷妄復真亦同聲家之聽以元一精明銷則俱銷復則俱復也俱復故究竟堅固之性隨感徧周故能令彼刀段段壞俱銷故畢竟空寂之理遇事便融故能令如割水吹光既如割水吹光而其人性自如如不覺不知故云無搖動也又此中言被害者似是屈遭憲網誤入讐門言兵戈者似是身臨戰陣彼敵衝圍際斯二者頃刻身首異處須臾性命不保能令無畏益顯神奇六鬼見無畏六者聞熏精明明徧法界則諸幽暗性不能全能令眾生藥叉羅剎鳩槃茶鬼及毗舍遮富單那等雖近其旁目不能視正脈云首二句言反聞功極發本明耀圓照法界也次二句言鬼神陰隱想習向暗背明反不堪於光耀如梟鳥夜視晝盲羅剎向日不見是也灌頂云藥叉男鬼羅剎女鬼也此二皆食人鬼人屍若臭呪養令鮮多聞天轄鳩槃茶此云甕形魘魅鬼也增長天轄毗舍遮此云噉精氣能噉人及五穀精氣持國天轄富單那此云臭餓鬼主熱病者廣目天轄等者該餘以鬼類尚多言不能盡故近旁目不能視者如土地不見洞山鬼使不見事僧之類視既不能自然無害問此與前文鬼難何異答前約一類此約多類又前約身入鬼國此約無端誤遇雖同為鬼難不妨前後各出七枷鎖無畏七者音性圓銷觀聽反入離諸塵妄能令眾生禁繫枷鎖所不能著音性圓銷者謂聲塵銷滅也觀聽反入者謂耳根旋復也離諸塵妄者謂色等諸塵亦隨聲銷滅見等諸妄亦隨聞而旋復也諸妄既復以真護彼能令枷鎖斷壞諸塵既滅以空融彼能令禁繫同虗故云所不能著八賊難無畏八者滅音圓聞徧生慈力能令眾生經過險路賊不能劫滅音亡聲則塵不能隔塵不能隔則聞性圓徧聞性圓徧故尋聲所至徧生慈力徧生慈力故隨處護生應緣化暴故能令諸眾生遇賊不劫法華大成云或曠絕幽隘之處或怨賊衝出之徑皆名險道道即路也九貪毒無畏九者熏聞離塵色所不劫能令一切多婬眾生遠離貪欲熏聞者熏修聞性令六根圓通也離塵者離諸聲塵并六境俱脫也六境俱脫則幻色無力六根圓通則真性有力以無力劫有力自然不能如云主人若悟則諸客邪不得其便是也此雖菩薩自所證境然以下合力故因能令彼多淫眾生遠離貪欲眾生言多淫者謂欲習偏重對境數起輕而損身喪德重而亡軀失命且招來世妻不貞良眷屬乖意尤其甚者銅柱鐵牀等報臨終現前積寒堅冰等獄從頭自受能令遠離菩薩之真慈大矣十瞋毒無畏十者純音無塵根境圓融無對所對能令一切忿恨眾生離諸瞋恚純音者離於徧計所執名相唯餘依他所起音聲雖餘音聲而無染污障蔽之力故曰無塵然音既無染無障根亦無局無礙如是則根境融為一性如耳家根境既爾餘五亦然故曰圓融如前云見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體是也無對所對者謂既為一性則根無能對之義而境亦無所對之義自應無有瞋恚以瞋恚生於對待違拒故也能令一切等亦由菩薩下合力故眾生言忿恨者謂瞋習偏重對境莫制輕則傷氣取辱重則忘身及親且致來世被他求砒為人惱害尤其甚者刀山鐵橛劒樹劒輪等相臨終現前宮割斬斫剉刺槌擊等事從頭自受能令離瞋菩薩之大悲深矣然瞋為根本煩惱有輕重平等之異輕則惟是忿怒重則兼致恨怨平等則不過恚惱此三皆隨瞋而起根隨相依總一瞋毒故忿恨眾生而言離諸瞋恚其實忿恨眾生亦具瞋恚離諸瞋恚亦兼忿恨蓋互相顯攝耳十一癡毒無畏十一者銷塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦永離癡暗溫陵曰癡由妄塵所蔽無明所覆銷塵則無蔽旋明則無覆故於外之法界內之身心凝瑩朗徹離癡暗矣然此亦屬自證能令之義準上可知正脈云具足見惑為昏具足思惑為鈍具足無明為性障阿顛迦此云無善心又癡之最重者也愚謂昏鈍性即是愚癡蓋愚癡以昏暗鈍滯為性故由此所障永絕善心故稱諸阿顛迦此亦由於癡習偏重迷正知見小而事理錯亂大而邪正顛倒且感來世生邪見家其心諂曲尤其甚者王使主吏證執文籍等相臨終現前勘問權詐考訊推鞫等事從頭徧歷能令永離菩薩之妙用神矣問水火等境現是苦境可說怖畏貪瞋癡三隨自心行何畏之有答有二義故可說怖畏一者毒是苦因能招苦果二者對境數起力不自由蓋約信因識果知畏求離者言之十二求男無畏十二者融形復聞不動道場涉入世間不壞世界能徧十方供養微塵諸佛如來各各佛邊為法王子能令法界無子眾生欲求男者誕生福德智慧之男融形復聞者謂融銷幻形以復真聞所謂諸根圓拔內瑩發光根身器界應念化成無上知覺此即事而理也由即事而理無違真而應俗所以不動道場涉入世間道場指真諦理言以是法身所依故世間指俗諦事言以是化身所徧故不動而涉正理事無礙境也復由理事無礙事亦如理而廣狹相即所以不壞世界能徧十方世界指一佛化境對十方為狹十方指多佛化境對一界為廣不壞能徧又事事無礙境也復由事事無礙身亦隨界而一多俱在所以能供養諸佛各各佛邊為法王子言法王子者謂現前助佛揚化將來補處佛位如易云幹父之蠱有子義也能令等者謂菩薩以法王之子餘福餘慧利及無子諸眾生故按普門品欲求唯約女人以女人無子有三種苦一者為自夫所棄二者為餘婦所輕三者為傍人所笑怖畏偏重故今則渾言眾生蓋是男女俱該良以不孝有三無後為大故同欲求男有福有德者富而賢有智有慧者貴而哲四美具足益以見聖惠之無涯矣十三求女無畏十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來秘密法門受領無失能令法界無子眾生欲求女者誕生端正福德柔順眾人愛敬有相之女六根互用曰圓各各無礙曰通互用故明照無二無礙故含界無遺明照無二故立為鏡智之號含界無遺故立以空藏之名由鏡義故承順如來秘密而明照無違由藏義故領受如來秘密而含攝無失能令等者謂菩薩以承順諸佛領受法門餘功餘德利及無女諸眾生故無女而言無子者以女為半子故良由男承內嗣女結外親有男無女亦非全美故亦有欲求女者端正以備女品福德以致尊榮柔順以全婦道正以有此三者故致眾人愛敬謂端正致愛福德致敬柔順則愛敬并致是則有相者非有別相即是有端正相有福德相有柔順相也女中不言智慧者攝柔順中以有智慧方能柔順盡坤道備女德故十四持名無畏問持名出自本心何所畏耶答恐其無功及不勝餘名皆畏也今持觀音一名福等多名故無此畏三一舉眾顯德二述由明等三釋疑防問初十四者此三千大千世界百億日月現在世間諸法王子有六十二恒河沙數修法垂範教化眾生隨順眾生方便智慧各各不同初顯依報之廣此指娑婆三千大千等統言一佛化境百億日月所照處也現住下顯眾聖之多揀過去異未來故云現住世間越三賢超十聖故云諸法王子六十二恒沙實由菩薩現量所見非假設之數也修法下顯化德各異修法者自修有法垂範者垂儀作範教化眾生者成己所以成物自利便足利他故也隨順眾生謂於三千界內各據一方隨順一方之機由此所以涉世方便說法智慧各各不同如下文所說二十五聖各當其根之類二述由明等由我所得圓通本根發妙耳門然後身心微妙含容周徧法界能令眾生持我名號與彼共持六十二恒河沙諸法王子二人福德正等無異圓通本根者有二義一謂諸圓通中獨為娑婆本根以後云此方真教體清淨在音聞故此約正對以明本義二謂觀音所得仍為圓通本根以後云此是微塵佛一路涅槃門故此約攝餘以明本義又圓通本根句惟是虗標下乃出其名體發妙耳門者謂開發耳門聞性以成真三昧也然耳門三昧獨稱為妙者以其具含容周徧義故此門一發攝餘門而同己微妙亦同己容徧故能令持己一名與彼共持眾多名號福德正等無有別異是知圓根與不圓根固日劫相倍也三釋疑防問世尊我一名號與彼眾多名號無異由我修習得真圓通初釋疑疑云一名多名單持共持以二人之行迹論之有類霄壤以二人之福德論之不異絲毫其故何也防云我一名號與彼眾多名號無異由我下防問問云一名唯顯一德多名應顯多德一多逈殊何言無異防云由我修習得真圓通然觀音圓通獨稱為真者以具圓通常三真實故反顯六十二恒沙王子隨順眾生方便智慧各各不同其所得圓通唯似圓非真圓似通非真通耳依數別明竟三結力顯益是名十四施無畏力福備眾生準前標數文云令諸眾生於我身心獲十四種無畏功德蓋菩薩身心為能施十四無畏為所施今云是名等者謂如上所說是名菩薩以自身心於十四種苦難眾生施無畏力也此是結力福備句顯益福護也備全也眾生者即指八難三毒二求及持名人也八難眾生現遭極苦畏其性命不保菩薩則福護而全其性命三毒眾生現起深惑畏其善根當失菩薩則福護而全其善根二求眾生現缺子女畏其後嗣將絕菩薩則福護而全其後嗣持名眾生現持名號畏其福德無多菩薩則福護而全其福德是皆有以福之有以備之則菩薩之利益普矣依下合而成十四無畏竟三兼二勝而成四不思議問應身約上合無畏約下合文有明言無可議者今明四不思議兼於二勝何所據耶答文云我又獲是圓通脩證無上道故是知脩證二字非是圓通以前觀行脩證乃是獲圓通後依於二勝歷事造修歷位取證究竟而至於無上道也況下云救護眾生得大自在義合同佛慈力能以無畏施諸眾生義合同生悲仰然既有義可尋無妨說兼二一牒由標數二依數別明初世尊我又獲是圓通修證無上道故又能善獲四不思議無作妙德重牒所得故曰又獲謂又以獲得耳根圓通也上合下合即是歷事造修歷位取證功圓行滿究竟成佛故曰無上道也不惟能獲妙應及無畏力故曰又能獲而言善者上下兼合慈悲雙運一獲一切獲故四不思議者正脈云以下所列德相至妙不可思至神不可議故無作妙德者正脈云揀非有為作意所成乃任運自在成就二依數別明四一同體形呪不思議二異體形咒不思議三破慳感求不思議四供佛利生不思議初二一承體標用二略出用相初一者由我初獲妙妙聞心心精遺聞見聞覺知不能分隔成一圓融清淨寶覺故我能現眾多妙容能說無邊祕密神呪初獲妙妙聞心者謂菩薩初修耳門三昧獲得能聞心性超出餘門為妙中之妙故此當解於動靜二結所聞盡而能聞現也心精者謂進解根覺空滅四結聞心已復精真體故遺聞者謂寂滅現前之時遺彼根中無始虛妄聞性永不現前也然妄聞既遺妄見妄覺等亦隨聞而俱遺故云見聞覺知不能分隔無分隔故一真圓湛故曰成一圓融清淨寶覺圓融者緣起無礙即隨緣義清淨者湛然不動即不變義不變隨緣故如金與金器故以寶覺稱之故之一字雙承隨緣不變二義言之正以緣起相由一多無礙故於一身能現眾多妙容正以清淨湛然真祕斯現故於眾多妙容能說無邊祕密神呪二略出用相用相無盡莫可殫述今下所說乃於無盡中略出少分觀下其中二字可知二一現相表法二變容救護初其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦羅首二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目初能現妙首其中者即指眾多妙容之中多少不定故曰或現一首乃是本數應不須現慈威定慧不定故無妨說現二臂二目等準知又首則本數唯一故從奇數而增展轉以至百八又展轉以至八萬四千者為對煩惱塵勞數也爍迦羅此云堅固刀傷斧斫無能壞故若作表法者首是超出義表自利行自利獨善故初以奇數表之展轉以至百八又展轉以至八萬四千者表菩薩自能超出百八煩惱及八萬四千塵勞自利行滿也二臂下能現妙臂臂則本數是二故從偶數而增數極百八又極而至於八萬四千者準首可知母陀羅此云印謂臂各有手手各結印故若作表法者手有護持義表利他行利他兼善故初以偶數表之數極百八又極而至於八萬四千者表菩薩護持眾生令脫百八煩惱及八萬四千塵勞利他行圓也二目下能現妙目目之本數有二有三二如常人三如摩醯首羅故從雙數單數而增增至百八又增而至於八萬四千者為對三昧及法門數也清淨寶者紺目清淨如琉璃故若作表法者目取照見義表權實二智權智覺他實智自覺故以雙數及單數表之增至百八又增而至於八萬四千者表菩薩以權實二智自覺覺他自他共證百八三昧及八萬四千法門覺行圓滿也二變容救護或慈或威或定或慧救護眾生得大自在慈者攝授義謂應攝授者即現慈容而攝授之如對善人及正天等威者折伏義謂應折伏者即現威容而折伏之如對惡人及邪魔等定者靜住之容為對妄心馳散機故慧者觀照之容為對愚暗昏住機故變易不定故各置或言又慈則首臂目三皆慈說攝授祕密神呪攝授善人及正天等令其增進威則首臂目三皆威說折伏秘密神呪折伏惡人及邪魔等令其遠離定則首臂目三皆定說靜住秘密神呪對治妄心馳散眾生令其攝念慧則首臂目三皆慧說智照秘密神呪對治愚暗昏住眾生令其觀心然既折攝並示止觀雙形無苦不救無生不護故云救護眾生滅惡成善勢如游刃故曰得大自在此等皆於一身中現故名此為同體形呪大悲懺文云於一身心現千手眼照見法界護持眾生是也同體形呪不思議竟二異體形呪不思議二者由我聞思脫出六塵如聲度垣不能為礙故我妙能現一一形誦一一呪其形其呪能以無畏施諸眾生是故十方微塵國土皆名我為施無畏者聞思者六性舉二以元是一體單舉複舉皆各總攝隨便俱得也脫出六塵者謂反聞功極六性圓湛塵不能縛也聲謂音聲喻聞性垣謂垣牆喻六塵度謂度過喻脫出言六性脫出六塵而塵不能縛如音聲度過垣牆而垣不能礙法喻歷然可對故我妙能等者正以塵不能縛對緣斯現也現一一形者對異機而現異形誦一一呪者於異身而說異呪故名此為異體形呪或現身脫其苦惱或說呪隨其願求故云其形其呪能以無畏施諸眾生無畏同前十四但應分冥顯耳是故十方等者因德立稱稱徧十方塵國者正見菩薩實德感孚無遠弗屆豈獨所謂聲名洋溢乎中國已也三破慳感求不思議三者由我脩習本妙圓通清淨本根所遊世界皆令眾生捨身珍寶求我哀愍本妙圓通即指耳根圓通由來自具離淺圓之三義故以本妙稱之然妙雖本具但以六結未解三執尚縛不得清淨菩薩以脩習力解於六結越於三空自成清淨本根矣本根既淨則一切無著以此相感故於凡所遊處能令眾生以自身所佩珍寶而奉施之如普門品無盡意菩薩解頸珍珠瓔珞價值百千兩金而以與之即其證也求我哀愍者恐其不受則施福不能成故如普門品觀音不受無盡意重求觀音仍復遲疑必待佛言當愍此無盡意等而乃受之即其證也正脈云眾生慳心最為難破捨心最為難發求心不可強致今所過即感眾生破慳捨施哀求是誠不思議威神所使若究其深源但由所習耳根清淨無著便能相感如此據此則觸事染著守財慳悋而怨人不我供者亦應知所反矣四供佛利生不思議四者我得佛心證於究竟能以珍寶種種供養十方如來旁及法界六道眾生求妻得妻求子得子求三昧得三昧求長壽得長壽如是乃至求大涅槃得大涅槃以根性為因心因即同果故曰我得佛心緣結解成妙悟悟即同證故曰證於究竟既悟證等佛則無德不備無法可著故能以珍寶等物供養如來蓋以德備故能有無著則能供如普門品觀音受瓔分作二分一奉釋迦一奉多寶即其證也旁及者非正供乃以所作施福迴向法界眾生令其有求皆遂如普門品觀音受瓔供佛乃為愍諸四眾及於人非人等即其證也然法界六道亦該四聖統論所求不出二種一者世間樂二者出世樂今妻子之求局在欲界三昧長壽通於色空以長壽不止人間壽考而仙天長報皆是三昧雖通出世然既列於妻子長壽之間且約世間三昧論之此屬世間之樂如是乃至超略三乘權果一乘實果亦可遂求故曰求大涅槃得大涅槃此乃出世之樂且世樂有數非可妄求況出世無為豈能遽得今以菩薩不思議力能興廣大最勝供養并作廣大最勝迴向遂令法界眾生有求皆遂是知廟祀徧於寰區禮念通乎上下無足異矣正脈云三十二應法施也十四無畏無畏施也四不思議二施兼財施也所謂檀含萬行者信矣總上歷述二證竟三結答圓通佛問圓通我從耳門圓照三昧緣心自在因入流相得三摩提成就菩提斯為第一世尊彼佛如來歎我善得圓通法門於大會中授記我為觀世音號由我觀聽十方圓明故觀音名徧十方界初應問結答佛問句按定佛問我從下正以結答動若邇遙靜無邊際聞性無遺故云圓照依此圓照聞性以成正定故曰三昧此乃出其定名心字仍指聞性隔垣能聽十方無礙故曰自在緣此自在心性以為觀體不逐外境一味反聞故曰入流因此入流之修以為觀行依體立行借行顯體行成體備故曰得三摩提此乃明其脩相設欲成就菩提依此圓根較彼不圓之根日劫相倍故曰斯為第一世尊下引顯超勝彼佛即古觀音也因見我昔從聞思修入三摩地故歎以善得圓通言善得者以較之餘門費力少而收功多故記以同名者一顯師資道合一顯所得真實必於大會者一令海眾同證一令同行效修此自利超勝也觀聽圓明者謂反觀聽性復真遺聞十方圓照一時明了也明不徒明必能尋聲圓應由是十方眾生咸知稱念故令觀音之名徧十方界此利他超勝也自利利他一耳門而俱備所謂成就菩提斯為第一者信矣又二十四聖雖各說第一而云如己所證知非通修之法今觀音直說第一而不云如己所證者顯是通修之法此不待文殊已自寓揀別意耳總上眾說本因竟三文殊揀選三一如來先現瑞相二敕令文殊揀選三文殊奉旨說偈初三一悟體含用相二乘悟起脩相三行成果滿相初三一表根性體用二表餘門體用三表耳門易悟初爾時世尊於師子座從其五體同放寶光遠灌十方微塵如來及法王子諸菩薩頂彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢事論則眾聖各說本因華屋有門可入自佛他佛皆生歡喜故各放五體之光以示自慶互灌佛頂及眾頂者既示自慶又示慶他蓋以圓通之門既啟則諸佛本懷可暢一切眾會可接均可慶焉若作表法者世尊本佛表此界本根本根既啟則修因趣果安住無畏故以師座表之不惟安住無畏且五根并脫故以五體同光表之遠灌佛頂者表上與諸佛同一慈力及灌菩薩頂者表下與眾生同一悲仰良以本根既啟體必含用所謂心佛及眾生是三無差別者於此可見彼諸如來乃他界之佛表餘五根同具此性一根反元五根并脫故亦以五體同光表之來灌佛頂及眾頂者亦表上合下合義也據此則五根雖不及於耳門猶遠勝乎塵識等諸圓通矣二表餘門體用林木池沼皆演法音交光相羅如寶絲網事論既生佛同慶天地亦應呈祥故使林木池沼皆演法而交光也若作表法者林木池沼皆演法音表塵識等皆具聖性既皆具聖性則門門互通故以交光相羅表之得此光者可以嚴體攝生故以如寶絲網表之蓋寶取莊嚴義網取攝持義也三表耳門易悟是諸大眾得未曾有一切普獲金剛三昧事論則既見生佛同慶又見天地呈祥故皆得未曾有從此發心永無退轉故成金剛三昧若作表法者大眾乃此會之眾表本界之機本界之機一聞耳根圓通則機教相投故以得未曾有表之既機教相投則易得悟入故以普獲金剛三昧表之前云金剛王寶覺如幻三摩提即密指耳根圓通是知能表所表俱稱金剛三昧但能表唯約發心不退所表乃取斷障無礙淺深異耳然此已上三科表法勝劣歷然可明知此義者則無勞文殊更揀選矣悟體含用相竟二乘悟起脩相即時天雨百寶蓮華青黃赤白間錯紛糅事論則會眾受益故致天雨寶華而作供養之具間錯紛糅者謂青黃赤白相間錯落紛然雜糅雖攢華簇錦未足方其美也若作表法者既悟耳根圓通則性天湛朗依此脩因則萬用俱含因果該徹故以天雨寶蓮表之論行布則住行向地四位迢然故以青黃赤白表之論圓融則一即一切一切即一故以間錯紛糅表之清涼云萬行紛披比華開錦上亦斯義也三行成果滿相十方虗空成七寶色此娑婆界大地山河俱時不現唯見十方微塵國土合成一界梵唄詠歌自然敷奏事論則四華在空交映而成七寶之色如雨徧界彌漫而隱山河之形故曰俱時不現然山河既已不現鐵圍無復突兀故惟見十方塵國合成一界際斯瑞應諸天慶讚故又聞梵唄詠歌自然敷奏梵唄謂梵音唄讚詠歌謂吟詠歌唱也若作表法者乘悟起修則從真涉俗故以虗空成色表之從真涉俗則即俗即真故以山河不現表之既真俗互融則妙合中道故以塵國合一表之住果攝生法音普被故以梵唄詠歌表之隨緣而應任運而說故以自然敷奏表之敷奏謂敷宣節奏也合上科觀之則修因證果之相已先兆其瑞矣如來先現瑞相竟二敕令文殊揀選二一通論隨修似不須揀二別就本機應須揀擇初於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢各說最初成道方便皆言修習真實圓通彼等修行實無優劣前後差別現相表法密示難明應須顯說故如來告文殊也佛不自說者以歸元無二無可揀擇揀則成偏自教相違以今經所說是圓教故必告文殊者以方便多門不揀則濫揀則須智文殊獨檀以諸經皆推文殊為大智故前雖麤聞未及諦觀故教以汝今觀此蓋必如聞而觀乃悉其所證之實故二十五聖皆稱無學者有二義一約遠本二約本法約遠本則久證佛果示居因門如觀音菩薩過去為正法明如來是也約本法則悟證齊佛即同修證以圓頓行人修即無修故也各說等者謂各各自說最初入手成道方便如根塵識等各據一門是也皆言等者謂諸聖皆言自所修習為真圓通如二十五聖各稱第一是也實無優劣者有四義一方便多門歸元無二如千逕九逵咸會王城故二通論十方各隨方宜如香積味塵不瞬眼根等三宿習不同各選易入如空生曠劫心得無礙等四惑習不同各選對治如火頭多淫佛教觀火等是知對症即稱良藥易入便屬妙門況夫根隨方利攝化不專一道聖性平等究竟寧有二致既無優劣則在前修習如富樓那從曠劫來辨才無礙等在後脩習如優波離隨佛踰城出家受戒等亦復無有差別故統言實無優劣及前後等據此則二十五門似應無所揀矣二別就本機應須揀擇我今欲令阿難開悟二十五行誰當其根兼我滅後此界眾生入菩薩乘求無上道何方便門得易成就初正為阿難欲令開悟須選對機之門故特命文殊決擇於二十五行之中誰當其根後文殊偈云堪以教阿難正應此意兼我下兼為未來滅後根鈍開悟猶難此界眾生耳根偏利設不對根縱有入菩薩乘求無上道者亦難究竟故又命文殊決擇何方便門得易成就後文殊偈云及末劫沈淪正應此意敕令文殊擇選竟三文殊奉旨說偈二一經家敘儀標說二文殊詳演偈頌初文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神說偈對佛旨意也佛敕揀選意在開悟阿難遐益滅後故曰慈旨至尊有命智臣宜承故文殊遵奉而偈對也座起禮佛者受命常儀承佛威神者說仗佛加蓋以二十五聖文殊齊肩者衍有其人非仗如來威神焉敢自行品量不以文對而以偈對者貫華易持令聞已而思修也二文殊詳演偈頌三一預開選端二通揀餘門三獨取耳根初三一泛明從真起妄二略示返妄歸真三承明應須揀選初覺海性澄圓圓澄覺元妙元明照生所所立照性亡迷妄有虗空依空立世界想澄成國土知覺乃眾生覺海二字法喻雙彰如吳興云真覺之性譬如大海是也澄圓圓澄義通法喻喻中謂海性澄清圓現萬象法中謂覺性澄湛圓含萬有但海之澄圓易見覺之澄圓難知欲令即海明覺故通以澄圓目之此即寂而照也又海性雖圓現萬象而澄清不改覺性雖圓含萬有而澄湛不移故又以圓澄目之此即照而寂也即照而寂則覺性元妙以妙即不變義故即寂而照則覺性元明以明即隨緣義故然既曰元妙元明則一念不生法爾具足若乃起心欲照則是瞥起無明由此轉生業識而成所有之相如前云覺非所明因明立所是也所立等者謂所相既已妄立又復生汝妄能見分反將所欲照之性益成晦昧故曰亡也迷妄等者謂所照之性既亡則性覺真空迷於妄惑之中舉體全成頑虗故曰有空如前云晦昧為空是也依空等者謂空見相對堅執欲緣其奈空體本不可緣由堅執故遂於虗空之中妄見有世界之相故曰立界如前云空晦暗中結暗為色是也想澄二句乃別明依空立界之相言世界有二一謂妄想澄凝結成國土名器世界二謂知覺運動攬為眾生名情世界又此雖情器具足且約本識中細相言之不言麤相者為示迷途未遠見歸源之易故二略示返妄歸真空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有上云迷妄有虗空則虗空生於覺心中也然人皆知虗空為大而不知覺心更大若以虗空與覺心較之則虗空如漚覺心如海故云如海一漚發又以海喻心以漚喻空者有二義一者海體唯一漚乃有多喻心唯一體空有多方仍復以一漚喻一界之空為最小也二者海體常住漚相起滅喻覺心絕待虗空待成仍復以一漚喻一界之空為至妄也有漏二字即前之情世界微塵國即前之器世界前云依空立界此云皆依空生蓋是重牒前意以顯其較之虗空益最小而益至妄故然虗空既如一漚因漚之易滅便知空之本無空且本無況復三有情器又在虗空之中豈真有哉知此意者則情器雙超空色俱盡真歸元之要訣也三承明應須揀選歸元性無二方便有多門聖性無不通順逆皆方便初心入三昧遲速不同倫初二句明對根須選言果能如上頓悟當下歸元則覺性本無二致但眾生根器不齊而對機方便乃有許多門路誠不可以不選也聖性下明難易須選言成聖之性無法不通或以六根順性而脩或以塵識逆性而修俱為方便但初心欲入三昧有遲待多劫有速經少時難易自不同倫又不可以不選也通上預開選端竟二通揀餘門四一揀六塵二揀五根三揀六識四揀七大初六一揀沙陀色塵二揀陳那聲塵三揀香嚴香塵四揀藥王味塵五揀䟦陀觸塵六揀迦葉法塵初色想結成塵精了不能徹如何不明徹於是獲圓通色想結成塵者言唯色不能成塵必因識想堅執交相結縛而有染蔽之義乃成塵故既已成塵則染蔽本根於彼精真了然之性不能明徹其猶久客他鄉雖還家有路而不知也如何等者言圓通唯明徹可入如何以不明徹之色塵而能於是獲得圓通是固不待辨而知其難矣二揀陳那聲塵音聲雜語言但伊名句味一非含一切云何獲圓通音聲二字離釋則屈曲為音徑直為聲合論則音聲者謂具音之聲唯取屈曲義故雜語言者謂依彼具音之聲雜出而成眾多語言也伊猶彼也但伊二句應作一氣讀之謂但彼名句義味詮顯各別一名不能含於多名乃至一味不能含於多味是固知聲塵之不圓耳此中曰名曰句曰味者名詮自性如云火唯是燒性句詮差別如云艾火非炭火等此二皆為能詮味即是義乃為所詮能詮中不言文者以彼但是名句聯合非別有體故所詮中不言理者以彼但是悟後方知非方便故又理能徧含兼之則揀義不成故但言名句味也末句言既非徧含則違圓通云何以是能獲蓋反言以揀之三揀香嚴香塵香以合中知離則元無有不恒其所覺云何獲圓通香以合中知者謂香塵必待合於鼻中方能知故離則元無有者謂不合於鼻則香相元無所有是香塵固不恒矣不恒其所覺者謂香既或有或無不得常恒則根中覺性亦不能恒現也不言齅而言覺者以元是一體可互說故又鼻舌身三皆合中知俱得言覺故末句言圓通以覺性為體若以香觀則覺且無恒云何依之而能獲耶四揀藥王味塵味性非本然要以味時有其覺不恒一云何獲圓通味性非本然者謂味塵體性非本然自有也要以味時有者謂既非本然要必待味合之時方能有故味合方有不合則無是味塵先且不恒一矣末二句言味既不能恒一況根中覺性自然不能恒常一如云何依之而獲圓通固知其不能耳五揀䟦陀觸塵觸以所觸明無所不明觸合離性非定云何獲圓通首句上觸字指觸塵即冷煖澁滑違順等相下觸字指色塵謂身根所觸著之物色意言冷煖澁滑違順等相必以身根所觸著之物色乃得發明顯現次句言設無所觸則不能發明觸塵之相故與上之二塵同為合中知也末二句言初心貴專今觸塵既合時方有離時便無其體性尚非一定云何依之而能獲圓通六揀迦葉法塵法稱為內塵憑塵必有所能所非徧涉云何獲圓通正脈云法塵非外五塵之實質乃五塵落謝影子唯意所緣屬獨影境故稱內塵憑塵下不依正脈義釋正脈以起意緣時但專一境名為憑塵有所今謂憑塵者既屬內塵必憑外塵落謝也既憑外塵落謝必有所落謝之影方稱內塵是則外塵為能謝內塵為所謝但外塵有五落謝必有先後內塵亦五影子非無甲乙如是則能謝所謝二皆五相歷然非能互徧互涉然塵且不圓云何能獲得圓通宜在所揀矣揀六塵竟二揀五根耳根中選故揀中唯五五一揀那律眼根二揀周利鼻根三揀憍梵舌根四揀畢陵身根五揀空生意根初見性雖洞然明前不明後四維虧一半云何獲圓通首句縱許洞然謂縱許其照境分明洞然不混也次二句奪其有虧準前云前方全明是總約正前方及前兩隅而言後方全暗是總約正後方及後兩隅而言觀其全字可知今云明前乃唯約正前方言不明後亦唯約正後方言以皆無全字故四維乃是四隅前方二隅能明後方二隅不明故云虧一半也不言左右旁觀者偈略難收可以口會如云既明前不能明後而四維又虧一半縱使左右旁觀統論功德亦唯三分之二既闕一分即不圓通故以云何句揀之二揀周利鼻根鼻息出入通現前無交氣支離匪涉入云何獲圓通鼻息者鼻中氣息出入通者謂出而送舊則通於外入而齅新則通於內如前云有出有入是也然出屬過去入屬未來出入少停之時名曰現前無交氣者無有交接之氣既無交接之氣則無功德如前云而缺中交是也據此則三分論功缺於一分已失圓義況夫出入支分現前斷離三際不相涉入又失通義云何以是而獲圓通明知其不易耳三揀憍梵舌根舌非入無端因味生覺了味亡了無有云何獲圓通首句言舌非入味無有端由生覺次句言必因味塵方生覺了之性三句言味若亡時了性依然無有此即同前覺不恒一故亦以云何句揀之問耳根離聲聞靜許其為常今舌根離味嘗淡何不許耶答靜非是聲故離聲猶可聞靜淡本是味故離味逈無所嘗此二性常不常之異也四揀畢陵身根身與所觸同各非圓覺觀涯量不冥會云何獲圓通所觸即指觸塵前云觸以所觸明無所不明觸今身根亦然故云與所觸同謂身之覺性亦因所觸物色發明顯現設無所觸不得發明文殊妙辨省詞取例為言也次句各字通指能例所例直揀其不是圓通覺觀初心起修名覺後心相應名觀故云非也涯量句出塵揀意謂此身之與觸合有離無其性不定與彼圓通妙體涯際分量不得冥合契會理在可揀故末句結揀可知五揀空生意根知根雜亂思湛了終無見想念不可脫云何獲圓通知根謂能知之根即意根也意根即是末那恒審思量與彼意識亂思麤心難辨故云雜也湛了終無見者謂依之修習欲求澄湛明了終不可見如是則妄想念慮尚不可脫云何能獲圓通是不可以不揀也揀五根竟三揀六識六一揀舍利眼識二揀普賢耳識三揀孫陀鼻識四揀富那舌識五揀波離身識六揀目連意識初識見雜三和詰本稱非相自體先無定云何獲圓通識見者眼識緣境隨念麤略無多緣慮略同根性緣境故無妨說見雜三和者謂內依根及根性外托色塵內外交雜三緣和合而得生故詰本者於三緣中窮詰其本也窮詰其本三處都無一者不從根生唯根無塵不自生故二者不從色生色塵無知非識因故三者不從性生性澄識動不相類故既三處叵得則虗妄無實故稱非相自體即識之自體緣合似有詰本實無是先且無有定實依之修習終無實果故末句以云何揀之二揀普賢耳識心聞洞十方生於大因力初心不能入云何獲圓通首句謂識心稱性同性圓聞故能洞徹十方自在無礙生於大因力者謂由菩薩多劫修習廣大願行所感生故修習此等法門須是深位菩薩初心淺修攀仰不及故不能入末句結揀可知三揀孫陀鼻識鼻想本權機只令攝心住住成心所住云何獲圓通鼻想者如觀鼻端白引起鼻識自想鼻中氣也本權機者謂原佛教觀本為對治難陀散心權設機用非鼻識本有機用故次二句言所謂權機者只為攝其散心令住一境若果住一境而一境便成心所住處是心有定在矣末句言心有定在則不圓通云何能獲也四揀富那舌識說法弄音文開悟先成者名句非無漏云何獲圓通前二句言舌識說法唯是撥弄音聲及於文字不合得大開悟而富樓那所以得大開悟成阿羅漢者乃是先劫久成辨才獨擅說法適今時節已至因緣會遇故能爾耳後二句言初心若依說法而所說之法惟是名句尚屬有為不相應行非是無為無漏之法有乖圓通云何能獲五揀波離身識持犯但束身非身無所束元非徧一切云何獲圓通持犯者謂身識不起殺盜淫事執持犯戒之罪不令犯故初心依此但能約束其身不過執身不動設若非身所攝如妄言綺語惡口兩舌等則識無所從束是知身識執持尚不徧於口意二業況夫菩薩清淨律儀乃至三千威儀八萬細行一切法門自然不徧故云元非謂本來非徧也不徧則不圓故承此以云何句揀之吳興問云波離執身次第執心俱得通利今何但云束身今疏答曰此約初心言之大凡初心持戒先斷淫殺盜妄妄猶可緩而最所宜急者唯淫殺盜耳但執心誠難故先以身識束身如身識不起邪覺離於惡觸自然無復殺盜淫事是為束身至若心動淫殺盜機口出妄言綺語等非不欲斷但非身識能持人不盡皆波離豈能依此入圓岳師答詞正脈已云混淆不錄六揀目連意識神通本宿因何關法分別念緣非離物云何獲圓通首句言目連神通雖由旋識復湛心光發宣而究其深本乃宿因久修觀其初遇佛時鬚𩬊自落袈裟著身足知其有由來矣次句言既由宿因與彼現前法塵上所起分別意識了不相干故云何關法分別也念緣句言法上分別乃屬妄念攀緣雖依法塵實託外物若離外物則法且不有何況於識故云非離物也末句言既不離物則被物所局云何能獲圓通揀六識竟四揀七大七一揀持地地大二揀月光水大三揀烏芻火大四揀琉璃風大五揀空藏空大六揀彌勒識大七揀勢至根大初若以地性觀堅礙非通達有為非聖性云何獲圓通若以地性而觀則地性堅礙非初心便能通達是必久修乃通此揀體析觀也若以平地為功則平地有為非順聖性是必平心乃順此揀平地行也據此則觀行俱失圓義云何能獲圓通二揀月光水大若以水性觀想念非真實如如非覺觀云何獲圓通若以水性觀者如月光童子初觀身中水性無奪次觀與香水海等無差別如是皆由想念成境及乎出定唯身無水足知其非是真實若必欲契會如如之理須待證水合空得無生忍非初心覺觀可能蓋以如如之理離念不動一有覺觀動相現而如如隱矣末句揀意可知三揀烏芻火大若以火性觀厭有非真離非初心方便云何獲圓通若以火性而觀如烏芻瑟摩者乃因厭欲而見有火相設無厭欲之心則火相便無是知觀火之法但為多淫者一時對治非真能離欲也然初心不盡多淫之機豈必藉此以為方便縱使藉此初心亦非真離云何能獲圓道信知其不易耳四揀琉璃風大若以風性觀動寂非無對對非無上覺云何獲圓通若以風性觀如琉璃光者初觀諸動無二等無差別次觀來無所從去無所至乃由動入寂也由動入寂相待成觀故非無對既非無對自是有對之法能所角立豈稱無上覺體自應非是既非覺體因果不類以圓通即覺體故云何句准上五揀空藏空大若以空性觀昏鈍先非覺無覺異菩提云何獲圓通以空性觀者如虗空藏諦觀四大無依妄想生滅虗空無二等也然虗空以昏冥鈍頑為相自體先且非覺非覺即是無覺既無覺知即異菩提以梵語菩提此云覺道故既異菩提則圓通難入故揀其云何能獲六揀彌勒識大若以識性觀觀識非常住存心乃虗妄云何獲圓通若以識性觀者如彌勒菩薩諦觀十方唯識以識性為因心也但所觀之識生滅不停是自體先非常住而存心觀之其猶蒸砂作飯乃屬虗妄故揀以云何獲也七揀勢至根大諸行是無常念性元生滅因果今殊感云何獲圓通凡有動作皆屬行陰故曰諸行一涉遷流即非常住故曰無常而念性亦屬行陰遷流同為無常故云元生滅也以此為因生方見佛未為不可若欲現證圓通成常住果則能感所感性自懸殊故末句揀之也問勢至都攝六根淨念相繼則耳根亦在其中何乃並揀答勢至雖都攝六根却不以根性為入門及取念佛求生已落行陰故在所揀正脈云通論二十四聖深證必等觀音而原其入門略有四義當揀一者不對方宜二者不便初心三者別有資藉四者非常修學反顯耳根對方宜便初心不勞資藉通常可修至下偈中自見通揀餘門竟三獨取耳根四一正對方宜二不勞資藉三可常修學四最便初心初三一對方定宜二歎人顯法三斥迷教修初我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入既揀餘門宜定本根故重以啟白世尊欲定本根須對方宜故先言佛出娑婆準維摩經或有佛土以佛光明而作佛事或有佛土以佛菩提樹而作佛事乃至或以圓林臺觀或以虗空影嚮或以音聲語言或以寂無言說各隨方宜教體不同今就娑婆言之故云此方教體而言真者以是三根普被合界咸宜揀彼偏對一機不名為真故清淨在音聞者三真實中一有不備則非清淨以有礙有局則濁而不清有生有滅則染而非淨故據此則音聞二字乃取對音之聞以惟音無聞非真教體故前陳那聲塵已在所揀欲取三摩指初心習定之人實以聞入者確指耳門獨為娑婆本根捨此則三摩難成故問能詮教體門中首取聲名句文今何偏取聞性反遺音聲莫是清涼圭峯猶未識楞嚴旨乎答清涼立教體為十門前劣後勝音聲既列於首已顯非真至圭峯束為四門而聲名句文但是隨相門中一義然既曰隨相知是權宗假立唯識似真歸性分真必是無礙乃為究竟真實教體今聞性具三真實正是無礙則文殊所選與清涼圭峯若合符節故無妨偏取對方定宜竟二歎人顯法二一歎人殊勝二顯法真實初離苦得解脫良哉觀世音於恒沙劫中入微塵佛國得大自在力無畏施眾生妙音觀世音梵音海潮音救世悉安寧出世獲常住初自利圓滿解六結越三空二死不繫故曰離苦超世間并出世一切無礙故云得解良有二義一誠也乃指實之詞如云離苦得脫誠哉不虗者唯觀世音耳二善也乃讚美之語如云善哉觀音其自利已若此矣於恒下利他殊勝正脈云劫數恒沙則時為極長顯常也國數微塵則處為極廣顯徧也得大自在義攝三十二應及第一不思議德以三十二應後有無作妙力自在成就之語第一不思議後有救護眾生得大自在之言無畏施生義攝十四無畏及第二不思議德以十四無畏後有施無畏力福備眾生之語第二不思議後有能以無畏施諸眾生之言妙音二句乃足上三十二應及前二不思議中說法說呪之音以上言入微塵國似有現身現形之義却無說法說呪之音今乃補足以顯身說並示妙音者同體形呪一音而含眾妙觀世音者異體形呪觀世而現殊說三十二應破他障而現梵音應說即說不失時而稱海潮十四無畏惟是冥應故不配音也準普門品更有勝世間音乃總上四音顯世音莫及今舉別略總耳救世二句義攝後二不思議德以世人慳貪積聚患得患失妻子長壽所求不遂皆致不安而第三不思議中破慳感求第四不思議中有求皆遂則救世悉安寧至云求大涅槃得大涅槃則出世獲常住也此皆觀音自陳中意文殊錯落言之欲令求圓通者仰慕其人而法之也歎人殊勝竟二顯法真實三一圓真實二通真寶三常真實初我今啟如來如觀音所說譬如人靜居十方俱擊鼓十處一時聞此則圓真實我者文殊自謂啟如來者欲顯真實求佛作證故次句言欲求真實本根誠如觀音所說是文殊先以總許非指下偈以下偈所說非觀音自陳中意故譬如一偈乃文殊取前耳根功德中如耳周聽十方無遺之義以顯圓真實義也權借聞鼓一事以例聞一切聲故云譬如靜居者揀非閙時以閙時聞雖常圓不自覺故正脈云十方俱擊鼓者一時同擊也十處一時聞者聞無先後也末句乃就此以尅定其為圓且是真圓實圓非虗妄說圓者可比擬故二通真實目非觀障外口鼻亦復然身以合方知心念紛無緒隔垣聽音嚮遐邇俱可聞五根所不齊是則通真實初揀五根皆局目指眼根非觀障外者如隔窗紙不見外之物色隔皮膚不見內之臟腑是局而非通也口鼻亦然者但例其局而非通非例其不見障外故孤山謂口鼻二句語倒若將下句為上其義方順以三者俱是合中知故隔離不通亦名為局又口字應是舌字以舌在口中用口代稱故心指意根恒審思量略同意識故名為念如前云知根雜亂思是也紛無緒者被念所雜唯覺生住異滅紛然無有頭緒如前云湛了終無見是也如是則想念尚不能脫豈能通乎隔垣下顯耳根獨通隔垣聽音嚮者如中隔墻垣聞環佩聲是障不能局遐邇俱可聞者如動若邇遙靜無邊際是離亦能通障不能局則眼根莫比離亦能通則三根莫配且靜無邊際不同意根湛了無見故五根所不齊也據此則五根皆局唯耳獨通是通可謂真且實矣三常真實音聲性動靜聞中為有無無聲號無聞非實聞無性聲無既無滅聲有亦非生生滅二圓離是則常真實縱令在夢想不為不思無覺觀出思惟身心不能及初對聲顯常此取擊鐘驗常中義音聲性動靜者如前羅睺擊鐘正擊之時則音聲性動擊久聲銷則對動說靜是唯一聲性形顯而有動靜相故聞中為有無者謂動靜二相於聞性湛然體中循環代謝動則歷然有聲為有靜則寂爾無聲為無世人顛倒不知此義因於無聲之際則號無聞殊不知無聲之時更覺聞性無邊無際故曰非實聞無性也聲無二句謂如上所說聲無之時聞性既無有滅例知聲有之時聞性亦非有生是知聞性湛然以任聲有聲無而自體了無生滅既了無生滅是二相圓離揀非對斷說常為虗為妄故曰常真實也縱令下就夢顯常此取引夢驗常中義言世人不知聞性常住將謂夢想之境唯是獨頭意識所現於彼外境全無所思自應全無所聞聞性應滅殊不知縱令在於夢想於外境全無所思而此聞性亦不為彼無思即便滅無如前夢人聞舂擣聲惑為鐘鼓自怪其鍾為木石嚮據此則夢想之時依然因聞有思所謂無思者但是無境可聞豈是聞有滅耶末二句預防疑問恐承上問云塵識不常姑置勿論至於七大五根豈盡不常乃獨許聞性自得常義故文殊以下偈防之言七大皆屬覺觀如前云若以地性觀等可知既屬覺觀乃出自意識思惟全墮生滅豈是真常至於身之覺性心之知性皆不及於夢中以真能覺知即不成夢故眼等三根例此可知故不更言是則五根亦非真常明矣通論三種真實略有三相可喻圓真實如杲日當空萬象俱照通真實如無熱分流四河徧利常真實如太虗無形三際莫壞由此故能三根普被合界咸宜而為真實教體歎人顯法竟三斥迷教修今此娑婆國聲論得宣明眾生迷本聞循聲故流轉阿難縱強記不免落邪思豈非隨所淪旋流獲無妄初顯耳根偏利承上既具三種真實便可依修況今娑婆國中凡有理事皆以音聲言論而得傳宣發明則耳根偏利可知眾生下斥迷聞循聲言既耳根偏利一切眾生皆應從此悟入所以不爾者皆由眾生自迷本有真聞一味循聲流轉不唯眾生即如阿難縱有強記不免循聲流轉落於邪思阿難且爾他可知矣末二句教亡所入流言眾生與阿難所以不能開悟者豈非隨彼所緣塵相自成淪溺想必是也既知必是則應亡其所相旋彼流轉之性還復真聞便可以漸次增進而獲真實無妄性矣正對方宜竟二不勞資藉四一誡聽出名二指過勸修三顯法要妙四結示不資初阿難汝諦聽我承佛威力宣說金剛王如幻不思議佛母真三昧首句呼其名而誡之曰汝今果欲旋流應當諦聽我語次句下言旋流之法不易可說汝果諦聽我當求佛加被乘仗佛之威力為汝宣說汝亦當生難遭想也所說旋流之法略具五名一曰金剛三昧謂以此斷惑無惑不斷故二曰王三昧謂以此降魔無魔不降故三曰如幻三昧謂依此修行修即無修故四曰不思議三昧謂依此顯理理絕言思故五曰佛母三昧謂依此成佛佛無不成故具此五義名真三昧以不勞別有資藉故二指過勸修汝聞微塵佛一切秘密門欲漏不先除畜聞成過誤將聞持佛佛何不自聞聞首二句出因法華經佛云我與阿難同於空王佛所發心我常勤精進阿難常樂多聞據此則阿難從空王已來所遇之佛數等微塵一一佛所皆以多聞之力護持法藏故曰聞微塵佛一切秘密門也秘密有二義一別指深法意顯深法尚聞況復淺者顯無法不聞故二通該淺深意顯一聞異解彼此不知互成秘密故次二句指過先字宜作早字言阿難位在初果方斷見漏欲漏全在至究其所以不能早除之故只為一向畜積多聞循塵流轉而為過誤是知不解旋流不唯聞於世法乃至聞於佛法不唯聞於佛法乃至聞於秘密深法皆為循塵流轉總是畜聞成過誤也末二句勸修言既知畜聞成過與其將耳聞以持諸佛佛法何不以耳聞以觀自己聞性不幾猶為要妙乎三顯法要妙三一法說二喻明三結合初聞非自然生因聲有名字旋聞與聲脫能脫欲誰名一根既返源六根成解脫見聞如幻翳三界若空華聞復翳根除塵銷覺圓淨淨極光通達寂照含虗空却來觀世間猶如夢中事摩登伽在夢誰能留汝形初一解六脫此顯要義聞非二句言元一精明本無妄聞而妄聞非自然生乃是因於聲之動靜黏湛發聽攬聲成根而有聞之名字是動靜根之三結具矣旋聞二句言若能旋觀聞性自應亡其聲塵故云與聲脫也聲塵既脫動靜雙亡而能脫之根性不復名聞故曰欲誰名也欲誰名其為聞應無可者是動靜根之三結解矣一根二句言一根既已返本還源覺性現前不復循塵結根則六根俱成解脫如後云塵既不緣根無所偶反流全一六用不行是也見聞下從體現用此顯妙義見聞四句乃重明上意以起下淨極光通之義言本一精明起於虗妄見聞如依淨目起於幻翳相似由於虗妄見聞變起三界依正如因幻翳變起空華相似今聞性既已復還本源六根俱脫是幻翳之妄根除矣幻翳既除空華不有是三界之妄塵銷矣根除而性無偏局塵銷而體無垢染故曰覺圓淨也淨極二句言雖覺得根除為圓塵銷為淨但既有能覺所覺還名為結是雖曰圓曰淨而未至極圓極淨蓋必至覺所覺空空所空滅寂滅現前乃為極淨淨極而光自通達乃為極圓其猶雲開月現光照萬方合前一根返源六根解脫觀之彼為要之至此為妙之至也寂照句言所謂光通達者以此光乃即寂而照稱性含虗圓通極致盡於是矣却來下涉世無礙却猶退也言既得全體復獲大用則是已齊佛果若乃不欲取證乘願涉世是曰却來謂却退而來涉世度生也已越三空依三空而觀世全有全空故曰猶如夢事識此意者則終日度生不見有生可度矣摩登二句乃激發阿難之語言汝當時若能如此觀世則摩登伽女居然為在夢中之人而先梵天呪亦只是夢中之語夢中之人不能交夢外之形夢中之語不能牽夢外之心縱欲留汝之形誰其能哉然往者不諫來者可追自後其知勉夫二喻明如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性巧幻師喻真性以真性有隨緣之用如世幻師有工巧之術故男女喻賴耶以賴耶乃真妄和合如世男女有和合義故以是隨緣而成故喻以幻作諸根喻賴耶見分結六根而分為六性映六塵而名為六精故以動義喻之一機指所幻男女中有消息喻賴耶真妄和合中有動相動相纔起見分俄興如彼所幻男女消息一抽諸根俱動也息機喻旋聞返源旋聞返源賴耶不動故以歸寂喻之既已息機歸寂則所幻諸根及所成幻事俱時銷歇故曰諸幻無性此喻賴耶不動見分斯寂根除塵銷覺體圓淨如前云見與見緣并所想相如虗空華本無所有是也三結合六根亦如是元依一精明分成六和合一處成休復六用皆不成塵垢應念銷成圓明淨妙餘塵尚諸學明極即如來首句言六根中性亦如幻人之諸根是也精明即是賴耶依真而起合上喻中男女乃幻師所作故依此分為六性和合根塵故曰成六和合此六和合由於賴耶一動合喻中男女根動由於一機抽故一處成休復者旋聞返源賴耶不動合喻中所幻男女息機歸寂然也賴耶不動見分斯寂故曰六用不成前云想相為塵識情為垢今既六用不成則想所依相不有想所依相不有則識所依情安寄故曰塵垢應念銷也所依之相情既銷能依之識想亦復不立此正合喻中諸幻成無性耳後三句喻中無文不必強合圓明淨妙即是精明覺體前但以不受根局名之為圓此復以不受塵蔽名之曰明又前但以塵銷無染名之為淨此復以識盡想空名之曰妙麤相三結已解細相三結未盡故曰餘塵言餘有微細結相如空中塵前疏所謂未至極圓極淨者以此諸語詞言既有餘塵還須崇尚於學進解後三結也明極者寂滅現前淨極光通之義即如來者雖非歷事造修悟證已齊佛果按法說中此下更有涉世無礙之義乃為激進阿難而發合中不出勿煩強贅顯法要妙竟四結示不資大眾及阿難旋汝倒聞機反聞聞自性性成無上道圓通實如是既示要妙欲令修習呼大眾及阿難以教之也遇聲便發曰聞機一向循塵名為倒旋猶轉也謂旋轉顛倒聞機莫更循塵也反聞聞自性者謂欲旋顛倒聞機唯用反聞工夫以觀能聞自性無勞別資異路此修因不資也性成無上道者謂聞性不發則已一發則因該果海即就此性可以成無上道以性即是道無庸更資餘法此證果不資也末句結示言修因證果所以二俱不資者以聞性既圓且通二真實力能如是故不言常真實者以力在下科也通上不勞資藉竟三可常修學三一明可常修二顯符佛敕三揀餘非是初此是微塵佛一路涅槃門過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法我亦從中證非唯觀世音初二句總標微塵佛者通約三世諸佛因中皆依耳根修習故曰一路果中皆依耳根取證故曰一涅槃門以一字雙通路與門故過去下別明言過去如來已得成佛是斯門已成就者現在菩薩雖未成佛今依此各入圓明圓明者淨極光通或現在取證即現在佛或却來度生亦未來佛未來學人如是修習決定成佛故當遵依然既三世通修信知功由性常所謂常真實力也末二句證信我亦從中句是文殊引己作證非唯觀音者顯觀音菩薩又為從前之過來人也意言觀音與我皆驗有成效況未來學人豈不益當遵信又二句語似倒置若易下為上讀之則順二顯符佛敕誠如佛世尊詢我諸方便以救諸末劫求出世間人成就涅槃心觀世音為最初按定佛敕誠猶果也據前佛勅揀選文云我今欲令阿難開悟二十五行誰當其根兼我滅後此界眾生入菩薩乘求無上道何方便門得易成就然既曰二十五行誰當其根又曰何方便門得易成就是令其於諸方便中揀取一門為通常可修法也既曰兼我滅後此界眾生是欲以救諸末劫生死凡夫令出離也既曰欲令阿難開悟而阿難不無等類是欲以救諸求出世人令進斷思惑也既曰入菩薩乘求無上道是欲以救諸二乘起成就涅槃心者令回小向大也今文殊按定其意曰若果如世尊詢問於我於諸方便中揀取一門用以救諸末劫凡夫并阿難等之求出世人及無學中之成就涅槃心者是誠難矣末句顯其允符言既蒙佛勅敢不留意我今詳觀於二十五聖之中唯觀音耳根允符佛勅獨為最善三揀餘非是自餘諸方便皆是佛威神即事捨塵勞非是常修學淺深同說法自餘諸方便者謂自觀音耳根之外餘二十四聖所修諸方便門也皆是佛威即事等者正脈云謂佛以威德神力就其所遇之事而加被之令其捨離諸塵勞也非是常修同說等者謂通常可修之法任運修習自能入圓不須仗佛威神既仗佛威神則非常修學矣淺深同說之法一同而說便足解縛不須各即其事既各即其事則非同說法矣若尅就諸門中明佛威即事者佛威加被如那律失明佛示樂見槃特闕誦佛教調息等即事捨塵如烏芻多淫佛教觀火孫陀心散佛教觀鼻等人不盡皆如此故非通常可修且說此等法亦唯對於淺修深位則不相宜至如普賢大因滿慈宿辨等又惟宜於深修淺位則不相當故非同一可說反顯通常可修淺深俱宜唯一耳門捨此雜修圓通難入圓根與不圓根日劫相倍可不辨哉問不勞資藉中疏云不言常真實者力在下科似乎此科惟是常義若論三世通修可說由於性常至於通常可修淺深同說明是兼圓兼通豈惟常耶答圓通常三唯是一體說圓則通常皆圓說通則圓常皆通說常則圓通皆常今以常圓常通故橫竪皆可通修可常修學竟四最便初心頂禮如來藏無漏不思議願加被未來於此門無惑方便易成就堪以教阿難及末劫沈淪但以耳根修圓通超餘者真實心如是文殊揀選至此一拜而起曰頂禮如來藏無漏不思議此二句即歸命三寶義也三寶有二釋一約別相二約自性約別相者如來即佛佛寶也藏謂藏心法寶也無漏不思議意指圓通諸聖僧寶也言無漏者據迹指在聲聞於小乘中見思盡故言不思議者據迹指在菩薩神用莫測離言相故若依深本菩薩亦皆無漏帶果行因故聲聞亦不思議內秘菩薩故約自性者空如來藏彌滿清淨自性佛也不空如來藏具恒沙德自性法也空不空如來藏和合無諍自性僧也清淨無染故無漏性德交徹故難思即無漏而難思即難思而無漏故不可議是乃歸依自性三寶又各就其義而讚美之然別相事也自性理也理事雙歸方成感應願之一字自述歸命意也加被未來者事三寶則留願住持引生正信理三寶則同體內熏資發圓悟正信生而隨相反聞不惑無功圓悟發而入理修道不惑難成故云於此門無惑也方便易成就者以具圓通常之三真實故阿難多聞耳根偏利故堪教此答如來欲令阿難開悟二十五行誰當其根問也娑婆世界聲論宣明雖至末劫沈淪亦唯耳門堪教此答滅後眾生何方便門得易成就問也但以句顯其決定有功圓通句教以勿惑餘門此斷疑也良以耳根聞性具三真實真實心力固應如是此生信也按阿難位在初果沈淪尚未發心既唯此堪教則最便初心明矣總結佛示一門深入竟三會眾承示獲益四一相似解發二圓悟根性三乘悟盡思四發心立行初於是阿難及諸大眾身心了然得大開示觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路了然者無罣礙義此近承揀選獲益言阿難大眾於文殊正揀選時澄神諦聽思覺雙亡形神俱化故於身心了然無罣礙也得大開示乃通承佛示一門深入義來始而分門定義繼而驗證釋疑又繼之而綰華巾示倫次勅文殊選本根言盡理圓故開示云大也自是觀佛菩提智果涅槃斷果修習有法入證有由故取喻以發明之猶如有人喻阿難及眾最初一念未動時也一念未動常住自性菩提性淨涅槃如守故鄉瞥而隨無明緣背覺合塵即同因事遠遊久在輪迴不能反妄復真即同未得歸還今者得大開示相似解發雖未得入圓通已知解結次第智斷二果信知當成故以明了其家所歸道路喻之二圓悟根性普會大眾天龍八部有學二乘及諸一切新發心菩薩其數凡有十恒河沙皆得本心遠離塵垢得法眼淨普會大眾句總標多眾也天龍八部等別明品類也天龍八部應是利根凡夫有學二乘應是不定初心發心菩薩應是圓人初機此等現位雖淺宿因實深約皆惑輕智明較勝於阿難等者數比恒沙已云多矣況復至十彼此不相妨礙不思議境不獨為華嚴有耳一聞便悟故云皆得本心本心者即六根門頭圓湛不生滅性也既得此性則逈脫根塵靈光獨耀故曰遠離塵垢得法眼淨前云想相為塵識情為垢二俱遠離法眼應時清明即同此義三乘悟盡思性比丘尼聞說偈已成阿羅漢性是登伽華言出家名比丘尼也先以聞呪銷愛得證三果此以聞偈開悟乘悟頓斷殘思故云成阿羅漢然既悟即兼證較上猶勝一籌況佛前已許云或得出纏或蒙授記則羅漢亦暫時階級耳四發心立行無量眾生皆發無等等阿耨多羅三藐三菩提心前云十恒河沙尚可名狀今云無量則不可名狀益顯其不思議矣等階級也言理既頓悟乘悟併銷不須更歷階級故曰無等事須漸除因次第盡要必於無階級中而立階級故曰無等等據此乃是發從性起修期證無上正等正覺之心性比丘尼又非其類科名發心立行實見乎此言無上者即阿耨多羅之華言正等者即三藐之華言正覺者即三菩提之華言從古解釋大同小異今以揀凡夫名正覺以凡夫不覺設或有覺亦多流於邪見不得名正二揀乘名正等以二乘雖能自覺不能覺他無平等心設學平等亦墮偏空不得名正揀菩薩名無上以菩薩雖自覺覺他俱得其正又皆分而未圓不名無上唯佛俱圓故稱阿耨多羅總結選根直入一大科已竟二道場加行佛世機熟聞之即能悟入縱或不能而相似解發已知解結次第再蒙佛加隨便可修此科蓋為末世而設觀下云去佛漸遠邪師說法等可知三一先教遠魔除習二正示結壇行道三兼彰秘密神力初二一阿難代後啟請二如來略示其法初三一經家敘意二阿難自陳三慮後代請初阿難整衣服於大眾中合掌頂禮心迹圓明悲欣交集欲益未來諸眾生故稽首白佛整衣表敬合掌秉心頂禮欲請也心迹者修心之迹如六結三空皆有踪迹可據故始終備悉故曰圓明即上云明了其家所歸道路義也得路未歸故悲到家有望故欣雖有望而未歸雖未歸而有望且欣且悲且悲且欣故曰悲欣交集侍佛有年幸聞深法去聖時遙難聆至教言念及此興心兼濟故云欲益未來諸眾生故由此所以稽首再拜而啟白於佛也二阿難自陳上云稽首白佛此即所白之語大悲世尊我今已悟成佛法門是中修行得無疑惑常聞如來說如是言自未得度先度人者菩薩發心自覺已圓能覺他者如來應世我雖未度願度末劫一切眾生初自陳無疑欲救末劫故稱大悲世尊相似解發便覺與尋常不同故云我今已悟成佛法門觀音既已詳陳又經文殊揀選是中修行漸次歷履可據故曰得無疑惑經家所謂心迹圓明是也常聞下述聆素教欲學菩薩須遵佛語故自述素常所聞如是言即指下之所說為度眾生願在生死故云自未得度已盡生界方取菩提故云先度人者不同果後興悲故是菩薩發心以盲引盲恐不相宜故須自覺已圓到岸得舟方堪濟溺故云能覺他者此乃從體起用故是如來應世我雖下願學菩薩佛果未能遽至菩薩願以勉學故云我雖未度願度末劫等也三慮後代請世尊此諸眾生去佛漸遠邪師說法如恒河沙欲攝其心入三摩地云何令其安立道場遠諸魔事於菩提心得無退屈此諸眾生即指末劫眾生去佛漸遠則護念緣疎邪師說法則惑亂緣親如恒河沙則徧滿寰中舉世受惑前云願度末劫者慮在是耳然既魔強法弱攝心誠難況復入三摩地談何容易設有欲攝其心入三摩地者必令安立道場遠諸魔事方能於菩提心得無退屈但不知云何能爾此阿難代請之深意也阿難代後啟請竟二如來略示其法二一讚許欽承二正示其法初爾時世尊於大眾中稱讚阿難善哉善哉如汝所問安立道場救護眾生末劫沈溺汝今諦聽當為汝說阿難大眾唯然奉教初重讚善哉正脈云重讚者一善其發利他心得菩薩正行二善其請道場意得利他法要也如汝下依問誡許如汝所問等按定所問之意救護沈溺即是遠諸魔事良以魔強法弱易入難出如沈溺故汝今句誡聽當為句許說可知唯然下會眾欽承唯然者應之速而無疑奉教者遵之至而不逆即欽承意也二正示其法二一教以持戒遠魔二令其誦呪除習初三一總引三學二別明持戒三結示遠魔初佛告阿難汝常聞我毗奈耶中宣說修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學毗奈耶律藏通名義詳懸示正詮戒學兼詮定慧故三學俱在毗奈耶說萬行雖多三學攝盡決定當依不可有違兩乘俱說故得常聞所謂者指釋之詞謂指下以釋上也攝心為戒意揀小乘以小乘但能執身則名為戒故灌頂云因戒生定者心攝動少漸向於定如風止息波浪自停故經云尸羅不清淨三昧不現前因定發慧者緣心盡極寂照含空如水澄湛映現發光故經云無礙清淨慧皆依禪定生三者皆能盡漏故稱三無漏學二別明持戒入流亡所以至聞所聞盡則是因戒生定覺所覺空以至寂滅現前則是因定發慧前已詳明故此處唯明攝心為戒四一婬戒二殺戒三盜戒四妄戒初梵網以殺戒為首以殺生違慈非菩薩行故此經以淫戒居初以婬欲障定非圓通機故四一首陳持犯利害二預辨魔佛教儀三確定菩提成壞四結判依違邪正初二一斷淫必出生死二不斷必落魔道初阿難云何攝心我名為戒若諸世界六道眾生其心不淫則不隨其生死相續云何句是預以總徵之語言戒有多目略輕取重亦應攝四今唯言戒故云總也當另為一科以文少不便寄屬於此若諸下乃別明本科中義世界者三世十方六生者二道善道有三惡道有三男女其心不淫者不惟執身不行亦兼制心不起如此則不隨生死者以婬欲為生死本故後文云欲愛乾枯根境不偶現前殘質不復續生可證斯義二不斷必落魔道汝修三昧本出塵勞婬心不除塵不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女彼等諸魔亦有徒眾各各自謂成無上道初明不出塵汝修二句言正當修三昧時理觀相應內脫身心外遺世界塵勞無所由起故云本出淫心二句謂設若淫心不除則是塵勞還在理觀稍虧瞥爾便起故不可出又淫欲為塵勞上首上首既在流類從生豈能出乎縱有下預防謬辨恐謬辨云此上所說似約智慧不足禪定不得力者言之若果是多智之人正行之時了知欲性本空禪定得力者事畢之後工夫即能現前若此則雖不斷淫何關塵勞而言其不能出耶義學狂慧宗徒盲參類多此計故如來以縱有多智等防之多智者或由來根利或尋教而發定現者或亡所境寂或理觀相應此二皆為善境設如不斷淫心皆為魔業故上云縱有智定此云必落魔道據此則執性空而說欲無妨恃能定而言淫無礙者是反為智定所誤矣問不落餘道者何也答因果不類故良以魔界欲勝唯淫者樂趣但以福強心靈非禪智不能便生今以禪智而助淫心故必落魔道無疑如陰魔中行空禪者却留塵勞多增寶媛是也正脈云上中下者隨福厚薄以為階降耳愚謂魔王者謂欲頂天主禪智勝於淫心所感魔民者魔王所屬禪智與淫心正等所感魔女者王民所御淫心勝於禪智所感彼等下成慢不歸諸魔亦有徒眾者以世間愚迷不辨邪正傾心歸依遵為師承如西域九十六種此土異教旁門皆魔徒也各各自謂等者我慢成習非果計果如受魔文云其人亦不覺知魔著自言謂得無上涅槃是也首陳持犯利害竟二預辨魔佛教儀二一魔教貪淫誤世二佛教斷淫成定初我滅度後末法之中多此魔民熾盛世間廣行貪淫為善知識令諸眾生落愛見坑失菩提路我滅二句顯去聖時遙邪師說法如恒河沙故云多此魔民此亦多緣生受其惑死為魔屬如受魔文云命終之後必為魔民是也熾盛世間者羣魔競起為害生民如火熾然盛發舉世盡受其焚故後想魔文云如是邪精魅其心腑近則九生多踰百世令真修行總為魔眷廣行貪淫等者謂魔師魔弟淫淫相傳反以廣行者為知識故後想魔文云讚歎行淫不毀麤行將諸猥媟以為傳法令諸眾生等者以淫愛為諸愛中最邪見是諸見之總而彼既以貪淫為教則是令人落愛且又以邪見為知識則是令人落見沈溺其中不能自出故喻之以坑如後云菩薩見欲如避火坑佛目惡見同名見坑是也違遠圓通背涅槃城故云失菩提路二佛教斷淫成定汝教世人修三摩地先斷心淫是名如來先佛世尊第一決定清淨明誨汝教世人者是佛勅阿難於末世度生時教道世人依佛誨違魔行也修三摩地必先斷淫者以淫為定障故而言心淫者以大乘不專制身必心滅乃成真斷也是名句顯依此乃名佛誨若如前即屬魔行耳如來即指今佛先佛世尊乃指過去所謂今佛如是說過去先佛已如是說尤見其可信也第一者居四重之首決定清淨者顯不可有犯明誨者明明教誨佛既明明教誨為佛弟子者可弗遵歟預辨魔佛教儀竟三確定菩提成壞二一不斷菩提必壞二斷婬菩提乃成初是故阿難若不斷淫脩禪定者如蒸砂石欲其成飯經百千劫只名熱砂何以故此非飯本砂石成故汝以婬身求佛妙果縱得妙悟皆是淫根根本成淫輪轉三途必不能出如來涅槃何路修證初取喻以顯是故阿難者承上佛教斷淫之故呼當機再告之也若不斷婬等者謂設若故違佛勅不斷心淫縱修禪定皆資魔業以喻言之當自見其誤矣蒸砂欲其成飯喻淫身求佛妙果經劫只名熱砂喻妙悟總成魔業以魔業乃積淫所致如熱砂乃蒸砂所成故徵起可知釋中謂縱此熱砂亦非飯本以本來原是砂石所成喻魔業非是佛因以是積淫所致故汝以下以法貼合汝以淫身等者謂設汝不斷心淫以淫身而求佛妙果如彼蒸砂欲其成飯相似縱得妙悟等者謂縱經多劫修習得妙開悟皆為魔業如彼經百千劫只名熱砂相似不云魔業而云淫根者以魔能成就淫事即是淫根故根本成淫等者謂既是淫欲根本自能展轉成淫由此惡業日積必至輪轉三途不能出離人身尚難可得況欲脩證佛果故斥以如來涅槃何路修證涅槃如如理也菩提如如智也理既不證智則不圓故科云菩提壞耳二斷淫菩提乃成必使淫機身心俱斷斷性亦無於佛菩提斯可希冀淫機者欲念一萌時也當此之時先以執身令身不行次以執心令心不起故曰俱斷非此不能契果故曰必使斷性亦無者謂若有能斷及所斷性猶是勉強遏捺執持稍虧瞥爾便起如石壓草如繩縛賊非為真斷故必至斷性亦無謂化多淫心成智慧火不須更用執持自然無犯如草已枯不壓而自不生如賊改業不縛而自不去也因戒生定因定發慧定慧均等任運流入故云於佛菩提斯可希冀然上科云涅槃此科云菩提者謂理智一如互影說故確定菩提成壞竟四結判依違邪正如我此說名為佛說不如此說即波旬說此科雖為結判之語亦是指示阿難對辨魔佛之法如來意謂汝前所謂末世眾生去佛漸遠邪師說法如恒河沙者蓋恐邪說亂正魔佛難辨故我上來已為汝等詳辯魔佛教儀將來末世眾生設有如我此說修三摩地先斷心淫等者則名佛說當急從之設若不如此說廣行貪淫為善知識等者即波旬說宜深絕之波旬者魔之異稱此云殺者謂惱亂正修傷法身害慧命故此上淫戒竟二殺戒四一首陳持利害二預辨鬼佛教儀三確定解脫得失四結判依違邪正初二一斷殺必出生死二不斷必落神道初阿難又諸世界六道眾生其心不殺則不隨其生死相續灌頂云諸佛設化慈悲為本菩薩利人救度為先豈可害物傷慈殺生結怨故次戒殺生其心不殺者不自殺不教他殺并見殺隨喜亦離也又此亦是舉輕況重以心且不殺何況身臨殺事自應永斷前云汝負我命我還汝債以是因緣經百千劫常在生死是知殺生一事結怨連禍足以招致生死故不殺則不隨也二不斷必落神道汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎彼諸鬼神亦有徒眾各各自謂成無上道初明不出塵不除不出者殺心屬貪仍復兼瞋亦塵勞本故縱有下預防謬辨恐謬辨云多智之人了知殺性本空禪定得力殺過即能現前似無關於塵勞聰明長者作家居士喫得肉已飽來尋僧說禪者類多此計故如來亦以縱有多智等防之神道血食以殺業為墮緣神通福德以禪智為生因今以禪智助殺故必當墮落神道上品之人禪智勝於殺業神通既大福德又勝故為大力之鬼對下中品應是天行藥叉及諸鬼主如嶽神琰魔之類中品之人禪智與殺業正等神通福德既次於上故為飛行夜叉諸鬼帥等飛行即是空行鬼帥即是鬼主將佐如山林城隍及牛頭獄卒之類下品之人禪智劣於殺業神通既微福德亦劣故為地行羅剎如彼噉人精氣食人血肉及諸癘鬼魘鬼魅鬼魃鬼等皆是也彼諸下成慢不歸神通惑人殺生奉祀貪求靈驗傾心歸依故彼亦有徒眾預知休咎所言必應不自忖量謬起佛慢故云各各自謂成佛上道每見世之邪宗自稱證果恬不知懼其亦鬼力使歟首陳持犯利害竟二預辨鬼佛教儀二一鬼教食肉無礙二佛教斷殺成定初三一正明鬼教二預防問難三痛斥其非初我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路佛滅法末世衰道微時也世衰道微人多索隱行怪故鬼神熾盛或托廟祀顯靈或附人身現異如世之婬祀靈巫何莫非鬼神所作使也自言食肉者令人殺生奉祀以恣饕餮且言得菩提路令人倣行墮鬼以援黨與諺云酒肉穿腸過佛在心頭坐真鬼語也二預問難阿難我令比丘食五淨肉此肉皆我神力化生本無命根汝婆羅門地多蒸濕加以砂石草菜不生我以大悲神力所加初防許食淨肉難恐有難云食肉既是鬼教佛教自應嚴戒何故如來亦許比丘食五淨肉故世尊以化生無命防之淨肉者除人蛇象馬驢狗獅狐猪猴餘者不見不聞不疑為我殺者為三淨肉再加鳥殘自死為五淨肉昔於權教許食防意以令食淨肉者由此非是真肉皆我神力化生本無識煖息三連持色心以為命根但如機關木人殺且無礙食之又何傷乎汝婆下防不化穀菜難恐又難云既是如來神力何不化為穀菜而乃化為淨肉反令後之食肉者得以借口豈慈悲者之所為耶故世尊以地多不生防之灌頂云西域五天通稱婆羅門國以是劫初光音天下生之處其人皆屬淨裔故依之名國今言汝婆羅門猶言你們婆羅門國也又汝者除己之言謂佛是示生非關淨裔若不揀除恐生彼類慢故又如來之身非雜食身顯化肉獨為彼故蒸謂過炕濕謂過潤其地亦有不爾故但云多加以砂石者謂不惟多蒸多濕兼之多砂多石由此四緣所以草菜不生防意以設化穀草及於菜蔬反生疑怪而不敢食以反常故緣是佛以大悲憐愍神力加持隨其地之所出而現化之預防問難竟三痛斥其非因大慈悲假名為肉汝得其味奈何如來滅度之後食眾生肉名為釋子汝等當知是食肉人縱得心開似三摩地皆大羅剎報終必沈生死苦海非佛弟子如是之人相殺相吞相食未已云何是人得出三界初承上痛斥言據上所說彼淨肉者乃是因我慈悲化現本無命根假名為肉不過令汝婆羅門國暫得其味以濟饑饉非常法也既非常法但凡有糓菜處即不可行況復如來滅後誰為現化奈之何如來滅度之後乃竟有食眾生肉仍自名為釋子服佛之服壞佛之教所謂師子身中蟲還食師子肉者是也汝等下令知必墮教以汝等當知者欲其將如來語傳示末世急為救正也言此食肉之人謾說不得心開縱使工夫現前暫得心開亦不過似三摩地非得真實正受良以殺貪不除皆為現世羅剎報盡壽終必沈生死苦海永為鬼類非佛弟子以不能超出三界故也如是下示以墮故恐有問云彼既自名釋子佛種已納識田倘遇超脫仍為佛子何言必沈生死非佛弟子得母絕人太甚耶故世尊以相殺相吞等示之言是人與諸眾生互相傷殺互相吞噉如前云羊死為人人死為羊死死生生互來相噉是也相食未已者酬償不休云何出界者決言其不能出耳是知所謂非佛弟子者實彼自絕與佛何與哉鬼教食肉無礙竟二佛教斷殺成定汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨雖已先斷心淫若殺業不除終屬似定故教次斷殺生餘俱準上預辨鬼佛教儀竟三確定解脫得失二一不斷解脫必失二斷殺解脫乃得初是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大叫求人不聞此則名為欲隱彌露清淨比丘及諸菩薩於岐路行不蹋生草況以手拔云何大悲取諸眾生血肉充食初喻顯必失承上佛教斷殺之故重呼當機而再告之不斷殺而修禪不得解脫以喻明之當自見矣譬如有人喻帶殺修禪人也自塞其耳者謂用手塞耳以避聲擾喻修禪治心以避塵勞相侵也高聲大叫偏能聒耳喻殺業不除塵勞偏能熏心既自聒耳恐被人聞更來擾亂故欲求人不聞喻塵勞熏心恐被無常煞鬼所侵欲求解脫也要知塞耳高叫不能令人不聞故為欲隱彌露喻修禪帶殺不能令無常不侵是為求靜愈亂據此則不斷殺生解脫不得信矣清淨下預防謬問恐有問云殺生違慈固應嚴斷若但取其血肉似無傷於大悲云何前於淨肉亦俱遮耶故世尊以清淨比丘等防之清淨比丘及諸菩薩指兩乘持戒人也岐路者分岐小路小路人稀青草易生清淨兩乘者行之尚自留心不忍踐蹋況夫用手拔除益知不可是故壞鬼神村四分所制刈草斫樹涅槃亦訶不惟佛教即孔門弟子亦有啟蟄不殺方長不折者豈非以其有傷天和而欲避之耶是知持禁戒人生草尚不忍殺云何有大悲者乃忍取諸眾生血肉充食雖不自殺亦能為殺者作因宜急斷之勿自疑悞二斷殺解脫乃得二一遇可教機二教以深斷初若諸比丘不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界何以故服其身分皆為彼緣如人食其地中百穀足不離地初斷緣得脫服絲食乳皆為殺緣以取用過分展轉能致殺故服絲食乳大乘或開故單約比丘言之如後建立道場作供務用酥密懸幡豈非絲綿要在心絕殺機則庶幾可耳服字有二義一服著如絲綿等二服食如乳酪等不服者以是殺緣故也絲縷綿絮繒絹紬帛多出震旦諸國故曰東方養蠶煑繭害物傷慈而成皮靴革履襖裘褐毳多出印土諸國故云此土剝皮伐毛損生戕悲所致乳謂牛乳治之成酪再治成酥至極則名醍醐此雖不至殺生過取亦能傷牛況夫奪犢之食以資己身豈慈悲者之所宜乎是故比丘於上絲綿等皆不服著於此乳酪等亦不服食如是比丘必是子縛已斷故云於世真脫雖存果縛不過酬還宿債殘質既盡無復續生故云不遊三界是可見殺緣之當斷矣何以下徵釋引證徵意以但斷殺緣於世真脫事在難信也釋中言絲綿絹帛等雖非全身亦其身之少分服著服食皆能為彼作牽連之緣由此不能超脫彼類引證中如劫初之人體有飛光足若躡雲因食地肥不能升舉後漸食其地中百穀稻梁菽麥黍稷類各不一總名百穀與地牽連緣重由是身漸堅重足不離地然地分無情食之尚難升舉況身分有情服之寧得解脫是知不服者自然能脫乃為可教機矣二教以深斷必使身心於諸眾生若身身分身心二途不服不食我說是人真解脫者既斷殺緣應令進斷殺業故云必使謂定要令其如此決不容犯也身心指此人之身心眾生指有情之眾生若身者或害其全身身分者或壞其支體取其血肉等於此皆不容有犯也身心二途者言眾生身及身分皆身心行殺之途不服不食者不惟身無殺業即心之殺念亦無殺念既無無容更斷亦身心俱斷斷性亦無之意如此則在入塵勞無復牽連乘願彌綸得大自在故云真解脫者問此真解脫與上真脫何異答前是離世而脫此是即世而脫固不同也而云我說者顯其決定無虗以日可令冷月可令熱佛說無有異故確定解脫得失竟四結判依違邪正如我此說名為佛說不如此說即波旬說釋義準上殺戒竟三盜戒正脈云此之偷盜非只竊人之物但言行詐異詃或恐動乃至一念希取利養者皆是也四一首陳持犯利害二預辨妖佛教儀三確定三昧真似四結判依違邪正初二一斷偷必出生死二不斷必落邪道初阿難又復世界六道眾生其心不偷則不隨其生死相續菩薩之行利物忘軀惡事向自己好事與他人設或偷心不除未免損人利己違菩薩行故雖已斷淫殺務令其心不偷不言身者以心且不動何況身臨盜事自應永斷不斷偷則往復徵償續諸生死不偷故不隨也二不斷必落邪道汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魅所著彼等羣邪亦有徒眾各各自謂成無上道初明不出塵正當修三昧時境觀相應塵勞無所由起故云本出若乃偷心不除不過如石壓草理觀稍虧觸境便起八萬塵勞相因而熾如昔有比丘聞蓮華香生染他神呵云何以偷香以著香故結使皆起是知塵勞不可出也縱有下預防謬辨恐謬辨云多智之人了知塵勞本空禪定現前彈指可超無學雖不斷偷塵勞莫繫時節既至要出便出何言不可出耶無恥禪流往往以此飾非故如來仍以縱有多智等防之邪道潛取以偷心為墮緣邪通詃世非禪智不能發今以禪智助偷必當墮落其類上品精靈者盜日月之精華竊天地之靈秀附山托水惑人祭祀邪神類也中品妖魅者盜人物之津液竊山林之氣潤為魍為魎伺便作孽邪鬼類也下品邪人者賦性險曲居心邪僻諸魅所著者為精靈之所附被妖魅之所迷妄言欺世異行惑俗外道類也此等亦由禪智盜業互相勝劣而感上中下異彼等下成慢不歸前前後後展轉相著後後前前展轉稱師故曰彼等羣邪亦有徒眾被著增邪不自覺知端坐受供居然如佛故云各各自謂成無上道首陳持犯利害竟二預辨妖佛教儀二一妖教詃世滋貪二佛教捨身斷偷初三一正明妖教二預防問難三痛斥其非初我滅度後末法之中多此妖邪熾盛世間潛匿奸欺稱善知識各自謂己得上人法詃惑無識恐令失心所過之處其家耗散滅後末法佛法陵夷時也佛法陵夷妖邪得便故多熾盛世間潛匿暗藏也奸欺淫誑也如想魔文云潛行貪欲口中好言災祥變異即潛匿奸欺也信其教化搖蕩其心故於彼稱善知識此邪徒妄稱也其徒既以知識見稱而彼即以菩薩自居故各自謂己得上人法上人即是菩薩以居聲聞上故此邪師自負也無識者世間愚迷詃惑者赫詐誘亂如想魔文云或言如來某處出世或言劫火或說刀兵即詃惑無識也恐令失心者謂驚恐前人令其失於本心亡其正見聞某處佛出則求其誘引聞劫火刀兵則望其救濟傾財供奉甘心不惜故令所過之處其家耗散此正所謂呼諸魍魎請祈福祐豈知夫果是真實終不能免哉二預防問難恐有難云所過之處其家耗散既屬妖教所致佛教自應嚴禁何故如來已向亦教比丘循方乞食豈非令其所過之處其家耗散耶故世尊以我教比丘等防之我教比丘循方乞食令其捨貪成菩提道循方乞食者謂無論精麤但順其方之所有乞而食之趣得支身不妄求不多求離四邪命故云捨貪然貪為煩惱根本根本既捨而枝末不生煩惱既離而菩提可成佛教令其如此豈妖教耗世恣貪者所可擬哉三痛斥其非諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返云何賊人假我衣服裨販如來造種種業皆言佛法却非出家具戒比丘為小乘道由是疑誤無量眾生墮無間獄初承前顯正言如我上說比丘所以不自熟食者乃為成道業寄托最後之身最後之身修道惟餘半世故云殘生既惟殘生住世不久故云旅泊三界正脈云陸宿曰旅水宿曰泊言其在三界中如過客寄宿旅泊尚何心於食哉既無心於食而又乞食者示此來人間乃一往而還之身為斷欲界殘思尚需摶食資養若殘思已盡去已再不復返是則乞食一事亦出於不得已耳云何下斥偽顯非賊人者指出家邪宗以能賊害佛法故也假我衣服者謂身著佛製袈裟裨販如來者謂裨販如來法度裨助也謂著衣以助販也良以不著佛衣不能取信於人販法為難故造種種業者謂詭言異行詃惑人心無所不至故皆言佛法者自謂佛法應爾此正裨販如來非法說法也至於正信出家具戒比丘遵守佛制乞食捨貪而却非毀以為拘泥小節是小乘道此又障礙正修法說非法也首言云何者乃是痛斥之語意言比丘乞食尚出於不得已乃云何竟有此等賊人無間地獄蓋為若輩而設由是下示以誤他謂由是法說非法疑惑無量眾生毀正為邪由是非法說法誤賺無量眾生執邪為正弟子與師同為斷滅佛種捨此身已俱應墮無間獄所謂一盲引眾盲相牽入火坑者此耳妖教詃世恣貪竟二佛教捨身斷偷二一教以捨身酬債二教以斷偷成化初若我滅後其有比丘發心決定修三摩地能於如來形像之前身然一燈燒一指節及於身上爇一香炷我說是人無始宿債一時酬畢長揖世間永脫諸漏雖未即明無上覺路是人於法已決定心若不為此捨身微因縱成無為必還生人酬其宿債如我馬麥正等無異初能捨債畢佛世之人慧深障淺或可捨身或可不捨故特約滅後言之其有比丘等指宜修捨行人也發心者發大乘心決定者決定不移修三摩地者修習耳根圓通以能遙契如來無上菩提清淨涅槃故也梵網云若見新學菩薩應為說一切苦行燒身燒臂燒指若不燒身臂指供養諸佛非出家菩薩故知發心決定修三摩地者宜先修捨行必在形像前者為供養佛故亦為仗承佛力銷宿障故又為求佛證明除現執故執障輕者則身然一燈執障重者則燒一指節謂指頭之一節也執障居中者則爇一香炷大約然燈燒指燒香皆以自己執障輕重而為多少務期銷斷而已設或不能銷斷雖盡燒全身而以供佛佛亦不受徒受極苦空無所益若更為邀名求利是謂重增盜貪則罪惡益甚矣我說者顯蒙佛親印應不虗也無始宿債一時酬畢者謂從於無始以至今生所有宿債未及酬者皆仗佛力加持一時酬畢以其是真精進真法供養諸如來故此約銷障言之我執盡則見思永斷故云長揖世間長揖謂永辭也法執盡則無明亦亡故曰永脫諸漏永脫兼五住也此約盡執言之然雖曰銷障猶仗佛加雖曰盡執唯是體空以未能發妙耳門未得即明無上覺路以無上覺路如五十五位乃圓通以後事故是人於法已決定心者謂自覺障盡執空於諸圓通法門信知必得決定無疑心也若不下不捨必酬不為者謂執我我所不能捨身作供不得佛力加持而言微因者謂對果說因因則微矣以能頓銷宿障得決定心為最大故縱得無為還生人中酬債者以宿障未盡銷故恐有不信故自引往事作證按興起經昔舍衛國毗蘭邑阿耆達王請佛與五百比丘三月供齋時有魔惑王心入宮躭荒五欲供六日止又值邑內饑饉乞食不得時有馬師減馬麥半供佛及僧至九十日王乃醒悟向佛求懺舍利詢緣佛言過去毗婆尸佛時有王請佛及僧佛僧食已為病比丘請一分食過梵志山梵志聞香詬曰此髠頭沙門應食馬麥何與甘饌所教五百童子亦如是說爾時梵志者今我身是五百童子者今五百羅漢是然此但因宿詬佛僧尚不免報何況盜他財物侵彼身分自應酬債要知化佛不屬業生真佛離諸根量喚誰受報蓋為造業眾生示有果報令生恐懼故今引之以證宿債必酬抑亦因此以見捨行之不可不修也二教以斷偷成化汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨若不捨身終還宿債故勅以教世斷偷以斷偷則無債可酬無庸捨身矣言後斷者顯淫為定障殺乃違慈應先斷故是名等者顯如是教化乃合如來清淨軌則而化道得成預辨妖佛教儀竟三確定三昧真似二一不斷終屬似定二斷偷乃稱真實初是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復承上呼名可知不斷偷而修禪終屬似定恐猶未明故以喻顯譬如有人喻帶偷修禪之人巵酒器漏巵喻帶偷之心水喻禪定理水以禪定理水入於帶偷心中望其成就圓通如以水灌漏巵欲求其滿相似隨灌隨漏塵劫終無平復喻隨定隨散禪定終不能成所謂似三昧而非真三昧也二斷偷乃稱真實若諸比丘衣鉢之餘分寸不畜乞食餘分施餓眾生於大集會合掌禮眾有人捶詈同於稱讚必使身心二俱捐捨身肉骨血與眾生共不將如來不了義說迴為己解以誤初學佛印是人得真三昧初遇可教機若諸比丘者謂若於末世有諸比丘也三衣具鉢誠不可少設有餘者雖分寸之微亦不畜積如是之人必不盜他衣物循方乞食趣得支身設有餘分盡施饑餓眾生如是之人必不盜他食物常於大集會中合掌禮拜四眾以深證實相平等人皆是佛如是之人必不損人利己有人嫌其煩凟捶打罵詈歡喜領受同於稱讚以深達怨親一致榮辱無關如是之人必不為己傷他此等皆可教之機也必使下教令深修遇如是機應教深修故云必使身心等二俱捐捨者但是為利眾生不惜勞苦如華嚴行願品云念念相續無有間斷身語意業無有疲厭是也身肉二句乃究極而進教之言不惟二俱捐捨不惜勞苦要必使身肉骨血發願與眾生共之果能如此豈復有為自身而起盜事為自心而萌盜念者哉不將下預防問難恐有問云大乘制心身行似乎無礙小乘制身心動抑又何妨若必令身心俱捐未免執法太嚴恐失接引故世尊以不將等防之言大小兩乘身心偏制皆為不了義教若以此迴護過犯為自己解釋恐初學信以為真反以誤彼故示以不將謂不可將不了義教迴為己解以誤初學人也末二句許得真定佛印者顯不虗故身心俱捐盜業不興一念純真即圓通體以是而修名真三昧佛印其得者良有以耳確定三昧真似竟四結依依違邪正如我所說名為佛說不如此說即波旬說上明盜戒竟四妄戒正脈云妄語有二發言不實為小妄語妄稱證果為大妄語此中所斷者大妄語也四一首陳妄語之害二預辨如來教儀三確定證果能否四結判依違邪正初前三戒皆雙陳持犯利害此中不言持利者有二義一為避重繁故二准上可知故三一躡前標害二列釋言意三結指斷善初阿難如是世界六道眾生雖則身心無殺盜淫三行已圓若大妄語即三摩地不得清淨成愛見魔失如來種如是者總指前三已斷淫殺盜者未了生死總屬世界中人或從天道發心或從人道發心等故云六道眾生身心無殺則慈行成就身心無婬則梵行成就身心無盜則捨行成就故曰三行已圓前皆許其出離生死此欲奪之故置雖則等言若大妄語等即奪其不出生死三摩不清淨者以猶有貪供心故貪久則癡愛日甚妄久則邪見潛生魔得其便飛精附體故致成愛見魔既已成魔不自覺知生同醉夢死從淪溺雖諸佛出世亦難相救永沈生死求出無期故云失如來種二列釋言意所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養初別列其言所謂者指釋之詞謂指下所列釋上大妄語也言所謂大妄語者其語云何即如未得謂得等是未得謂得者謂未得菩提自謂已得菩提未證言證者謂未證涅槃自言已證涅槃後云況復法王如何妄竊乃痛斥乎此或求世間等者謂或復有人不敢以菩提涅槃妄稱但求世間尊為殊勝第一以是之故謂彼現前人言也其言云何謂初於凡夫人中但見初果為上故自謂已得須陀洹果次於須陀洹中又見二果為上故自謂已得斯陀含果次於斯陀含中又見三果為上故自謂已得阿那含果次於阿那含中又見四果為上故自謂已得阿羅漢道次於阿羅漢中又見緣覺獨覺為上故自謂已得辟支佛乘後於小乘之中又見大乘為上故自謂已得十地聖人及地前三賢諸位菩薩後云云何自稱得上人法蓋指斥乎此末二句總釋其意言此人必作如是等大妄語者蓋為求彼前人向自禮拜懺悔以便乘隙開示貪其供養據此則不惟妄語亦兼偷盜故下文名之為一顛迦也三結指斷善是一顛迦銷滅佛種如人以刀斷多羅木佛記是人永殞善根無復知見沈三苦海不成三昧初正指斷善口作妄語意貪供養妄罪兼盜永失善根故云是一顛迦一顛迦亦云一闡提此翻斷善根人也善根既斷成佛無分故云銷滅佛種如人句借喻以明南印土建那補羅國北有多羅林三十餘里樹葉長廣光潤諸國書寫莫不採用其樹若以刀斷不復再生今取之以喻斷善根人銷滅佛種也佛記下以法貼合必言佛記者顯決定無異故永殞善根無復正知正見此正所謂銷滅佛種合上斷多羅木也沈三苦海者沈淪三界生死縱有禪智咸資魔業故云不成三昧首陳妄語之害竟二預辨如來教儀不辨魔教等者以正教既明自不惑於魔等教矣四一佛勅兩乘密化二如勅攝生不泄三防問就便結斥四教以斷妄成化初我滅度後勅諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉佛滅度後魔強法弱故勅菩薩羅漢應身生彼挽末法而扶正教摧邪宗而救眾生也作種種形者隨類現化度諸輪轉者令出生死所謂應以何身得度者即現何身而說法也二如勅攝生不泄或作沙門白衣居士人王宰官童男童女如是乃至婬女寡婦姦偷屠販與其同事稱讚佛乘令其身心入三摩地終不自言我真菩薩真阿羅漢泄佛密因輕言末學初雙現順逆或作等即如佛所勅作種種形也沙門謂出家二眾白衣謂在家二眾居士乃至童女俱如三十二應中說此順行也婬女寡婦如登伽母女類姦偷屠販如鴦崛魔羅類此逆行也與其下同事攝化同事者四攝中一謂逆順染淨等事皆與之同故正脈云若同其類而不同其事則矯拂其心不相順從故假與同事意在得其歡心以便與之稱讚佛乘化其離邪定聚超不定聚成正定聚故曰令其身心入三摩地終不下不自泄言若自言真是菩薩真阿羅漢者必當泄露佛所密勅因由以輕言與末世學者如此則有二失一令妄想求加不務真修二令高推聖境自生鈍置由此所以不自言也三防問就便結斥唯除命終陰有遺付云何是人惑亂眾生成大妄語初防問恐有問云應化聖賢垂教作則既不自泄以何方便啟後世信耶故世尊以此防之言應化聖賢欲啟後世信者唯除命終之際然亦不可明明顯示但於陰密之中有所遺付可耳如豐干饒舌杜順示偈之類云何下結斥言既惟許命終且是陰付云何是人未至命終之際便乃公然自稱真為惑亂眾生成大妄語阿鼻極苦不旋踵而至矣四教以斷妄成化汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨言佛勅兩乘如是汝教世人之修三摩地者於既斷前三之後仍復斷大妄語乃合如來清淨明誨次前為第四也預辨如來教儀竟三確定證果能否二一不斷不能證果二斷妄乃能成就初是故阿難若不斷其大妄語者如刻人糞為栴檀形欲求香氣無有是處我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招紆曲求佛菩提如噬臍人欲誰成就初喻明不能脩禪乃欲成菩提不斷妄乃罪惡之身以罪惡之身修禪而欲成菩提因果不類故以刻人糞為栴檀喻之形像雖似栴檀氣味其實臭惡故欲求香氣無有是處喻帶妄脩禪之人外貌雖似法侶內惑實同魔隊故欲求證果斷不能也我教下痛斥其罪佛意正以不斷妄語不成菩提故自昔華嚴以來已向教諸比丘以直心為道場如華嚴云菩提妙法樹生於直心地淨名云直心是道場無虗假故前云十方如來同一道故出離生死皆以直心等凡此者皆是以直心為道場義也四威儀即行住坐臥一切行即兩乘行門言比丘遵我所教於行住坐臥之中兩乘行門之內有則言有無則言無尚無絲毫虗假云何是人乃故違佛勅自稱得須陀洹等諸上人法其罪惡可勝言哉譬如窮人等乃借喻以顯其罪也三摩未成性德未顯故以窮人喻之性德未顯自稱賢聖故以妄號帝王喻之妄號帝王自取誅身滅門之禍喻自稱賢聖自取阿鼻喪法身斷善法也況復二句乃以輕況重之意言三乘賢聖尚不可盜竊其名況復菩提涅槃乃出世法王之位如何未得謂得未證言證而妄竊其名其罪惡益甚可知因地下結示不能言自稱上人妄竊法王全是虗妄故曰因地不真前云心言直故如是乃至地位中間永無諸委曲相今既因地不真自然果招紆曲如本期成佛而乃流入魔外生遭王法死墮地獄非紆曲而何哉如是之人欲求菩提終不能及故曰如噬臍人噬謂以口咬也口臍相遠欲噬莫及喻因妄果真欲證終不能也縱佛出世亦難接引故曰欲誰成就不斷不能證果竟二斷妄乃能成就若諸比丘心如直絃一切真實入三摩地永無魔事我印是人成就菩薩無上知覺心如直絃者謂心之直如絃之直也夫心為四儀之主心如直絃則四威儀中一切行門皆悉真實所謂永無諸委曲相也入三摩地永無魔事者魔行險邪今心直行真魔不得便故成就菩薩無上知覺者謂魔不能擾成就菩薩圓通心也正脈云菩薩無上知覺即圓通真因地心然以因定果亦是無上菩提確定證果能否竟四結判依違邪正如我所說名為佛說不如此說即波旬說如我所說者謂末世之人若有如我所說三戒之後復教斷妄者即名佛說當急從之不如此說者如言既斷前三妄語可以不斷或言禪智現前妄語似應無礙者即波旬說宜深絕之此如來欲令阿難將如來語傳示末法保護真脩令天魔不得其便也別明持戒竟
