body:
  text: 京都拈華寺賢宗後學達天通理敬述嗣法門人興宗祖旺謄清懷仁祖毓較字二證釋別有結元疑二一阿難別求結元二如來證無他物初三一躡前申理二述迷求元三作禮佇示初阿難白佛言世尊如來雖說第二義門今觀世間解結之人若不知其所結之元我信是人終不能解如來前說第二義門教以從根解結阿難自覺不知結元故置雖言謂雖說無益也今觀世間等正申明無益之理所結之元指成結之元物後文云汝知此巾元止一條是也言解結之人必知巾是一條當於結心解即分散若不知者勢必左右牽掣徒勞無功故曰我信是人終不能解是知所結之元即指真心然亦不離六根中性阿難不知將謂別有故躡前所說義門以申明不知結元之無益也二述迷求元世尊我及會中有學聲聞亦復如是從無始際與諸無明俱滅俱生雖得如是多聞善根名為出家猶隔日瘧惟願大慈哀愍淪溺今日身心云何是結從何名解亦令未來苦難眾生得免輪迴不落三有初舉類述迷無學深位不敢謂其不知故偏舉有學一類如彼解結之人不知結元故云亦復如是從無始際者約今經則妄為明覺約起信則不覺心起時也妄為明覺因明立所業相自是真妄不分生滅與俱故云與諸無明俱滅俱生要知真心即是結元正以無始與無明俱所以迷而不知既不知真徒聞無益故曰雖得如是多聞善根意顯其不能解結修證也既不能解結修證徒稱剃染故曰名為出家以其無出家之實故瘧瘧疾也其疾時寒時熱有日一發者有隔日發者今阿難自以雖斷見惑分證我空而處胎之迷隔陰之昏猶所未免故以隔日之瘧喻之惟願下求示利後真心淪於無明溺於生滅非大聖真慈無能拔濟故惟願大慈哀愍初果已超凡界未及無學前此後此姑置勿論故惟求如來約今日之身心言之言身心現在六根本自無恙佛前教我從根解結但不知云何是結佛其為我言之再結不自起必有所結之元又不知元在何處從何處下手得名為解佛亦為我言之此令既行不惟使現前有學得出淪溺且將傳示末法永濟苦輪故云亦令未來等也苦難眾生即身在輪迴中者以輪迴不出苦難不能免故遒教修習出離生死故云得免輪迴三有即輪迴之處輪迴既免乘願度生自不墮落於其中也三作禮佇示作是語已普及大眾五體投地雨淚翹誠佇佛如來無上開示言請雖局有學意請亦兼法會故云普及大眾良以解結修證雖無學深位乃至圓實菩薩亦所當求也五體投地者四支傾布頂禮佛足也雨淚翹誠者感愧涕泗聳身互跪也佇者候望義無上開示者以下之所說乃十方薄伽梵一路涅槃門故阿難別求結示竟二如來證無他物五一本師憐愍安慰二諸佛現相證示三阿難未明請益四如來解釋除疑五大眾承示開悟初爾時世尊憐愍阿難及諸會中諸有學者亦為未來一切眾生為出世因作將來眼以閻浮檀紫金光手摩阿難頂憐愍阿難及諸有學者以前阿難請求偏為有學人故根結宛然猶自不知從根即解馳心別求故世尊憐而愍之未來眾生即身在輪迴未離苦難中者依法解結可以出離生死故云為出世因此應阿難得免輪迴之求遵教修證可以超脫迷途故云作將來眼此應阿難不落三有之求以手摩頂者攝受安慰亦表下之所說即是最勝頂法兼應阿難無上開示之請二如來現相證示二一諸佛現相二眾生聞證示初即時十方普佛世界六種震動微塵如來住世界者各有寶光從其頂出其光同時於彼世界來祇陀林灌如來頂是諸大眾得未曾有十方佛界六種震動者表此法既行一切有情六結俱可解故一一世界各各有佛統論其數如大地塵故云微塵如來現坐道場揀非過未故云住世界者各有寶光從其頂出者表諸根圓拔內瑩發光又表下之所說即是最勝最妙法故其光同時於彼來林者表浮塵器界諸變化相應念化成無上覺故灌如來頂者表許為作證是諸大眾等慶當有巨益以此瑞非常也二眾聞證示於是阿難及諸大眾俱聞十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根惟汝六根更無他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物得未曾有感佛加被故阿難大眾俱得遠聞十方如來異口同音者顯道同明可信故華嚴十方共證法華諸佛同示彌陀六方勸信皆此意耳獨告阿難者是請主故善哉者讚美詞以其所問為解結修證之關鍵故汝欲識知等證以結惟在根前阿難問以云何是結則是欲知耳俱生無明即本經妄為明覺之妄明無始與俱故云俱生前云與諸無明俱滅俱生是也此妄一動三細六麤展轉生起故曰使汝輪轉生死是知俱生無明義當初結餘之五結依此而生故名為根體合於八識之中用現於六根之內離根問結總無是處故云唯汝六根更無他物此證云何是結義也汝復欲知等證以解惟從根前阿難問以從何名解則是復欲知耳無上菩提不可溺於果覺且約因心言之葢以因該果海無妨以無上稱之是六性之真體同所結之元巾用為因心解結修證不歷三祇頓獲二果故云令汝速證等安樂即是智果受用諸法故解脫即是斷果遠離眾苦故此二約修德言寂靜亦是斷果謂寂然晏靜體自不動故妙常亦是智果謂微妙真常性自無礙故此二約性德言然既曰速證似屬修德必兼性德言者以果徹因源故又真性既為結元結在即是性在解雖順性仍不離根故云亦汝六根更非他物此證從何名解義也諸佛現相證示竟三阿難未明請益阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪迴安樂妙常同是六根更非他物如是法音指上諸佛所說雖聞未明者有二義一疑根塵識三共為一聚何故結解唯根二疑結解唯根根應是元何故取菩提性至下世尊釋疑處自見云何令我等正持疑以問也此中安樂妙常與下科涅槃真淨二果各出者以理智一如可互攝故四如來解釋除疑謂解釋諸佛所說以除阿難未明之疑二一長行二偈頌初佛告阿難根塵同源縛脫無二識性虗妄猶如空華阿難由塵發知因根有相相見無性同如交蘆是故汝今知見立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物初釋何故結解惟根疑文中縛脫即結解也佛意所以不取塵者以根塵雖內外有殊而攝末歸本同出一源所謂相見皆依自證起故於是根縛則塵亦成縛根脫則塵亦隨脫初無有二故惟取有情之根不取無情之塵以有情有知與性為近故若爾則識亦有情何不并取以識乃前塵虗妄相想猶如空華起滅無從無可縛亦無可脫此所以結解唯根也阿難下釋何故結元取性疑佛意以由塵發知無塵則知見不有因根有相無根則塵相元空是則塵相知見皆無實性同於交蘆互相依住交蘆異卉也生必二莖相依單一則不能自立以是義故唯一自性真知真見獨存無容更立知見若於真知真見上立知立見其猶性覺必明妄為明覺故曰即無明本若了真知真見無復更立知見其猶伏還元覺得元明覺故曰斯即涅槃無漏真淨此所以結元取性也涅槃斷果總名無漏真淨斷果別相無漏即前解脫修德也真淨即前寂靜性德也不言智果者如上科說云何句乃結示速證之語言結元既唯取性苟得其性則說根已非云何是中更容他物而為結縛知此義者則安樂解脫寂靜妙常可立證矣二偈頌二一標頌二正頌初爾時世尊欲重宣此義而說偈言重宣者長行義未周故說偈者貫華易憶持故或為根性稍鈍者設正頌分二一正頌長行二結示法妙初二一頌釋初疑二頌釋次疑初長行初疑即結解唯根疑也真性有為空緣生故如幻無為無起滅不實如空華言妄顯諸真妄真同二妄猶非真非真云何見所見中間無實性是故若交蘆結解同所因聖凡無二路初超頌識性虗妄識有二種一有為謂凡夫對有起者二無為謂二乘對空起者偈中首二句先頌有為真性二字總標所依之真以下有為無為皆依真性起故對境熾然名有為識空謂無實也然既對境熾然而又云空無實者以是從緣而生如幻法故灌頂立量云真性有為是有法空為宗因云緣生故同喻如幻正脈云幻法從緣生幻法空無性有為從緣生有為空無性無為二句次頌無為強制不動名無為識無動故無起以動與起相因故無起故無滅以起與滅相待故無起則無所從來無滅則無所從去徹體虗妄故曰不實不實即空但遮詮表詮異耳以喻言之猶如空華若以三支比量宗因顛倒灌頂立量云真性無為是有法不實為宗因云無起滅故同喻如空華良以空華無起滅空華無有實無為亦爾葢比量標宗出因經偈依因立宗義無違也若不置真性之言當有何過以濫彼空宗又失惟心義故言妄二句預防疑問恐問云權教小乘率以有為為妄無為為真今何并無為亦斥其不實耶故為此防按權小言有為為妄顯諸無為為真明是待妄立真既待妄立真真固非真是則合妄與真同為二妄如掌珍論云若有有為法則有無為法中論云若法為待成是法還成待足證此義猶非下追頌根塵同源言識固無體宜乎不取塵能引根現有功用何亦不取以根之與塵同依賴耶即就賴耶論之猶然非真非真葢上一非字乃總遣之詞謂總遣真與非真以是真妄和合不可言真不可言非真故既真與非真俱不可言是賴耶先無定體況夫見相二分益無有實云何而分能見之根所見之塵據此則根塵互倚中間都無實性以是義故我前說以猶若交蘆既若交蘆則同源無二故結解同以六根為所依因而成聖成凡皆依六根而修順修成聖逆修成凡無二路也頌釋初疑竟二頌釋次疑長行次疑即結元取性疑也汝觀交中性空有二俱非迷晦即無明發明便解脫汝觀交中性者教以向根塵相交之中著力參究畢竟云何是我本元自性清淨心也適言其空萬有以形適言其有一亦莫守故曰空有俱非空有俱非中道純真即是本元自性真心一念纔起便成迷晦即是無明長行所謂知見立知即無明本是也果其一念不生自然發明便成解脫長行所謂知見無見斯即涅槃是也知此義者則結元唯取真性無庸更疑矣重頌長行竟二結示法妙四一趣果妙二顯理妙三成行妙四立教妙初解結因次第六解一亦亡根選擇圓通入流成正覺上科已示結元今當進示解結然結則從細至麤如人著衣解乃從麤向細如人脫衣故云因次第也對結之六說元是一結既不有元復何名故云六解一亦亡六解一亡純真斯現但六根有圓不圓修習日劫相倍故須於根中揀選擇得圓通一根依之入流亡所便可以漸次解結乃至成正覺矣其所趣之果不亦妙乎二顯理妙陀那微細識習氣成暴流真非真恐迷我常不開演承上根選擇圓即許其入流成覺者以根中之性即是陀那識故陀那即賴耶異名具云阿陀那此翻執持有三義一執持根身令不壞爛二執持種子令不散失三執取結生相續或有翻為無垢識者非今經意言微細者非同前六行相麤顯凡小皆知故習氣即指無明無明稱習者無始與俱故正以無始與俱展轉熏變生滅不停漸起諸結如暴流水故云成也然成結既由以妄熏真而解結只須以真熏妄真妄同在此識結解易如翻掌所謂入流成正覺信矣若爾尋常經中何故不專說耶良以此識乃真妄和合若非時而說將恐利根眾生執妄為真而墮增上之慢鈍根眾生迷真為妄而起絕分之𠍴以是之故我於尋常經中曾不開演以無益而有損也今以時節既至應機而說滅妄復真端在此舉其所顯之理不益妙乎三成行妙自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立是名妙蓮華金剛王寶覺如幻三摩提彈指超無學承上所謂習氣成暴流者謂以無明熏習力故於陀那識變起見相二分同是自心而分能取所取故曰自心取自心也既同是自心元無能所故非幻變起見相能所角立故成幻是知非幻者乃待成幻立名設若不取則能所泯同自心失待幻之名故無非幻無非幻故陀那不生陀那非幻尚自不生況夫見相幻法復云何立如是則真心獨朗是名妙法依此為因因該果海故喻以蓮華葢取其方華即果可比因該果海義故依此斷惑無惑不斷故喻以金剛葢取其擬之即壞可比無惑不斷義故依此降魔無魔不摧故喻之以王以王能勝怨到處咸服也依此利生無生不利故喻之以寶以寶能濟物有窘皆周也依此觀法無法不了故名之以覺以覺即是佛具一切智也依此而修修即無修故曰如幻修既無修動元不動故無妨以三摩稱之得此三摩者獲二殊勝發三妙用故能彈指修習功超無學其成行何其妙哉四立教妙此阿毗達磨十方薄伽梵一路涅槃門此指上來所說昔教莫及故以阿毗達磨稱之以阿毗達磨翻無比法故薄伽梵即佛之異號略翻聖尊詳具六義謂自在熾盛端嚴名稱吉祥尊貴五不翻中多義不翻十方亦該三世後揀圓偈云過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法是知十方薄伽梵同依此教而修故曰一路無餘大涅槃無越此教而證是名為門其立教又何其妙哉如來解釋除疑竟五大眾承示開悟於是阿難及諸大眾聞佛如來無上慈誨祇夜伽陀雜糅精瑩妙理清徹心目開明歎未曾有前此阿難及眾雨淚佇示此之開悟亦然是知前之雨淚正此之開悟機也佛指諸佛如來指本師證示無他解釋除疑皆為無上慈誨祇夜此云應頌應長行義故亦云重頌重為鈍根或後來眾故伽陀此云諷頌諷功誦德故亦云直頌徑以偈說故又名孤起頌不應長行故祇夜如真性有為空等諸偈伽陀如解結因次第等諸偈雜糅約祇夜言雜謂偈對長行前後交錯糅謂偈糅長行碎為段章故精瑩約伽陀言精謂精純不雜長行瑩謂瑩徹單偈即明透故雜糅故詮義玄微精瑩故顯法明朗故云妙理清徹長行未悟者因偈而悟長行已悟者因偈轉增故曰心目開明心目即是智慧依心運用擇法辨修有目義故既已開悟增明不惟兩疑并銷且喜二果有分所以自歎其未曾有也驗證以釋二疑竟三綰巾以示倫次上云解結因次第六解一亦亡阿難未達故如來以一巾綰成六結示之令其以綰巾次第知根中成結次第既知成結次第又復因之以示解結次第其六解一亡之義即在兩楹帶言故科中惟標示倫次也正脈云前人見其結數偶同於根數遂謂六結即喻眼耳等六以致喻中六結實有次第法中六根本無次第宛有法喻不齊之過却又不敢歸過於佛而強教後人不可以喻難法是何言歟佛號一切智人而說法先已帶過其何以折伏魔外而垂範人天哉決不然也葢佛說六結本非喻眼等橫列之六乃是豎推其由真起妄從細向麤展轉六層而後根相備著及其反妄歸真從麤向細亦展轉六層而後根相解除且經中結之次第與解之次第皆叮嚀俱載但文詞含攝不甚開顯至後觀音圓通逆次推之六結宛然取彼釋此何有法喻不齊之過智者詳之三一阿難敘聞請益二如來法喻巧示三阿難蒙示無疑初阿難合掌頂禮白佛我今聞佛無遮大悲性淨妙常真實法句心猶未達六解一亡舒結倫次唯垂大慈再愍斯會及與將來施以法音洗滌沈垢初述聞意謝合掌禮白者謝前請後之儀為拔結縛之苦普及現未之眾故云無遮大悲又無遮有二一人無遮不擇勝劣普施上法此揀非機恐述二法無遮不悋祕妙合盤托出此揀常不開演大悲心中具此二義方能流出性淨妙常真實法句性淨妙常指長行所說說結元則在纏不染性本自淨說結解則出纏勝妙常住不壞乃偏約所詮言之真實法句指重演偈頌長行已說偈頌又說是出自如來真心實心演斯五言有法章句此偏約能詮言之要知能詮所詮必不相離長行偈頌互攝無礙按此中大悲而云無遮法句而曰真實雖不言謝而意已寓之矣心猶下陳闕言請言如上所聞理雖麤領而義尚闕然故云心猶未達未達之義有二一六解一亡二舒結倫次至下如來答處自見無煩預釋既未深領豈甘自棄故求佛垂慈再愍斯會將來仍前普為現未請也良以倫次不明則垢結難除對六立一則更是沈染故請施法音示以二義而洗滌之二如來法喻巧示二一巧示成結倫次答六解一亡二巧示解除方便答舒結倫次初二一先示成結倫次二後答六解一亡初三一從一成六二同名為結三倫次不亂初二一攬几取巾二綰結問答初即時如來於師子座整涅槃僧斂僧伽黎攬七寶几引手於几取劫波羅天所奉華巾即時者就於阿難請益之時顯有求便應故涅槃僧具云泥縛些那此翻內衣唐言裙即下裳也僧伽黎此翻雜碎衣即大衣也坐久披靡故整之斂之整謂提掩斂謂收攝葢將欲攬几取巾恐其有礙也七寶几即座前案几體以七寶成故攬謂取近於身以便凭藉引伸也伸手於几凭之以便取巾綰故劫波羅或云夜摩此翻時分欲界天之第三寶疊華巾是彼天人之所奉故佛取此巾以喻純真之性前文所謂結元是也二綰結問答於大眾前綰成一結示阿難言此名何等阿難大眾俱白佛言此名為結於是如來綰疊華巾又成一結重問阿難此名何等阿難大眾又白佛言此亦名結如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等阿難大眾亦復如是次第詶佛此名為結初問答一成交錯相繫曰綰示問名何者教以自說結名以喻滅結也答以此名為結者已知有結之名本巾之舒相隱矣於是下問答二成疊與㲲同正脈云疊華西域之帛價值無量今天獻猶為尊貴觀下文加寶字可知又成一結示問名何者令其自說第二結名以喻空結也答以亦名為結者已知二次於一兩結之倫次現矣如是下問答六成如是倫次等者謂照上第一第二倫次復綰四結總成六箇結也一一結成持問名何者令說三四五六結名以喻覺根靜動四結相隣而起耳次第詶佛此名為結者已知三四五六法爾之前後具矣灌頂云如此一一問名答結是結時元有倫次足知非喻眼等六相以彼乃同時生起非先眼後耳等故從一成六竟二同名為結佛告阿難我初綰巾汝名為結此疊華巾先實一條第二第三云何汝曹復名為結阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一結名若百綰成終名百結何況此巾秪有六結終不至七亦不停五云何如來秪許初時第二第三不名為結初如來許初難後初綰名結理在可許以此巾先實一條一巾一結正相當故然一巾既已成結已失巾名巾既不復名巾二綰三綰亦應不復名結故難以第二第三云何汝曹復名為結曹猶輩也阿難下阿難答百況六寶疊華或是天上之華可以紡織故曰緝績成巾緝績猶紡織也雖本一體翻佛先實一條之語葢佛以先實一條所以只許一綰名結二綰三綰即所不許阿難以雖是一體不如佛之所說但如我思惟亦似可採以如來一綰既許得一結名例知若百綰成終名百結何況此巾秪有六結焉得不許耶終不下固諍不許之言言既僅有六結是六結已盡巾量五結巾尚有餘已盡巾量無容再綰故終不至七巾尚有餘勢必至六故亦不停五終不至七七應不名為結亦不停五六應還得結名是則六尚名結云何如來秪許初時第二第三不名為結此固我所不知想必有以教之耳按此中如來故為致難阿難抗詞以諍不為無故準後文耳根圓通所解六重結相約生起則從細向麤約還滅則由麤至細設不說麤相名結將恐初心者忽於麤而始入無門設不說細相名結又恐深修者住於細而終無究竟故假阿難固諍顯示麤細同名為結庶使初心從麤而無躐等之弊深修盡細而無中止之德矣三倫次不亂佛告阿難此寶華巾汝知此巾元止一條我六綰時名有六結汝審觀察巾體是同因結有異於意云何初綰結成名為第一如是乃至第六結生吾今欲將第六結名成第一不不也世尊六結若存斯第六名終非第一縱我歷生盡其明辨如何令是六結亂名佛言如是六結不同循顧本因一巾所造令其雜亂終不能得則汝六根亦復如是畢竟同中生畢竟異初令審同異結未綰時明明一巾故許其已知及乎六綰宛爾成異故名其有六一六既定同異攸分而又教以審觀等者令知由同成異滅異還同也於意下擬將亂名於意云何者欲將第六名一先商之也初綰名一如是則次綰名二三綰名三若超略言之乃至六綰則第六結生顯倫次一定也倫次一定而欲將六名一明知不可乃故意為問令阿難定之耳一字下文稍未備若加一得字而問意始現不也下阿難不許直判不得故以不也答之六結若存等乃申明其不得之故縱我歷生等者又決言其不可亂名意也意謂佛既問我將謂我擅多聞必能名六為一殊不知如佛所問縱我以多聞之力從此更歷多生窮盡智慧之明口才之辯亦覺無理可申如何遽能令是六結亂名誠不敢以自欺也佛言下如來印定如是者如汝所說是矣六結不同者現見彼此各異雖彼此各異若各是一物或可易彼為此乃循顧本因一巾所造既一巾所造先後次第莫可改移故欲令其雜亂終不得成則汝下以法結合雖言六根實指六根中結所謂動靜根覺空滅也結未生時畢竟是同合此巾元止一條結既生已畢竟是異合一六不得亂名然既知由同成異自信滅異還同則解結之功又烏可少哉先示成結倫次竟二後答六解一亡佛告阿難汝必嫌此六結不成願樂一成復云何得阿難言此結若存是非鋒起於中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此尚不名一六云何成佛言六解一亡亦復如是初就喻設問嫌六不成者謂憎嫌六結各異不欲其成願樂一成者謂羨慕一巾元同還欲其成復云何得者明知須解乃故意設問令自薦法中意故阿難下依問裁答此結若存謂不知求解也不知求解而欲六結亂名眾所不許故曰是非鋒起謂說是說非之機已動如兩軍未交鋒𨦵先起也鋒𨦵既起兩軍自交故曰於中自生等謂於六結之中自生彼此相非之辯故總解除者謂由六至一次第解盡也解盡不生還復元巾故云則無彼此無彼此故絕諸對待說一亦是強名故曰尚不名一以一名乃待六立故六云何成者謂一尚不立何況於六自然不得成矣佛言下指法結合葢阿難前此喻屋求門是嫌此六結不成願樂一成也不知從根解結凡小各住自位是此結若存彼此相非也如來六結盡解純真絕待是總以解除尚不名一也如來欲令阿難同佛解盡故指彼所問六解一亡而結合之言六解一亡者非並真體俱失但不立乎相待之名而已巧示成結倫次答六解一亡竟二巧示解除方便答舒結倫次二一先示解除方便二後答舒結倫次初二一舉法發起二就喻指示初二一細相三結二麤相三結初由汝無始心性狂亂知見妄發欲示解方先出結由故云由汝無始等也心性指所依真體以是結之元故一念妄動曰狂即初起無明義當滅結以是解盡相故真妄和合曰亂即次成業相義當空結以轉現未分故知見妄發者能見所見虗妄發起即轉現二相義當覺結以覺有能所相故二麤相三結發妄不息勞見發塵如勞目睛則有狂華於湛精明無因亂起一切世間山河大地生死涅槃皆即狂勞顛倒華相初法說發妄不息者謂依於能覺所覺發起虗妄分別相續無間即智續二相仍屬覺結但行相稍顯著耳既已顯著必至勞亂見分結色成根即執取相義當根結根相始著故根相既著計名起業故發塵勞有世間業繫苦相義當動靜二結以有世間即有動靜明暗等諸塵相故如勞下喻明勞目指帶勞浮根喻帶妄結根之見以妄即見之勞故湛精明指根中之性喻清淨本心葢喻中勞雖在根而華起却翳於見性法中妄雖在見而塵起却障乎淨心佛意要以狂華無因喻明塵結是妄知妄不循便是初心入手解結處也一切下法合一切世間總該三世間也山河大地別指器界生死別指有情涅槃別指正覺均為塵結咸同華相近依智續勞見顛倒無中見有執取計名起業是也發起遠依無明不覺業轉現生故云皆即狂勞等也問佛舉細相反略麤相却詳者其意何居答初心入手雖麤難知故以法喻詳明至麤相既解便入深修前途分齊自能比量而知無庸詳辨舉法發起竟二就喻指示二一左右不解二中心乃解初阿難言此勞同結云何解除如來以手將所結巾偏掣其左問阿難言如是解不不也世尊旋復以手偏牽右邊又問阿難如是解不不也世尊初進問解方此勞同結者應云此則從狂至勞及與塵相同名為結但譯語傷略以義會之可耳既同為結應須解除但不知解除之方故問以云何如來下顯偏不能將所結巾偏掣其左者喻凡夫迷性為有偏住有為偏住有為明知不能解除乃故就喻問阿難於喻中已知直以不也答之旋遂也遂復以手偏牽右邊者喻二乘執性為無偏住無為也問答準上可知二中心乃解佛告阿難吾今以手左右各牽竟不能解汝設方便云何解成阿難白佛言世尊當於結心解即分散佛告阿難如是如是若欲除結當於結心初教以另設方便偏住有為既在動而終不能靜偏住無為雖離動而亦非真離是則後結尚不能解何況於前故就喻示以左右各牽竟不能解汝設二句法中正教以離却二邊另尋方便必云何解乃得成阿難下答以當於結心結心者元巾首露之處喻自性現前處也自性現前首在於境但為動塵所障故須入流亡所則動結解而靜性現矣解即分散者不惟動結若如此從中解去則靜等五結亦與之俱散佛令自說良有以焉佛告下印定令其自悟如是如是者重言深許之也既已深許而又重印其說者顯離此別無方便令即喻以悟法中義故先示解除方便竟二後答舒結倫次四一示法可信二明結須解三就喻辯定四以法結合初阿難我說佛法從因緣生非取世間和合麤相如來發明世出世法知其本因隨所緣出如是乃至恒沙界外一滴之雨亦知頭數現前種種松直棘曲鵠白烏玄皆了元由初防承前疑聞恐承前疑云自指見是心已來屢破因緣今聞解結之喻似乎佛法亦從緣生前後相背云何會通故為此防佛意以我今所說成佛之法固亦從緣而生葢即以清淨本心為因解結修證為緣妙合中道是真因緣至若世間和合麤相如輪繩水土因緣和合而成瓦器精血業識因緣和合而成眾生凡夫取以為有二乘取以為空妄計非真是曰麤相類此宜破今非彼也如來下顯佛語無妄世間法六凡染法界出世法四聖淨法界世間法以業識中本具染法種子為因宿世所造善惡不動等業為緣出世法以自性中本具淨法種子為因宿世所修諦緣六度等行為緣凡小不知縱有發明皆屬妄計無可憑據如來凡有發明真能知其本因又能知其隨所緣出理在可信矣不惟依正二報中之麤相如是乃至恒沙界外一滴一滴之雨亦能知其頭數至於現前法中種種差別如松生便直棘生便曲鵠生便白烏生便元亦皆了其元由以各有因緣故也據此則依正二報中最微細者尚能審知諦說況夫今說佛法因緣豈不益可信哉二明結須解是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待承上以是佛言可信之故則根結須解但六根各當其機今即隨汝心中選擇六根自覺何根可入即便依修可也果其依修根中之六結自除根結若除則動靜二塵再不復生根覺空滅諸妄永以銷亡此若不真更何所待有志復真者其勿忽諸三就喻辨定阿難吾今問汝此劫波羅巾六結現前同時解縈得同除不不也世尊是結本以次第綰生今日當須次第而解六結同體結不同時則解結時云何同除初故問同解首舉劫波羅巾者顯其元止一條喻清淨本心次舉六結現前者顯其業已成六喻妄相已定縈繫縛也六結繫縛明知不能頓解乃故問同時得不令其自詳以知法中義耳不也下判其不能阿難於喻中已知故直以不也判之既已判定不也仍須申明其故故曰本以次第綰生應當次第而解六結下應問結答言設欲同時解者須六結各是一物或成結元是同時庶乎可耳其奈六結同體而成結又不同時則解結之時云何便能同除決不然也四以法結合佛言六根解除亦復如是此根初解先得人空空性圓明成法解脫解脫法已俱空不生是名菩薩從三摩地得無生忍初總合由阿難於喻中已知故先為總合令以得其要故言六根中隨拔一根解除六結亦復如彼解結還巾是也此根下別合既已總合復恐其迷於分齊故次為別合令以得其詳故於中復三初先解麤結按後圓通文云初於聞中入流亡所即解動結所入既寂動靜不生即解靜結如是漸增聞所聞盡即解根結今云此根初解者謂依此根性初解動結靜結及根結也塵亡根盡人無所依故曰先得人空空性下次解細結中覺空二結按後圓通文云盡聞不住覺所覺空即解覺結空覺極圓空所空滅即解空結今云空性圓明者即後圓通中覺所覺空空所空滅義也謂必至覺所覺空空性始圓空所空滅空性始明以對上但得人空為偏空為昧空故既圓且明不惑於法故云成法解脫解脫二句方解細結中最後滅結按後圓通文云生滅既滅寂滅現前即解滅結今云解脫法已俱空不生者即後圓通中生滅既滅寂滅現前義也謂既成法脫法不能縛名為解脫法已至此則人法雙空故云俱空然此俱空猶屬待立依然生滅若知有既不存空亦不立則是俱空不生所謂生滅既滅是也如是則六結圓銷真如孤朗正是圓通中寂滅現前境矣是名下結證良以捨此而修餘門非真三摩地未到俱空不生非真無生忍故曰是名菩薩等也准古德判此處位屬十信今細詳其義似唯齊於第三漸次如彼文云塵既不緣根無所偶反流全一六用不行即此根初解先得人空也次云十方國土皎然清淨譬如琉璃內懸明月身心妙圓得大安隱即空性圓明成法解脫也又云一切如來密圓淨妙皆現其中即解脫法已俱空不生也況彼結云是人即獲無生法忍宛同今之結證以此對彼分齊正等是知此中得人空成法脫得無忍但是悟證非是修證理論實能徹於妙覺事說尚不及於乾慧若能從是漸修乃可安立聖位以悟為修恐增上慢故因古略為辨析如來法喻巧示竟三阿難蒙示無疑阿難及諸大眾蒙佛開示慧覺圓通得無疑惑蒙示者蒙佛開導指示六解一亡及舒結倫次義也慧覺圓通者以聽聞慧覺得六根中性本自圓通如寶華巾元止一條也法喻巧示諦解分明故曰得無疑惑綰巾以示倫次竟四冥授以選本根二一阿難請示本根二如來冥授耳門初三一述益申疑二慶遇恐錯三三業誠請初一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙雖復悟知一六亡義然猶未達圓通本根初禮謝述益一時者會眾同一時也合掌者秉其心禮足者敬之至葢以其慧覺圓通而謝佛開示也內不執我故身心皎然皎然者清淨皎潔離煩惱障故外不執法故快得無礙無礙者解脫法縛離所知障故此亦由於慧覺圓通暫得如是耳雖復下因悟申疑前阿難答佛有云此結若存是非鋒起乃至云若總解除則無彼此尚不名一六云何成是彼已能悟知一六俱亡義也既能悟知而云雖復者顯未達圓通本根雖知無益故言本根者有二釋一約世間二約機宜約世間者以十方世界修習圓通各有其根今指娑婆本根如後文殊揀選偈云此方真教體清淨在音聞欲取三摩提實以聞中入是知耳根圓通獨為娑婆本根約機宜者以一切眾生機宜不同隨機修證各據一根今指阿難本根如佛勅文殊云我今欲令阿難開悟二十五行誰當其根文殊揀選云願加被未來於此門無惑方便易成就堪以教阿難是知耳根圓通又為阿難本根前如來有云我今備顯六湛圓明本所功德數量如是隨汝詳擇其可入者吾當發明令汝增進今以自覺無智不能辨識故曰然猶未達二慶遇恐錯世尊我輩飄零積劫孤露何心何慮預佛天倫如失乳兒忽遇慈母若復因此際會道成所得密言還同本悟則與未聞無有差別初傷昔慶遇我輩飄零者自傷往昔飄蕩生死零落諸趣也零落諸趣不得聖眷濟拔曰孤飄蕩生死無有涅槃依歸曰露言積劫者極顯其孤露之久孤露之久不至永沈惡道則幸甚矣何能尚有心思何能尚有智慮敢希預佛天倫則今之預佛天倫者誠望外也望外之慶無可為喻故云如失乳兒忽遇慈母其意以失乳將死喻昔在飄零慧命懸危遇母還生喻今預天倫蒙化再甦其望外之慶已自可見阿難與佛自稱天倫者正脈云父子兄弟以天合者為天倫君臣朋友以義合者為人倫若復下感今恐錯言預佛天倫固為望外之慶若復因此者番際會道果得成誠為不負所遇矣設於今日所得密言全無新證還同本以文字會悟則與未聞無有差別恐錯過此機再會不知為何如耳三三業誠請唯垂大悲惠我秘嚴成就如來最後開示作是語已五體投地退藏密機冀佛冥授此機錯過仍前飄零故惟願如來乘大悲心也欲截飄零須假秘嚴故並求慈惠秘嚴二字密指耳門以是秘密深奧微妙嚴淨法故成就如來等者其意以果其惠我不惟現會受益亦能成就如來為最後際眾生而作開示譬之慈父本為現前子孫製作家訓及其傳之後世雖遠裔殘枝尚如面命是不期成就後世而自然成就也此上皆屬口請作是語已五體投地者俯伏虔誠以身業請故密機者祕密之機唯佛能知非機不授阿難微諭其旨不敢當場洩露惟是避而復位隱而不發故曰退藏密機冀望也望佛不須顯說恐障悟門但令二十五聖各陳悟由則聽者自能默契是曰冥授此意請也阿難請示本根竟二如來冥授耳門三一佛問眾聖二眾說本因三文殊揀選初爾時世尊普告眾中諸大菩薩及諸漏盡大阿羅漢汝等菩薩及阿羅漢生我法中得成無學吾今問汝最初發心悟十八界誰為圓通從何方便入三摩地初標所告眾按後文佛言彼等修行實無優劣是知此中諸聖名位大小法門偏圓皆同一味圓實正脈灌頂咸同此說汝等下按定現果菩薩大乘分果羅漢小乘滿果生我二句有分不分分則生我法中指菩薩說以彼乃從佛口生從法化生得佛法分故得成無學指羅漢言以彼乃小乘法中真窮惑盡故若不分者二句亦可通指以菩薩雖屬分果例觀音普賢等亦皆帶果行因羅漢雖屬小乘例滿慈陳那等亦皆內祕外現或分不分本迹無礙吾今下詢其初因吾今問汝句意有兩向一問圓通二問方便問圓通中佛意以聖性互通十八界中門門可入但圓與不圓日劫相倍吾今問汝當最初發心悟得十八界中誰為圓通法門耶問方便中佛意以圓通法門非可遽修必有方便吾今問汝最初從何方便入三摩地耶依正脈問含二意一顯二十五門徧該諸法門門可入非謂聖性惟通一門二取諸聖各門並皆親修實證非空談無驗之法今疏亦二意一證佛說無虗謂前文佛說四科七大皆如來藏阿難雖隨語生信終非現量今問諸聖令其各陳悟處則皆如來藏不待辨而明矣二順阿難所請謂上文阿難意請退藏密機冀佛冥授設佛直言顯示反障悟門今問諸聖令其各陳悟處則觸類旁通當自有神會者矣二眾說本因二一諸聖略說二觀音廣陳初灌頂云以其不當此方根性不欲行人亂修故但略說均是入圓方便擴人圓融見解何礙眾陳四一六塵圓通二五根圓通三六識圓通四七大圓通初正脈云相宗謂塵是賴耶相分斯經謂是如來藏心行人能於一塵發悟則塵塵皆圓通矣六一陳那聲塵二優波色塵三香嚴香塵四藥王味塵五陀觸塵六迦葉法塵初六塵以色為首今先聲塵者以陳那年臘俱高佛初度先稱解故又此方真教體清淨在音聞故三一作禮陳白二歷述二證三結答圓通初憍陳那五比丘即從座起頂禮佛足而白佛言憍陳那此云火器姓也以事火命族名阿若多此翻最初解或云已知詳見初卷顯見不動科中五比丘者佛初棄國入山修道父王淨飯乃命五人伴修一阿濕婆此云馬師二提此云賢三摩訶男拘力此是本族三人又舅氏二人一憍陳那二十力迦葉後以不耐苦行自奔鹿苑各修異道佛成道三七日後前往度之陳那先解為五人首今舉首標總故云憍陳那五比丘座起意敬禮足身敬白佛口敬世尊詢問理應肅儀也二歷述二證我在鹿苑及與鷄園觀見如來最初成道於佛音聲悟明四諦佛問比丘我初稱解如來印我名阿若多妙音密圓我於音聲得阿羅漢初述悟證鹿苑鷄園皆古王養畜之地鹿苑亦名仙苑五仙居修處也鷄園亦名鷄林灌頂云昔有野火燒林雉鷄入水漬羽以救其焚故名按諸經論皆言憍陳那等在鹿苑聞四諦法成阿羅漢今云及與鷄園者或五人根有利鈍聞法同在鹿苑悟證有在鷄園者故去佛成道不遠故無妨說觀見初成於佛音聲者謂三轉四諦法輪聲也悟明四諦者悟得苦是逼迫性集是招感性道是可修性滅是可證性故乘悟併銷見思雖道符四果未涉事修故判悟證佛問下述修證佛問比丘者詢其所解我初稱解者述其所悟所悟審實故蒙佛印阿若多名已於上釋妙音密圓者進觀聲性從緣緣滅聲銷銷無所銷融歸藏性自是悟得藏性真心本具微妙之聲收來則密放去即圓乘此妙悟歷事造修永斷見思實證四果故曰我於音聲得阿羅漢此約現前修證言之然所悟既深前途不止此耳三結答圓通佛問圓通如我所證音聲為上陳那意以佛問圓通餘門非我所知若如我所證者惟以音聲為上正脈云音聲為上者此方真教體清淨在音聞是音聞皆為教體今陳那於音聲得力也陳那聲塵竟二優波色塵三一作禮陳白二歷述二證三結答圓通初優波泥沙陀即從座起頂禮佛足而白佛言優波泥沙陀或云鄔波泥沙曇此翻近少謂諦觀微塵近於虗空餘有少分色性析則成無以此心開故名也詳於敘分中釋二歷述二證我亦觀佛最初成道觀不淨相生大厭離悟諸色性以從不淨白骨微塵歸於虗空空色二無成無學道如來印我名泥沙陀塵色既盡妙色密圓我從色相得阿羅漢初述悟證自述遇佛之時同於陳那故云我亦觀佛最初成道觀不淨相者五停心中不淨觀也以其初見佛時性多貪欲佛令觀身不淨始而於男女身分生大厭離究極而至於悟諸色性終歸於盡此約大略言之若詳明其法應俱九想一肨脹想二青瘀想三壞想四血塗想五膿爛想六蟲噉想七分散想八白骨想九燒想九中前七皆屬不淨之相初起觀之故云以從不淨所謂生大厭離者由觀此故後二想末後觀之故云白骨微塵葢微塵即是燒想謂燒已成灰析為微塵故微塵近於虗空進析成無故云歸於虗空所謂悟諸色性者由觀此故空色二無者又觀此空待色而立色既不有空復何存由此空之與色二者俱無體達我我所空故云成無學道然亦惟是悟證非修得也如來下述修證印以泥沙陀名者以其觀塵性空而得道故塵色既盡乃牒上空色二無以空色皆名塵色二無即是既盡故妙色密圓者盡無所盡融歸藏性自是悟得藏性真心本具微妙之色清淨本然曰密周徧法界曰圓也乘此妙悟歷事造修見思二惑先已永斷故云我從色相得阿羅漢此亦且約現證言之三結答圓通佛問圓通如我所證色因為上首句牒問如我下述答色因者色塵為二證之因自覺得力於此故為上也優波色塵竟三香嚴香塵三一作禮陳白二歷述二證三結答圓通初香嚴童子即從座起頂禮佛足而白佛言由悟香塵嚴淨心地故以香嚴為號下云由是意銷發明無漏是也童子者不取稚齒以其不壞童真堪進道故餘可知二歷述二證二一述悟證二述修證初我聞如來教我諦觀諸有為相我時辭佛晏晦清齋見諸比丘燒沈水香香氣寂然來入鼻中我觀此氣非木非空非煙非火去無所著來無所從由是意銷發明無漏初蒙教退修一切有為法如夢幻泡影非諦觀不能體悟故如來教以諦觀辭佛者承教退修也退修須避諠韜光故曰晏晦晏者晏靜即避諠義晦者晦迹即韜光義清齋者清淨齋室即退修之處不云室而云齋者齋之為言齊也意取其清淨嚴潔可以齊思慮修觀行故今人名晏居之室為齋者以此見諸下遇境成觀比丘燒香者以香塵為佛事故梵語阿伽嚧此翻沈香灌頂云有等香樹斫著地久外朽心堅置水則沈名曰沈水華嚴云阿耨達池邊出沈香名蓮華藏若燒一丸普熏閻浮據此則鼻不蒙煙可知香氣寂然者無形無聲既無形無聲而言來入者但鼻中覺有香氣非比常香必蒙煙也我觀此氣者以香氣為觀境欲假一相以通一切有為相故非木者徒木不遠達故非空者香氣不常生故非煙者寂然無形聲故非火者餘火無香氣故不聞香時不見去至何所故曰去無所著既聞香時不知來自誰方故云來無所從此言香氣本無所有耳由是下解通四果香既不緣鼻無所偶自無影相落於意識故並意識亦銷意識既銷頓覺煩惱無所由起故云發明無漏雖發明無漏但是乘悟併銷非次第盡也二述修證如來印我得香嚴號塵氣倐滅妙香密圓我從香嚴得阿羅漢印以香嚴之號自信所悟非虗雖依舊聞香而不成障垢故云塵氣倐滅滅無所滅融歸藏性自是悟得藏性真心本具微妙之香體備於中曰密用現於外曰圓乘此妙悟漸除我執功由香觀嚴淨心地故曰我從香嚴得阿羅漢設能不住亦可進斷法執而入菩薩位矣歷述二證竟三結答圓通佛問圓通如我所證香嚴為上首句牒前如來所問悟十八界誰為圓通也次句揀非他證以非自境界未敢品評故唯約自證言之香嚴為上者惟以香觀嚴淨心地勝餘門也香嚴香塵竟四藥王味塵三一作禮陳白二歷述二證三結答圓通初藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言藥王藥上經云過去有佛號瑠璃光比丘日藏宣布正法時有長者名星宿光聞說法故將訶黎勒諸藥奉日藏大眾願我來世能治眾生身心兩病舉世歡喜立名藥王其弟名電光明以醍醐上妙之藥供養佛僧立名藥上此二士得名之深因也下文自陳云我無始劫為世良醫是其得名之由又不必以琉璃光王始耳法王子者佛為法王菩薩稱子以能住法王家習法王業紹法王位故昆季皆然故云二也灌頂云五百梵天乃是同行法道眷屬二歷述二證二一述悟證二述修證初二一口嘗世藥二心悟法藥初我無始劫為世良醫口中嘗此娑婆世界草木金石名數凡有十萬八千如是悉知苦酢醎淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能徧知無始者遠敘多劫謂世智莫能究其始故自爾已來便為良醫則乘願普濟經劫忘疲可見準阿含經良醫有四一善知病相二知病因起三善知方治四畢竟不發一有不能即非良醫口中嘗此等者如上古神農之類特言娑婆世界者顯嘗藥濟世即在此土故偏於此土有緣草木金石者灌頂云草如菖蒲紫蘇木如桑皮松節金如金箔水銀石如雄黃滑石凡總括也十萬八千者以類相攝合名與數總統該括言之如是悉知等者謂於如是等藥悉知其何者為苦何者為酢乃至何者為甘何者為辛等故并諸和合等者言不惟知其為何等味又復能知孰為和合性如多藥共治一病孰為俱生性如一藥單治一病不須和合修治孰為變異性如修煉炮炙方有對治之功孰為冷性能治溫熱孰為熱性能治寒涼孰為有毒無毒可用不可用須解不須解如是一一悉能徧知故既悉能徧知則世無難療之疾手無不活之命所謂能治身病是也二心悟法藥承事如來了知味性非空非有非即身心非離身心分別味因從是開悟承事如來或即釋迦以釋迦無始於此界成佛如梵網寶積等明菩薩無始於此界修因因得承事由承事故蒙佛開示即味明理故云了知味性非空非有等者正脈云舌與藥觸熾然味現故非空雖熾然味現實無體性故非有又味之為塵乃不可見有對色以有對故非空以不見故非有此初起覺心了其無體身心即舌與舌識非即非離者正脈云諸藥不來舌與識不自現於苦等故非即身心舌識不嘗諸藥豈能自現苦等故非離身心此後念觀察知其無從又非即身心者不從根生非離身心者不從藥生如是分別味因來無所從去無所著當體全空空亦不立分別都無無分別智朗然現前故曰從是開悟又開悟非空破斷見開悟非有破常見開悟非即身心破權宗因緣之計開悟非離身心破外計自然之宗所謂能治心病是也述悟證竟二述修證蒙佛如來印我昆季藥王藥上二菩薩名今於會中為法王子因味覺明位登菩薩蒙印仍指過去以下云今於會中乃指現在也昆季即是兄弟以其能治身心二病故印以藥王藥上之名亦為酬其宿願力故雖蒙佛印不肯得少為足利生嚴土進學法王之行故今示於佛會為法王子增修前觀仍復因味覺明謂前此分別味因但惟開悟一切叵得此則因於味塵兼復覺得自性圓明自是任運度生永無退轉故云位登菩薩言位登者顯是真修實證非同初悟但憑如來印記已也按前陳那等三人悟處雖通大乘修證暫齊小果今藥王藥上二證俱大歷述二證竟三結答圓通佛問圓通如我所證味因為上最初以藥供養佛僧願當來治眾生身心兩病行願俱在味塵以味為因正當其機故自以為上藥王味塵竟五陀觸塵三一作禮陳白二歷述二證三結答圓通初陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言陀婆羅此云善守或云善護謂能以善法自守又能以善法護他或守自護他各有方便故二俱名善亦翻賢首以位居等覺為眾賢之首故同伴者同行道伴開士者菩薩異名正脈云自能開悟兼能開悟眾生者之號二歷述二證二一述悟證二述修證初我等先於威音王佛聞法出家於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有我指自己等指同伴皆威音慢眾後遇不輕教化者也先即過去謂過去於威音王佛時也佛稱威音王者法華云神智無量將導一切要解云以大音聲普徧世界為諸法王說法無畏故也準法華威音王佛相繼有二萬億數䟦陀婆羅當在初佛像法之中以與不輕同時如彼經佛結會云爾時常不輕菩薩者則我身是爾時四眾常輕是菩薩者今此會中䟦陀婆羅菩薩等是初為慢眾後見不輕神力又復信服隨從故得聞法出家葢是從不輕邊聞佛遺法出世俗家也今文中直言於威音王佛聞法出家者以是略述往事不詳盡故浴僧時即半月眾僧用浴時也隨例入室者隨眾僧例入室受浴以佛制七眾淨浴律儀應遵從故忽悟水因者謂忽悟澁滑等觸惟是以水為因無實性也即如初洗塵時覺有澁觸後洗體時覺有滑觸若既不洗塵又不洗體而根塵中間唯是平常安然得無所有自是分別不起論悟證已齊無學非修得也二述修證宿習無忘乃至今時從佛出家令得無學彼佛名我䟦陀婆羅妙觸宣明成佛子住宿習無忘者謂宿世悟證習氣中間猶未忘也按法華從初威音相繼二萬億同名諸佛復有日月燈雲自在王等方值今佛出世超略言之故云乃至今時親為及門之徒故云從佛出家承教斷惑實證羅漢故云令得無學然既曰宿習無忘則是悟證猶在及今佛出世乃曰令得明是修證無疑彼謂彼時即指令得無學時說准法華慢眾以瞋恚意輕賤不輕二百億劫常不值佛不聞法不見僧千劫於阿鼻地獄受大苦惱如是猶能宿習無忘守護善根故佛以䟦陀婆羅名之雖蒙佛印不住小道進觀佛果微妙觸塵本自如來藏性發現故曰宣明以宣明即發現義故自是任運度生隨緣住世故云成佛子住歷述二證竟三結答圓通佛問圓通如我所證觸因為上觀觸入道宿習無忘今復以觸為因自覺易入故曰為上言如我所證者但就己為論非強他同己也䟦陀觸塵竟六迦葉法塵三一作禮陳白二歷述二證三結答圓通初摩訶迦葉及紫金光比丘尼等即從座起頂禮佛足而白佛言摩訶迦葉此云大龜氏姓也以其先人修道感靈龜負圖而應遂以為姓名畢鉢羅以其父母無子禱此樹神生故又翻飲光以尊者身光蔽餘光故紫金光尼即其婦也夫婦因緣至下詳明等謂等其徒眾下自述云即我眷屬同時發心葢相隨出家者也二歷述二證二一述悟證二述修證初二一隨因感報二觀法得果初我於往劫於此界中有佛出世名日月燈我得親近聞法修學佛滅度後供養舍利然燈續明以紫光金塗佛形像自爾以來世世生生身常圓滿紫金光聚此紫金光比丘尼等即我眷屬同時發心往劫者準法華即過去無量無邊不可思議阿僧祇劫於此世界者顯非他土佛號日月燈者日照晝令人作務喻俗智照事月照夜令人清涼喻真智照理燈接日月喻無礙智理事雙照不異不一乃三智圓明之號准彼經日月燈明佛相繼二萬今迦葉所引似當最後一佛以直言佛滅後事則已不言餘故若更直餘佛應略說故我得親近者初遇燈明聞法修學者方始發心舍利此翻靈骨滅後供養者受化感恩如佛在故然燈續明紫金塗像皆供養事也灌頂引付法藏云毗婆尸佛滅後塔像金色缺壞時有貧女丐得金錢倩匠為薄金師歡喜治瑩佛畢誓為夫婦九十一劫人中天上身恒金色心恒受樂據此則紫金塗像乃後時事或翻譯脫漏毗婆尸世之文不然則向下便云自爾以來等無時可容貧女金師事故亦可本地難思各說異見但取成益亦無妨礙自爾以來者自然燈塗像以來迄於今也身常圓滿紫金光聚者隨因感果果必類因故紫金光尼即昔之貧女彼金師者即今之迦葉由昔誓故今為夫婦故云即我眷屬等字如前所釋同時發心者有二義一指過去謂同時發心塗像二指現在謂同時發心出家二義之中後義理長二觀法得果我觀世間六塵變壞唯以空寂修於滅盡身心乃能度百千劫猶如彈指正觀法塵而言六塵者兼前五說故良以法無別體惟是前五落謝之影倘外之五塵不滅則內之影事終未全銷故觀者須於前五塵起謂先觀五塵遷變不常當下離念自無影事落於意識再觀法塵自然一時壞滅惟以空寂等者所緣既滅能緣亦銷自是六識不行名無心定定久功深進滅第七末那麤分名滅盡定修此定時偏厭受想亦名滅受想定此定成時惟留第八賴耶持身及第七末那微細思量不受業牽故能度百千劫無所勞慮故覺如彈指頃灌頂云今持金襴袈裟在鷄足山待彌勒下生即此定也然此定即四果所住但由悟心猛利所得非關修證至定壞時仍須強持述悟證竟二述修證我以空法成阿羅漢世尊說我頭陀為最妙法開明銷滅諸漏承上雖住滅定但我唯以悟得空法成阿羅漢非修證也欲屆修證堪忍苦行故蒙世尊印許說我頭陀為最頭陀或云杜多此翻抖擻增一云佛言汝年老大可捨十二頭陀迦葉不捨佛言善哉我佛法中頭陀苦行大迦葉為第一言十二者大品云一阿蘭若二塚間坐三樹下宿四露地坐五常坐六常乞食七一坐食八節量食九中後不飲漿十次第乞十一糞掃衣十二但三衣以堪忍行此便足抖擻塵勞故稱頭陀行也塵勞既淨進觀佛果微妙法塵如來藏中開明顯現論悟證懸契佛果覈修斷唯齊二乘故云銷滅諸漏謂欲漏有漏見漏無明漏永以盡故是知此中修證惟同陳那等三人不同藥王等三士以三士二證皆大故歷述二證竟三結答圓通佛問圓通如我所證法因為上准增一其家巨富千倍瓶沙然竟能捨而出家是其宿根已能空諸所有觀法變壞為因自應易入故以為上六塵圓通竟二五根圓通正脈云六根缺一者留耳根為殿後以當此方機故參詳五根四中俱有旋反字面以根性法門均是旋根脫塵塵識不爾細玩可見五一那律眼根二周利鼻根三憍梵舌根四畢陵身根五空生意根初三一作禮陳白二歷述合證三結答圓通初阿那律陀即從座起頂禮佛足而白佛言阿那律陀亦云阿㝹樓陀或阿泥樓豆此翻無貧亦云如意亦云無滅由往昔以稗飯供辟支佛自爾以來九十一劫不受貧窮常得如意受福無滅故今為白飯王子佛之堂弟阿難之從兄也二歷述合證精進猛利悟證即兼修證故不分說惟合而明之也我初出家常樂睡眠如來訶我為畜生類我聞佛訶啼泣自責七日不眠失其雙目世尊示我樂見照明金剛三昧我不因眼觀見十方精真洞然如觀掌果如來印我成阿羅漢初自述被訶失目最初出家聞法不解故常樂睡眠訶為畜生者見其愚癡之甚深激之也聞訶愧甚故啼泣自責責不徒責痛發精進故七日不眠精進過度浮根見傷故失其雙目增一云佛在給孤園為眾說法那律於中眠睡佛說偈訶云咄咄何為睡螺螄蚌蛤類一睡一千年不聞佛名字那律精進七日七夜眼不交睫肉根隨壞今那律自述略也世尊下自述蒙教得果世尊愍其失明故示以三昧三昧名樂見照明金剛者謂初起觀時只須樂見照明之性亦入流亡所也若所入既寂明暗不生如是漸增見所見盡則受金剛之名謂依此盡根之力進破深惑通解餘結如金剛之利亦同耳門三昧名金剛王寶覺義也三昧既成發本明耀故不因眼觀見灌頂云十方者大千界中之十方也逈脫根塵故曰精真洞然謂見精真性洞然無礙若以喻言之如觀掌果據此則天人報得天眼恐未能與尊者較左右比勝劣耳印成羅漢者以其精進猛利二證俱發非比陳那等悟證之後仍須修證三結答圓通佛問圓通如我所證旋見循元斯為第一旋見者旋彼緣塵之見外脫塵累循元者循其元有真見內脫根結按後耳根圓通義齊聞所聞盡准前舒結倫次義當此根初解三昧名樂見照明是也乘此勝進則後之諸結可立而解三昧名金剛是也然那律正患迷塵世尊教以旋見忘塵那律正憂根壞世尊教以循元離根正對其機自然易入故云斯為第一那律眼根竟二周利鼻根三一作禮陳白二歷述二證三結答圓通初周利槃特迦即從座起頂禮佛足而白佛言周利法華云周陀此翻路邊兄名也槃特迦法華云莎伽陀此翻為小合云路邊小若順義迴文當云小路邊弟名也或云繼道謂其母隨夫他國兩度垂產歸家路邊生子兄名道生其弟以繼別之二歷述二證二一述悟證二述修證初二一根鈍蒙教二觀息悟證初我闕誦持無多聞性最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前佛愍我愚教我安居調出入息初述昔根鈍我闕誦持等者謂自述根鈍闕念誦憶持無廣多聽聞性故最初值佛等正詳引闕無之事增一云其兄先入佛道怪弟無知遺令還俗槃特詣祇桓門泣淚佛回憐愍牽詣靜室教執掃誦之今云最初值佛聞法出家憶持如來一句伽陀是也又云誦掃忘誦忘掃今云於一百日得前遺後得後遺前是也又一句伽陀者准大論佛愍槃特教一偈云守口攝意身莫犯如是修行得度世又法句經云槃特出家稟性暗塞佛令五百羅漢日日教之三年不得一偈又譬喻經云槃特於迦葉佛時作三藏沙門有五弟子三藏悋惜經義不肯訓導從昔至今諸根暗鈍然諸經論雖因緣稍異大意皆為顯其根鈍故并引之以備參考佛愍下蒙教調息佛愍我愚等者自述如來愍其愚暗苦於誦習且教以晏安靜室調息攝心也息謂鼻中氣息而有四相謂有聲曰風結滯曰氣出入不盡曰喘不聲不滯出入俱盡曰息正脈云經雖云調即兼於數調者按天台止觀當離風氣喘等而幽綿自在也數則從一至十或至百而後逆數至一良以暗鈍遠因雖本愚癡近緣亦由散亂故令數息攝心亦對症施藥耳二觀息悟證我時觀息微細窮盡生住異滅諸行剎那其心豁然得大無礙我時觀息者謂正數正調之時諦觀此息來何所從去何所至也微細窮盡等者謂精心研究生無生相住無住相異無異相滅無滅相以此諸行唯在剎那剎那無體惟在一念念性不實唯是一心研究至此頓覺全息全性故曰其心豁然豁然者貫通義既已貫通則根身器界應念化成無上知覺故云得大無礙是悟證已齊佛境界矣述悟證竟二述修證乃至漏盡成阿羅漢住佛座下印成無學既悟證已齊佛境似應無惑可斷但理由頓悟乘悟併銷事非頓除因次第盡故云乃至漏盡等謂不以悟證為足仍復歷事修斷乃至諸漏永盡等是修證唯齊小涅槃也既惟齊小尚須依佛故云住佛座下恐墮增慢不復進求姑且印成小果令知前途更有事故歷述二證竟三結答圓通佛問圓通如我所證反息循空斯為第一反息者不緣外塵反觀息相循空者窮諸行空循順空理良以齅性本圓香塵元空都緣出息吐故入息納新以致齅性局於香塵香塵雜乎齅性今既反息循空則出息不涉眾緣入息不住陰界常轉如是經百千萬億卷回視前後互遺分若天淵故自稱第一周利鼻根竟三憍梵舌根三一作禮陳白二歷述二證三結答圓通初憍梵鉢提即從座起頂禮佛足而白佛言憍梵鉢提此云牛呞謂食後虗哨如牛呞故准下自敘乃輕弄沙門之報增一云牛跡因過去作比丘摘他粟田後五百歲作牛償之今雖證無學猶有餘跡也二歷述二證二一述悟證二述修證初我有口業於過去劫輕弄沙門世世生生有牛呞病如來示我一味清淨心地法門我得滅心入三摩地觀味之知非體非物應念得超世間諸漏初因病蒙教我有口業者自述往昔有因口所造業也於過去劫等正明其因口造業事故弄謂戲弄即譏誚義灌頂云昔見老僧無齒而食誚其如牛轉哨世世感生牛舌常如牛呞故云有牛呞病均提往昔為三藏法師見老比丘音聲鈍重毀其如狗吠後感五百世為狗噫口業既有如是過患可不慎哉一味清淨法門或指念佛如溫陵云佛為遮謗賜以數珠令常念佛是也愚謂文既不顯念佛不必定指或可因其報感牛舌不得飲食正味佛令忘諸塵味反觀舌根一味清淨即是本元心地依之修習可成三昧故曰法門我得下觀知悟證我得滅心者滅緣味心忘諸塵味也入三摩地者反觀舌根工夫綿密也於綿密中精研嘗性故曰觀味之知謂諦觀嘗味之知來自何所也非體者非根體生非物者非塵物現以唯根唯物皆不能有知故准四卷末結示真常因果文云若棄生滅守於真常常光現前根塵識心應時銷落今此中我得滅心即棄生滅也入三摩地即守真常也觀味之知非體非物即常光現前也若爾則根塵識心應時銷落故曰應念得超世間諸漏良以世間諸漏發起皆由於根塵識故而言應念得者顯是乘悟併銷非次第盡故二述修證內脫身心外遺世界遠離三有如鳥出籠離垢銷塵法眼清淨成阿羅漢如來親印登無學道初牒前悟證謂由非體故悟得此性不屬根結故云內脫身心由非物故悟得此性不為塵縛故云外遺世界由超漏故悟得此性永脫輪迴不受界繫故曰遠離三有如鳥出籠離垢下成後修證識由悟證力故歷事漸修不惟內脫身心并能脫之根性亦亡不惟外遺世界并所遺之塵習亦盡故曰離垢銷塵如前云想相為塵識情為垢二俱遠離是也二俱遠離正見豁開故云法眼清淨如前云則汝法眼應時清明是也乘此法眼清明進斷見思得證四果故云成阿羅漢是上之所謂應念超漏者至此乃次第盡矣如來親印者即就現證印之登無學道者謂印其權果已極令發進求佛道心故歷述二證竟三結答圓通佛問圓通如我所證還味旋知斯為第一還味者還滅味塵旋知者反觀知性正對舌病之機故自稱第一憍梵舌根竟四畢陵身根三一作禮陳白二歷述二證三結答圓通初畢陵伽婆蹉即從座起頂禮佛足而白佛言畢陵伽婆蹉此云餘習因過去五百世為婆羅門性多憍慢今雖證果猶有餘習故如每過恒河便呼河神云小婢斷流神雖為斷懷瞋白佛佛令向神求懺遂合掌向神曰小婢莫瞋大眾皆笑佛言實無慢心乃餘習耳二歷述二證二一述悟證二述修證初我初發心從佛入道數聞如來說諸世間不可樂事乞食城中心思法門不覺路中毒刺傷足舉身疼痛我念有知知此深痛雖覺覺痛覺清淨心無痛痛覺我又思惟如是一身寧有雙覺攝念未久身心忽空初發心𫎇教發心者發小乘心從佛者從佛剃落入道者入出世道此自述機在小乘也聲聞入道以苦諦為初門如來鑑機時常為說苦諦故得數聞也世間不可樂事即是苦諦如三苦八苦等是也乞食下思法遇苦乞食猶思法門者顯時時處處不忘苦諦境也只顧思法忘其有身故不覺毒刺傷足雖一時不覺而毒發難當故致舉身疼痛正脈云奉教思苦而適遇苦事亦發悟之機也我念下念知會覺我念有知知此深痛者謂正當疼痛時自念身中宛爾有箇能知之性及所知之痛也雖覺覺痛句二覺字即是上之知字以知覺同體變文互用故覺清淨心無痛痛覺者謂承上雖有能覺之性及所覺之痛而正當能所歷然時又分明有箇覺清淨心其間亦無所覺之痛及覺痛之覺是又於妄覺之中會得真覺清淨心矣我又下深思悟證二覺縈懷轉復深思故曰我又思惟如是一身寧有雙覺者謂一身一覺自他共許今有雙覺自亦難信故曰寧有葢深疑之耳攝念者澄心觀察未久者少時便悟身心忽空者常光現前根塵識心應時脫落也二述修證三七日中諸漏虗盡成阿羅漢得親印記發明無學上云身心忽空固已無惑可斷但是乘悟併銷非次第盡故復於三七日中而研斷之諸漏者謂見漏欲漏有漏無明漏也既斷現行曰虗無發業用故又斷種子曰盡窮眠伏體故惑盡真窮道證四果故曰成阿羅漢得親印記許以發明無學道者顯小果已圓當進求大乘故歷述二證竟三結答圓通佛問圓通如我所證純覺遺身斯為第一思惟寧有雙覺悟得純覺未久身心忽空便能遺身遺身故三七可證小果純覺故回心便入佛乘故曰斯為第一畢陵身根竟五空生意根三一作禮陳白二歷述二證三結答圓通初須菩提即從座起頂禮佛足而白佛言須菩提或云蘇部底什公云秦言善業稟性慈善將護物心不令起礙嫌行即住嫌住即行故稱無諍第一餘如序分中釋二歷述二證二一述悟證二述修證初我曠劫來心得無礙自憶受生如恒河沙初在母胎即知空寂如是乃至十方成空亦令眾生證得空性我曠劫來者自敘遠本也心指意根無礙者正脈云無隔陰之昏處胎之昧也自憶受生者謂自能記憶曠劫受生事故曠劫受生捨身受身算數莫及強以喻明故曰如恒河沙華嚴云所積身骨如毗富羅山所飲母乳如四大海水可證此義初在母胎即知空寂者自憶恒沙身命次第銷亡比知母胎之身亦復不有當體空寂喚誰為我此述在母胎時已悟人無我理也如是乃至者謂如是念念在空乃至出胎亦然我既不有界復誰名故云十方成空此又以人無我比知法無我理耳厥後助佛揚化常以二無我理開示眾生故云亦令眾生證得空性此又以自悟二無我理轉復為人演說二無我理也二述修證蒙如來發性覺真空空性圓明得阿羅漢頓入如來寶明空海同佛知見印成無學解脫性空我為無上上雖悟空說空不達全空全性由此蒙佛如來發明此空非離色非析色乃全體即性即覺故曰性覺雖即性即覺不妨性覺雙寂故曰真空然上云母胎知空我空也十方成空法空也令眾證空以空為是也性覺真空遣以空為是之執顯空性圓明之體也圓則顯其非偏明則顯其非斷乘此妙悟先斷見思故曰得阿羅漢雖得羅漢不以小果自足又復重觀性空空亦不立故能頓入如來寶明空海言寶即是體明即是用同一第一義空甚深廣大猶如大海故易名空海言頓入者謂佛發性覺真空原為遣執縱使空性圓明亦屬待立今以重觀性空並此空性亦亡故得頓入佛空既頓入佛空其知見亦自廣大無際故云同佛印成無學者按漸修已屆四果解脫性空者就圓解可同佛證超前諸聖故為無上此大小雙印異前印小不印大也歷述二證竟三結答圓通佛問圓通如我所證諸相入非非所非盡旋法歸無斯為第一始而人法雙空故云諸相入非非即空也繼而空執亦除故云非所非盡謂能空之執與所空之相二俱盡也此乃以意旋法歸於空性圓明若於此不住小聖自然進入佛空故云斯為第一五根圓通竟三六識圓通問經初破識呵為生死根本眾生誤認枉入輪迴權小依修竟無實果今何菩薩聲聞依之入圓通乎答識雖至妄離真無別自體如依水現影全影全水凡夫認識忘真隨識流轉如癡人認影忘水逐影漂泊二乘制識昧真永沈斷滅如癡人止影棄水并水俱失此經初所以畢竟破也若果能了識無體即識見真亦如智人悟影無實全影全水不復逐影漂泊且能因影得水此四科七大中所以不畢竟破而此中菩薩聲聞所以依之入圓通也六一身子眼識二普賢耳識三孫陀鼻識四滿慈舌識五波離身識六目連意識初準正脈意前五識有二似難辨一似根難辨言前五識雖有分別而是隨念麤略頗似無分別之根性二者似意難辨言前五識雖是麤略而有隨念分別頗似有計度之意識今欲辨之者如前識大文云汝今徧觀此會聖眾但如鏡中無別分析此眼根也次云汝識於中次第標指此眼識也以是隨念分別但對性境初起一念不帶名言故及云此是文殊此富樓那等則屬五俱意識以與眼等識同時起故亦云明了識乃計度分別以對性境起第二念計執名言故至若獨頭意識離眼等識獨自現起緣獨影境屬周徧計度謂於落謝塵影周徧追究計度思慮也今惟取於眼識不可混亂下四准知三一作禮陳白二歷述二證三結答圓通初舍利弗即從座起頂禮佛足而白佛言舍利弗此云鶖子或身子釋見敘分灌頂云師事梵志沙然道術盡得然有弟子悉付與之及出家七日佛法皆通佛說一句為本過七日已更出異句異味宣無窮盡增一稱為智慧第一葢以眼識明利一見則通故成大智也二歷述二證二一述悟證二述修證初我曠劫來心見清淨如是受生如恒河沙世出世間種種變化一見則通獲無障礙我於中路逢迦葉波兄弟相逐宣說因緣悟心無際初眼識本利曠劫者遠敘多生心即眼識見即隨念分別以似根難辨故亦名見清淨者境不能擾正以如是故雖受生如恒沙而無隔陰之昏及處胎之昧也世間六凡法界出世四聖法界六凡法界隨善惡以升沈四聖法界由勤惰而進退故云種種變化此約因果釋之若約法門釋者謂法無定相施設隨機機既始終殊根法亦前後異說亦變化義也一見則通者一念初起本末洞然不似眼識昏昧者必待五俱及獨頭識故獲無障礙者塵不能障根不能礙所謂心見清淨者此耳我於下逢教增悟中路者半路途中逢值遇也迦葉波此云龜氏以龜為姓緣見前疏佛弟子中同姓甚多今是優樓頻螺兄弟兼伽耶那提也三人追隨而行故云相逐宣說因緣者準增一云舍利目連同師沙然梵志盡得其術更求勝法無師可事後遇額即是馬勝見其威儀庠序問以師為是誰所說何法答云諸法從緣生諸法從緣滅如是滅與生我師如是說舍利聞已即得初果今云逢迦葉波等者長水云同時所遇非獨一人經互舉耳則師亦云宣非一人彼此互出悟心無際者悟得從緣無性舉識全真真既無際識心豈有際乎此約融事歸理言之又悟心無際者悟得藏海不動識浪從緣緣起無際識心自應無際此約依理成事言之又悟得依理成事則理隨事變一多緣起無際屬理事無礙悟得融事歸理則事得理融千差涉入無際屬事事無礙是知身子雖跡居小乘論悟證已齊四法界矣二述修證從佛出家見覺明圓得大無畏成阿羅漢為佛長子從佛口生從法化生聞法開悟知師非常故亦從佛出家蒙佛開示轉更增明隨見即覺無障無礙故云見覺明圓是又於眼家識性成就無障礙智也智無障礙故千難殊對而不滯萬機感應而無違故云得大無畏為接樂小之儔權取四果故云成阿羅漢欲彰幹蠱之力跡示智魁故云為佛長子親蒙印記故云從佛口生慧依教成故云從法化生歷述二證竟三結答圓通佛問圓通如我所證心見發光光極知見斯為第一即眼識而成無障礙智故云心見發光光即智也雖權在小乘若究而極之則是佛知佛見依此修習決定成佛故云斯為第一身子眼識竟二普賢耳識三一作禮陳白二歷述位行三結答圓通初普賢菩薩即從座起頂禮佛足而白佛言梵語邲輸䟦陀此云普賢古德釋云起大悲願曰普廣度眾生曰賢此約地前資加二位所謂位前普賢是也又云行彌法界曰普位隣極聖曰賢此約十地等覺所謂當位普賢是也又云果無不極曰普不捨因門曰賢此約帶果行因所謂位後普賢是也此下自敘為法王子正是當位普賢二歷述位行當位普賢非初心從悟而修故惟述已證之位及現前之行也二一述已證之位二述現前之行初我已曾與恒沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名恒沙如來者顯事佛之多為法王子者顯入位之深所謂位隣極聖是也華嚴三昧品諸菩薩讚云佛子我曹常見汝諸如來所悉親近又行願品云一切如來有長子彼名號曰普賢尊此二偈可證此語十方如來深知普賢之行徧於法界窮乎盡際故教其弟子中菩薩根者倣效修習名普賢行故自敘從我立名必從普賢立名者有二義一者為令行人知所宗襲故二者為令普賢有所如被故二述現前之行世尊我用心聞分別眾生所有知見若於他方恒沙界外有一眾生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我與其人暗中摩頂擁護安慰令其成就我用心聞者惟用耳識心聞不假五俱及獨頭識故眾生知見有邪有正有大有小有權有實是等尋常必假明了及與獨頭方能分別今則不爾葢由多劫修習耳識圓通如後云心聞洞十方生於大因力是也若於他方者指娑婆之外至云恒沙界外又他方之最遠者也一生修行似應無足加被乃必為現身者統上有三重況顯一者他方尚加況於娑婆二者恒沙界外尚加況於近者三者一生尚加況於多生自應無不加矣發明普賢行者謂先悟毗盧性海後入普賢行門所謂稱性起修徧法界窮盡際故我於爾時者及時而應乘六牙象等現相以加象必六牙者準法華象是白象總表梵行清白象具六牙別表六度施設乘之者表以此為因到如來地也法華云其有讀誦法華經者我爾時乘六牙白象現其人前守護安慰等大同此意分身百千者雖一界一生若多界則有多生一一分身徧應或現百身或現千身非定言一百千也一身一機故云皆至其處此明中現相也下乃暗中摩頂障深者惑重業強報劣由此能障遇聖善根故云未得見我而言縱彼者謂縱彼如此我亦不忍遽捨仍於暗中摩頂而加被之擁護二字承上摩頂葢為擁護加持令其內障外障以潛消故安慰二字承上現身葢謂安慰提獎令其若身若心而俱進故身心俱進則深位可階內外障銷而前途有望故曰成就謂能成就普賢廣大行願心故歷述位行竟三結答圓通佛問圓通我說本因心聞發明分別自性斯為第一答意謂佛問圓通如我上來所說是也若欲令我說其本因亦由心識能聞發起智慧之明於一切法分別自在即今現前位行莫不資始乎此故曰斯為第一普賢耳識竟三孫陀鼻識三一作禮陳白二歷述二證三結答圓通初孫陀羅難陀即從座起頂禮佛足而白佛言孫陀羅亦云孫陀利此云極端正妻名也難陀此云歡喜佛之親弟為揀牧牛難陀及阿難陀故連妻為名慈恩譯為豔喜以其妻為豔色自名歡喜合而稱之約義略翻也四月九日生短佛四指容儀挺特與世殊異若入眾中有不識者謂是佛來功德論云阿難二十相銀色難陀三十相金色佛度出家詳如雜寶藏說茲不繁引二歷述二證二一述悟證二述修證初我初出家從佛入道雖具戒律於三摩地心常散動未獲無漏世尊教我及俱絺羅觀鼻端白我初諦觀經三七日見鼻中氣出入如煙身心內明圓洞世界徧成虗淨猶如琉璃初因機蒙教我初出家者出世間家從佛入道者入出世道雖具戒律者但能以事制身三摩常散者未能以理澄心由此雖能防非不能斷惑故曰未獲無漏俱絺羅身子之舅俱云摩訶俱絺羅此云大膝雖觸問能答而三摩常散與難陀同故於教難陀時亦及之也觀鼻端白者致心一境對治散亂心故良以修三摩時色聲味觸俱可迴避唯是香氣寂然來入鼻中鼻識首起明了隨之展轉引生餘識故致心常散動若依教諦觀於白自能忘情於香而致心一境矣古德云鼻端白氣息相也愚謂非氣息相即垂目自視鼻尖微有白色至下見鼻中氣又定深別境耳我初下觀鼻悟證諦觀者諦觀白相三七者尅期攝心攝心既久定力轉深故得見鼻中氣以尋常散心不見今乃見之如煙視微若著其定力轉深可知身心即指鼻識以肉形同身故無妨借稱內明者內自發明全識全性也全識全性徹照無遺故能圓洞世界然世界本自虗淨皆由眾生分別執有遂成礙染今以內明離於分別故不惟圓洞且徧成虗淨也虗淨莫狀取喻琉璃以琉璃內外明徹淨無瑕穢當世界虗淨時有類乎此可以意會耳暫得如是尚屬悟證至下自見二述修證煙相漸銷鼻息成白心開漏盡諸出入息化為光明照十方界得阿羅漢世尊記我當得菩提不住悟證仍依本修定益深氣方靜故得煙相漸銷轉氣成息化濁為清故曰鼻息成白自是不唯內明外洞兼復內外一體故曰心開謂如來藏心全體開現也全體開現無復能所對待見思二惑無所從起故曰漏盡謂諸漏永盡也心開故鼻息稱性化為光照十方漏盡故永以不生得成大阿羅漢世尊知其不甘小乘故記以當得菩提今自述也歷述二證竟三結答圓通佛問圓通我以銷息息久發明明圓滅漏斯為第一始而觀鼻攝心見氣如煙繼而煙相漸銷鼻息成白故曰銷息銷息謂銷氣成息非并息全銷以并息全銷自屬下句故息久發明者謂鼻息久靜稱性化光也光照十方故曰明圓得阿羅漢故曰滅漏佛記當得菩提亦權輿於斯門故稱第一孫陀鼻識竟四滿慈舌識三一作禮陳白二歷述二證三結答圓通初富樓那彌多羅尼子即從座起頂禮佛足而白佛言富樓那亦名布喇那此云滿願彌多羅尼亦名梅呾麗衍尼此云慈女梵語弗呾羅此云子從略合稱云滿慈子釋見敘分然舌識功能有二一別味二流辨滿慈於曠劫已來不循味而復性故能令舌識稱性流演洪辯而無礙也二歷述二證二一述悟證二述修證初我曠劫來辯才無礙宣說苦空深達實相如是乃至恒沙如來祕密法門我於眾中微妙開示得無所畏準法華佛稱滿慈於過去九十億諸佛所護持助宣佛之正法故自述我曠劫來辯才無礙至究其所以得辨之故文雖不顯殆亦由於不染味塵諦觀識性無我遂能流辨演說苦空等諸小乘法也深達實相者謂於正說苦空等諸小乘法時進觀識性虗妄舉體全真所謂即識性而深達實相非別有也如是者謂深達實相如是不惟宣說一佛之法乃至恒沙如來之法不惟宣說小乘苦空等法乃至大乘祕密深奧法門皆能宣說故云我於眾中微妙開示然既曰眾中則根器不齊既曰微妙則高低普應根器不齊故未免奇攻異難高低普應故頓令屈於言下魔外捲舌人天歸心故云得無所畏二述修證世尊知我有大辨才以音聲輪教我發揚我於佛前助佛轉輪因師子吼成阿羅漢世尊印我說法無上悟證事在過去故上云我曠劫來修證事在今生故此云世尊知我世尊即指今佛以今佛而知過去之辯者為有宿命及他心智故佛以說法音聲轉入機心名音聲輪又輪有運載摧碾二義如來說法音聲能運載眾生從因至果能摧碾眾生麤惑細障故借以為喻令其如佛所說開敷展演即是教以發揚自是當隨於佛遵教宣揚名為助佛轉輪因說法無畏降魔制外同獅子之善吼借眾生砥石磨盡殘思成羅漢之正果智冠餘眾辨勝羣賢故世尊印其說法無上歷述二證竟三結答圓通佛問圓通我以法音降伏魔怨銷滅諸漏斯為第一法音降魔者準法華魔有四種一煩惱二五陰三死四天惱亂自他故稱為怨滿慈以說法無畏二利俱成故能降伏四魔既降諸漏永殄故云銷滅然說法本為化他盡漏反成己利一點水墨兩處成龍斯為第一誠哉是言慕斯門者只須諦觀此識於諸味未來之前體何所潛諸味正來之際用自何起諸味既去之後滅向何去於此一一參詳識得潛處起處滅處則滿慈妙辨即在吾人舌端上現矣滿慈舌識竟五波離身識三一作禮陳白二歷述二證三結答圓通初優波離即從座起頂禮佛足而白佛言優波離此翻近執以佛為太子時彼為親近執事臣故或翻上首以其持律為眾綱紀故正音鄔波離今云優者譌耳據下自敘乃相隨太子伴修者也然身識功用亦二一別觸二持戒吾人若能於別觸之際離諸分別則全識全性全性全識以斯治身而身無不治以斯調心而心無不調是為轉別觸之功成持戒之用波離圓通如是而已二歷述二證二一述悟證二述修證初我親隨佛逾城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏逾越也逾城出家者準普曜經佛為太子時於十九歲願求出家父王嚴兵防守夜令車匿鞁犍陟馬名也從北門出行三由旬至閑靜林以劍自剃鬚髮身服袈裟波離既為近侍之臣自應相隨彼經不出者非所急故彼言從北門出今言逾者或是從北門上故六年勤苦者準普曜經既出家已進伽闍山苦行林天獻麻米日食一粒等波離伴修故應親觀降伏諸魔者準處胎經菩薩坐閻浮樹四十八日波旬夢見三十二變從覺恐怖告四魔女先往令壞現三十二媚相佛令變為老母又準觀佛三昧經三女粧飾盻目妖冶菩薩身心寂然不動白毫擬之女身九孔二藏八萬蟲戶自見厭惡嘔吐而去魔怒興兵並不得近此亦波離目覩之事故曰親見此下應有成道之語以魔降道成不言可知故略之也制諸外道乃成道以後之事如三迦葉波等向屬外道俱蒙如來制伏攝歸正法然此中曰親隨曰親觀曰親見者意顯悟證有由葢以從始至終目覩親見信出世之有益厭世間之無常深知貪欲為諸漏之本狂心頓歇歇即菩提故能解脫世間貪欲諸漏貪欲諸漏而言世間者且約見思二惑言之然亦但是乘悟併銷非次第盡也二述修證承佛教戒如是乃至三千威儀八萬微細性業遮業悉皆清淨身心寂滅成阿羅漢我是如來眾中綱紀親印我心持戒修身眾推為上初持戒證果將謂頓悟即是不知漸修故承佛教以持戒教以持戒正令其漸修意也如是者遵佛所教如是修持不唯篇聚無虧乃至三千威儀八萬微細亦所不遺葢言其防之嚴守之密耳溫陵曰行住坐臥律儀各二百五十對三聚成三千是為三千威儀復以三千配身口七支成二萬一千復配貪瞋癡等四分煩惱成八萬四千經文略零只言八萬微細按法數所載及灌頂所說與此亦未全同大約皆以兩乘戒相展轉配對雖已凑合數目於理似有未妥愚以寡聞未閱律藏不敢輒為定評但既曰威儀似惟持身或是小乘戒外細行既曰微細似兼持心或是大乘戒外細行姑令闕疑再俟參考性業遮業總該兩乘戒品性業者性元是罪不待佛制持即是善犯即是惡犯之得兩重罪一業道二違制如殺盜淫妄等遮業者制前無犯制後犯罪犯之者但結違制如飲酒墾土等悉皆清淨者言如上所說細行尚然不遺況夫性業遮業自應如水去泥如玉絕瑕也身心寂滅者小乘制身故身識寂然不動大乘制心故心意滅而不生見思二惑自此永盡故曰成阿羅漢我是下首眾蒙印總統曰綱維持曰紀以波離能持戒故佛令稽察持犯處斷重輕總統佛眾維持律學故自云我是等也大乘制心之學唯佛能知故親蒙印許小乘持戒修身眾所同許故眾推為上如智度論云長老優波離於五百羅漢中持律第一據此則大乘制心是其密行小乘制身是其顯跡今以落草槃桓乃真贓畢露耳歷述二證竟三結答圓通佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一先以小乘執身身識不行於觸塵中得大自在次第以大乘執心意識無別於法塵中獲妙通達然後身心互用乃至眼耳等識一切皆能通利據此則斯為第一句語雖似通意實別指執身以是最初入手方便又此科亦特為標顯身識故也波離身識竟六目連意識三一作禮陳白二歷述二證三結答圓通初大目犍連即從座起頂禮佛足而白佛言目犍連此云采菽氏姓也大揀同族又以其神通大故詳見敘分然人皆知目連神通不知其得通之由今自敘由於旋識復湛心光發宣二歷述二證二一述悟證二述修證初我初於路乞食逢遇優樓頻螺伽耶那提三迦葉波宣說如來因緣深義我頓發心得大通達初指未出家時準增一舍利目連同師沙然梵志盡得其術然臨終微笑問其故乃曰我見金地國王沒夫人投火願共生一處後見金地商人問之果然二人追悔未盡其術更求勝法無師可事一日路遇頞聞說因緣隨至佛所得度出家今云路逢三迦葉波者已於舍利圓通中辨優樓頻螺此云木瓜林依林住故亦云木瓜癃胸前有癃如木瓜故伽耶山名那提河名為揀同族各以住處立號皆佛之弟子依佛所說為彼敷揚故云宣說如來因緣深義然因緣之義一往而論似唯對治無因及與邪因若究極而言實能導達佛乘如中觀論云因緣所生法我說即是空是亦名為假亦名中道義夫既三觀齊舉三諦並照何教不收何道不致非局小道權宗故義言深也我頓發心者頓發改邪歸正之心得大通達者圓悟即空即假即中之義自是旋分別虗妄之識復湛然不動之性論悟證可齊佛境界矣二述修證如來惠我袈裟著身鬚髮自落我遊十方得無罣礙神通發明推為無上成阿羅漢寧唯世尊十方如來歎我神力圓明清淨自在無畏一見佛時即蒙如來慈惠但呼善來比丘即具僧相故云袈裟著身鬚髮自落自是心光發宣故得遊方無礙良以神通發自性明眾中推為無上涉世既久見思永寂故曰成阿羅漢是修證先且獲效於四果也寧唯世尊者言我之神力豈獨為世尊心許即十方如來亦皆歎我神力徧遊十方作諸佛事故曰圓明一真不動纖塵無干故曰清淨此嘆其涉世無礙德也任運施為不假作意故曰自在是魔皆降有怨皆摧故曰無畏此歎以任運折伏德也如降龍經佛昇兜率毒龍為障目連化身大小龍懼鑽齧遂服又志心經外道移山制之不動目連平為大地與民除患等皆自在無畏之驗歷述二證竟三結答圓通佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一首句牒問我以下結答旋湛者圓悟因緣無所用其分別旋意識而復湛然性故但前以意含此方說出心光發宣者見佛出家旋湛既久即分別而化心地光故由此發宣運用故有神通亦前以意含此方說出也如澄濁流者謂旋識復湛如澄濁流還復湛水也久澄清瑩者謂旋湛既久心光發宣故有神通如水久澄便成清瑩之水有像斯鑑也斯為第一句語雖似通意實偏指旋湛良以圓悟因緣為旋湛之前導心光發宣為旋湛之後功是知不有旋湛則圓悟徒成狂解心光惟許性有既不能涉塵勞而漸修又何由斷見思而實證宜乎其以旋湛為第一也若依古德前無意含之義則此中旋湛等語無所從矣六識圓通竟四七大圓通正脈云前五大即塵後二大即識與根雖不出前根塵識三而特具周徧廣大之象故別得大名七一烏芻火大二持地地大三月光水大四琉璃風大五空藏空大六彌勒識大七勢至根大初三一作禮陳白二歷述二證三結答圓通初烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言溫陵曰烏芻瑟摩此云火頭灌頂云即火首金剛神也示為護法法不應坐故不言座起而直云於前特標合掌者以先是擎拳持杵不合掌故又特標禮佛雙足者以較之諸聖禮佛分外加敬故二歷述二證二一述悟證二述修證初我常先憶久遠劫前性多貪欲有佛出世名曰空王說多淫人成猛火聚教我徧觀百骸四支諸冷煖氣神光內凝化多淫心成智慧火從是諸佛皆呼召我名為火頭初昔性多淫常與嘗同猶曾也我常先憶久遠者自述曾於先世記的久遠劫前事故性多貪欲者謂歷世著婬積習成性生來即多貪欲如普門品多於淫欲者是也有佛下佛教觀火佛名空王者深證第一義空於諸法中得自在故法華經佛顯阿難本云我與阿難同於空王佛所發心是知烏芻瑟摩亦與佛同時發心但為護法現力士之迹遠究深本實難思議說多淫人成猛火聚者令其知懼息多淫心亦對症施藥也灌頂云淫本暖觸迫發多淫即成多火故云火聚火者以焚燒為義然欲火不唯燒諸善根而內外相感實能燒諸形命天祠焚身火床等報可為明證教以徧觀冷煖氣者令其自驗之意言百骸四支於淫心未動之時本自清冷及欲念一交則舉體燥熱以冷形煖自信火聚之言非虗妄矣神光下成觀得名火觀既成淫心頓息火氣不能外洩反以資益精神故稱神光內凝者凝聚於內不洩於外如世少欲之人多身輕體徤即神光內凝之驗諺云精滿不思欲今既神光內凝自應欲念永銷故云化多淫心然婬心熾盛必至癡迷燥熱淫心既化自應轉癡迷作智明變燥熱為慧𦦨照耀性地焚燒惑薪故云成智慧火從是上契佛乘與諸佛心印懸通故蒙諸佛召以火頭之名火頭云者正印其由火觀而入為圓通之首也二述修證我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔怨觀火成定故稱火光三昧以此定力先斷見思故得成阿羅漢云心發大願者不住小乘法故大乘之願應有多門今以護法為門故云諸佛成道我為力士力士即金剛神也親伏魔怨者正法念經云昔有國王第一夫人生千子欲試當來成佛次第俱留孫探第一籌釋迦當第四籌乃至樓至當千籌第二夫人生二子一願為梵王請千兄轉法輪一願為密跡金剛神護千兄教法今云諸佛成道或指賢劫千佛我為力士或即密跡金剛良以道重魔高行芳見嫉故凡諸佛成道說法多有天魔橫生留礙誓願親伏決不姑容意以借此嚴土利生圓滿菩薩行也歷述二證竟三結答圓通佛問圓通我以諦觀身心煖觸無礙流通諸漏既銷生大寶𦦨登無上覺斯為第一身熱心燥皆為煖觸由身及心乃名諦觀故前約初起但教觀身此兼深修并言觀心必至身心並觀乃成三昧無礙流通者三昧既成兼身與心無能礙於煖觸自上而下時覺流轉通融所謂神光內凝是也化多淫心因而諸漏永盡成智慧火故云生大寶𦦨降伏魔怨名大護法利生名寶爍惑照真名𦦨所謂火光三昧是也迹為力士本契佛乘故云登無上覺然貪為惱本婬稱罪魁一火觀而俱盡故曰斯為第一烏芻火大竟二持地地大三一作禮陳白二歷述修證三結答圓通初持地菩薩即從座起頂禮佛足而白佛言菩薩名持地者準寶雲經地有十義一廣大二眾生依三無好惡四受大雨五生草木六種子所依七生眾寶八生眾藥九風不動十師子吼不驚菩薩持心如之若別合者能發廣大菩提心故能與生死眾生作依止故於諸眾生無揀擇故承受諸佛大法雨故生長一切諸功德故菩提種子所依托故出生利益眾生法故出生對治煩惱法故世間八風所不動故聞說深法不驚疑故依本經則外平界地內平心地持此為因用求佛果故名也二歷述修證此菩薩初修即依事行非同前之諸聖先悟後修故直言修證二一歷修事行二因悟證果初三一初修唯事平地二中間兼事代持三後修更兼濟溺初我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土往昔者亦約過去世言佛名普光者身光智光二俱周普乃五十三佛之首也見佛發心出家具戒故云我為比丘要路者陸行緊要之路往來所必由故津口者水陸交接之口津濟所必經故田地者田間種植之地耕穫所便行故高下不平曰險溝岸迫陜曰隘葢要路津口田地皆有此等處也不惟此等但有不如法處必至妨損車馬如車有失轄折軸之憂馬有陷脛失足之苦車馬尚損餘可知矣我皆平填者平高填下因其勢而夷之或作橋梁者架木負石掠其勢而避之或負沙土者掩水覆泥逆其勢而治之務使險者坦隘者博車無妨馬無損也二中間兼事代持如是勤苦經無量佛出現於世或有眾生於闤闠處要人擎物我先為擎至其所詣放物即行不取其直如是勤苦者謂如是平填道路架橋負河可謂極其勤勞極其辛苦矣經無量佛出現於世者顯常行不輟是知菩薩漸修之行已非羣賢可及此是結前平地下乃兼明代持或有眾生者謂正修前行之時設或遇有眾生指劣弱少力者言於闤闠處要人擎物者灌頂云市垣曰闤市門曰闠愚謂二皆貿易之處要人擎物者謂貿得之物自力所不能勝故我先為擎者人且索直菩薩倡先為擎即攝三施一身擎財施以身為內財故二索者感化法施三物主無畏即無畏施詣猶往也謂至其所往處也放物即行者不索其直不取其直者與亦不取此又於財施中足外財義故三後修更兼濟溺毗舍浮佛現在世時世多饑荒我為負人無問遠近唯取一錢或有車牛被於泥溺我有神力為其推輪拔其苦惱佛名毗舍浮梵言也此云徧一切自在謂於諸法中得自在故乃過去莊嚴劫最後佛也據此則持地菩薩始從普光佛所發心中間經歷五十三佛及莊嚴劫九百九十九佛至最後毗舍浮佛出世時常行平地及代持之行是知上云經無量佛者乃大略言之或可千佛之上更有別佛足成無量亦未可定現在世時揀非佛滅已後事故世多饑荒者穀不熟食不給也上云擎此云負者謂輕則手擎重則背負前後各出其實互具總一代持之行遠近有二一路徑遠近二人情遠近二俱無問者一顯難易不較一明怨親平等總一無分別心惟取一錢者以時世饑荒乞食難得略取資身無多貪故此上皆屬舊行下乃更兼濟溺或有車牛被於泥溺者車以牛駕非同馬之利便兼以泥溺則執御者並受其累我有神力者積劫願行所致福報所感為其推輪者助牛出車拔其苦惱者不唯牛脫泥溺并執銜者亦令免其累焉歷修事行竟二因悟證果二一蒙教開悟二漸次證入初時大國王延佛設齋我於爾時平地待佛毗舍如來摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別微塵自性不相觸摩乃至刀兵亦無所觸初仍修本行延請也國王請佛者為國修福屈九五之尊迓萬德之聖故廣列珍羞無上妙味故曰設齋平地是其本行且又知佛降臨故即於爾時待之毗舍下佛教平心摩頂者愍其事行久勞攝授加持令其以理融事故當平心地者如來藏心本無高下一念瞥起淨染繁興若果能離於念相則內心平矣內心既平外相斯夷雖陵谷變遷而常自如如滄棄更易而由來坦坦故曰則世界地一切皆平維摩云欲得淨土當淨其心隨其心淨則佛土淨天台云娑婆心險感陵谷之高深極樂心平致平地之如掌皆斯義也我即下得大開悟我即心開者聞佛平心之教念相離而藏心開現也藏心開現無分別智湛然根身器界應念化成無上知覺故曰見身微塵與造世界所有微塵等無差別既等無差別則世界地一切皆平矣然身界俱以微塵稱者以同是微塵所造依所造彰能造亦欲顯示同為大地故也微塵自性者由上等無差別進觀身界二塵同一自性既同一自性於中實無能觸所觸能摩所摩故曰不相觸摩豈唯身之與界不相觸摩乃至身臨刀兵亦無所觸如六祖延頸刺客三揮利刃俱如斬影即其證也又此以上通以四法界會之其義更明如前但平外地專務事修即事法界蒙教平心以理奪事即理法界心開見塵則理不礙事身界無差則事不礙理即理事無礙法界至於微塵法界不相觸摩則互相容即刀兵臨身無所觸傷則互相涉入即事事無礙法界但此且約見處言之所謂得大開悟者以此二漸次證入我於法性悟無生忍成阿羅漢迴心今入菩薩位中聞諸如來宣妙蓮華佛知見地我先證明而為上首身界二塵該一切法彼既同一自性則一切法皆同一自性誰為能生誰為所生由此於一切法性悟無生理忍信不疑按悟處已齊八地但以伏斷分齊方盡見思故云成阿羅漢悟處既深不住淺證故於賢劫迴心至今永入菩薩位中諸如來指賢劫前三佛兼他方諸佛言之妙蓮華即指楞嚴以此經亦名大方廣妙蓮華王故佛知見即經中所顯如來藏心在眼名見在意名知六用舉二以攝其餘以同一體故我先證明者倡先領修引攝後進故既為引攝後進眾皆推崇故曰而為上首此約其從賢劫迴心已來說也歷述修證竟三結答圓通佛問圓通我以諦觀身界二塵等無差別本如來藏虗妄發塵塵銷智圓成無上道斯為第一正脈云此備述前悟而已諦觀二字即前蒙教心開以無分別智諦審觀察也因了二塵無差知其本於藏性依本求末無別自體故云虗妄發塵然發塵雖屬虗妄而動念即成違礙若能奮起精進永離念相妄塵既銷真智斯圓無上覺道不成何待是據持地修證惟以平地為門故云斯為第一持地地大竟三月光水大三一作禮陳白二歷述修證三結答圓通初月光童子即從座起頂禮佛足而白佛言菩薩名月光者月為水大之精故前云諸婆羅門和合幻藥手執方諸承月中水由此菩薩觀水入圓得水之精承此精華照臨法界與諸眾生而作利益若彼月光故以為名此約本經義釋若依華嚴月有四種奇特一映蔽星宿二示現虧盈三有水現影四見皆對目菩薩映蔽二乘示有智斷有感必應眾生各見對我與彼月光義相似也正脈云童子乃菩薩別名表童真德也亦可童子即法王之子如文殊師利亦有以童子稱者二歷述修證菩薩自云我今已得阿羅漢道久離病緣據此則是迴小向大理事雙修非同諸聖先悟後修故亦直言修證二一遇佛教觀二依教修證初我憶往昔恒河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地觀於身中水性無奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一同見水身中與世界外浮幢王剎諸香水海等無差別初教以觀水事在過去故云往昔時經多世故云沙劫謂逆推從此至彼所過劫數如恒河中沙也佛名水天者因觀水性徹證第一義天乃三十五佛之一如決定毗尼經明教諸菩薩者非特為一人說故如其所證以度一類之機故唯教修習水觀觀成得忍故云入三摩地觀於下詳示修法復有二義一先觀內水外水懸遠難以攝心故先教觀於身中水性無奪者水性在身餘大無能奪故初從涕唾等轉釋無奪之義在鼻曰涕在口曰唾此水之近於外顯然而易見者在咽下嚥曰津在喉外溢曰液此水之近於內隱然而可覺者在骨在髓者曰精在筋在肉者曰血此水之寓於內幽微而難見難覺者飲食變退曰大小便利此又水之入於上運轉而注於下者如是從外向內由上至下一一推窮極盡無非徧體流動故云身中旋復旋復即流動義也水性一同者正脈云涕唾津液水之清相精血便利水之濁相清濁雖異水性無別愚謂一同者一體通同地火風等不能陵滅上云水性無奪是也見水下次觀外水言雖一體通同未免為身所礙是須引伸外觀故曰見水身中等謂一向見水之在身中者又觀其與世界外香水通也乳峰摘脈云按華藏莊嚴世界海下有大蓮華名種種光明蕊香幢此華生於普光摩尼香水海中此華內有十佛剎微塵數香水海一一海中各有一剎種每一剎種皆有二十重佛剎累高如幢愚又補之曰超出如王合名幢王剎也今此中世界外指總香水海所謂普光摩尼以此海在蕊香幢大蓮華下屬世界之外故浮幢王剎指別香水海所謂十佛剎微塵數以此海在蕊香幢大蓮華內如幢如王之佛剎於中浮故總別合論故云諸香水海若分別論之應云與世界外總香水海及浮幢王剎別香水海也等無差別者一體通同故既內外一體通同則不見有身為礙若進能亡界則性合真空耳然此上自觀於身中下古德直作領旨修觀解釋今細詳其文並無領旨之義葢是水天如來既教修習水觀復為詳示修習法也遇佛教觀竟二依教修證三一初成內觀二次修外觀三證水合空初我於是時初成此觀但見其水未得無身當為比丘室中安禪我有弟子窺窻觀室唯見清水徧在室中了無所見童稚無知取一瓦礫投於水內激水作聲顧盻而去我出定後頓覺心痛如舍利弗遭違害鬼我自思惟今我已得阿羅漢道久離病緣云何今日忽生心痛將無退失爾時童子捷來我前說如上事我則告言汝更見水可即開門入此水中除去瓦礫童子奉教後入定時還復見水瓦礫宛然開門除出我後出定身質如初初證水局身是時者依教修習時也境智相應是曰初成此觀證得水性一同餘大無能奪滅故云但見其水雖但見其水依然在身中旋復故曰未得無身是雖知身中無我尚未了五蘊皆空也當為下顯身為礙言既未得無身仍是小乘故云當為比丘謂當時尚在比丘位故室中安禪者仍是修習前觀禪而云安者以境智相應不勉而中故弟子者執侍巾瓶之人見其久在室中不敢直入故惟窺窗觀室意為探其動與靜也唯者揀餘言地水火風咸同一性無緣不興興必待緣今以水觀為緣餘緣不復興起故唯見清水徧室餘則了無所見灌頂云此即實定果色後梁法聰禪師漢州水觀和尚室為水淹可證此義童稚即指童子凡八歲以上十五以下者皆可稱之事理未諳故曰無知由無知故起二種疑一疑明知比丘安禪何得室中無人二疑明知室是觀堂何得惟見於水二疑交懷故取瓦礫投水葢為試其有人無人是水非水耳激振起也水既作聲信知是水雖信知是水猶唯恐有人且看且走故云顧盻而去出定心痛者雖是瓦礫在中以未得無身為身所礙故也如舍利弗遭違害鬼者灌頂云身子於恒河岸居蘭若中入定被違害鬼以手掌之出定頭痛今出定心痛同一為身礙故我自下不知反疑思惟者自疑自怪意也今我已得等者自謂阿羅漢道不惟今日始得亦早已得故病緣有二一宿業所感二現業所招言久離者以既得羅漢自應無有現業早已便得亦應無有宿業如是則不應有痛故自疑云何忽生自怪將無退失不知但是未能亡身為身所礙耳爾時下以除為驗爾時者正當自疑自怪時也童子捷來者欲釋其疑怪意故捷猶速也說如上事者謂如上見水徧室投礫於中等事一一詳報故我則告言等者謂自覺由於身礙教以汝更見水開門除礫為試其猶痛否耶童子奉教等亦但解遵諭除礫其教以除礫之意依然不知耳我後出定等乃自驗知所以心痛者為有身故二次修外觀逢無量佛如是至於山海自在通王如來方得亡身自知心痛由於身礙擬欲引伸外觀求佛攝受故又逢無量佛如是於無量佛所引伸外觀至於山海自在通王如來外觀始成也如來名山海自在通王者亦水大圓通之號言水本流通遇山成礙佛以水性圓通融山成水故於若山若海同一自在流通然山屬地大地大既融而為水餘大可知是知此佛惟以水大圓通逈超餘門故稱為王而月光進修外觀必至此佛乃成者亦同氣相求同聲相應義也外觀既成則見水身中與世界外浮幢王剎諸香水海等無差別故曰方得亡身三證水合空與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會上科雖引伸外觀惟約一華藏界諸香水海是雖得亡身未能亡界以界相未空故今於亡身之後更以深觀之力擴充外水與十方華藏莊嚴世界諸香水海一體通同外此則無界可融無水可觀但見其依於真空與真空合其體故曰性合真空既性合真空則空水融即故曰無二無別前文所謂性水真空性空真水清淨本然周徧法界者此則極證之矣今於如來者如來即指今佛言前此雖得亡身未能亡界名跡猶是羅漢今於如來出世方得童真之名參預菩薩之會以我證得水性合空已到法空地故歷述修證竟三結答圓通佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一味氣分也答意謂我以觀於內外水性同一氣分不過流動通融尚未亡水及至性合真空並水亦亡由此證得無生法忍法忍既成菩提不遠若欲取證不須更求餘門故曰圓滿菩提斯為第一月光水大竟四琉璃風大三一作禮陳白二歷述修證三結答圓通初琉璃光法王子即從座起頂禮佛足而白佛言琉璃內外明徹淨無瑕穢下文菩薩自敘身心發光洞徹無礙即得名之由故正脈云取後所悟洞徹得琉璃號又梵語吠琉璃此云青色寶由此菩薩常放青色光明同彼琉璃故取以為名灌頂云此即涅槃經中琉璃光菩薩放青色光至釋迦座前者也二歷述修證菩薩自敘云逢佛未幾得無生忍義同善財一生圓證不可以先悟後修論之故亦直言修證二一遇佛教觀二依教修證初我憶往昔經恒沙劫有佛出世名無量聲開示菩薩本覺妙明觀此世界及眾生身皆是妄緣風力所轉佛名無量聲者以修習風觀為號言一切諸法莫不有聲聲不自聲因風而有若直觀於風恐隱顯不常難以成觀是須以聲觀風然聲既無量則風亦無量如是而觀則在在皆成觀境故佛以之名俾修習風觀者知所從也又觀成之時融風歸性然後依於性風發而為無量音聲應機說法故佛以之名俾成就風觀者知所用也開謂開顯理性示謂指示觀法菩薩即所被機也本覺妙明句正明所開之理由來靈鑑曰本覺無始不昏曰妙明前文所謂性覺妙明本覺明妙是也觀此世界等正明所示之觀觀字指能觀智世界眾生即所觀境妄即一念妄動世界眾生依此而有故名為緣而又言風力者以妄動屬風能與身器為緣即名為力轉猶變也謂初依本覺妙明一念妄緣風力而有業相由業故轉成能見而有轉相由能見故有境界妄現而成現相是世界眾生之細相現矣至於智續執計起業由此而有業繫苦相則世界眾生之麤相著焉是知世界眾生始於一念妄緣風力展轉變起故云皆是等也然彼佛為顯本覺妙明而却示以此觀者葢以覺雖本具明雖妙成奈為一念妄緣風力展轉變起根身器界內封我執外結法縛流蕩忘返愈趣愈下則本覺反成不覺妙明永沈無明佛示此觀令知風力無依身器元空內不執我而分段無因外不縛法而變易絕絆即本覺而頓成妙覺緣妙明而轉入圓明圓通極致盡於是矣二依教修證四一觀風體同二了風性虗三觀成得忍四心開證果初我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別我於爾時者即於彼佛開顯理性指示觀門時也為資風觀以復本覺妙明故於世界身心周徧觀察觀界安立者謂先觀東西南北四維上下必由動而安立設無有動誰為安立觀世動時者謂次觀過去現在未來必由動而成時設無有動誰為遷流觀身動止者謂更觀前後左右必由動而成止止定相成設無有動定相誰分觀心動念者謂又觀生住異滅必由動而成念設無有動念相誰立如是次第徧觀情器各二故云諸動所動之法雖異能動之體不分故曰無二唯一風性故云等無差別此觀異歸同約初心入手言也二了風性虗我時覺了此羣動性來無所從去無所至十方微塵顛倒眾生同一虗妄前觀既成又復細心體察故云我時覺了此羣動性即指風言來無從去無至者顯當處出生隨處滅盡徹體虗妄杳無實體可跟究耳十方微塵即指器界以是聚微成故顛倒眾生即指根身以因迷倒有故然迷倒固為業緣聚微亦屬風力咸為動性但內外異耳彼且來無所從去無所至況夫聚微而成十方世界迷倒而有異類眾生若狂華起於翳睛類幻人成於術力故曰同一虗妄此體一歸盡約深修增進言也三觀成得忍如是乃至三千大千一世界內所有眾生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂閙逢佛未幾得無生忍承上多界眾生既已虗妄如是況夫少界眾生乃至一界眾生其益為虗妄可知三千大千等即近指一世界內所有異類諸眾生也然體察虗妄必由遠而至近者以遠境邈茫易信其虗近境現在難知其妄葢是以易信例難知耳雖已例明猶恐難知故又以器貯蚊蚋喻之一器者或瓶或鉢之類方言楚曰蚊秦曰蚋其嘴如針刺人作癢而夜間尤甚乃飛蟲之最小者啾啾微小聲也喻意以三千大千隨風飄皷如一瓶鉢小器隨手運轉其中眾生種類各別如撲捉百頭蚊蚋貯放器中各以妄緣風力諍人競我如啾啾亂鳴至於諍王圖開疆展土建功立業等事亦不過如在分寸之中皷發狂閙皷動也狂亂也上云亂鳴此言狂閙者形聲異故要知一器非久長之物蚊蚋非大年之生一朝器壞而蚊蚋撲滅彼啾啾亂鳴皷發狂閙者竟何所有用此為喻則根身器界同一虗妄之旨益昭昭矣逢佛未幾者謂總計逢佛教觀依教修習未經幾多時也由遠而近體觀身器虗妄當下離念於三界內不見有少法生滅名為得無生忍此體似歸真約觀成悟證言也四心開證果爾時心開乃見東方不動佛國為法王子事十方佛身心發光洞徹無礙無生理顯本覺妙明自現故曰爾時心開梵語阿閦此云不動五十三佛中一也國名歡喜亦名妙樂或名妙喜異譯不同故夫東方為羣動之首佛名不動者表即動而證不動之理菩薩觀風得忍與彼心印懸通故曰乃見顯未契此理者不能見故法王即指彼佛菩薩所證克肖於彼能傳其道故為子也雖為彼佛之子亦能徧事十方諸佛以所證之理圓通一切諸佛法故下文所謂合十方佛傳一妙心者以此即幻身而證法身即妄心而證真心故身心皆能發光由發光故表裏洞徹猶如琉璃映現諸法而無障礙如法華身根清淨文云雖未得無漏法性之妙身以清淨常體一切於中現菩薩所以名琉璃光也歷述修證竟三結答圓通佛問圓通我以觀察風力無依悟菩提心入三摩地合十方佛傳一妙心斯為第一來無所從去無所至故曰風力無依然根身器界皆以妄緣風力所轉風既無依則根身器界一切皆空所謂諸妄銷亡是也諸妄既銷本覺妙明自然現前故曰悟菩提心所謂不真何待是也從此不見有法得無生忍即動而證不動之理故云入三摩地所謂那伽常定是也以自所證質之十方諸佛而彼諸佛遞代相傳之妙心不越乎此故云合十方佛等是知斯門為真實圓通故稱第一琉璃風大竟五空藏空大三一作禮陳白二歷述體用三結答圓通初虗空藏菩薩即從座起頂禮佛足而白佛言因觀四大無依銷礙入空得無邊身故以虗空為名依此出生無礙神力故名為藏前云虗空體非羣相不拒諸相發揮菩薩之身體用同此至下經文自見二歷述體用此菩薩批空便說體用至於修證唯末後略顯耳四一以理奪事二理事無礙三事事無礙四結由原證初身界為事虗空為理唯顯虗空不留身界故為以理奪事我與如來定光佛所得無邊身爾時手執四大寶珠照明十方微塵佛剎化成虗空初先空內身我與如來者如來即指釋迦顯同佛一時修因也定光佛乃指因中所事之佛梵語提洹竭瑞應經翻為定光無量壽經翻為錠光法華經翻為然燈大論云太子生時身光如燈直至成佛亦名然燈是釋迦如來第二僧祇授記本師故得與同事也得無邊身句乃菩薩自述所證未必與如來同得但譯者略欠眉目若於得字上加時我二字則分明矣正脈云無邊身即佛十身中虗空身也清涼云混虗空為體性大集會中菩薩來時純現虗空相謂阿難言我身即是虗空以虗空證知一切法為虗空所印又菩薩言我以虗空為庫藏雨十方無量阿僧祇世界所有寶物衣服飲食偈云虗空無邊量亦無有高下故知無邊身即虗空身焉而不言云何得者留待後文中出故如後云由我諦觀四大無依妄想生滅虗空無二既四大無依妄想生滅自不以色心和合為身既虗空無二即惟以虗空為身此其所以得無邊身也爾時下次空外器言當爾之時雖得無邊之身若外器不空有二不便一者身相不純以有世界礙故二者界不我用以不能隨空轉故故須并外器亦空手指空慧言菩薩既以空性為身即應以空慧為手故以空慧手保任前之四大空性不令有失即是執持四大寶珠四大空性稱為寶珠者可珍重故能轉照故保任既久四大空性不失仍復以內例外即是照明十方內之四大既空例知外之四大亦復不有故云微塵佛剎化成虗空後云佛國本同葢以外之四大本同內之四大以內例外二俱成空不見有少法生滅故後云於同發明得無生忍二理事無礙自心理也現鏡放光流灌不礙事也幢剎事也來鏡入身同空不礙理也又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來入鏡內涉入我身身同虗空不相妨礙初理不礙事上科身界俱空得無生忍即是自性真心現前時也但已得其體未獲其用恐墮理障終礙事修故又於自心現大圓鏡大圓鏡即是無障礙智也依自心現理事並照如大圓鏡色空俱現故內放十種微妙寶光者即是依於無障礙智對十法界機現起十種差別智也流灌十方盡虗空際者即是依於十種差別之智演出十種差別法門展轉流通十方空際所謂無不從此法界流也諸幢下事不礙理諸幢王剎略於水大中釋今依灌頂引華藏圖說更詳釋之彼云世界最下有十層須彌山微塵數風輪持上普光摩尼香水海海中出生一大蓮華名種種光明蕊香幢此華內有無量香水海海有無量剎種每一剎種皆有二十層佛剎累起如幢高大稱王今云諸幢王剎即無量香水海中諸剎種也而云來入鏡內者且約觀想之力致故言說法善巧如上已明欲彰嚴土方便故運想諸幢王剎即照華嚴華藏世界品義想也想久觀成則諸幢王剎時時顯現於無障礙智中故云來入鏡內又觀智從心現故帶剎從心而涉入身內雖涉入身內由前已得無邊之身同於虗空不相妨礙所謂無不還歸此法界也據此則智流光徧度盡十方眾生唯依自心剎入我身嚴淨無邊佛土不須遠到是且以理事無礙而為度生嚴土之大善巧大方便也三事事無礙身能善入微塵國土廣行佛事得大隨順上科理事無礙猶資觀照融通此則不假觀照任運現起不離本處而徧應塵國故云身能善入於一塵中而轉大法輪故云廣行佛事無機不應有感即通故云得大隨順據此則妙用等佛非心思所能到惟證乃知豈言語之可及此乃以事事無礙而為嚴土利生之真功德真妙用也四結由原證此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍此大神力指上理事無礙事事無礙二科以是從體起用非跛驢所能為故由我諦觀等先空內身也言一切眾生妄認四大為自身相妄認六塵緣影為自心相執我我所妄受生死菩薩為出生死先觀內身言諦觀者謂離於分別驀直看去也看得地水火風從因緣有妄想分別依塵境生因緣別離則四大無依塵境變壞則妄想亦滅心色俱空幻身不有故與虗空無二所謂得無邊身者即在此時佛國本同句次空外器也言佛國亦是四大所成本同內之四大內之四大既空以內例外則外之四大亦空所謂微塵佛剎化成虗空者即在此時於同發明者謂於此內外同空之理既已發明自不見有少法生滅故曰得無生忍已得全體當起大用是知理事無礙事事無礙皆發端於此歷述體用竟三結答圓通佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一身剎俱空故無邊際住忍不動即是三摩由理事無礙而至事事無礙故曰妙力圓明謂微妙神力圓徧而明照也空藏得力於此故曰斯為第一空藏空大竟六彌勒識大三一作禮陳白二歷述修證三結答圓通初此菩薩先言修後言證雖有神用攝在證果中故彌勒菩薩即從座起頂禮佛足而白佛言彌勒清涼云具曰迷帝西域記名梅怛麗耶溫陵曰正音梅怛利曳那此翻慈氏姓也名阿逸多此云無能勝謂依惟識觀起同體慈力最強故正脈云慈隆即世悲臻後劫愍物迷識示迹發明也二歷述修證三一遇佛教觀二修習證果三果後勝用初我憶往昔經微塵劫有佛出世名日月燈明我從彼佛而得出家心重世名好遊族姓爾時世尊教我修習唯心識定入三摩地初自述好名法華云如過去無量無邊不可思議阿僧祇劫爾時有佛號日月燈明如是相繼有萬佛皆號日月燈明彌勒埀跡乃在最後佛時去前所過之劫惟取後佛至今僅可以塵數計之故云經微塵劫佛號日月燈明者日有導至成熟二義月有除熱得涼二義燈有破暗傳照二義故玄贊云佛能導迷至覺成器熟根日也除煩惱熱得涅槃涼月也永破愚癡化生傳法燈也亦可以識性圓明無微不燭如日月燈故又法華文殊謂其是妙光弟子今云從佛出家者或出家後轉師妙光如明燈八子事例名與利相因既心重世名則身為利役可知既身為利役必將奔走豪門趨逐權勢故曰好遊族姓法華云貪著於名利求名利無厭多遊族姓家棄捨所習誦是也爾時下佛示唯識世尊因其貪名著利向外馳求令知三界惟心萬法唯識故教以修習唯心識定依修故名利所不能牽族姓所不能屈其心常澹泊未曾有散亂身體及手足靜然安不動故曰入三摩地二修習證果歷劫以來以此三昧事恒沙佛求世名心歇滅無有至然燈佛出現於世我乃得成無上妙圓識心三昧乃至盡空初以藥除病歷劫以來者從昔至今經歷塵劫以來以此三昧者用此攝心轉馳名逐利之役成嚴土利生之因隨順諸佛行菩薩道故云事恒沙佛法華云亦行眾善業得見無數佛供養於諸佛隨順行大道是也惟識定深萬境如電視虗名若谷響鄙微利為蠅摶故將從前求世名心歇滅無有至然下藥病雙亡然燈即是定光從什譯故準法華燈明八子相繼成佛最後者號曰然燈今云至然燈則彌勒初於燈明佛所出家至第八子成佛時猶在菩薩地故雖在菩薩之地而內證漸深故曰我乃得成無上妙圓識心三昧然識心三昧仍前唯心識定而無上妙圓乃寓有淺深之義言歷劫以來修習此三昧時先觀一切諸法唯依賴耶變現賴耶具足一切諸法名圓識心以此事恒沙佛求世名心歇滅無有次觀賴耶唯依真如隨緣成立雖隨緣而不變名妙識心如是至於然燈佛時又觀真如乃待妄而立待妄立真妄真同妄唯依一心而為本源名無上識心今云無上妙圓等乃原始要終言之葢初得圓識心時惟是以識遣法次得妙識心時又復以性遣相後得無上識心時乃是以一遣待要知待既不立說一亦是強名況復三昧又從誰立故曰乃至盡空是知三昧方也立法立相立性病也無上妙圓皆對症之藥也及乎病盡藥除并方亦無所用夫是之謂言語道斷心行處滅乃究竟真唯識性也三果後勝用如來國土淨穢有無皆是我心變化所現世尊我了如是唯心識故識性流出無量如來今得授記次補佛處已得其體當現其用如來國土等先現國土為所依之處國土有三一法性土無淨無穢二受用土有淨無穢三變化土有淨有穢故統言淨穢有無並非惑現及與業招故云皆是我心等葢由菩薩乘本願力從於一切盡空之清淨心中神通變化之所示現謂雖空而不礙於有也又既云變化即非實有又雖有而不礙於空也世尊我了等次現如來為教化之主言如來國土淨穢有無本惟心變眾生不知謂是實有唯菩薩能了能知以是之故例知佛亦唯心故又於識性流出無量如來是彼時雖未成佛已能現土現佛成辨諸佛所應作事今佛知此乃與授記補處故云得也歷述修證竟三結答圓通佛問圓通我以諦觀十方唯識識心圓明入圓成實遠離依他及徧計執得無生忍斯為第一我以諦觀等者謂初修此觀時先觀十方所有根身器界唯是識心之所變現此觀成時則識心具一切法照一切法故曰圓明若更觀識心從緣真如有待唯是一心乃至盡空一切是為圓滿成就真實之性故曰入圓成實從此名相依他妄想徧計二俱不立故曰遠離依他及徧計執清涼引護法釋三性云一切心及心所由熏習力所變見相二分從緣生故皆依他起以斯妄執定實有無一異俱不俱等此二方名徧計所執二空所顯圓滿成就諸法實性名圓成實徧計如蛇有名無體故依他如繩有相無性故圓成如是彼體性故灌頂云離徧計執無我也遠離依他無法也入圓成實即得無生法忍也彌勒以此修證故曰斯為第一彌勒識大竟七勢至根大三一作禮陳白二歷述教修三結答圓通初大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言灌頂云梵語摩訶那鉢此云大勢至觀經云以智慧光普照一切令離二途得無上力是故名大勢至思益云我投足處震動大千及魔宮殿故名大勢至悲華經寶藏佛言由汝願取大千世界今當字汝為大勢至法華列眾中名得大勢以其能成辨一切所應作事故若依本經釋者謂菩薩以念佛心得無生忍大勢力故攝念佛人不勞而化故益以至言同倫有二一同修二同化同修者謂恒河沙劫同修念佛三昧同化者謂今在娑婆同攝念佛眾生同修淺深不同有住乾慧者有住信位住位乃至等覺位者同化示現不同有示乾慧者有示信位住位乃至等覺位者故總以五十二數計之二歷述教修此菩薩述先佛教示意多自己修證意少故標教帶修以攝於證也二一詳述佛教二略述依修初三一總教念佛二別詳念法三結示利益初我憶往昔恒河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧梵語阿彌陀此翻無量光或翻無量壽葢名含二義翻譯互出但既云往昔且言恒河沙劫似非現在彌陀乃古彌陀也十二如來者準大本彌陀經阿彌陀佛自具十三號謂無量光無邊光無礙光無對光𦦨王光清淨光歡喜光智慧光不斷光難思光無稱光超日月光合本號為十三今始終二號既同或中間亦同以佛道通同古今無異故言相繼一劫者似是前前後後轉相補處未必即是一佛異名然諸佛境界不可思議但能成就利益無所不可是一是異是古是今勿甚拘泥教其念佛者或亦因其多障緣故念佛三昧有事有理事念則專注一佛念念相繼念久成定名曰三昧理念則正念佛時反觀自心觀久心開名曰三昧灌頂云念佛法門有四一持名二觀像三觀想四實相前三後一事理對論正脈云據下文即都攝六根淨念相繼也二別詳念法譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念眾生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠初如同人相憶生佛雖異心性無殊故總以人喻如法華經喻以親友之類一專為憶者喻佛生生世世常念眾生心性同佛皆應成佛也一人專忘者喻眾生展轉流浪不知念佛求佛攝授接引往生也若與或同不期而遇曰逢有意而會曰見若逢不逢者喻眾生生值佛世不知念佛依舊沈淪也或見非見者喻諸佛現相人中人不念佛佛亦難度也二人相憶者謂彼此互相憶念喻佛念眾生眾生亦念佛也二憶念深者喻眾生念佛悲感情切佛念眾生慈應恩深如是則感應道交不惟現前成益乃至生生世世佛常護念眾生眾生常近諸佛故又喻以同於形影不相乖異既爾常護常近則緣勝因深生可成佛而佛可如願矣十方下如母子相憶上以同人相憶為喻猶恐其憶念不切故又舉母子相憶喻之以同人較之母子其情稍疎故眾生久沈生死故為如來所憐雖久沈生死而佛性不失故又為如來所念既憐且念無時能已故喻云如母憶子諺云兒行千里母擔憂則母之憶子無時能忘可知若子逃逝者喻眾生不知念佛流浪生死雖憶何為者喻佛雖憐念亦無如之何矣子若憶母如母憶時者喻眾生設若念佛亦如佛念眾生時之諄切如是則感應道交自然生生世世常得見佛故喻以母子歷生不想違遠然彼佛既教念佛而又連舉二喻者葢欲念佛眾生始而如同人相憶久則如母子相憶庶念佛之功日親日近當必獲其效矣三結示利益若眾生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名曰香光莊嚴初示決定見佛若眾生心者謂設若眾生心信我說也心信我說自然憶佛念佛憶佛者繫心佛境如觀像觀想之類念佛者事理一心如持名實相之類又憶念雖各分二種四者亦互用無礙現前見佛者如禪觀之中夢寐之際得見阿彌陀佛金色之身得歷阿彌陀佛寶嚴之土當來見佛者如臨命終時捨報安詳生極樂國華開見佛而言必定者確許其決無不見用以堅行人之心故去佛下示自然心開承上既必定見佛則是去佛不遠既去佛不遠則護念緣勝故不假方便自得心開謂不假餘門為方便只此念佛便得心開所以華嚴妙嚴品謂念佛三昧名無邊海藏門以能總攝一切諸法門故染襲近也襲近於香被香所熏自然身有香氣與彼去佛不遠蒙佛護念自然心開見佛事理相類故以為喻據此則念佛三昧亦可名香光莊嚴以念佛者去佛不遠蒙佛光莊嚴其心亦如樂香者襲近於香被香光莊嚴其身故詳述佛教竟二略述依修我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土我本因地即指昔在超日月光佛時也蒙佛所教如法憶念不假方便自得心開故曰入無生忍謂正當心開之時一念不動萬有皆空不見生滅法也因中以念佛得益果上以念佛度生故今於此界攝念佛人此界即指娑婆或亦分身他土今對釋迦且約此界言之淨土即指安養不歸他土唯歸安養者略明五義一勢至菩薩本修因處故二諸大菩薩尚願生彼故三阿彌陀佛願力深重故四三輩九品皆得往生故五十方諸佛同讚西方故此皆事論若以理論者自心即是彌陀法性即是淨土違真逐妄背覺合塵即是捨安養而生娑婆反妄歸真背塵合覺是其所宜故惟攝歸淨土歷述教修竟三結答圓通佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一那律選眼空生擇意等各有選擇勢至不爾故云無也都攝六根者謂眼不觀色耳不聽聲等攝六和合歸一精明也一精明心離於分別如是念佛名曰淨念常念常淨常淨常念名曰相繼入無生忍證不退轉名曰得三摩地較之餘門獨為直捷簡易故曰斯為第一此七大中以火大為首者貪欲為煩惱根本宜先治故以勢至殿後者隣於觀音耳根娑婆眾生不能修彼者便修此故總結諸聖略說竟
