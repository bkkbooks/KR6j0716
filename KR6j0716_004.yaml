body:
  text: 京都拈華寺賢宗後學達天通理敬述嗣法門人興宗祖旺謄清懷仁祖育較字二為除細惑説二藏上文倒想既銷空藏已信若能歷事造修煩惱障自可斷除至於所知之障仍須審辨況夫生相無明猶為細中之細者哉故前云希更審除者蓋欲如來審辨斷除之法兼所知及生相而盡除之佛為酬此故假滿慈請問以説後二藏也正脈云古德解釋三藏有二義一者圓覺疏以隱覆含攝出生為三二者華嚴疏以體相用三大順次釋空等三藏今似後義而亦稍不同上之空藏全同以所顯之真正惟體大合下二藏意旨便殊乃惟約體用單雙會釋空等三藏而合相於用亦非有缺漏矣二一滿慈躡前以質二疑二如來釋疑以説二藏初正脈云此以滿慈請發者表下所談惑細理玄無學深位皆當究心非獨為有學説也故今表兩重勝前當機一者四住惑盡勝前惑未盡也二者四辨能説勝前但能強記也三一總讚妙示二泛敘有疑三確陳以請初爾時富樓那彌多羅尼子在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為衆生敷演如來第一義諦爾時者阿難等已銷倒想已信空藏時也細惑尚存二藏未信故滿慈子將有所問在衆座起者將問之狀袒肩互跪身業虔誠合掌恭敬意業精專白佛讚善口業殷勤以此感佛佛必應故無始倒想折伏令銷故以大威德讚之久迷空藏攝受令信故以善為等讚之第一義諦即前阿難所請中道了義無戲論法也破識以闢道路指根以接初機會科示堂融大顯室以其循循有序故曰善為敷演第一上冠以如來者以此義諦是諸佛之所證故二泛敘有疑二一敘自疑二敘他疑初世尊常推説法人中我為第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋本所不見何況得聞佛雖宣明令我除惑今猶未詳斯義究竟無疑惑地初極顯法妙增一云善説諸法廣別義理諸弟子中滿願第一智論云富樓那説法中大又云種種因緣譬喻説法能利衆生樓那第一是知滿慈説法如來素所推許故自敘世尊常推等也微妙法音總指上來所説以破妄顯真一一皆極微細盡精妙故聾人耳鈍自喻未得大乘智慧百步去遠自喻未到一乘境界由斯二緣所以雖聞微妙之音但領粗淺之義故以聆於蚊蚋喻之聆聽也蚊虻蟲蚋醯雞也本指昔日不見者未覩斯會以斯會發起施設便自與昔不同故至於所説法義猶是昔所未有故云何況得聞此所以如百步外聆蚊蚋也佛雖下略明悟淺宣明者即指破妄顯真已來重重宣示重重發明也當機雖在阿難佛意實兼會衆故滿慈亦云令我除惑除惑者且約斷疑生信言之斯義者仍指前説未詳者未能詳盡以但信空藏猶未知不空及空不空義故然既未能盡信是亦未到究竟無疑惑地由斯故有下之疑生疑續疑礙等也二敘他疑世尊如阿難輩雖則開悟習漏未除我等會中登無漏者雖盡諸漏今聞如來所説法音尚紆疑悔初敘有學疑阿難輩通指一類有學人説前此自陳開悟亦惟隨順佛語非己智分故置雖言謂雖則開悟而實未得開悟以習漏未除故習漏即是思惑以是無始積習任運現起者也然既思惑尚在煩惱障猶未全離固知其前之開悟非真現量我等下敘無學疑我等者自指一類無學人説己向自謂漏盡亦惟暫斷見思非真無漏故置雖言謂雖盡諸漏而實未能盡漏以今聞説法尚紆疑悔故疑謂疑清淨之非悔謂悔周遍之誤是二皆為法執正被所纏故云尚紆紆即纏縛義也然既法執未脫所知障自應俱在固知其向之漏盡非真究竟是則阿難等以習漏未除知開悟之非真滿慈等以尚紆疑悔知漏盡之是妄同為未詳斯義俱是未到無疑惑地耳泛敘有疑竟三確陳以請二一確陳二疑二請佛慈誨初二一確陳萬法生續疑二確陳諸大周遍疑初世尊若復世間一切根塵陰處界等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始初領前所示復決定也世間揀出世以根塵陰處界等皆屬世間有為非出世無為法故一切根塵皆如來藏乃領前顯見中意以前顯見不分科中有此見及緣元是菩提妙淨明體等文約義領也陰處界四科舉三六入七大皆以等字該之皆如來藏清淨本然乃領前會科及融大中意以前會科中一一皆許其為如來藏性融大中兼許其有清淨本然義故云何下躡以成疑正脈義云此疑有二一疑始之忽生二疑後之相續若於次第上重讀云何二疑自顯山河大地即後之世界諸有為相兼衆生業果齊此乃疑始之忽生意謂既皆藏心則無始之時自應清淨本然乃云何無端忽生世界衆生及業果耶次第二句乃兼上世界衆生業果而通言之生住異滅遷變流轉前後分齊不相踰越故云次第遷流滅已又生故云終而復始此方疑後之相續意謂既皆藏心自應清淨本然縱使忽生既滅不應相續又云何竟至次第遷流終而復始耶生續兩問至下答處自見二確陳諸大周遍疑又如來説地水火風本性圓融周遍法界湛然常住世尊若地性遍云何容水水性周遍火則不生復云何明水火二性俱遍虗空不相陵滅世尊地性障礙空性虗通云何二俱周遍法界初領前所説再陳深疑故曰又也文雖局於四大義實兼於虗空至下致難處自見準則空大文云若此虗空性圓周遍本不動搖當知現前地水火風均名五大蓋前之性圓即今之本性圓融屬圓真實前之周遍即今之周遍法界屬通真實前之本不動搖即今之湛然常住屬常真實然既均名五大則地水火風亦應俱此三真實義故滿慈例領以為下水火相妨等之疑案世尊下躡以成疑地性堅礙水性融泮堅礙既成而融泮必壞故曰若地性遍云何容水不容水是地性不能圓融融泮壞是水性不能常住此一疑也水性潤濕火性乾燥潤濕既生而乾燥必滅故曰水性周遍火則不生火不生是水性不能圓融乾燥滅是火性不能常住此二疑也如地不容水水不容火既爾火不容水水不容地亦然如是則圓融周遍湛然常住之義皆不得成矣復云何明等且約水火以難言佛語無虗必有發明但不知復有云何發明能以成立水火俱遍不相陵滅之義不難地水者可例知故地性障礙等為欲顯出空大以足五大之義障礙起而虗通盡虗通得而障礙失如彼水火互不相容此三疑也云何二句亦是就疑致難確陳二疑竟二請佛慈誨而我不知是義攸往惟願如來宣流大慈開我迷雲及諸大衆作是語已五體投地欽渴如來無上慈誨是義者即指前清淨本然圓遍常住等義攸所也往歸趣也言山河大地等既有生續似違清淨而如來説清淨本然地水火風等既有妨礙似乖圓遍而如來説周遍圓常滿慈既不敢以佛為非直得歸咎於己故云而我不知云云疑深悔重非佛莫釋故曰惟願如來大慈如風故曰宣曰流迷惑障智故曰開曰雲至下如來出生續之由無違清淨明周遍之故無乖圓常則是慈風宣而迷雲開智日朗而性天露也及諸大衆句乃普為衆請有學習漏未除縱悟非真無學尚紆疑悔雖斷未極同為迷雲所障均待慈風所吹故請亦及之作是語已口請也五體投地身請也欽渴慈誨意請也慈誨稱無上者有二義一者慈無上佛慈至極無能越故二者誨無上能空法執盡生相故滿慈躡前以質二疑竟二如來釋疑以説二藏釋生續之疑明從真起妄即是説不空藏釋周遍之疑明性相無礙即是説空不空藏三一普許獲益二誡聽欽承三據疑別示初爾時世尋告富樓那及諸會中漏盡無學諸阿羅漢如來今日普為此會宣勝義中真勝義性令汝會中定性聲聞及諸一切未得二空回向上乘阿羅漢等皆獲一乘寂滅場地真阿練若正修行處初別告無學正脈云經標無學特顯法深如來下普許勝法正脈云佛言普為仍彰慈廣以普為則不惟無學雖有學乃至人天等類皆為所被機也勝義等者惟識偈云此諸法勝義亦即是真如又勝義諦有四種一世間勝義謂蘊處界等二道理勝義謂苦等四諦三證得勝義謂二空真如四勝義勝義謂一真法界今此科文局二藏之初義通三藏之後故云勝義中真勝義性以後文圓彰三藏不離一心如空藏名本妙圓心不空藏名元明心妙空不空藏名妙明心元即一真法界也令汝下預示深益定性聲聞謂二乘不回心者未得二空等謂二乘已回心者言二乘已得人空雖有志法空猶未能得雖未能得業已厭小趣大故云回向上乘既已回向上乘即是菩薩而猶稱羅漢者據迹名故等字亦兼無性以一切衆生莫不有心凡有心者皆當作佛終實教中無所揀故皆獲一乘者謂既聞此法畢竟成佛有分同為佛乘中人故雖同為佛乘中人而所入隨機略分三名若已向回心欲速成佛者即此便是寂滅場地謂法性寂滅即菩提場故若定性二乘厭喧求寂者即此便是真阿練若謂即喧而寂不須更厭故若無性闡提深著邪見者即此便是正修行處謂能離邪見起正善根故若依三藏配釋者空不空如來藏離即離非是即非即言語道斷心行處滅依此可以成佛即寂滅場地不空如來藏即一切法一切法無非佛法全體住持全體受用即真阿練若空如來藏離一切法一切法無能繫縛楖栗橫肩直入千峯即正修行處要知三藏不離一心三處不離一乘故總以一乘冠之以一乘即一心也二誡聽欽承汝今諦聽當為汝説富樓那等欽佛法音默然承聽初誡聽許説諦聽者真實心聽不以生滅心聽也富樓下欽默承旨欽敬遵也佛法音且指誡敕法音也默然者屏息諸緣繫心一境承聽者心領妙義耳接玄文正符諦聽義耳三據疑別示二一説不空藏以釋生續之疑二説空不空藏以釋周遍之疑初二一正為説藏以釋疑二兼為折難以生信初四一牒問取解二辨定妄本三歷明生續四應問結答初佛言富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣説法覺妙明本覺明妙富樓那言唯然世尊我常聞佛宣説斯義佛言汝稱覺明為復性明稱名為覺為覺不明稱為明覺富樓那言若此不明名為覺者則無所明初略牒前問按樓那所領中略一切皆藏牒清淨本然所問中牒云何忽生山河大地略諸有為相次第遷流等正脈云佛牒語略意必具含汝常下問答常聞汝常不聞等是問詞非決詞猶言汝尋常不曾聞我作如是説耶性覺本覺二義無別合云性本自具之覺即起信本覺義也妙明者即寂而照明妙者即照而寂此明本覺體上自具寂照互融義故此義尋常多為菩薩演説聲聞在座亦應與聞故舉以為問正脈云先舉此者有二義一顯無明萬法離此無依二顯寂照具足不假妄明答以唯然者隨問承當常聞斯義者居然無疑而實不知所聞未嘗異所解未嘗同耳正脈云此問全似初問阿難見何發心皆是借舊見聞以發開示之端佛言下取定謬解正脈云此首句覺字即性覺本覺之覺明字即妙明明妙之明然不取妙字而獨用明字者以有真妄二明而妄明獨為大迷之體故也問意以汝既常聞覺明必亦稱説覺明但不知汝稱覺明為復性本自明不須更明稱名為覺即俱於明耶為是覺本不明起心明之稱為明覺乃俱於明耶此二問上是真覺真明下是妄覺妄明雙開二義欲令滿慈自決取捨正脈云此問全似徵問阿難心在何處及以何為心皆欲逼出平生所誤認者而破斥之答意以若此覺體不須更明名為覺者則但名曰覺實無所明豈稱覺明是乃深取乎起心對境之妄明而反排乎性本自具之真明矣正脈云此答全似阿難諍言若此發明不是心者我乃無心同諸土木皆是被佛徵出素所迷執而猶不覺其非也二辨定妄本佛言若無所明則無明覺有所非覺無所非明無明又非覺湛明性若無所明句全是按定滿慈所答之義但語略耳佛意以若果不明便無所明者則是覺體元屬無明之覺矣既爾則進退有過謂進若起心欲明及至有所明時反非是覺以與體相違故退若不起心欲明守於無所明時終非是明以本體自若故然既非覺非明舉體全是無明莫即以無明為覺明乎要知無明非真即墮生滅便是癡暗生滅則不湛癡暗則不明故曰又非覺湛明性此乃破其起心對境之妄明令深領乎覺體本具之真明也三歷明生續二一初之忽生二後之相續初二一能生妄本二所生九相初正脈云此於十惑之中為第一惑親依真心本覺獨居九相之先別名獨頭生相根本不覺曰癡曰迷及無住本皆目此也有二功能一者能隱真覺之體二者能發萬有之相下文自見問生相無明等覺未了今言加明於覺意何淺近答此惑在三細前本非下位所知如來有勝方便能令初心比量而知借言加明於覺即是其相捨此方便則如啞人見賊叫喚不出矣性覺必明妄為明覺承上無明既非覺湛明性便是妄生之源良由無始以性覺必待明了妄為起心欲明覺體豈知一念才生覺體便晦自此轉成根本無明萬妄依之托始下之世界衆生業果莫不由此以為深本起信謂不覺心起而有其念即此分齊二所生九相此釋云何忽生之疑二一忽生細相二轉成粗相初覺非所明因明立所所既妄立生汝妄能無同異中熾然成異異彼所異因異立同同異發明因此復立無同無異初業相上雖妄為起心欲明覺體其奈覺體本非所明如水之靜相不可以搖動求之然覺體既非所明因堅執要明遂於覺體立成所相如才一動搖遂於水體起成動相起信云以依不覺故心動説名為業即此分齊所既下轉相言所相既已妄立復於所相上轉起能見之心故曰生汝妄能起信云依於動心能見相故即此分齊無同下現相無同異中即指業相之中以惟識云相見皆依自證起故而言無同異者以業相初立空界未分也熾然者顯著貌成異者世界相此由上妄能對彼業相遂於無同異業相中顯然有世界相現故曰熾然成異異彼所異者上異字作不同義下異字仍指世界言世界既現復有無世界處故曰異彼所異謂不同彼世界別異處也既不同彼世界別異廓然有虗空相現故曰因異立同謂因彼世界之異成立虗空為同也同異發明者謂由同與異形顯發明恍然有衆生相現故曰因此復立無同無異此無同異與上不同上是本無此是形顯以衆生相異無彼虗空之同衆生性同無彼世界之異故然此世界虗空衆生雖有相現尚在本識猶未執為心外實有故屬細相猶彼鏡中之影非即鏡外取法起信云依能見故境界妄現即此分齊二轉成粗相如是擾亂相待生勞勞久發塵自相渾濁由是引起塵勞煩惱起為世界靜成虗空虗空為同世界為異彼無同異真有為法初智相如是者承上現相而言始而無中現有繼而因異立同末復以同異相形顯出無同無異其猶目瞪晴空狂華起滅故云擾亂待猶對也相待生勞者謂以此相分待彼見分起於智相分別其猶目見狂華轉生勞相故曰生勞蓋智相即見分之勞相也起信云依於境界起分別愛與不愛即此分齊勞久二字相續相謂智相分別起相續心數數不斷其猶目既生勞認華不已故云勞久起信云依於智故生起苦樂覺心起念相應不斷即此分齊發塵二字執取相塵即染著義謂由分別既久取著轉深計我我所其猶認華不已轉生執實之想故云發塵起信云心起著故即此分齊自相句計名字相自相即心之自相謂由染著故循相計名令彼心之自相永絶奠定其猶執華為實妄計蠅翼垂髮等令彼勞目無復少湛故曰渾濁起信云依於妄執分別假名言相即此分齊由是下起業相塵勞即是煩惱上喻下法以煩惱有染污擾動二義如塵如勞也通論有八萬四千以十結使為體約身口七支及三世四心疊滿其數總即見思約未起身口屬惑已起身口屬業今云引起者謂由執取計名引發身口造一切業其猶妄計蠅翼垂髮等引動身手用力撲捉故屬起業起信云依於名字循名取著造種種業即此分齊起為下業繫苦相謂由業因已成果報隨至於起成有相處則為世界於靜而無相處則為虗空虗空二句為明同異相形顯出無同無異處故彼無同異者謂彼同異之間無同無異處也無同無異處則是衆生故云真有為法衆生稱真有為法者以是正報主故為揀虗空世界雖屬有為但是所依無衆生則無為故然此中虗空世界衆生所以與上不同者上是惑現屬同分境此是業招屬別業境謂由業所繫染淨勝劣不得自由其猶用力撲捉傷身致痛故是業繫苦相起信云以依業受報不自在故即此分齊要知此上雖正釋滿慈云何忽生之疑亦兼酬阿難審除細惑之請良以次第十惑約順生以無明居先約逆斷以無明殿後將令行人觀順生之次第易於開悟而不至迷悶了逆斷之次第易於修證而不至僭亂若果是上根利智知無明為九相之源了一念為無明之機當下離念頓斷無明則根本既除而枝末自枯矣結答之義尚在後文此處勿勞蛇足初之忽生竟二後之相續三一世界相續二衆生相續三業果相續初此即詳明起為世界之義不詳靜成虗空者以虗空但是顯色無世界處即虗空故又世界未成空漚先發既為世界所依合於世界中故又虗空無形無可斷亦無可續故不詳也三一初成四大二轉成四居三結成相續初覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺寶成搖明風出風金相摩故有火光為變化性寶明生潤火光上蒸故有水輪含十方界初先成風大承上世界雖由業招無始亦由覺明而起良以性覺加明真空便昧明昧相待悶極心動故曰成搖搖久不息動蕩成風由斯故有風輪風而言輪者隨彼當土衆生業感依報分齊成輪相也執持世界者世界最下全依風輪而得住故如俱舍云謂諸有情業增上力最下先依虗空有風輪是也是知世間諸風全是妄心動蕩所感因空下次成地大因空生搖者因以覺待空生起動搖之妄明也此句全是牒上下乃出其搖動之意蓋為空體晦昧堅執欲明耳其奈空體本不可明因堅執故及與業增上力遂於虗空之中結成有質之色故曰立礙立礙云者且約地大言之至若彼金寶者又為地大之精更是依於能明妄覺立成堅礙之相堅久不息積而成輪如是故有金輪保持國土保持云者一切國土皆依金輪而得住故如密部中説地大最下有金剛際是也堅覺下次成火大堅覺寶成者堅依於覺而寶成承上金輪言也搖明風出者搖空欲明而風出承上風輪言也風金相摩者風動金堅相摩相蕩也摩蕩既久熱性燥發如是故有火光於金輪之下為變化性變化云者由有火大增上力故能令金輪之上諸地大種變起無情化生有情如一切萬有皆依和氣得生是也寶明下後成水大寶明者寶體明淨也明極冷發故生潤火光者火大之光也光勝熱溢故上蒸潤蒸蒸潤氣積成水如是故有水輪積聚於風輪之上含受十方世界如華嚴諸世界種皆依香水海住是也準華嚴經俱舍論皆謂地輪依水輪水輪依風輪風輪依虗空虗空無所依今經約生起次第似與華嚴俱舍不同而本疏釋安立上下實與華嚴俱舍無異但彼經論無火以火無含持不成輪用故二轉成四居火騰水降交發立堅濕為巨海乾為洲灘以是義故彼大海中火光常起彼洲灘中江河常注水勢劣火結為高山是故山石擊則成𦦨融則成水土勢劣水抽為草木是故林藪遇燒成土因絞成水初水陸二居謂火氣上騰水性下降彼此交過氣發於地結土而為堅礙由此則有二種器界一者潤濕下坳之處積水而成巨海二者燥乾起垤之處環水而成洲灘灌頂云浮土可棲曰洲聚沙堪住曰灘則洲灘皆水環陸地惟洲大而灘小也此上且示其由生下乃驗其氣分以是義故等謂以是水火交成義故彼大海中猶有火之氣分而火光常起彼洲灘中猶有水之氣分而江河常注如世子女必有肖父母處也水勢下山林二居水勢劣火水隨火而上升由上升故結為高山以是義故彼山與石擊則成𦦨顯然帶火之氣分融則成水隱然有水之氣分是知山石亦水火為緣成也土勢劣水土隨水而生潤由生潤故抽拔生長而為草為木以是義故彼木多成林與草多成藪處遇焚燒則成土隱然有土之氣分因絞急則成水顯然帶水之氣分是知林藪乃水土為緣成也正脈云此中義理雖似外論中五行相生之意而實不盡同不可一一附合有二不便一者五行反明經義反晦二者令外教之人將謂不出己意夫外教多歸化機於陰陽而吾宗直指生本於心性則彼晦此推內濫外失計之甚文句云舊以五行生剋訓者甚違經旨經顯一切惟心何用世間妄計為解且如山石擎焰融水五行説者若以石為金金能生水烏又生火若以石為土則水火皆不應生又林燒成灰可云火能生土因絞成水豈是木反生水故知不應以彼釋此問待空成搖堅明立礙等義徑庭杳茫誰復信之答此固靈心不思議力業感必然之理惟佛現量親見親知博地凡夫誠鮮能信然現見悶極莫開則心動身轉執堅不遂則氣結身僵甚至有拍案擊物凝心化石者是更可為待空成搖堅明立礙之驗又問洲灘江河人所共見大海火光誰復能見之耶答海舟夜泊者固常見之又涅槃經佛涅槃後大海龍王持水中火至茶毗所即其證也三結成相續交妄發生遞相為種以是因緣世界相續首句結初成四大交通也言上來風金火水四大雖次第發生而遡流窮源亦通依妄覺妄明故云交妄發生次句結轉成四居遞互也言上來水陸山林四居雖依大為種而性各周遍亦彼此互為因依故云遞相為種如海中火起則海為火種洲中河注則洲為河種乃至林燒成土則林為土種藪絞成水則藪為水種等是也末二句結因緣相續謂以是交妄發生四大為因遞相為種四居為緣自是山河國土一切世界生滅滅生相續不已是即詳前起為世界至若靜成虗空即指無世界處不言可知世界相續竟二衆生相續三一初成四性二轉成四生三結成相續初復次富樓那明妄非他覺明為咎所妄既立明理不踰以是因緣聽不出聲見不超色色香味觸六妄成就由是分開見覺聞知初總標復次等者謂復於己説世界之次重呼當機示以衆生相續義也明妄二句言欲明真有為法所以展轉成妄者非有他故亦以真覺妄明和合成咎耳所妄下別明所妄者真妄和合而成所依妄識即業相也既立者謂業相既已成立明理者謂復於業相上轉出能見見分欲明本覺之理即轉相也然轉相原為明理奈為本識所障不能越踰以是不能越踰因緣欲聽而明不能出乎本識之聲欲見而明不能超乎本識之色即現相也準起信明現相謂五塵對至即現今但約聞見以明聲色二塵餘可例知而此之聞見惟是性具尚未結根聲色唯是惑現尚非業招至若業招之色香味觸六種妄塵成就則粗相既定而執有心外境矣由是黏湛發見見精映色則結色成眼乃至黏湛發知知精映法則結法成意是則於一見分分開而成見覺聞知如後云元依一精明分成六和合是也二轉成四生同業相纏合離成化見明色發明見想成異見成憎同想成愛流愛為種納想為胎交遘發生吸引同業故有因緣生羯羅藍遏蒲曇等胎卵濕化隨其所應卵唯想生胎因情有濕以合感化以離應初總標上科雖結塵成根且約人類言之以最初從真起妄尚無雜業感招故也今此科乃約人類衆生造業各別受報不同故云同業相纏合離成化同業相纏者謂父母己三者業同互相牽纏而受胎卵二生如人畜龜蛇之類合離成化句取義應云合成離化謂不因父母但由己業或合潤成形而受濕生如含蠢蠕動之類或離此化彼而受化生如天獄飛行之類見明下別明復二一詳明胎生合轍云中有身投胎時其無緣處大地如墨惟於父母有緣處見有一點明色發現今云見明色發是也又云此中有身即趣其處今云明見謂明色既見想成謂妄想自成是也異見等者灌頂云男子投胎見父是男異見故憎見母想妻同想故愛女子投胎反此準涅槃經無明有二一發業謂過去煩惱二潤生即投胎時於父母邊起憎愛想也流愛心於父母則為受生因種納想心於根門則為所依胎分及乎赤白二滴交遘發生又復吸引同業當為其子由是故有己業為因父母為緣胎相既定生羯羅藍遏蒲曇等俱舍云胎中凡有五位一七名羯剌藍大集云歌羅邏此云凝滑亦云薄酪亦云凝酥義翻雜穢謂父精母血相和名雜自體不淨名穢二七名頞部曇此云皰猶如瘡皰之形表裏如酥未生肉故三七名閉尸此云凝結亦云軟肉謂凝結如軟肉故四七名健南此云凝厚亦云堅肉謂肉漸凝厚而堅硬故五七名鉢羅奢佉此云形位亦云肢節謂生諸根形一身四肢骨節分位有差別故大集更有六七名髮毛爪齒位謂四法漸生故七七名具根位謂諸根具足故今經略舉前二餘以等字該之正脈云獨委悉開示於胎生者一則急於為人二則衆生悉以淫欲而正性命胎生偏顯故胎卵下略明四生正脈云胎卵濕化皆應也情想合離皆感也隨其所應者謂隨其所感而應之以四生也卵唯想生者懸思曰想謂卵生衆生於中有身時妄見有勝妙處心生懸想惟此為感而有生也胎因情有者親愛曰情謂胎生衆生於中有身時妄見有欲樂境心生親愛因此為感而成有也濕以合感者就新曰合謂濕生衆生於中有身時妄見新境可托急欲附就以此為感而受形也化以離應者厭舊曰離謂化生衆生於中有身時妄見舊境可憎急欲厭捨以此為感而致應也後二生中雖感應錯落而義實互具意會自見然胎生上已詳明此又隨例略明者蓋詳明為兼衆緣以例餘三略明為顯要因各具一種將使衆生於生前練習超出情想合離四心則四生路斷而輪回可出矣三結成相續情想合離更相變易所有受業逐其飛沈以是因緣衆生相續首二句結上四感更相變易者或情變為想或想易為情等次二句結上四應受業指報形説以報形為受業主故飛沈即上下義以飛沈有上下相故言能感四心既有變易所感四生報形自相隨逐而為上下所謂乘善業以上升隨惡緣而下墜是也末二句承言總結以是因緣者上之四性為因此之四生為緣以是故有衆生相續衆生相續竟三業果相續三一初成根本二轉成枝末三結成相續初三一欲貪為本二殺貪為本三盜貪為本初富樓那想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本已知四生差別唯在臨時一念未知纍劫循環尤以恣貪為本今為明此故再詔富樓那也承上既有衆生則有彼此情染由情染故未遇則異地懸想既遇則互相親愛綢繆莫釋故云想愛同結如磁吸鐵似膠粘木故云愛不能離由此不能離故改形易報互為親因故曰則諸世間父母子孫相生不斷是等者總指父母子孫既已相生不斷則以淫欲成貪為後業果相續之本二殺貪為本貪愛同滋貪不能止則諸世間卵化濕胎隨力強弱遞相吞食是等則以殺貪為本又承上既有衆生則有彼此身命由身命故未盡則貪求盛壯已盡復愛樂久生滋養情均故云貪愛同滋只知保護不顧殘忍故云貪不能止由此不能止故異類相餐恣殺無度故云卵化濕胎隨力強弱遞相吞食是等者總指卵化濕胎既已強弱相食則以殺害成貪為下業果相續之本三盜貪為本以人食羊羊死為人人死為羊如是乃至十生之類死死生生互來相噉惡業俱生窮未來際是等則以盜貪為本又承上既有衆生則有彼此凌奪由凌奪故現前莫報易羊身而酬債滋彼口腹故曰以人食羊後文云鬼業既盡與元負人冤對相值身為畜生酬其宿債是也若討還過分負屈不甘則羊死為人後文云若彼酬者分越所酬此等衆生還復為人反徵其剩是也此既反徵彼必倒還然倒還有二一約有福人中遭其侵害二約無福墮落反為畜生今言人死為羊乃就彼無福者言後文云如彼有力兼有福德則於人中不捨人身酬還彼力若無福者還為畜生償彼餘直是也如是者指上人羊為例乃至等例彼十生皆爾十生之類者十二生中除去空散銷沈土木金石以彼不可食故然既通十類則死者死生者生往復無已盜業不休故云死死生生互來相噉如是惡業積習與生俱生若無因緣自力為因佛加為緣斷除必至窮未來際後文云若用錢物或役其力償足自停如於中間剎彼身命或食其肉如是乃至經微塵劫相食相誅等是也問此與殺貪何異答殺貪由殺心起盜貪由盜心起雖業報似同而因心各異故分二類言之是等者總指十生之類既已往復相酬則以盜取成貪為下業果相續之本問世教論殺惟以不殺人為重而害物不與焉論盜唯以劫財取罪而食肉不與焉今經何論殺極至害物論盜偏取食肉耶答世教急於止亂且圖養民故唯禁殺人劫財而不制害物食肉今經欲斷生死須盡業緣故須併斷且世界之亂究其深本多起於害物食肉如釋種遭琉璃之誅人但知近緣罵詈而不知遠因食魚故此方不長太平緣太平時恣意食噉三五百年人之享福者福終禍起畜之酬報者報盡為人怨對相值遂成亂世是知今經乃聖智深遠拔本塞源之意古德云世上欲免刀兵劫須是衆生不食肉外教君子幸依佛言即不能全斷亦應於釣弋割烹之際稍存一點不忍之心漸養仁惠終致慈祥且莫妄生非毀自干罪戾初成根本竟二轉成枝末汝負我命我還汝債以是因緣經百千劫常在生死汝愛我心我憐汝色以是因緣經百千劫常在纏縛承上殺盜二業熏成貪習怨對相值現行斯發故云汝負我命我還汝債灌頂云汝負二句影略多詞具當八句應云汝負我命汝還我命我負汝命我還汝命此屬殺貪我負汝債我還汝債汝負我債汝還我債此屬盜貪習種為因現行為緣以是因緣相資生生世世不出輪回故云經百千劫常在生死此殺盜流末也承上淫欲之業熏成貪習恩情相遇現行斯發故云汝愛我心我憐汝色此中亦有影略具足應云汝愛我心我愛汝心我愛汝心汝愛我心此約恩言謂恩以心重故我憐汝色汝憐我色汝憐我色我憐汝色此約情言謂情以色重故因緣同上生生世世不得解脫故云經百千劫常在纏縛此欲貪流末也然上云常在生死此云常在纏縛者謂怨對相值誓不兩立必至一生一死恩情知遇誓不兩離必至永纏永縛其實生死亦名纏縛纏縛亦名生死各以顯著者言之又此中殺盜合顯欲貪別明者怨親相對故問根本枝末文中俱含多生本末之義云何分耶答本約多生積習以成貪根末約多生輪轉以至無已其猶生住之與異滅前後分齊異故三結成相續唯殺盜淫三為根本以是因緣業果相續承上負還不休而常在生死憐愛無已而常在纏縛者非有他故惟以前來殺盜淫欲三種貪習而為根本若衆生聞此力除貪習則根本既盡而枝末不生矣以是因緣者根本為因枝末為緣因緣相資以此故有業果相續問業果相續與衆生相續有何差別答業果相續即依衆生開出但衆生相續惟約受生一念業果相續統約歷劫積習積習既深而輪轉靡停一念之差而變易無定若果能頓絶一念漸治積習則變易可定而輪轉可停矣要知衆生不離業果業果不離衆生為成兩益故各言之合前衆生相續是即詳明真有為法歷明生續竟四應問結答富樓那如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始初總指妄因如是三種者指前忽生三種顛倒相續者指前相續三種以相續無別即是續彼忽生但忽生中合業果於衆生相續中合虗空於世界其實無異法也覺明指真明言前云性覺妙明本覺明妙是也明了知性指妄明言前云性覺必明妄為明覺是也皆是二字乃依上指下之詞言初之忽生及後之相續若究其深本皆是於本覺妙明無端起心欲明妄加了知之性而為其咎因了下結答二問因了發相者謂因於妄加明了發出業轉現之三相從妄見生者謂從於智續等之妄見生成同異無之三種山河大地句舉世界攝虗空即異同二相諸有為相句舉衆生攝業果即無同無異此答云何忽生之問然有生必有住有住必有異有異必有滅故云次第遷流因此次第遷流虗妄無實約世界則遞相為種約衆生則更相變易約業果則怨親往復故云終而復始此答云何相續之問總結正為説藏以釋疑竟二兼為折難以生信二一滿慈以因難果二如來折難生信初富樓那言若此妙覺本妙覺明與如來心不增不減無狀忽生山河大地諸有為相如來今得妙空明覺山河大地有為習漏何當復生初躡前舉例意謂若此如來所説則妙明明妙之覺體乃本來自妙本來自覺本來自明矣既本來自妙應無世界之礙本來自覺應無衆生之迷本來自明應無業果之昏自與如來之心無二無別故云不增不減謂生心不減於佛心佛心不增於生心也無狀者無端無故也言生心佛心既不增不減乃衆生無端無故加明於覺以致忽生山河大地諸有為相是生心本真而今有妄矣如來下依例成難上約生心在纏故曰本妙今約佛心出纏故曰妙空謂本妙之心而又空諸惑染也又上約生心在纏故曰覺明今約佛心出纏故曰明覺謂因明而覺也總以離彼世界衆生業果立名但性修異耳山河大地者舉世界攝虗空有為習漏者依衆生開業果蓋習漏即是業果謂積聚業習成有漏果也何當復生句正是難詞言如來今得妙空明覺與本生心無異彼既無狀忽生山河大地等佛亦應爾故難以何當復生灌頂云圓覺經金剛藏全難有三一真能生妄即前萬法生續二説妄為真即後索妄有因三佛妄何生即此何當復生故正脈云今滿慈所問同彼第三彼云十方異生本成佛道後起無明一切如來何時復生一切煩惱大意總以執衆生因性有始疑如來果德有終而豈知夫昔本無迷似有迷覺覺迷迷滅覺不生迷義乎二如來折難生信二一先為折難二次令生信初二一約智德折難二約斷德折難初二一借喻顯非二約義為折初二一喻無明無因二喻覺不生迷初佛告富樓那譬如迷人於一聚落惑南為北此迷為復因迷而有因悟所出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟迷人喻衆生謂衆生一念無明晦昧真覺如迷人迷悟時性故聚落者村店異名謂人煙聚集坐落之處喻業相以業相即是八識有積聚種子起現行義故南為明喻空為智境北為暗喻有為惑境言衆生於業識境界相中執空為有如迷人於一聚落惑南為北也迷因迷有迷因悟出皆非理為問喻無明因無明有因本覺出二皆非理佛意令其自審故就喻為問迷不因迷又不因悟乃據理為答喻無明不因無明而有不因本覺而出二皆正理滿慈不知但就喻為答也迷本無根云何因迷者謂迷前本無迷根云何因迷而有喻無明之前本無無明云何因無明有悟非生迷云何因悟者悟與迷背不生於迷云何因悟而出喻本覺與無明相背云何因本覺出然滿慈亦但就喻釋而已要知既不因迷又不因悟則正在迷時元自徹體虗妄用此為俞應顯衆生正在無明晦昧之際即無無明以當體虗妄故也二喻覺不生迷佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊迷人仍喻衆生正在迷時喻正在無明晦昧之際悟人者已悟之人喻佛為先覺指示令悟者謂指示悟境令其自悟喻開示本覺令其自覺自覺者取智德圓滿即是果人非指尋常名字相似及隨分覺也佛意以衆生正在無明晦昧之際忽遇如來開示本有覺性令其從性起修以至自覺聖智圓滿如彼迷人正在迷時倐有悟人指示令悟相似故為喻也於意云何句乃就喻審定令因喻而知法故此人縱迷等者謂此已悟之人縱先原迷而今悟後於此聚落之中決無更迷之事喻聖智已圓之人縱昔有執而聖智既圓之後於此業識境相中決無重執之理而云更生迷不者就喻反問令自審也答以不也者滿慈於喻中已知而法中猶未之諭耳借喻顯非竟二約義為折富樓那十方如來亦復如是此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷十方如來自覺聖智圓滿義似已悟之人故云亦復如是此迷無本者取前迷本無根之義喻無明無因性畢竟空者既無有本徹體虗妄喻無明亦爾當體無實昔猶向也言既性畢竟空足知向在迷時即本無迷喻無明亦爾向在無明晦昧之際即無無明可得似有迷覺者謂既本無迷向之所以惑南為北者不過似有迷時覺知非是真有喻無明亦爾昔之所以執空為有者不過似有無明妄覺非是實有覺迷迷滅者既似有非真不悟則已設遇悟人指示覺悟是迷則心中迷惑即滅喻無明亦爾不覺則已設遇覺人開示覺得無明是妄則心中無明自滅後云心中達多狂性自歇即此意也覺不生迷者取前悟不生迷之義喻如來亦爾聖智圓滿時真覺現前決無重起無明復生山河等理是知此科雖總取前喻而佛意唯欲成就覺不生迷一語以折滿慈之難約智德折難竟二約斷德折難二一借喻顯非二取解為折初二一喻惑盡法空二喻更生非理初亦如翳人見空中華翳病若除華於空滅翳人喻衆生言衆生以無明惑晦昧本覺如翳人以雲翳障清淨目見似見喻妄見以妄見依無明起如似見依雲翳生空虗空喻真空以真空元自清淨如虗空法爾寂然華狂華喻山河大地有為習漏以山河等於真空中妄生妄滅如狂華於虗空中時有時無翳病若除淨目現前喻無明若滅覺智顯現華於空滅者謂淨目現前惟見虗空不見狂華喻覺智顯現唯見真空不見山河大地有為習漏如是則三法無復生續真空常自寂然而滿慈所難之非已略見矣二喻更生非理忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧富樓那言空元無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡云何更名如是狂人為愚為慧初就喻設問愚人喻滿慈以佛雖宣明令其除疑而自云未得究竟無疑如愚人也又以其無端起問故以忽有喻之空華所滅空地喻真空理地以如來覺智現前會法歸空如空華所滅地也待華更生喻滿慈致難以滿慈致難佛得妙空明覺山河大地等何當復生如待華更生也明知是人為愚故問為愚為慧者佛意令其自覺而自責耳富樓下據理直答答以空元無華妄見生滅者謂虗空元無狂華特以翳目妄見先生後滅喻真空理中元無山河大地等法特以無明妄見在因時有在果時無也見華滅空已是顛倒者謂空既無華若見實有狂華滅於虗空已是執無為有顛倒分別喻真空既無諸法若見真有諸法會歸真空者已是認妄為真顛倒執著也敕令更出斯實狂癡者謂見滅已是顛倒何況敕令更出斯人不但為愚實為狂而且癡喻見法歸空已是倒執何況難以復生斯人不但未得究竟無疑實為深入邪見全然無所明也云何更名等正滿慈不知自己所難之非反怪如來所問不當亦權人曲盡迷態意耳借喻顯非竟二取解為折佛言如汝所解云何問言諸佛如來妙覺明空何當更出山河大地如汝所解者滿慈於喻知非佛即按定所解而反難之言如汝喻中所解已知敕華更生實為狂癡云何汝前竟作如是問言如來妙空明覺何當更出山河大地等耶是則汝今不但未得究竟無疑實為深著邪見全無所明如彼狂而且癡者無異問前云妙空明覺此云妙覺明空同異何如答空指真空即斷德體覺指本覺即智德體然空非頑空故前曰妙此曰明覺非妄覺故前曰明此曰妙佛語自在與滿慈交互言之其實空之與覺即是如如理智皆明皆妙也先為折難竟二次令生信又如金礦雜於精金其金一純更不成雜如木成灰不重為木諸佛如來菩提涅槃亦復如是初喻説無明晦昧本覺如金礦雜於精金正脈云金礦者蘊金之砂石也尚雜於礦即稱精金者取其精真不變喻覺體不變也其金一純者融金去砂唯一惟純喻修智除惑以至惑盡智淨無二無雜是謂智德成矣智德既成再不起於無明故以更不成雜喻之令其生信以自修也木喻煩惱灰喻涅槃言行人以智斷惱離生死而證涅槃如以火燒木離煙𦦨而成寒灰是謂斷德成矣斷德既成不復更起煩惱招致生死故以不重為木喻之令其生信以自斷也諸佛下法合菩提智果謂翻轉煩惱完復本有如如智性乃即寂之照也涅槃斷果謂翻轉生死完復本有如如理性乃即照之寂也又此菩提涅槃與初卷中菩提涅槃不同彼約真性菩提性淨涅槃此約實智及圓淨耳亦復如是者灌頂云菩提智光類於精金明淨成智果後不復煩惱亦猶精金銷後不復重為礦也涅槃寂滅類於木灰燒盡成斷果後不復生死亦猶燼木灰後不復重為木也法喻合明真信斯生始知生續在因得成不空藏義總結前文説不空藏以釋生續之疑竟二説空不空藏以釋周遍之疑前空藏約真如門説不空藏約生滅門説然真如即是生滅生滅即是真如以不離一心故故此雙躡前二以説空不空藏據此中所釋之疑亦是法執細障故與上科同為審除細惑説也二一正為説藏以釋疑二兼為防難以生信初二一牒其所疑二法喻為釋初富樓那又汝問言地水火風本性圓融周遍法界疑水火性不相凌滅又徵虗空及諸大地俱遍法界不合相容已釋生續之疑次牒周遍之疑故置又言據前滿慈確陳周遍疑中有二問一問地水等本性圓遍云何水火不相凌滅今云又汝問言等是也二問地與空不合相容云何二俱周遍法界今云又徵虗空等是也是知如來但是牒彼之義文不全同勿過拘溺二法喻為釋三一通喻性相二釋疑總合三依喻別合初二一喻依性成相二喻無實似有初謂空即不空也富樓那譬如虗空體非羣相而不拒彼諸相發揮所以者何富樓那彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映初總以略喻虗空體喻藏性由有空義故以非相喻之由有不空義故以不拒諸相等喻之拒違礙也發揮者顯現義然此唯喻性不礙相而相不礙相之義亦自寓於言表以既同時不拒則同時發揮何礙之有所以下別以詳喻正脈云徵意非推其故但欲演略成詳耳虗空非明却具成明之性故藉日照為緣則有明現虗空非暗却具成暗之性故藉雲屯為緣則有暗現此義可喻如來藏性體非水火却具成火成水之性因藉日鏡月珠為緣則有水火相現又當知明中有暗暗中有明設若明中無暗明去暗從何來暗中無明暗滅明從何起是明暗必不相妨如水火何有凌滅此略取明暗以喻水火餘可思準又此喻中七相略取明暗動靜清濁昧映互相乖違以喻七大中燥濕通礙等相非局於次第配合幸勿穿鑿過當反令正義成晦喻中雲屯謂陰雲屯聚也霽澄則清句對上為靜對下為清故通成四對氣凝謂氣凝結也土積成霾者山獸騰踏令土積空以成昏霾之相水澄成映者如海水澄靜萬象映現也餘皆易知二喻無實似有謂不空即空也於意云何如是殊方諸有為相為因彼生為復空有若彼所生富樓那且日照時既是日明十方世界同為日色云何空中更見圓日若是空明空應自照云何中宵雲霧之時不生光耀當知是明非日非空不異空日初指相徵生日照之處則明雲屯之處則暗等不定在於一方故云殊也藉緣而現故曰有為此喻水火等大皆世間有為法故人但見日照則明多執明從日現為破此執故徵以為因彼生彼指日言暗等準此可知法中即是徵以從緣生也人又見明依於空遂執明從空出為破此執故徵以為復空有法中即是徵以從性有也然性有則墮自然緣生則墮因緣故就喻雙徵而下乃為之俱破若彼下承徵別破謂別破日生及空生也破日生中若彼所生者總牒緣生且日照時等別約日破雖別約日破原為破一例諸故置且言謂且就日照時言之既是日明必日所至處方明而十方世界同為日照明色應通成一日云何空中更見圓日在一處耶據此則知明非日生後破空生中若是空明應不藉日故云空應自照空既自照照應常照云何中宵無日雲霧障月之時空性宛然而不生光耀耶據此則知明非空有法中水火等大非因緣非自然準喻可思當知下就喻結顯明遍而日體不遍故結以非日空在而明耀不生故結以非空雖曰非空而十方空中同為日色故結以不異於空雖曰非日而中宵雲霧不生光耀故結以不異於日如是結顯佛意以非日非空喻水火等遍計無實以不異空日喻水火等依他似有既無實似有何凌滅不容之有哉通喻性相竟二釋疑總合觀相元妄無可指陳猶邀空華結為空果云何詰其相陵滅義觀性元真唯妙覺明妙覺明心先非水火云何復問不相容者真妙覺明亦復如是初約相釋疑意謂若以前來非日非空不異空日例觀水火等相則其相元妄以無實似有故既無實似有則無可指陳如虗空華豈可以捉摩得哉若必欲指陳水是濕相火是燥相其猶邀空中華更欲結為空果必無是處汝今云何詰其有相陵滅義觀性下約性釋疑意謂若以前來空非羣相不拒發揮例觀水火等性則其性元真以同依藏性故既同依藏性則惟是妙覺明心而妙覺明心於未現水火之先元非水火如鏡未現像時豈是像哉然既先非水火若更言不容則是心不容心決無是理汝今云何復問其有不相容者末二句總合前喻雖示性相恐猶未明故先總合蓋急欲釋其疑也言真妙覺明所以先非水火而水火等相所以無實似有者亦復如前所説之喻是也舊謂觀相觀性二段宜接後文無可憑據之下今錯簡於此乃繕寫之誤亦有曲就上喻暫約釋疑銷會至後無可憑據之下另立申義釋疑之虗科以辨定經文誵訛今疏以佛語自在無適不可既前後語脈俱可聯屬而聖經常法仍舊為妙三依喻別合二一依性成相二無實似有初合前虗空現明暗等汝以空明則有空現地水火風各各發明則各各現若俱發明則有俱現承上所謂真妙覺明亦復如是者言真妙覺明即是如來藏性合太虗空也汝以空明則有空現者謂汝等衆生若以感空之業發明於藏性之中則藏性中自有空現如晦昧為空及析色歸空等此合日照則明地水火風各各發明則各各現者謂設有一人作感地之業於東一人作感水之業於西一人作感火之業於南一人作感風之業於北各各發明於藏性之中則藏性中各各異現如東方業感劫成西方業感水災南方業感火災北方業感風災等此合雲屯處則暗風搖處則動乃至土積處成霾水澄處成映若俱發明則有俱現者謂設若衆多衆生俱於一處各造水火等業俱時發明於藏性之中則藏性中水火等相俱時顯現如一恆河人見水鬼見火等此義前喻無文蓋法中增出以起下文無實似有之喻二無實似有合前明非日空不異空日等據文中先喻似有後喻無實科順前喻顯文殊義同也云何俱現富樓那如一水中現於日影兩人同觀水中之日東西各行則各有日隨二人去一東一西先無準的不應難言此日是一云何各行各日既雙云何現一宛轉虗妄無可憑據初喻依他似有單現各現前喻已有無實似有之義亦自可見故此中惟徵俱現水現日影喻藏性中具諸大性兩人同觀喻衆多衆生俱在一處東西各行喻俱時各造感水感火等業各有日隨喻俱時循業現水現火不同佛意以第一日影總喻大性而各行之日即喻水火等相東西各隨喻相反而不相陵如諸天同食一器而粗妙各得生佛同處一土而淨穢異見足證此義準定也的實也言日影既惟是一而忽分一東一西已自先無定實喻大性是一而忽現一水一火等明知其為依他似有法也不應下喻遍計無實雙猶二也宛轉即是展轉言二日既無準的置之不論可也若更難其是一云何各行既雙云何本惟現一則是展轉虗妄無有正理可憑喻水火等相既唯依他似有離於遍計可也若更周遍計度是一云何相反是異云何相容則是妄中生妄究無圓成正理可據故喻中遮以不應法中即是為佛所訶以立折之也看教者多謂此科是以喻合喻愚謂此科既惟喻俱現不合前喻亦可若必欲合者亦唯約依他似有遍計無實之義合之不必局配正為説藏以釋疑竟二兼為防難以生信前文滿慈疑佛諸妄何當復生是已起現行故言折此處滿慈疑我現見有礙是未起種子故云防又前文既為折難復恐不信故重舉礦金木灰二喻令以生其真信此處既為防難亦恐不信故重舉佛得無礙之故令以生其正信而前後文勢亦頗相類二一先為防難二後令生信初恐承上難云如佛所説果是無礙而我云何現見有礙故為此防富樓那汝以色空相傾相奪於如來藏而如來藏隨為色空周遍法界是故於中風動空澄日明雲暗衆生迷悶背覺合塵故發塵勞有世間相初循業成礙汝字以滿慈例衆生也世間諸法不出色空色若成時則傾滅於空空若現處則陵奪乎色故曰相傾相奪衆生不知是妄依之造業故云以也合能依所依皆為性海緣起故云於如來藏於者在義正以在於如來藏故遂致藏性循業又復現為色空周遍一切法界故云而如來藏等是故於中等者謂以是色空周遍義故所以於法界中互成違礙如風搖處則動空寂處則澄是動靜相礙也日照處則明雲屯處則暗是明暗相礙也此則略舉四相兩對若例而推之乃至水火潤燥空地堅通等總成違礙永無還復時矣衆生下約義結防不了色空是妄以惑障智是曰迷悶由此與真日疏與妄日親是曰背覺合塵起諸煩惱造種種業是曰故發塵勞藏性循業重現色空是曰有世間相此總約上義以結防有礙之難二後令生信此明佛得無礙之深故也我以妙明不滅不生合如來藏而如來藏唯妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場遍十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪滅塵合覺故發真如妙覺明性初稱行成融佛自稱我例一切佛也妙明指六根中性元自不滅不生如十番顯見中説諸佛悟此是真依之起行故云以也依之起行行行契真故云合如來藏正由契合藏性遂致藏性隨緣惟現妙覺明用圓照一切法界然妙覺圓照則是以理融事先成理事無礙以為事事無礙之由是故於中等者謂以是妙覺圓照義故事得理融所以於法界中互成容即如一得理融則可為無量無量若得理融則可為一是一多相即也小得理融則中可現大大得理融則中可現小是大小相即也此且標定四義下乃出其相狀不動道場遍十方界者一身能作無量身即一為無量相也身含十方無盡虗空者無量空作一身空即無量為一相也於一毛端現寶王剎者毛端本小而大可容剎即小中現大相也坐微塵裏轉大法輪者佛會本大而小可入塵即大中現小相也此則略舉四義四相若例而推之乃至延促俱在隱顯交成等無盡妙義總成容即永無重礙時矣滅塵下約義結示了悟根性是真塵日益忘性日益入是曰滅塵合覺歷位成行歷位證真是曰故發真如事得理融一多大小同入無礙是曰妙覺明性此總約上義以結示無礙令信為除細惑説二藏竟三為發圓信説三藏此中三藏即是前之三藏但前約次第而説歷然成三雖已隨分成信而未極圓融所謂是似信而非真信以未能洞達本源故也今明三藏唯是一心一心圓具三藏則滿慈等正信空藏時即信不空藏及空不空藏義正信不空藏時即信空不空藏及空藏義正信空不空藏時即信空藏及不空藏義圓極至此方稱真信有時把住則水泄不通有時放行則凡聖俱入有時放行不礙把住把住不礙放行以能洞達本源永不受一切惑也三一正為説藏二兼為釋疑三衆發圓信初二一圓彰三藏二普責思議初三一依圓説空藏二依圓説不空藏三依圓説空不空藏初而如來藏本妙圓心非心非空非地非水非風非火非眼非耳鼻舌身意非色非聲香味觸法非眼識界如是乃至非意識界非明無明明無明盡如是乃至非老非死非老死盡非苦非集非滅非道非智非得非檀那非尸羅非毗梨耶非羼提非禪那非般剌若非波羅蜜多如是乃至非怛闥阿竭非阿羅訶三耶三菩非大涅槃非常非樂非我非淨以是俱非世出世故初能非之心而字緊躡上文言上來所説空即不空不空即空似屬圓融無礙之心而自阿難請定已來破識指根等文何乃偏説空藏故云而如來藏本妙圓心謂雖是圓心而實本來自妙以其從本以來不與一切雜染等法而共相應故問四聖淨法何亦不相應耶答對染立淨淨亦成染古德云佛之一字吾不喜聞乃極力發揮此旨非心下所非之法復二一非世間二非出世非世間中先明非七大義心即見識二大前云見見之時見非是見後云汝暫舉心塵勞先起故俱非也並非空等者後云一人發真歸元十方虗空銷殞前云妙覺明心先非水火餘可例知又此中亦攝五陰以心攝四心空等皆色陰故非眼下次非三科單非眼等即是六入並非色等即是十二處合非眼識界等即是十八界準前六入中眼等皆指性言目未揑時元無二月故非也非六塵者如淨目觀空逈無所有故非六識者以境風未動識海無浪故據此則如來藏非世間法矣非出世中先非小乘明無明者依於本明而起無明十二因緣中第一支也後云識迷無因妄無所依故曰非明無明此約流轉門説明無明盡乃約還滅門説後云尚無有生欲何為滅故並盡亦非如是乃至者超略中間十支謂行支即前陰所作之業合上無明乃過去二支因識支即投胎八識名色支即胎中五陰名即四心以胎中受想行識尚無實用但有其名故六入支即出胎六根現陰初生之位觸支謂六根初能觸對前境約未成欣戚時説受支謂對境能生欣戚也自識至此名現在五支果愛支謂受後復起貪欲取支謂由貪欲故追逐營求合上愛支同過去無明屬惑有支謂作種種事同過去行屬業自愛至此名現在三支因生支謂由現在業復感當來受生合下老死二支并上識等五支總屬苦道此約流轉門説若各加盡字即是還滅十支然此皆依無明無明尚非此不待言故以如是乃至而超略之生相漸衰曰老老極頓壞曰死此二共為一支合上生支名未來二支果乃十二因緣中最後一支依於生支而有生支尚無況於老死及老死盡故俱非也據此則如來藏非緣覺法矣苦以逼迫為性三苦八苦等即世間果集以招感為性十使煩惱等即世間因滅以可證為性滅盡諸苦等即出世果道以可修為性正助道品等即出世因苦集屬有為道滅屬無為後云真性有為空緣生故如幻無為無起滅不實如空華故一一俱非據此則如來藏非聲聞法矣次非大乘中復分因果因人中非智非得者非權教菩薩也以權教菩薩隨相修行實有能得之智及所得之法如來藏中都無是事以本惟一體絶對待故此與上二頗似心經語但彼直約諸法空相故言無而此唯顯一心絶染故言非也非檀那等非實教菩薩也檀那此云布施尸羅此云持戒毗梨耶此云精進羼提此云忍辱禪那此云靜慮般剌若此云智慧六俱究竟名波羅蜜多此云到彼岸以西域凡事究竟皆稱到彼岸故據尋常波羅蜜多贅於各度之下今以一句總之然如來藏中本無慳貪布施何立乃至本無愚癡智慧安名六行既已不有説誰究竟故并彼六行及波羅蜜多而俱非之據此則如來藏非菩薩法矣如是乃至者超略四等四攝諸菩薩行故果人中怛闥阿竭此云如來阿羅訶此云應供三耶三菩此云正遍知十號中三即目能證人也涅槃此云無生滅遠離生死故又云圓寂無真不圓無妄不寂故即是所證法也於中復有總別蓋涅槃是其總體常樂我淨是其別相灌頂云二死永亡曰常解脫受用曰樂證真法身曰我絶無障染曰淨圓覺云妙圓覺心本無菩提及與涅槃亦無成佛及不成佛故一一俱非據此則如來藏非佛法矣然既非世間又非出世則染法所不能染淨法所不能淨是謂彌滿清淨中不容他知此義者雖萬有當前而與我無與焉以是下結成妙義謂前自阿難請定以來破識指根等文所以偏説空藏者蓋即以是俱非義故依圓説空藏竟二依圓説不空藏即如來藏元明心妙即心即空即地即水即風即火即眼即耳鼻舌身意即色即聲香味觸法即眼識界如是乃至即意識界即明無明明無明盡如是乃至即老即死即老死盡即苦即集即滅即道即智即得即檀那即尸羅即毗梨耶即羼提即禪那即般剌若即波羅蜜多如是乃至即怛闥阿迦即阿羅訶三耶三菩即大涅槃即常即樂即我即淨以是俱即世出世故初能即之心即字亦緊承上文言據上所説非世出世乃是心之妙相而佛答萬法生續中何乃偏説不空藏耶故云即如來藏元明心妙謂即此如來藏雖是心之妙相又元來自明以其從本以來具足顯現恆沙性淨功德於其中故問世間染法何亦具足現耶答既稱性淨染亦是淨古德云拈一莖草作丈六身乃極力發揮此意即心下所即之法亦二一即世間二即出世即世間中先明即七大者以前云體非羣相不拒諸相發揮故也次明即三科者色心惟是心所現故即出世中先明即小乘法者無不從此法界流無不還歸此法界故次明即大乘法者以一切因果皆依一心而得建立如三覺五位不離一真法界其義可見然既即世間又即出世則六凡無能逃其明四聖無能逾其照故正脈云十界諸法離此心無片事可得是謂塵塵混入剎剎圓通知此義者雖一真不動而應用無遺焉以是下結成明義謂前佛答萬法生續所以偏説不空藏者蓋即以是俱即義故三依圓説空不空藏即如來藏妙明心元離即離非是即非即初能融拂心此中即字乃雙躡前之二藏言據上非世出世唯顯藏心之妙即世出世惟顯藏心之明既妙明歷然體用攸分而佛釋諸大周遍中何乃俱説空不空義故曰即如來藏妙明心元謂即此如來藏又是妙二明心之元本也離即下所融拂法言既以一心為元則正相非時即便隱故曰離即正相即時非便隱故曰離非此約互奪兩亡以明雙拂之義又既具妙明二義則正相非處不礙俱即故曰是即正相即處不礙俱非故曰非即此約互成兩立以明雙融之義然既雙拂雙融存泯自在言語之所不到心思之所不及是謂惟佛與佛乃能究盡知此義者雖干難殊對而不干其慮焉準前二科亦應有結成元義之文今不具者以方標心元便出即離未涉多文不須更結故又此三藏皆云依圓義説者謂三藏惟是一心一心圓具三藏則隨舉一藏之時餘之二藏亦皆同時具足信果至此自不被諸人舌頭瞞矣圓彰三藏竟二普責思議如何世間三有衆生及出世間聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發汝與衆生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起由不勤求無上覺道愛念小乘得少為足初正責世間指器世間三有衆生謂有情世間出世聞緣謂正覺世間不言菩薩者對滿慈説以正為攝兼為故如何者怪責之詞佛意以上説三藏一心圓具果中證之則為無上菩提因中悟之則為佛知佛見然既即三而一即一而三同時具足不可思議只可以智知不可以識識只可以心印不可以言明如何世間三有衆生出世聞緣以所有妄知之心指六識妄想欲得測度用世間戲論語言指因緣自然生續不容等欲得悟入其猶以升量海將螢燭夜不亦難乎譬如下喻明琴古五弦今七弦琴者禁也謂禁制邪淫納之雅正也瑟古五十弦今二十五弦瑟蕭也謂其聲蕭蕭然而清也箜篌十四弦乃師延所作靡靡之樂後出於桑間濮上之地以是空國之候所存故以空候從竹為名琵琶四弦用手前推曰琵後却曰琶取作時運指為名四皆樂器喻衆生聞緣性也有妙音者謂妙音內蘊喻衆生聞緣性中各具三如來藏義可稱菩提可成佛知見也無妙指者謂指不善作喻衆生聞緣以所知心測用世語言入也不能發者謂妙音不作喻衆生聞緣不能證得無上菩提不能悟入佛知見也汝與下法合汝指滿慈衆生亦該聞緣各各有性同彼四種樂器故云亦復如是寶體無垢即空如來藏覺用遍圓即不空如來藏真心渾具二義即空不空如來藏各各圓滿者喻衆生聞緣性中本自具足合前有妙音義按指者略作定相離分別絶語言故海印者三昧之名華嚴賢首品云衆生形像各不同行業音聲亦無量如是一切皆能現海印三昧威神力是知定心澄清應物而形其猶海水湛寂有像斯印故以為名發光者依彼海印三昧現出菩提智光指示佛知佛見此意似指經前敷座晏安宣示深奧義説但喻中無文若將喻中雖有妙音下益以必有妙指方發妙音八字則法喻備矣汝暫舉心者指前加明於覺覺尚未明而無明已熾故曰塵勞先起塵勞既起障菩提而礙知見此合喻中若無妙指終不能發義也由不下結斥上言汝暫舉心塵勞先起尚未明言其故今乃説出以示激勸之意無上覺道不生滅果也勤求此者須用不生滅性以為因心由不勤求不用無生滅心所以不能如佛按指海印發光小乘涅槃有生滅果也以未離變易故愛念此者惟用有生滅心所以才欲舉心明覺塵勞先起欣化城之暫安作終止想故云得少為足聞此結斥應發深省下滿慈請問妄因殆由此耳正為説藏竟二兼為釋疑二一釋滿慈執妄有因疑二釋阿難執真成自疑初二一滿慈執勤求而疑妄有因二如來示無因而教以頓悟初富樓那言我與如來寶覺圓明真妙淨心無二圓滿而我昔遭無始妄想久在輪回今得聖乘猶未究竟世尊諸妄一切圓滅獨妙真常敢問如來一切衆生何因有妄自蔽妙明受此淪溺初推本無二富樓那言者由前佛斥不求發言請問也我與如來者正脈云就己對佛推論以例衆生無不皆然見生佛本覺無不同也前云寶覺真心此云寶覺圓明真妙淨心蓋寶以圓稱取清淨彌滿之義仍屬空藏覺以明稱取用現諸法之義仍屬不空藏至若真心以妙淨稱者妙則取其空有雙照淨則取其空有雙遮仍屬空不空藏其實三藏不離一心故總以心字結之無二圓滿者均稟同賦領上各各圓滿但上對生説此對佛論耳而我下較末懸殊昔字泛指曠劫妄想且指粗識以二乘不知有細識故然亦稱無始者謂雖屬粗識究之莫得其初相故依之起惑造業不能出離生死故曰久在輪回正以久在輪回常受其害故云遭也今得聖乘者現前已證四果但去佛菩提尚在遙遠故云未得究竟此滿慈自陳返末尚在中途耳諸妄圓滅者不惟能斷粗識中惑乃至最細生相亦皆盡遣獨妙真常者不唯能離分段生死乃至最後變易亦皆普離此滿慈讚佛抵本已至極證耳由此觀之則佛與滿慈較之固天淵懸殊矣敢問下索請妄因冒昧陳情曰敢問不為自求故約衆生問也問以何因有妄者欲除其妄先窮其因自蔽妙明者由妄想故蓋覆真覺受此淪溺者凡夫淪於分段二乘溺於變易咸遭其誤應求盡除滿慈推因意在斯焉二如來示無因而教以頓悟二一正釋無因二結示頓悟初四一牒惑示問二法喻合明三示不須滅四應問結答初佛告富樓那汝雖除疑餘惑未盡我以世間現前諸事今復問汝正脈云汝雖除疑一句是許其大疑已盡蓋據其推本無二是信已本真稱佛圓常是信佛永證乃至萬法生續之疑諸大周遍之惑皆已除矣餘惑未盡者尚不達無明無因強索之也現前諸事者謂現前眼所共見耳所共聞諸事中有此一事可喻非假設之也今復問汝者示以就事為問令因喻而知妄本無因義故二法喻合明二一就事為喻二約義法合初汝豈不聞室羅城中演若達多忽於晨朝以鏡照面愛鏡中頭眉目可見瞋責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故汝豈不聞者反言以決其必聞以屬現前事故室羅城生佛同依喻寶覺圓明真妙淨心無二圓滿演若達多此云祠授從神乞得故乃城中狂人喻滿慈及生皆依真成迷人故忽於者喻滿慈忽起一念一念為始故以晨朝喻之以鏡照面喻以識緣佛緣佛故則於自識中變起佛之影像如彼鏡中之頭不達惟識正理不知外佛全是自識影像而反羡慕佛果妄滅真常故以愛鏡中頭眉目可見喻之己頭喻自心之佛言自心本來是佛故喻以己頭不知自心本來是佛而自悔遭妄受淪自蔽妙明故以瞋責己頭不見面目喻之魑魅古釋為山澤鬼愚謂魑字從離可喻二乘出離魅字從未可喻凡夫迷昧凡夫自計為凡分段未出二乘自計為小變易方熾如彼以為魑魅無狀狂走是知滿慈自謂今得聖乘猶未究竟依然魑魅狂走類也問以此人何因無故狂走者正對滿慈問佛一切衆生何因有妄等語佛意蓋欲借口為喻令其類會法中義故答以是人心狂更無他故者是滿慈於喻中已知法中妄無所因恐猶未之會耳二約義法合佛言妙覺明圓本圓明妙既稱為妄云何有因若有所因云何名妄妙覺明圓約佛心説諸妄圓滅獨妙真常故稱妙覺明則取其能照圓則取其能遍前文所謂唯妙覺明圓照法界是也本圓明妙約生心説言不惟佛心為妙為明為圓而生心亦本圓本明本妙但能離念生心即是佛心是知滿慈羡慕佛心悔恨自心同為妄想此約義合前愛鏡中頭瞋責己頭以彼愛瞋皆狂正同滿慈羡悔皆妄也據前滿慈問云一切衆生何因有妄而此云既稱為妄云何有因此結示滿慈之語據前滿慈問意蓋為深究妄因而盡斷之此云若有所因云何名妄乃反顯其決無所因無庸妄斷約義合前佛以喻問滿慈以喻答也然此中合詞雖略義乃具含從古類皆含糊釋之今依滿慈所問喻中所詳約義配合詳之法喻合明竟三示不須滅二一責以已説不返二示以欲滅不須初今於佛上起念正同昔於覺上加明前既已説猶不能返故責之也自諸妄想展轉相因從迷積迷以歷塵劫雖佛發明猶不能返承上起念緣佛既同演若照鏡則無始動心明覺亦類此可知蓋自諸動心明覺成立微細妄想如是由細至粗次第生起故云展轉相因粗相既定則是迷已成矣由是已成之迷而又展轉迷執以成三種相續故云從迷積迷相續既成輪轉無休故云以歷塵劫如是等義雖佛如來前已為汝發明觀汝何因有妄之問是猶未能返本還源迷何深哉二示以欲滅不須如是迷因因迷自有識迷無因妄無所依尚無有生欲何為滅如是者指滿慈羡佛悔已問妄何因而言言此雖今日之迷亦同無始之妄也要知如是迷因非真別有蓋因迷而不知是妄乃自覺其有體前云似有迷覺是也識迷無因者謂識得是迷則當體全空豈復有因前云識迷迷滅是也妄無所依者言今日之迷既爾無始之妄亦然以此例彼則諸妄皆無所依矣既無所依則無能生能生既無所生何有是知諸妄尚無有生欲將何者為滅而欲滅之示不須滅竟四應問結答得菩提者如寤時人説夢中事心縱精明欲何因緣取夢中物況復無因本無所有如彼城中演若達多豈有因緣自怖頭走忽然狂歇頭非外得縱未歇狂亦何遺失富樓那妄性如是因何為在初應問示妄佛意以汝前問佛何因有妄以為佛得菩提已滅諸妄必能説妄及妄因緣要知得菩提者雖能説妄亦如寤時之人説夢中事本無所有若更令説出何因有妄雖佛智辨具足亦所不能猶彼寤人心縱精明欲以何等因緣取夢中物而示人乎是知欲滅諸妄不必求因況復元來無因以本無所有故如彼下就喻以明上雖有喻但是法中帶言此則仍就演若達多之喻而發明之豈有因緣自怖頭走者正明狂走無緣喻諸妄無因何以見其狂走無緣以忽然狂歇頭非外得故不惟狂歇縱於未歇狂時頭亦可曾遺失據此則真本無失前之所謂遭妄受淪者亦妄計耳富摟下結答無因妄性如是者謂妄性本無如我所説如是因何為在者謂妄且不有況夫更推其因自應無在正釋無因竟二結示頓悟二一法説二喻明初汝但不隨分別世間業果衆生三種相續三緣斷故三因不生則汝心中演若達多狂性自歇歇即菩提勝淨明心本周法界不從人得何藉劬勞肯綮修證初教以頓悟之方汝但不隨等者謂不必更求妄因但自不隨於妄可也分別即六粗中前五世間業果衆生等即六粗中後一合此六粗能起殺盜淫業是為三者之緣若但能不隨則粗相既除而三者之生緣斷矣三因即指細相以細相中具含殺盜淫種是為三者之因因必藉緣方得生起故曰三緣斷故三因不生如世五穀種子必假水土為緣設無水土則雖種不芽也達多狂性即指一念妄動以是根本無明最初生相故自歇者不待用力自然歇滅如種既不芽置之則生性自壞故但離妄念即如如佛故云歇即菩提菩提即是佛心超出一切曰勝離諸惑染曰淨具足智照曰明體萬法而無遺曰本周法界非佛祖之外傳曰不從人得末二句結顯不須勤求言既不從人得則本來是佛不涉功勳故云何藉劬勞云云肯綮出莊子彼養生主篇云技經肯綮之未嘗吳興曰骨間肉曰肯筋肉結處曰綮依管見作勞筋苦骨剋苦修行之義愚謂肯指無明謂斷之如析骨間肉也綮指煩惱謂斷之如理筋肉結也大意即是何須劬勞斷妄如肯如綮妄修妄證為哉二喻明譬如有人於自衣中繫如意珠不自覺知窮露他方乞食馳走雖實貧窮珠不曾失忽有智者指示其珠所願從心致大饒富方悟神珠非從外得初喻本有不覺有人總喻凡小正脈云衣喻三緣顛倒分別三因微細流念及狂性根本無明重重包裹之相珠喻菩提勝淨明心由此枝末與根本無明重重包裹故雖有而不覺也窮露下喻迷之非失正脈云纏空而乏於妙用曰窮滯有而無所退藏曰露空有二皆邊地故如他方求人天樂取偏小益猶乞食馳走萬妄交馳一真宛在猶雖貧珠在所謂縱未歇狂亦何遺失是也忽有下喻悟之非得吳興曰佛如智者教如示珠正脈云致大饒富喻本周法界末二句喻不從人得也愚謂不從人得乃明其本自現成無勞修證是知圓人修行唯重頓悟正脈云如其悟未大徹而妄撥事修自成陷墜亦愚惑之甚也釋滿慈執妄有因疑竟二釋阿難執真成自疑二一阿難執佛語而疑真成自二如來明非自而教以漸修初二一躡現説以申疑二約背昔以陳請初即時阿難在大衆中頂禮佛足起立白佛世尊現説殺盜淫業三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得斯則因緣皎然明白云何如來頓棄因緣即時者即於佛答滿慈時也滿慈之疑方了阿難之疑又興故於衆中立白現説者通指前科中汝但不隨等語殺盜淫業以六粗為緣以三細為因六粗既除而三細無用故曰三緣斷故三因不生三細無用而無明自灰故曰心中達多狂性自歇此諸妄俱滅也妄滅真現故曰歇即菩提不從人得句義攝何藉劬勞肯綮修證之語以人尚不須自無煩修證矣斯之一字乃總牒前語如云若依此説也阿難意以若依此説乃因緣妄滅而得菩提則因緣之義豈不皎然明白然因緣之理既成云何如來又要頓棄因緣而説不從人得何藉劬勞等耶二約背昔以陳請我從因緣心得開悟世尊此義何獨我等年少有學聲聞今此會中大目犍連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏今説菩提不從因緣則王舍城拘舍梨等所説自然成第一義唯垂大悲開發迷悶初敘因緣成益我從因緣心得開悟者由聞因緣之法發明初果道也世尊此義等乃極顯此因緣不可背故其意以若獨我等因之開悟尚不足重以我等生年尚少果在有學法或淺近此義不爾故云何獨等也今此會中指老年無學者説大目犍連等略舉三人餘以等字該之此等皆先依邪師習外道法故云從老梵志如舍利目連先師沙然梵志餘可例知聞佛因緣句約捨邪歸正時説與上句稍欠眉目中間略斷一斷讀之則不混矣佛初成道為破無因及與邪因與其説正因緣故得聞也但聞該多衆或親從佛聞或展轉傳聞皆得言聞故發心有二一發心出家二發心出界開悟者開悟四諦法也依之斷見思惑證無學道故曰得成無漏是則老年無學亦由因緣成益而因緣豈可遽背乎哉今説下明今説背昔上云歇即菩提等即是不從因緣義也則王舍城等不惟顯其背昔兼恐濫於邪故拘舍梨外道名也舉一該類故置等言説自然者以是其所宗故然因緣自然相待而立因緣既非極旨自然乃為勝説是彼反成第一義諦夫豈可乎唯垂二句求大悲開發開謂開岐二之迷發謂發混一之悶也阿難執佛語而疑真成自竟二如來明非自而教以漸修良以理由頓悟事必漸修設或執漸修而迷頓悟塵劫終無實果若乃執頓悟而迷漸修任説總成狂解故世尊前釋滿慈之疑惟重頓悟今開阿難之惑尤重漸修其猶良醫用藥消補隨時則世無不活之人而遇皆可治之症至後選根直入歷位曲成即頓悟漸修之明證也二一正明非自二結勵漸修初文中雖兼破因緣佛意惟是破其自然科從正立故三一牒執斥理二喻明非自三應求結示初佛告阿難即如城中演若達多狂性因緣若得滅除則不狂性自然而出因緣自然理窮於是初牒其所執欲釋其疑故告之也即如者仍就喻言達多狂性即是無明能障菩提故稱因緣若得滅除者達妄本空此即牒前所執三緣斷故三因不生狂性自歇義也不狂性即是菩提妄滅即真故云自然而出此即牒前所執歇即菩提不從人得義也末二句就疑斥理佛意以我説狂性因緣本非因緣我説歇即菩提亦非自然汝等不知乃以因緣自然妄理推窮於是何其謬之甚也二喻明非自三一喻菩提非自二喻無明非自三喻本覺非自初二一正喻菩提非自二兼以喻防轉計初阿難演若達多頭本自然本自其然無然非自何因緣故怖頭狂走仍以喻明者取易顯其非也前以己頭喻自心之佛此喻菩提以自心之佛即菩提故喻中若謂頭本自然則應本自其然無有變易此是正明下句反顯無然者無是理也既無是理則非是自反顯是自者必然無有變易法中菩提亦爾果是自然亦應本自其然無有變易若爾則一切衆生不應遭妄受淪故仍就喻中以何因緣故怖頭狂走為難以滿慈自悔遭妄受淪正同達多怖頭狂走事故法喻合顯而菩提非自然明矣二兼以喻防轉計若自然頭因緣故狂何不自然因緣故失本頭不失狂怖妄出曾無變易何藉因緣恐聞前喻轉計菩提屬於因緣如彼自然之頭有因緣故亦可成狂故世尊以此防之佛意以若謂自然之頭因緣故狂者及至狂心歇時何不并自然之頭因緣故失今見其狂心歇處本頭不失明知其狂怖妄出曾無變易於頭是頭何藉因緣有哉菩提亦爾諸妄滅盡本自現成並非藉因緣而有若必捨自然而就因緣其猶出囿入網終非解脫之計耳喻菩提非自竟二喻無明非自本狂自然本有狂怖未狂之際狂何所潛由前佛答滿慈明妄無因恐阿難不達又執無明屬於自然故以本狂自然為喻其意以本狂喻無明也喻中若執本狂為自然者則是達多本有狂怖之性試問其未狂之際狂性何所潛藏想必無是事法中無明亦爾若自然者則是衆生本有妄性當其一念未起時妄性何所潛藏想必無是理法喻合顯明知無明非自然矣三喻本覺非自不狂自然頭本無妄何為狂走恐聞前喻轉計本覺自然然本覺與菩提無二前已明其非自今復重執故以不狂自然等防之不狂者未狂時性喻本覺也然未狂之時頭本自如故云無妄喻在本覺時菩提本真非有為也此且就喻按定下乃顯其非自言不狂果是自然不應成狂既不成狂而本頭無妄乃何為無狀狂走喻本覺果是自然不應成迷既不成迷而菩提宛在乃何為無端迷淪法喻合顯明知本覺非自然矣問上喻菩提非自己足釋阿難之疑而其次又喻無明非自本覺非自者何所取義耶答自然外計破須破盡無明為生妄之源本覺為證真之基此既非自則一切皆非自耳喻明非自竟三應求結示若悟本頭識知狂走因緣自然俱為戲論是故我言三緣斷故即菩提心滿慈執妄有因阿難疑真濫自皆由不悟本頭不失未知狂走是妄若果悟得本頭識知狂走則滿慈所執因緣阿難所疑自然俱為戲論都無實義此則正銷阿難之現疑兼防滿慈之又執以待自立因勢所必至耳是故者以是二俱戲論之故我言者指前佛答滿慈之言三緣斷故即菩提心正二皆不許之語以故字顯非自然即字顯非因緣前以阿難不達故字之義以無因而欲立自然後恐滿慈不達即字之義對非自而又執因緣故仍以二語結示令深思而自會之耳正明非自竟二結勵漸修三一承前開發二正為策勵三取例斥責初謂開發增修進趣之行為下䇿勵之端也菩提心生生滅心滅此但生滅滅生俱盡無功用道若有自然如是則明自然心生生滅心滅此亦生滅無生滅者名為自然猶如世間諸相雜和成一體者名和合性非和合者稱本然性本然非然和合非合合然俱離離合俱非此句方名無戲論法初遣悟入修上云歇即菩提是頓悟菩提之心名為菩提心生乘此心力漸以伏除二障現行粗相生滅之心名為生滅心滅謂現行粗生滅心從此滅也按終教位當初住至七以終教信位伏現入初住則煩惱現行先除至七住而所知現行並盡故此但生滅者以此但是待生言滅依然是生滅心耳乘此心力進以伏除二障種子細相生滅之心名為滅生俱盡謂種子細相生滅心亦俱盡也按終教位當初向至十以終教行位伏種入初向則二障粗種先除至十向則二障細種並盡故自此任運伏習故曰無功用道若有下遣分入滿若猶似也以上云無功用道似有自然義故依如是義則發明有箇自然心生乘此心力進以伏除習氣最細生滅之心名為生滅心滅謂習氣最細生滅心亦復滅也按終教位當十地等初以終教四加伏習十地中地地斷習一分入等覺初心則十一分盡而言此亦生滅者以微細念相猶未盡故乘此初心進斷佛地習氣一分是為無生滅者謂最後微細念相亦無也按終教位當等覺後心任運成佛無復留礙故曰名為自然猶如下遣待入絶諸相雜合成體者如衆藥合而為丸喻上兩重生滅以生滅成位如彼衆藥為丸者無異故云名和合性非和合者如藥盡丸亦成空喻上兩重自然以自然成位如彼藥盡丸空者無異故曰稱本然性本然非然等即就喻以拂遣也言上云歇即菩提似有本然之義而菩提心生生滅心滅則上之本然者非本然矣次云此但生滅似有和合之義而滅生俱盡則次之和合者非和合矣合然俱離句又躡迹以重遣也言上云滅生俱盡無功用道又似有本然之義而自然心生生滅心滅是又本然者亦復離也次云此亦生滅又似有和合之義而無生滅者名為自然是又和合者亦復離也統此二離故云合然俱耳離合俱非句乃待絶而情盡也言上云無生滅者名為自然猶似有離因合果之義然有離有合亦是對待若並此離合俱非則對待盡矣按終教位當妙覺以終教妙覺現種習盡即妄皆真後更無位無可離亦無可合故對待既絶一切和合因緣不和合自然等種種虗妄情計皆不能及故云無戲論法問此經亦兼頓圓何故判位唯取終教答以此經在般若會之後半接漸入頓接終入圓以為法華受記機故承前開發竟二正為策勵三一不修無益二徒聞無功三就事策勵初菩提涅槃尚在遙遠非汝歷劫辛勤修證雖復憶持十方如來十二部經清淨妙理如恆河沙秪益戲論上云三緣斷故即菩提心是悟證非修證按終教惟齊信位去妙覺果猶隔四十五位謂住行向加地等也故云菩提涅槃尚在遙遠非者反顯詞汝者面訓語歷劫者從此向去更歷多劫辛勤修證者辛苦勤勞修治現種習氣證入賢聖等妙如前重重遣立以至無戲論法是也佛意以必得如此聞乃有益若非如此縱多亦枉故云雖復憶持云云憶持者不惟能聞兼復能記十方如來者不唯一佛所説亦復能記諸佛所説十二部經者不惟一經亦復能記十二部經清淨妙理者不唯小乘有漏粗顯理趣亦復能記十二部中大乘無漏清淨微妙理趣是則所憶所持重重無盡不啻如恆河中沙矣雖能如此亦不過徒資談柄終無實效故云秪益戲論古德所謂説丈不及行尺者即此可見二徒聞無功汝雖談説因緣自然決定明了人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難何須待我佛頂神呪上説阿難不修無益恐未心服還以其事取實故言汝雖等也談説因緣自然者現前之事詞無更義不爽故云決定明了人間稱汝多聞者平日之聲無能勝不可匹故許名擅第一佛意以雖能如此非關修證以此乃是積劫以來多聞熏習力故如法華中説佛與阿難同於空王佛所發心佛常勤精進阿難常樂多聞等可證此義不能免離等者正顯其無功也何須句何字疑是尚字不然則義稍不接講演時隨語變通亦無不可三就事策勵摩登伽心淫火頓歇得阿那含於我法中成精進林愛河乾枯令汝解脫是故阿難汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業遠離世間憎愛二苦一蒙呪力淫火頓歇顯呪力能破障也不惟淫歇兼得那含顯呪力能成益也阿那含小乘三果之名此云不來謂超斷見惑八十八使頓斷欲界九思再不來欲界生故從此於佛法中進修無漏歷斷上思故曰成精進林林者一望無際喻登伽此去精進不止於僅證四果已也愛河乾枯者愛即三界愛也沒溺衆生猶如瀑河登伽已斷欲愛如瀑停水存此去歷斷上二則並水亦枯矣彼既離於愛纏此即免於鈎牽故云令汝解脫是故阿難等乃承上登伽之事結告阿難以示策勵之意言汝雖歷劫以來憶持十方如來祕密深奧之法微妙嚴淨之理不如一日發心進修無漏勝業即能遠離憎愛二苦彼登伽者將何從為難哉又上但云愛此兼云憎者以憎愛相對有愛必有憎故憎苦會遇如阿難之與登伽愛苦別離如登伽之與阿難故二俱名苦正為策勵竟三取例斥責如摩登伽宿為淫女由神呪力銷其愛欲法中今名性比丘尼與羅睺母耶輸陀羅同悟宿因知歷世因貪愛為苦一念熏修無漏善故或得出纏或蒙授記如何自欺尚留觀聽如摩登伽者取登伽為例宿世即為淫女不止今生顯愛欲之重神呪力能銷除由於果發顯修證之驗又銷愛者淫火頓歇愛河乾枯即破惡益法中者於佛法中成精進林即生善益名性者得阿那含漸入覺性即入理益比丘尼者得入清衆不受僧遣即歡喜益意顯神呪具四悉義故與猶同也羅睺母名耶輸陀羅昔為佛婦今亦出家為尼一樣曰同言性比丘尼亦與耶輸陀羅一樣悟得宿世之因此分得宿命通也從前未悟宿因任説貪愛為苦亦不自信今以悟得乃能知之歷世因謂無始以來經歷多世受生死因也由貪愛而致生死故曰為苦一念熏修者謂厭苦生離頓起勝進之念熏修上地定也上地之定能斷上地之惑故稱無漏善法或者不定之詞若得少為足則或得出纏謂證四果出三界纏若回小向大則或蒙授記謂發大心蒙佛授記意顯將來未可定耳夫耶輸久修也性尼初學也以初學而齊久修佛意惟是讚性尼非是與耶輸並讚思之古德見此處有授記之言遂判此經在法華之後且欲將或字易為即字若果依彼則壞佛經矣如何二句正斥責阿難之語言女身垢穢非是法器況性尼宿為淫女尤為下劣而乃一念熏修將來未可限量如何汝以堂堂丈夫赫赫種姓不務真修實證自欺自誑尚爾淹留於目之所觀耳之所聞一味在文字語言中生知生解豈下劣女子之不若乎兼為釋疑竟三衆發圓信阿難及諸大衆聞佛示誨疑惑銷除心悟實相身意輕安得未曾有重復悲淚頂禮佛足長跪合掌而白佛言無上大悲清淨寶王善開我心能以如是種種因緣方便提獎引諸沈冥出於苦海初信悟慶快阿難大衆總該法會也聞佛示誨者既聞圓彰三藏之示復聞頓悟漸修之誨故疑惑銷除心悟實相者實相即是無戲論法亦即一心三如來藏良以空如來藏和合非合不空如來藏本然非然空不空如來藏合然俱離唯是一心離合俱非超出一切虗妄分別顛倒戲論故總以實相稱之是知十番顯見之後七大周遍之前雖出實相之名未是圓滿之號如勺海示人一滴亦言海也然實相既即三如來藏而圓彰之後不即開悟者皆以滿慈疑妄有因阿難執真成自一為事礙一為理障尚未自信何由開悟今以如來示頓悟而銷滿慈之疑明漸修而除阿難之惑舉衆咸聞故得疑惑銷除從心信悟身意輕安者知妄無因不為事礙則頓覺身輕了真非自不為理障則頓覺心安雖非真悟而斯等圓信亦惟今日始發故云得未曾有古德於此即許真悟愚謂若果真悟則下之華門無庸更請矣故知上但隨語生信而經言悟者以自是始知自心有如來密因義故重復下悲禮稱謝信悟既深愈覺佛恩難報故致悲淚言重復者對前四番言之禮足長跪者就此科唯是謝前望下文亦兼請後無上大悲者就佛至極之悲清淨寶王者喻佛真淨之慈真淨無染故曰清淨利樂自在故曰寶王善開我心者善銷微細沈惑開發本元心地是稱佛以真淨之慈能與真淨之樂也能以因緣等者舉事設權提持獎勸是稱佛以至極之悲能拔至極之苦也因緣如演若迷頭登伽銷愛耶輸知因等重疊舉之故云種種是皆如來觀機逗教因病設方故又以方便稱之提獎者如狂心即歇歇即菩提明是向上提持至歷劫憶持不如一日真修却又從容獎勸無非引接沈淪凡夫冥寂二乘出二死之苦海到二嚴之彼岸洵哉如來眉毛拖地之恩億劫難酬矣從滿慈質疑以來至此説法復為一周名搜細罄圓周合前周即阿難所請奢摩他也按常途奢摩他翻為止以寂靜為義今經自阿難請定以來銷倒想除細惑究極而至於離合俱非乃真寂靜也圓覺疏釋為泯相澄神蓋泯相即同止義而今經中顯見性示藏心究極而至於無戲論法乃真澄神也正脈云全取正因佛性略兼了因而為奢摩他體蓋正因佛性即是如來藏體而阿難等聞法信悟即略兼了因義也題中如來密因義統乎此總結大科開示奢摩成信分竟二開示三摩成解分二一選根直入二道場加行初三一阿難喻屋求門二佛示二門深入三會衆承示獲益初三一領音述責二説喻申情三請示佇教初世尊我今雖承如是法音知如來藏妙覺明心遍十方界含育如來十方國土清淨寶嚴妙覺王剎如來復責多聞無功不逮修習初承領法音如是法音通指前來所説雖承者顯未全領也雖未全領於中亦有微解故云知如來藏等妙覺明心遍十方界即前説空不空藏後防難生信中義以前云惟妙覺明圓照法界由此解得心遍十方既心遍十方則化佛化土報佛報土唯心含容惟心懷育故云含育如來等如來指變化身十方國土指變化土妙覺王指實報身所依剎指實報土身具萬德土聚七珍故以清淨寶嚴稱之如來下述前責斥前云人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難是責以多聞無功也又云汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業遠離世間憎愛二苦是責以不逮修習也二説喻申情才知心遍微覺有益復聞勵責依然無憑欲期真悟故説喻以申情也我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入阿難尚在有學故自以旅泊喻之以旅泊乃未到家鄉者也佛云菩提涅槃尚在遙遠可證此義天王者奉天承運為帝為王如春秋稱周天子為天王用以喻佛為諸法中王故賜與華屋者喻示以藏心以華屋文質交成可喻藏心體用圓融義故如此之示實出望外故喻以忽蒙謂不期而蒙賜也雖獲大宅要因門入者喻雖知心遍要假觀門悟入蓋自知多聞無功請觀門求悟入勵真修耳三請示佇教唯願如來不捨大悲示我在會諸蒙暗者捐捨小乘畢獲如來無餘涅槃本發心路令有學者從何攝伏疇昔攀緣得陀羅尼入佛知見作是語已五體投地在會一心佇佛慈旨初請求指示不得觀門悟入涅槃無路可修不得大悲接引蒙暗無由得明故惟願如來不捨大悲示在會等且為無學人請以下有有學對故蔽於權宗曰蒙昧於實理曰暗捐捨句令棄小心畢獲等令成大志如來無餘者揀非二乘無餘以彼唯離分段此則兼盡變易而云畢獲者期在畢竟獲得雖期在畢竟獲得而行遠自邇故且求本發心路本謂因地路指觀門是知下之耳根圓通即因地發心之巨關也令有學等次為有學人請無學已斷見思但須回心有學攀緣正熾故問從何攝伏攝伏云者謂收攝治伏未起者不令起已起者速令滅故攀緣即指六識然見思二惑雖皆六識為體而疇昔攀緣似乎別約思分以思分任運無始與俱故陀羅尼釋見二卷剖妄出真文中彼云將欲敷演此乃請求必得是知前分三如來藏即正為敷演下之選根直入乃教以必得也既得此已即衆生知見成佛知見義言入耳作是下禮佛佇教在會一心大衆望同也佇佛慈旨敬候示教也阿難喻屋求門竟二佛示一門深入四一分門以定二義二驗證以釋二疑三綰巾以示倫次四冥授以選本根初二一為機標示二徵起釋成初爾時世尊哀愍會中緣覺聲聞於菩提心未自在者及為當來佛滅度後末法衆生發菩提心開無上乘妙修行路宣示阿難及諸大衆汝等決定發菩提心於佛如來妙三摩提不生疲倦應當先明發覺初心二決定義初經家敘置會中緣覺聲聞偏指不定性者以其小習未革大志難定故為世尊哀愍於菩提心未自在者正見其是不定性也謂雖已發心遇緣便退全無自由分故此敘正為現在及為下敘兼為當來佛滅無依已可哀憐末法根鈍猶堪愍傷況夫發菩提心難進易退故聖心亦及之也無上乘指所趣之果即上云無餘涅槃妙修行路指能趣之因即上云本發心路又圓通皆為修路妙字惟取耳門以耳根圓通超二十四聖而獨妙故是路一開涅槃可陟故云無上乘路也宣示下如來審示示阿難及大衆且指現在機言汝等二字亦兼未來以上科經家所敘機通現未故決定發菩提心者謂誓取菩提不退轉也三摩不生疲倦者謂精修耳門無中止也是知三摩提乃諸定通名揀以妙字則是阿難所請之三摩耳又妙字已揀餘門佛如來三字仍顯但是修路以耳門三昧為十方薄伽梵一路涅槃門故此方審定因心下乃標示義門應當先明者不明則錯亂修習終無實果故儒典云知所先後則近道矣發覺初心即是發菩提之初心以覺字梵言為菩提故初心不決中途多舛故開二決定義義言決定者謂初心依之決定而不可易故二徵起釋成二一徵起二釋成初云何初心二義決定云何者徵問義謂徵問阿難云何初發心人有二種義應決定依之耶二釋成二一決定以因同果澄濁頓入涅槃義二決定從根解結脫纏頓入圓通義初二一教以以因同果二示以澄濁入涅初正脈云以因同果便是第一決定之宗澄濁入涅便是此宗之趣宗先趣後故初明宗三一就喻令審因心二反顯要同果覺三例明異同二相初阿難第一義者汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與果地覺為同為異第一義者句牒所標門若欲捐捨等定所發心欲者願樂即發心義捐棄也發心棄捨聲聞修菩薩乘即是回小向大入佛知見即是漸臻極果教以應當審觀者恐因差果謬故因地心謂因地發行之心果地覺謂果地取證之覺因心若同果覺如依金作器因心若異果覺如蒸砂作飯為同為異是須審詳觀察二反顯要同果覺阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處生滅心指六識心也為本修因者作本地修因之心佛乘即果地覺也乘此成佛度生故云佛乘其體真常故云不生不滅無有是處者無有如是之處用此反顯正以見欲求佛乘須用不生滅心乃有是處耳三例明異同二相以是義故汝當照明諸器世間可作之法皆從變滅阿難汝觀世間可作之法誰為不壞然終不聞爛壞虗空何以故空非可作由是始終無壞滅故初例明異相以是義故者謂以是生滅為因不得佛乘之故汝當照明者應當照例發明以辨生滅心與不生滅心也諸器世間例六處識心對境斯現故以可作例之離境便無故以從滅例之令觀可作之法誰為不壞者恐其不信教以自悟悟得可作之法終竟有壞便知六處識心生滅無常決然不可用故然終下例明同相虗空例根性根性常住故以不聞爛壞例之徵意可知空非可作等例根性不藉緣生由是從於無始乃至盡際其性常住無有生滅據此則欲取因心捨此無所從矣教以以因同果竟二示以澄濁入涅三一結色成根二漸現濁相三詳示澄法初則汝身中堅相為地潤濕為水暖觸為火動搖為風由此四纏分汝湛圓妙覺明心為視為聽為覺為察因心既定進可澄濁濁不自濁由根而興故曰則汝身中云云堅相為地者如骨肉爪齒等潤濕為水者如涕淚血髓等暖觸為火者如燥熱溫和等動搖為風者如氣息運轉等由此四纏者謂由此四大和合互相纏結而成身相也有身相則有根門有根門則彼此各別而性亦隨根各用故曰分汝湛圓妙覺明心心字即指賴耶謂真妄和合之體以未和妄時元自清淨周遍故曰湛圓雖已和妄覺明猶自不失故以妙稱也為視者眼家見精為聽者耳家聞精為覺者鼻舌身三咸稱覺精以同為合知故為察者意家知精今言察者顯是根性照察揀意識分別知故後云元依一精明分成六和合即此科義也二漸現濁相結色成根五陰已具自後依於五陰漸現五濁之相二一總出濁相二別示漸現初從始入終五疊渾濁云何為濁阿難譬如清水清潔本然即彼塵土灰砂之倫本質留礙二體法爾性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔容貌汩然名之為濁汝濁五重亦復如是初總標五濁謂衆生自結色成根已來從始則空見不分入終而同異失準合彼中間共有五疊渾濁之相此識海所以不澄而涅槃淨德終無由而證也云何下徵喻濁相徵義可知喻中清水喻純真之心亦即涅槃果體由來不染故以清潔本然喻之倫類也塵土灰砂之倫喻空見及四大四性等類由來障蔽故以本質留礙喻之循順也二體者水與土等一清一礙故曰性不相循喻純真之心與空見等真妄性異也有世間人喻阿難及生取土投水喻執妄亂真既執妄亂真將必以妄為真以真為妄故以土失留礙水亡清潔喻之汩然者混擾不定之相容貌既爾故曰名之為濁法中真妄雜亂宛同乎此故為喻也末二句以法總合可知二別示漸現五一劫濁二見濁三惱濁四生濁五命濁初阿難汝見虗空遍十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁既已結色成根則有能見所見能見以眼為首所見以空為先故以見空為劫濁體也見空遍界者不唯空遍而見亦遍也空見俱遍故不可分既不可分則空即是見見即是空空即是見則惟有空名而無空體見即是空則惟有見名而無見覺相織者有空無體是空織於見有見無覺是見織於空妄成者妄成一體衆生不知認為劫初之相故曰是第一重名為劫濁餘經劫濁以四濁集聚為體人壽百歲時乃入今則以空見相織為體自結色成根後即入也又餘經四為能濁劫為所濁今則劫為能濁純真之性為所濁以認劫亂性如以土投水故也按後色陰破時即超劫濁以無色則無空無空則見無所織故孤山云此濁依於色陰二見濁汝身現摶四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁首見虗空次見自身故曰汝身現摶四大為體摶取也謂現以圓湛妙覺明心摶取四大而為根身體也根身既備則分開見聞覺知和合水火風土故以四性四大為見濁體也壅令留礙者謂四性本自融通一為四大壅隔遂成留礙如是不超色聽不出聲等是也旋令覺知者謂四大本自無情一為四性旋轉遂成覺知如水覺有潤火覺有暖等是也相織者四性成礙是性織於大四大有覺是大織於性妄成者虗妄成就衆生不知依此立為身見而為諸見之本故曰是第二重名為見濁餘經見濁以五利使為體蓋見即是濁今則性大相織為體乃真性之濁耳按後受陰破時即超見濁以無受即無摶無摶則性大不織故孤山云此濁依於受陰三惱濁又汝心中憶識誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁根有既備妄想自生故曰又汝心中憶識誦習蓋心即六識憶識誦習指六識中想憶謂想過去境而生憶念識謂想現前境而生識取誦謂想未來境而生誦習誦習者熟讀不忘而預待之也性發知見者謂六識之性發自六根六根中但言知見者舉後初攝中間故容現六塵者謂六識之容現於六塵是知六識妄想外托塵現離塵則無識相內依根發離覺則無識性離覺無性則性織於相離塵無相則相織於性如是虗妄成就衆生不知依此起諸煩惱故曰是第三重名煩惱濁餘經煩惱濁以五鈍使為體亦煩惱即濁今則以性相相織為體亦真性之濁也按後想陰破時即超惱濁以無想則六識無用惟根與塵不成煩惱故孤山云此濁依於想陰四生濁又汝朝夕生滅不停知見每欲留於世間業運每常遷於國土相織妄成是第四重名衆生濁有識心即墮生滅故云又汝朝夕生滅不停仁王經云一念中有九十剎那一剎那中有九百生滅況復從朝至暮念念相續故曰生滅不停此即行陰亦名為業知見指六識妄想顛倒知見欲留世間者留戀三界不求出離也業運謂行陰密移四相迭更遷於國土者死此生彼改形易報也然知見欲留如經之直業運常遷如緯之橫經緯相織妄成諸趣衆生不知認為實有故曰是第四重名衆生濁餘經衆生濁但攬見慢果報為體直約自相渾擾名濁今則以識行相織為體渾擾真性名濁也按後行陰破時即超生濁以無行則無生滅無生滅則識想盡而輪轉息矣故孤山云此濁依於行陰五命濁汝等見聞元無異性衆塵隔越無狀異生性中相知用中相背同異失準相織妄成是第五重名為命濁識想行業通依第八故此科惟依第八體用而為命濁見聞覺知本一精明故云元無異性此言八識體同衆塵者六種塵相隔越者隔別違越如色惟可見聲唯可聽等第八識任運不意對境分照故云無狀異生此言八識用異體同故性中相知謂同一知覺也用異故彼此互違謂見非聞等也用中相背不可言同性中相知不可言異故曰同異失準謂言同言異俱不可以為準也相織者謂同不可準則體織於用異不可準則用織於體妄成者虗妄成立衆生不知執為命根故曰是第五重名為命濁餘經命濁以壽暖息三連持色心為體亦唯自相渾擾名濁今則以第八識體用相織為體亦渾擾真性名濁也按後識陰破時即超命濁以無此識不能連持色心命根則斷故孤山云此濁依於識陰此五濁中古德多取四大六塵等合前灰土以四性六根等合前清水然六根四性正是帶妄之見取喻清水似與澄濁之文不合今疏通以四性六根四大六塵等取喻灰土却以本元自性取喻清水是則五重起於淨心正同清水混以沙土真既非真妄亦非妄正同土失留礙水亡清潔目之曰濁不其然乎漸現濁相竟三詳示澄法二一以法直示二取喻合顯初阿難汝今欲令見聞覺知遠契如來常樂我淨應當先擇死生根本依不生滅圓湛性成以湛旋其虗妄滅生伏還元覺得元明覺無生滅性為因地心然後圓成果地修證初定欲示法汝今欲令等先以定其欲樂見聞覺知且渾言六根尚未揀示識與性耳遠契者懸相契合之義然見聞覺知因心也常樂我淨果德也以因心而遠契果德則是以因同果前既教之今復審定猶云汝今欲樂如此耶欲樂如此不可不辨故曰應當先擇死生根本死生根本乃指六識以是二根本中妄本既屬生滅不契果德故應擇而去之圓湛性乃指根性以是二根本中真本既不生滅即同果覺應當依而成之成謂成就因地心也以湛下依法伏成以湛二字著眼言六根中性雖以不生滅圓湛為名其奈衆生位中猶為帶妄之見與彼四大六塵諸識等織成濁相欲取為因云何入手故曰以湛湛者不動義謂直須不動所謂眼不觀色耳不聽聲等是也旋轉也虗妄滅生即指真見中一分妄見及四大六塵諸識等也然湛字即是工夫旋字即是效驗言果能久湛便可以旋轉其虗妄滅生下文所謂靜深不動沙土自沈即喻此耳伏還元覺者示以旋之分齊言所謂旋其虗妄滅生者非即能斷但不過暫伏二障現行乍還元明覺性下文所謂清水現前即喻此耳得元明覺者自是得見元明覺性所謂依本覺故而有始覺是為真無生滅遠契佛德故即教以用為因心按終教位當信滿以能雙伏二障現行故也然後句因圓果滿十住除現十行伏種乃至等覺妙覺現種習盡無妄可斷無真可證故曰圓成果地修證下文所謂去泥純水即喻此耳二取喻合顯如澄濁水貯於靜器靜深不動沙土自沈清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明明相精純一切變現不為煩惱皆合涅槃清淨妙德初喻定欲示法言阿難欲令見聞覺知遠契常樂我淨即如有人欲澄濁水也擇去死生根本依不生滅性成即如以水離動搖處貯於靜器也靜深下喻依法伏成言果能以湛自可旋其虗妄滅生伏還元覺即如靜深不動沙土自沈清水現前也得元明覺為因地心位當信滿雙伏二障現行故曰名為初伏客塵煩惱按初卷顯見不動科中客塵喻見思煩惱今乃喻二障現行以現行不停如客如塵故也去泥下喻因圓果滿言既得因心漸次伏除乃至現種習盡圓滿果地修證即如去泥純水也無妄不盡故曰名為永斷根本無明無真不圓故曰明相精純倒駕慈航還度衆生一切神通變現如貪瞋癡等不為煩惱其猶以金作器器器皆金故云皆合涅槃清淨妙德總結前來決定以因同果澄濁頓入涅槃義竟二決定從根解結脫纏頓入圓通義二一教以從根解結二示以脫纏入圓初正脈云從根解結便是第二決定之宗脫纏入圓便是此宗之趣亦初明宗三一叮欲令以審詳二反顯要當知處三正明決定從根初第二義者汝等必欲發菩提心於菩薩乘生大勇猛決定棄捐諸有為相應當審詳煩惱根本此無始來發業潤生誰作誰受第二義者句牒所標門汝等下叮所發心準前第一義中云捐捨聲聞此云發菩提心然捐捨聲聞即是發菩提心但前云若欲是方以審定此云必欲乃重為叮囑殆恐其發心不真旋發旋悔也又前云修菩薩乘此云於菩薩乘生大勇猛復恐其立志不堅旋修旋退也又前云入佛知見此云棄捐有為以欲入佛知佛見須是棄捐有為故益以決定之言其諄切叮嚀之意已可見矣古德云不是劒客休贈劒為其無用也今如來先叮發心後示解結之方殊教不浪施耳應當下令審結處言欲捐有為須離煩惱欲離煩惱須絶根本故教以應當審詳煩惱即枝末無明根本即最初生相最初生相和合於八識之中結縛於六根之內能生枝末故以根本稱之此指枝末無明若論枝末亦該所知今對阿難就其功能顯著且約煩惱言之從無始來有二功能一發業二潤生發業如因緣中過去無明現在愛取潤生如投胎時異見成憎同想成愛誰作誰受者正以詰其根本言此發業潤生二種煩惱竟是誰之作使誰所容受其意皆指六根中性但不肯明明道破俟其自悟耳二反顯要當知處阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位阿難汝觀世間解結之人不見所結云何知解不聞虗空被汝隳裂何以故空無相形無結解故初法説承上必欲教以審詳者由汝決定發心為修菩提人也修菩提人必要斷除煩惱欲斷煩惱必先究其根本故示以若不審觀云云然根塵雖同稱虗妄而顛倒起處在根佛不明説但教以審觀二處究從何處起於顛倒蓋顛倒即是煩惱何處即是究根是須審觀乃知故以若不審觀等而反顯之又以斷除煩惱勢如討賊必先搗其窩巢滅其主使令其無所依仗無所留藏則自殞自散不伏而伏是須知處乃能故以處尚不知云何降伏而反顯之取如來位者根盡惱除菩提可以立證亦如寇平疆靜可南面稱孤矣汝觀下舉喻世間解結之人即喻修菩提人也修菩提人勢必斷除煩惱故以解結喻之不見所結謂不見所結起處喻處尚不知云何知解謂不知解裂之法喻云何降伏不聞下引證上説不見所結云何知解恐猶未省故重引虗空無裂之喻以證虗空喻純真之心純真之心無可斷除故以不聞隳裂喻之何以句徵空無相形者喻真心離虗妄相既離虗妄之相自不見有起處此證不見所結既不見有起處自應無妄可斷故以無結可解喻之此證云何知解又此喻雖為證前亦是教以離於生滅守於真常若果守於真常則常光現前根塵識心應時銷落復有何惱可斷何根可除哉三正明決定從根三一略示由根成結二備顯功德數量三教以從圓而入初則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始衆生世界生纏縛故於器世間不能超越則字緊承上文謂欲知結處則六根是也眼指見性耳指聞性乃至心指知性約現前言顯是帶妄體故六為賊媒者不惟勾引外賊亦能作使容受前云誰作誰受今乃説出也自劫家寶者作使容受顛倒煩惱擾心性損法財滅功德故此且示其為處下乃顯其為結由此無始等者謂由此六根中性從無始來在於衆生世界中也衆生世界指內四大以是三世間中情世間故生纏縛者謂生生世世攬以為身執以為我也器世間指外四大不能超越者不惟生生世世不能出離即現前亦為所礙如見不超色聽不出聲等此且略言根塵二結若約反妄歸真微細分之則六結具足信乎起結之處惟根中性矣二備顯功德數量三一徵釋衆生世界二涉成本所數量三揀示六根具缺初阿難云何名為衆生世界世為遷流界為方位汝今當知東西南北東南西南東北西北上下為界過去未來現在為世方位有十流數有三一切衆生織妄相成身中貿遷世界相涉欲假世界相涉疊成千二之數故躡前衆生世界而徵起之釋中世為遷流者過現未來遷變流易故界為方位者東西南北方所位置故既釋其義理應明了故教以汝今當知東西南北等且約外之方位而結以界名過去未來等且約外之遷流而結以世名方位二句結上外世界數例下內世界數以外數易見內數難明故先結定外數至下內數則無勞費詞矣然世界本屬虗妄由衆生攬以為身依身相織故曰織妄謂以世織界以界織世雖虗妄而似實有也相成者遞互相成以無世則界無所依無界則世無由顯故身中貿遷者本屬外之世界今則轉入身中界相則貿換不定如轉左為右轉前為後等世相則遷流不停如轉現為過轉未為現等也世界相涉者以世涉界則界中攝世以界涉世則世中攝界言此以為下文疊數之本耳二涉成本所數量二一釋明涉法二疊顯德量初恐疑界數具十世數唯三多寡不倫云何相涉故約減界成四以釋成之而此界性設雖十方定位可明世間只目東西南北上下無位中無定方四數必明與世相涉界性謂界之體性設謂立標設向如人以標表為中時依標周視也雖者不盡許意謂十不定十故下約定位可明者言之謂十方之中實有定位可以發明者世間之人只目東西南北目猶稱説也上下無位者指著上下皆是四方之上下除此別無上下故曰無位中無定方者中謂東西南北交接之中所謂東南西南東北西北是也合之似有離之實無故曰無定末二句乃結示相涉之法言上説世界相涉者蓋惟取東西南北四數必定可發明者與世數之三遞互相涉耳二疊顯德量三四四三宛轉十二流變三疊一十百千總括始終六根之中各各功德有千二百三四者以四方而涉入三世則三世中攝四方也四三者以三世而涉入四方則四方中攝三世也宛轉十二者宛轉往復貌謂三四四三宛轉往復皆為十二之數此一疊也流變三疊者依上一疊之數為本展轉從本流末變少為多成第二疊以至第三疊也第一疊成十二第二疊成百二第三疊成千二經文取整略零故云一十百千一十即是十數如諺稱十數為一十是也三疊之法有異舊説今先以方中攝世起首宛轉以明三疊謂初以東西南北四方各能攝世世各有三成十二數為第一疊次依十二世各能攝方方各有十謂一方之中大相雖四若微細分之復有上下四隅如諸經中皆言十方成百二數為第二疊次依百二方各能攝世世各有十謂一世之中總相雖三若微細分之三各有三成九此為長劫再加現前一念名為短劫長短合而為十如華嚴經説有十世成千二數為第三疊方中攝世起首既爾世中攝方起首可例而思必取三疊者初則方中攝世次則世中攝方末復方中攝世取周而復始之意恐猶未明繪圖於後此圖約方中攝世起首若約世中攝方起第一疊者第二疊則是以方攝世變為百二第三疊則是以世攝方變為千二增數之法亦準上可繪總括始終者謂總括三疊之數從始至終也六根之中謂六種根性之中言衆生六種根性各各周遍身心身心既為世界相織變成千二百分齊而六種根性亦各隨彼身心變成千二百覺知故云各各功德有千二百蓋功德即指覺知謂功能德用也問此與法華六根功德為同為異答此約理具謂性中自有彼約事造謂經功感現彼若不仗經功亦唯理具此若既解根結亦齊事造是則同中有異異中有同不可言同不可言異思之涉成本所數量竟三揀示六根具缺二一總問克定二別示具缺初阿難汝復於中克定優劣克猶能也言六根中性雖各具千二功德而迷位中為根所局為境所限不無優劣汝復於中能評定優與劣乎如來明知不能故意示問為下文揀示之端二別示具缺六一眼根缺劣二耳根具優三鼻根缺劣四舌根具優五身根缺劣六意根具優初如眼觀見後暗前明前方全明後方全暗左右旁觀三分之二統論所作功德不全三分言功一分無德當知眼唯八百功德觀見即見性功德由衆生聚見於眼故曰如眼觀見前後左右即身之南北東西此是以世涉方方顯世隱故即約前後左右以分德數前方指正南兼東南西南兩隅言之後方指正北兼東北西北兩隅言之前後既各兼兩隅分齊寬廣應各具四百功德後暗者後方功德為根所局暗而不見故前明者前方功德因根而通明而能見故又恐其不知兼於兩隅故各加全字曉之亦為顯前方功德皆具後方功德總缺也左右惟指正東正西以四隅隨前後説故分齊既狹應惟各具二百功德旁觀者以能左顧右盻故也三分之二者既前方後方各具四百功德應各為一分左古兩方既各具二百功德應合為一分揀去後方全暗所餘功德惟三分中之二分據此則眼家功德尚有缺減故曰統論所作巧德不全所作者謂所有作用也三分言功者謂一千二百功德約三分言之一分無德應缺四百功德所謂後方全暗者是也既缺一分唯餘二分故惟八百功德所謂前方全明及左右旁觀者是也二耳根具優如耳周聽十方無遺動若邇遙靜無邊際當知耳根圓滿一千二百功德周聽即聞性功德由衆生聚聞於耳故云如耳周聽謂周圓俱聽也周圓俱聽故十方無遺後云十方俱擊鼓十處一時聞亦約以世涉方方顯世隱論之動若邇遙者就其聞動之性似有遠近分齊既以有遠近分齊應惟四百功德靜無邊際者就其聞靜之性實無邊涯際畔既無邊涯際畔應具八百功德據此則三分言功聞動為一分聞靜為二分無少缺減故能圓滿一千二百功德三鼻根缺劣如鼻嗅聞通出入息有出有入而闕中交驗於鼻根三分闕一當知鼻惟八百功德嗅聞即嗅性功德由衆生聚聞於鼻故曰如鼻嗅聞通出入息者謂性具功德雙通出息與入息也有出者有通出之用謂出而送舊有入者有通入之用謂入而嗅新新舊皆約香塵言之然出入既皆有用應各具四百功德而缺中交者中間交接之際出入少停之時作用不顯也既作用不顯則是中交無用應缺四百功德驗於鼻根者謂澄心考驗鼻根功德三分缺一者謂三分言功一分無德既一分無德惟餘二分分各四百故惟八百功德此中論德既約出入中交應是以方涉世世顯方隱三疊中世中攝方起首者意取於此四舌根具優如舌宣揚盡諸世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德宣揚即舌性功德然舌性功德有二一嘗味功用則劣合中知故二言説功用則勝詮義理故今約言説故云如舌宣揚盡諸世間等者謂宣揚俗諦則能窮盡世間智慧宣揚真諦則能窮盡出世智慧言有方分者言真言俗各有方向分齊謂既落言詮則彼此淺深各不同故理無窮盡者真諦俗諦二皆無有窮盡謂果能神會則彼此淺深無能限故然言有方分應惟具四百功德理無窮盡應通具八百功德故曰當知舌根圓滿一千二百功德按此中曰方曰分乃方世俱顯三疊時任攝皆得五身根缺劣如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分缺一當知身唯八百功德覺觸即身性功德聚覺於身故曰如身覺觸識於違順者謂依於所覺之觸識知違順二境也合時能覺者言雖識違順亦惟諸觸合於身時乃能覺知離中不知者謂若諸觸離於身時於中別不覺知離一合雙者離唯一境合則雙通謂雙通兩境也一境能覺具四百功德兩境能覺具八百功德今既離中無知應少四百功德故曰驗於身根三分缺一既三分缺一惟餘二分故曰當知身唯八百功德然此中既約離時合時為言亦是世中攝方六意根具優如意默容十方三世一切世間出世間法惟聖與凡無不包容盡其涯際當知意根圓滿一千二百功德默容即知性功德聚知於意故云如意默容謂口不言心自諭也十方約知性橫遍三世約知性竪周即下世出世法等所依方位及時分也然此既方而俱顯疊時亦任攝皆得世間法總該陰處界等出世法總該諦緣度等既各總該故統言一切惟語詞也聖該四聖凡該六凡合上句則法與人耳無不包容者性德自爾若更兼事造則於上若人若法一一皆能窮其涯量盡其邊際是知意根圓照法爾無遺故能圓滿一千二百功德備顯功德數量竟三教以從圓而入二一教以自驗圓根二示以入一解六初是難汝今欲逆生死欲流返窮流根至不生滅當驗此等六受用根誰合誰離誰深誰淺誰為圓通誰不圓滿若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓根日劫相倍初定欲令驗逆猶返也生死為欲流之果欲流為生死之因言一切衆生皆以六根於欲境流浪故致六道生死今如來定其欲逆等者謂設若汝今欲返生死苦果及欲境流浪苦因又欲返窮能流之根以至不生滅性者當自沈心考驗不然則泛濫修習不克速效也六根以受用稱者以能受用六欲境故誰合誰離者令驗六根之中誰為合知誰為離知蓋以鼻舌身三合知而難修根耳意三離知而易入也誰深誰淺者令驗離知根中誰為淺顯易明誰為深隱難知蓋以眼耳二根淺顯而便用意根深隱而不便用也誰為圓通誰不圓滿者令驗淺顯根中誰為功具圓通誰為功缺不滿蓋以眼根功缺而宜揀耳根功具而宜取也於此一一沈驗庶知所取捨而不至枉施功矣若能下顯圓超勝謂若能於此六根離知淺顯之中悟得圓通一根依之修習逆彼無始以來生死相織之妄輪起業逐欲之流浪便得循順圓通契合不生滅性是彈指超無學與彼不圓之根枉施功用者較之難易不倫故云日劫相倍謂圓根一日之功倍勝於不圓根之一劫也又倍與背同謂圓根如一日之速不圓根如長劫之遲遲速相背莫可較量故後文殊揀選而云遲速不同倫焉二示以入一解六我今備顯六湛圓明本所功德數量如是隨汝詳擇其可入者吾當發明令汝增進十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨初牒德令其詳擇備顯者備悉顯示孰圓孰缺也六即六根湛圓明指六根中性由來清淨曰湛法爾周遍曰圓本自不昏曰明前云由此四纏分汝湛圓妙覺明心為視為聽為覺為察故知六根中性即是湛圓明性耳本所功德謂現前本具不假修得者也數量者或千二或八百前已揀示分明故但以如是牒之隨汝詳擇者佛意以數量既明又令驗知不須更説但隨汝意詳擇則是也可入者密指耳根以是六根中之離知離知中之淺顯淺顯中之圓通根故吾當發明者許以既擇定已更為發明其中漸次漸次既明隨分修習自可以解結入圓故曰令汝增進十方下示以聖性平等十方如來指諸佛因地中説根器超勝故於十八界中一一可修可成故曰皆得圓滿云云於其中間者仍指十八界中既門門可修可成自亦無優之與劣後文殊偈云聖性無不通順逆皆方便即斯義也但汝下因機教以專修但汝下劣者抑其不似諸佛根器超勝也十八界中對機則通不對則窒故曰未能於中圓自在慧自在慧者如諸如來門門可入是也故我宣揚者指前此令驗令擇之語令驗令擇總為教其專依圓根故云令汝但於一門深入言深入者必至六結盡解故云入一無妄後文殊偈云一根既返元六處成解脫故曰彼六知根一時清淨以元依一精明故教以從根解結竟二示以脫纏入圓二一阿難躡前請益二如來開廣發明初阿難白佛言世尊云何逆流深入一門能令六根一時清淨云何者致問之詞所問之義略為三段前云若能於此悟圓通根逆彼無始織妄業流今問云何逆流前云故我宣揚令汝但於一門深入今問云何深入一門前云入一無妄彼六知根一時清淨今問云何能令六根一時清淨據此則三段皆當有云何二字今惟冠首者言總意別蓋由前佛示言界而請益也二如來開廣發明四一就機勸修二徵根破迷三正答所問四結示利益初佛告阿難汝今已得須陀洹果已滅三界衆生世間見所斷惑然猶未知根中積生無始虗習彼習要因修所斷得何況此中生住異滅分齊頭數初揚其見惑已滅須陀洹此云預流謂初見真諦乍預聖流故亦云入流金剛般若云須陀洹名為入流此是小乘初果阿難現證齊此故云已得三界衆生泛指界內修學出世人也修學出世先斷世間之惑然世間之惑有二一見惑謂八十八使我執分別見煩惱也二思惑謂八十一品我執俱生思煩惱也此言見所斷者即是見惑以是見道位中所斷故阿難初果位當見道故云已滅然猶下抑其思惑未斷根中指現前根中積生指歷劫以來無始指最初之際虗習謂虗妄習氣即思煩惱也言此煩惱雖具現前根中而積生已來乃至無始與俱二果已去方斷故云未知修所斷得者修道位中所斷得也言要因者正顯不入修道不能斷故何況下況顯從細至粗此中者仍指根中生住異滅乃約從細至粗而總言之意言只此虗妄習氣尚要修斷何況從細至粗俱有生住異滅四重分齊而分齊中又有許多微細頭數若非逆流深入豈能脫纏縛而入圓通是不可以不知也按起信論三細中業相為生以最初心動故轉現二相及六粗中智續二相為住以法執堅住故執計二相為異以人我執異故第五起業為滅以周盡終極故第六業繫苦相屬當來果非惑業攝分劑者約大段言即指四相頭數者約細分言如一生相中仍復具含重重生住異滅乃至滅相中亦爾其頭緒數量雖麻粟未足喻焉二徵根破迷今汝且觀現前六根為一為六阿難若言一者耳何不見目何不聞頭奚不履足奚無語若此六根決定成六如我今會與汝宣揚微妙法汝門之六根誰來領受阿難言我用耳聞佛言汝耳自聞何關身口口來問義身起欽承是故應知非一終六非六終一終不汝根元一元六初命觀總徵四相非可遽斷深入必由一門故教以且觀六根蓋欲就六根中選取一門以為下手處故問以為一為六者為欲顯示非一非六令其薦取圓通妙性阿難下一六別破復有二義一破一不成二破六非義破一中先牒次難佛意以若言一者則耳可作眼眼可作耳故難以耳何不見目何不聞若果眼耳互通例知頭可作足足可作頭以兩根尚通何況一身故又難以頭奚不履足奚無語然一身尚不互通況復六根各異是知所謂是一者非也破六中先牒六問一次答一難通牒六問一者佛意以若此六根決定成六者應彼此不能相知故問以今與説法六根誰來領受答一難通中答以我用耳聞者單用一根也佛言汝耳自聞者縱許其單用一根也單用一根應不通於餘根故難以何關身口然現見口來問義身起欽承明是耳與身口彼此相通餘根例爾是知所謂決定成六者亦非也是故下總遣妄計是故應知者謂以是俱非之故又復應知説非亦不是也三終字俱作畢竟之詞意謂若果非一則畢竟是六故曰非一終六若果非六則畢竟是一故曰非六終一蓋上是以非遣是此復以是遣非恐聞以是遣非仍歸元計而言元一元六故末以終不等遣之謂畢竟不可作如是説也三正答所問四一立理二舉喻二法合四結答初阿難當知是根非一非六由無始來顛倒淪替故於圓湛一六義生汝須陀洹雖得六銷猶未亡一初承上立理言是一是六既不可説非一非六又不可説者當知是中各有理路存焉良以是根未結理絶數量故曰非一非六正由非一非六故我上來不許説是一及與是六無始約是根已結背覺合塵故曰顛倒自是沈淪於色香味觸更替乎見聞覺知凡夫位中既攬塵而成六已入見道即離境而成一是故於彼圓滿湛然本無一六之性而有一六之義生焉然既有一有六故我上來亦不許説非一及與非六汝須下指人證有金剛般若云不入色聲香味觸法是名須陀洹然塵既不緣根無所偶是曰六銷言雖得者有未許真銷之意以未能絶待故六用暫伏似惟一體故曰猶未亡一既未亡一是猶有待故知所謂六銷者非是真銷蓋必并一亦亡乃真銷耳正脈云不止初果四果亦然以彼道成盡灰六用為灰斷涅槃故也二舉喻如太虗空參合羣器由器形異名之異空除器觀空説空為一彼太虗空云何為汝成同不同何況更名是一非一初正喻前理太虗空喻圓湛之性依根緣塵故以參合羣器喻之器形異喻六塵各別六塵各別性亦似異由此凡夫妄執為六故以名之異空喻之除器觀空喻忘塵觀性忘塵觀性性乃似一由此初果妄計為一故以説空為一喻之彼太下就喻遣情言虗空正除器時並不為汝除器成同正參器時亦不為汝安器成異是則除器自除器安器自安器而彼虗空云何為汝除器成同安器成不同不同即異也據此則見同見異已屬妄情何況更為安立名言而説是一非一非一猶云是異不益見其妄耶此義宛似前文終不汝根元一元六之義故釋為就喻遣情法中義可以意會三法合二一總合二別合初則汝了知六受用根亦復如是了知二字有二釋一是教誡之語謂既已説喻教以了知根性亦同太虗空也二是召根之言謂了了常知之體領納受用之用義同太虗故云亦復如是二別合二一合參器成異二合除器成一初六一因色成見二因聲成聞三因香成嗅四因味成嘗五因觸成覺六因法成知初由明暗等二種相形於妙圓中粘湛發見見精映色結色成根根元目為清淨四大因名眼體如葡萄朵浮根四塵流逸奔色明暗者色塵總相別攝多種故置等言雖攝多種總則惟二故仍云二種相形者互相形顯如對暗顯明對明顯暗等妙圓者妙覺圓明即指真心黏猶引也言真心本湛元無見聞等相緣以明暗相形遂於妙圓之中引起湛然不動之體發而為能見之精故見精映色者謂能見之精既發仍復映現乎色前云如太虗空參合羣器即喻此耳結色成根者既已映現乎色自能結取乎色因之以成浮勝根也根元目為等者目即是名言初成勝義根時元只名為清淨四大尚無濁染之號正脈云目為清淨四大者明其雖屬四大而其相最為微細聖目天眼方能見之凡夫莫覩非浮根所能比也因名眼體等者灌頂云聖眼可見非無相狀故表其如葡萄朵令不見者知其有細色故顯宗論云眼根極微居眼星上體清徹故如秋泉水浮根四塵者諸至於浮根成時凡夫共見四塵濁染則無復清淨名矣灌頂云浮勝二根粗細雖殊皆以能成地水火風所成色香味觸八法為體今於勝義説能造四大浮塵説所造四塵者就名互影耳愚謂塵者以濁染為義勝義初結濁染不形故但言四大大者以因種得名浮根既成因種便蘊如桃杏果若成時能生因種便蘊蓄於內故但言四塵耳流逸奔色者浮根既成日與色塵相對遂令見精流蕩縱逸日奔於色不能超越自此與耳等諸根永成相背前云因器形異名之異空即喻此耳二因聲成聞由動靜等二種相擊於妙圓中粘湛發聽聽精映聲卷聲成根根元目為清淨四大因名耳體如新卷葉浮根四塵流逸奔聲此下五根之文大義與眼根俱同不須詳釋唯略明變換字義而已動靜者聲塵總相別攝多聲名等總惟動靜曰二相擊者互相攻擊如動來攻靜則靜塵隱靜來攻動則動塵滅也卷者收攝義謂音聲虗散取之唯收攝而已新卷葉即初出荷葉也顯宗論云耳根極微居耳穴內旋環而住如卷樺皮三因香成嗅由通塞等二種相發於妙圓中粘湛發嗅嗅精映香納香成根根元目為清淨四大因名鼻體如雙垂爪浮根四塵流逸奔香通塞者香塵總相別攝多香曰等總惟通塞曰二相發者互相顯發如因通顯塞因塞顯通等納者吸引義謂香塵屬氣取之唯吸引而已雙垂爪即雙爪下垂也顯宗論云鼻根極微居鼻頞內背上面下如雙埀爪四因味成嘗由恬變等二種相參於妙圓中黏湛發嘗嘗精映味絞味成根根元目為清淨四大因名舌體如初偃月浮根四塵流逸奔味恬者靜義約離時言變者動義約合時言此亦味塵總相別該多味名等總惟恬變名二相參者互相參比謂比恬知變比變知恬也絞者旋卷義謂味塵無相旋卷方知故舌根取味唯用旋卷而已初偃月即初出偃仆之月如朔後三四日者是也婆沙論云舌根極微布在舌上形如半月五因觸成覺由離合等二種相摩於妙圓中黏湛發覺覺精映觸摶觸成根根元目為清淨四大因名身體如腰鼓顙浮根四塵流逸奔觸離合者觸塵總相等則該乎別相二則唯約總言以此別乃總中之別故相摩者互相交過謂離去合來合去離來如兩手相摩互交而互過也摶者領取義謂觸塵合知無庸外緣惟有領取而已腰鼓顙者灌頂云顙鼓筐也兩頭圓闊中央狹少即今之杖鼓俱舍論云身根極微遍住身分女如鼓顙男如指鞘六因法成知由生滅等二種相續於妙圓中粘湛發知知精映法攬法成根根元目為清淨四大因名意思如幽室見浮根四塵流逸奔法生滅者法塵總相等義準前總唯生滅故言二種生滅不停故言相續謂生已復滅滅已又生也攬者總持義言法惟影事要須總持始得緣之耳意思心根也依於勝義今以能依顯於所依為顯有意思處即勝義根耳幽室見者內照法塵如幽暗室中能見相似境故浮根四塵指肉團心也狀如蓮華朝開暮合不同相宗惟取末那思量為意根故參器成異竟二合除器成一阿難如是六根由彼覺明有明明覺失彼精了粘妄發光是以汝今離暗離明無有見體離動離靜元無聽質無通無塞嗅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安寄初極顯六妄如是六根仍指六根中性其性亦由覺上加明展轉成妄故曰由彼覺明云云覺明二字先出所依之真謂本覺妙明也有明明覺者次明所起之妄謂妄為明覺也然此即是無明晦昧真心故云失彼精了謂失彼本覺妙明精真了然之體真妄和合而成賴耶識也賴耶既已成立轉生見相二分見隨相異故云粘妄發先謂粘染相分中六塵之妄發起見分中六性之光也據此則有明明覺已是虗妄況夫失彼精了黏妄發光猶為妄之極矣是以下正合前喻言六性既由粘妄發光不粘則光沈六寂故云離暗離明無有見體乃至無滅無生了知安寄是六性已銷也六性已銷惟有賴耶獨存二乘不知認為涅槃是未能亡一也前云除器觀空説空為一即喻此耳總上法合竟四結答汝但不循動靜合離恬變通塞生滅明暗如是十二諸有為相隨拔一根脫黏內伏伏歸元真發本明耀耀性發明諸餘五粘應拔圓脫不由前塵所起知見初答云何逆流準前阿難有三問一問云何逆流今世尊以汝但不循等答之佛意以逆流無別但不循塵則是也是則汝但不循四字便是圓通下手功夫與前第一義中以湛二字皆切教耳動靜等塵不依尋常次序列者佛意密示耳門先入餘可互解矣俱稱有為相者以體是可作之法又能招致生死果故據此則有為即含生死循塵便隨欲流不循即逆此釋不獨與阿難問處相應即前佛教自驗圓根科中欲逆生死欲流之語亦因此益明隨拔下答深入一門二問云何深入一門今世尊以隨拔一根等答之拔者選取義佛意以一門非定但隨自機宜於六根中選取一根可耳脫粘內伏等乃示以解脫之法脫黏者脫離粘塵即入流亡所動靜不生也內伏者內伏根性即如是漸增聞所聞盡也伏歸元真者伏之又伏並伏亦遣還歸本元真體即盡聞不住覺所覺空乃至生滅既滅寂滅現前也發本明耀者靜極光通寂照含虗即圓通極致獲二勝而發三用也一門深入之義於此備見耀性下答六根清淨三問云何能令六根一時清淨今世尊以耀性發明等答之佛意以欲得諸根圓脫只須耀性發明即現成也耀性發明句乃重牒上義謂本體光耀之性既已發明顯現所謂常光現前是也後云常光現前根塵識心應時銷落此言諸餘五黏應拔圓脫斷可知矣五粘者餘五粘塵之根應拔者應其所拔之一圓脫者即時圓滿脫落雖即時圓滿脫落亦非全無但自後所起知見不由前塵耳正答所問竟四結示利益即圓通妙用也三一寄根互用二根塵雙銷三例顯圓妙初二一正示二驗知初明不循根寄根明發由是六根互相為用承上知見不由塵起照用唯從性發故曰明不循根謂本有之明不更循彼六根見聞異稱也寄猶託也寄根明發者謂知見起時六根中隨寄一根六明俱發所謂不由前塵者以此由是六根等者謂由是隨寄一根六明俱發之故或用眼作耳或用耳作眼等隨用皆得故曰六根互用此圓通勝妙之用已略見於此矣二驗知阿難汝豈不知今此會中阿那律陀無目而見跋難陀龍無耳而聽殑伽神女非鼻聞香驕梵鉢提異舌知味舜若多神無身覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念重呼阿難者欲假現會以證互用之實也汝豈不知者乃返問語意言其朝夕聚首斷無不知之理故阿那律陀白飯王子此翻無貧以多劫巨富為名初出家以樂睡彼呵精進失目後以三昧力故別有天眼半頭而發故云無目而見此見不循眼寄頭明發者也跋難陀此云善歡喜摩竭陀國龍名按聾字從龍從耳故知龍非無耳但不能聞聲如無耳故或曰用角為聽此聞不循耳寄角明發者也殑伽河名即是恆河神女為主河之神如此方洛神湘妃之類非鼻聞香者不用鼻而聞香驕梵鉢提此云牛呞食後虗呞如牛佛恐世人生謗敕令久住天上異舌知味者離於舌而知味此上二人皆不循本根寄餘明發者也舜若多此云空神以空名即主空神無身覺觸者無有身形惟心能覺此覺不循身寄心明發者也恐問無身誰知有神故曰如來光中映令暫現蓋以空神苦無身形不能為佛作禮佛慈攝授光映令現雖光映令現其質如風暫時即滅故云既為風質其體元無後云空行神祇并風神王無色界天同時稽首皆光映令現也滅盡定者九次第最後之名亦名滅受想定受想二陰俱不行故又九次第中前八凡位所修後一聖位所修此定一成即證涅槃故曰得寂聲聞佛弟子中成此甚多故首置諸言如此會中等舉一例諸也摩訶迦葉此云大龜氏佛弟子中頭陀第一久滅意根者意根指第七識言迦葉自得滅盡定時六識不行第七思量亦盡故云久滅圓明了知者餘之五根根根圓明皆能了知初不假於第七心根及第六念慮故云不因心念此知不循意寄五明發者也然此以上六人三是業報感現三是小乘修得尚能互用如此況獲真實圓通寄根明發其互用之妙自應別有不可思議者矣寄根互用竟二根塵雙銷阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯消冰應念化成無上知覺選一根而俱該六根一即一切故曰諸根圓拔設由塵而至滅結次第解了名為若圓拔已內瑩發光者體淨用現也浮塵即內之根身器世即外之世界此二皆屬有為總歸壞滅故云諸變化相然既屬變化則舉體全空唯是一心皆由不了唯心執為實有遂致內外定位情器攸分今既諸根圓拔一性圓通內瑩發光六妄不起一性圓通而理可融事故云如湯消冰六妄不起而全事皆理故云應念化覺雖佛所證亦不外此故又以無上稱之三例顯圓妙阿難如彼世人聚見於眼若令急合暗相現前六根黯然頭足相類彼人以手循體外繞彼雖不見頭足一辨知覺是同緣見因明暗成無見不明自發則諸暗相永不能昏根塵既銷云何覺明不成圓妙初舉理具似礙上科情器即該根塵而言應念化覺人或疑之故先舉世人為例世人即指凡夫聚見於眼者根身既成結聚見性於眼中也急合者緊閉貌不見於明故云暗相現前此似為根礙矣由塵暗故自覺六根俱昧故曰黯然黯然者全黑貌頭足相類者一類無所覺知此似為塵礙也彼人下明無礙為例彼人者即指合眼之人手循體繞者從頭至足順體捫摩也彼雖不見者雖字顯非真實不見但未辨故頭足一辨者謂頭與足共辨能摩之手頭既覺知是手足亦覺知是手故云知覺是同既知覺是同全不藉眼則根固無礙於性矣若爾正合眼時何故不見故曰緣見因明等謂緣以見明之時因明而發至於暗相現前似成無見豈知不明之際見暗之性自發暗不能昏則塵又何礙於性哉是知凡夫理具已自無礙用此為例則下之事造圓妙可想見矣根塵下顯事造圓妙根塵既銷意指圓通聖人根謂浮塵即前情世間塵謂外境即前器世間前云如湯消冰故云既銷又云應念化成無上知覺故曰云何不成圓妙是知云何者非問詞乃決詞言凡夫根塵未銷其性已自無礙況夫圓通聖人根塵既銷云何覺明而有不成圓妙之理此必無也正脈云通前二義論之前一義為略示因果全功令懸知究竟極果後一義為詳示初心方便令切曉下手功夫總結大科分門以定二義竟二驗證以釋二疑二一驗釋根性斷滅疑二證釋別有結元疑初二一阿難錯解謬難二如來以事驗釋初三一難因果相違二難先後異説三請大慈開發初阿難白佛言世尊如佛説言因地覺心欲求常住要與果位名目相應世尊如來位中菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智是七種名稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞若此見聽離於明暗動靜通塞畢竟無體猶如念心離於前塵本無所有云何將此畢竟斷滅以為修因欲獲如來七常住果初按定第一義宗如佛説言者指第一義門中説彼云若於因地以生滅心為本修因而求佛乘不生不滅無有是處是顯因心要與果覺相應今阿難義取彼説故云因地覺心云云因地覺心者謂因地中發覺初心即前本修因心也欲求者即前佛乘常住者即前不生滅義名目相應者不必名同但義符彼名即是耳世尊下引顯果名常住菩提智果轉煩惱成即下佛性之號涅槃斷果離生死證即下真如之號真如者不妄不變即上涅槃之體佛性者純覺無情即上菩提之體蓋上二以出纏為名此二乃指體為目菴摩羅識義翻無垢乃佛性純淨之相空如來藏意顯離染乃真如純淨之相此二又是以相為名大圓鏡智轉第八識相應心品與無垢識同時而發普照十方圓現塵剎乃果位之勝用此一又是以用為名通收出纏二名指體二名顯相二名召用一名故曰是七種名或名菩提或名涅槃乃至或名鏡智故云稱謂雖別雖別者顯非真別以同具淨圓堅凝常住義故清淨圓滿者揀異因位以凡夫染而不淨二乘菩薩淨而不圓唯佛獨淨獨圓此又以七名中除淨識鏡智餘皆通於因位故以此揀也體性堅凝者堅固凝定即常住不動之義金剛帝釋之寶其體最堅稱之為王者以最勝故用此為喻顯上七名同一常住不壞惟佛所證也若此下謬解根性斷滅前云離明離暗無有見體離動離靜元無聽質等意明離於所緣唯一精明以合除器觀空説空為一之喻非言其畢竟斷滅阿難不知而云若此見聽舉二性該六性離於明暗動靜通塞舉三塵該六塵畢竟無體蓋謬解佛語根性為斷滅也既已謬解仍復謬證而云猶如念心念心即六識心也離塵無有是佛破識中義今根性實不如彼其宗因不成已自可知云何下難佛自宗相違斷滅為因欲獲常果是因地覺心與果位名目全不相應故難以云何將此畢竟斷滅等也難因果相違竟二難先後異説世尊若離明暗見畢竟空如無前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺如來先説湛精圓常違越誠言終成戲論云何如來真實語者初重牒謬解之義意謂若果離於明暗等塵見聞等性畢竟空無如前破識中無有前塵六識念盧自性滅者仍有大過敢為世尊言之進退下慮其並因亦無進退者前思後想循環者周而復始微細推求者著意跟尋如來所説義也我心指識心言心所指根性言以根為識所依故言阿難初以六識為心三番破奪遂不敢認及別求真心佛乃示以見性今因謬解佛語並見亦不敢認故曰本無我心及我心所既二者俱無則法身斷滅無法可為因心故曰將誰立因求無上覺如來下回述顯見之語先説者即指顯見中説不動不雜曰湛超情離見曰精無礙不分曰圓不滅不失不還曰常雖以四義統收要皆取於畢竟不斷義也違越下難佛自語相違言如來説法素以誠言自許如金剛般若經云如來是真語者實語者本經前文亦云無上法王是真實語今觀如來現説離明離暗無有見體先説湛精圓常畢竟不斷後先異説豈不違越誠言違越猶背離也背離誠言自近矯亂豈不終成戲論戲論則誑妄無實故難以云何如來等也三請大慈開發惟垂大慈開我蒙吝雖則兩陳難問終不敢決定疑佛故仍求垂慈開發也蒙謂昧於現説吝謂執於先聞取捨未決勢須求開阿難錯解謬難竟二如來以事驗釋三一許以除疑二即事驗證三結示因果初佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因真倒現前實未能識恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑初切責顛倒汝學多聞者責以專於憶持以學即篤志研習義也未盡諸漏者責以緩於修行四漏中但盡見漏尚餘三漏故曰未盡是皆由於修行力緩智斷不猛耳顛倒即指識心所因即指根性言識由根現以根為所依因故觀上文阿難指根性為心所是已知此義但知猶未盡故言徒也真倒指以根為斷言之言識心雖稱顛倒不過出入生死而根性果若斷滅則為永墮佛種是知執根為斷者正是真倒現前觀阿難引同識心正見其不自覺知故責以實未識也恐汝下正許除疑佛意以責其未識雖似信伏未必出於誠心故曰恐汝誠心猶未信伏若順義回文應云恐汝猶未誠心信伏蓋知其不是心悅誠服也吾今試將等者仍用方便引發務令誠服之意試用也塵俗諸事即指下擊鐘引夢以擊鐘引夢皆塵勞中世俗事故當除汝疑者許以因事必能除疑而冀其誠心信伏之意即寓於中矣二即事驗證二一擊鐘驗常二引夢驗常初三一問聞答聞二問聲答聲三詳與斥破初二一三番問答二雙以審定初即時如來敕羅睺羅擊鐘一聲問阿難言汝今聞不阿難大衆俱言我聞鐘歇無聲佛又問言汝今聞不阿難大衆俱言不聞時羅睺羅又擊一聲佛又問言汝今聞不阿難大衆又言俱聞初問答定有問以聞不者令其自驗有無答以我聞者自驗有聞也鐘歇下問答定無鐘歇非實無聞知其必定錯會故重為審問答以不聞者果然錯會也時羅下問答顯違言果其無聞則聞性斷滅理實不爾故三為致問又言俱聞者明係違前不聞猶不自覺也二雙以審定佛問阿難汝云何聞云何不聞阿難大衆俱白佛言鐘聲若擊則我得聞擊久聲銷音響雙絶則名無聞初雙審聞性真常不從緣起恐其不知故雙審也阿難下雙定鐘聲若擊則我得聞者依然錯會有聲乃有聞也擊久聲銷則名無聞者依然錯會無聲則無聞也聲餘曰音音餘曰響此且審定至答聲之後乃為破斥問聞答聞竟二問聲答聲二一三番問答二雙以審定初如來又敕羅睺擊鐘問阿難言爾今聲不阿難大衆俱言有聲少選聲銷佛又問言爾今聲不阿難大衆答言無聲有頃羅睺更來撞鐘佛又問言爾今聲不阿難大衆俱言有聲初問答定有問以聲不者令其驗聲有無悟知聞非有無也俱言有聲者但知聲有不悟聞非無也少選下問答定無少選須臾時也聲銷自是無聲非是無聞恐其混亂故重為審問答言無聲者但知聲無不悟聞非無也有頃下問答顯亂有頃頃刻間也聲銷既惟聲無非是聞無更撞亦唯聲有作是聞有知其必然混亂故三為致問俱言有聲者只知隨口答話不知醉翁之意不在酒也二雙以審定佛問阿難汝云何聲云何無聲阿難大衆俱白佛言鐘聲若擊則名有聲擊久聲銷言響雙絶則名無聲初雙審聲是無常有無從緣恐其不知故雙審也阿難下雙定答以擊則名有不擊名無者亦知聲是無常有無從緣惜其於聞性真常不以緣有緣無終竟不悟也聞聲答聲竟三詳與斥破三一責以矯亂二破其謬説三總為結斥初佛語阿難及諸大衆汝今云何自語矯亂大衆阿難俱時問佛我今云何名為矯亂佛言我問汝聞汝則言聞又問汝聲汝則言聲唯聞與聲報答無定如是云何不名矯亂初佛責矯亂云何者怪責之詞明係聲有聲無而言聞有聞無不是無知強説定是知而混説故責以自語矯亂大衆下衆未心伏云何者辨正之詞意言聲有則聞無則無聞鐘擊則聲不則無聲據實而答分明不混故辨以云何矯亂佛言下佛以義折佛意以聞有聞無聲有聲無理無二是我前問汝聞有聞無汝則答我聞有聞無我又問汝聲有聲無汝亦答我聲有聲無唯此聞之有無與聲之有無籠侗報答兩無定實如是強混云何不名矯亂而固辨之耶二破其謬説阿難聲銷無響汝説無聞若實無聞聞性已滅同於枯木鐘聲更擊汝云何知知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者初據説為破破意以聲銷無響汝便説為無聞若實無有聞者則是聞性已滅同於枯木杳無生性及乎鐘聲更擊則應不知汝又云何能知是汝所謂無聲無聞者謬矣知有下約義申明申義以汝之聞性既於聲有之時知有聲無之時知無自是聲塵在汝聞性中或無或有豈彼聞性為汝聲塵為有為無此約正義論也末二句防其謬辨恐謂知有之時於境能別可説有聞知無之時於境不別豈真有聞耶故此防云聞實云無誰知無者云猶是也謂若聞性實是無者則應並知亦無以元是一精明故果其並知亦無又是誰來為知無之者要知既有知無之者即有聞無之者是汝所謂知無之時不許有聞者特謬辨耳三總為結斥是故阿難聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無汝尚顛倒惑聲為聞何怪昏迷以常為斷終不應言離諸動靜閉塞開通説聞無性初牒結正義上云知有知無自是聲塵或無或有今云聲於聞中自有生滅上云豈彼聞性為汝有無今云非為汝聞聲生聲滅令汝聞性為有為無明是牒前所説而結常住之正義也汝尚下深斥昏迷汝尚顛倒者斥其無正知見由無正知見故明是聲有聲無而言聞有聞無故曰惑聲為聞既惑聲為聞聲無便謂聞無何怪乎前之昏昏迷迷以聞性真常謂為畢竟斷滅猶如念心此如來深責其顛倒特甚雖語似不怪正所以深怪之耳終不下極顯性常動靜聲塵喧寂也閉塞開通耳根缺具也言此聞性不惟離於塵之動靜不可説其無性即便離於根之閉塞開通亦不可説其無性故以終不應言等遮之總結擊鐘驗常竟二引夢驗常因上科根塵雙離理深難信故此科舉夢中不無驗之又為假此例出形銷命謝聞性不無義也三一睡夢有聞二寤覺猶憶三極顯性常初如重睡人眠熟牀枕其家有人於彼睡時搗練舂米其人夢中聞舂搗聲別作他物或為擊鼓或為撞鐘即於夢中自怪其鐘為木石響重睡者揀輕睡眠熟者揀暫昏言輕睡之人雖眠熟聞聲必醒即重睡人若暫昏聞聲亦醒惟重睡人而又眠熟聞聲不醒方成夢事故以重熟二字揀之槌砧打衣曰搗練杵臼細谷曰舂米此二皆聒耳聲也夢中聞聲顯聞性真常別作他物顯意識昏昧雖曰昏昧猶是隨念分別至云或為擊鼓或為撞鐘又屬計度分別然必帶識言者以識依根現因識之有益顯根之有故即於夢中等乃展轉計度也自怪其鐘不言鼓者與下科互出以夢中昏昧為鐘為鼓二一無定故木響石響元是槌砧杵臼之聲夢中不能分辨故自怪也二寤覺猶憶於時忽寤遄知杵音自告家人我正夢時惑此舂音將為鼓響於時忽寤者聒甚自醒也遄速也才寤便了故曰遄知能搗能舂皆可稱為杵音自告家人者即説以夢中事也舂音亦該搗音以二字義同故惑為鼓響不言鐘者互出如上又寤後説夢不能全憶及全同故必兼寤後言者以寤後不憶夢中有聞或可不信既寤後猶能憶述益顯夢中有聞為不虗矣三極顯性常阿難是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏縱汝形銷命光遷謝此性云何為汝銷滅初證前可信靜寂搖動塵也開閉通塞根也一往閉即是塞開即是通或可閉約病障塞約物壅開謂病去通言物離也豈憶者言眠熟則根塵俱忘況夫夢中豈能記憶既不憶而能聞則前之所謂根塵雙離而聞性不無者信矣其形下以睡例死言如我上説人當眠熟之時其形雖寐而聞性不昏以此為例則知形銷不銷命謝不謝故云縱汝形銷等也命光即是命根而言光者以有虗妄明了義故此性即指聞性云何為汝等者乃反顯之詞正以極顯聞性不為汝之形銷命謝便隨之而俱銷俱滅也正脈問云既此根性動靜無關生死不礙如來何言離動離靜元無聽質耶答云佛言離塵無聽質者為無聚聞於耳結滯為根之聽質也此質若忘則遍周法界之聞性方以全彰豈令反成斷滅乎此方明出元無聽質之故顯其自是阿難謬解非佛自語相違耳吳興曰前阿難通疑六根離塵無體而如來別顯聞性為常誠為發起耳根圓通機也即事驗證竟三結示因果二一結示生滅因果二結示真常因果初聞性真常人各性具現見衆生墮於無常應有因果故此結示以諸衆生從無始來循諸色聲逐念流轉曾不開悟性淨妙常不循所常逐諸生滅由是生生雜染流轉從無始來者極言其迷之久也循諸色聲者見色奔色聞聲趣聲六塵中舉二以攝餘故逐念流轉者謂既循色聲必逐妄念六識也既逐妄念則生住異滅流轉不停也正以流轉不停蔽於真常妄念紛紜違於淨妙視若永失故曰曾不開悟性即本元自性約未結根時言之塵不能染曰淨根不能繫曰妙生不能生滅不能滅曰常雖三義並稱而唯重常字下文自見不循所常者不循所有常性逆流深入也逐諸生滅者唯隨六處識心內搖外奔也此該惑業二道為生滅之因由是者承上生滅之因言之謂由是生滅之因生生世世在於六道雜染法中輪流轉變無休息也此屬苦道為生滅之果二結示真常因果若棄生滅守於真常常光現前根塵識心應時銷落想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺若棄生滅者不逐生滅識心攀緣妄境守於真常者唯依真常之性亡塵盡根前文所謂脫黏內伏是也常光現前者從真常之體發圓照之光明明歷歷不昧不昏前文所謂伏歸元真發本明耀是也根塵識心應時銷落者謂常光既已現前遇事便融根塵識心俱不可得前文所謂耀性發明諸根圓拔一切浮塵及器世間諸變化相如湯銷冰是也前不言識者以識無自體託根塵現根塵尚銷不言可知故想即是識所緣塵相即是法眼中塵識即是想所依情根即是法眼中垢二俱遠離則垢不能染塵不能昏故曰應時清明法眼者見道眼也清明則前途易辨亦該修道此為真常之因云何不成等有二義一者法眼清明觸目無非道場前文所謂應念化成無上知覺是也二者前途易辨無上菩提可成此屬證道乃為真常之果然此兩番結示依生滅則不出輪回依真常則能成正覺其抑揚勸勉之意已自可見驗釋根性斷滅疑竟
