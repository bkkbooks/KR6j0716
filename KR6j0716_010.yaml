body:
  text: 京都拈華寺賢宗後學達天通理敬述嗣法門人興宗祖旺謄清懷仁祖育較字四行陰魔相四一始修未破行陰二終破顯露妄源三中間所現魔相四總結以示警囑初阿難彼善男子修三摩提想陰盡者是人平常夢想銷滅寤寐恆一覺明虗靜猶如晴空無復粗重前塵影事觀諸世間大地山河如鏡鑑明來無所粘過無蹤迹虗受照應了罔陳習惟一精真生滅根元從此披露見諸十方十二衆生畢殫其類雖未通其各命由緒見同生基猶如野馬熠熠清擾為浮根塵究竟樞穴此則名為行陰區宇彼善男子亦指透過前境人也或始終不起愛求常住性定或魔來便能覺知無壞本修故仍云修三摩提此中修三摩提望想陰為終修望行陰為初修也三摩增進動念既銷而浮想亦除名為想陰盡者想陰既盡則晝既無想夜亦無夢故曰夢想銷滅灌頂云晝想夜夢皆獨頭意識故後云寤即想心寐為諸夢今既無夢無想則寤時常同寐時寐時常同寤時故曰寤寐恆一以寤時無想如寐之靜寐時無夢如寤之覺故覺明指第八本識已離想陰則前六空寂故曰虗靜既虗且靜故以晴空喻之粗重前塵指色等性境影事指法塵獨影言無復者謂塵依識現識既空寂塵亦與識而俱空俱寂也然識之與塵既俱空俱寂自是惟以覺明本識觀諸世間大地山河雖萬象俱現而無所分別故曰如鏡鑑明來則影現鏡中而鏡本無所糊取過則影滅鏡中而鏡亦無有蹤迹據此則境現識中不過虗受照應境滅識中了然無有陳習虗受照應故絶六塵之雜染了無陳習故揀六識之偽妄故曰唯一精真蓋是對六説一對雜説精對妄説真其實惟是第八本識非究竟也生滅根元即第八識中所含七識種子以有微細生滅名為根本行陰一切行陰皆依此起故前以動相所覆雖有不見故後文稱為幽隱妄想今以想陰既盡動相已銷顯出七種故云生滅根元從此披露十方十二類生生生滅滅不出乎此故皆能見且能畢殫其類畢猶罄殫猶盡也各命由緒即是識陰尚為行陰所覆故曰未通同生基仍指七種以是生滅根元十二類生一切行陰莫不由此故云同生基也猶如野馬者野馬乃田間遊氣春晴伏地可見莊生呼為野馬佛經多云陽𦦨渴鹿認以為水而實非水也熠熠者光如焰以是七識種故清擾者狀如水以有微細生滅義故為浮根塵究竟樞穴者浮根塵即衆生身也以浮根乃四塵所成故十二類生各各不同轉變之機唯依行陰故為究竟樞穴灌頂云樞謂門軸穴謂停軸之處開閉轉動之機盡在乎此與彼行陰義相似故此相不盡生死難脫故為行陰區宇二終破顯露妄源若此清擾熠熠元性性入元澄一澄元習如波瀾滅化為純水名行陰盡是人則能超衆生濁觀其所由幽隱妄想以為其本按定行陰為生滅根元故曰若此清擾熠熠元性性入元澄者謂定力轉深生滅根元之性無復清擾熠熠入於元本澄清之際後文所謂湛不搖處是也一澄元習者謂作入元澄猶有無始生滅妄習名為元習若更一澄清則元習亦無唯餘第八識海澄停湛寂故云如波瀾滅化為純水是蓋以微波喻元習泛瀾喻元性也此相一現則是超出行陰故曰名行陰盡按耳根圓通此當空所空滅言前於覺所覺空時宛爾有箇能空心生所空覺滅仍屬微細流注即是第八識中七種名為生滅根元今於行陰盡時性習都盡故能空與所空而俱滅矣所以不能復真者以猶為識陰所覆故超衆生濁者本經生濁以想行相織妄成諸趣為體如前云知見每欲留於世間業運每常遷於國土相織妄成名衆生濁今以想陰先空行陰後除無復相織故能超越超越之後回觀行陰之所由生蓋即第八識中七種幽深隱微生滅妄想故曰幽隱妄想以為其本三中間所現魔相十一於圓元中起計相二於圓常中起計相三於自他中起計相四於分位中起計相五於知見中起計相六於無盡流起計相七於先除滅起計相八於存滅中起計相九於後後無起計相十於後後有起計相初三一標由示墜二分條詳釋三結成外論初阿難當知是得正知奢摩他中諸善男子凝明正心十類天魔不得其便方得精研窮生類本於本類中生元露者觀彼幽清圓擾動元於圓元中起計度者是人墜入二無因論當知者警令覺知也已破想陰得正知見故曰是得正知不立知見仍修深止故曰奢摩他中凡能到此地位俱有決定善根丈夫之志故稱諸善男子定慧相資不起十種邪求故曰凝明正心十類天魔無隙可乘故曰不得其便魔事不擾圓通乃可增修故曰方得精研精心研究妙明本體奈為行陰所障故須遍窮先於異生類中究其行陰深本次於本類之中求其生滅根元若生滅之根元露者則是行陰現矣行陰既現不起妄計一味精研自可進破今云觀彼幽清等乃依行陰而起妄計故致心魔作孽而墮無因論也言幽清者對前想陰而言謂想陰分別顯而濁行陰任運幽而清故圓擾者為同生基圓含諸動動元者為諸行本是生滅元如是觀察執為勝性故云起計度者既唯於圓擾動元起計則不擾不動處全無所知以是墜入二無因論正脈云二無因論乃先世外道修心邪解所立違理背正之惡見今行現之解適與彼同故曰墜入如後車蹈前車之覆轍同墮一坑塹也二分條詳釋二一計本無因二計末無因初一者是人見本無因何以故是人既得生機全破乘於眼根八百功德見八萬劫所有衆生業流灣環死此生彼只見衆生輪回其處八萬劫外冥無所觀便作是解此等世間十方衆生八萬劫來無因自有由此計度亡正遍知墮落外道惑菩提性文具標徵釋結四意一者句標也是人者即指於圓元中起計度者計此為勝尚不見於識陰何況本覺故曰見本無因謂見此行陰從本已來無有因起故何以句徵是人下釋也生機即是行陰破者即是露義前文所謂生滅根元從此披露是也亦可破字即是披字譯後謄寫誤耳乘於眼根等者謂想盡行現之時更加研究欲窮其本因而眼根清淨獲得八百功德乘此極盡其量見於八萬劫也所有衆生等即八萬劫中所有行陰之境業流者業行遷流灣環者灣轉循環死此生彼者死而在此生而趣彼所謂業運每常遷於國土是也只見衆生輪回其處者惟見在八萬劫中之處八萬劫外冥無所觀者見性未至極圓分量只如是耳豈知如來見量竪入三世而無礙橫通十方而無盡乎便作是解等者不知業相成立轉現角分於同分中即有生界相現謬謂八萬劫外無因自有拘舍離等昧為冥諦即同此見由此下結也由此計度不達惟心所現故非正知謬謂八萬劫外無有生界故非遍知立無因論佛道之所不攝故云墮落外道妄謂佛果菩提亦無有因故曰惑菩提性二計末無因二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本竪畜生本橫白非洗成黑非染造從八萬劫無復改移今盡此形亦復如是而我本來不見菩提云何更有成菩提事當知今日一切物象皆本無因由此計度亡正遍知墮落外道惑菩提性初句標也謂由昔本無因例知今後末亦無因又立此見故云見末無因何以句徵是人下釋也於生既見其根者謂於衆生窮八萬劫既見其根無因自有故由此執為自然故曰知人生人悟鳥生鳥等此邪知謬悟不信有隨緣轉變義也恐有難云何以知其人還生人鳥還生鳥等故此證云但見烏從來黑鵠從來白人天本竪畜生本橫從八萬劫無復改移足見其各各自生無有異因以此為例則知我今盡此形命還生於我故云亦復如是依於是義則知如來教我修因成菩提道是為妄語何以故而我本來不見菩提云何更有成菩提事此外道破內宗法也既破內宗還欲成立外宗故曰當知今日一切物象從昔已來皆本無因既昔本無因自今而後枝末豈有因乎此以本例末不言可知故謂見末無因從外道等執為自然者即同此見由此下結也破菩提為無有故曰惑菩提性餘俱準前可知分條詳釋竟三結成外論是則名為第一外道立無因論想陰已盡行陰未破兩楹中間首言此類故曰是則名為第一等也立無因論者成立二種無因之義而造彼論灌頂云於諸見中邪見所攝諸論師中口力論師無因見論等如瑜伽唯識清涼等説於圓元中起計相竟二於圓常中起計相上科重在元字以初云於圓元中起計度者次云生機全破次云既見其根皆元義也此科重在常字以初云於圓常中起計度者次云咸皆循環次云咸皆體恆次云本來常住次云成不生滅皆常義也是知圓字是行陰通體以圓含諸動故元常二字是行陰別義以隨人所見起計不同故三一標由示墜二分條詳釋三結成外論初阿難是三摩中諸善男子凝明正心魔不得便窮生類本觀彼幽清常擾動元於圓常中起計度者是人墜入四遍常論上科云奢摩中此云三摩中尤見其定慧相資也凝即是定明即是慧不起邪求名為正心魔不得便則想陰破矣想陰既破欲窮行陰須於十二類生中一類一類究其根元故曰窮生類本行陰既現不起妄計一味精研妙明自可盡破今云觀彼幽清等乃復依行陰而起遍常之計故致墜入四遍常論二分條詳釋二一別為分釋二總出其過初四一計二性常二計四性常三計三性常四計一性常初一者是人窮心境性二處無因修習能知二萬劫中十方衆生所有生滅咸皆循環不曾散失計以為常是人欲窮行陰不欲詳於十二類生一一研究但約心之與境以求行陰之性故曰窮心境性窮至無所觀處則謂二處無因按是人研究既略而依之修習唯知二萬劫中則二萬劫外當冥無所觀矣十方衆生等即二萬劫中現前所知分齊所有生滅兼心與境言之以心境皆屬行陰所遷皆有生滅故然生滅正是無常而彼但見其生滅滅生循環不失遂計心境二性以為是常二計四性常二者是人窮四大元四性常住修習能知四萬劫中十方衆生所有生滅咸皆體恆不曾散失計以為常是人欲窮行陰以逐類研究為過詳以心境研究為過略故唯以內外四大研究究至冥無所見處遂以為行陰之元而又目其為四大之性又以不見其生滅故名為常住按是人研究之功既均於詳略而依之修習能知四萬劫中則四萬劫外便冥無所觀矣十方衆生等即四萬劫中現前所知分齊所有生滅亦兼四大言之以內四大為衆生身根外四大為衆生器界皆為行陰所遷皆有生滅故然生滅正是無常而彼但以四萬劫外體恆不失遂計四大之性以為是常蓋上科以現前循環不失為常似約用言而此科以過去不見生滅為常似約體言此二計不同也三計三性常三者是人窮盡六根末那執受心意識中本元由處性常恆故修習能知八萬劫中一切衆生循環不失本來常住窮不失性計以為常是人已破想陰欲究行陰乃於六根末那執受中一一推求故曰窮盡六根等也不言六識而言六根者以已破想陰六識行相不顯唯覺根性湛然即於六根中求故末那即是七識此云思量恆審思量故執受即是八識執持根器種子領以為境令生覺受故心意識三字乃重牒上之三法據常途以集起名心集諸種子起現行故指第八識今即以六根中性為心思量名意恆審思量我相隨故正對末那了別為識各能了別自分境故常途指前六識今乃以第八為識以是諸識之本故獨得識名言所謂窮盡末那執受者蓋即於此心意識中究其本元由處也要知六根末那尚是八識現起何況其中行陰豈更有元由故知行陰元由惟在第八識中良以第八識中七種即是根本行陰一切行陰皆依此故如是研窮窮至無所覺處不覺生滅便謂性常恆故此謬計過去體常也依於此體更加研究名曰修習功用既深於前自能遠知八萬劫中但見八萬劫中一切衆生生滅滅生便謂循環不失此謬計現在用常也然是人既執過去本來常住又於現在窮不失性遂計心意識中三性俱常蓋上二計常一單約用二單約體此兼約體用又上二一單約現在二單約過去此兼約二際言也四計一性常四者是人既盡想元生理更無流止運轉生滅想心今已永滅理中自然成不生滅因心所度計以為常既盡想元者謂根本想陰已盡然根本想陰即是第八識中動相動相既銷露出行元呼為生理不知其更有微細流注謬謂更無流止運轉其意蓋以生滅想心今已永滅而行元生理自然成不生滅殊不知行陰正是七種實非真理體是微細流注實非真不生滅不過因其心之所度謬計行性為常所謂似比量而非真比量也正脈云斯人於想盡行現之後無復窮研之力便計為常比之第一尚為淺劣何況二三故不復立能知劫量度其所知必不逮於二萬劫矣愚謂上三似屬彼之鈍根不能直觀行陰故於心境四大及六根末那執受中漸次推窮因隨其功用詳略處中而分所知劫量此一似屬彼之利根直觀行陰無多推求故不立劫量只為計常則墮外論矣別為分釋竟二總出其過由此計常亡正遍知墮落外道惑菩提性不達行陰唯心所現則亡正知行陰所覆不見真心則亡遍知邊執見中常見所攝故云墮落外道執此為常不信別有真常菩提故云惑菩提性分條詳釋竟三結成外論是則名為第二外道立圓常論想陰已盡行陰未破兩楹中間次言此類故曰此則名為第二等也立圓常論者謂成立四種圓常之義而造彼論灌頂云唯識論邊執見中前際四遍常論具如瑜伽清涼疏明於圓常中起計相竟三於自他中起計相三一標由示墜二分條詳釋三結成外論初又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於自他中起計度者是人墜入四顛倒見一分無常一分常論前二皆云凝明顯定慧相資此一乃云堅凝似偏屬於定雖似偏屬於定亦由慧力資發故得定益深而堅且凝也堅而且凝邪求不作故曰正心心既正而魔無由入故不得便窮生類本者謂窮盡衆生十二種類以求行陰之深本也深本既現一味精研妙明自可進破而乃觀彼深本幽而不顯清而不濁但見其常時清擾為諸動之根元既為諸動之根元則自他身心依正等皆依之而建立由此於自他法中起諸妄計墜入四種顛倒見也四種顛倒見中皆有一分無常一分常義合轍云平等性中本無自他而妄計自他中道了義逈絶二邊而謬執斷常非倒見而何哉二分條詳釋二一別為分釋二總出其過初四一觀自觀他起二計二捨自觀他起二計三捨他觀自起二計四不分自他起二計初一者是人觀妙明心遍十方界湛然以為究竟神我從是則計我遍十方凝明不動一切衆生於我心中自生自死則我心性名之為常彼生滅者真無常性不知幽清常擾為諸動元正是根本行陰謬謂妙明真心不出乎此故即依此觀妙明心由觀力故運想此心廣大周遍想久觀成故見此心遍十方界且以清擾不覺妄謂湛然遍即無礙曰神湛即不動曰我自計最勝曰究竟此即外道所計二十五諦中最後一諦也彼謂從冥生覺大覺大生我心我心生五微五微生五大五大生十一根最後立一神我謬計冥性為能生中間二十三法為所生神我為能受用中間二十三法為所受用如彼論云神我有知能思慮故我以思為性受用大等二十三法蓋是以第八識中所含七識種子為神我也既立神我乃復依神我而起遍常之計故曰從是則計等我遍十方者以有遍界義故凝明不動者以有湛然義故湛然者如水澄成映故計凝明雖水澄成映而不見動相故計不動不動即常義也既遍且常乃為真常此觀我而起常計一切衆生等乃轉依遍常而進觀衆生也我既遍於十方則十方一切衆生皆在我之心中我既凝然不動則一切衆生皆是自生自死此觀生而起無常之計則我心性等乃雙承自他以分結常無常義二捨自觀他起二計二者是人不觀其心遍觀十方恆沙國土見劫壞處名為究竟無常種性劫不壞處名究竟常是人者仍指前人前於自心已知是常故不更觀其心前於他法但知衆生無常國土常否猶未能知故此惟觀國土蓋觀者即運心觀想義也想久觀成實能遍見然所見十方沙土有成有壞彼但見劫壞之處不知壞後有成便名其為究竟無常種性若見劫成暫爾不壞之處不知究竟有壞便名其為究竟真常種性要知界性無二成壞隨緣若因有壞而執無常則菩薩灰嚴土之心若因不壞而執真常則凡夫增戀世之志邪見誤人不可不知三捨他觀自起二計三者是人別觀我心精細微密猶如微塵流轉十方性無移改能令此身即生即滅其不壞性名我性常一切死生從我流出名無常性此中別觀對上二科應有三義且近對第二謂捨他依報別觀我之正報我之正報有心有身別觀我心等觀心也能令此身等觀身也若對第一即具二義一謂外計我相有三前觀神我遍界是廣大我此則別觀微細我及大小不定我也二者前觀正報是我心及衆生身此則別觀我心及與我身亦捨他唯觀於自也言精細微密者即指根本行陰是七識種故曰精藏於賴耶故曰細若有若無故曰微粗心不見故曰密前文所謂幽隱妄想是也取喻微塵者以微塵為世界種其細無內其體最微倦眼莫覩義相似故若惟約此義即是微細我也依此運用起惑造業流轉十方而性無移改此大小不定我也雖性無移改而業運常遷能令此身剎那變壞故云即生即滅其不壞性等乃雙承心之與身以分結常無常義四不分自他起二計四者是人知想陰盡見行陰流行陰常流計為常性色受想等今已滅盡名為無常所以不分自他者以自方他大率如是故知凡有想陰盡者必見行陰遷流此一定莫易耳行陰常流等亦雙承上二分結常無常義以常流則相續不斷故計為常滅盡則現前無有故計無常別為分釋竟二總出其過由此計度一分無常一分常故墮落外道惑菩提性雖四計不同總不出一分無常一分常義墮落外道者灌頂云如僧佉論師等智論云諸法不應執常常即無罪無福無所傷殺亦無施命無縛無解則無涅槃若執無常即是斷滅亦無罪福亦無增損功業因緣果報亦失是皆足以惑菩提性分條詳釋竟三結成外論是則名為第三外道一分常論想盡行現之中三言此類故名第三而言一分者意顯餘有一分為無常論故又偏言一分者二分論中以常為勝顯獨重故灌頂云唯識論邊執見中所攝清涼云外道於諸邊執見中有我及世間半常半無常四種論於自他中起計相竟四於分位中起計相三一標由示墜二分條詳釋三結成外論初又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於分位中生計度者是人墜入四有邊論堅凝正心等同前然幽清常擾既為諸動之元則一切時分方位皆依之而建立由此於時分方位起諸妄計墜入四有邊論按下四計中前二約時分起計後二約方位起計至下自見不言無邊論者以彼計無邊屬自悟境有邊屬他迷境其意蓋為化迷成悟偏重有邊二分條詳釋二一別為分釋二總出其過初四一於心時分起二計二於境時分起二計三於知方位起二計四於見方位起二計初一者是人心計生元流用不息計過未者名為有邊計相續心名為無邊心計生元等者謂欲窮行陰窮至初生心相遂計為生滅之元自爾已來直至一報終盡中間遷流之甲曾不停息生前盡後曾不見遷流之用不知但是自己心力不及遂計過未無相續用者名為有邊現在有相續之心名為無邊其意蓋欲令人捨過未有邊之心前因後果以并撥無取現在無邊之心果非酬因因不招果依此論者將必捨因緣而墮自然之計矣二於境時分起二計二者是人觀八萬劫則見衆生八萬劫前寂無聞見無聞見處名為無邊有衆生處名為有邊為窮行陰至八萬劫觀彼以為生滅之元自爾則見衆生生滅滅生至八萬劫前則寂無聞見彼但見無聞見處冥然莫辨邈無涯涘不知惟是自己見聞所不能及遂名其為無邊之性又但見有衆生處生滅滅生宛有分際不知惟是衆生業緣虗妄現起遂名其為有邊之性其意蓋欲令人捨現前有邊之性離於生滅取劫前無邊之性證於真常依此論者將必怖生死而入斷滅之見矣三於知方位起二計三者是人計我遍知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性欲窮行陰遍十二類一倫生死首尾圓照故計我能遍知由遍知故自覺心量遍於一切遂謬稱我得無邊之性豈知夫惟滅與生猶在行陰邊際中乎又見彼一切人現於我知之中我唯知其死此生彼各有方位曾不能知彼之無方位知性以是之故名彼不得無邊之心以設若能得我自能知我既不知而彼但是有邊之性且現見其死此生彼各有方位其為有邊可知豈知夫行陰虗妄本非因緣非自然性乎作是計者蓋欲令人捨彼有邊之性離於方位取我無邊之性成正遍知依此論者將必違同體而墮增上慢矣四於見方位起二計四者是人窮行陰空以其所見心路籌度一切衆生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊窮行陰空者謂想陰既盡覺行陰流以三昧力窮之欲空也以其所見等者謂正在三昧時覺行陰滅出離三昧時覺行陰生不知其是功用未純但以其所見用妄想心路籌度謬謂衆生身中咸皆半生半滅以一例諸明其世界所有皆一半有邊一半無邊以生時則覺有邊滅時則覺無邊故依此論者將必惑於對生立滅而墮閉目想空見矣別為分釋竟二總出其過由此計度有邊無邊墮落外道惑菩提性由此四種計度而立有邊無邊數論師等為其伴侶故云墮落外道菩提以中道為體邊則非中故惑之也分條詳釋竟三結成外論是則名為第四外道立有邊論是則句可知不言無邊如前已明灌頂云此亦邊邪見攝於分位中起計相竟五於知見中起計相三一標由示墜二分條詳釋三結成外論初又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於知見中生計度者是人墜入四種顛倒不死矯亂遍計虗論行陰既為諸動根元而於諸動之中隨時隨處所知所見不同由此計度墜入四種顛倒之見言不死者資中引婆沙論云外道計天常住名為不死計不亂答得生彼天若實不知而輒答者恐成矯亂故有問時答言祕密言詞不應皆説或不定答佛法訶云此真矯亂真際云外道計無想天為不死天欲生彼天輒答恐成矯亂殊不知強言祕密不應皆説混以不定而答正墮矯亂論議灌頂云邪分別性故名遍計都無實義故名虗論二分條詳釋二一別為分釋二總出其過初四一於四對義生矯亂二於單無義生矯亂三於單有義生矯亂四於有無義生矯亂初一者是人觀變化元見遷流處名之為變見相續處名之為恆見所見處名之為生不見見處名之為滅相續之因性不斷處名之為增正相續中中所離處名之為減各各生處名之為有互互亡處名之為無以理都觀用心別見有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減於一切時皆亂其語令彼前人遺失章句觀變化元者想陰既盡行陰披露進觀行陰為變化之元也既為變化之元其體即是遷流故曰見遷流處有遷流即有變更故即名之為變雖有變更而却前後相續故曰見相續處有相續則無斷絶故即名之為恆此變恆對也見所見處名之為生者謂八萬劫內能見所見處似有衆生生故即名之為生不見見處名之為滅者謂八萬劫外不見所見處似是衆生滅故即名之為滅此生滅對也相續之因者有衆生即有生滅此又於衆生生滅中別起中間有因之計如前陰之行陰已滅後陰之行陰未生中間必有相續之因然相續之因即中陰身其體即是識陰以彼不知行陰之外別有識陰但見其性不斷處似多出一法名之為增正相續中即指中陰相續中也然中陰相續之中亦有微細行陰以彼心粗不見但見其中所離處似少一行名之為減此增減對也各各生處者有衆生即有差別此又於衆生差別中別起各有生處之計如人還生人鳥還生鳥一類一類各有相生之處雖各各相生其間亦有改形易報以彼不知妄謂各類定有生處以是義故名之為有互互亡處者如人不生鳥鳥不生人雖人不生鳥人中亦有鳥性雖鳥不生人鳥中亦有人性以彼不知妄謂彼此定是互亡以是義故名之為無此有無對也初對猶是以行陰之理總相觀察故云以理都觀但不偏執即成正見以於遷變處而見恆常之性恆常處而見遷變之相故後三對乃是用妄想心各別異見若更偏執則展轉支離以於正見中而生邪見邪見中仍生偏執之見故有求法人者欲求佛法以修三摩人也來問其義者問其所修所證之義答以各別異見恐墮偏執故言亦生亦滅等蓋亦者持疑兩可意顯不墮偏執殊不知中無主宰正墮矯亂論議不言亦變亦恆者以別代總故又四對中初對猶為近理而反遺之正見其中無主耳於一切時者牒上凡有人問之時皆亂其語者牒上持疑兩可之言令彼前人者指現前來問之人言答者既惟蒙混聽者意自含糊過耳成空豈有章句可憶故曰遺失又遺失章句者不唯遺失現聞乃并彼以向所習章句亦皆遺失是不惟無益而反有損也二於單無義生矯亂此與下科乃是於前有無對中轉生偏執此正所謂展轉支離者也二者是人諦觀其心互互無處因無得證有人來問唯答一字但言其無除無之餘無所言説諦觀其心者謂於生類中諦觀其行陰心也但見人不生鳥鳥不生人等遂於互互無處謬謂自心無異類性且自謂因無得證當知彼之所謂證者是非理謬證非入理實證也有人來問惟答一字者恐招難問不敢多説故又欲欺人以祕密言詞不應皆説故但言其無者即就其自所謬見含糊而答之也除無之餘無所言説者亦不言因何説無無是何義正見其為矯強混亂語耳三於單有義生矯亂三者是人諦觀其心各各有處因有得證有人來問唯答一字但言其是除是之餘無所言説諦觀其心同上但見人還生人鳥還生鳥等遂於各各有處謬謂自心中有自類性且自謂因有得證亦謬證非實證也惟答一字亦同上説但言其是者言既各各有性則人自是人鳥自是鳥例言我自是我故但言是却又不敢明明説出是為何義因何説是故除是無説益見其為矯亂論議四於有無義生矯亂此是於上有中見無無中見有不敢説異不敢説一無理可據矯強亂説者也四者是人有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰有無俱見者謂於類生中見其改形易報如人變為鳥鳥轉為人等人變為鳥則人中無人性有鳥性鳥轉為人則鳥中無鳥性有人性由是於一一類中有無俱見豈知夫性本無二轉變隨緣義乎其境枝故者謂於一性中計有計無如一本岐而為二枝也其心亦亂者不敢定執為有以有無義故不敢定執為無以有有義故是名為亂有人來問答言有即是無者以彼不知轉變隨緣強以一體答也又言無不是有者以彼不知性本無二強以異體答也設有難言以何義故而説有即是無將必答言亦無即是亦有設又難言云何無不是有將必答言亦有之中不是亦無總是強説無非混言故云一切矯亂無理可據無義可憑故亦無容窮詰別為分釋竟二總出其過由此計度矯亂虗無墮落外道惑菩提性由此計度者總相唯是四種計度詳分則有四對兩單一復矯亂者矯強混亂虗無者虗妄無據變恆生滅有無增減一異俱不俱等皆屬外計此既同彼故云墮落外道菩提心以如來藏心為體離一切相即一切法離即離非是即非即言語道斷心行處滅此既異彼故云惑菩提性分條詳釋竟三結成外論是則名為第五外道四顛倒性不死矯亂遍計虗論第四之次名為第五迷正知見立邪知見故曰四顛倒性同彼外道計生不死之天不定答人故曰不死矯亂觀前種種異計不惟如麻上生繩仍復如繩上生蛇故云遍計虗論於知見中起計相竟六於無盡流起計相三一標由示墜二釋相出過三結成外論初又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於無盡流生計度者是人墜入死後有相發心顛倒初同前然既曰常擾則遷流無盡由是於無盡流中而生計度計無別計即計此遷流為諸動之元將來能生諸動既將來能生諸動則現前已滅者將來必生故曰是人墜入死後有相由此死後有相轉計煩惱菩提二性俱常迷唯識轉染成淨之正論違起信不變隨緣之妙旨故曰發心顛倒二釋相出過二一別釋其相二總出其過初或自固身云色是我或見我圓含遍國土云我有色或彼前緣隨我回復云色屬我或復我依行中相續云我在色皆計度言死後有相如是循環有十六相從此或計畢竟煩惱畢竟菩提兩性並驅各不相觸或自固身者因見行陰無盡而身有盡或自存想保愛而欲堅固其身是先雖已超見濁而習未盡亡遇緣則身見仍熾也然有身必有色是先雖已破色陰而習未盡亡遇緣則色陰復發也由是依色立我而云色是我是先雖已得人空而習未盡亡遇緣則我執仍起也此與外計四句中即色是我見同據此則前之所謂破陰超濁及五卷中所謂此根初解先得人空者皆是理由頓悟乘悟併銷若不歷事造修因次第盡遇境瞥起鮮有不墜入邪知謬解者矣受想二陰等準此可知不應以三陰既盡何得更執為難或計我圓含遍國土者妄計我性廣大非實悟心包太虗量周沙界也云我有色者無我則色無由立故此與外計四句中我大色小色在我中見同或彼前緣隨我回復者前緣即是塵境亦屬色陰妄計隨我回轉往復運用使作非實能轉物同佛於色自在也云色屬我者色非我而為我所用故此與外計四句中離色是我見同或復我依行中相續者行字應是色字言此中所計之我即以行陰為體以相續為相而却依於色陰故云我依色中相續如是而釋方合下句云我在色今言依行者或相沿誤書耳若曲順行字釋者則是另有我體依於行中相續行託色顯我亦隨行而在於色故得言云我在色改釋則於義暢達不改則於經珍重知之可耳此與外計四句中色大我小我在色中見同皆計度言死後有相者以行陰常流又為諸動之元將來必生諸動故計此四我皆應死後有相對色四相既爾對受想識亦然故曰如是循環有十六相言循環者謂四種我相周而復始對四陰故問行陰未破識陰未顯何能對識立四句義耶答雖曰行陰未破識陰未顯不過未見其體豈亦不聞其名設許聞名誰禁其比度而立如今之談識陰者豈盡行陰已破者哉此上是正計後有自下乃轉計二常從此或計畢竟煩惱等者意以我有善惡二性惡則煩惱性善則菩提性然我既死後有相則煩惱性畢竟還是煩惱菩提性畢竟還是菩提煩惱性日進於惡菩提性日進於善故云兩性並驅驅猶進也各不相觸者謂惡性圓滿自然墮獄善性圓滿自然成佛彼此不相妨故信此計者則惡性終不能盡善性終不能純墮獄者成有成佛則未必然耳問古釋十六句多以神我對前四陰如云色是我受是我想是我行是我是也今疏對前三後一而不言對行其意何居答古釋外道八識為神我其本體即是識陰自應對前四而立十六句義今疏約圓通行人以七識計我相其體即是行陰故應對前三後一而立十六句義外道與行人所見固自各異不必強同別釋其相竟二總出其過由此計度死後有故墮落外道惑菩提性計死後有即墮邊見之中常見一分故云墮落外道況計二性各常不信轉染成淨豈非惑菩提性耶釋相出過竟三結成外論是則名為第六外道立五陰中死後有相心顛倒論能對我相體是行陰并所對前三後一皆言後有故曰立五陰中死後有相又行陰為能有以其性常擾是動元故四陰為所有依於行陰相續生故能所合論故總言死後有相要知五陰不實猶若空華言華滅空已是顛倒況計更生顛倒特甚依斯立論從心顛倒豈真有天魔波旬為之惑亂者哉於無盡流起計相竟七於先除滅起計相三一標由示墜二釋相出過三結成外論初又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於先除滅色受想中生計度者是人墜入死後無相發心顛倒初同上可思但見行陰常擾不見前三遂於先已除滅之前三陰中而生計度蓋謂三陰先有而今已滅無例知行陰現有將來亦應滅無因計捨報之後終歸斷滅故曰是人墜入死後無相由此死後無相轉計一切皆空立外道毀常為斷之妄論違佛教修因證果之誠言故曰發心顛倒正脈云此與上科敵體相番蓋上覩未滅之行陰見其無盡而因計前三并萬法皆當無盡此覩已滅之前三見其無相而因計行陰并萬法皆當無相也二釋相出過二一別釋其相二總出其過初見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性銷散縱有生理而無受想與草木同此質現前猶不可得死後云何更有諸相因之勘校死後相無如是循環有八無相從此或計涅槃因果一切皆空徒有名字究竟斷滅形謂身形因色而有今見色陰已滅則知形無所因此計無身也心謂心識繫想而有今觀想陰已滅則擬心無所繫此計無心也連綴者領納前境補益身心今知受陰已滅則謂身心無復連綴此計縱有身心亦不能以自全也據此則三陰之性皆已銷散縱有行陰以為能生之理而所生者唯餘識陰然既無有受想則識陰亦與草木同體以識陰假受想為用故此質者不惟指於色質蓋指五陰和合而成幻質也前三已滅後一無用是此質現前猶不可得況復死後而云何更有諸相是決言其無有意也因之勘校者因已滅而勘辨未滅因現前而比校將來自謂死後相無理極成矣如是循環者從色陰而至識陰對生前及與死後有循環義故八無相者前三已滅無相後一無用無相生前死後理合有八唯除行陰者以行陰現見言無有過但辨其四陰俱無則行陰無所依託不待言無而自諭耳此上是正計後無自下乃轉計皆空言現前質空無修因者死後相無無證果者故曰從此或計涅槃因果一切皆空既一切皆空則所稱涅槃因果等者乃徒有名字若循名責實實無當名之義故曰究竟斷滅二總出其過由此計度死後無故墮落外道惑菩提性計死後無即墮邊見之中斷見一分故云墮落外道況計因果皆空不信涅槃斷果既其不立智果豈能獨存故曰惑菩提性釋相出過竟三結成外論是則名為第七外道立五陰中死後無相心顛倒論色受想滅識陰無用縱有行陰無所依託不久自盡故曰立五陰中死後無相又前三見無識陰比無行陰待無故五陰皆無也要知世相常住物皆無遷若離相求常即物説遷已為顛倒況計斷滅顛倒太煞真為邪見覆心依斯立論從心顛倒由善因而招惡果緣覺路而撲火輪良可愍嘆修禪者亦知鑑夫於先除滅起計相竟八於存滅中起計相三一標由示墜二釋相出過三結成外論初又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於行存中兼受想滅雙計有無自體相破是人墜入死後俱非起顛倒論正脈云於行存中者見行陰未滅區宇宛在也兼受想滅者見前三已滅當體全空也雙計有無者於存計有於滅計無也自體相破者以行陰之有破前三之無以前三之無破行陰之有也末言墜俱非者以破無則成非無破有則成非有也此釋易明若以愚意與正脈稍異言雙計有無者謂於已滅色受想中計先有今無於現存行陰中計今有先無正以先有者今無例知今有者先時必亦是無是則四陰中各具有無二義故雙計也自體相破者謂已滅之前三與現存之行陰各有自體相破之義如已滅之前三既各俱有無若以自體之有破自體之無則無非真無以有有義故若以自體之無破自體之有則有非真有以有無義故已滅三陰既爾現存行陰亦然現在既爾當來亦然故曰是人墜入死後俱非二釋相出過二一別釋其相二總出其過初色受想中見有非有行遷流內觀無不無如是循環窮盡陰界八俱非相隨得一緣皆言死後有相無相又計諸行性遷訛故心發通悟有無俱非虗實失措色受想中見有非有者謂色受想現在是無當來必有雖當來必有而亦非有行遷流內觀無不無者謂行陰現在是有當來必無雖當來必無而亦非無如是則從有而無者無已還有從無而有者有已還無有往復義故曰循環界者分齊義言窮盡陰界者謂如是有無無有往復循環從色陰而至行陰從生前而至死後是為窮盡四陰分趣然生前四陰已有四箇俱非死後四陰還應有四箇俱非故成八俱非相由是於四陰之中隨得一陰為所緣時皆言死後有相無相據此則所計八俱非者乃是以生前俱非例出死後其意重在死後故後結言死後俱非此上是正計八相自下乃轉計一切行者作為義又計諸行者謂轉計一切有作有為法也遷者有無迭遷謂從有至無從無至有訛者彼此混淆謂有既非有無亦非無妄計性自爾故增廣邪知謬解故曰心發通悟執定有無俱非設有人問孰虗孰實然亦莫能施對故曰失措二總出其過由此計度死後俱非後際昏瞢無可道故墮落外道惑菩提性由此計度等通指已上所計以為成過之由後際即當來也有無不辨曰昏虗實失措曰瞢無正理之可説故云無可道故唯邪見之是長故曰墮落外道菩提之性不墮有無不離有無今既有無俱非故云惑也釋相出過竟三結成外論是則名為第八外道立五陰中死後俱非心顛倒論已滅之三陰既爾未滅之行陰亦然已露之行陰既爾未露之識陰亦然生前既爾死後亦然故曰立五陰中死後俱非不言生前俱非者此執不續不成過故蓋由續起後執乃致惑菩提性故前言其意重在死後要知真空不礙妙有妙有不礙真空言語道斷心行處滅今計有無俱非真是從心顛倒依此立論違佛正説自誤誤人為害非細於存滅中起計相竟九於後後無起計相三一標由示墜二釋相出過三結成外論初又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後無起計度者是人墜入七斷滅論常擾則念念遷流遷流則不住不住則或近或遠一定有滅由此於後後無而生計度謂計此報即斷再報還斷乃至後之又後畢竟有盡也七斷滅論者清涼鈔合而為三一執我有色粗四大種所造為性死後斷滅見身死後有而無故二我欲界天死後斷滅三我色空天死後斷滅初該獄鬼人畜為四二即欲天三即色空二天三天合四趣為七皆斷滅故名七斷滅論量此義名斷滅論二釋相出過二一別釋其相二總出其過初或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅如是循環窮盡七際現前銷滅滅已無復或計身滅者妄計獄鬼人畜前身而住身死則滅或欲盡滅者妄計欲天以六欲為生因欲盡則滅或苦盡滅者妄計初禪以厭苦為生因苦盡則滅或極樂滅者妄計二禪以欣樂為生因極樂則滅或極捨滅者妄計三禪以極樂為報形極捨則滅其次應云或空處滅或識處滅等蓋四禪以極捨為報形妄計空處則滅空處計識處滅等準知今不俱言而云如是等者乃超略而總言之如是循環者謂如是前滅後生生滅展轉有循環義故自身滅以至捨滅自捨滅以至非非想滅名為窮盡七際謂獄鬼人畜及三天七種邊際也現前銷滅滅已無復者謂現報已滅滅已則轉受他報無復更有此報是此報則成斷滅如現前四趣身滅滅已轉受欲天之報無復更有四趣之報則四趣成斷滅矣餘可例知阿含亦云有沙門婆羅門於末劫中起斷滅論或計我身從因緣生必歸磨滅一或計我於欲天斷滅二或計我於色天斷滅三或計我於無色空處斷四或計我於識處斷五不用處斷六非想處斷七與本經開合少異二總出其過由此計度死後斷滅墮落外道惑菩提性死後斷滅者謂現報已盡將來轉受他報不復再受此報遂於此報生斷滅想如末伽梨等故云墮落外道窮盡七際畢竟斷滅不復見有成菩提者故云惑菩提性釋相出過竟三結成外論是則名為第九外道立五陰中死後斷滅心顛倒論四陰皆為行陰所遷行陰且斷四陰豈能常住故曰立五陰中死後斷滅要知自性無定隨業緣轉人固可以為天天亦可以為人餘趣亦然若執一報即斷已為顛倒況夫惑菩提性畢竟無有是不惟言論顛倒乃從心顛倒而起論也於後後無起計相竟十於後後有起計相三一標由示墜二釋相出過三結成外論初又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後有生計度者是人墜入五涅槃論此與上科同一常擾而異見不同前以常擾則念念遷流遷流則不住不住則一定有滅故於後後無而生計度此以常擾則念念相續相續則不斷不斷則一定是有故於後後有而生計度言後後有者謂此報即有再報還有乃至後之又後畢竟常住也五涅槃論者清涼鈔云一見現在受若天若人諸五欲樂便謂涅槃二厭五欲故現住初禪以為涅槃三厭尋伺故現住二禪以為涅槃四厭諸尋伺喜故現住三禪以為涅槃五厭喜樂乃至出入息現住四禪以為涅槃等論量此義故云五涅槃論二釋相出過二一別釋其相二總出其過初或以欲界為正轉依觀見圓明生愛慕故或以初禪性無憂故或以二禪心無苦故或以三禪極悅隨故或以四禪苦樂二亡不受輪回生滅性故迷有漏天作無為解五處安隱為勝淨依如是循環五處究竟或以欲界為正轉依者謂見四趣苦極欲天樂遂計轉四趣而依欲天即是轉死生而依涅槃不復更轉縱再有所轉而此性不壞故名為正以何義故作如是計觀見圓明生愛慕故言圓明者四王鄰於日月忉利超日月明夜摩自有光明況夫兜率上升精微化樂生越化地他化出超化無化境其光明益圓可知不知其未超欲界樂是苦因擬之上界光若螢火便爾觀見生愛羡慕無已而計為正轉依也或以初禪性無憂故者謂見欲界苦深以為憂遂計初禪以為涅槃以何義故作如是計性無憂故言無憂者以下界粗重苦惱所不能動不知其未出覺觀猶帶憂懸便謂無憂以無憂故計為涅槃或以二禪心無苦故者謂見初禪憂懸猶有覺觀之苦遂計二禪以為涅槃以何義故作如是計心無苦故言無苦者以初禪憂懸所不能逼不知其待有説無無非真無便謂無苦以無苦故計為涅槃正脈云按前色界天中初禪苦惱不逼二禪憂懸不逼苦重憂輕序之宜也今初禪無憂二禪無苦決是譯人誤顛倒也愚謂有憂必有苦有苦必有憂但各有輕重無妨互出故今疏唯隨文銷釋然可通則已耳或以三禪極悅隨故者謂見二禪待苦為樂其樂未極遂計三禪以為涅槃以何義故作如是計極悅隨故言極悅隨者少淨天具大隨順是隨而未悅無量淨身心安隱是悅而未極遍淨天得無量樂乃極歡悅極隨順不知其但是有為便謂極樂以極樂故名為涅槃或以四禪苦樂二亡等者謂見三禪樂非常住久必壞生遂計四禪以為涅槃以何義故作如是計苦樂二亡不受輪回生滅性故言苦樂二亡者以一切世間諸苦樂境所不能動故言不受輪回生滅性者蓋彼以有苦有樂即有欣厭有欣厭即有輪回生滅今既苦樂二亡欣厭不生即是不受輪回生滅之常住真性不知其但是有所得心功用純熟正在生滅便謂不受輪回以不受故計為涅槃古德云或者不定之詞顯非一人遍計五處愚謂應是一人但隨其修習時分前後改計不定故置或言如初則以四趣為苦遂計欲天為涅槃及修習功深又覺欲天為苦遂計初禪為涅槃等故初以欲界為正轉依顯餘皆展轉改計非正也又通計五處皆為涅槃但前後勝劣異故迷謂無知作謂誤認言諸天本屬有漏涅槃乃是無為今既以諸天為涅槃都緣不知有漏誤作無為以五處為安隱之鄉乃最勝清淨者之所依住是不唯計五處為有餘無餘亦且計自己為羅漢為菩薩為如來耳如是循環者由劣向勝生滅不停有循環義自欲天以至四禪各計最勝名為五處究竟二總出其過由此計度五現涅槃墮落外道惑菩提性五現涅槃者現字有二義一者顯現謂同一涅槃之性五時顯現異故二者現前謂五種涅槃各就現前説故依法起見邪見所攝故云墮落外道既已認妄為真將必以真為妄故云惑菩提性釋相出過意三結成外論是則名為第十外道立五陰中五現涅槃心顛倒論行陰魔中此居最後故名第十外道色受想識皆依行陰遷流行陰既常四陰亦爾已滅者自應還生未滅者自應常住是計五陰性常即涅槃性但隨五時顯現各就現前説為最勝故曰立五陰中五現涅槃豈知迷有漏天作無為解其猶認雹為珠徒勞珍藏瓶破水傾空遺浩歎況復依此立論從心顛倒自誤誤他可弗辨哉結上中間所現魔相竟四總結以示警囑二一結由警惕二囑令傳護初阿難如是十種禪那狂解皆是行陰用心交互故現斯悟衆生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄前三陰皆有所現魔境故十種皆言現境而此陰唯是邪悟顛狂故十種皆言狂解行陰未破之間妄念正念間雜而起故曰用心交互以妄亂正則正念無力依正起妄則妄念有力故致現斯邪悟若自能知覺忖量雖逢此現前亦不過如光如影不久自銷其奈衆生頑迷不自忖量逢此現前以迷為解既以迷為解必至自言登聖由此大妄語成而墮無間獄矣二囑令傳護汝等必須將如來語於我滅後傳示末法遍令衆生覺了斯義無令心魔自起深孽保持覆護消息邪見教其身心開覺真義於無上道不遭枝岐勿令心祈得少為足作大覺王清淨標指初傳示令勿著邪覺了斯義者謂覺了前來十種邪解義也既能覺了自能辨識妄念才萌即當以正念拒之故曰無令心魔自起深孽蓋妄念即是心魔以能害正知見故邪解即是深孽以能為地獄因故書曰天作孽猶可違自作孽不可活今云自起者正是自作孽耳保持下保護令勿滯小言如我上説已能保持覆護消息邪見而為破行陰還須教以身心體驗於行陰遷流處開覺乎藏海常住之真義也枝岐者旁出別徑喻小乘及魔外等言既能開覺真義自是以不生滅為因心直趣佛果如長安通途故云於無上道不遭枝岐雖曰不遭枝岐但識陰未超仍須防範故曰勿令心祈得少為足意者以心祈速證得少為足則才出行陰又墮識陰區宇中矣誓期成佛故云作大覺王還度衆生故云清淨標指言清淨者謂掃清魔外淨治修途標指者謂標榜人天指示真義皆還度衆生義也總結行陰魔相竟五識陰魔相四一始修未破識陰二終破顯露妄源三中間所現魔相四總結以示警囑初阿難彼善男子修三摩提行陰盡者諸世間性幽清擾動同分生機倐然隳裂沉細綱紐補特伽羅酬業深脈感應懸絶於涅槃天將大明悟如雞後鳴瞻顧東方已有精色六根虗靜無復馳逸內外湛明入無所入深達十方十二種類受命元由觀由執元諸類不召於十方界已獲其同精色不沉發現幽祕此則名為識陰區宇彼善男子指超出前相人也或始終不起妄念或邪解便能覺知常住性定無壞本修故仍云修三摩提此中修三摩提望行陰為終修望識陰為初修也三摩增進熠熠清擾者性入元澄名為行陰盡者諸世間性謂枝末行陰以凡屬世間有為之法皆依行陰遷流而行陰即世間中性故幽清擾動指根本行陰深隱賴耶曰幽離於想陰曰清微細流注曰擾生滅不停曰動其體即是賴耶中七識種也一切枝末行陰皆依此起故曰同分生機前曰基此曰機者前表生之根此表動之始故倐忽也隳裂者破壞義言行陰既盡則諸世間性及幽清擾動之同分生機皆忽然隳裂破壞是本末俱盡也沉細綱紐指第八識親依無明曰沉凡小不見曰細為六性之總曰綱是結解之元曰紐受生先來曰補特伽羅謂中陰身數取趣也捨報後去曰酬業深脈謂業未盡脈不斷也脈即是命深脈謂命根也行陰既銷而業不成感空存八識而用無所應故曰感應懸絶盡破此識即是第一義天而為涅槃之體故曰於涅槃天將大明悟言將者謂才有明悟前相故向下説喻以形容之如雞後鳴等者溫陵曰涅槃性天為五陰所覆昏如長夜前三陰盡如雞初二三鳴雖為曙兆未見精色行陰所覆未見識精如之此行陰盡如雞後鳴瞻顧東方已有精明之色俗云東方發亮是也識陰已露妙性將現如之故前文以識精為第二月惟多一揑放手即是第一月耳六根虗靜等通約四陰盡相言之以受盡故虗無領納故想盡故靜離分別故行盡故無復馳逸絶遷流故內之六性既已湛然明淨況夫色陰先盡而外之六塵豈更昏擾如是則內根外境同歸湛明之一體也既唯一體內外相盡故曰入無所入謂十二入皆無所入之相惟顯有八識為類生之命根故曰深達十方十二種類受命元由若知此是無明幻起離於依計則識陰自可頓超其奈行人至此觀此為受命元由執此為本元真心遂致識陰終不可破耳雖不可破而行陰已盡果報不牽故云諸類不召以無行則無業諸類果報不能召牽唯見十方世界同一識性故云於十方界已獲其同精色不沉者謂識精元明常得現前如東方之精色不復更沉也發現幽祕者謂因識精元明常得現前已能少見佛性但如羅縠觀月故曰幽曰祕如東方精色不沉曙光漸露也住於此境猶為頂墮細障故曰此則名為識陰區宇二終破顯露妄源若於羣召已獲同中銷磨六門合開成就見聞通鄰互用清淨十方世界及與身心如吠琉璃內外明徹名識陰盡是人則能超越命濁觀其所由罔象虗無顛倒妄想以為其本羣召者羣類果報皆有召牽八識義故但前此行陰已盡無業運故雖召不召已獲同體識性今謂若於此中永不見於根性名為銷磨六門問前於受陰盡時已齊聞所聞盡一根既爾餘五亦然應即銷磨六門何至此乃云然耶答色盡塵亡受滅根盡皆為暫現非可常保至前云內外湛明入無所入乃行盡識現之時前境益覺增明至此又是識陰將開究竟脫落之相良以根性即是識性識若不盡任説根盡終是依鏡拂塵難保其不復更有要必至本無一物方可云無處惹塵埃耳六既非六合時成就全體一亦非一開時成就大用故云合開成就合時成就全體故見聞通鄰見聞者六性舉二通鄰者通開鄰相以既惟一體則鄰相不復有故開時成就大用故互用清淨互用者六根齊照清淨者過而不留以既含多用則境界不復留故境界既其不留妙性自爾圓湛外器內根全是自己心光世界身心蕩然不復更有故云如吠琉璃內外明徹至此則一念不生和合相滅故云名識陰盡按耳根圓通此當寂滅現前言前於空所空滅時宛爾有箇能滅之心即是第八本識然此乃是對生言滅滅非真滅正是識陰今於識陰盡處對生言滅之滅亦復俱滅故是寂滅現前時也超越命濁者此經命濁以一識六用同異相織為體如前命濁文云汝等見聞元無異性一識也衆塵隔越無狀異生六用也性中相知用中相背同異失準同中有異異中有同相織妄成同異相識虗妄成立衆生不知執為命根名為命濁今以合開成就一六俱亡無復相織故能超越超越之後回觀識陰之所由生蓋即真如體上一念無明妄動故曰罔象罔象者暗昧不明之相即無明也真妄和合非一非異故曰虗無既非一又非異明知其為虗而無也凡夫執為命根外道認為自性無而為有虗而為實故曰顛倒妄想無邊識陰皆依乎此故曰以為其本三中間所現魔相十一立所得心成果相二立能為心成果相三立因依心成果相四計圓知心成果相五計著崇事成果相六圓虗無心成果相七執著命元成果相八發邪思因成果相九圓精應心成果相十圓覺淴心成果相初四一行盡識現二乍現勝相三謬解成咎四出名警覺初阿難當知是善男子窮諸行空於識還元已滅生滅而於寂滅精妙未圓掘井九仞而不及泉殊為可惜故教以當知以示警覺意也透過前之十心不壞本定清擾自息故元窮諸行空前云熠熠元性性入元澄是也於識還元者行陰既盡前七轉識皆悉反本還元以前七轉識皆依行陰遷流而得成故據此則凡有生滅之心皆已滅盡故曰已滅生滅顯唯有第八本識為所依耳此識不盡涅槃天未大明悟故云而於寂滅精妙未圓寂滅即涅槃體法身德精即涅槃相解脫德妙即涅槃用般若德亦可云寂即常德離生死故滅即淨德滅煩惱故精即我德有真體故妙即樂德具神用故總為一涅槃也蓋必透過識陰始得圓滿二乍現勝相能令己身根隔合開亦與十方諸類通覺覺知通淴能入圓元己身者自己身也若禪觀精明不見根相則似根隔乍合若稍涉昏住根相宛然又是根隔乍開非同上之銷磨六門永不見於根相以彼乃識陰將開此則正在區宇中也雖在區宇而諸類不召故亦能與十方諸類通一覺知前云已獲其同是也覺知通淴淴字字書不載或曰元是泯字此經譯於唐避太宗諱故易其半近本或作𦜩字蓋通泯者泯為一體亦𦜩合義此句乃重牒上義以起下句言覺知既已通淴自能證入圓滿識性而為諸類之根元耳正脈云大凡起執必覩大定中殊勝之相以發其端此科是也後皆準知三謬解成咎若於所歸立真常因生勝解者是人則墮因所因執娑毗迦羅所歸冥諦成其伴侶迷佛菩提亡失知見歸即入義上云能入圓元蓋即以圓滿識性為所歸處也因猶依也計識真常堪可依住故曰立真常因其計已成作殊勝解名為生勝解者既作殊勝之解將必執我為能依人識性為所依果故曰是人則墮因所因執娑毗迦羅黃髮外道以我為能歸以冥諦為所歸與此相類況彼所計冥諦乃冥然莫辨之境而此所計圓元亦罔象虗無之心是不惟事義相類而道理亦相類故曰成其伴侶又前云非色非空拘舍黎等昧為冥諦然計此者非止一人前後異出耳迷佛二句言彼既以識性為所依自不知別有佛果菩提之可歸既以外道為其伴自不知本有正知正見之可守也四出名警覺是名第一立所得心成所歸果違遠圓通背涅槃城生外道種識陰十相此居其首故曰是名第一乍見根隔合開遂立此識以為所得之心才得覺知通淴遂計此識以為所歸之果毫釐之差千里之謬故曰違遠圓通因地不真果招紆曲故曰背涅槃城自是迷佛菩提亡失知見故曰生外道種合轍云向也根隔合開圓通將近今則圓者偏通者隔反違遠矣向也於涅槃天將大明悟今則背涅槃城而不見矣向也覺心欲發將為佛子今則反成外道種矣此如來所以出名而警惕也立所得心成果相竟二立能為心成果相三一行盡識現二謬解成咎三出名警覺初阿難又善男子窮諸行空已滅生滅而於寂滅精妙未圓行空則無遷流無遷流則無生滅故凡一切有為生滅識心皆已俱滅故云已滅生滅寂滅精妙等如前所釋此下亦當有乍現勝相之科今不具者準上可知故二謬解成咎若於所歸覽為自體盡虗空界十二類內所有衆生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅現無邊身成其伴侶迷佛菩提亡失知見此下九種皆是依前乍現勝相而起異計此科亦是以識性為所歸也但前科於所歸識立真常因尚有能依所依此科則於所歸識覽為自體蓋是忘身觀識久久觀成唯見識體無邊不見有身故即以識心為自體也觀行稍虧漸見類生遂計盡空界十二類內所有衆生皆我生中流出而言一類者由漸見故轉計流不頓流出不頓出乃一類一類漸漸流出耳此計已成作殊勝解名為生勝解者既作勝解將必以我能生彼而彼不能生我故曰是人則墮能非能執摩醯首羅此云大自在即色界頂大自在天也經律異相云過五淨居而有八處形有八臂騎大白牛資中云三目八臂外道所宗竺法蘭云西域梵志常修梵行事首羅天以為天尊今云現無邊身者謂大自在天自計於我身中能現無邊衆生之身而此識陰行人計我生彼十二類內所有衆生與彼計同故云成其伴侶不信別有因果自應迷佛菩提妄計彼天為勝自應亡失正見三出名警覺是名第二立能為心成能事果違遠圓通背涅槃城生大慢天我遍圓種識陰十相此居其次故名第二乍見識體圓元能含能生遂立為能為因心依此為觀久久觀成覽為自體計其能為生衆生事遂謂成就能事之果亡失本修故曰違遠圓通終沉生死故云背涅槃城大慢天即大自在天也自計能生一切起祖先慢故以大慢為名又計自體周遍虗空圓含一切故以遍圓目我今行人計既同彼故生於彼之種類非實能生彼天也正脈問此計識為自體流出一切何異佛説萬法唯識答佛説萬法惟識緣生如幻生即無生此計實生安得一轍又唯識正明無他心外之法此計能生他法宛爾顛倒何疑之有灌頂云唯識無我執此天執我能生則違唯識矣立能為心成果相竟三立因依心成果相三一行盡識現二謬解成咎三出名警覺初又善男子窮諸行空已滅生滅而於寂滅精妙未圓義亦準上二謬解成咎若於所歸有所歸依自疑身心從彼流出十方虗空咸其生起即於都起所宣流地作真常身無生滅解在生滅中早計常住既惑不生亦迷生滅安住沉迷生勝解者是人則墮常非常執計自在天成其伴侶迷佛菩提亡失知見上科於所歸識覽為自體此科於所歸識有所歸依亦是亡身觀識久久觀成惟見有識不見有身遂計自身歸入識中是我實有所歸依處也觀行稍虧還復見身及虗空等遂自疑身心從彼流出十方虗空咸其生起況諸一切在虗空者不待言矣即於都起等又轉計識陰為真常身也地字亦是處義然彼既以虗空等咸其生起以生心等從其流出故即以識陰為虗空等所都起處為身心等所宣流處也作真常身無生滅解者初於觀成之時不見有身宛若身心滅於識中觀行稍虧還復見身宛若身心生於識中有滅有生定是無常而彼所歸識陰始終不見生滅故即於彼作真常身作無生滅解也在生滅中早計常住者言識陰既由無明轉變依然屬於微細生滅如急流水望如恬靜流急不見非是無流蓋必識陰盡處乃稱常住真心今識陰未盡即作無生滅解是在生滅識中早計常住如彼見卵而求時夜見彈而思梟炙不亦惑乎此正不了常住真心不生滅性故云既惑不生兼亦不了識陰猶屬微細生滅故云亦迷生滅真妄俱昧故曰沉迷恬不知誤故曰安住而反於彼作殊勝想名為生勝解者既作勝解將必以識陰為常而我身心為非常故曰是人則墮常非常執自在天即欲界頂魔王天也涅槃經迦旃延説一切衆生悉是自在天作楞伽經塗灰外道計自在天為萬物因今既以識陰為都起所宣流地與彼計自在天為萬物因者相似故云成其伴侶既惑不生滅性自應迷佛菩提以不生滅性即菩提體故既迷生滅識陰自應亡失知見以認妄為真即墮邪知見故三出名警覺是名第三立因依心成妄計果違遠圓通背涅槃城生倒圓種計識能生我之身心為因計識是我之所歸處為依故曰立因依心作真常身無生滅解故曰成妄計果流入邪見自與圓通違遠死從淪溺自與涅槃相背未得圓滿真心顛倒妄計為圓故曰生倒圓種倒圓種即計自在天之類也立因依心成果相竟四計圓知心成果相三一行盡識現二謬解成咎三出名警覺初又善男子窮諸行空已滅生滅而於寂滅精妙未圓準上二謬解成咎若於所知知遍圓故因知立解十方草木皆稱有情與人無異草木為人人死還成十方草樹無擇遍知生勝解者是人則墮知無知執婆吒霰尼執一切覺成其伴侶迷佛菩提亡失知見準第一相中乍現勝相文云覺知通淴能入圓元入即是歸上三同於所歸起計而計各不同此科乃於覺知通淴而起計也謂乍見覺知通淴不知其是識陰區宇又進觀此知能遍知諸法遂於所知之境而計知能遍圓故云知遍圓故知遍則無法不在知圓則有物皆含由此因於遍圓之知而立謬解十方草木本屬無情以謬解故皆稱有情與人無異以是知所在知所含故法界觀云情與無情共一體處處皆同真法界今計無情與有情無異亦略似有理但又計草木為人人死還成草樹則真為邪説矣即此二語魔形畢露而從古諸德各設問難恐濫內教唯心唯識之旨同根同體之説似不必也無擇遍知者以既執互為互成自應無所揀擇遍謂有知故自謂深悟名為生勝解者既作勝解將必以此理惟我能知餘無知者故曰是人則墮知無知執婆吒霰尼二外道名婆吒亦云婆私吒名義集云跋闍此翻避去善見律云初為牧童毗舍離王未登位時共相遊戲童為王踏泣訴父母父母曰汝應避去因此立名霰尼或云先尼名義集云西尼迦此翻有軍立名之意未詳執一切覺者彼二外道同執一切有情無情皆有覺知此計草木與人無異見同於彼故曰成其伴侶既與外道為侶自應迷佛菩提既以邪知為知自應亡失知見三出名警覺是名第四計圓知心成虗謬果違遠圓通背涅槃城生倒知種於所知境計知遍圓以此為心故云計圓知心不言遍知者以圓攝遍故又上云無擇遍知此云計圓知心蓋圓遍互具影略言之也誤為聖證不免輪回故云成虗謬果已墮邪見前功盡棄故云違遠圓通凡有所修咸資魔業故云背涅槃城現前既非正知將來不出其倫故曰生倒知種蓋彼計無擇遍知自以為知即顛倒知凡有類此者皆其種也計圓知心成果相竟五計著崇事成果相三一行盡識現二謬解成咎三出名警覺初又善男子窮諸行空已滅生滅而於寂滅精妙未圓二謬解成咎若於圓融根互用中已得隨順便於圓化一切發生求火光明樂水清淨愛風周流觀塵成就各各崇事以此羣塵發作本因立常住解是人則墮生無生執諸迦葉波并婆羅門勤心役身事火崇水求出生死成其伴侶迷佛菩提亡失知見準第一相中乍現勝相文云能令己身根隔合開疏云己身者自己身也若禪觀精明不見根相則似根隔乍合若稍涉昏住根相宛然又是根隔乍開非同上之銷磨六門永不見於根相今此科云根互用中已得隨順正根隔乍合乍開義也故環師云識陰盡者銷磨六門諸根互用今此未盡則才得隨順而已正脈云此解極是觀中之一字足見互用之妙含之未發也蓋隨者依而不背順者向而不逆乃略具互用之相而未能顯著之稱便於圓化一切發生者圓化二字即指根隔合開以根隔合開以略具圓融變化義故妙計圓融變化發生非止一緣故云一切蓋暗指地水火風為一切也既能發生圓化自應各具勝性故云求火光明等其意以光明為火之勝性一切光明相皆依之而發生以清淨為水之勝性一切清淨相皆依之而發生以周流為風之勝性一切周流相皆依之而發生以成就為塵之勝性塵即是地衆塵成故能生一切有成就義一切成就相皆依之而發生所以求之樂之愛之觀之者為欲增進其圓化之妙故灌頂云各各崇事者尊尚曰崇供奉曰事或盛一爐火或裝一盆水或竪一幡風或掬一杯土四面圍繞八方禮敬也以此羣塵等乃出其所以崇事之故以此塵為發生造作本因羣塵二字通指地水火風皆前塵故一切所作皆屬無常惟此常住故即於此立常住解既立此為常將必以此為無生既以他非常將必以他為有生故曰是人則墮生無生執諸迦葉波即指優樓頻螺等其先事火後歸佛化并婆羅門總該事水等諸外道也勤心役身者勤勞其心役使其身事火崇水者供奉於火尊尚於水不言事風崇土者可例知故彼為求出生死此為增進圓化所為雖異崇事無別故曰成其伴侶所立既非真常所修寧有實果故曰迷佛菩提崇事無情立常住解故曰亡失知見三出名警覺是名第五計著崇事迷心從物立妄求因求妄冀果違遠圓通背涅槃城生顛化種正脈云計著邪惑也崇事邪業也迷心者迷己一真靈覺之心從物者從彼四大無知之物妄求因者不當求而求非因計因也妄冀果者不當冀而冀非果計果也非因計因不得圓通因心故曰違遠非果計果不得涅槃實證故曰背也灌頂云顛化種者言佛説三界唯心萬法唯識是知惟識唯心為能生能化三界萬法為所生所化是為生化正理今既顛倒化理執羣塵為發作本因崇水事火祠土祝風故將來必墮顛化種中如精神化為土木金石者之類計著崇事成果相竟六圓虗無心成果相三一行盡識現二謬解成咎三出名警覺初又善男子窮諸行空已滅生滅而於寂精妙未圓二謬解成咎若於圓明計明中虗非滅羣化以永滅依為所歸依生勝解者是人則墮歸無歸執無想天中諸舜若多成其伴侶迷佛菩提亡失知見此與上科所依境同上科云根互用中已得隨順即略具圓融照了之義此科云圓明亦圓融照了義也但上科依於此境計一切發生此則計明中虗是為異耳言明中虗者謂雖曰圓明不過乍開乍合於乍開時則計以為明乍合時則計以為虗故不唯計明中虗且計明從虗發以虗為勝反欲非滅其羣根中變化之性令其永滅其意以永滅所依諸根唯餘罔象虗無之識為所歸依處此正所謂迷妙用而墮虗無者也本屬謬解自以為勝故曰生勝解者既作勝解將必以我入中虗為有歸彼在正明為無歸故曰是人則墮歸無歸執無想天即四禪天中諸外道天也諸外道天類多窮空不歸故又以舜若多名之以舜若多翻為空故雖所趣之空不同而同計虗無為所歸依處故曰成其伴侶既墮虗無自應迷佛菩提既侶無想自應亡失知見三出名警覺是名第六圓虗無心成空亡果違遠圓通背涅槃城生斷滅種於圓明中計為虗無依此起心冀得真果故云圓虗無心窮空不歸迷漏無聞便入輪轉故曰成空亡果所謂縱若修到非非想天報盡還來散入諸趣是也專計虗無則違遠圓通終落空亡則背涅槃城現在既以斷滅居心將來必墮斷滅之種如迦旃延毗羅胝子妄計死後斷滅之類正脈問此與後之第九第十何別答棄有取空見解志願皆同但先心各別此凡外種伏惑取空彼聖性種斷惑證空世出世間異也圓虗無心成果相竟七執著命元成果相三一行盡識現二謬解成咎三出名警覺初又善男子窮諸行空已滅生滅而於寂滅精妙未圓二謬解成咎若於圓常固身常住同於精圓長不傾逝生勝解者是人則墮貪非貪執諸阿私陀求長命者成其伴侶迷佛菩提亡失知見上科既以識陰為所歸依處自計識陰為圓為常以是衆類所歸故圓以是各命由緒故常既圓且常妄計得此者可以保形可以永年是又於圓常中轉生固身常住計也固身常住亦同識精圓常內外相保色心連持如山如海故云長不傾逝傾猶頽逝猶往也自以此計為是故云生勝解者既作勝解將必以此為可貪餘皆非可貪求故曰是人則墮貪非貪執阿私陀此云無比長壽仙名也而言諸者以仙非一人凡壽命極長世無能比者皆可稱之彼既貪求長命與此相類故曰成其伴侶識陰所覆不知更求真常故曰迷佛菩提愛戀久生渾忘此身如寄故曰亡失知見三出名警覺是名第七執著命元立固妄因趣長勞果違遠圓通背涅槃城生妄延種計識陰為各命由緒故曰執著命元以此為因在愚者謂之堅固在智者謂之虗妄故曰立固妄因依此趣果在迷者謂之長壽在悟者謂之徒勞故云趣長勞果亡失本修故曰違遠圓通不出生死故曰背涅槃城現在既以固形為務將來必墮妄延種中妄延者不依正覺修三摩提別修妄念存想固形如前所説十種仙者是也執著命元成果相竟八發邪思因成果相三一行盡識現二謬解成咎三出名警覺初又善男子窮諸行空已滅生滅而於寂滅精妙未圓二謬解成咎觀命互通却留塵勞恐其銷盡便於此際坐蓮華宮廣化七珍多增寶媛恣縱其心生勝解者是人則墮真無真執吒枳迦羅成其伴侶迷佛菩提亡失知見準前第一相中乍現勝相文云能令己身根隔合開亦與十方諸類通覺此上三科前二皆以根隔合開起計而異執不同後一仍依第二展轉生起今此科乃以諸類通覺而起計也因見我與諸類通一覺知然覺知即是識陰前文呼為各命由緒故曰觀命互通若於此更加研究而識陰自可進破乃却退留住於塵勞煩惱不復盡窮蓋恐其銷盡識陰彼此命根皆斷也便於此際等正却留塵勞之相言塵勞以貪欲為本欲貪五欲先須莊嚴依報故即於此際坐蓮華宮宮以蓮華名者取其莊嚴美麗微妙香潔此亦約有大福德假禪那而修邪道者言之若不然者蓮華宮豈易致哉廣化者神通變現七珍即是七寶媛美女也世間無比稱之為寶然既能廣化七珍使衆寶羅列於華宮之內又能多增寶媛俾美色牽眷於左右之際則窮奢極欲沉酣於無明煩惱可知是則始而欲留塵勞終至陷溺其中寶覺全身從此而隳不幾可惜乎哉問菩薩留惑潤生與此何異答留惑潤生原為教化衆生起見却留塵勞乃以識盡命斷是恐迷悟攸分縛解自辨恣縱二句正見其沉溺而不覺也是人則墮真無真執者謬謂必欲求真則識盡命斷而反無真矣吒枳迦羅天魔之異名也梵語吒枳此云結縛梵語迦羅此云我所作其人自謂三界結縛唯我能作以能變化欲境結縛衆生故今之却留塵勞略同彼計故云成其伴侶不知別有無上菩提佛知佛見故曰迷曰亡失也三出名警覺是名第八發邪思因立熾塵果違遠圓通背涅槃城生天魔種不知識盡真現反恐命根斷絶故云發邪思因坐蓮華宮窮奢極欲故曰立熾塵果圓通因心自此永迷涅槃妙果緣茲永失故曰違曰背也不斷欲而修禪必落魔道故曰生天魔種所謂上品魔王中品魔民下品魔女是也發邪思因成果相竟九圓精應心成果相三一行盡識現二謬解成咎三出名警覺初又善男子窮諸行空已滅生而於寂滅精妙未圓二謬解成咎於命明中分別精粗疏決真偽因果相酬唯求感應背清淨道所謂見苦斷集證滅修道居滅已休更不前進生勝解者是人則墮定性聲聞諸無聞僧增上慢者成其伴侶迷佛菩提亡失知見上科既觀命互通則一切凡聖邪正皆依命根發明此則於命根發明中而起分別等計也然同一命根發明而聖位則精謂變易精微故凡位則粗謂分段粗顯故故須分析辨別精粗之所由生也又同一命根發明而聖道則真無後有故外道則偽無實果故故須疏通決擇真偽之所由異也因果相酬者精粗真偽皆是以因感果自相酬答既知自相酬答而欲易粗為精捨偽從真故云惟求感應感應速成滯窒小果故云背清淨道清淨道指佛道也所謂見苦等躡上所求感應之事而指釋之苦集是世間果因滅道是出世果因見之與斷者厭果除因證之與修者依果立因所謂惟求感應者以此居滅已休者止息化城也更不前進者不求寶所也得少為足故生勝解於菩薩法不生一念好樂故墮定性聲聞所謂不回心鈍阿羅漢是也四禪無聞比丘非果計果佛會增上慢流未得謂得略同此計故曰成其伴侶佛果菩提抱迷絶分滯寂沈空灰知泯見故曰迷曰亡失也三出名警覺是名第九圓精應心成趣寂果違遠圓通背涅槃城生纏空種圓觀四諦精誠以求感應事與願遂故曰圓精應心居滅已休不進而作勝解甘墮灰泯故曰成趣寂果識陰所覆不得圓通因心故曰違遠偏空所蔽莫臻究竟斷果故云背也現前既為敗種灰身必墮焦芽故曰生纏空種謂永纏於空而無超脫之志也圓精應心成果相竟十圓覺㳷心成果相三一行盡識現二謬解成咎三出名警覺初又善男子窮諸行空已滅生滅而於寂滅精妙未圓二謬解成咎若於圓融清淨覺明發研深妙即立涅槃而不前進生勝解者是人則墮定性辟支諸緣獨倫不回心者成其伴侶迷佛菩提亡失知見覺明即是識陰如前云覺明真識蓋識境至此科已極故特舉所依覺明以顯勝也前云能令己身根隔合開即略具圓融之義又云亦與十方諸類通覺覺知通㳷即略具清淨之義發研深妙者不知其猶是識陰區宇依於二義發心研究以悟二種深妙一者依於圓融而悟緣生無性之理以六根本屬緣生之法今見其乍開乍合因悟緣生無性理也二者依於清淨而悟紛擾寂靜之義以諸類原屬紛擾之法今見其覺知通㳷遂悟紛擾寂靜義也即立涅槃者本修圓通忽逢岐悟謬計深妙故即立為涅槃不知更求性海圓融緣起無礙及真如不動寂滅場地故云而不前進此正所謂中途作證故云生勝解者以緣生無性而立涅槃計同緣覺以紛擾寂靜而立涅槃計同獨覺故云是人則墮定性辟支以辟支梵言具含緣獨二覺義故又以其不復前進目為定性諸緣獨倫者緣謂緣覺稟教觀緣之倫獨謂獨覺無師自悟之倫二倫皆有不回心者然彼係依類直修此是圓通誤證因雖有異果乃正等故云成其伴侶末二句準上聲聞可知三出名警覺是名第十圓覺㳷心成湛明果違遠圓通背涅槃城生覺圓明不化圓種根隔合開曰圓覺知通㳷曰㳷曰覺曰心皆指識陰謂結根名覺有覺知故當體名心能集起故成湛明果者寂靜名湛即獨覺果無性曰明即緣覺果也違遠二句亦準上聲聞可知現前既爾將來亦然故曰生覺圓明不化圓種覺即緣覺獨覺二理圓二智明故曰覺曰圓曰明也自計圓滿果德而不能化依然為定性種耳問此上十境前八外道天仙繫綴行人沈溺生死可説為魔後二聲聞辟支皆為佛教正乘縱是定性亦能超出分段若一例判為魔境令人不敢修習倘遇鈍根有失接引豈慈悲心者之所為乎答準華嚴經忘失菩提心修諸善根乃至云志意狹劣不求諸佛大菩提法等皆為魔業況今云違遠圓通背涅槃城非魔業而何哉要知此中意在推重圓通但凡與圓通而作留難者皆為魔業若原依別門修習者不在此例如涅槃無性闡提悉許成佛法華微因散善同為助顯本經若順若逆聖性互通若執辭害意不惟他經有礙而今前後亦有所不能通矣中間所現魔相竟四總結以示警囑二一出由警惕二囑令宣護初阿難如是十種禪那中途成狂因依迷惑於未足中生滿足證皆是識陰用心交互故生斯位衆生頑迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提大妄語成外道邪魔所感業終墮無間獄聲聞緣覺不成增進初躡前出由如是十種魔未起時總屬禪那善境故先以禪那稱之未及圓通皆為中途魔境一起即是成狂謂成就顛狂知見也因依顛狂知見不自覺知故曰迷惑由迷惑故得少為足故曰於未足中生滿足證若究其所以成狂之故非實有外魔來擾故云皆是識陰等謂識陰將開未開時也用心交互者謂用心不純妄念與正念交互而起由斯所以中途作證故云故生斯位位猶證也衆生下警惕顯害而言衆生頑迷不自忖量者警以凡有境界現前當自忖量也又云逢此現前各以所愛而取由於先習迷心者警以凡遇此境當憶本修勿任餘習也今既不自忖量又以先習迷心不復更研妙明故曰而自休息此復有二前八種於自所計果擬是畢竟所歸寧地如第一所歸果乃至第八熾塵果是也後二種於自所證果自言滿足無上菩提如第九趣寂果及與第十湛明果是也此等皆為未得謂得未證言證故云大妄語成雖皆為妄語而害有重輕如前八種外道邪魔現前福德皆以有漏業感所有感業既終報盡必當墮無間獄此約害之重者言之若後二種聲聞辟支現前果證不屬有漏業感報終不墮惟是不成增進此約害之輕者言之雖害有重輕而於三摩提中皆為魔障以能為圓通作留難故二屬令宣護汝等存心秉如來道將此法門於我滅後傳示末世普令衆生覺了斯義無令見魔自作沈孽保綏哀救銷息邪緣令其身心入佛知見從始成就不遭岐路汝等存心者教以留意勿得疏忽也秉如來道句教以自利以秉持如來破魔之道則圓通可成故於我滅後等教以利他良以佛滅度後末法之世正道衰微邪見競興較之如來住世正像流行之時猶在可愍故普令衆生覺了斯義者謂覺了此中途成狂十種差別義也既已覺了則顛狂知見不復更生故云無令見魔自作沈孽言沈孽者謂沈重罪孽如外道邪魔報終墮獄聲聞辟支智隳化城者皆是也由狂見興並非外來故云自作保綏者保綏禪定哀救者哀救行人銷息邪緣者銷息邪見之緣令其身心等現前成就圓通以成就圓通自能轉衆生知見而入佛知見故既已入佛知見則隨所發行安立聖位從此為始漸次成就直至成佛不遭岐路所謂終始地位中間永無諸委曲相也總結辨相令識竟三遵古結勸二一別申三勸二總以結囑初三一勸以取修二勸以辨魔三勸以用呪初如是法門先過去世恆沙劫中微塵如來乘此心開得無上道識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨琉璃內含寶月如是乃超十信十住十行十回向四加行心菩薩所行金剛十地等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得初舉古示勸如是法門句雖近承識陰而義兼前之四陰以四陰先開識陰後盡識陰盡則知前四盡故先過去世恆沙劫中遠指多劫也微塵如來者極言其佛之多故前云此是微塵佛一路涅槃門此云微塵如來乘此心開得無上道良以此之盡魔即是彼之解結同一圓通法門也識陰若盡則一六俱亡真性現前一即一切一切即一故令諸根互相為用言此正見其識陰之當盡耳從互下顯勝當修金剛乾慧不如正脈所説蓋即指信前初乾慧地良以耳根圓通名為金剛三昧乾慧親依此立故特標金剛之名而言從互用中能入者以互用則智慧強勝欲愛始乾枯也圓明精心即指乾慧位體六根互用曰圓明欲愛乾枯曰精心言既入其位必具其體也體必兼用故云於中發化謂即於此圓明精心中發起神通變化所謂獲二勝而發三用也如淨二句約喻言之言圓明精心性具神化不礙發揮運用如淨琉璃內含寶月不礙洞照近遠論悟證已齊佛果故云如是乃超十信十住等其意以乾慧為能超中間諸位為所超亦即以乾慧為能入妙莊嚴為所入與華嚴大同小異以華嚴信前不立乾慧故曰十信滿心攝位證覺是以信位為能超今經十信乃從乾慧開出故并信位亦為所超此小異也大抵圓頓行人總以最初一位即為能超王子出胎足為明喻此大同也正脈云於地特言所行者意表入地乃真修聖位耳皆以金剛利智修斷愚謂此金剛與前乾慧位中金剛二字不同彼指耳根圓通是諸位通依故置十地之首故言金剛十地於等覺而復言圓明者見始終唯此一心但至等覺則發化之極也據此則交師已知等覺位中仍是乾慧之心但始得圓明耳何故前於等覺位後強開乾慧全似不達始獲乾慧之語所謂慣騎馬慣跌腳者其交師之謂歟愚於前文既已改釋此則復因交師之語而附辨之如來稱妙莊嚴海者以萬德莊嚴各盡其妙皆依性海緣起一多無礙重重無盡故圓滿二句乃申明能超能入之義言縱是歷位造修乃至圓滿菩提亦不過圓滿乾慧位中所有功德究無一法從新來者故云歸無所得由此所以能超能入二勸以辨魔此是過去先佛世尊奢摩他中毗婆舍那覺明分析微細魔事魔境現前汝能諳識心垢洗除不落邪見陰魔銷滅天魔摧碎大力鬼神褫魄逃逝魑魅魑魎無復出生直至菩提無諸少乏下劣增進於大涅槃心不迷悶初舉古示勸過去先佛魔境中過來人也奢摩云止毗婆云觀謂先佛世尊於奢摩他止定之中以毗婆舍那覺觀明慧分析辨別微細魔事歷有成證則今之所説亦唯遵先佛儀範非創作也若果能如我所説則魔境現前汝能諳識矣既能諳識不作聖解則心垢洗除魔不得便自不落於邪見網中言此正見其魔境之當識耳陰魔下顯益當辨陰魔者指禪那現境如色陰中之身能出礙等十受陰中之得大光耀等十想陰中之圓定發明等十行陰中之幽清擾動等十識陰中之根隔合開覺知通㳷等十雖是善境亦能致魔正眼觀之即是陰魔也行人若能正觀分明不久自歇即是陰魔銷滅陰魔既已銷滅則觀智益精益明縱有天魔莫當其照自應摧壞其心而殞碎其膽也大力鬼神者魔之臣屬褫猶喪也言天魔尚爾摧碎何況大力鬼神自應褫喪其魄逃逝於十二由旬外矣王臣既爾至於魑魅魍魎諸小鬼神又為魔所驅使自應潛形晦迹故云無復出生據此則內障外障以併潛銷所以能超出諸位直至菩提雖曰超出直至而於諸位功德無諸少乏謂一悟一切悟一證一切證故縱是下劣二乘如識陰魔之後二亦能化其定性勵志增進於大涅槃心不迷悶則辨魔一事豈可輕忽乎哉三勸以用呪若諸末世愚鈍衆生未識禪那不知説法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼呪若未能誦寫於禪堂或帶身上一切諸魔所不能動正法之際佛道方盛人多現量體悟縱有魔事不能為礙像季之時佛道漸衰人猶比量倣效魔事雖繁無足深憂故特約末世言之愚鈍者末世衆生愚迷頑鈍智不明而根不利也智既不明未識禪那中差別境相根既不利不知佛所説辨魔法門自力法力二緣俱缺而乃樂修三昧其猶貨賫衆寶經過險路自無兵杖外絶救援不能不為親厚者所擔憂耳汝恐同邪者恐其不能辨識誤入魔隊即同於邪也教以一心勸者無煩更用他術但以此勸即是却魔之第一法門良以此呪既稱佛頂則最尊最勝既稱陀羅尼則總一切法持無最義故若未能誦者謂設有衆生至愚至鈍無誦讀性故教以寫於禪堂帶於身上示以諸魔不動者以此呪常有金剛藏王菩薩種族并其眷屬晝夜隨侍又有此呪地十二由旬成結界地故別申三勸竟二總以結囑汝當恭欽十方如來究竟修進最後垂範既示辨魔之法又申結勸之義末復教以汝當恭欽則如來反覆叮嚀之意已深切矣然教以恭欽者有二義一者此是十方如來從始至終究竟修進之法當恭敬欽承而修習之此囑以依法成自利行也二者此是十方如來憐愍最後末世垂留儀範當恭敬欽承而宣傳之此囑以依教成利他行也通結詳辨五魔以破三摩中障竟三重明五陰以破禪那中障禪那分中開示菩薩萬行重在事修恐彼圓頓行人溺於理由頓悟乘悟併銷不耐漸修欲廢萬行則成禪那中障今假阿難請問重明五陰邊際末復示之以事非頓除因次第盡既知因次第盡則不廢萬行而禪那中障可破矣三一阿難領旨再問二如來因問重答三結勸開通傳示初阿難即從座起聞佛示誨頂禮欽奉憶持無失於大衆中重復白佛如佛所言五陰相中五種虗妄為本想心我等平常未蒙如來微細開示又此五陰為併銷除為次第盡如是五重詣何為界唯願如來發宣大慈為此大衆清明心目以為末世一切衆生作將來眼初領旨奉持辨魔之玄音方罷當機之神會自形故阿難從座起也聞佛示誨五陰之盡相宛然五魔之行相歷然故當機頂禮如來欽奉法旨願領以自修也憶持無失者謂現在憶念執持當來無忘無失願領以度世也於大下重申三問雖領猶疑故重復白佛所疑無別惟是請益前語故云如佛所言五陰中五妄者如色陰中堅固妄想受陰中虗明妄想想陰中融通妄想行陰中幽隱妄想識陰中虗無妄想依此五種能生枝末故曰為本想心三十年前曾不開演縱有所説亦不過略出名相故云我等平常未蒙微細開示此第一問請細説妄源也又再問也併銷者已得圓通乘悟併銷當體全空故次盡者漸歷諸位以事磨煉次第修治故二為字有自意未決請示於佛之意此第二問請定示頓漸也如是五重者即指五陰詣到也問以詣何為界者是欲知銷到何等地位為色陰邊際乃至銷到何等地位為識陰邊際此第三問請因界淺深也唯願下請利現未如上三問皆為救世急要修證關鍵故求如來發宣大慈而進示之聞之而備悉妄源不墮理障不滯中途故曰清明心目以心地清明則前程不誤如目能辨道也既得清明心目乘願入彼末法之中將如來語傳示後世故云作將來眼二如來因問重答答中二三與問中二三前後交互佛語隨便耳三一答五陰妄源二答因界淺深三答理不廢事初三一總顯由妄二別以取驗三指元結示初三一一切由妄二五陰例知三防問結示初佛告阿難精真妙明本覺圓淨非留死生及諸塵垢乃至虗空皆因妄想之所生起初真本無法精真者不變之體妙明者隨緣之用此約真心體用言之具此體用在迷不迷名曰本覺彌滿清淨中不容他是為圓淨本無衆生及諸器界故云非留死生及諸塵垢死生即衆生果塵垢即是惑業為衆生因此既不留則真中無衆生矣無器界義下文意含乃至下法由妄生乃至二字超略微塵世界以微塵為器界因世界為器界果故言真中既無衆生則死生塵垢皆因妄想不唯死生塵垢即微塵世界乃至所依虗空皆因妄想生起據此則五陰由妄不待言矣二五陰例知斯元本覺妙明真精妄以發生諸器世間如演若多迷頭認影妄元無因於妄想中立因緣性迷因緣者稱為自然彼虗空性猶實幻生因緣自然皆是衆生妄心計度斯指五陰言既一切皆由妄想況夫五陰故曰斯元本覺妙明等也本覺同上上言精真妙明此言妙明真精意顯體用互融非一非異之義此其所依之真也既元一真五陰何有蓋始由一念妄動真妄和合而成阿賴耶識依於此識轉出能見見分依於能見見分轉出所見相分相分之中空界先形故曰妄以發生諸器世間如是空見不分色陰與劫濁並起性摶四大受陰與見濁並起根塵織識想陰與惱濁並起知見欲留業運常遷行陰與生濁並起體中相知用中相背識陰與命濁並起總以不了惟心用諸妄想於境取相展轉妄成故曰如演若多迷頭認影蓋是以演若迷頭喻衆生不了唯心認影狂走喻其間用諸妄想於境取相展轉而起陰濁相也然諸器世間既曰妄以發生則本無所有豈有能生之者故曰妄元無因是知現前五陰唯是妄想二乘不知謬計因緣故云於妄想中立因緣性至於外道邪見撥無因果名為迷因緣者既迷因緣將必謬計自然而有故曰稱為自然其實因緣自然皆為戲論故約彼虗空性而況顯之前云空生大覺中如海一漚發是知虗空猶實幻妄所生況復世界衆生乃至現前五陰又在虗空之中豈有真實故知説因緣説自然皆是衆生妄心計度如前所謂但有言説都無實義是也三防問結示阿難知妄所起説妄因緣若妄元無説妄因緣元無所有何況不知推自然者是故如來與汝發明五陰本因同是妄想初防問恐承上問云現前五陰既以妄想而有若説妄想以為因緣似屬有理何故因緣自然二俱排擯故世尊以此防之佛意以若知妄想有所起處可説妄想以為因緣若妄想元無起處則當體全空若更説此妄想為因緣者則元無所有矣因緣自教尚無所有何況外宗不知因緣推自然者益見其妄之至也是故下結示前於五陰文中發明五陰為五妄想成恐未深信故就此結示謂以是因緣自然二俱非是之故所以如來前來與汝發明五陰本因雖有堅固虗明等五種異稱而同是妄想杳無實體可跟究也總顯由妄竟二別以取驗前明五重妄想皆約根本細相言之但細相深遠人所難知今因阿難重請微細開示乃取現前易知者為例而驗證之五一驗色由妄二驗受由妄三驗想由妄四驗行由妄五驗識由妄初汝體先因父母想生汝心非想則不能來想中傳命如我先言心想酢味口中涎生心想登高足心酸起懸崖不有酢物未來汝體必非虗妄通倫口水如何因談酢出是故當知汝現色身名為堅固第一妄想初示體由想佛意以根本色陰微細難知且約現前色陰言之故曰汝體以體是有質可見即色陰也先惟父精母血赤白和合故是因於父母想生如前云心著行淫男女二根自然流液即其驗也汝心非想等者言父精母血所以能攬為自體者亦由自己想心與父母想心感應和合傳續命根設若自己無想有應無感則不能續命赤白將潰而自體不能成矣如前云異見成憎同想成愛留愛為種納想為胎即其驗也如我下引喻顯妄如我先言者先於想陰中曾舉此喻今復引之也言上雖由想傳命猶有赤白可攬若言其妄似為難知故復引想酢涎生想高酸起二喻以比例之蓋上以易知而例難知此又以至易知者而例上之易知者也心想酢味喻由想傳命口中涎生喻攬滴成體心想二句例知然懸崖不有知足酸之是虗酢物未來信口水之唯妄以此為例則現前色體亦與口水足酸至虗至妄通為一倫故以必非等而反難之謂設若汝體必不與口水足酸虗妄通倫者汝體由想口水足酸不應由想足酸且置口水如何因談酢出是知口水由想既同汝體汝體虗妄亦應同於口水現前之色陰既爾而前之根本色陰例此可知是故下指色結名佛意原以根本色陰難知舉現前色體為例又恐色體難知復引二喻為例既已喻明即就色體結之是故當知者承上色體口水虗妄通倫之故結示阿難教以當知也汝現色身指現前色體言之元無所有舉體惟是妄想所成故直名妄想居五陰之首故名第一而言堅固者澄凝不化之義根本色陰亦猶是也二驗受由妄即此所説臨高想心能令汝形真受酸澀由因受生能動色體汝今現前順益違損二現驅馳名為虗明第二妄想初就喻顯妄上科先舉易知次引最易知者為喻此科承上義便即就最易知者為能例次以易知者為所例總以比例發明顯其虗妄而文勢各別也即此所説者謂即就此上所説之喻為能例故二喻之中單取心想登高之喻故曰臨高想心謂本未臨高唯是想心喻受陰中本無實境唯是受心也唯是想心能令汝形真受酸澀喻唯是受心能動色體現於違順苦樂中庸等相是知違順苦樂中庸等相一同酸澀惟是虗妄下文自見由因下以法貼合由因受生者謂受陰中本無實境推其由因惟是有受心生此合臨高想心能動色體者謂於色體上現於違順苦樂中庸等相此合能令汝形真受酸澀汝今下指受結名順與益現前樂受也違與損現前苦受也二現者苦樂二種現行驅馳者來往相交之相蓋苦樂相交即中庸受也例彼酸澀元無所有其體唯是妄想所成故以妄想名之居色陰之次名為第二言虗明者離身無有唯是覺知虗明根本受陰亦若是也三驗想由妄由汝念慮使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想初融即未分前明根本想陰屬於賴耶中六識種子前文所謂動念是也微細難知故今唯約現前想陰言之現前想陰即是六識中念慮前文所謂浮想是也念慮一動五根俱馳故曰由汝念慮使汝色身此且言融即未分之時唯是虗妄念慮無實體也身非下體通諸識身屬色法念屬心法故曰身非念倫既非念倫不應隨念故難以汝身何因隨念所使種種下乃約體通諸識以釋之也想以取像為性隨境生取其像非一故云種種取像由種種取像能令種種心生如隨其所取之像生起眼識緣色耳識緣聲等此體通五識也心既生已根亦隨之趣境故曰形取由此能令色身時常與念慮相應所謂隨念所使者以此又此念慮寤即想像之心此乃通於散位獨頭寐即為夢之念此又通於夢中獨頭不言通於隨念者攝於五識之中以五識既生明了隨念亦與之而俱生故不言通於定中獨頭者以此經三摩非思惟影像之定獨頭不現行故則汝下指想結名則汝想念者約現前想陰融即未分言之搖動妄情者約現前想陰體通諸識言之同一虗妄念慮無有實體故名妄想居受陰之次名為第三言融通者即以其融即未分體通諸識故也根本想陰雖在第八識中其融即未分體通諸識之義亦若是焉又此與上二雖同名妄想而義有少異言上二陰以妄想所成名妄此想陰以體即是妄名妄也四驗行由妄化理不住運運密移甲長髮生氣銷容皺日夜相代曾無覺悟阿難此若非汝云何體遷如必是真汝何無覺則汝諸行念念不停名為幽隱第四妄想初示相幽隱根本行陰微細難知今約現前行陰驗之故云化理不住化理指現前行陰以是現前身中遷流變化之理性故體屬生滅故云不住雖云不住而前滅後生亦唯運運密移非顯然可見者也既非顯然可見何以知有以有相可驗如人初生之時甲漸漸長髮漸漸生及乎垂老之年氣漸漸銷容漸漸皺誰其使之殆行陰為之也日夜相代者一日一夜之間生滅滅生迭相更代曾無覺悟者從古及今習矣不察如波斯云變化密移我誠不覺梵志云吾猶昔人非昔人耶皆斯意耳阿難下顯體虗妄此若二句謂此行陰設若不是汝心彼應自遷無關於汝云何能令汝體遷變如必二句謂如果必謂是真汝心既能遷變汝體即應自覺汝今云何無有覺知是知是汝非汝二俱叵得則徹體虗妄明矣則汝下指行結名則汝諸行即指現前行陰念念不停是其相也仁王云一念之中有九十剎那一剎那中有九百生滅則念念不停可知徹體虗妄故以妄想名之又以其密移不覺故冠以幽隱之號根本行陰亦復如是五驗識由妄三一由本標末二辨定非真三指識結名初又汝精明湛不搖處名恆常者於身不出見聞覺知離於諸想曰精明無復生滅曰湛不搖是乃於想行盡後別覺有箇精明湛不搖處所謂根本識陰是也體通如來藏性衆生位中離此無別真體故權宗目為恆常而今經前亦暫許亦以其微細難知指在現前故曰於身不出見聞覺知所謂元以一精明分成六和合也然此固以根本難知指在現前亦是以凡夫小乘不知見聞覺知與識精同體故依本標末乃曲為引進意也二辨定非真若實精真不容習妄何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後忽然覆覩前異記憶宛然曾不遺失則此精了湛不搖中念念受熏有何籌算阿難當知此湛非真如急流水望如恬靜流急不見非是無流若非想元寧受妄習非汝六根互用開合此之妄想無時得滅初縱許反難承上既名恆常必計精真故就此縱許若實是精而不雜真而無妄之性者自不容習種妄染於中積聚此定理也何因者反難之詞昔年者遠指往日覩親見也奇異之物親見必偏留心是習種已納識田中矣經歷年歲者謂轉更經歷多年多歲初時猶憶久而便忘又久之則憶忘俱無渾然置之於無何有矣於後者即於憶忘俱無之後前異者仍指昔年奇異之物忽然覆覩者不料而又見也記憶宛然者習氣內熏力故曾不遺失者種子依然在故據此則受熏持種似非精真故以何因等而反難之則此下顯妄非真精了即是精明亦即現前見聞覺知同一無分別性名湛不搖然既許同體無妨即約根本言之念念受熏者謂前念後念受熏持種無有停已也分劑頭數無量無邊故云有何籌算據此則決非精真故特呼阿難之名而教以當知此湛非真也如急流水者正脈云須取無波平流之急水恬安也望如恬靜者以其無波浪之參差無飛湍之上下故流急二句明其正因流急故不可見非真無流喻意蓋謂阿賴耶識所以名恆常者但是以凡小粗心望之其實念念受熏微細生滅無暫停寧只緣其中分劑頭數不可籌算似若不動非真恆常以妄想根元猶未盡故若非下示以應修若非想元等者謂設若此中無有妄想根元寧受妄習所熏此決言其猶有微細妄想故也欲盡此想須待寂滅現前六根互用合開成就一六俱亡之時故約非汝等而反顯之正以見圓通應修六結須解耳三指識結名故汝現在見聞覺知中串習幾則湛了內罔象虗無第五顛倒微細精想佛承上而告之曰未得六根互用不盡想元故汝阿難亦未盡想元人也何以見其未盡想元如汝現在見聞覺知性中能串穿習幾習謂習氣幾微也即是種子以微而未顯故令不遺失者則是湛然明了之賴耶識內一分無明故曰罔象蓋是以賴耶中無明為能串六根中習幾為所串耳和合真如非一非異故曰虗無居四陰之後故曰第五凡夫計為命根二乘認作涅槃無而為有虗而作實故曰顛倒對前四行相粗顯故曰微細雖非妙精明心如第二月故曰精想據此則識陰盡者但盡其妄不盡其真經初首取根性良有以也總結別以取驗竟三指元結示阿難是五受陰五妄想成通名五受陰者隨業所感受此五陰陰覆真性故又依此五種受現世報酬前世業作將來因自相陰覆難出離故亦名五取蘊謂取以為身假集聚故又依此五種取境起業集聚有為無為漏無漏種為來世因故所以五陰不盡不出輪回觀其所由五種妄想以為其本故曰五妄想成此酬阿難細説妄源請也答五陰妄源竟二答因界淺深汝今欲知因界淺深唯色與空是色邊際唯觸與離是受邊際唯記與忘是想邊際唯滅與生是行邊際湛入合湛歸識邊際初按定問意意謂汝今既問如是五重詣何為界意是欲知從識至色相因界限及其中淺深義耶唯色下依次而説正脈云有相為色無相為空是知但盡乎色名淺兼盡於空名深若離色守空祖家謂之墮一色邊唯識謂為空一顯色猶未出乎色陰邊際故凡一切空忍皆非究竟蓋必空色俱亡乃為色陰盡也觸兼苦樂二受離即捨受是知但盡於觸名淺兼盡於離名深若斷觸守離如梵志以不受為宗猶未出乎受陰邊際故凡一切背捨皆非究竟蓋必觸離俱亡乃為受陰盡也有想為記無記為忘是知但盡於記名淺兼盡於忘名深若捨記認忘祖家謂之無心猶隔一重關尚未出乎想陰邊際故凡一切無想皆非究竟蓋必記忘俱捨乃為想陰盡也散心粗行為生定心細行為滅是知但盡於生名淺兼盡於滅名深若離生住滅本經謂之熠熠清擾猶如野馬尚未出乎行陰邊際故凡一切滅定皆非究竟蓋必生滅俱亡乃為行陰盡也湛即第八本識前云湛不搖處是也言湛入者謂依此第八本識旋有念而入無念乃由湛而入故合湛者謂守於無念住於第八本識乃合湛而住故是知由湛而入但盡有念為淺不復住於合湛兼盡無念為深若由湛而入即合於湛古德謂之最後頂墮猶未出乎識陰邊際故凡異熟未空皆非究竟蓋必由湛而入而不合於湛乃為識陰盡也據此則五陰各有邊際盡除仍分淺深及其淺而即住果終不圓盡其際而不知功或浪施道眼貴在無翳果覺必期圓證此阿難所以問以詣何為界而如來兼以淺深答之三答理不廢事此五陰元重疊生起生因識有滅從色除理則頓悟乘悟併銷事非頓除因次第盡我已示汝劫波巾結何所不明再此詢問初正答此五陰元仍指根本五陰以是現前五陰之元故重疊生起者謂因無明不覺而有識識即有作名行行必有動名想由動則有見分虗明名受由見則有空色相形名色乃一重一重相疊而生起也據此則生因識有從細向粗以至於色如人著衣必從內向外而漸著故滅從色除由粗及細而至於識如人脫衣必由外及內而漸脫故已得圓通即齊佛果故曰理則頓悟五陰妄想頓然俱空故曰乘悟併銷但無始習氣遇事便興要必令遇事不興非可頓除是須安立聖位歷事造修方可除滅故曰因次第盡知此意者自然不滯妙悟不撥禪那聖位而解行俱圓矣我已下斥問據前綰巾以示倫次文云六結不同一巾所造令其雜亂終不得成是結解定有倫次今陰盡亦然以陰盡即在結解中故前所已説故云我已示汝劫波巾結前阿難亦云是結本以次第綰生今日當須次第而解於彼既知於此即應理會故責以何所不明再此詢問問前示六結在圓通以前此答漸修在圓通以後何故仍取前之六結為喻答五陰行相即在六結之中六結既解五陰斯盡矣三摩中如是而悟禪那中如是而修次第正等故無妨仍取六結為喻但三摩中盡除唯用定力研磨禪那中盡除兼用事行修治定力研磨唯是伏妄達空事行修治實能斷妄證真此前後異也若剋就聖位而論五陰盡相者色陰盡應在信滿入住之時以信滿入住離幻色生佛家故受陰盡應在住滿入行之時謂住滿入行離妄受趣真修故想陰盡應在行滿入向之時謂行滿入向離妄想向三處故行陰盡應在由加入地之時謂由加入地數量銷滅漸入不動地故識陰盡應在出地等妙之間謂出地入等猶有微細念相至金剛道後則異熟識空而入妙覺位矣細詳本經文義理合如是要知圓頓教乘前後位次淺深開合不得全同不可以他經及古德所判為難也如來因問重答竟三結勸開通傳示汝應將此妄想根元心得開通傳示將來末法之中諸修行者令識虗妄深厭自生知有涅槃不戀三界現前五陰以五重妄想為根元根元不除五陰終不能盡故教以汝應將此妄想根元等也心得開通者了知唯心所現惟識所生離心無體離識無性也自修有據應思利他故教以傳示將來偏言末法者以末法執重五陰難除故唯及修行人者以不知修行不足以語此故令識虗妄者令識唯心無體唯識無性也根元既唯虗妄枝末豈是真實認妄為真浩劫流轉知而不隨故曰深厭自生五陰既盡不生滅性現前即是涅槃真體故曰知有自是隨所發行安立聖位進求無上菩提故曰不戀三界重明五陰意在斯焉自阿難請談七趣以來至此説法復為一周名破障銷礙周即總前三分為一首楞嚴王也按常途首楞嚴翻為究竟堅固以不動不壞為義今經精研七趣唯是自業所招詳辨五魔都緣邪思所致重明五陰總以妄想為根自業所招七趣成而密因壞邪思所致五魔起而了義亡妄想為根五陰覆而萬行頽密因壞則正信不堅了義亡則正解不固萬行頺而真修必墜是始終不堅而有壞也今知自業所招業不造而七趣空邪思所致思無邪而五魔遁妄想為根想離妄而五陰銷七趣空則密因本具而正信堅矣五魔遁則了義現前而正解固矣五陰銷則萬行無滯而真修成矣真修既成妙證必剋據此則生信發解起行證果從始至終究竟堅固不動不壞題中首楞嚴三字義統乎此自阿難請定以來歷談至此為正宗分三流通分正宗既畢現前之利益已成真教當傳未來之津梁須寄俾法海以分流引利水而通潤恩沾沙界化滿塵方功在流通故殿於後焉又序分如首正宗如身流通如足觀其首則生平可品辨其身則膂力堪評無足不行身首空備敘正既釋流通宜詳也三一較量化他功德二顯示自修利益三時衆領教喜散初三一舉例問福二答以無盡三較顯化功初阿難若復有人遍滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度於意云何是人以此施佛因緣得福多不如上開通傳示功德自應無盡故承言若復有人謂設若更有一等人也一方虗空尚不可以思量況復滿十方空則空之無盡可知如是虗空各有七寶縱使不盈亦不可算數況復盈滿七寶則寶之無邊可知以此珍寶但奉一佛其施已廣況復持奉微塵諸佛則財施之廣大可知於此諸佛但能以身承事以財供養已為甚難況復心無虗度則施之外盡其儀內竭其誠可知欲假此福以較流通功德故問以於意云何以此施佛因緣福德不可思議佛不自説欲借當機之口以曉諭會衆故問以得福多不二答以無盡阿難答言虗空無盡珍寶無邊昔有衆生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充遍皆施珍寶窮劫思議尚不能及是福云何更有邊際初按定前施前云滿十方空故虗空無盡又云盈滿七寶故珍寶無邊昔有下另引劣例施佛七錢獲輪王位者如達磨顯宗論云無滅尊者即阿那律昔於殊勝福田諸福田中唯佛為勝因以七錢施設食供後異熟報七返生於三十三天七生人中為輪轉王最後生在大貴釋種餘於阿含等經茲不俱引況復下況顯福多言昔有衆生所供者唯一佛所施者唯七錢較前最為微劣捨身之後猶獲轉輪王位況復現前有人虗空既已窮盡十方佛土又復充遍虗空於中皆施珍寶若論其所施雖窮劫思之議之尚不能及其分量如是之福云何更有邊際此決言其福無邊而德無際也三較顯化功佛告阿難諸佛如來語無虗妄若復有人身具四重十波羅夷瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷能以一念將此法門於末劫中開示未學是人罪障應念銷滅變其所受地獄苦因成安樂國得福超越前之施人百倍千倍千萬億倍如是乃至算數譬喻所不能及初示説應信因下弘經之功甚少滅罪獲福勝前人所難信故預示佛語無虗顯應信也若復下舉人障重若復有人等者謂設若更有此人一身具足小乘四種重罪大乘十波羅夷罪也此是罪之極重於中犯一一罪即應墮獄況復俱犯自應速墮故云瞬息即經此方他方阿鼻地獄等謂先生此方阿鼻具足一劫劫盡更生他方阿鼻如是從一方至一方展轉更生故云乃至窮盡十方無間無間者即阿鼻之華言也靡不經歷者顯十方俱經諸獄備歷總不離地獄中故能以下明持功少能以一念者謂於臨墮之時一念頓悟此法門也既已頓悟又願將此法門於末劫中開示未學禪定者令其同己據此則續佛慧命端賴此人若但論其化迹則其功為甚少以時惟一念經唯一法開示者惟未學故是人下轉苦為樂罪障者即指如上所説四重十棄應念者應其頓悟一念言正當頓悟之時是心作佛是心是佛何障不銷何罪不滅所謂百劫積集罪一念頓蕩除如火焚枯草滅盡無有餘也變其所受等者言不唯自銷罪障且能將此法門開示未學轉魔界為佛界故曰變地獄因成安樂國得福下得福勝前前之施人即指滿空珍寶奉上塵佛人也此人但以一念將此一法開示未學似乎得福無多而乃云超越前人者略有三義一約佛不以奉己為喜惟以度生為喜故二約行不以自利為重唯以利他為重故三約福前是有漏之福此是無漏之福故譬如一顆如意勝似海寶千般一粒還丹壓倒醫方萬品則超越前福無足異也百倍千倍等者言超越前福不但一倍二倍若少説則超越百倍千倍若處中而説則超越萬倍億倍如是展轉多説乃至算數所不及倍譬喻所不及倍總言前人之福任説無邊無際逈不能及於此福之少分耳又此中更有言外況顯之意言極重罪人一念弘經尚能滅罪獲福如此況復輕罪無罪長時流通者其福德詎可思議總結較量化他功德竟二顯示自修利益阿難若有衆生能誦此經能持此呪如我廣説窮劫不盡依我教言如教行道直成菩提無復魔業初誦持利益如上較量已知化他功勝故此復約自誦自持者言之能誦此經者文義雙持能持此呪者心口相應古德云法音經耳功報彌劫一句染神咸資彼岸況夫顯經則文義雙持密呪則心口相應成究竟堅固之因總徹法底源之奧以因驗果功德難思故曰如我廣説窮劫不盡依我下出其所以言既能文義雙持心口相應自能依我教言起自利行如教行道成化他功德則顯密雙修自他兩利如風帆揚於順水若獅弦奏於羣音自然直成菩提無復魔業此功德所以無盡而稱讚所以靡窮也三時衆領教喜散佛説此經已比丘比丘尼優婆塞優婆夷一切世間天人阿修羅及諸他方菩薩二乘聖仙童子并初發心大力鬼神皆大歡喜作禮而去佛説經已者以自阿難請定已來如來歷談四分仍復較量化功稱讚持福以示結勸流通之意所謂所應説者皆已説訖故然其中亦有諸佛作證而説及諸菩薩助化而説捨伴從主故通言佛説也四衆之中敘分唯列比丘餘三或是後來今則俱出者以如來凡説法處必有四衆為內護故天人修羅八部舉三餘亦應有以如來凡説法處必有八部為外護故敘分不出者非所急也至觀百靈護呪中有梵釋四王藥義大將等其必具可見他方菩薩敘分中咨決先來衆及音感後至衆也不言此土菩薩者以此土菩薩類皆分身無數遍十方剎攝在他方中故他方二乘乘通隨喜揀非此土常隨此土常隨攝在四衆中故聖仙童子者內證聖道外現仙迹不壞童真或因隨喜面來或因護呪而至故敘分不例初發心大力鬼神者已發菩提之心乘大神力降魔制外而為外護之衆故皆大歡喜者既聞正宗而知佛道可成喜非尋常深生慶幸也作禮而去者又聞嘉讚而知付囑有在去不徒去作禮領命也總結流通分竟回向偈曰究竟堅固最勝法如佛所説隨分釋見聞隨喜作正因銷我億劫顛倒罪夫惟楞嚴指掌一疏拈華古剎達老和尚愍念後昆愚暗大慈悲心之所注疏而命名指掌者示世界悉檀之益楞嚴經方等部攝五教並談斷證歷三漸次等位生酥毒發轉成醍醐妙味上根利機徹底擔荷鮮有愚暗難領家珍老人徹底悲心發揮實際理地如是玄奧關節處一一剖劂發揮顯露文辭明淺義理奧深命名指掌者指其明淺掌其奧深指者指示掌者掌握經文七處徵心八還辨見示其明指也非汝而誰示其知掌握也法身本具報身修顯掌握性德本具法身非生非滅亦不一異不變隨緣隨緣不變眼見耳聞動手抬足俱是涅槃妙心根本實智性德法身之所顯露楞嚴王三昧無記化化禪之所妙用也指明知覺立知則生死無明根知掌握知覺無覺斯即涅槃果德此理人人本具各各不無自家屋內親生母當人未能承當識認反向他家拜異娘老人發揮指明因地不真老人與釋迦老子同一鼻孔出氣指示述明不生不滅為本修因用始覺之智還復本覺之理掌握圓成果覺也疏立十門通入華屋一門經談二十五聖方便多門掌握皈源居士不二法門設三觀漸次去泥純水示十因六報四重明誨因戒生定因定發慧決定階次五十種陰魔示其邪正真偽去邪去偽掌正握真楞嚴經出塵之寶筏佛果之規範當會阿難尊者大權示現鑒末劫之機離此法範無有出塵之期釋迦老子大圓鏡智徹照無量劫以此無緣大慈愍念當來愚暗衆生示其有所掌握也迷其指失其掌無聞比丘生限地獄明其指觀其掌阿難尊者不歷僧祇獲法身不信其指不識其掌寶蓮香比丘尼淫火燃身順其指睹其掌性比丘尼見佛即證須陀洹果時有學釋居士道眼圓明讀此注疏而悟因果由心造向余嘆曰達者通徹理具法身體大天者天然性德實相理諦達天老人以名召德非此達天老和尚未能述此疏非此疏未能發揮此經非此經未能識此西來大義非明西來義焉能認得本人本具主人公也指示本來人掌握主人翁而命此名也楞嚴注述疏演最多文富義奧上根利智尚且蚊咬鐵橛況愚暗之流藥無貴賤應病者良老人以文字般若指示觀照般若以觀照般若掌握實相般若真為末劫良劑實應愚暗之輩指掌一疏實是開楞嚴經之鑰楞嚴經是開我愚暗輩之鑰理雖頓悟事必漸除躐等皆為邪偽魔眷菩提道果無因三塗有分生遭王難死墮地獄我佛釋迦金口印定也指掌注疏不可不多分布於世儒釋俱能讀誦上上根逢關即過下下根亦能臻其域余聞布施中法施最為第一因自揣力有未足不得不布聞同志儒釋善男信女輕金重法捐助印刷流通此疏汪洋大海無縫寶塔超述此跋以為開指掌之鑰云爾時在大清光緒二十有八年歲次壬寅清和月八日都城通明寺四蓮室愚暗沙門了凡真超氏沐手虔跋
