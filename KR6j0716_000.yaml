body:
  text: 續夢始末余先注法華指掌肇始於雍正二年甲辰脫稿於乾隆十一年丙寅及欲就梓苦力有未充不果後於辛未冬荷蒙和碩莊親王奏放香界寺住持閲明年有遍空元等由岫雲來參請為過講楞嚴正脈初講十門即嫌其駮辨太甚且前後次第與清涼大有徑庭不合賢宗家法至題中繁言亂心如洪闊等八義之類亦私意之所不取因不揣鄙陋輒為籤釋學衆喜其易明請製新疏於是研精竭思三越寒暑草本雖創未及再修又蒙莊親王舉授僧録司副印兼經呪館供職嗣是協辦印務對讀呪經仍復募梓前疏遂於是經新疏無遑問矣癸未夏館事少停避暑山菴即今三山庵也舊名家庵歲久傾圮不蔽風雨拓其基而新之易以今名督工之餘為興懷二子過講是經重訂新疏甫一過又為二子過講金剛般若知無著菩薩昔於覩史多天慈氏尊處親授八十行偈於是有新眼疏經偈合釋之作稿成之日適萬壽戒壇寺度博彚公過訪力任刊行紀其事在乾隆三十年也三十一年丙戌正印秀翁逝世又蒙莊親王升授僧録司正印未幾才不勝任致干舊疾四支不仁難以任事無何乞假還山靜心調養丁亥疾稍可戊子取草本練覆聊可自信擬將募梓旋蒙總管僧道録司皇六子諭令銷假復印兼奏放拈華寺住持嗣是留興子在山庵謄清偕懷子隨拈華校字陸續募資料理壽棗庚寅奉旨照例於圓明園佛樓行走三十六年辛卯恭逢皇太后萬壽盛典賜紫於皇壇供事自惟理以貧子出家何當際斯隆恩深生愧慚無能仰報訖今乾隆四十一年丙申刊刻工竣辭印潛修祝延聖壽答報國恩了此餘年實所願也余先於法華指掌編敘始末有云二十餘年自視若夢期也住此住彼回想若夢中人也幾踰四十萬言皆夢中寱語其間或逆或順皆夢中境界即今編序始末依然夢中説夢然既云夢中説夢則是一夢猶未醒耳今又以二十餘年之工製斯楞嚴新疏豈不是一夢未醒又續一夢也且思如來説法四十九年尚不曾道著一字況是經是疏不足六十萬言又豈能道著一字乎伏望後之讀是經閲是疏者幸勿於中説是説非又作實法會也時乾隆四十一年歲次丙申僧自恣日賜紫沙門賢宗後學通理謹識閲疏凡例是經流傳震旦疏記論解甚夥採金集玉誠讓會解辨脈尋源無偕交光今為接引初機漸入堂奧異彼舊説恐駭新聞宜強周覽勿輕間然是疏自名指掌取其明而且易不避訓詁或涉繁蔓智果超方以任捨繁從要立尚扶壁且須由粗入微勿嫌摘葉尋枝莫便挂一漏十通理資愧學知智無兼人未能遍扣高明博覽古著疏中一言一句多自胸襟流出不善他文未敢輒入非有揀棄勿強是非全經脈絡有綱有目目中復有綱目如世祖父子孫展轉相生曾無少紊若綱之與綱目之與目則如兄弟相次先後適宜依此分科自有層次楞嚴正脈頗得此訣今疏倣之但交師分析過甚多於應續反斷初學不察致義失貫今疏別之是疏為避繁分間有一科之中含攝三二意者若不眉目莫決斷連因於本文用斷之至疏中各標其意如起首則曰初某意釋竟又曰某某下某意等庶不至繁分而節旨判然古疏隨文科目多不俱提如一科分三但標初科即復曲分或入文殊令初學艱於檢對今遵彌陀疏鈔科式分已俱標標已取次會文疏訖仍結某某科竟若相鄰甚近者則不復結為便觀覽不至翻前揭後楞嚴正脈交師用甲乙等字以別科目層次伯亭老人亦多承用今疏全標科目且疏竟仍結前後次第顯然可見故不更置甲乙等字一音圓被異解各呈杵臼繩箕共説象身之似鵠雪貝稻孰明乳色之真因枝尋本各選其由入道從緣不一而足勿謂本疏多事有礙此經廣傳古德著疏間有與私意相符者亦微有採掇若全用其語則標以名字如言正脈云等若少有更換則標唯義取如言正脈義云等蓋不敢掩古之善也金鍮並列玉石互陳具眼者自能辨識不在抑揚按正脈立義雖精駮古太甚致令後學一味在是非裏卜度不知向關節處跟尋迷本昧源其失非細故今疏惟竊取其義而執戈欲鬬之詞槩不敢用又正脈於難處過詳於易處過略唯逗利智不接鈍根今疏於難處不過指授分明於易處亦必略用敷演為令三根俱被利鈍咸宜
