body:
  text: 京都拈華寺賢宗後學達天通理敬述嗣法門人興宗祖旺謄清懷仁祖育較字二約入顯示諸經無此故世間法惟三科今經加此成四若以尋常六入似是開色合心以前五皆色後一是心今則不爾以六入皆約根性言之乃開一心法為六種根性也二一總徵二別示初復次阿難云何六入本如來藏妙真如性復次阿難者重呼當機示以六入義也六入即眼等六根既同五陰許為藏性亦須徵也根以能生為義偏取浮勝能生識故非今經意今經乃指六性入有二義一涉入如下云發見居中二吸入如下云吸此塵象二別示六一眼入二耳入三鼻入四舌入五身入六意入初三一比例顯妄二出名辨僞三承辨結示初阿難即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相即就也目瞪發勞乃色陰中喻今即就之以發明眼入故云即彼又雖云即彼而取義不同以彼惟是喻此則直就目勞說故者字訓人上加之字意則顯矣目字意取見性以性不自顯寄根說故勞字亦該狂華以勞雖瞪發因境顯故曰兼曰與曰同是等者比例發明故此有二義一者比例信真言目中見性本於真性菩提人或易信瞪發勞相亦本於真性菩提人皆難明故云同是菩提佛意以根性本真例彼勞相亦本真也二者比例知妄言瞪發勞相唯是虗妄無實人皆易知目中見性亦惟是虗妄無實人或難信故曰同是瞪勞佛意以瞪勞虗妄例彼見性亦唯妄也二義中比例信真乃是兼釋前疑以前云浮塵幻化其性真為妙覺明體今此瞪發勞相亦屬浮塵幻化前疑未了者於此重釋比例知妄乃是本科正義觀下文即為辨妄可知二出名辨僞二一出名略顯二推因詳辨初因於明暗二種妄塵發見居中吸此塵象名為見性此見離彼明暗二塵畢竟無體初托塵似有明暗相傾故稱妄塵因塵發見還緣於塵故曰居中吸引也謂吸引塵象為自境也正以有此功能得稱見性而言名為者亦顯其唯是幻妄稱相而已此見下離塵實無若論明暗二相恆時相續無有離時所言離者乃指了境惟心觀心忘境境既不有見從何起故曰畢竟無體如耳根中入流亡所動靜不生乃至聞所聞盡正齊乎此六結之中亦唯解得前三結若更能覺所覺空乃至寂滅現前時則本如來藏妙真如性矣是知雖曰無體但為頓了相妄進達性真非同前之識心畢竟破也餘五入准知二推因詳辨二一總標無從二分文各破初如是阿難當知是見非明暗來非從根出不於空生正脈云約世情根出乃為正計餘二防轉計而已二分文各破何以故若從明來暗即隨滅應非見喑若從暗來明即隨滅應無見明若從根生必無明暗如是見精本無自性若於空出前矚塵象歸當見根又空自觀何關汝入此中有四義初承前徵起可知二破從塵來若謂此見從明來者是見以明為因矣既以明為因暗時明滅見即隨滅以無生因故果其隨滅即應不見於暗云何依舊見暗若從暗來等准知三破從根生若謂此見從根生者必無藉於明暗要知無明無暗見精本無自性以離塵無體如上已辨故四破從空出若謂此見於空出者空出入眼前矚塵象固其宜矣然出必有歸若還歸於空反當見根既無是事知非空出又縱許空出亦是空自能觀何關汝入此益見其謬也出名辨僞竟三承辨結示是故當知眼入虗妄本非因緣非自然性三處無從宛同勞相故曰虗妄識是菩提瞪發不瞪則依然菩提故曰本非等也眼入竟二耳入三一比例顯妄二出名辨僞三承辨結示初阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲兼耳與勞同是菩提瞪發勞相雖曰譬如只是作設若義下皆准此上科取瞪目發勞此科取塞耳成勞事義相類隨根異說故目勞以空華為驗如前色陰中說耳勞以虗響為驗故云頭中作聲兼耳與勞等亦是以耳中聞性例塞成勞相顯其本真以塞成勞相例耳中聞性顯其惟妄也若順耳根應云塞發勞相因六性同為賴耶見分有類眼見故通云瞪發二出名辨僞二一出名略顯二推因詳辨初因於動靜二種妄塵發聞居中吸此塵象名聽聞性此聞離彼動靜二塵畢竟無體義皆準上唯根塵異耳二推因詳辨二一總標無從二分文各破初如是阿難當知是聞非動靜來非於根出不於空生亦準上二分文各破何以故若從靜來動即隨滅應非聞動若從動來靜即隨滅應無覺靜若從根生必無動靜如是聞體本無自性若於空出有聞成性即非虗空又空自聞何關汝入此亦有四初承前徵起二破動靜來三破從根生四破從空出若謂此聞於空出者是空有聞矣空若有聞空乃成性空既成性即非是空何言空出又縱許空出亦空自聞何關汝入是知所謂空出者尤為謬妄出名辨僞竟三承辨結示是故當知耳入虗妄本非因緣非自然性耳入竟三鼻入三一比例顯妄二出名辨僞三承辨結示初阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣兼鼻與勞同是菩提瞪發勞相畜縮也鼻中氣息出入自有常度急而畜之則乖常致變畜之既久則自成勞傷矣聞有冷觸即勞所現境如目勞見空華之類因觸分別等者謂因於此觸分別兩孔之中孰為通而虗孰為塞而實如是分別不已乃至微覺有香則分別為何等香微覺有臭又分別為何等臭皆由不知妄勞無實遂致展轉成妄不知妄嗅無實亦復如是故云兼鼻與勞等謂兼鼻中嗅性與畜成勞相同是菩提性上瞪發勞相也比例中二義皆準上知二出名辨僞二一出名略顯二推因詳辨初因於通塞二種妄塵發聞居中吸此塵象名嗅聞性此聞離彼通塞二塵畢竟無體二推因詳辨二一總標無從二分文各破初當知是聞非通塞來非於根出不於空生二分文各破何以故若從通來塞則聞滅云何知塞如因塞有通則無聞云何發明香臭等觸若從根生必無通塞如是聞機本無自性若從空出是聞自當回嗅汝鼻空自有聞何關汝入亦分四義初承前徵起二破通塞來云何發明等者以香臭等觸依通塵現通時無聞自應不能發明三破從根生聞機即指根性以是聞所發動處故四破從空出空出入鼻能嗅香臭等觸若還空時自應回嗅空自有聞等顯縱許尤非出名辨僞竟三承辨結示是故當知鼻入虗妄本非因緣非自然性鼻入竟四舌入三一比例顯妄二出名辨僞三承辨結示初阿難譬如有人以舌䑛吻熟䑛令勞其人若病則有苦味無病之人微有甜觸由甜與苦顯此舌根不動之時淡性常在兼舌與勞同是菩提瞪發勞相以舌取物曰䑛今非取外物惟是䑛自唇吻熟䑛者䑛之再四令勞者令成勞傷苦味甜味皆勞所現境但有病無病異故淡性常在者相形而顯益屬虗僞此亦由不知妄勞無實展轉成妄不知妄知無實亦復如是故取例云兼舌中知性與䑛所成勞同是菩提瞪發勞相二出名辨僞二一出名略顯二推因詳辨初因甜苦淡二種妄塵發知居中吸此塵象名知味性此知味性離彼甜苦及淡二塵畢竟無體甜苦皆動合為一種故及淡為二也知味性即嘗性以是嘗味之知故餘准上二推因詳辨二一總標無從二分文各破初如是阿難當知如是嘗苦淡知非甜苦來非因淡有又非根出不於空生二分文各破何以故若甜苦來淡則知滅云何知淡若從淡出甜即知亡復云何知甜苦二相若從舌生必無甜淡及與苦塵斯知味根本無自性若於空出虗空自味非汝口知又空自知何關汝入亦四義初承前徵起二破從塵來三破從根生四破從空出虗空自味者謂虗空自能嘗味非汝口知者非借汝之口知又空自知者又若必謂從空而出空自能嘗亦唯空自能知尚不借口何關汝入出名辨僞竟三承辨結示是故當知舌入虗妄本非因緣非自然性舌入竟五身入三準前初比例顯妄阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷若熱功勝冷者成熱如是以此合覺之觸顯於離知涉勢若成因於勞觸兼身與勞同是菩提瞪發勞相兩手相觸本無外境唯是冷熱互勝以成相涉之勢是合覺之觸虗妄如是又復以此合覺之觸顯於離知其益為虗妄可知然此科與上四入不同按上四入皆先出根勞次顯境妄此科則先顯境妄次出根勞涉勢二句即出成根勞之義若猶誰也言上來冷熱相涉之勢竟是誰之所成乃因於兩手久觸勞其能觸之根虗妄顯現若乍然一觸冷熱各住自不能相涉矣兼身與勞等准前可知二出名辨僞二一出名略顯二推因詳辨初因於離合二種妄塵發覺居中吸此塵象名知覺性此知覺體離彼離合違順二塵畢竟無體離合違順明是四塵而言二塵者正脈云違順即合離中之違順故惟二塵蓋或離或合覺苦即是違覺樂即是順也二推因詳辨二一總標無從二分文各破初如是阿難當知是覺非離合來非違順有不於根出又非空生二分文各破何以故若合時來離當已滅云何覺離違順二相亦復如是若從根出必無離合違順四相則汝身知元無自性必於空出空自知覺何關汝入亦四義初承前徵起二破從塵來云何覺離下似有闕文具足應云若離時來合當已滅云何覺合離合二相既爾違順二相准知故云亦復如是三破從根出四破從空出出名辨僞竟三承辨結示是故當知身入虗妄本非因緣非自然性身入竟六意入三準前初比例顯妄阿難譬如有人勞倦則眠睡熟便寤覽塵斯憶失憶為忘是其顛倒生住異滅吸習中歸不相踰越稱意知根兼意與勞同是菩提瞪發勞相勞倦睡熟皆指意根謂意根勞倦不耐緣境則妄現眠相意根睡熟不甘滯寂則妄現寤相此皆約忽寐忽覺言之非夜寐晝覺也以夜寐晝覺雖曰虗妄人所難知故取此至虗至妄者比例令易知故憶忘即生滅二塵然亦眠寤皆具如寤則歷覽法塵斯能記憶屬生偶爾失於記憶則名為忘屬滅眠則夢覽習塵亦名記憶偶爾夢沈境寂亦名失憶然睡眠既依勞現而因眠現寤亦名為勞況夫於中轉現憶忘真為妄之至矣忽寐忽寤憶忘不清故是顛倒生住異滅唯識云本無今有名生生位暫停名住住別前後名異暫有還無名滅正脈云初憶名生正憶名住始忘為異忘盡為滅據此則雖曰四相亦惟是二以住即生際異即滅際故吸習中歸者謂雖曰顛倒亦能吸取習境中歸於內且四相歷然前後不相踰越亦屬意中知性故曰稱意知根兼意與勞等亦准前二出名辨僞二一出名略顯二推因詳辨初因於生滅二種妄塵集知居中吸撮內塵見聞逆流流不及地名覺知性此覺知性離彼寤寐生滅二塵畢竟無體此中生滅二塵與上科憶忘不同上科憶忘約勞倦忽寐忽寤時說此中生滅約平常有記無記時言集者招致義謂由生滅二塵招致意根中性故又前五向外云發知性在內名集集之為言止也吸撮者引取義內塵即是法塵復有二相見聞逆流即生塵之相見聞者所見所聞舉二塵該餘三也五塵已謝所餘習影反落意地故云逆流流不及地即滅塵之相謂見聞逆流不能及於意地意則唯緣滅相也正以有此功能相似有體故立覺知之名寤寐生滅者寤中寐中各有生滅離此無體明知虗妄二推因詳辨二一總標無從二分文各破初如是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生二分文各破何以故若從寤來寐即隨滅將何為寐必生時有滅即同無令誰受滅若從滅有生即滅無誰知生者若從根出寤寐二相隨身開合離斯二體此覺知者同於空華畢竟無性若從空生自是空知何關汝入此有五義初承前徵起二破寤寐來文缺破寐來義可例思故三破生滅有受者領以為境即知義也四破從根出根指肉團心也故下言身以肉屬身分攝故破意以若從根出自應不關寤寐但寤寐二相乃隨身肉開合以肉根如蓮華狀開則成寤合則成寐設許不關寤寐亦應不關開合何言根生且若離斯寤寐二體而此覺知亦同空華無性以不能緣生滅二種塵故五破從空生可知出名辨僞竟三承辨結示是故當知意入虗妄本非因緣非自然性因塵立名則名惟假有從緣辨體則體本無生名體既其非真意入由來虗妄然妄不自妄依真而起事不自事攬理而成要知因水成波無庸撥波覓水果了緣金成器自能就器得金故云本非因緣非自然性約入顯示竟三約處顯示二一總徵二別示初復次阿難云何十二處本如來藏妙真如性徵意准上十二處謂六根六塵也處者方所義謂眼唯對色耳惟對聲等各有方所又定在義謂根一定在內塵一定在外各有定在亦名十二入謂取境則以根入塵受境則以塵入根通為能入亦通為所入對陰對界此為迷於色不迷於心者開色合心又為中根人聞中得悟者說也二別示六一眼色二處二耳聲二處三鼻香二處四舌味二處五身觸二處六意法二處初三一現前定處二就處辨妄三承辨結示初阿難汝且觀此祇陀樹林及諸泉池教以且觀者定能見根處樹林泉池者定所見塵處二就處辨妄二一雙徵兩計二分文各破初於意云何此等為是色生眼見眼生色相首句總相徵此等下分別徵也舉根兼塵故曰此等離色則見無可表似是色生眼見離見則色無可憑似是眼生色相二俱非實故爾分徵至下乃各為詳破二分文各破二一破眼生色相二破色生眼見初阿難若復眼根生色相者見空非色色性應銷銷則顯發一切都無色相既無誰明空質空亦如是初正破生色破意以若計眼根生色相者當其見空之時非是色相而眼根中生色之性應即銷滅然色性既銷則滅性顯發一切色相應都無所有若爾則不惟無色亦復無空以空乃待色而顯色相既無無所待故誰明空質謂縱有空質誰復能明哉是知所謂眼生色相者謬矣末句例破生空例上應云若復眼根生空相者見色非空空性應銷銷則顯發一切都無空相既無誰明色質為避文繁故總取例云空亦如是謂眼生空相亦如生色中破問據前徵詞但云眼生色相而此各破必例破生空者何也答空亦是色生則俱生破須俱破方得無疑二破色生眼見若復色塵生眼見者觀空非色見即銷亡亡則都無誰明空色破意以若計色塵生眼見者當其觀空之時非是色相是生見之因已滅而是見即應銷亡然見既銷亡則都無所見既都無所見誰明空色謂縱有空色誰復能明哉是知所謂色生眼見者亦謬矣準上科亦應云空亦如是謂空生眼見亦如色生中破文中無者準上可知故就處辨妄竟三承辨結示是故當知見與色空俱無處所即色與見二處虗妄本非因緣非自然性見即根處色空皆塵處俱無處所者以眼不生色則色無處所色不生眼則見無處所此且明其無內外處即色與見等者言不惟無處即彼二處之體亦屬虗妄以本惟一性此性非因緣非自然起心即錯動念即乖喚誰名見及於色空眼色二處竟二耳聲二處三一現前定處二就處辨妄三承辨結示初阿難汝更聽此祇陀園中食辦擊鼓衆集撞鐘鐘鼓音聲前後相續聽即根處此祗下皆塵處食辦集衆故擊鼓衆集受齊故撞鐘今之叢林擊梆鳴牌者鎚隨國變故二就處辨妄二一雙徵兩計二分文各破初於意云何此等為是聲來耳邊耳往聲處聞不自聞因聲故有或計聲來耳邊聲不自聲因聞故有或計耳往聲處二計俱非故須徵破二分文各破三一破聲來耳邊二破耳往聲處三破無來無往初阿難若復此聲來於耳邊如我乞食室羅筏城在祇陀林則無有我此聲必來阿難耳處目連迦葉應不俱聞何況其中一千二百五十沙門一聞鐘聲同來食處初牒聲來耳如我下法喻合辨喻中如來乞食城中林裏則無法中聲來阿難耳邊餘耳則無故連葉應不俱聞今既不爾則法喻不齊矣何況下極顯其謬意以連葉俱聞則法喻不齊何況衆多沙門一聞同來尤見其不齊之甚是知所謂聲來耳邊者謬也二破耳往聲處若復汝耳往彼聲邊如我歸住祇陀林中在室羅城則無有我汝聞鼓聲其耳已往擊鼓之處鐘聲齊出應不俱聞何況其中象馬牛羊種種音響初牒耳往聲如我下法喻合辨喻中如來歸住林中城裏則無法中耳往擊鼓之處鐘處則無故齊出應不俱聞若俱聞者亦法喻不齊矣何況下極顯其謬意以鐘聲齊出則應不能俱聞何況象馬牛羊種種音嚮益應不能俱聞今既不爾是知所謂耳往聲邊者亦謬也三破無來無往若無來往亦復無聞恐聞來往不成轉計無來無往故為此破若謂聲亦無來耳亦無往則是根塵各住自不成聞如二人一在林中一在城裏兩不相到自不能和合成事是知所謂無來往者益謬也必兼此破者以有來有往固是權宗因緣無來無往尤屬外計自然權宗尚破外計安留又破有來往則生不可說破無來往則不生不可說生與不生俱不可說乃成真無生義就處辨妄竟三承辨結示是故當知聽與音聲俱無處所即聽與聲二處虗妄本非四緣非自然性聲不來耳則耳處不現耳不往聲則聲處不現故云俱無處所況復無來無往又不可說真為徹體虗妄二處叵得果到不可得處自見非因緣非自然性矣耳聲二處竟三鼻香二處三一現前定處二就香辨妄三承辨結示初阿難汝又嗅此爐中栴檀根塵可知栴檀義翻與藥嗅之能除病故此方所無故無正翻二就香辨妄二一顯異徵生二分文各破初此香若復然於一銖室羅筏城四十里內同時聞氣於意云何此香為復生栴檀木生於汝鼻為生於空二十四銖為一兩一銖惟四分餘也漢張華志云西國使獻香者漢制不滿斤不得受使乃私去著香如大豆許在宮門上香聞長安四十里經月乃歇今則不惟香四十里且言同時聞氣誠異香也徵生之義可知二分文各破三一破從鼻生二破從空生三破從木生初阿難若復此香生於汝鼻稱鼻所生當從鼻出鼻非栴檀云何鼻中有栴檀氣稱汝聞香當於鼻入鼻中出香說聞非義初約生定出鼻不蒙煙似生於鼻故先破鼻生稱生當出者以生即出生義故鼻非下體用相違鼻非栴檀者肉體也肉體不應有檀氣之用故難以云何有也稱汝下名義不符入香為聞故曰稱聞當入今不入而反出故難以說聞非義然既展轉成謬則此香不從鼻生明矣二破從空生若生於空空性常恆香應常在何藉爐中爇此枯木既不蒙烟又不生鼻似生於空故次破空生空即鼻中空也體同大虗故曰常恆能生則一切時生故香應常在設許常在仍墮自然故難以何藉爐中爇此枯木正顯其猶待緣也三破從木生若生於木則此香質因爇成烟若鼻得聞合蒙烟氣其烟騰空未及遙遠四十里內云何已聞香生於木常情共計也恐阿難為避常情或計從鼻從空今二計俱破將必還歸常情故即破木生若謂此香生於木者則此香之木質不能通鼻須是因爇成烟乃可通於鼻也若果烟通於鼻而鼻得聞者則鼻中合蒙烟氣設許蒙烟仍墮因緣故難以其煙騰空未及遙遠即盡四十里內云何已聞正顯其不藉緣也就香辨妄竟三承辨結示是故當知香鼻與聞俱無處所即嗅與香二處虗妄本非因緣非自然性香塵處鼻根與聞性合為根處下嗅字亦兼鼻與聞然根塵相依猶若交蘆破一則二俱不成香無生體如上已辨根無所偶自然不立故即承此結示餘義准前可知鼻香二處竟四舌味二處三一據常定處二就味辨妄三承辨結示初阿難汝常二時衆中持鉢其間或遇酥酪醍醐名為上味日日如是曰常二時者早食午食時也正脈云此中舌處不顯寄隱遇字之中二就味辨妄二一總徵生處二分文各破初於意云何此味為復生於空中生於舌中為生食中二分文各破三一破從舌生二破從食生三破從空生初阿難若復此味生於汝舌在汝口中祗有一舌其舌爾時已成酥味遇黑石蜜應不推移若不變移不名知味若變移者舌非多體云何多味一舌之知初按定生舌味唯舌知或計生於舌中故此按定在汝下據一為破一口一舌世間共許也爾時者指遇酥時言遇酥之時舌上覺有酥味是舌已成酥酪味矣石蜜者沙糖類言一舌已生酥味縱遇石蜜應不推遷變移轉生蜜味如樹生果生酸生甜應一定也若不下展轉顯謬恐聞應不推移遂計不移若果不移失隨緣義故以不名知味破之言舌以知味為性不移則常是一味餘無所知豈成知味之舌此一謬也又恐聞不移被破轉計變移若果變移失不變義故以舌非多體等破之言既曰變移遇酥則能生酥味遇蜜則能生蜜味若爾則應有多舌如多果須依多樹而生今舌既非多體云何多般之味一舌之知所能遍生此又一謬也既展轉成謬則味非舌生明矣二破從食生若生於食食非有識云何自知又食自知即同他食何預於汝名味之知初正破常計常情共計味生於食故為此破若謂味生於食者則不假舌根矣不假舌根還同無味以食非有識云何自知有味是味必由舌現不應屬食生也又食下兼防謬執恐聞食非有識云何自知猶未心服故為此防又汝必謂食能自知不須汝舌者即同他食一般有何千預於汝而名汝舌為味家之知此益見其謬也三破從空生若生於空汝噉虗空當作何味必其虗空若作鹹味既鹹汝舌亦鹹汝面則此界人同於海魚既常受鹹了不知淡若不識淡亦不覺鹹必無所知云何名味初按生徵味食生舌生二計俱破或計味從空生故按定令噉意以生味必能具味具味應可噉知故徵其當作何味必其下約鹹以破言舌向於空既鹹汝舌面向於空亦應鹹於面若爾則此界中人身在虗空皆應同於海魚全體皆鹹豈理也哉既常下展轉顯謬言設許同於海魚則應常時受鹹故難以既常受鹹了不知淡然鹹淡乃相待而顯若果不識淡者則應亦不覺鹹以無待故既鹹淡二俱不覺是必全無所知云何又以酥酪醍醐名為上味就味辨妄竟三承辨結示是故當知味舌與嘗俱無處所即嘗與味二俱虗妄本非因緣非自然性根塵相依破一則二俱不立故俱無處所唯是虗妄人惟不知虗妄所以不見真實若果知是虗妄忘塵遺根即二處而見本非因緣非自然性矣舌味二處竟五身觸二處三一據常定處二就知辨妄三承辨結示初阿難汝常晨朝以手摩頭灌頂引律云佛常戒敕弟子一日三摩其頭默自誦云守口攝意身莫犯如是行者得度世又引遺教經云汝等比丘當自摩頭已捨飾好著壞色衣執持應器以乞自活自見如是若起貪慢當疾滅之阿難遵制日日行之故云汝常等也此中塵處不顯寄隱摩字之中以頭手皆屬身根唯正摩時所現痛癢等相名之為觸下云此摩所知所知即痛癢等相也正脈云鼻香二處與此二處皆有取例之意言彼以鼻不蒙煙同時俱聞知香塵之虗妄用例諸香此以本無外境頭手假摩知摩觸之虗妄用例諸觸亦是以易知例難知也二就知辨妄二一雙徵兩在二分文各破初於意云何此摩所知誰為能觸能為在手為復在頭此摩所知者謂當此正摩之時自有所知之觸既有所知之觸自有能觸之知但不知頭之與手誰為能觸故徵其能為在手為復在頭此中能觸觸字宜訓覺義二分文各破二一正破兩在二兼防謬辨初若在於手頭則無知云何成觸若在於頭手則無用云何名觸初破能在手言一身秪有一知若謂能觸之知在於手者頭上則應無知云何正摩之時頭上宛然有知得成觸相是能觸不專在於手也若在下破能在頭若謂能觸之知在於頭者手上則應無用又云何正摩之時手上依然有用得名能觸是能觸不專在於頭也二兼防謬辨若各各有則汝阿難應有二身若頭與手一觸所生則手與頭當為一體若一體者觸則無成若二體者觸誰為在在能非所在所非能不應虗空與汝成觸初防頭手各有辨恐聞頭手互無之破遂謬辨云頭上手上各各有一能觸之知故為此防言一身一知世間共許若謂頭上手上各各有者則汝阿難有二知矣既有二知應有二身否則世間相違若頭下防頭手共一辨恐聞應有二身之破又謬辨云雖頭手各各有知皆是一箇能觸之所生起故無妨唯是一身故為此防若謂頭上之知與手上之知皆是一箇能觸之所生起者則手上之知與頭上之知當為一體若果是一體者觸塵則無所成以有能無所故也若二下防所生成二辨恐聞觸則無成之破又謬辨云雖頭手之知皆為一觸所生生已則成二體故為此防若謂生已成二體者觸塵當誰為在若在能摩之手非在所摩之頭若在所摩之頭非在能摩之手云何正摩之時頭上手上各有觸塵相現莫是虗空與汝成觸以補觸之不足耶據理而論不應虗空與汝成觸以虗空無質故也就知辨妄竟三承辨結示是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性初則因所徵能如云此摩所知誰為能觸等次則以能破所如云若在於手頭則無知云何成觸等究竟能既不存如各有共一皆不能成所亦不立如不應虗空與汝成觸故曰覺觸與身俱無處所覺觸謂所覺之觸即前此摩所知塵處也身謂能覺之身即上頭之與手根處也餘可準思身觸二處竟六意法二處三一據常定處二就法辨妄三承辨結示初阿難汝常意中所緣善惡無記三性生成法則意兼色心二根及與知精根處也所緣善惡等即塵處也此中三性且指前五識所具如前五根緣善境界識中則有善性現起緣惡境界識中則有惡性現起緣無記境識中則有無記性現起名為善惡無記三性依此三性生起善惡無記影子而成法塵依然善惡無記各有條則不相紊亂名為生成法則是知法塵條則依三性生成為意根所緣故云汝常意中所緣等也二就法辨妄二一雙徵即離二分文各破初此法為復即心所生為當離心別有方所法即法塵是無表色心指意根亦兼知性即心離心者言法塵既是無表依論明其為非色非心聚然既曰非心則不即乎心既曰非色又似不離乎心故此雙徵次下乃為俱破二分文各破二一破即心所生二破離心別有初阿難若即心者法則非塵非心所緣云何成處即心則屬有知故非塵非塵亦屬能緣故非所唯能無所絶於對待故不成處二破離心別有若離於心別有方所則法自性為知非知知則名心異汝非塵同他心量即汝即心云何汝心更二於汝若非知者此塵既非色聲香味離合冷暖及虗空相當於何在今於色空都無表示不應人間更有空外心非所緣處從誰立初按定雙徵謂按定離心雙徵有知與無知也知則下先破有知謂設言有知則名為心但不知為異於汝為即於汝若異於汝者應當是塵而今却名心非塵據此則同他人心量非汝所緣亦不成處若即於汝者應當即是汝心而今却離心別有云何既是汝心更有二體於汝心之外此益見其謬也若非下次破無知非猶無也謂設若離心而又無知者亦應有所在處然此塵既非色香等五塵之色離合冷暖皆觸塵也及五塵外虗空之相畢竟當於何在今於色之與空一一推求都無表顯指示之處莫非猶在色空外耶但色外即空不應說人間更有空外據此則離心不有還應是心但心非所緣處從誰立已於即心中辨詳此中心非所緣二句應在上段同他心量之下或筆授錯簡請截此續彼則彼義既周而此文不贅矣就法辨妄竟三承辨結示是故當知法則與心俱無處所則意與法二俱虗妄本非因緣非自然性法則者外處也既即心離心展轉謬妄則外處不成外既不成對誰立心名之為內故云俱無處所然畢竟如何若分別不了則意之與法二俱虗妄若直下無心則意之與法本惟一非因緣非自然性矣約處顯示竟四約界顯示二一總徵二別示初復次阿難云何十八界本如來藏妙真如性徵意可知十八界謂六根六塵六識也界者依俱舍名種族義如彼頌云聚生門種族是蘊處界義蓋聚為積聚即是蘊義以能積聚有為法故生門即是處義以是生長諸識門故種族即是界義論有二釋一種者生本義謂十八界為同類因各生自類等流果故是生法本二族者族類義謂十八法族類自性各別不同故以族攝類今釋界亦二義一者因義謂根塵識三和合造業為生死因故二者限義謂根塵識三各有界限不相紊亂故佛欲破中邊界顯空藏體斷生死因示真如果故先總徵次下乃三三別示此為心色俱迷者開色開心又為下根人開廣得悟者說也二別示六一眼色識界二耳聲識界三鼻香識界四舌味識界五身觸識界六意法識界初三一據權定界二就識辨妄三承辨結示初阿難如汝所明眼色為緣生於眼識如汝所明者有二義一者單就阿難以阿難於破識文中曾引是語縱許其已能明故二者通約權教謂如汝權教所明以根塵生識是昔權教之所說故二義之中後義理長以下諸界中耳聲為緣生於耳識等阿難所不曾引故正脈云彼所謂眼根色塵內外相對於其中間生於眼識內外中間故成三界矣下皆倣此二就識辨妄獨就識辨者以根塵相對識生其中如三家比鄰而住若撤其中家界墻則左右兩家界限俱不成矣又按正脈入處界三科破法有三種差別一者約緣破言不局本法廣破外緣也如滅火不徑撲火但抽去其薪火自滅矣以火無自體也二者更互破言二法相依而立即須更互破之如蛟水相依兩皆為患除之者驅蛟絶水之本泄水破蛟之居也三者從要破此有兩種一者二法從要破如兩木相倚而立但推倒一邊二俱倒矣二者三法從要破如筋角膠三合為弓而膠為其要但除去其膠則筋角皆不成弓矣詳前六入破法全是約緣以塵即其緣也十二處中眼色耳聲四處乃更互破身觸二處則獨約根破餘六處獨約塵破皆二法從要破也此十八界中破法全是三法從要以三法中唯識為要也然文雖從要而意實並破非同六入正意在根詳其結處可見二一指識徵界二分文各破初此識為復因眼所生以眼為界因色所生以色為界此識者指定所生之識為復等徵其以何為界良以根塵各有別名而識則無之若不係以根塵則無所分別然諸經多明係根今以權教根塵皆能生識則應二係不定故雙約根塵而徵其以何為界意以因眼所生則名眼識界因色所生准知二分文各破三一破係根不成二破係塵不成三破兩係不成初阿難若因眼生既無色空無可分別縱有汝識欲將何用汝見又非青黃赤白無所表示從何立界初正破係根若謂此識因眼生者應不藉乎色空要知既無色空無可分別謾說不能生識縱許能生有汝之識欲將何用用處尚無憑何說識是明知非因眼生汝見下預防謬辨恣聞根生之破遂謬辨云所言因眼生者非指色根乃指見性故為此防意以凡言立界必有色相可憑縱因見生汝見又非青黃赤白無可表示識將從何立界是知所謂眼識界者唯謬稱耳二破係塵不成若因色生空無色時汝識應滅云何識知是虗空性若色變時汝亦識其色相遷變汝識不遷界從何立從變則變界相自無不變則恆既從色生應不識知虗空所在初正破係塵若謂此識因色生者離色應不能生要知色有變滅變滅則空若到空無色時汝識無因則應斷滅斷滅則並空亦不應識而於色變滅時云何識知是虗空性是明知非因色生若色下預防謬辨恐聞云何識空之難遂謬辨云識因色生色變而識自不變云何不許識空故為此防若謂色遷變時汝亦識其色相遷變是汝識自不遷矣縱許不遷亦不成界以離色無憑界從何立是知所謂色識界者亦謬稱耳從變下遮止矯亂恐不遷被破遂矯亂云從變又恐從變被破遂矯亂云不變故遮止云若謂從變則應變滅無體如是則界相自無不勞費詞矣若謂不變則應性自常恆常恆則既從色生惟應識色應不識知虗空所在既皆不爾惟是矯亂豈真有色生之理哉三破兩係不成若兼二種眼色共生合則中離離則兩合體性雜亂云何成界恐聞根生塵生二俱不成遂計共生故為此破若謂此識兼於二種為因乃內眼外色和合共生者要先審定此識為與根塵合耶為與根塵離耶若與根塵合者則中間之識自應離而為二半合於眼則屬有知半合於色則屬無知而體性亂矣若與根塵離者則中間之識應是眼之半分色之半分兩半合成有知與無知不分如水與土和合成泥而體性雜矣既雜且亂云何得成中界就識辨妄竟三承辨結示是故當知眼色為緣生眼識界三處都無則眼與色及色界三本非因緣非自然性以是各生共生俱不得成之故當知昔教所謂為緣生識者三處都無以中既不有內外何分若因枝尋本則此眼與色及色界三當體即是非因緣非自然性正脈云色界者色識界也此係塵以為別名而又略一識字下二科倣此眼色識界竟二耳聲識界三一據權定界二就識辨妄三承辨結示初阿難又汝所明耳聲為緣生於耳識二就識辨妄二一指識徵界二分文各破初此識為復因耳所生以耳為界因聲所生以聲為界二分文各破三一破係根不成二破係塵不成三破兩係不成初阿難若因耳生動靜二相既不現前根不成知必無所知知尚無成識何形貌若取耳聞無動靜故聞無所成云何耳形雜色觸塵名為識界則耳識界復從誰立初正破係根若謂此識因耳生者自應不藉動之與靜要知動靜二相既不現前唯根不能成知必至空空洞洞一無所知矣然識因知顯今知尚無成縱生於識有何形貌可憑是明知其不因耳生若取下預防謬辨恐聞知尚無成識何形貌之破遂謬辨云意識乃憑乎知耳識惟憑於聞無知有聞便可生於耳識故為此防若取耳中聞性能生識者亦應不藉動之與靜要知無動靜故聞性亦無所成聞尚無成況復生識自然不能云何下兼防轉謬恐聞無動靜故聞無所成之破又轉謬云但取耳形生識有何不可故為此防言能生所生因果必然相類識能分別屬於有知耳形雜色觸塵屬於無知耳形以四塵為體謂色香味觸也文中舉二餘以塵字該之若以耳形雜色觸塵者名為生識之界因果不類故難以云何等也末二句乃總以結難之語言耳生聞生二俱非理則世間所稱耳識界者復從誰立是惟幻妄稱相而已二破係塵不成若生於聲識因聲有則不關聞無聞則亡聲相所在識從聲生許聲因聞而有聲相聞應聞識不聞非界聞則同聲識已被聞誰知聞識若無知者終如草木初正破係塵若謂此識生於聲者是識乃因聲而有應不關乎耳聞要知聲因聞顯果其無聞則亦亡失聲相所在聲相尚無云何生識固知其不能也識從下預防謬辨恐聞無聞亡聲之破遂謬辨云此識固是因聲而有而能生之聲却是因聞而有如因祖生父因父生子於理極成可無詞矣故為此防若謂此識定從聲生但許此聲因聞而有聲相若爾則聞聲亦應聞識以識從聲生則聲中有識聞應俱聞也不聞下展轉顯謬有四一不聞非界謬設謂但能聞聲不能聞識則是聲中無識聲中無識自非生識之界二聞則同聲謬設謂聞聲實能聞識則是識亦同聲乃被耳所聞矣三被聞無知謬言耳之所聞惟識能知今識已被聞應無能知之者故難以誰知聞識四人同草木謬若謂聞識無有知者以斯為例則聞聲亦無有知既都無所知則汝當終如草木非有情類矣三破兩係不成不應聲聞雜成中界界無中位則內外相復從何成恐聞耳生聲生二俱不成遂計和合共生故為此破若計此識和合共生者則是聲之與聞交雜而成中界以義求之不應如是以雜則不分不得成中故然識界既無中位則耳界內相聲界外相復從何成是三處皆不成矣就識辨妄竟三承辨結示是故當知耳聲為緣生耳識界三處都無則耳與聲及聲界三本非因緣非自然性釋義準上耳聲識界竟三鼻香識界三一據權定界二就識辨妄三承辨結示初阿難又汝所明鼻香為緣生於鼻識二就識辨妄二一指識徵界二分文各破初此識為復因鼻所生以鼻為界因香所生以香為界二分文各破三一破係根不成二破係塵不成三破兩係不成初二一徵鼻兩問二逐一為破初阿難若因鼻生則汝心中以何為鼻為取肉形雙爪之相為取嗅知動搖之性若因句按定鼻生則汝句徵何為鼻為取下雙開兩問肉形指浮塵根後云浮根四塵是也雙爪指勝義根後云清淨四大如雙垂爪是也嗅知指能嗅之性動搖指所嗅之香未到識地差別未分但有動相能嗅能知於此者即是根性後云嗅精映香是也二逐一為破二一約以肉為鼻破二約以嗅為鼻破初若取肉形肉質乃身身知即觸名身非鼻名觸即塵鼻尚無名云何立界肉形亦該雙爪以粗細雖異體同四塵故破意以若取肉形為鼻者肉形之本質乃名為身或取身之所知身之所知者即名為觸肉質既名為身即非是鼻身知既名為觸應即是塵是二者俱無鼻之名矣鼻尚無名云何依之生識而立鼻識界名是惟虗妄耳二約以嗅為鼻破三一正破三義二預防謬辨三兼防轉謬初若取嗅知又汝心中以何為知以肉為知則肉之知元觸非鼻以空為知空則自知肉應非覺如是則應虗空是汝汝身非知今日阿難應無所在以香為知知自屬香何預於汝初總徵以何為知嗅知者嗅知動搖性也性非無體故徵以何為知以肉下先破以肉為知以肉為知者謂以肉之所知為嗅知性也但嗅知屬鼻則肉之所知元是觸而非鼻如我上云身知即觸名觸即塵豈得無嗅知性乎以空下次破以空為知以空為知者謂以鼻中之空為嗅知性也但空若有知空則自知鼻肉自應非覺覺亦知也如是則應虗空是汝汝身非知以鼻空有知例知一切空皆有知故虗空是汝鼻肉非覺例知全身肉皆非覺故汝身非知據此二義則今日阿難應無所在以虗空是汝空無在汝亦無在汝身非知縱有在亦不自覺豈理也哉以香下後破以香為知以香為知者謂以鼻中香為嗅知性也但香若有知則知自屬香何預於汝而名汝之知性預猶干也二預防謬辨若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及栴檀木二物不來汝自嗅鼻為香為臭臭則非香香應非臭恐聞何預於汝之破遂謬辨云知雖屬香香氣却生於鼻何言不預於我故為此防若謂香生於鼻例知臭亦生鼻是必生汝鼻矣但世間共許臭氣生伊蘭香氣生栴檀今必謂生汝鼻者則彼二種流動之氣不生於彼二物決無是理請試驗之如二物不來之時汝自空嗅於鼻為香為臭臭則不能生香香應不能生臭是知所謂香臭氣必生於鼻者謬也觀佛三昧經云末利山中有伊蘭樹臭若肨尸熏聞四十由旬其華紅色甚可愛樂若有食者發狂而死牛頭栴檀發生伊蘭叢中未及長大如閻浮洲竹笋不能發香仲秋月滿卒從地生成栴檀樹衆人皆聞栴檀妙香永無伊蘭臭惡之氣三兼防轉謬若香臭二俱能聞者則汝一人應有兩鼻對我問道有二阿難誰為汝體若鼻是一香臭無二臭既為香香復成臭二性不有界從誰立初防俱聞俱生謬恐聞臭則非香香應非臭之破遂轉謬云我今香臭俱聞何妨香臭俱從鼻生故為此防言香臭異性鼻不并聞若謂香臭二氣俱能聞者則汝阿難一人應有兩鼻以一鼻聞香一鼻聞臭方得不混然舉世皆知一人秪有一鼻若果有二鼻者即今對我問道自應有二阿難設許有二必有真僞且二阿難中誰為汝之真體是必有以辨之乃可云有二也若鼻下防一鼻具二謬恐聞兩鼻應有二身之破又轉謬云我本無二鼻秪是一雖秪是一無妨具足香臭二性故為此防若謂鼻秪是一即具香臭二性者則香之與臭自應混而為一無有二性矣既無有二則臭既為香香復成臭互奪兩亡二性不有況復以香為知為鼻真為展轉虗妄無可憑據所謂生識立界者試問界從誰立破係根不成竟二破係塵不成若因香生識因香有如眼有見不能觀眼因香有故應不知香知即非生不知非識香非知有香界不成識不知香因界則非從香建立初正破係塵若執此識因香生者則是識決定因香而有請以喻明當自知非如彼因眼有見彼見不能觀眼識亦如是因香有故自應不能知香且知與不知二俱有過謂知即非從香生自宗相違以識因香生是自宗故不知即非是識世間相違以世間共許識能知故香非下預防謬辨恐聞不知非識之破遂謬辨云雖曰不知無妨是識故為此防言既已不知縱許是識而彼香塵現則亦非知有如是則香界不成且識既不知有香所謂因香立識界者則識界決非從香建立三破兩係不成既無中間不成內外彼諸聞性畢竟虗妄夫根塵所以得成內外界者因有中間之識今既無有中間則亦不成內外是不惟識界無實而彼諸能聞根性所聞塵性亦畢竟虗妄豈真有生識義哉就識辨妄竟三承辨結示是故當知鼻香為緣生鼻識界三處都無則鼻與香及香界三本非因緣非自然性夫中界不立則所生者本無內外不成則能生者何有故曰三處都無要知妄無自性舉體全真故仍許其為本非因緣非自然性也鼻香識界竟四舌味識界三一據權定界二就識辨妄三承辨結示初阿難又汝所明舌味為緣生於舌識二就識辨妄二一指識徵界二分文各破初此識為復因舌所生以舌為界因味所生以味為界二分文各破三一破係根不成二破係塵不成三破兩係不成初阿難若因舌生則諸世間甘蔗烏梅黃連石鹽細辛薑桂都無有味汝自嘗舌為甜為苦若舌性苦誰來嘗舌舌不自嘗孰為知覺舌性非苦味不自生云何立界首句按定識因舌生意顯其不藉於味也則諸下教以離味嘗舌甘蔗甜味烏梅酸味黃連苦味石鹽鹹味其塊似石故云石鹽細辛藥草名微有辛味薑為辛之尤者藥中有肉桂亦微有辛味六味中唯少淡味若取桂華為淡亦可以巖桂俗稱木樨用以入味取其淡而香也都無有味者約諸物不現前時諸味俱寂故教以汝自嘗舌為甜為苦者要必離於諸味甜苦分明方可云識因舌生若舌下苦與非苦俱謬若謂舌性若者所生之識亦苦苦不覺苦誰來為汝嘗舌莫謂舌能自嘗以義揆之舌不自嘗如眼不自見可為譬也然舌既不能自嘗孰能來為知覺之性是知所謂舌性是苦者謬矣若謂舌性非苦以一例諸則一切味自應不生要知識憑味顯味且不生云何立識界之名是亦謬也二破係塵不成二一自宗相違破二世間相違破初若因味生識自為味同於舌根應不自嘗云何識知是味非味若謂此識因味生者如穀還生穀則汝識應自為味識既為味自應不能知味同於舌根應不自嘗云何汝識不然乃能識知是味非味是自宗相違也量云味生識是有法應不知味宗因云識自為味故同喻如舌根應不自嘗云何識知等正責其違於自宗二世間相違破又一切味非一物生味既多生識應多體識體若一體必味生鹹淡甘辛和合俱生諸變異相同為一味應無分別分別既無則不名識云何復名舌味識界初味多壞識過又字重牒前計謂又若此識因味生者但一切味非一物生如甜味從甘蔗生苦味從黃連生等然多味既從多物而生是多物能生多味以斯為例多味亦應生於多識若爾則識應多體世間相違以世間共許舌識惟一故識體下識一壞味過鹹淡甘辛亦該酸苦是六味總相和合俱生變異乃六味別相和合者如豆麵鹽合而為醬等俱生者如甘蔗生來即甜黃連生來便苦等變異者如變生作熟則異其本味等破意蓋謂識體若一而其體應非味生以因果不類故若其體必從味生須是鹹淡甘辛等六味及於和合俱生諸變異相混同而為一味以多既成一生一乃無過故但既同為一味應無分別世間相違以世間共許分別成味故分別下味壞識亡過言味性之分別既無則所生之識亦不名識以無所識故云何世間復名此識為舌味中間識界尤見其與世間相違破係塵不成竟三破兩係不成不應虗空生汝心識舌味和合即於是中元無自性云何界生恐聞根生塵生二俱不成遂計從虗空生故世尊以不應遮之言空無識性豈能生汝心識此承上文防異計也舌味和合等乃正破兩係言舌味既已和合則舌不成舌味不成味互奪兩亡故云即於是中元無自性是中者即舌味之中無自性者無各別之自性也自性尚無固知不能生識故曰云何界生就識辨妄竟三承辨結示是故當知舌味為緣生舌識界三處都無則舌與味及舌界三本非因緣非自然性舌界者舌識界也此係根為名下二界准知舌味識界竟五身觸識界三一據權定界二就識辨妄三承辨結示初阿難又汝所明身觸為緣生於身識二就識辨妄二一指識徵界二分文各破初此識為復因身所生以身為界因觸所生以觸為界二分文各破三一破係根不成二破係塵不成三破兩係不成初阿難若因身生必無合離二覺觀緣身何所識覺觀即指識言粗心分別名覺細心分別名觀前云分別覺觀是也對合離二塵分為二種所謂合覺觀離覺觀皆能緣也破意以若謂此識因身生者必無藉於合離二塵要知無二塵故縱生於識起二覺觀以為能緣惟身無境將何所識是知所謂因身生識者謬耳二破係塵不成若因觸生必無汝身誰有非身和合離者破意以若謂此識因觸生者必無藉乎汝身要知依身知觸世間共許誰有非依乎身知合離者知尚無成況復能識是知所謂因觸生識者亦謬耳三破兩係不成阿難物不觸知身知有觸知身即觸知觸即身即觸非身即身非觸身觸二相元無處所合身即為身自體性離身即是虗空等相內外不成中云何立中不復立內外性空則汝識生從誰立界初破能生無處恐生謬執呼其名而再告之曰若汝謬計此識根塵共生者是必有能觸之物與身相對要知觸塵之中亦有外物不來觸汝覺知惟汝自身即知有觸者如前所云以手摩頭頭手皆自身也若爾則能知之身即是所知之觸所知之觸即是能知之身身既即觸故非身觸既即身故非觸既互奪兩亡則身觸二相元無處所是能生者不可得矣合身下遮所生無體言能生者既已無處謾言不能生識縱生汝識為與身合為復離身設言合身即為身自體性不復名識設言離身即是虗空等相亦不復名識是所生者又不可得矣內外下結二俱叵得言內外中間相待而立今既內外不成中間識界云何建立中不復立內外二界性亦是空是則能生所生二俱叵得則汝所言識之生也從誰立界顯唯有空言而已就識辨妄竟三承辨結示是故當知身觸為緣生身識界三處都無則身與觸及身界三本非因緣非自然性身觸識界竟六意法識界三一據權定界二就識辨妄三承辨結示初阿難又汝所明意法為緣生於意識二就識辨妄二一指識徵界二分文各破初此識為復因意所生以意為界因法所生以法為界二分文各破三一破係根不成二破係塵不成三辨兩係無文初阿難若因意生於汝意中必有所思發明汝意若無前法意無所生離緣無形識將何用又汝識心與諸思量兼了別性為同為異同意即意云何所生異意不同應無所識若無所識云何意生若有所識云何識意唯同與異二性無成界云何立初約能生無體破若謂此識因意根生者應不藉乎法塵要知於汝意中必有所思之法方能發明汝意若無所思前法意性則無所生是知意性離緣無形云何生識縱生汝識無法將何所用無用惟幻說誰從根生哉又汝下約所生無性破識心指意識思量指意根意根即末那故以思量為名兼猶同也以意識與意根同是了別性故破意以若必謂此識從根生者但汝意識之心與諸思量意根同為了別之性且道為同為異若言同意即是意根云何為意之所生若言異意不同意能了別應無所識若果無所識者與意逈別云何為意之所生若謂有所識者依舊同乎意根云何分識之與意而言其與意異耶是知惟同意與異意有了別無了別之二性尚無能成況復名界界又云何成立則昔教所稱意識界者妄也二破係塵不成若因法生世間諸法不離五塵汝觀色法及諸聲法香法味法及與觸法相狀分明以對五根非意所攝汝識決定依於法生今汝諦觀法法何狀若離色空動靜通塞合離生滅越此諸相終無所得生則色空諸法等生滅則色空諸法等滅所因既無因生有識作何形相相狀不有界云何生初約能生無體破若謂此識因法生者此法須應有體但世間諸法不離五塵所謂色聲香味觸也汝觀色法眼之所對及諸聲法耳之所對香法鼻之所對味法舌之所對觸法身之所對是皆相狀分明以對五根非是意根所攝若汝意識之心決定依於法生汝今諦觀法塵之法是何相狀唯是五塵謝落影子生滅而已色空皆色塵以空為一顯色故動靜即聲塵通塞即香塵合離該味觸二塵以二塵皆合時知有離時知無故也生滅正是法塵五塵影子落於意地名生落所不及名滅越亦離也破意以設若離於色空等五塵影子生及五塵影子滅還有法塵可得耶要知離此諸相終無所得是能生者無體矣生則下約所生無形破言如我上說法塵之所以生者不過色空諸法等影子生法塵之所以滅者不過色空諸法等影子滅是別無法塵為所依因矣所依之因既無所謂因之而生有識心者畢竟作何形相若知相狀不有說界已屬虗妄云何更言有生是益見其謬也三辨兩係無文正脈云此闕根境合辨之科即今疏破兩係無文前五科俱有惟此科無故正脈云闕愚謂意法本自無相非同前五根塵有實性境且分文各破中又極明其虗妄無體共生之計自然無有亦不須破非闕文也就識辨妄竟三承辨結示是故當知意法為緣生意識界三處都無則意與法及意界三本非因緣非自然性結示之義準上夫衆生以五陰不了心色成身分開六入之門發明六塵之境根塵互引十二處之內外既定識生其中十八界之邊疆莫移在如來藏中固為幻妄假名於有情分上竟成堅牢巨執計人計我而瞥起煩惱迷理迷法而遽障所知為生死因礙正知見涅槃無路可證菩提何緣得成今既一一破其相妄顯其性真了界處以不有識陰入之本空執盡計除相開性現則菩提涅槃可希冀矣會四科而歸藏性竟三融七大以拂情計正脈義云人皆知此科理趣深廣必勝前科實多不能較其所以勝舊注謂前近取身後遠取物又云前悟一身後融萬法皆非也良以四科即七大中別相七大即四科上總相法本無殊但四科方談其一一皆是性真而未嘗言其一一皆周法界如指香柴煤炭一一言其是火而未及言一一皆可洞燒林野至今七大方談其一一皆周法界故總名為大如方說出諸火每一星皆有洞燒之極量也蓋前顯法法當體真常此乃顯法法圓融周遍故今解以融大科之而云拂情計者良以阿難既聞顯見超情顯見離見之旨已知見性不屬因緣及自然矣但四科該盡諸法似不免於因緣亦有邪知謬解隨情執自然者而今又聞本非因緣非自然性既違昔教復動權執故世尊以性色真空等拂之四一阿難陳疑致請二如來斥迷許示三阿難遵教佇聽四如來按定為說初阿難白佛言世尊如來常說和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯我今不知斯義所屬惟垂哀愍開示衆生中道了義無戲論法初述昔所說和合與因緣相關故兼言之常說者翻外計立自宗故一切世間總該情器情則七趣升沉器則八相往復故云種種變化此等皆因地等四大互為因緣和合發明所謂常說者即依此而說故又雖云常說亦有深淺如即空即假即中是也云何下疑今所廢排擯者斥逐義謂不用也因緣自然語雖似平其意唯疑排擯因緣以自然外宗雖排擯無可疑故是知此句乃怪其並因緣俱排也斯義者即俱排之義屬謂攝屬言因緣自然相待而立不屬此即屬彼二俱排擯故不知何所攝屬唯垂下請示中道昔說今排前後相違自宗外計兩無所攝進退莫決從違罔措無任首鼠有類籓羊故惟願如來哀愍開示理路不偏曰中道趣味究竟曰了義稱實而說曰無戲論法其意以因緣落有自然沈空不合中道自然固非正見因緣亦屬權宗俱非究竟一同兒語一類空拳皆非無戲論法因佛兩擯故反是而求之後云性色真空性空真色等正開示此義二如來斥迷許示爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提故我今時為汝開示第一義諦如何復將世間戲論妄想因緣而自纏繞汝雖多聞如說藥人真藥現前不能分別如來說為真可憐愍汝今諦聽吾當為汝分別開示亦令當來修大乘者通達實相初示以已說爾時者阿難致請時也告阿難言者即時而應故先指淫室歸來爾時自恨未全道力即是厭離聲聞等法以聲聞等法類皆執相滯名道力難全故也又爾時殷請奢摩等三即是發心勤求菩提以奢摩等三即是成佛妙定可趣菩提故也今時指顯見已後以十番所顯之真四科所會之性即是中道即是了義即是無戲論法故總以第一義諦稱之以一即中道不中則成二故第一即了義不了則有前故諦即無戲論戲論則不諦故如何下斥以迷謬如何復將等者深怪其不應爾也世間者約二乘為學者世間以彼不了第一義諦口說因緣名為戲論心思因緣名為妄想因屬戲論妄想故如來重重開示令其超脫此法而阿難反問云何俱排等是以之自纏自繞宜乎為世尊所深怪耳汝雖多聞等者喻顯其可憐愍也言阿難雖有多聞之慧善解請求不過如說藥之人而如來開示第一義諦令其薦取正是真藥現前及阿難纏繞因緣執權為實宛爾不能分別不能分別將必捨真藥而取假藥自誤誤人是故說為真可憐愍汝今下許以開示已說不悟多緣聽之不諦故誡以諦聽許以分別等者利現會故分別者分別因緣不了令其超脫開示者開示中道了義令其薦取亦令當來等者益未來故實相者指後大性義該前之所顯所會以同為一體故也隨緣不變故名實相不達此者縱修非真凡當來修大乘者務須通達故亦令也下云如水成冰冰還成水即略示實相之義三阿難遵教佇聽阿難默然承佛聖旨默然者虗懷凝慮承旨者敬候綸音所謂聽者端視如渴飲一心入於語義中也四如來按定為說二一據執略示中道二分門別詳七大初阿難如汝所言四大和合發明世間種種變化阿難若彼大性體非和合則不能與諸大雜和猶如虗空不和諸色若和合者同於變化始終相成生滅相續生死死生生生死死如旋火輪未有休息阿難如水成冰冰還成水初按妄所執準前阿難云一切世間種種變化皆因四大和合發明今云四大和合發明世間種種變化雖能所倒置而其義無殊蓋是據其所說而按定之故云如汝所言阿難下故申非量言四大和合發明世間等語乃隨情取相為言若以性論和合固屬權宗不和合尤墮外計故略申二種非量大性者四大之性體非和合者只許不變不許隨緣也不計隨緣故不能與諸大雜和諸大約相言不能與和者謂性自是性不隨緣以成相如是則墮自然之計故應猶如虗空不和諸色量云大性是有法不與諸大雜和宗因云體非和合故同喻如虗空不和諸色大性不爾乃故為非量令其自覺若字仍指大性和合者只許隨緣不許不變也不許不變故應同於諸大之相遷變改化始終四句通約外器內身詳明遷變改化之狀始終相成者謂因始有終因終有始遞互相成生滅相續者謂生成滅壞滅壞生成前後相續此約外器說也生死死生者謂因生有死因死有生亦遞互相成生生死死者謂生而復生死而復死亦前後相續此約內身說也是知內外四大皆變化相大性同此者性不自性能隨緣以成相如是則墮因緣之計故應如旋火輪未有休息量云大性是有法同於變化等為宗因云有和合義故同喻如旋火輪未有休息大性不爾亦故為非量令其自覺阿難下喻明正理言大性既不如虗空不和又不如旋火輪轉畢竟同於何等故復以異喻而反顯之如水成冰者喻大性不變隨緣冰還成水者喻大性隨緣不變隨緣不變故不墮因緣不變隨緣故不墮自然二俱不墮是名中道正理二分門別詳七大問阿難惟問四大如來具明七大者何也答為欲攝法盡故良以四大於五陰中唯攝色陰中形色於六入中惟攝浮勝於十二處中惟攝六塵及六根中浮勝於十八界中亦然至於色陰中顯色及餘四陰六入中之根性十二處中之根性十八界中之根性及識皆不能攝今加以空見識之三大乃一切俱攝亦恐阿難問所不及故足之以防種疑七一地大二火大三水大四風大五空大六見大七識大初四一依性成相二先破和合三詳示中道四雙拂二計初汝觀地性粗為大地細為微塵至鄰虗塵析彼極微色邊際相七分所成更析鄰虗即實空性教以觀地性者令知地大之性即藏性也藏性隨緣由衆生共相無明所感遂現粗相而為大地如前云晦昧為空空晦暗中結暗為色由二乘析色歸空所致遂現細相而為微塵如般若云以三千大千世界碎為微塵釋曰二乘以析空觀用假想慧初以大地分為七分如是從粗至細展轉以七分分之至於微塵則世界不復有矣若更以微塵分為七分則成極微言極微者最極微細已到色之邊際故云色邊際相若更以此相分為七分則成鄰虗今不言極微析至鄰虗而言至鄰虗塵析彼極微等者乃世尊妙辨無礙詞句錯落清新耳目之意然鄰虗尚有塵名再析則塵名亦失故曰更析鄰虗即實空性二先破和合二一正破合空成色二取例轉顯其謬初阿難若此鄰虗析成虗空當知虗空出生色相汝今問言由和合故出生世間諸變化相汝且觀此一鄰虗塵用幾虗空和合而有不應鄰虗合成鄰虗初因入定出若依小乘必謂此鄰虗塵析入空者是色相入於空矣若果如是則應當了知虗空出生色相以有入必有出故汝今下據執為難言汝今前來問我作如是言由和合故出生世間諸變化相如是則諸變化相皆和合有矣餘者和合姑置勿論汝且觀此一鄰虗塵自應亦是和合而有但鄰虗向去無色須是用虗空和且道此鄰虗塵用幾虗空和合而有蓋明知空無數量本不可合乃故為難問令知鄰虗非和合有故不應下豫遮謬救恐聞用幾虗空合成鄰虗之難遂謬救云我言和合者自是合色成色非謂合空成色故為此遮言鄰虗乃色中最細更無細者若必合色成色須是鄰虗合成鄰虗設許爾者則有三謬一者合他成自理固有之合自成自理所必無二者合多成一事乃得順合一成一事乃相違三者合細成粗世所共計合細成細世所共非由此三謬故以不應遮之二取例轉顯其謬又鄰虗塵析入空者用幾色相合成虗空若色合時合色非空若空合時合空非色色猶可析空云何合初約空難合言汝既以和合為宗則一切皆應和合而有又如小乘教中鄰虗析入空者此空必是色相合成且道用幾色相合成虗空夫如來以析入而難合成者良以析色歸空是小乘之自教諸相和合是阿難之自語順彼自教難彼自語令其不能施對若色下比例顯謬言我適問汝汝既不能施對在汝固知色合之時合色非空矣若既知色合之時合色非空自知若空合時合空非色夫如是則色空俱非和合有矣末二句決定結破言色雖不能合空猶可析入空若合而成色云何能合此決言其色非和合以結正破之義正脈云虗空略有四義不可言合一無形礙二無數量三無邊際四無變動原地大元依色聚色依於空空既不可合則色非和合色既非合地大豈和合有耶和合之計類推可以俱破先破和合竟三詳示中道二一正示中道二取事驗知初汝元不知如來藏中性色真空性空真色清淨本然周遍法界言本非和合妄計和合者由汝一向蒙昧元不知如來藏中有隨緣不變不變隨緣義故性色者自性隨緣能成幻色雖能成幻色而體終不變故曰真空真空者真體自空此明如來藏中有隨緣不變義也性空者自性不變其體元空雖其體元空而用終不失故曰真色真色者依真成色此明如來藏中有不變隨緣義也由有隨緣不變之義故稱清淨本然謂色不能礙由來自爾故由有不變隨緣之義故云周遍法界謂周匝遍滿法界無遺故是知十界依正中凡有質礙者皆地性之遍也然既清淨本然則不落有為既周遍法界則不滯無為知此義者而中道第一義諦當下即是問此科本顯地大周遍而詳示中道中却以性色真色為言者何也答地大元依色聚色性尚是中道地性可知又上文破和合中已變地為色故即承接言之從文便故二取事驗知隨衆生心應所知量循業發現上說清淨本然周遍法界但約理具此則約事造驗之但見其隨衆生心欲見便見應所知量能知便知初無使者及與作者非清淨本然而何又見其循一人之業則現一人之色循十人之業則現十人之色乃至循千萬人之業則現千萬人之色初無妨礙及與限量非周遍法界而何知此義者自不惑於因緣及自然矣詳示中道竟四雙拂二計世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義世間之語雖寬據下所惑且指二乘及外道言以彼不達如來藏中有隨緣不變不變隨緣義故名為無知但見現起之色循業而發無礙無限遂惑為因緣而繫墜權宗又或見現起之色隨心應量無使無作遂惑為自然而沈溺邪途總屬妄想故曰皆是識心等無非戲論故曰但有言說等也地大竟二火大四一依性成相二先破和合三詳示中道四雙拂二計初阿難火性無我寄於諸緣汝觀城中未食之家欲炊爨時手執陽燧日前求火初火性隨緣火性即如來藏性體雖不變用能隨緣故曰無我謂無有定宰也寄託也言火性雖曰無我亦必託彼木鑽艾鏡等緣而成相故汝觀下引事以證未食須食故欲炊爨謂釜底進火熟食也陽燧者取火之具崔豹注云以銅為之狀如鏡照人則影倒向日則火出淮南子曰陽燧火方諸也王充論云五月丙午日午時銷鍊五方石圓如鏡中央窪天晴向日出火此不過略引一事以證為下破和作立難之本二先破和合二一牒執舉喻二就執為破初阿難名和合者如我與汝一千二百五十比丘今為一衆衆雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優樓頻螺迦葉波種乃至阿難瞿曇種姓欲破和合呼其名而告之曰若謂此火名和合有者試以喻明自見其謬夫衆緣和合成火如我與汝千二百五十比丘今為一衆要知衆雖為一至詰其根本各各有身又皆有從生氏族名字火亦應爾雖是一火至尋其本緣亦應各各有質又應皆有品類名字如某火屬鏡某火屬艾某火屬日等若不爾者則和合不成如舍利等即出其氏族名字舍利弗此云鶖鷺子婆羅門種梵志族也優樓頻螺此云木瓜林迦葉波種龜氏族也阿難此云慶喜瞿曇種甘蔗族也佛之始祖日炙甘蔗而生號瞿曇氏故瞿曇翻日種亦翻甘蔗後四世改為釋迦今遡其源耳正脈云蓋必先有分開之相以為和合之本然後方可和合故舉一衆和合分開各有氏族以為定例至下文乃顯火不如是此異喻也二就執為破二一先破各相二後破合相初二一就執各徵其本二逐緣一一為破初阿難若此火性因和合有彼手執鏡於日求火此火為從鏡中而出為從艾出為於日來若此火之體性決定和合有者自應先有分開之相夫彼人手執火鏡即陽燧也於日求火此火為有從鏡出者為有從艾出者為有於日來者必三處各有火出方合舍利弗等各各有身等喻故此徵也二逐緣一一為破三一破於日來二破從鏡出三破從艾生初阿難若日來者自能燒汝手中之艾來處林木皆應受焚若謂有火於日來者應不須鏡自能燒汝手中之艾再既能燒艾則來處林木皆應受焚今既用鏡而來處林木不焚是知此火無有於日來者三破從鏡出若鏡中出自能於鏡出然於艾鏡何不鎔紆汝手執尚無熱相云何融泮初正破鏡出若謂有火從鏡出者應不須對日自能於鏡出然於艾再既能然艾即能鎔鏡有鏡何不自鎔夫鏡既不鎔然艾必須對日是知此火無有從鏡中出者紆汝下兼遮謬救恐聞鏡何不鎔之破遂謬救云艾易然鏡難鎔時下既能然艾經久自能鎔鏡故為此遮紆屈也遮意以若果經久能鎔者亦須先有熱相今屈汝手執尚無熱相云何經久便能融泮惟謬計耳融泮猶銷解也三破從艾生若生於艾何藉日鏡光明相接然後火生若謂有火生於艾者則艾自出火何藉日鏡光接然後火生今現見求火者執鏡對日是知此火無有從艾生者破意以三處各無火生知非和合以不如舍利弗等各各有身等故先破各相竟二後破合相汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相遠非和非合不應火光無從自有初詳審來方汝又諦觀者教以詳細觀察勿使有藏火處也鏡因手執者教以觀手日從天來者教以觀天艾本地生者教以觀地如是諦審觀察曾無藏火之處而火從何方遊歷於此是雖智似鶖子辨擬富那不能知不能言也日鏡下正破和合言鏡等既無有火手等又無藏火之處恐謂日鏡和合共然於艾故為此破言現見日鏡相遠非和非合豈能共然於艾是知所謂和合有火者謬矣末句預遮謬救恐聞非和非合遂計無從自有故為此遮原阿難本以和合為宗若果無從自有自宗相違故以不應遮之是知不了藏性者不唯和合不成而不合更非下文所謂但有言說都無實義者以此先破和合竟三詳示中道二一正示中道二取事驗知初汝猶不知如來藏中性火真空性空真火清淨本然周遍法界猶字例前言不惟地大火大汝猶不知以性相相類故性火等同前但以火易色即是二取事驗知地大中此科不曲分今有增益之文不便合釋二一驗知清淨二驗知周遍初隨衆生心應所知量阿難當知世人一處執鏡一處火生遍法界執滿世間起起遍世間寧有方所初正以取驗言事造之火亦是隨心應量其清淨本然之義可知阿難下兼折轉疑恐聞隨心應量之語遂轉疑云地大寓目皆是可說隨心應量火大或見不見現有方所隨心應量之義似不極成故為此折言一處執鏡一處火生是隨衆生心欲見便見也遍法界執滿世間起是應所知量能知便知也然既起遍世間寧有彼此方所則汝所謂或見不見現有方所者特生心知量之不及耳二驗知周遍循業發現言事造之火亦是循業發現其周循法界之義可驗問執鏡火生似是循業既已判屬上科將指何者名為循業答執鏡火生約現緣說謂求則隨心而見應量而知循業發現約宿因說如生則身俱暖相處有煙炊一是暫現一是常生似同而實異也詳示中道竟四雙拂二計世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義義如地大中釋火大竟三水大四一依性成相二先破和合三詳示中道四雙拂二計初阿難水性不定流息無恆如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻藥是諸師等於白月晝手執方諸承月中水初水性隨緣水性亦即如來藏性體雖不變用能隨緣故曰不定流息無恆者流無常流隨緣而息息無常息隨緣而流正顯其不定也如室下引事以證迦毗羅此云黃色或云黃赤色以其髮黃兼赤故正脈云青色或別有所據斫迦羅此云輪以自執所見理圓能摧他宗故正脈云鴛鴦義取輪必具二如鴛鴦鳥故鉢頭摩此云赤蓮華池名也以池為名者近此住故訶薩多梵語之略灌頂云阿迦薩謨多羅此翻海水依於海水住故乃事水外道也略出四仙餘以等字該之以其善用幻術故稱諸大幻師太陰精月中水也用以和藥自計服之長生空說無驗故世以幻名又幻藥者或依此藥幻出種種境界眩惑心目也白月晝者正脈云十五夜為望望前為白月望後為黑月月當正午光皎如晝也方諸者淮南子曰方諸見月則津而為水高誘曰方諸陰燧向月則水生許慎曰諸珠也方石也正脈云水精珠也王充論云十一月壬子日夜半子時北方煉五方石為之狀如杯盂向月得津今云承月中水大同此計是皆不達藏性隨緣義耳二先破和合準火大中此處有牒執舉喻之文今不具者例上可知故二一先破各相二後破合相初二一就水徵本二逐緣為破初此水為復從珠中出空中自有為從月來佛意以三處各有水出方成和合之義故此徵云此水為有從珠中出者為有從空自有者為有從月中來者是不可以不審也二逐緣為破三一破從月來二破從珠出三破從空生初阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降初正破月來若謂有水從月來者是義不然以月在天珠在手相去遠矣尚能從遠方來令珠出水則中間所經林木皆應吐流有是事乎流則下轉顯二謬若謂林木吐流者則應隨處可承何待方諸所出若謂林木不流者明知此水非從月降以遺近著遠不應理故二破從珠出若從珠出則此珠中常應流水何待中宵承白月晝若謂有水從珠出者是不藉餘緣矣不藉餘緣則珠中常應流水既爾則隨時可承何待中宵必承仗於白月晝乎中宵半夜也破意以既待中宵承白月晝明知此水不從珠出三破從空生若從空生空性無邊水當無際從人洎天皆同滔溺云何復有水陸空行若謂有水從空生者但空性無邊所生之水亦當無際如是則從人洎天皆應同為滔流俱成陷溺不應復有餘物乃云何於其中間復有水行陸行及與空行是知所謂水從空生者謬也先破各相竟二後破合相汝更諦觀月從天陟珠因手持承珠水盤本人敷設水從何方流注於此月珠相遠非和非合不應水精無從自有初詳審來方諦觀即詳審也陟猶升也月從天陟天無藏水之處珠因手持手無藏水之處承猶擎也承珠水盤本人敷設盤無藏水之處既三方皆無藏水之處而水從何方流注於此是不可以不審也月珠下正破和合言月等既無有水天等又無藏水之處恐謂月珠和合共生於水故為此破言現見月珠相遠非和非合豈能共生於水是知所謂和合有水者謬矣末句預遮謬救恐以無從為救故遮以不應以自宗相違故水精者順彼所計以彼計此水為水中之精也先破和合竟三詳示中道二一正示二驗知初汝尚不知如來藏中性水真空性空真水清淨本然周遍法界二驗知隨衆生心應所知量一處執珠一處水出遍法界執滿法界生生滿世間寧有方所循業發現初驗知清淨於中有取驗折疑二義俱準前釋末句驗知周遍亦準前詳示中道竟四雙拂二計世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義水大竟四風大四一依性成相二先破和合三詳示中道四雙拂二計初阿難風性無體動靜不常汝常整衣入於大衆僧伽黎角動及旁人則有微風拂彼人面初風性隨緣風性亦即藏性無體者無有定體也無定體故隨緣而動隨緣而靜故曰不常汝常下引事以證乞食說法等事應著伽黎故曰常整入大衆者隨僧例故灌頂云僧伽黎唐言重復衣清涼云義翻和合新者二重故者四重以重成故稱曰和合三依中第一衣也亦名雜碎衣剪碎製成條相多故具有三等九品如沙彌律儀衣鉢名相中說動衣乃有反顯不動則無其不常無體之義於此可見二先破和合二一先破各相二後破合相初二一就風徵本二逐緣為破初此風為復出袈裟角發於虗空生彼人面袈裟此云壞色衣清涼云不正色衣律以青黑木蘭三色壞正好色故真諦云此是三衣通名或名離塵服斷六塵故亦名消瘦服割煩惱故又稱蓮華服無染著故此中徵意亦是要其先有各相然後可合二逐緣為破三一破從衣出二破從空發三破從面生初阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體我今說法會中垂衣汝看我衣風何所在不應衣中有藏風地初正破衣出風出袈裟則是袈裟中有風故難以披風然風以動搖為性果其披之其衣自應飛搖故又難以離體破意以現見衣不離體披風之義成不是衣中無風則此風不出袈裟明矣我今下兼防謬辨恐聞離體之難遂謬辨云衣若動時乃有風出衣若垂時風但藏之而已豈可以飛搖離體為難故為此防若謂衣若垂時風但藏之者即如我今說法會中垂衣亦應藏風汝且看我之衣風何所在據實而論不應衣中有藏風地以衣是布屬非有孔穴也二破從空發若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出初約無衣不生破風生於空自不關衣故難以衣不動時何因無拂是空無生風義也空性下約因果不類破空性常住若生風者則應常生以因常果必常故若爾則無風之時空亦當滅以果斷因必斷故然滅風之時人人可見若言滅空有何形狀是知虗空無滅風性有滅果不類因云何從生此必無之事也若有下約名義不符破虗空原以不生滅為義設若有生滅者則不名虗空今既名為虗空自應無有生滅若有風生名義不符故難以云何風出以出即是生生必有滅也灌頂云風從空生凡小常執故展轉詳破三破從面生若風自生被拂之面從彼面生當應拂汝自汝整衣云何倒拂若謂有風自生於被拂之面者義亦不成以從彼面生當應拂汝今既不見拂汝已知不生彼面乃自汝整衣之時云何倒拂彼面其不生彼面之義益可見矣先破各相竟二後破合相汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自誰方鼓動來此風空性隔非和非合不應風性無從自有初詳審來方汝審諦觀者教以審辨諦實而觀勿得過目了事也整衣在汝汝無藏風之處面屬彼人彼無藏風之處虗空寂然等空無藏風之處既三方皆無藏風之處而風自誰方鼓動來此又不可以不審焉風空下正破和合恐謂衣空面既無有風審諦觀又無藏風之處和合而有理應無疑故為此破言現見風動空澄其性相隔無和合義故曰非和非合衣礙風通例此可知是皆無和合義也不應句預遮謬救準前先破和合竟三詳示中道二一正示二驗知初汝宛不知如來藏中性風真空性空真風清淨本然周遍法界宛字有深怪意言地火水三番詳示風性可以類推觀汝動靜宛然不知如來藏中不變隨緣義也餘俱準前可思二驗知隨衆生心應所知量阿難如汝一人微動服衣有微風出遍法界拂滿國土生周遍世間寧有方所循發業現初驗知清淨法界世間國土一義耳拂動也遍法界拂者謂遍法界中人皆微動服衣也滿國土生者謂滿國中皆有風生是知此風周遍世間寧有方所末句驗知周遍可知詳示中道竟四雙拂二計世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義風大竟五空大四一依性成相二先破和合三詳示中道四雙拂二計初阿難空性無形因色顯發如室羅城去河遙處諸剎利種及婆羅門毗舍首陀兼頗羅墮旃陀羅等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少初空性隨緣空性二字且指不變之體由不變故是曰無形謂無長短大小等形因色顯發乃指隨緣之用由隨緣故是曰因顯謂因彼色相差別乃顯虗空各有差別如室下引事以證室羅城地廣人稠去河近不須鑿井故唯約遙處言之西域貴賤族分四姓剎帝利略云剎利此翻田主即王種也婆羅門此翻淨行守道居正潔白其操有類此方儒道毗舍此云商賈行販坐賣者是首陀此翻農夫耕田種地者是四姓之外別有智愚二族故云兼也頗羅墮此云利根如六藝百工之類旃陀羅此云嚴幟如屠兒魁膾之類新立安居興作須水去河遙處擔運費繁故須鑿井求之出尺尺空出丈丈空其因色顯發之義亦自可見末二句乃重牒上義為下作徵起之端二先破和合二一先破各相二後破合相初二一就空徵本二逐緣為破初此空為當因土所出因鑿所有無因自生因土所出即是從土而生因鑿所有即是從鑿具生無因自生者謂別無所因從自體生猶言從遍界空出井空也二逐緣為破三一破從自生二破因土出三破因鑿出初據義乃是破從空生但以空是自體故云自生古德多作破無因釋今疏不爾者以與破和合義相違故阿難若復此空無因自生未鑿土前何不無礙唯見大地逈無通達破意以若計此空別無所因從自體生者應不藉乎鑿之與土既爾則未鑿土前即應無礙乃何故不能無礙不惟不能無礙具唯見大地逈然無有通達之相是知所謂無因自生者謬矣二破因土出若因土出則土出時應見空入若土先出無空入者云何虗空因土而出若無出入則應空土元無異因無異則同則土出時空何不出初正破土出若謂此空因土出者則土從井出之時應見虗空從外而入以土在外故若土先從井出無空從外入者云何而言虗空因土而出若無下預遮謬救恐阿難救云空本內生實無出土入井之意故為此遮若謂虗空無出土入井之義者則應未鑿土前空土元無異因因依也無異因者謂空土相依而住無別所依也無異則同者謂既無異因則同為一體既同為一體出則同出故難以則土出時空何不出三破因鑿出若因鑿出因鑿出空應非出土不因鑿出鑿自出土云何見空初正破因鑿若謂此空因鑿具出者則唯鑿便能出空應當不用出土今既必待出土成空明知此空不因鑿出不因下兼難不因恐因鑿被破轉計不因鑿出故為此難若謂此空不因鑿具出者則鑿自出土於外云何於中見空是不惟因鑿不成不因亦非總以不了性具恁麼不恁麼總不是也先破各相竟二後破合相汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出鑿空虗實不相為用非和非合不應虗空無從自出初詳審來方佛意以三處不生是我所說設未心服汝更審諦所謂審諦者謂諦審而辨其從來諦觀而象其方所何方更有藏空處也鑿從人手者教以觀手隨方運轉者教以觀方土因地移者教以觀地既遍觀三方俱無藏空之處試問如是虗空畢竟因何所出當明以告我勿顢頇也鑿空下正破和合如上三處不生三方又無藏空之處恐謂和合共生故為此破言現見鑿之與空一虗一實彼此不相為用無和合義故曰非和非合如鑿空既爾土空亦然是皆無和合義也不應句預遮謬救可知先破和合竟三詳示中道三一比例發明二正示中道三取事驗知初二一以空例四取大名二以四例空顯圓義初若此虗空性圓周遍本不動搖當知現前地水火風均名五大佛意以若依上說則此虗空既非和合而有又非無從自出明知其是性圓周遍本不動搖者矣正脈云圓周遍三字重一圓字良以尋常論空亦言周遍然有色法礙處即不圓融是言周遍而非圓周遍也今言空性周遍色不為礙故益之以圓義又云不動搖者同後無生滅義蓋周遍表其非此有而彼無此無而彼有圓滿意也不動表其非先無而今有今有而後無常住意也此且按定下乃取例言尋常但知地水火風名大不知虗空亦大今既性圓周遍本不動搖自應發用無限以此取例當知此空與彼現前地水火風均名五大以同具大義故也二以四例空顯圓義性真圓融皆如來藏本無生滅阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入既均名五大則空大性真地水火風亦性真空大圓融地水火風亦圓融以其皆是如來藏本無生滅性故問取名以空例四為其已向不知顯圓以四例空何所取義答此有二義一者易知性真二者易知圓融易知性真者前云晦昧為空後云空生大覺中是知現前虗空親依性起若言性真則易信至於地水火風人但見其依於虗空而不知由於性起若言性真則難見也易知圓融者前云出土一尺於中則有一尺虗空出土一丈中間還得一丈虗空後云虗空體非羣相不拒諸相發揮是知現前虗空亦自無礙若言圓融則易信至於地水火風人但見其相凌相滅而不知其相涉相含若言圓融則難見也為此取例蓋是以易知例難見令難見者成易知耳此且例定下乃令觀重呼其名者示警覺意故言我今如是開示自可推類發明設若汝心仍舊昏於權宗迷於外計不能開悟四大元如來藏者當觀前之虗空為出為入為非出入非猶無也佛意以有出有入則墮因緣無出無入則墮自然但不肯明明道破惟令自觀自悟必待信得虗空無出無入無非出入元是如來藏性則例推四大無不明矣比類發明竟二正示中道汝全不知如來藏中性覺真空性空真覺清淨本然周遍法界全字亦深怪意言我前重重開示末復教以觀察將謂因空得悟汝竟全然不知如來藏中有性覺真空性空真覺等義也準上地水火風俱用本大與空相對今以性空真空文不可別故以覺字易之言性覺者覺即是動有隨緣義因有隨緣之義故可成頑空雖可成頑空而體終不變故曰真空謂頑空無體即真空故言性空者空即是靜有不變義因有不變之義故常守自性雖常守自性而用終不滯故曰真覺謂依性成空即真覺故此上以文稍異前故次第釋之下二句準上三取事驗知隨衆生心應所知量阿難如一井空空生一井十方處空亦復如是圓滿十方寧有方所循業發現詳示中道竟四雙拂二計世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義空大竟六見大正脈云即根大也總攝六根但舉眼根為例然亦唯取根中之性非取浮塵故惟言見不言根也四一依性成相二先破和合三詳示中道四雙拂二計初阿難見覺無知因色空有如汝今者在祇陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分析初見性隨緣見覺者見性覺體也體本不變故曰無知無知者無局眼之知也既無局眼之知何以稱見故曰因色空有謂因隨色空等緣而有局眼之知見性之名蓋緣斯立如汝下引事以證今者在林等即約目前事證故朝明夕昏者晝間之明暗也中宵等俱如水大中釋則光便暗者夜間之明暗也據此則是明暗等相現前因而有見於中分析所謂因色空有者於此可見文中言明暗等者等色空故正脈云此中全約見之與塵為同異等以破和合之妄執然其別名塵相二三開合不定應先總釋不過色空明暗之四互為隱顯耳如總言色空是合明暗以對空只言明暗是開色攝空也若言明暗空是開色以對空對言見空是空攝色而對見也至文再指庶不惑矣今且明此科初言因色空有即是合明暗以對空末言此明暗等因見分析又開色以攝空也二先破和合二一先破各相二後破合相初二一就見徵本二逐緣為破初此中徵本非徵其本從何來但徵其與明暗等本來是同本來是異等則各相定矣此見為復與明暗相并太虗空為同一體為非一體或同非同或異非異見是根性明暗太空皆見所緣塵正脈云此中乃開色對空也佛意以凡言和合者或本同衆物乃分彼少分共合而為一體今徵其為同一體是也又或各是一物乃分為多分別合而為多體今徵其為非一體是也又或一分同彼諸物一分異彼諸物乃取同合異今徵其或同非同是也又或一分與諸物異體一分與諸物同體乃取異合同今徵其或異非異是也至下逐緣為破四義不成則了無和合相矣二逐緣為破四一破為同一體二破為非一體三破或同非同四破或異非異初阿難此見若復與明與暗及與虗空元一體者則明與暗二體相亡暗時無明明時無暗若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗若明暗殊見無生滅一云何成初按定同體此中亦開色對空也則明下正破一體此下皆開色攝空欲破一體且約二塵言之故曰則明與暗二體相亡者謂明暗二體彼此互相凌滅不並存也暗時無明明時無暗者正申明二體相亡之義然既二體相亡則不可說見與一體以此見若與暗一當明來暗亡時則此見應與暗而俱亡以既為一體應同亡也若此見必一於明當暗來明滅時則此見當與明而俱滅滅則都無所見云何明來仍復見明暗來仍復見暗是明暗任殊而見性本無生滅若明下結示不成意以若果明暗任殊而見性無生滅者自然顯其非是一體故難以一云何成二破為非一體若此見精與暗與明非一體者汝離明暗及與虗空分析見元作何形相離明離暗及離虗空是見元同龜毛兔角明暗虗空三事俱異從何立見初按定非一此亦開色攝空汝離下正破非一非一則兩不相到故教以離塵析見作何形相蓋必離塵有見乃可說與塵非一故離明暗等元同龜毛等者正明其離塵無見以龜毛兔角皆有名無實也明暗下結示不成此與正破中皆開色對空故云明暗虗空異猶離也意以此見果與三事俱離自應無所表示故難以從何立見三破或同非同或字雙貫同與非同其義即是或同或異蓋非同即異耳明暗相背云何或同離三元無云何或異明暗相背同此則異彼同彼則異此故曰云何或同此亦開色攝空離三元無有見則不能異彼故曰云何或異三字亦是開色對空正脈云悉是上義但撮合一處耳四破或異非異文中首破非同即或異也分空分見本無邊畔云何非同見暗見明性非遷改云何非異空見本無邊畔明知無有異體故曰云何非同非同即是或異此以空攝色而對見也見暗見明者明暗任殊性非遷改者見無生滅此則明知不是一體故曰云何非異非異即是或同此則又是開色攝空破意亦是撮合上文義耳先破各相竟二後破合相汝更細審微細審詳審諦審觀明從太陽暗隨黑月通屬虗空壅歸大地如是見精因何所出見覺空頑非和合不應見精無從自出初詳審來方佛意以四義不成已知無和合相矣設不信者汝更細審謂微細審詳也此是隨標隨釋審諦者審辨諦細務令來處分明審觀者審實觀詳勿致有所遺漏此又重明微細審詳之義明從太陽者教以向晝而觀日出日沒其間必周悉也暗隨黑月者教以向夜而觀日沒日出其間必詳盡也通屬虗空者教以對空而看東西南北四維上下用目悉循歷也壅歸大地者教以憑地而視遐邇高低曲直邪正著眼須遍到也如是審諦審觀既無各相又無藏見之處而如是見精畢竟因何所出勿放過也正脈云此亦開色對空而加通壅盡其詳耳見覺下正破和合恐謂空等和合而有故為此破言見有覺知空屬頑昧無和合義故曰非和非合明等對見例此可知不應句預遮謬救可知先破和合竟三詳示中道三一比例發明二正示中道三取事驗知初二一以見例五取大名二以五例見顯圓義初若見聞知性圓周遍本不動搖當知無邊不動虗空并其動搖地水火風均名六大六性中文惟舉三義實通攝以元是一精明故佛意以若依前說則見聞知等明是性圓周遍本不動搖此按定也當知下取例良以地水火風久稱大名虗空前已新許而見聞知等曾不知其為大今既性圓周遍本不動搖發用自應無限以此取例當知此見與彼新許之空及久稱大名之地水火風均名六大以皆遍皆常故二以五例見顯圓義性真圓融皆如來藏本無生滅阿難汝性沈淪不悟汝之見聞覺知本如來藏汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異言既均名六大則見聞性真而空與地水等亦性真見聞圓融而空與地水等亦圓融以其皆是如來藏無生滅性故問上科以四例空意取兩重易知今以五例見何所取義答此亦二義一者空等屬八識相分見等是八識見分雖相見皆依自證而起而見等現有知覺於性最親若言性真則易信至於空惟頑虗地等無情於性較踈乍言性真固難信也二者見聞等性自顯見是心已來於不失無還無礙等科中業已顯其為圓融周遍今復言之自應易信至於空等圓融雖已新許而現見空處無地地中無空水火亦然乍言圓融固難信也據此亦是以易信例難信耳此例定也阿難下令觀性有二義一者準上性即是心沈謂沈於權宗淪謂淪於外計二者變文性即藏性沈淪者謂無始沈淪於見聞覺知中也是等皆足以障蔽悟門故曰不悟佛意以如我上說原為教汝因見悟五設若汝性沈淪不悟見聞覺知本如來藏者應當觀此見聞覺知為有生為有滅為同塵為異塵若果有生有滅有同有異則墮因緣為非生滅為非同異若果非生非滅非同非異又墮自然捨此諸途自信見聞覺知便是如來藏性餘之五大亦可類悟如來教以當觀非無謂也問此之非生非滅與上本無生滅為同為異同則此不應掃異則異在何處答上言本無生滅乃由來自無非教執無此言非生非滅乃遣有立無是執無耳不執則是正見執之則墮邪宗毫釐之差千里之謬不可不辨比例發明竟二正示中道汝曾不知如來藏中性見覺明覺精明見清淨本然周遍法界佛意以我今如是開示汝所以終不悟者想汝已向曾不知如來藏中有性見覺明等義也言性見者謂如來藏中有依性成見之義雖依性成見而從緣無性當體即是本覺妙明所謂雖隨緣而不變也言覺精者謂如來藏中有覺體精真之義雖覺體精真而依理成事其用亦可轉明為見所謂雖不變而隨緣也正以隨緣不變故曰清淨本然不變隨緣故曰周遍法界此亦以文異於前故具釋之三取事驗知二一驗知清淨二驗知周遍初隨衆生心應所知量如一見根見周法界聽嗅嘗觸覺觸覺知妙德瑩然遍周法界圓滿十虗寧有方所言事造之見但見其隨衆生心欲用便用應所知量欲周便周初無使者及與作者其清淨本然之義可見此正以取驗也如一見根等乃折其轉疑恐轉疑云空等在境可說隨心應量見等在根似乎各有方所隨心應量之義未必極成故為此折如一見根欲用便用見周法界欲周便周如此例知五根亦然故次下即約五根言之聽即聞性嗅嘗觸謂嗅觸嘗觸二性俱以觸名者合中方知有類身根故覺觸即身之覺性覺知即意之知性妙德者在根雖千二八百約性則實無具缺如後云總括始終六根之中各各功德有千二百是也瑩然者清淨義與見性體同體同則用亦應同故亦曰遍周法界如是則超越六根圓滿十方太虗隨心應量寧有一定方所所謂見等在根似有方所者亦生心知量之不及耳二驗知周遍循業發現循一人之業則現一人之見循十人之業則現十人之見乃至循千萬人之業則現千萬人之見其周遍法界之義可知問前折疑中已帶周遍之義何必又驗答前約一人此約多人設若一人周遍不容多人是周遍而非圓周遍也詳示中道竟四雙拂二計世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義義並準上問此大既惟根中之性前已十顯況入處界中一一融會於藏性之中至此何勞更融耶答十顯惟指一見今則通會六性又十顯中不失無還無礙等科雖已略具圓融周遍之義而未大彰顯今則內融五根外融六大理具事造一一詳明方盡圓融至極之義見大竟七識大四一依性成相二先破和合三詳示中道四雙拂二計初阿難識性無源因於六種根塵妄出汝今遍觀此會聖衆用目循歷其目周視但如鏡中無別分析汝識於中次第標指此是文殊此富樓那此目犍連此須菩提此舍利弗初識性隨緣識性無源者謂識性即是藏性無別根源也既即藏性識云何起故曰因於六種根塵妄出六種根塵謂六根六塵也根塵為緣識生其中故曰妄出出而云妄者無實體故正脈云是惟約於前六所以無七八者以八即前之根大而七亦即是意根故也汝今下取事以證汝今遍觀句根也此會聖衆句塵也此且略標根塵下乃詳明用目循歷句乃約色根緣境循循謂歷序歷覽也其目周視等又約根性緣境周視者周遍瞻視也雖周遍瞻視而了無作意故曰但如鏡中無別分析言鏡中照物但得其總相無有差別分析根性照境亦爾故以為喻此上即是根塵為緣之義汝識於中者謂汝識瞥起於根塵之中次第標指等即是眼識及隨眼意識然眼識名隨念分別但對性境初起一念不帶名言親緣文殊等同時有隨眼意識名計度分別亦對性境次起第二念計執名字標指文殊等名言如眼家既爾餘五亦然至於意家獨頭意識緣獨影境亦在所生例中大抵眼根但對文殊等境了無作意眼識初起一念不帶名言同時意識雖帶名言而無種種計執至於獨頭意識則於獨影境上種種計度分別以至不可挽矣此上即是識生其中義也二先破和合二一先破各相二後破合相初二一就識徵本二逐緣為破初此識了知為生於見為生於相為生虗空為無所因突然而出此中見即是根相即是塵四徵中生見生相是徵其為異以根生有知相生無知二體不同故為異為生於空是徵其為同以虗空體同識生於空其體亦應同故又生見生相是徵其為有謂設許為異須有二體也為生虗空是徵其為空謂設許為同須空諸相也末言無因突出是徵其非同非異無因者不因見不因相是非異也不因空是非同也亦是徵其非空非有蓋以一句總翻上之文與義耳文謂生見生相生空義謂為同為異為空為有突字從穴從犬如犬匿穴中伺人不防而出今明無因而出其勢相似故云突然又此徵意雖為破和合亦兼破非和合義以若無因突出即墮非和合也二逐緣為破四一破因見生二破因相生三破因空生四破無因生初阿難若汝識性生於見中如無明暗及與色空四種必無元無汝見見性尚無從何發識若謂汝識生於見中者自應不藉於相矣設如無有明暗及與色空等相還能有見耶要知四種必無元無汝之見性以前云見覺無知因色空有故是則能生之見尚且無體況曰生識識將從何發哉二破因相生若汝識性生於相中不從見生既不見明亦不見暗明暗不矚即無色空彼相尚無識從何發若謂汝識生於相中者自應不從見生要知不從見生則既不見明亦不見暗以識非見生應無見故據此則明暗不矚即應無有色空以色空藉明暗顯故是彼相尚且無有況曰生識識又從何發哉三破因空生若生於空非相非見非見無辨自不能知明暗色空非相滅緣見聞覺知無處安立處此二非空則同無有非同物縱發汝識欲何分別若謂汝識生於空中者自應非藉於相亦非藉於見矣要知非藉於見則無以辨自不能知明暗色空是則離根並塵亦亡而識無所緣非藉於相則滅所緣而見聞等無處安立是則離塵并根亦失而識無所依無所緣則無用無所依則無體體用既無識將安在況夫處此二非惟是一空空則同乎無有設許空是顯色得名為有亦非同物類可別是則縱發汝識欲將何所分別但為虗名而已四破無因生若無所因突然而出何不日中別識明月若謂此識無因突出者自應識月之識不因月有故難以何不日中別識明月蓋必日中無月突生識月之識方可言無因生故先破各相竟二後破合相汝更細詳微細詳審見託汝睛相推前境可狀成有不相成無如是識緣因何所出識動見澄非和非合聞聽覺知亦復如是不應識緣無從自出初詳審來方言如我上說固知非和合矣設不信者汝更細詳謂微細詳審也見託汝睛者教以勝義浮塵內外詳察也相推前境者教以明暗色空同異審辨也又根是有知塵是無知皆可狀成有也須向可狀處看過太虗渺漠晴空寂然皆不相成無更須向不相處推求然既微細詳審都無藏識之處而如是識心緣慮畢竟因何所出試親親切切道一句看識動下正破和合溫陵曰識有分別名動見無分別名澄既動澄相乖自應非和非合如見與識既爾聞聽覺知可例故云亦復如是不應句預遮謬救可知先破和合竟三詳示中道三一比例發明二正示中道三取事驗知初二一以識例六取大名二以見例識顯圓義初若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大佛意以如我上說此之識心本無所從非和合有矣此且按定下乃取例良以地水火風久得大名虗空已許見聞又許唯此識心一向許從緣生執和合有不知為大今既本無所從非和合有應當了知此了別之識與前已許之見聞覺知同一圓滿湛然以皆性非從所若此則兼彼空地等五均名七大宜因彼知此也二以見例識顯圓義性真圓融皆如來藏本無生滅阿難汝心粗浮不悟見聞發明了知本如來藏汝應觀此六處識心為同為異為空為有為非同異為非空有言既均名七大則不惟六識性真圓融而見等六精亦皆性真圓融以其皆是如來藏無生滅性故問上科以五例見亦取兩重易知今以見例識何所取義答此亦有意良以見等六精似各有體言其本如來藏猶覺難信惟此六處識心來無所從去無所至既無自體全妄全真若言其為如來藏性固易信也此亦例定下方令觀見聞亦該六精以同體故了知即是識心以前云此識了知故也佛意以見聞等六精前已許其為如來藏性汝等自應已悟設若汝心粗而不細浮而不深依然不能開悟見聞等者只須發明此了知之識本如來藏設不能者汝應再觀此六處識心為同屬空生耶為異屬見生相生耶設許為同還須觀其為空果能空諸相耶設許為異還須觀其為有果其有二體耶設若同異空有叵得即須觀其為非同異為非空有果係無因生耶據此仍是取前所破各相而再問之如來可謂眉毛拖地矣比列發明竟二正示中道汝元不知如來藏中性識明知覺明真識妙覺湛然遍周法界佛意以我前教汝再觀依舊不悟由汝素不留心元不知如來藏中有性識明知等義也性識者自性隨緣能成妄識雖能成妄識而其體不變故曰明知明知者識不能昏了了常知此明如來藏中有隨緣不變義也覺明者覺性不變明不由識也雖明不由識而其用不無故曰真識真識者依真成識對境便熾此明如來藏中有不變隨緣義也前云清淨本然此云妙覺湛然者以前六大宛似有體惟是不礙清淨故曰清淨本然今識大明知無實自應全識全覺故曰妙覺湛然遍周法界准前可知三取事驗知含吐十虗寧有方所循業發現初驗知湛然言事造之識唯恐不到究竟地位果到究竟地位得大自在有時含十虗於一念有時吐一念於十虗寧有一定方所自脫境界羅籠肇公云干難殊對而不干其慮萬機均赴而不勞其形所謂妙覺湛然者即此可證不言隨心應量者以心即是識量亦識量今已名大別無心之可隨量之可應故末句驗知周遍亦準上詳示中道竟四雙拂二計世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義釋義同前正脈問此經首先正破識心如七處曲搜三迷決了名義皆妄畢竟無體乃至顯見文中又復旁兼相形而破未嘗少假寬容何後於十八界即許其為藏心真性至此愈稱其周遍法界含吐十虗是即性之全體而同彼開顯見性之極量何前乃妄之至而後則真之極乎答前約初心悟修須從方便決擇真妄捨生死根本取涅槃妙心則識須破盡決定不用後約圓解普融無法不真無法不如乃至剎塵念劫無非一真法界何況識心不融法界此固至極之論無可議者然愚亦有說夫識之所以為患者要在不知是妄良以不知是妄必至認以為真認以為真遂不復更求真本因將如來藏心日汩沒於情塵之中從迷積迷浩劫不返若果知其是妄不認為真還須會歸如來藏性如不然者必至全體灰泯反將含吐十虗之妙覺明用永沈幻果塵劫莫升所以妙成二智絶分於焦芽敗種者豈曰無故是知前之所以正破旁破者務令了識是妄後之所以會性融相者務令達妄即真得旨忘筌微智者不是不與道也總結上來如來極顯真體竟三會衆同信空藏任說周遍惟是空藏為其方是會相歸性全彰理法界也任說了知唯是信心為其但是隨順佛語非己智分也二一承示啓信二讚佛發願初二一通敘承示二別明啓信初爾時阿難及諸大衆蒙佛如來微妙開示正脈云通承破妄顯真義來良以此大開解功夫非近今當總前撮其大要令知微妙之實破妄心有三一七破以密示無處二重徵以顯呵非心三縱奪以決其無體是所以破妄心者可謂極微細而盡精妙矣顯真心亦三一示見等尅就根性以指其實體二示陰等廣融諸相以明其一體三示地等極顯圓融以彰其全體是所以顯真心者亦可謂極微細而盡精妙矣故經家通敘於此為向下啓信之本二別明啓信三一信通真實二信圓真實三信常真實初身心蕩然得無罣礙是諸大衆各各自知心遍十方初知妄本空通承破妄義來身指妄身心指妄心蕩然者灰壞義罣礙者羈縛義良以一切衆生妄認四大為自身相妄認六塵緣影為自心相執我我所總成罣礙今承破妄之示信知六識元空四大無主頓覺現前身心蕩然灰壞自是離我我所無能羈縛何罣礙之有哉是諸下知真本遍遍者自內而外遐邇皆通即通真實通承顯真義來良以頓根人只知近具根中不達遠該萬法狂慧凡夫動言遠該萬法不知近具根中一為自棄家寶一為向外馳求各據封疆自成畛域今聞十番妙示四科玄談又復混融七大一一遍周因信如來藏心通乎遐邇遍於方域故云各各自知等也二信圓真實見十方空如觀手中所持葉物一切世間諸所有相皆即菩提妙明元心心精遍圓含裹十方初信萬法唯心良以一切衆生自想相為身已來聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物今因心遍十方乃見十方虗空在於心內以喻言之如觀手中所持葉物葉即貝葉物如菴羅果等然虗空既在心內況一切世間諸所有物如山河大地有情色身等依於虗空住者豈不皆即菩提妙明元心是乃向所不知者今始知矣心精下信心包萬法包者巨細并容即圓真實良以一切衆生自結見為根以來聽不出聲見不超色豈知心精遍圓心精即見聞等六離於妄見故稱心精含裹十方今了萬法惟心自信心包萬法故云含云裹也三信常真實反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從了然自知獲本妙心常住不滅初了色身無常良以六十二見身見為本既未脫於見網豈知身是生滅今因知心遍圓之後回視七尺之軀渺乎微矣倐焉歸盡故以虗空微塵巨海浮漚喻之虗空喻心精遍圓一微喻幻身渺小既小且渺如有如無故以若存若亡喻之湛海喻真心不動浮漚喻色身無常當處出生隨處滅盡故云起滅無從此亦向所不覺者今始覺矣了然下知真心常住了然者諦信無疑自知者不假他力具上二種真實曰妙心妙非外得即性自具曰本妙心也常住者無始自爾翻前若存若亡不滅者盡際恆然翻前起滅無從良由身見未除無始寶愛遂令見聞覺知受制於地水火風本妙真常於中而枉受生滅豈知雲駛而月自不運舟行而岸未曾移今為了身是妄因而信性元真故云了然自知等也按後揀選圓通獨推耳根聞性具三真實由此觀之則三真實義未許觀音獨證然亦各各具足但衆生迷之觀音悟之而此衆則信之也承示啓信竟二讚佛發願二一敘禮標偈二正陳偈詞初禮佛合掌得未曾有於如來前說偈讚佛禮佛謝前合掌請後得未曾有者慶快寓於中說偈讚佛者智辨流於外也又不了義教素所習聞今是了義之教故曰未有西域記曰偈者梵音略也或偈他梵音訛也正音伽陀此云諷頌謂諷功頌德也灌頂云法益受深感報實切故說偈讚二正陳偈詞四一讚佛恩深二發願圖報三誓成三德四結申不退初妙湛總持不動尊首楞嚴王世希有銷我億劫顛倒想不歷僧祇獲法身初句讚能說佛證通真實曰妙湛以通則彌滿清淨中不容他故曰妙湛證圓真實曰總持以圓則無法不包無物不攝故曰總持證常真實曰不動以常則不生不滅無去無來故曰不動阿難初信此理例知佛必久證故即以此讚之又以佛證此理為世所推故益以尊稱次句讚所說法首楞嚴義見題中才說奢摩便稱首楞嚴者以是三法總名隨便皆可稱故又以能總統諸法故益以王稱法華云諸佛出於世懸遠值遇難正使出於世說是法復難今經亦爾故云世希有也銷我二句明所受益倒想即六識心也倒有二義一體即是倒以因迷妄有故二用亦是倒如無我計我無法計法等正以其體用俱倒故以顛倒稱之無始與俱略言億劫耳今因破妄以來密示知其無處顯呵知其非心細推知其無體故全銷也法身即如來藏也法亦二義一體即是法可軌可持故二用亦是法依此成佛依此說法故正以其體用俱法故以法身稱之按小始終實諸教雖淺深不同率皆由於三祇煉行因滿成佛方能契證今由顯真以來指見知其在己會科知其該法融大知其互圓故即獲也然雖曰銷曰獲不過知無知有尚未歷於觀行豈能造乎事修蓋由阿難信心猛利懸解懸會如此非真能到此地位若以圓頓二教會之亦無不可二發願圖報願今得果成寶王還度如是恆沙衆將此深心奉塵剎是則名為報佛恩初句願成佛果今字語略應云今而後也言阿難既信法身本有自知成佛有分故發願於自今而後歷事造修得究竟果坐大寶華說諸法門成寶華王也次句願度衆生言雖成寶生不捨慈門還入塵勞行度生事必將如是恆沙衆生一一度盡願無終窮也將此二句回向報恩言既成佛果又入塵勞度生是曰深心將此深心又復回奉塵剎衆生皆共成佛是則名為報佛恩於萬一耳三誓成三德伏請世尊為證明五濁惡世誓先入如一衆生未成佛終不於此取泥洹大雄大力大慈悲希更審除微細惑令我早登無上覺於十方界坐道場初誓成恩德伏請者伏俯而請表請之誠故證明者證知分明明誓無妄故良以上科發願度生是成佛以後事又思未成佛前亦須以度生而為資糧故請佛作證也五濁者劫濁見濁煩惱濁衆生濁命濁也乳峰云劫濁者約後四濁立此假名而無別體四濁增劇聚在此時即其相也見濁者五利使為體諸見熾盛為相煩惱濁者五鈍使為體三灾招感為相衆生濁者攬五陰見慢果報為體惡名穢稱為相命濁者色心連持為體催年減壽為相然此與經後所說不同彼約根本此約枝末細相粗相異故按教中人壽二萬歲時即入劫濁展轉增劇至人壽百歲時諸惡熾盛剛強難化轉名惡世法華云劫濁亂時衆生垢重成就諸不善根是也然此世人多怯入今願先入有二義一倡先率衆勇猛心也二苦重救先悲愍心也泥洹涅槃梵音輕重之異一生未成佛終不於此取證者廣大心也此則與衆生有大恩德成就化身大雄二句誓成斷德能摧衆生深惑曰大雄能除深惑種習曰大力能與二嚴之樂曰大慈能拔二死之苦曰大悲欲求智斷二德須憑加被之力故約智斷之義稱之希求也細惑指所知障言言倒想既銷從此加功用行煩惱障自可斷除其如所知細惑無緣可滅故希更審除謂求佛更為審辨斷除細惑法耳此則於無明有大斷德成就法身末二句誓成智德無上覺即究竟菩提令我早登者願佛慈悲加持速得成佛之義於十方界者即遍入華藏坐道場者即具嚴說法成寶華王也此則於菩提有大智德成就報身三德既具三身已圓自後倒駕慈航還入塵勞度脫衆生皆共成佛方了圖報佛恩願耳四結申不退舜若多性可銷亡爍迦羅心無動轉溫陵曰舜若多此云空爍迦羅此云堅固謂空性無體尚可銷亡我心堅固終無退轉灌頂云銷有二義一空決不可銷下云空非可作無壞滅故今言空尚可銷心必不動如虗空可量無盡佛德義也二發真歸元虗空銷殞漚滅空本無況復諸三有理實空可銷亡心不可殞如劫壞之時海涸山崩而如來藏心豈傾竭耶又云密部爍迦羅斫羯羅并翻金剛心如金剛寧有壞哉正脈云總承前上求下化而深誓其心即虗空有盡我願無窮也從阿難請定以來至此說法當為一周名破妄顯真周總結為銷倒想說空藏已竟
