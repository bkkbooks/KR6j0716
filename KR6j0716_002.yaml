body:
  text: 京都拈華寺賢宗後學達天通理敬述嗣法門人興宗祖旺謄清懷仁祖毓較字三顯見不滅四一會眾因悟請益二匿王疑斷求決三如來通為顯示四王等踊躍喜慶初爾時阿難及諸大眾聞佛示誨身心泰然念無始來失却本心妄認緣塵分別影事今日開悟如失乳兒忽遇慈母合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性初因悟慶快阿難大眾既聞是心之示復聞不動之誨則非心名何之驚離此更無之怖一時頓釋故云身心泰然泰然者安舒義謂內心既安外貌亦舒所謂慶快平生是也念無下念昔形今遙憶最初莫窮其始故曰念無始來晦昧本有轉成賴耶雖能生諸緣乃緣所不及故云失却本心內搖外奔昏擾擾相以為心性故云妄認緣塵緣塵即六處識心分別言其用影事顯其相耳今日開悟者悟見性是心其體不動法身再續慧命更延故云如失乳兒忽遇慈母反顯失却本心如背母失乳妄認緣塵如身懸命危今昔相形何慶如之上云身心泰然者以此合掌下具儀希益願聞等非彼言請乃經家描寫其意良以上科中境動而見性不動其理易明至於頭搖見轉身動心移而言一動一不動者其義難分故爾合掌禮佛其意葢欲如來顯出此心所以為真為實顯出此身所以為妄為虗必令現前生滅之身與不生滅之心二者一一發明其性體庶取捨定而不至顛倒行事矣會眾因悟請益竟二匿王疑斷求決時波斯匿王起立白佛我昔未承諸佛誨勅見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃我雖值佛今猶狐疑云何發揮證知此心不生滅地今此大眾諸有漏者咸皆願聞初曾聞斷滅灌頂云域中四大道為第一人法王中出世為勝今問道於法王禮須起白我昔指楞嚴已前諸語詞也如上兩科誨勅楞嚴乃有故已前未承此明正法未及染神顯邪說易入也見迦旃延等出先入邪說迦旃延此云翦剃種姓也名迦留鳩陀此云牛領其人計罪福苦樂皆自在天作毗羅胝此云空城是其母名子上加之字依主釋也自名刪闍耶此翻圓勝其人計修苦行以酬往因此外道六師中二雖說道不同皆宗斷見故曰咸言死後斷滅者謂靈隨氣散無復後世此方迂儒亦多同此計但不名涅槃其為害少細涅槃此云圓寂或滅度或寂滅等雖有多義猶以不生滅為要彼迦旃延等反以斷滅名之信其說者必至撥無因果妄為聖證正言不入諸佛不度其為害不可勝言此匿王未聞正法先受其惑也我雖下述疑求決值佛即指今日染邪既久領見未深捨非決定取無果敢故自述猶疑疑而云狐者以狐性多疑渡冰聽水再四不果人之多疑者似之既猶狐疑但是似領未到不生滅地故求如來云何發揮云何者云何設方發揮者極力顯示其意葢欲現量親見體證了知此心必到不生滅地而後已也今此下代眾達情諸有漏者意指生死凡夫現在人天中者以彼唯慕有漏方欲捨生趣生一聞斷滅各各驚疑故云咸皆願聞後文與王同喜即此眾也匿王疑斷求決竟三如來通為顯示真妄混淆會眾請示死後斷滅匿王求決如來圓音一唱隨機各符其心故云通為三一顯示此身虗妄二顯示此心真實三結示現前二性初此與下二科乃尅就經文而立以前文顯出身心真妄虗實等極難銷會故分而科之庶請酬相應對閱自知二一略彰變滅二詳敘變滅初三一徵定此身終滅二問答必滅之由三印其所說不謬初佛告大王汝身現在今復問汝汝此肉身為同金剛常住不朽為復變壞世尊我今此身終從變滅初問身常變佛告大王者欲於此身顯示虗妄生滅性故正脈云以王發起者有二意一就王老相易示遷變二顯身無常至貴不免愚謂此二意似合四悉前二若兼對治斷見指示不生滅性則四悉具矣就匿王示會眾故言汝身世人多以身之現在不覺遷變故特約現在問之因求反徵故曰今復問汝金剛帝釋寶也有堅利二義今取堅義故曰常住不朽惟法身可以同此若復肉身乃父母所生有為有漏安得不壞如來明知故問者恐其躭著世樂不復警念無常法故世尊下答以終滅終者究竟義從猶歸也言此身本屬無常縱以宿因報感長年而會必有離究竟歸於變滅此亦因聞斷滅懼其速死時時體驗此身故所答不謬二問答必滅之由佛言大王汝未曾滅云何知滅世尊我此無常變壞之身雖未曾滅我觀現前念念遷謝新新不住如火成灰漸漸銷殞殞亡不息決知此身當從滅盡初問知滅由人皆曰少壯同體百齡一質所謂徒知年往不覺形隨而匿王獨能超出常情審知變滅必有所由故問以汝未曾滅云何知滅世尊下答以觀知我此句先以判定此身是無常變壞法故因是無常變壞所以雖未曾滅諦觀自知我觀現前者即諦觀現前生滅身也念念遷謝者如前念延至後念則此身故熊已隨前念而遷謝故故態既謝則後念之身又是一新人矣故仲尼曰回也見新交臂非故但新無常新故曰新新謂新而復謝謝而又新也一念既爾念念皆然故曰不住由不住故須臾變新作故故曰如火成灰灰無常灰頃刻轉故為新故曰漸漸銷殞謂銷殞故灰顯露新火也亡亦殞義正由殞而復新新而復殞無所底止故曰殞亡不息現前既爾將來亦然故云決知此身當從滅盡正脈云只此數語便可警念無常劇貪世務者寧不惕然三印其所說不謬佛言如是觀現前遷謝知當歸滅盡於理極成故印以如是略彰變滅竟二詳敘變滅三一今昔殊異二時年遷變三細沉知滅初大王汝今生齡已從衰老顏貌何如童子之時世曾我昔孩孺膚腠潤澤年至長成血氣充滿而今頹齡迫於衰耄形色枯悴精神昏昧髮白面皺逮將不久如何見比充盛之時初佛令自較王重出世以佛為尊佛尊世法以王為大遞互相恭則佛法得世法以行世法資佛法以立也齡同年從猶隨也言匿王生年六十有二雖未極衰極老已隨衰老之列顏色相貌自不如昔況復童時問以何如者令其自較何所似於童子時也世尊下承教歷述始生曰孩始行曰孺所謂孩提之童是也皮不枯悴文不粗澁故曰膚腠潤澤膚者身之皮表腠者身之文理滋潤滑澤亦孩提所固然耳年至長成者謂二三十歲長大成人時也精神方以周足故云血氣充滿而今頹齡者即現前六十二歲已覺頹敗時也不久便至極暮故云迫於衰耄迫近也七十曰衰八十曰耋九十曰耄至此則極暮矣形色下結顯逈異形色者形容顏色枯悴者枯槁憔悴非若童時之膚腠潤澤精神者精血神氣昏昧者血衰氣微非若少時之血氣充滿髮白面皺者迫於衰逮將不久者近於耄逮猶及也如何見比者猶言怎麼能相比也充盛即少壯之時少壯之時尚不可比況復童年自覺其逈異矣二時年遷變佛言大王汝之形容應不頓朽王言世尊變化密移我誠不覺寒暑遷流漸至於此何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十於今六十又過於二觀五十時宛然強壯初如來引說意謂據汝所說形容朽於昔年想從昔至今應非頓然便朽汝向亦自覺乎王言下答以漸至變化者變少為壯化壯為老密移者行遷業運密密變移此係幽隱妄想凡夫粗心莫辯故曰我誠不覺莊生喻夜壑負舟孔子謂不知老至皆此意也寒暑漸至者據理擬對言我雖不覺以理擬之葢是寒來暑往遷變流易漸漸至此誠如佛言不頓朽耳何以下徵釋漸義我年二十等長不如幼三十之年等壯不如長於今六十等耆不如艾葢十歲名幼二十為長三十曰壯四十謂強五十稱艾六十號耆中缺艾不如強強不如壯者超略言之可例知故由此後後不如前前則寒暑漸至可知其槩矣灌頂云因果經釋迦譜並明匿王與佛同日而生則楞嚴說當佛六十二歲屬般若時非餘會攝三細沉知滅世尊我見密移雖此殂落其間流易且限十年若復令我微細思惟其變寧唯一紀二紀實為年變豈唯年變亦兼月化何直月化兼又日遷沉思諦觀剎那剎那念念之間不得停住故知我身終從變滅初牒前粗推我見密移者謂如我上說是我所見密密遷移之行相也殂落者死之異名古釋云魂升於天曰殂魄歸於地曰落今則但取遷變之義猶云雖此遷變尚未是不覺之密移以其間遷流變易且限十年言之若復下就中細思言上來十年一變尚屬可見降斯似非所覺然亦未之思耳設若令我微細思惟自覺不待十年故曰其變寧唯一紀二紀紀謂十二年也今則不必十二但是牒前十年以變其文猶云豈唯十年二十年一變也實為年年有變月化日遷准此可知沉思下沉觀知滅沉思者沉靜其意而思諦觀者諦審其幾而觀剎那翻最少時俱舍云時之極長名劫波時之極少名剎那重言剎那者言不唯日遷實為剎那剎那之間即有變更也仁王云一念中具九十剎那一剎那有九百生滅是知剎那猶在念中既剎那有變則一念一念之間皆不得停住矣既念念不得停住驗知將來畢竟無常因云故知我身終從變滅顯示此身虗妄竟二顯示此心真實二一問答許示二借事顯發初佛告大王汝見變化遷改不停悟知汝滅亦於滅時汝知身中有不滅耶波斯匿王合掌白佛我實不知佛言我今示汝不生滅性初牒悟示問佛告大王者欲於此心顯示真實不生滅性故見變知滅是王所悟牒之為發問之端滅中不滅正王所迷問之為發悟之機也波斯下秉心實對匿王正恐斷滅忽承不滅之問急於求示故合掌秉心而白我實不知者非是謙偽若果其知之自不惑於斷見佛言下許示不滅言汝既不知我今即於生滅身中示汝不生滅性二借事顯發二一引敘觀河二例水顯見初大王汝年幾時見恒河水王言我生三歲慈母擕我謁耆婆天經過此流爾時即知是恒河水問以幾時見水者欲取童時之見與今耆零之見顯不變也答以三歲即知者正顯孩提之年已同耆零時之性故恒河正音殑伽河此云天堂來以此水自雪山頂阿耨達池流出狀其來處最高故提抱曰擕朝禮曰謁耆婆此云長命國俗祀之乞壽慈母為子因擕之而謁焉二例水顯見二一先辯能例之水二次顯所例之見初佛言大王如汝所說二十之時衰於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何王言如三歲時宛然無異乃至於今年六十二亦無有異初牒身有變二十之時等牒前粗推約十年一變也乃至等超略三四五十言六十故舉整略零故不言二日月歲時等牒前細推極念念不停也時即剎那日月歲逆次說故則汝下例身問水三歲至十三且約十年問也其水云何者言身既十年一變未知十年之內水性亦有變不亦故問也王言下答以無異言宛然無異者但取其濕性不改碧色同前若以水勢言之則十年之內不無泛漲縮消之異乃至等超略三四五十言六十二亦且以十年不變答之二次顯所例之見佛言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恒河與昔童時觀河之見有童耄不王言不也世尊初牒面有變前科牒時年遷變之文此科牒今昔殊異之語其面必定等據所傷以斷其必變也則汝下例面問性今時與童時者約今昔相形為問見有童耄者耄取衰老之義非指九十歲言言面既今昔有異未審二時觀河見性亦有異不以童耄即異也王言下答以無異例上水性不改因悟見性體同故直以不也答之然亦唯取始終能見若以根言則六十年內不無清明昏華之異問不動科中已知身動而見性不動與此何異答前雖已知但一時覺照而已至若現前生滅與不生滅實無智以自分今佛假匿王歷歷顯出而阿難等前此所覺所照自應轉更增明非彼若也顯示此心真實竟三結示現前二性二一正以結示二怪責輪迷初佛言大王汝面雖皺而此見精性未曾皺皺者為變不皺非變變者受滅彼不變者元無生滅皺約顏貌仍取殊異中文變約時年仍取遷變中語然面皺而見性不皺身心之妄真判然皺變而不皺非變身心之虗實攸分變滅而不變無滅則生滅性與不生滅性各有發明會眾之請至此酬矣二怪責輪迷云何於中受汝生死而猶引彼末伽黎等都言此身死後全滅云何者怪責之詞言既具不生滅性依之修證便超生死汝等云何不取反在生滅身中甘受汝之生死自取輪轉已是錯矣而猶引彼末伽黎等一類外道都言此身死後全滅豈非錯之又錯真為迷之甚者末伽黎此云不見道其人謂罪福苦樂不因行得與迦旃延等同宗斷見佛恐匿王捨彼從此故互出之都言即同咸言全滅者身滅性亦隨滅理實不然故爾結責匿王斷滅之疑自此永盡如來通為顯示竟四王等踊躍喜慶王聞是言信知身後捨生趣生與諸大眾踊躍歡喜得未曾有初聞言生信王聞是言雖通承前文而得力處在結責中末後二句葢匿王本不求取真心雖聞不變無滅不以為喜又匿王本不求出生死雖聞受汝生死不以為驚唯聞不許全滅顯有後世頓銷斷見之疑故云信知身後云云捨生趣生正四相中人相匿王迹居凡位故唯信此與諸下與眾同喜大眾者唯就匿王一類位在人天中者樂著生死懼成斷滅信與王同故不禁踊躍於身歡喜於心也向謂身後全空今知身後有性且得捨生趣生故云得未曾有問大眾語寬何得但指凡位答權小信此喜此是損非益然彼非無喜但喜其較前不動科中轉更增明既非新悟故不敘也按阿難所請四義中此科正明常義顯見不滅竟四顯見不失二一阿難執此疑前二如來顯倒無失初阿難即從座起禮佛合掌長跪白佛世尊若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事願興慈悲洗我塵垢初起座具儀疑佛語而致請非同常說故須禮跪而白世尊下按定現說若此者指上所說上唯舉見此復兼聞者以元是一體見既不生不滅聞性可例說故而言必不生滅者正按定佛語為下致疑之端云何下反疑前言意謂據佛現說似應無所遺失云何世尊前來名我等遺失真性且責以顛倒行事此又所不解也願興下求佛除疑興謂發起謂願佛發起慈悲心故纖疑在念塵垢障心若蒙慈悲洗除庶能獲不滅樂出遺失苦矣二如來顯倒無失二一法喻合明二普為開示初二一借臂為喻二約身以合初三一垂臂為倒喻二竪臂為正喻三相換無失喻初即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手為正為倒阿難言世間眾生以此為倒而我不知誰正誰倒垂臂下指者喻違真逐妄示阿難言者令因喻詳法母陀羅此云印手以印名者以能隨事結印成益破惡神用不思議故問以為正為倒者欲假此以喻正徧知身及性顛倒身也答以世間眾生以此為倒者喻建化門頭以違真逐妄號性顛倒身故而我不知誰正誰倒者顯臂無定相喻實際理地性顛倒身即是正徧知身正徧知身即是性顛倒身故然此中答文雖出阿難亦佛意借口為喻故無妨配釋二竪臂為正喻佛告阿難若世間人以此為倒即世間人將何為正阿難言如來竪臂兜羅綿手上指於空則名為正佛意既建化門頭以違真逐妄號性顛倒即問建化門頭更說何者為正徧知故仍就喻中問云若世間人以此為倒即世間人將何為正答以竪臂上指者喻反妄歸真也反妄歸真約建化門頭說為正徧知身故以則名為正喻之三相換無失喻佛即竪臂告阿難言若此顛倒首尾相換佛即竪臂者喻建化門頭有反妄歸真事也若此者指上竪為正言意謂若此上竪為正則所稱顛倒者不過將手稍之首與臂根之尾上下相換而已豈離正臂外別有所謂倒者用此為喻喻建化門頭若以反妄歸真為正徧知則所稱性顛倒者不過違真逐妄真妄交錯而已豈離正徧知外別有所謂性顛倒者是則妄非真外因認妄而說遺真正為倒本緣背正而稱顛倒知此喻者自不疑名為遺失及責以顛倒語矣借臂為喻竟二約身以合二一總合二別合初諸世間人一倍瞻視則知汝身與諸如來清淨法身比類發明一倍者三分之二猶云多一倍也言上竪為正下垂為倒諸世間人多一倍皆如是瞻視似可為憑矣若以此為例則知汝之雜染色身與諸如來清淨法身所以稱倒稱正者不過以違真逐妄反妄歸真比類形顯約義發明而已豈真有正倒哉二別合如來之身名正徧知汝等之身號性顛倒隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒於時阿難與諸大眾瞪矒瞻佛目睛不瞬不知身心顛倒所在初合竪臂為正喻如來之身即清淨法身若以阿難之身比類形顯約義發明則名正徧知身葢以反妄歸真成正知見徧知一切與彼輪手上指者無異汝等下合垂臂為倒喻汝等之身阿難及眾身也未證清淨法身皆為雜染色身若以如來之身比類形顯約義發明則號性顛倒身葢以違真逐妄成顛倒見認妄遺真如彼輪手下指者無異隨汝下合相換無失喻名字處宜連上為句意謂比類發明似有正倒其實本無正倒如不信者隨汝諦審觀察此是汝身此是佛身汝身所以稱顛倒者不過以佛身比類假立名字究竟何處號為顛倒葢如來明知無處而故為難問令自覺也於時者即如來示問時也阿難大眾承教諦觀故曰瞪瞢瞪直視瞢不明謂瞪久反昏也瞻佛者先觀佛身以求正處以正倒相對欲因正而識倒故目睛不瞬者求正處不可得也正處既不可得反觀自己身心何處為倒故亦不知是知佛身生身本無正倒雖名倒無失不過真妄交錯亦如金臂輪手首尾相換者無異法喻合明竟二普為開示三一示以正見二責以倒執三就喻結歎初佛興慈悲哀愍阿難及諸大眾發海潮音徧告同會諸善男子我常說言色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物初敘意標告佛興慈悲者欲與正徧知樂及拔性顛倒苦也瞪瞻不瞬如盲如癡故可哀愍不唯阿難大眾亦爾故及之也正脈云應不失時名海潮音以此時阿難大眾適當可教之時佛即及時而應故徧告同會者一音圓被之義諸善下引說唯心灌頂云常說者大乘深密等經也色即十一色法心即八識心王諸緣者生心有四緣謂親因緣所緣緣增上緣等無間緣生色唯二緣以不須所緣及無間故心所使即五十一心所法也隨心驅役故名為使諸所緣法即二十四種不相應行及六種無為以不相應行亦是識之所緣六種無為又是智所緣故廣如唯識百法論說現變起也心之一字雖即見聞覺知乃指離妄純真之體無明不覺三細俄興境界為緣六粗兢作故云唯心所現作是觀者名為正見汝身下直指令悟汝身者直指阿難四大之身汝心者直指阿難六識之心皆是者無不是故從來不昏曰妙明即心之照用從來不變曰真精即心之寂體寂照互融體用無礙故總以妙心稱之依起信即一心本源依華嚴即一真法界諸法皆為所現阿難身心自應亦是中所現物此如來直指阿難即現前身心證諸法本體成正知正見也示以正見竟二責以倒執二一法說二喻明初二一違真逐妄二認妄遺真初云何汝等遺失本妙圓妙明心寶明妙性認悟中迷晦昧為空空晦暗中結暗為色色雜妄想想相為身初責以違真云何者怪責之詞遺失等皆所責之咎本妙即上科妙心以是本來自妙非修得故圓乃通融流動用之相也寶乃清淨堅實體之相也用則從妙起明故曰妙明顯是即體之用體則即明而妙故曰明妙顯是即用之體是則心之與性用體暫分亦有不分以義既互融開合無礙故經中或單言心或單言性或心性對舉講演者隨文立義勿拘執也認悟中迷者以此乃悟時心性下之昏擾擾相乃迷時心性然妄依真起迷從悟生故是悟中之迷不認則即妄即真全迷全悟正由誤認所以與真永違與悟永隔也晦昧下責以逐妄言心性本妙云何遺失又正在悟中云何便迷故約晦昧為空等出其由也始由一念妄動隱覆本妙故曰晦昧此處即是賴耶以正晦昧時即是真妄和合時故次由賴耶轉出見分於本無一法之中妄作空相故云為空後云迷妄有虗空是也葢空唯頑虗亦晦暗相但見分不守暗相堅執欲緣遂於空晦暗中凝結暗相而成世界之色後云依空立世界是也然世界有二一情二器至此乃三細具足以賴耶即業相見分即轉相空界即現相下乃六粗色即上之所現依此為緣起於智續二相故云色雜妄想謂於境界色中雜以二種妄想心故想相者想彼色相執取計名起業由此能感未來之生故云想相為身至此乃六粗成就以身即業繫苦相此責其由細向粗展轉逐妄而不返也違真逐妄竟二認妄遺真聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物初先明認妄聚緣二句指前七識言上來既有身相即分內外由是於八識體上現起前七轉識第六意識聚集前五識所緣塵影在內分別名曰內搖前五識趣逐前五外塵馳騁放縱名曰奔逸不言七識者以義攝故以七識為自體用內依八外借六也內搖外奔無暫清寧故曰昏擾擾相眾生不知反謂有實體用故曰以為心性所謂認悟中迷者以此一迷下次顯遺真一迷者纔一迷也定惑者無能脫也言眾生不迷則已一迷則定謂在內無有能脫此惑者如阿難云一切世間十種異生同將識心居在身內是也色身屬正報洎及也山河虗空大地皆屬依報此等皆依妙明真心隨緣變現而仍依彼建立故曰咸是中物其如眾生自認身內之心謂其能廣能大有實體用遂於此本來廣大之心依正通依之體而不能知所謂遺失本妙者以此法說竟二喻明譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡瀛渤澄清者海之德喻真心彌滿清淨百千者海之量猶云百千頃也喻真心包含萬有餘海莫及故稱為大喻心海非識海所及一向遺失故曰棄之此喻違真不喻逐妄者以違真必逐妄故浮漚水上泡也略具二義可喻識心一者依海暫現喻識心依真妄起二者有無不定喻識心生滅不停一向誤執故曰唯認全潮者全海潮漲也泛濫無際唯真心緣起妙用可以類此而眾生既唯認妄將必以妄想攀緣視為真心妙用故曰目為瀛渤者海外之海唯海能潛通喻如來究竟覺心唯本覺可以密契而眾生既以妄想攀緣視為真心妙用將謂即此可以成佛故曰窮盡此喻認妄不喻遺真者以認妄必遺真故責以倒執竟三就喻結歎汝等即是迷中倍人如我垂手等無差別如來說為可憐愍者初就喻顯倒違真認妄而又視為真心妙用且謂其可以成佛如棄海認漚已是迷矣而又目為全潮且言其窮盡瀛渤則是迷而復迷故曰迷中倍人無倒成倒非失說失故曰如我垂手等無差別末句結歎可愍言果其有倒有失尚不足愍正以無倒成倒非失說失如垂手然故可憐愍是知欲正不難竪手即是復真亦易反妄無非聞佛結歎之語宜發深省問帶妄顯真尚未深領遽指真源寧無河漢答顯見原為契真是佛密意乘阿難不知有妄就便顯其殊勝令其領見也按阿難所請四義中此亦足前常字正脈云上科約未來說如云盡未來際究竟不滅此科約過去說如云從無始來本有不遺既唯約竪論定屬常字無疑顯見不失竟五顯見無還正脈云還者去也科名獨標去意文中兼有來意顯無去來耳三一阿難求決取捨二如來破顯二心三結歎自受輪溺初阿難承佛悲救深誨垂泣叉手而白佛言我雖承佛如是妙音悟妙明心元所圓滿常住心地而我悟佛現說法音現以緣心允所瞻仰徒獲此心未敢認為本元心地願佛哀愍宣示圓音拔我疑根歸無上道初悲感白佛正脈云悲救者救其顛倒受淪深誨者誨其極領正徧知也垂泣者有二義一者感佛救誨悲深難報二者傷己愚迷取捨未決由斯二義所以叉手而白我雖下自陳未決雖者暫縱義謂縱悟真心也如是妙音即指上科所說稱性開示迥異昔談故稱妙音悟者隨語生解非是真悟觀下未敢認為之語可知妙明等即上科所示真心上稱妙明真精此但云妙明者用必有體不言可知故元所圓滿者本自圓具一切滿足無欠此領上科心現諸法法在心中之義既聞無倒成倒自知說失非失故曰常住心地而字有畏難義以下有畏捨難捨意故其意以悟佛現說現用緣心捨此緣心憑何開悟此畏捨意也允誠也瞻仰者戀慕義謂戀慕緣心不忍遽捨此難捨意也徒者終枉義謂枉獲此心也此心仍指真心上云元所圓滿等明知其是本元心地而猶云未敢認者以認此必至捨彼恐向後聞法開悟無所憑耳願佛下求佛宣示良以緣心為生死根本不能遽捨真心為二果淨體未敢遽認自知愚而且迷故求佛哀愍圓滿音輪高低普應故求佛宣示緣心難捨是為疑真之根拔而除之庶可以取真心而歸無上道矣阿難求決取捨竟二如來破顯二心二一破緣心有還二顯見性無還初二一先破所緣之法二正破能緣之心初正脈云不捨緣心既全為於重法故須破法而緣心自捨矣四一直斥其法二異喻反顯三同喻正明四結合警悟初佛告阿難汝等尚以緣心聽法此法亦緣非得法性汝等句寓有深責之意意謂我已重重破斥令捨緣心將謂永棄不料汝等尚以緣心聽法誠為辜負良可憐愍此法亦緣者以能聽既屬緣心所聽即屬緣塵既唯是緣則正智迷於妄想如如蔽於名相故云非得法性法性者諸法實性以一切諸法唯心所現故也二異喻反顯如人以手指月示人彼人因指應當看月斥以非得法性恐未心服故先用異喻而反顯之言如來說教原為顯發心性開示智者如人以手指月示人上人字喻佛手喻教月喻心下人字喻智者對愚迷者言若果是智者自能依教觀心如彼人因指應當看月反顯阿難等不能如是足見其不得法性三同喻正明若復觀指以為月體此人豈唯亡失月輪亦亡其指何以故以所標指為明月故豈唯亡指亦復不識明之與暗何以故即以指體為月明性明暗二性無所了故異喻反顯恐猶未了故復以同喻而正明之文分三段初喻迷心性言愚迷之人以攀緣心聞教便謂悟心如若復有人觀指為月此中人喻愚者正明阿難等愚迷同此此人下喻迷教體言如是愚迷之人不但不知心性亦復不識教體如彼觀指為月之人豈唯亡失月輪亦亡其指此中亡失皆不知義也何以句喻中徵亡指所以法中徵迷教所以言如是愚迷之人所以謂其不知教體者何以故耳釋中由彼即以能詮之教為所詮之心如彼觀指為月之人即以所用能標之指為所標明月豈識指者之所為乎要知識指者自不以指為月而知教者豈復以教為心哉豈唯下喻迷二相明即月相喻靈覺為心相暗即指相喻頑塵為教相言如是愚迷之人不但不識教體兼亦不識靈之與頑如彼觀指為月之人豈唯亡指亦復不識明之與暗何以下喻中徵釋不識明暗所以法中徵釋不識靈頑所以言如是愚迷之人所以謂其不識靈頑者何以故耳葢教以頑塵為相心以靈覺為相而彼既以教體為心是靈頑二相亦不能了如彼觀指為月之人即以指體為月明性明暗二性無所了故此不唯不得法性尤見其愚迷之甚也四結合警悟汝亦如是此雖結合之語寓有警悟之意意謂如我上說指月雙失明暗俱昧者豈是他人而汝等之心教雙迷靈頑莫辯亦復如是幸宜自悟勿至為智者所哂也此上四科總為破所緣法不分亦可但以法喻重疊難以銷釋故不厭煩析也先破所緣之法竟二正破能緣之心三一詳破耳識二略例餘五三總以結破初現惜緣聲之心不能遽捨故須詳破二一據執反難二法喻合明初若以分別我說法音為汝心者此心自應離分別音有分別性所緣既非法性能緣豈是真心恐其固執故爾反難意謂若汝必以分別我說法音之影子為汝心者但心非無體而今此心自應離却所分別音時別有能分別性然前已就塵推破豈遽忘耶二法喻合明譬如有客寄宿旅亭暫止便去終不常住而掌亭人都無所去名為亭主此亦如是若真汝心則無所去云何離聲無分別性初喻說客喻能緣之心旅亭喻所緣之境客非亭主偶來棲託曰寄宿喻識非法性倐爾攀緣但依附也亭不適意一宿即捨曰暫止便去喻識心遇不可意聲不耐久緣方生即滅也終不常住者縱使適意非比故鄉三朝五日定要捨離喻識心縱遇可意之聲而所之既倦情隨事遷終有謝滅時也此是同喻以緣心正同此故掌亭人謂執掌旅亭之人喻真心能成立諸法非同宿客故都無所去喻真心非比緣心故常住不滅又以無所去故名為亭主喻真心以常住不滅故是稱法性此是異喻以緣心不同此故此亦下法合此指緣心或生滅或常住亦應如是客主相似此總合也若真下別合意謂果若真是汝心則應如亭主無所去也此合異喻云何下合同喻據前推破無體文云如汝今者承聽我法此則因聲而有分別是則離聲無性阿難已知故就此為難意謂既不如主云何反如暫止便去之客如我前說離聲無分別性則其非真也明矣詳破耳識竟二略例餘五現執緣聲為心前已詳破餘五雖現執未起種子方眠方眠故須例破未起故惟略言斯則豈惟聲分別心分別我容離諸色相無分別性如是乃至分別都無非色非空拘舍離等昧為冥諦離諸法緣無分別性斯則句牒前為例謂聲分別心離聲無性已知之矣豈惟此也即如分別我容之心離諸色相無分別性亦但如暫止之客非亭主也如是者重牒上二為例言二心既皆如是則分別香味觸法之心離四無性可以例思今超略而言乃至分別都無其內守幽閑之心亦復如是分別都無者六識不緣六塵唯留定中獨頭內守幽閑今云非色非空是也已離六塵粗相故曰非色猶有幽閑細境故曰非空拘舍離此云牛舍即末伽黎之異稱灌頂謂是其生處正脈謂是其母名愚謂既屬異稱生處為是如此方以生處立奶諱之例等指同計如數論師等彼以定力能通八萬劫外則冥然莫辯立為冥性且謂是諸法實性故稱為諦要知冥然莫辯正同非色非空幽閑之境猶是微細法塵由彼不知妄立故曰昧為妄立昧為即同內守之心猶是微細分別離於法塵為緣依然無性如彼聲分別心等無以異也據正脈懸示略言識心有五種勝善之用一者緣佛色相心二者緣佛聲教心三者聞法領悟心四者止散入寂心五者界外取證心愚謂此五種心從正宗以來至此方已破盡如前阿難云我見如來三十二相心生愛樂如來斥以此想不真故有輪轉此云分別我容離色無性皆破第一緣佛色相心也又前云如汝今者承聽我法此則因聲而有分別乃破第二緣佛聲教心也又此阿難云而我悟佛現說法音現以緣心如來示以緣心聽法此法亦緣等即破第三聞法領悟心也又前云縱滅一切見聞覺知內守幽閑猶為法塵分別影事此云分別都無離諸法緣無分別性即破第四止散入寂心也又前云現前雖成九次第定不得漏盡成阿羅漢等已破第五界外取證心也良以無始生死皆為誤認此心若唯破其劣惡恐尚留勝善今既破其勝善則劣惡之心自知其不可用也略例餘五竟三總以結破則汝心性各有所還云何為主則汝心性總指六種緣心離塵無性故云各有所還明是客義故曰云何為主既非是主急當捨離此且為阿難等拔除疑根至下乃令其歸無上道破緣心有還竟二顯見性無還二一阿難求示無還二如來詳為顯示初阿難言若我心性各有所還則如來說妙明元心云何無還唯垂哀愍為我宣說若之一字寓有不自信意意謂若依佛說我此六種心性各有所還此既有還則如來已前所說妙明元心自應無還但不知云何無還進取未定退捨莫決智墮兩楹如羊觸藩若非如來哀愍宣說何由解脫故云唯垂等也二如來詳為顯示三一抑揚許示二能所對辯三警覺取捨初佛告阿難且汝見我見精明元此見雖非妙精明心如第二月非是月影汝應諦聽今當示汝無所還地初略為抑揚佛告阿難者應其哀愍之求且汝見我等酧其宣說之請如來意謂汝既求我哀愍我亦不必牽藤引蔓姑且就汝見我言之當斯時也能見之情體明用即是本元真心但以二妄未除尚欠於妙耳要知此見雖非妙精妙明之心而見妄一除當體即真亦如揑目所現之第二月放手即是真月非與真月實有異體可尋月影者水中月影其與真月上下懸殊虗實不倫見精明元之心自不類此故曰非是正脈云月有三相第一是天上淨月第二是揑目所現旁輪第三是水中月影其意以第一月喻純真之心第二月喻見精明元第三月喻緣塵分別知此則抑其未妙揚其切真之意亦自可見問何不即指純真之心而乃用此曲示費此申明乎答離妄純真之心唯佛乃具等覺尚帶生相何況地前諸位乃至五住凡夫又焉有純真之心可指而此見性真雖不純體終不變如金在鑛非金師莫能辯識故佛如金師略為抑揚意在明其切真但欠於妙亦如指鑛說金雖欠於精終不如鍮石之逈然非真也汝應下誡聽許示無所還地即前阿難所稱本元心地無所從來亦無所去故直以無所還地稱之蓋為應前云何無還之請而許示耳抑揚許示竟二能所對辯二一所見有還二能見無還初二一具列所見二備明有還初阿難此大講堂洞開東方日輪升天則有明耀中夜黑月雲霧晦暝則復昏暗戶牖之隙則復見通牆宇之間則復觀壅分別之處則復見緣頑虗之中徧是空性𡋯之象則紆昏塵澄霽斂氛又觀清淨此中具列八相而分四對一明暗對講堂洞開者是戶皆張洞然大開也東方二字宜連下為句言日輪始自東方故云東方日輪升天者謂漸次上升轉歷於中天也光射講堂故云則有明耀中夜子夜也黑月月朔也晦暝掩蔽也言子夜已昏況當月朔又值雲掩霧蔽則不唯微昏且昏極而至於暗矣戶牖下通壅對隙謂中間空隙處也內外不隔故云則復見通牆謂牆壁宇謂屋四垂也內外不通故云則復觀壅壅者窒塞之義分別下色空對分別之處謂諸識所分別境如色聲香味觸俱屬所緣色塵故云則復見緣頑虗異色處也冥然無知故以頑稱通以太空為體故云徧是空性𡋯下染淨對氣結曰沙飛曰𡋯紆綰環也言不自乃綰彼昏昧之氣𡋯不自𡋯乃環彼塵揚之沙古德云此與空虗體相顛倒餘皆上體下相至下還處自見澄霽者天澄雨霽之時斂收也氛塵氣也塵氣既收蒼然一色故云又觀清淨二備明有還阿難汝咸看此諸變化相吾今各還本所因處云何本因阿難此諸變化明還日輪何以故無日不明明因屬日是故還日暗還黑月通還戶牖壅還牆宇緣還分別頑虗還空𡋯還塵清明還霽則諸世間一切所有不出斯類初現前許還咸看者現前俱見也明暗通壅等時相凌奪故云諸變化相本所因起之處即是後來還滅之處許示此義故云吾今各還謂各令其還也云何下詳一例餘徵起語略具足應言云何各還本因此諸變化等八相之中且約明相言之明隨日滅即是還日何以故等徵釋還日所以無日之時不能見明則明所因起之處屬於日輪如影隨形形銷影滅故云是故還日暗等七還唯列標詞不具徵釋者可例知故則諸下以類該盡明該一切明類乃至淨該一切淨類故云不出據此則諸世間中一切所有無不還者所見有還竟二能見無還汝見八種見精明性當欲誰還何以故若還於明則不明時無復見暗雖明暗等種種差別見無差別汝見八種等帶所見之相以標能見之性以正見八種之時見精明性湛然盈滿易覺知故當將也誰何也問以當欲誰還者令其自審於八相中將欲因何者俱還亦明知必無而故為難問何以句徵非問謂以何以故作如是問若還下顯正理謂設若見還於明則不明無見自應無復見暗今實不爾試觀前塵雖明暗等相傾相奪種種差別而見性明來見明暗來見暗始終無有差別其猶明鏡當臺有物斯現鏡豈有去來於其間哉見無所還亦復如是能所對辯竟三警覺取捨諸可還者自然非汝不汝還者非汝而誰諸可還者指八相言俱屬前塵故曰自然非汝不汝還者指見性言不離汝而與物俱還明是自性故曰非汝而誰據此則一向循塵忘失自性者亦可以知警矣如來破顯二心竟三結歎自受輪溺則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被漂溺是故如來名可憐愍則知者承上無還而言無還故不為諸相所遷曰本妙不為明暗通壅所轉曰本明不為色空染淨所奪曰本淨明知有此而乃惑於緣心無智自解是為自迷自悶由此所以喪其本妙明淨之心未能薦取隨彼不妙不明不淨之識受於輪轉在凡流於分段習小墜於變易於二生死中常被漂溺其猶佩珠作丐親友見傷是故如來於前名汝等為可憐愍者嗚乎阿難親於佛前耳提面命猶自取捨纏綿動佛憐愍況夫末世凡流情識俱在動以見道自矜嗤他不如聞佛結歎之語宜知慚愧按阿難所求四義中此科兼具寂常三義謂八相任遷而不動寂也八相任去而不滅常也顯見無還竟六顯見不雜二一阿難以物見混雜為疑二如來以物見分明為釋初阿難言我雖識此見性無還云何得知是我真性阿難意謂承佛上示雖識見性不與諸相俱還但正見諸相時此見即徧在諸相似非局於自己云何得知不屬於物而是我之真性此疑見性有時在物有時在我依然與彼有去有來者無異是此科但為增明上科之義問見性周徧物我同體正是妙悟何不就其所見引令玄會而乃強與分析令成局見其猶驅海作漚豈智者之所為乎答阿難尚未深領豈成妙悟若但以其口角相似過為接引反成狂解今之本參未破妄擬高遠者類多由於盲師瞎印如來知機知法豈若彼哉二如來以物見分明為釋三一通明十界見量二別就阿難顯示三結責疑問不當初良以聖凡體同遠近用別是知正見諸相時徧在諸相但是用之所及豈可以此而疑見屬於彼哉佛告阿難吾今問汝今汝未得無漏清淨承佛神力見於初禪得無障礙而阿那律見閻浮提如觀掌中菴摩羅果諸菩薩等見百千界十方如來窮盡微塵清淨國土無所不矚眾生洞視不過分寸初二乘見量文中雖無辟支取例應有吾今問汝句問字應是示字以此下皆示教之語無問詞故阿難方證初果纔斷見漏故未得無漏清淨見量雖通初禪未必無礙故是承佛神力此初果見量也阿那律此云無貧亦云不滅因中以稗飯施辟支佛果感九十一劫不受貧窮享福不滅故尊者是佛從弟因樂睡被訶精進失目如來示以三昧修習證果遂獲天眼自陳圓通文云我不因眼觀見十方精真洞然如觀掌果維摩經那律答嚴淨梵王亦云吾見此三千世界如觀掌果今云見閻浮提豈反劣於初果詳後顯見無礙科中阿難自述觀勝藏殿居日月宮其見周圓徧娑婆國然居日月宮其見只合徧閻浮提或因兩科鱗次筆授互誤再詳菴摩羅此云難分別桃柰相似生熟難分此方所無故存梵名此四果見量也諸菩下菩薩見量一界一佛土也心地觀云初地見百佛土二地見千佛土乃至十地見無量土今云見百千界者謂或見百界或見千界等非一定也十方下諸佛見量清淨國土諸佛受用土也散在華藏不啻如佛剎微塵之數其間種種形相種種名字等如來究竟明了故曰窮盡雖至纖悉亦皆洞然無礙故曰無所不矚眾生下凡夫見量洞視者約現量言言眾生現量所見能以洞然無礙者唯在障內設有分寸之隔則不過矣正脈云不過分寸者有二意一者對勝說劣意自諸聖極於如來較至眾生縱窮其量亦不過分寸而已二者收盡含生意上既齊於如來下必齊於蜎蝡故上至窮盡國土下至不過分寸也通明十界見量竟二別就阿難顯示二一正為顯示二預防謬執初三一教以自分二代為揀擇三結示不混初阿難且吾與汝觀四天王所住宮殿中間徧覽水陸空行雖有昏明種種形像無非前塵分別留礙汝應於此分別自他初具列能所此中曰觀曰覽皆為能見之性曰四宮曰三行曰昏明等皆為所見之境且吾與汝等即就現前所見言之如來意謂汝今已超凡見聖見尚非所及縱見初禪亦仗佛神力方得無礙俱非汝之現量即今且就吾之與汝現前所觀處言之四天王宮在須彌四面東方持國天王居黃金埵南方增長天王居琉璃埵西方廣目天王居白銀埵北方多聞天王居水晶埵宮殿皆是眾寶所成平山腰而齊日月去地四萬二千由旬猶是阿難現量所及中間者地上天下地上有水有陸天下有空水行如魚躍蛟馳陸行如人來畜往空行如雲騰鳥飛等一一用目循歷故云徧覽此約物體言之其間雲屯則昏日照則明山隔則塞風過則通分別成色異色顯空塵起則染澄霽則淨故曰種種形像此約變相言之此等俱屬前塵由分別顯於汝見性而作留礙故曰無非是能所已自歷然特阿難自混耳末二句因其自混故教以汝應云云二代為揀擇佛雖教以自分阿難終竟不悟故復代擇所謂憐兒不覺醜也今吾將汝擇於見中誰是我體誰為物象阿難極汝見源從日月宮是物非汝至七金山周徧諦觀雖種種光亦物非汝漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝初許以代擇將與也代也擇於見中謂揀擇於能見所見中也二誰字乃教以著意言物象我體必代汝揀辯誰是決不混也阿難下正與揀示極盡也見源即是眼根謂教以盡其眼根之量觀之從者除上不論言二宮齊於四王正阿難現量所見再上則非仗佛加不能無礙故是物非汝者日月雖明無靈覺故七金山次日月而下也持雙持軸擔木善見馬耳象鼻魚嘴環繞須彌間以香水共有七重其體皆金一一用目循歷故曰周徧諦觀種種光即金山之光雖映物而成種種終為頑明故云亦物非汝漸漸更觀者次金山而下以至地上也雲騰鳥飛風動塵起皆屬空中所有樹木山川草芥人畜兼於水陸所明通為所見故曰咸物非汝如此開示如來可謂眉毛拖地矣代為揀擇竟三結示不混阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚則諸物類自有差別見性無殊此精妙明誠汝見性初牒前能所近指地上遠指二宮其間種種差殊故云諸有物性正脈云諸物羅列於見性之中者千態萬狀是也所見雖有差殊能見實無二體故曰同汝見精清淨所矚見精言清淨者以有清淨本然義故正脈云見性徧見於諸物之上者朗然一照是也則諸下示以不混物自差別者不混於見見性無殊者不混於物是物自物而見自見矣末二句教以認取然既瓜豆分明理應無疑故直教之曰此精妙明誠汝見性如此開示有何不明而阿難猶未敢認所謂知法者懼矣正為顯示竟二預防謬執二一自語相違防二世間相違防初此科義稍隱晦不避煩分四一防謬執二遮轉救三破他宗四成自宗初恐阿難謬執云佛雖如是開示而我自覺此見一涉於外即同諸物云何不是物耶故如來以此防云若見是物則汝亦可見吾之見意謂若汝一定執言見是物者是物則成可見彼此應同則汝今者既能徧見諸物亦可見吾之見若不見吾之見而言見是物者則自語相違矣二遮轉救恐彼救云我與如來同見一物之時我見佛見正相會遇即為見佛之見云何不見耶故如來以此防云若同見者名為見吾吾不見時何不見吾不見之處意謂若汝謬言同見一物之時名為見吾之見者吾今閉眼不見當斯時也吾見已離彼物自應顯然有吾不見之跡汝亦應見汝今云何不能見吾不見之處而指其分齊葢如來明知見性無跡可憑為遮轉救故作如是難耳三破他宗恐又謬云佛既閉眼不見我即但見彼物即是見佛不見之處云何如來謂我不見故如來以此防云若見不見自然非彼不見之相意謂若汝謬言但見彼物即是見吾不見之處者既但見彼物則吾見已離於物矣既離於物自然非彼不見之相不見之相即指物言猶云自然非彼物也汝前所立見性是物之宗則不成矣四成自宗恐被破迴護順前佛所難云我實不見佛所不見之地故如來就此成立自宗云若不見吾不見之地自然非物云何非汝意謂若我閉眼不見之時汝實不能見吾不見之地者則我開眼見物之時汝亦不能見吾之見是則物是有相見是無相吾見自然非物反以成立我前所說物見無混之宗云何不是汝耶自語相違防竟二世間相違防二一牒執轉難二遮救警悟初又則汝今見物之時汝既見物物亦見汝體性紛雜則汝與我并諸世間不成安立又字重牒前執如云又若見是物者則汝今見物之時彼物亦應是見遂據此難云汝既見物彼物亦應見汝物若有見則轉成有情以此為例汝應轉成無情如是則有情無情體性紛然雜亂不可分矣有情無情尚不可分況汝之與我益不可分是則汝之與我并諸世間所有不成彼此安立之相又墮一分世間相違過矣二遮救警悟恐彼救云我今見佛之時自是我見於佛非佛見於我何得雜亂故如來據此遮云阿難若汝見時是汝非我見性周徧非汝而誰意謂若汝見我之時是汝見我非我見汝而汝我不紛雜矣以此為例則見性周徧一切物時亦應無有紛雜非汝真性而是誰之真性此如來明明提撕所謂警悟者以此別就阿難顯示竟三結責疑問不當云何自疑汝之真性性汝不真取我求實初責疑不當言如上所擇物我分明云何自疑汝之真性不敢認取而恐其有混耶性汝下責問不當言真性在汝不自以為真反取我語以求真實其猶種種問橋宜乎為智者所呵矣然此科既唯增明前義仍是足前寂常二字若約不混似亦兼於明字以下文超情離見自有正顯明字之文此不預焉顯見不雜竟七顯見無礙二一阿難以不定有礙為疑二如來以忘塵無礙為釋初阿難白佛言世尊若此見性必我非餘我與如來觀四天王勝藏寶殿居日月宮此見周圓徧娑婆國退歸精舍秪見伽藍清心戶堂但瞻簷廡世尊此見如是其體本來周徧一界今在室中唯滿一室為復此見縮大為小為當牆宇夾令斷絕我今不知斯義所在願垂弘慈為我敷演初按定是我是我應當認取有礙恐其非真故先按定是我而下方出其有礙以明自己非是推諉不認乃竟由未敢認耳我與下自陳不定勝藏殿天王貯珍寶處也初成之時請佛說法以邀吉祥阿難隨佛因得同觀故云我與二宮天子乘便請佛故又云居日月宮灌頂云日宮縱廣五十一由旬月宮縱廣四十九由旬皆摩尼寶成天人充滿其中起世經云五風所持謂持風令不墜住風令安住隨順轉風令順行攝風令緩急將行風令得中也此見周圓者自二宮而遠觀然二宮雖圍繞須彌從閻浮而升且約南面言之據此則徧娑婆國應是徧閻浮提前後互誤上科已辯孤山云初天唯見一四天下而言徧娑婆國即指一小剎而言非大千也俟再考退歸精舍者謂自天而下還到祇桓也樹垣圍繞外則不覩故云秪見伽藍伽藍即指精舍具云僧伽藍摩此云眾園以是僧眾和合處故清心戶堂即指講堂以聞法能清心地濁故戶內堂中不能遠見故云但瞻簷廡簷廡謂飛簷廊廡也此約一見而大小不定為下文致疑之端世尊下躡以成疑上陳見有三相一徧界二見園三瞻廡今為躡前後二相但要顯出不定之義上云瞻廡此云滿室者廡內即室略變其文也二為字乃持疑不決之詞言在天本徧在室則局是必為室之所礙然有二義可思一者為室所拘縮一界之大而為一室之小如過卑門身則鞠脊二者為牆所夾斷周徧之一而成不徧之二如築高隄水則兩分是二皆為受礙兩疑不決故云為復此見云云我今下求慈敷演斯義即見性大小之義在縮在夾實未明了故云我今不知疑深障重非弘慈不能決事玄理微非敷演無以明故云願垂弘慈云云阿難以不定有礙為疑竟二如來以忘塵無礙為釋三一略出大旨二詳以喻明三原理直示初佛告阿難一切世間大小內外諸所事業各屬前塵不應說言見有舒縮世間雖通三種今論前塵且約器世間言從天至地難盡多種故云一切大如一界小如一室內如園中外如垣外此諸所有皆是眾生隨心所造隨作所成故云事業前塵雖通五種今對見性且約色塵言各屬者謂大亦前塵自大小亦前塵自小內亦前塵自內外亦前塵自外正顯大小內外與見性無與焉舒縮應言縮斷方應阿難所疑葢譯者略失意耳見性體同隨緣用異但自忘緣見本無差若言見有縮斷何異掬空截光故不應也二詳以喻明二一喻四相屬塵二喻見無縮斷初二一正喻二斥問初譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空應不圓若不定者在方器中應無方空方圓喻大小內外今取釋便且約大小言之方器喻一界方空喻一界之見言汝之見性在天本徧一界譬如方器中見方空吾復下就喻推徵以喻明而法自明故問以方器方空定方不定方者正令自審一界之見定大不定大也定大則入室之時見應不小亦如空若定方別安圓器空應不圓不定大則離室在天見應不大亦如空若不定方者更令在方器中應無方空今俱不爾是知見無大小大小屬塵亦如空無方圓方圓在器知此義者自不以縮夾為疑焉二斥問汝言不知斯義所在義性如是云何為在汝言句牒其所問義性下斥以不應意謂汝前問言不知見性大小內外如斯四義所在然此四種義性各屬前塵亦如方圓在器是也既知如是云何謂其為在縮在夾故我前云不應說言云云喻四相屬塵竟二喻見無縮斷二一正喻二斥問初阿難若復欲令入無方圓但除器方空體無方不應說言更除虗空方相所在阿難所以不敢遽認見性為心者葢為嫌其有礙欲令入於無礙故如來原其意而譬之曰若復厭虗空之方圓欲令入無方圓者事亦不難但除二句正明不難之義是中二方字非對圓之方乃方向之方以方圓長短大小等皆方向也而言但除器方空體無方者謂但能除却器之方向而空體自無方向喻阿難等但能忘却前塵而見性自無大小等礙若必欲除却見性礙相其猶鑿空削虗欲除其方向相狀秪益自勞故云不應說言云云方相所在者謂方向相狀所在之處觀此益知上二方字非對圓說方字同用別應須善會二斥問若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面若築牆宇能夾見斷穿為小竇寧無續跡是義不然陳疑原為致問故無妨說問也入室之時等且按定所疑仰觀下乃約挽以難言入室之時既因縮之而小觀日之時必緣挽之而長理所必無故以豈挽為難挽者牽挽引伸義也若築二句亦按定所疑穿為下又約續以難言築牆之時既能夾之使斷穿竇之時必因續之方連亦理所必無故以寧無為難竇孔也續者接聯綰結義也末句結斥言說挽說續既非見理而疑縮疑夾豈是性義故直斥之曰是義不然詳以喻明竟三原理直示一切眾生從無始來迷己為物失於本心為物所轉故於是中觀大觀小若能轉物則同如來身心圓明不動道場於一毛端便能含受十方國土初物轉成礙一切眾生總該凡外權小凡未能深達法空無有能出此礙者從無始來者謂自有妄識已來有妄識即有分別由分別故不了唯心執諸法為實有故曰迷己為物由迷己故遺失本來周徧之心由執實故為彼諸物之所轉動如纔見一物便行取著是也由取著故為彼所礙故於是物之中觀大觀小緣此所以宛似見性有大小耳若能下轉物便融轉物者始而以觀行力忘塵入性理法界繼而以脩習力以性融塵理事無礙法界然後以證入力旋事同理事事無礙法界事既同理妙用等佛故云則同如來既同如來則不唯見性周徧而現前若身若心一一皆稱性圓明徧照法界是故毗盧遮那名徧一切處亦名光明徧照尊也雖徧照法界而不違本處故云不動道場以如來本所在處即道場故此是廣正不礙狹依毛端謂一毛頭也稱性普融故能含十方國此是狹正不礙廣依今取文理顯然且約廣狹無礙釋之以義推求更該餘玄按阿難所請此科義當妙字顯見無礙竟八顯見不分正脈云夫見性量括十方體含萬法其與萬法非即非離唯其非即也故能靈光獨耀逈脫根塵身界無干生死不繫眾生不達斯義則混淆真妄沉溺輪迴既無智以自分終何由而得脫乎唯其非離也故能塵剎混融萬物一體用彌法界存泯自由眾生未達斯義則沉溟滯寂灰斷纏空既自昧其家珍亦何由而能用乎故前自指見以來不動不滅不還不雜及無礙之前半皆約不即之義分真析妄以決擇乎離塵獨立之體今此不分之科乃約不離之義泯合真妄以顯洩乎與物混融之妙雖不失科與無礙之後半辭義亦融非今不分之正義矣將使眾生明乎不即之義則不淪生死明乎不離之義則不滯涅槃若相背而實相成也愚讀正脈至此頓覺顯見之旨眉目判然則是經流傳震旦不可無交師也二一阿難執見在前出過求開二如來破其前相指體為示初阿難白佛言世尊若此見精必我妙性今此妙性現在我前見必我真我今身心復是何物而今身心分別有實彼見無別分辯我身若實我心令我今見見性實我而身非我何殊如來先所難言物能見我惟垂大慈開發未悟初領我擬前佛於不雜科中教以認見為我阿難猶恐有礙尚未敢認今蒙無礙之示乃隨順佛語而暫以領認故曰若此見精必我妙性觀若必二字亦似領而未領耳因聞轉物同佛大用無礙故以妙性稱之又以聞佛所說反復體認自覺見物之時見性盈滿於前故以在前擬之見必下謬出四過一者身心無歸過言見既在前與我身心無涉見若必定是我真性我今現前身心復是何物乃無所歸屬矣二者世間相違過言我今現前身心能分別一切有實體用而彼見性無有分別尚不能分辯我身況復餘物然世間共許有分別者為我無分別者為物今若認見遺身則世間相違矣三者名實不符過言見性若實是我心者應為能見而乃令我今見反成所見是名實不相符矣四者自語相違過言見性既為所見又實是我體而我現前能見之身反非是我而是物矣若爾則如來自語相違以如來前已難我必謂見是物者則汝既見物物亦見汝壞世間相今身既是物而又能見彼實我正墮前難故云何殊如來先所難言云云末二句請慈求開阿難雖出四過又思佛為一切智人離諸過失究是自己昏昧未能了悟故仍干大慈開發二如來破其前相指體為示三一泯是非而破前相二因失守而教諦思三緣代問而指真體初三一直斥其非二正破前相三極盡妄情初佛告阿難今汝所言見在汝前是義非實周徧無跡莫可指陳豈有前相可得故斥以所言非實二正破前相四一在前定其可指二例物教以指陳三阿難對以無是四如來印其所說初若實汝前汝實見者則此見精既有方所非無指示初按定其說若實汝前句是按定阿難今此妙性現在我前之語汝實見者句是按定阿難若實我心令我今見之語則此下定其可指在前即是方所故曰既有令見則可指示故曰非無此如來將欲例物令指以示其不可混也二例物教以指陳三一指物為例二如例令指三顯無索析初且今與汝坐祇陀林徧觀林渠及與殿堂上至日月前對恒河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空如是乃至草樹纖毫大小雖殊但可有形無不指著且今與汝等者謂且就現前共見之境例明有方所可指示義也林木渠池殿閣堂舍先約近境言之日月在上恒河當前次約遠境言之此以諸物各有方所例見性既有方所也教以座前指陳者眾所共見示不可混故陰陰而暗者是林明明而照者是日窒然而礙者是壁虗焉而通者是空且約明暗通塞四相言之如是乃至者超略色空染淨等相草樹纖毫者謂草上一纖之細樹上一毫之微對上林渠殿堂等故曰大小雖殊但可有形無不指著者有形即有相有相即可指故此以諸物皆可指著例見性非無指示也二如例令指若必其見現在汝前汝應以手確實指陳何者是見初按定在前汝應下逼以確指言口說尚可支梧手指難以蒙混且教以的確真實葢恐其儱衕顢頇耳三顯無索析阿難當知若空是見既已成見何者是空若物是見既已是見何者為物汝可微細披剝萬象析出精明淨妙見元指陳示我同彼諸物分明無惑初象外顯無然既曰在前為在萬象內為在萬象外耶若在萬象外者萬象雖繁總為空與物耳物外即空空外即物若謂空是見者則壞空相故云若空是見云云若謂物是見者則壞物相故云若物是見云云既二俱非理則象外無見明矣汝可下象內索析言象外不成若轉計此見在萬象內者如玉在璞自可剖顯如身在衣自可解露故教以微細披剝精明二字仍約體用對論果從象內析出則益見其淨益見其妙益知其為能見真元故以淨妙見元加之指陳照例故索以同彼諸物分明無惑例物教以指陳竟三阿難對以無是阿難言我今於此重閣講堂遠洎恒河上觀日月舉手所指縱目所觀指皆是物無是見者世尊如佛所說況我有漏初學聲聞乃至菩薩亦不能於萬物象前剖出精見離一切物別有自性初對象外無見重閣講堂亦該林渠應前佛說近境遠洎恒河上觀日月應前佛說遠境近境則舉手所指遠境則縱目所觀觀亦為指故云指皆是物象外覓見見何所憑故云無是見者世尊下對象內無見如佛所說者謂依佛言教披象出見也雖無漏無學亦所不能故曰況我有漏等自知其不能矣不唯二乘故云乃至菩薩等謂縱使菩薩亦不能也准前如來教析有二義一教披剝萬象析出精明此阿難以不能於象前剖出對之二教同彼諸物分明無惑此阿難以不能令離物有性對之四如來印其所說佛言如是如是既知象外象內俱無是見則妙性在前令我今見之執自應瓦解故重言如是而印許之正破前相竟三極盡妄情言是者非之對也上以為造前相故顯無是若更因無執非猶是妄情未了故此兼破非相預杜種疑葢必是非雙忘忘心亦忘而一體混融之妙性始現前矣四一躡前按定無是二對物教以明非三阿難對以無非四如來印其所說初佛復告阿難如汝所言無有見精離一切物別有自性則汝所指是物之中無是見者如汝所言等躡前象內無見之語葢以不能析出即是無有也則汝下即就無有以按定無是見者問何不躡象外無見語耶答象外無見或可在於象內不可定其必無是必象內亦無乃可定焉二對物教以明非今復告汝汝與如來坐祇陀林更觀林苑乃至日月種種象殊必無見精受汝所指汝又發明此諸物中何者非見為杜非見種疑故復告也汝與如來等教以更觀前境苑者園囿異名義攝渠流殿堂乃至者超略恒河仍前所列內外遠近境耳象內象外俱無是見故云必無等謂必無是見精者受汝所指著也離是計非情所必至故又教以發明非見三阿難對以無非阿難言我實徧見此祇陀林不知是中何者非見何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空我又思惟是萬象中微細發明無非見者初直答不知言見所至處乃能有見今既徧見祇林則見性徧至明矣但明明徧彼而却與彼分疏不下故直以不知答之何以下反覆致詳言若樹非見則樹上無見無見則彼此不偶故曰云何見樹今既見樹似乎樹見相偶而又分疏不下莫非樹即是見若樹即見仍蹈前非故曰復云何樹如是乃至者超略一切諸物若空非見等義可例思據此則不唯無非且因此而益知其無是矣我又下結答無非言是者非之對也設若有是方可說非今反覆致詳不唯無是實亦無非因無有非轉復思是既決定無是亦究竟無非故我又作如是思惟是萬象中一一微細發明無有一法非我見者是知此之無非乃一體混融絕諸對待不可思不可議之義也四如來印其所說佛言如是如是是非雙絕妄情俱盡一體混融何有前相故如來亦重言如是而印證之泯是非而破前相竟二因失守而教諦思二一有學失守二佛教諦思初於是大眾非無學者聞佛此言茫然不知是義終始一時惶悚失其所守非無學者即是有學謂阿難一類無學聞此或可彷彿有學智劣轉更盲聾故曰茫然謂渺茫蒙昧然也是義者即指無是見無非見之二義正脈云凡義之淺者即始可以見終由終必不昧始今是二義後以度佛未說不測其歸趣是為不知其終前以推佛已說莫尋其由來是為不得其始重增迷悶故一時惶悚惶悚者恐懼貌是非不決故失其所守以或是或非決於一定乃可持守故二佛教諦思如來知其魂慮變慴心生憐愍安慰阿難及諸大眾諸善男子無上法王是真實語如所如說不誑不妄非末伽黎四種不死矯亂論議汝諦思惟無忝哀慕初知懼愍慰魂慮者神魂思慮變慴者更變驚慴即惶悚在心也知其者佛以他心觀其外而悉其內故憐愍者矜其失守安慰者釋其惶悚及諸大眾者兼於同類上云非無學者是也諸善下顯說應信普詔所為故曰諸善男子自明可信故曰無上法王言世間端人尚可信憑況復無上法王耶真實語等不唯據人可信所說猶可信故顯示真諦曰真語如云無是見是也顯示俗諦曰實語如云無非見是也顯示中道曰如所如說謂如己所證真如之理而說如上反覆致詳是非雙絕妄情俱盡是也不誑者不欺初學不妄者不異彼此此示義同五語相應深信佛豈自伐乎哉非末下揀邪教思不死者不決定義四種者亦變亦恒亦生亦滅亦有亦無亦增亦減於後行陰魔中詳明以其不決定故名為矯亂謂矯強混亂也佛意恐聞無是無非反執亦非亦是有類矯亂故以非末伽黎等揀之又不死者謂彼妄計有不死天四語是其所傳一生依此答人當生彼天如來斥為矯亂論議者以彼不解三諦義故教以諦思者言既非矯亂必有定理若能諦審思惟何故無是而又無非驀直看去看到無可措心處自有筩底脫落時節此正如來教以離心意識參非教以分別思惟幸勿錯解忝者孤負意言阿難自捨妄求真以來重重哀求總為仰慕寂常妙明佛意以果能諦思則寂常妙明即於自心中現自無孤負哀求仰慕心也因失守而教諦思竟三緣代問而指真體二一文殊愍眾代問二如來指體發明初三一愍眾具儀二代彼達情三求示元本初是時文殊師利法王子愍諸四眾在大眾中即從座起頂禮佛足合掌恭敬是時者即佛教思惟時也雖教以思惟而依然惶悚故文殊愍之座起禮足表代問之誠合掌恭敬示將白之意然代請必以文殊者以無上法王玄言妙旨不得法王真子根本大智無足以昭明佛日而啟迪四眾也二代彼達情而白佛言世尊此諸大眾不悟如來發明二種精見色空是非是義世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖非是疇昔善根輕尠初指眾不悟文殊意謂前如來兩番推問特為發明二種深故所謂精見與色空是義及非是義之所以也阿難雖各以無對如來惟權且印許尚恐其迷於深故重教諦思葢冀其有所會悟以決謬疑及觀其動靜依然惶悚是究竟不悟如來發明二義之深故此機惟佛能鑑之亦唯佛能啟發之耳世尊下推情代陳將欲代陳故重稱世尊希原其情也上若字應作如字言會眾惶悚非疑佛語矯亂其意以如此前緣色空等象若是見則應有所指若非見則應無所矚今既無指有矚兩義俱非究不知是中義趣何所歸屬以是故有驚怖觀其魂慮變慴者以此疇往也往昔指華嚴方等二會言之華嚴悶絕躃地方等除糞甘心皆由善根輕尠今非昔比故云非是文殊言此者略有二意一顯己聞無疑佛矯亂之失二顯進示有開解明了之益故下科即代為求示三求示元本惟願如來大慈發明此諸物象與此見精元是何物於其中間無是非是善根既非輕尠妙心應為進示故惟願如來大慈發明元是何物者詰本窮源之問言諸物象與此見精設有二體方可說是及與非是今既二義俱無將必無有二體但不知元是何物而乃於其中間無是亦無非是我且不知況復阿難等宜乎其終不悟也然阿難等只知在是非裏卜度不解向無是無非處追求歷覽二際自在畏懼試觀文殊元是何物之問真如霹𮦷震嚮眾聵咸開所謂到底還他真作家者文殊是也文殊愍眾代問竟二如來指體發明三一直指真體二借喻發明三結示正義初佛告文殊及諸大眾十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是告文殊者以代問故及大眾者由惶悚故如來菩薩者出能見真體之人顯所說有據也菩薩云大者指圓頓教中地上之機揀非權漸及地前人故三摩地乃諸定總名不揀恐濫故以自住揀之顯是自性本定揀非強制識心權漸共住剋論即是首楞嚴定也見即見精見緣即是物象為順前文且約眼家性境言之其實見性亦該六精見緣亦該六塵據此則并所想相即指六識以是根塵中間所起想相影故此等皆以無明不覺展轉妄現今以住定覺了從緣無性故曰如虗空華言空華乃目瞪勞相淨眼觀之了不可得故以為喻本無所有者由來自無非作得故後云觀相元妄無可指陳是也此見及緣不言想相者以分別影事畢竟無體如水中月影非比見性緣塵忘情即真如第二月故元是菩提等者謂正當無所有處全體即真故菩提者三種中真性菩提從本以來見妄所不能拘緣塵所不能染分別所不能昏故以妙淨明體稱之後云觀性元真唯妙覺明是也准前文殊問云元是何物於其中間無是非是此云元是菩提等既元是菩提絕諸對待尚無有是況復說非故曰云何於中等也正脈問云佛初惟以見為性而曲明其不與身心萬物為侶似謂見獨真而餘皆妄令人獨依見性也今乃論妄則降見性同是空華論真則升諸法同為真體固是理極之論其奈人之用心將何所適從乎今疏答云初以眾生位中無有純真之心就其日用尋常最便於指示者唯有眼家見性故且從眼顯示又恐其受轉萬物混淆根識不能立薦故復曲明其不與身心萬物為侶葢以初心貴專擇法宜精故謂見獨真而餘皆妄令人獨依見性今恐得少為足不復更求真心故論妄則降見性同於空華又恐其局見於眼不復徧融萬法故論真則升諸法同為真體葢以學貴窮源理宜融徧故復為是理極之論令徹證而圓悟也行人用心不同因病投藥亦異對症取服無弗痊理彼疏自有答詞欲知往檢二借喻發明二一取喻文殊二以法合顯初二一就喻兩問二依問各答初文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊直指難明須喻以顯故又呼名示問如汝文殊者即借文殊本體以喻真體也問以更有文殊等者意以離此本體更有文殊方可說是如云彼是此也問以為無文殊者意以并此本體亦無方可說非如云本非是也二依問各答如是世尊我真文殊無是文殊何以故若有是者則二文殊然我今日非無文殊於中實無是非二相初先答無是意謂如佛所問如是世尊容我裁答自惟我真文殊只此一箇本體更無是文殊者何以句徵可知若有下釋以若有是者除非有二文殊方可說彼即是此今既唯一真將誰說是故我言無也然我下次答無非非無文殊者非是并此本體亦無全無文殊意以既非全無自亦不可說非不言可知矣於中句總結俱無言既已無是又非全無恐惑眾聽故總結之曰於中實無是非二相於中者於一真體中也據佛借口說喻意以我真文殊喻菩提妙淨明體實無二相喻云何有是非是至下合處自見取喻文殊竟二以法合顯二一合我真文殊二合實無二相初佛言此見妙明與諸空塵亦復如是本是妙明無上菩提淨圓真心此見指見性無始在纏靈光自若故以妙明稱之空塵指物象以物象雖繁不出空與塵故此合喻中我字上云此見及緣是也本是者由來便是非假修得正以非假修得故曰妙明雖至佛果亦不外此故曰無上菩提隨緣不變故曰淨心不變隨緣故曰圓心體用無礙言思不及異彼緣心畢竟虗妄故曰真心此合喻中真文殊義上云元是菩提妙淨明體是也二合實無二相妄為色空及與聞見如第二月誰為是月又誰非月文殊但一月真中間自無是月非月初迷墮二計色空即賴耶相分聞見即賴耶見分皆以無明不覺展轉幻起故曰妄為由妄為故計有二相於中說是說非不能超出故重以二月為喻如第二月者以二月乃揑目所成同妄為故不知揑目所成放手即真妄計誰為是月又誰非月正同阿難不知色空聞見離念即真只知在是非裏卜度也文殊下悟超是非重呼文殊者教以著意亦旁警阿難也言說是說非皆由執二若知但一月真中間自無是月之議及非月之論知此喻者則色空聞見無是非之義可例會矣此是以喻合喻恐猶未明故次下重為結示借喻發明竟三結示正義是以汝今觀見與塵種種發明名為妄想不能於中出是非是由是真精妙覺明性故能令汝出指非指初結示迷墮二計此中汝字仍指阿難言上來既已發喻合明將欲結示重向阿難言之意謂由上月喻及前文殊之喻觀之是以阿難汝今觀見與塵只須看他元是何物不須種種發明設若種種發明仍前說是說非總屬分別名為妄想縱說到驢年亦不能於中超出是與非是與彼執有二月妄計誰為是月又誰非月相似由是下結示悟超是非意謂既不能超出是非而我前來逐一問汝竟不能確實指出誰為是見誰為非見者良由見之與塵同是真精妙覺明性我依此問故能令汝依俙得悟超出是見之指及非見之指與彼但一月真中間自無是月非月相似此中真精即是本覺稱為妙覺明者以雖是因心即同果體如佛所證妙覺圓明之性不離此故按阿難所請此科仍是足前妙字正以超出是非方顯性體之妙顯見不分竟九顯是超情二一阿難以濫外為疑二如來以超情為釋初二一領性徧常二疑濫外計初阿難白佛言世尊誠如法王所說覺緣徧十方界湛然常住性非生滅誠果實也法王所說總指前八所顯覺緣即指見性謂親依覺心變起能緣真妄和合故以覺緣稱之不分科中色空同體無礙科中身心圓明故云徧十方界此領徧義不雜科中離塵獨立是心科中并根亦脫故云湛然不遺科中由來無失不動科中非靜非搖故云常住不還科中無來無去不滅科中究竟無盡故云性非生滅此領常義領性徧常竟二疑濫外計二一疑濫外性二疑濫外宗初與先梵志娑毗迦羅所談冥諦及投灰等諸外道種說有真我徧滿十方有何差別先梵志古昔梵志也其人自謂是梵天苗裔志生梵天即婆羅門種娑毗迦羅名見序分灌頂云是數論師冥諦見前即二十五諦中第一諦也彼數論師計冥性是常能生大等二十三法與今所說湛然常住性非生滅義似有濫投灰或云塗灰言有時以身投灰有時以灰塗身無益苦行也更有拔髮熏鼻眠針臥刺躶形自餓之類故置等言此等皆心遊道外各立種族故云諸外道種說有真我等者準識論外道計我相有三一大二小三不定徧滿十方是說大我與今所說覺緣徧十方界義似有濫末句結問言佛說覺緣是常外計冥性亦常佛說覺緣是徧外計神我亦徧佛說外計有何差別若不善為淄澠恐毫釐之差將致千里之謬矣二疑濫外宗世尊亦曾於楞伽山為大慧等敷演斯義彼外道等常說自然我說因緣非彼境界我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非因緣與彼自然云何開示不入羣邪獲真實心妙覺明性初舉昔所揀亦曾者謂昔日亦曾也楞伽山即佛說楞伽經處梵語楞伽此云不可往非有神通者不能到故依此說經表法殊勝非二乘所及大慧等舉當機該餘眾也敷演斯義者揀外宗立自宗故彼外道等常說自然者清涼云無因論師計一切物無因無緣自然生自然滅如彼偈云誰開河海堆山嶽誰削荊棘畫獸禽一切無有能生者是故我說為自然斯則撥無因果不立脩證佛以因緣破之故云我說因緣非彼境界如楞伽經頌云我說唯鈎鎖鈎鎖即是因緣取相因不斷義故離諸外道過若離緣鈎鎖別有生法者是則無因論彼壞鈎鎖義一切諸世間無非是鈎鎖無明與愛業是則內鈎鎖種子泥輪等如是名為外此中首句即我說因緣立自宗也次句即非彼境界揀外宗也若離等四句明所以揀者以墮無因成自然種壞因緣義故一切等六句明所以立者以是正理世間共許不墮無因及邪因故無明與愛二皆為因行業為緣能生識名色等而成內之根身名內鈎鎖種子為因水土為緣而生芽泥團為因輪繩為緣而成瓶餘之器界例此可知名外鈎鎖故教中十二因緣亦名十二鈎鎖我今下明今似濫覺性自然句先以斷定有濫非生非滅等乃謬取佛所立義以證成之非生非滅不滅不失中義也有動有還有混有礙有分等俱屬妄倒不動無還不雜無礙不分等皆為遠離然遠離云者正顯超乎情計絕諸戱論而阿難不知反欲以此謬證自然故曰似非因緣其意以既非因緣非自然而何哉與彼下求佛開示言楞伽既揀豈今自濫故求如來以今之所說與彼自然之計云何開示以便定其取捨取捨既定則不入羣邪而獲真實心妙覺明性矣阿難以濫外為疑竟二如來以超情為釋四一正釋前疑二兼破轉執三總遣妄情四結斥分別初二一責惑索體二詳與難破初佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然阿難若必自然自須甄明有自然體汝且觀此妙明見中以何為自此見為復以明為自以暗為自以空為自以塞為自初述說責惑如是開示即指前八顯見之文或曲暢旁通或明彰暗示無非權巧故云方便原佛本意總為破除妄計顯示真本故云真實告汝此如來自述所說無妄可信也汝猶二句責其當悟不悟不當惑而惑焉阿難下依惑索體若必自然句先以按定自須甄明等乃教以自須甄察要必明明歷歷有自然體也汝且下就中詰問言妙明真見徧見諸相汝且觀此妙明見中以見何為自然體耶此且總詰此見為復等乃逐一別問以明為自者謂唯以見明為自然之體以暗為自等例此可知二詳與難破阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者則於明時見性斷滅云何見明自然者不隨緣變故見明為自者應不見暗以不隨暗緣如水中魚遇陸則滯死耳以空為自等例此可知如是乃至者超略以塞為自應不見空諸暗等相者子夜黑月雲霧晦暝等皆為暗相既以見暗為自自應不隨明緣故難以明時見滅云何見明必作如是難者以見性明來見明暗來見暗等不如此之所說何有自然之義正釋前疑竟二兼破轉執二一阿難轉執因緣二如來就執為破初阿難言必此妙見性非自然我今發明是因緣生心猶未明咨詢如來是義云何合因緣性必此妙見等先以按定非自我今發明等乃轉執因緣良以因緣自然敵體相翻前以似非因緣疑為自然此又以佛破自然轉執因緣豈知因緣自然二俱戱論凡不了唯心無有能出此惑者言發明者謂對待發明非是真知既非真知故須咨決詢問是義者即性非生滅遠離妄倒等義本不合於因緣雖因被破轉執自覺於理難通故復以云何問也二如來就執為破二一破因義二破緣義初佛言汝言因緣吾復問汝汝今因見見性現前此見為復因明有見因暗有見因空有見因塞有見阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗初牒執定因汝言句總牒所執吾復等定因見有正脈云因見下應補明暗等字言對境始現也此見下總徵四義因明有見者以明為生見之因餘准知阿難下破二例二因明有者明為生見之因明去暗來生見之因已亡無種求苗必無得理故云應不見暗如因暗有等准知如是乃至等又例上明暗以破因空因塞義也二破緣義復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞初總徵四義緣明有見者以明為發見之緣餘准知阿難下破二例二緣空有者空為發見之緣空為塞礙發見之緣已壞離水發蓮亦無得理故云應不見塞若緣塞有等准知如是乃至等又例上空塞以破緣明緣暗義也兼破轉執竟三總遣妄情當知如是精覺妙明非因非緣亦非自然非不自然無非不非無是非是離一切相即一切法初牒遣上雖因緣自然二俱排擯恐其尚未透脫故教以當知示以決定雙非也精覺者不變之體妙明者隨緣之用由有不變之體故非因非緣由有隨緣之用故亦非自然此重牒遣詞尤見其畢竟非故非不句躡遣恐聞雙非遂執非為是故躡遣云非不自然謂若執不自然亦非以攝用歸體隨緣中許有不變義故此下亦應有非不因緣之句謂若執不因緣亦非以從體起用不變中許有隨緣義故文不具者或是譯人脫漏私見如是仍俟高明者教之無非下總遣言非與不非固不可說是與非是亦不可說故以兩無字而總遣之所謂遣之又遣以至無可遣也末二句結示恐上一切盡遣失善巧慧故又扶之曰離一切相即一切法兩一切皆指色空見聞等也通稱曰法別狀為相通別互具上下影略說故云離云即者以一切諸法唯心所現因眾生不了唯心妄生執取計有因緣自然等相種種分別總屬戱論故須要離謂於一切相上離於分別及執取故既能於一切相上離於分別執取則一切法從緣無性舉體全真無庸更生揀棄故須要即謂即於一切法上了達惟心所現義故既能於一切法上了達惟心所現則凡有所說皆成利益如說因緣為破外計說自然為拂權宗說非因緣為顯不變義故說非自然為顯隨緣義故說非不自然為顯隨緣中即具不變之義說非不因緣為顯不變中亦具隨緣之義是知菩薩攝生善巧諸佛御世方便皆由證得離一切相即一切法耳四結斥分別汝今云何於中措心以諸世間戱論名相而得分別如以手掌撮摩虗空祇益自勞虗空云何隨汝執捉初正為結斥由上重重拂遣則知精覺妙明離名絕相非措心可得分別故斥以云何於中云云措施也謂於精覺妙明中施以妄想心也以諸世間等正是其措心處世間者按相宗中有學者世間權乘也有非學者世間外道也今說因緣固屬學者戱論仍說自然猶為非學者戱論以都無實義故名相者因緣自然為名權宗邪見為相而得分別四字連上云何等一氣念下其徒勞無益之意自見言既屬戱論則無實義名相愈繁而本體愈晦云何而得分別著也如以下仍以喻明手掌偶對喻戱論名相撮摩摶揉喻分析辨別言阿難以名相分別覺緣如愚人以手掌撮摩虗空分別覺緣徒增妄想如撮摩虗空祇益自勞覺緣不墮名相云何以分別能得如虗空本無形跡云何隨執捉可取法喻歷然可對問阿難所疑有二一疑濫外性二疑濫外宗如來惟釋次疑不釋初疑者何也答外計冥性真常真我徧滿皆以自然為宗宗既不實性亦非真性既不真所說真常徧滿亦屬妄計佛說覺緣斷不類此是故濫性之疑不須更釋顯見超情竟十顯見離見二一阿難以今昔相背為問二如來以權實不同為答初阿難白佛言世尊必妙覺性非因非緣世尊云何常與比丘宣說見性具四種緣所謂因空因明因心因眼是義云何初按定今破上云精覺妙明此云妙覺性皆密指真見非因非緣如上所破不言非自然者以是外宗今昔俱破故因緣自宗昔立今破欲有所問故先按定世尊下怪疑昔說常與比丘等指昔教言具四種緣者以昔教中有四緣生識之說據此則四緣生見已為錯解況妙覺性又非見性可及是不惟鹿馬錯指兼亦象兔不分也所謂下具列四緣空明心眼依小乘論明空境作意根也因此生識似為確論如目前不空不明固無所見若無心作意及無眼根者更不待言至論見性盲暗已許有見不空可知果其無心作意見更明朗豈同眼識必待緣生是今昔所說原自不同阿難不知反疑相背所謂愚法聲聞根識不分信矣末句總以結問是義者昔立今破之義云何者謂云何會通乃得不相背耶二如來以權實不同為答四一直斥昔宗二詳辯今教三例破種疑四斥迷勉進初佛言阿難我說世間諸因緣相非第一義四緣生識阿難迷為生見如來知其心粗且不與分但就語斥之我說者仍指昔教世間者總該情器此等皆以因緣和合虗妄有生故云諸因緣相蓋以佛未出世邪師說法謬謂無因及與邪因賺誤眾生深入邪見佛既出世立正因緣為對彼故一時權說故云非第一義據此則縱屬因緣亦非究竟況妙覺性決定非因緣生以今難昔豈所應也二詳辯今教二一先辯離緣二正辯離見初阿難吾復問汝諸世間人說我能見云何名見云何不見阿難言世人因於日月燈光見種種相名之為見若復無此三種光明則不能見阿難若無明時名不見者應不見暗若必見暗此但無明云何無見阿難若在暗時不見明故名為不見今在明時不見暗相還名不見如是二相俱名不見若復二相自相陵奪非汝見性於中暫無如是則知二俱名見云何不見初探定見緣我為能見有生共執今詰以云何名見云何不見者為探其藉緣不藉緣故答以因光乃見無光不見者正顯其必藉緣也此且約明緣論藉餘可例思阿難下對待顯離正脈云無明便謂無見常情皆然故躡此以應不見暗詰之若必見暗者顯決無不見故此但無明云何無見者顯所見雖無能見故在其不藉緣之意亦自可見阿難下兼防謬執恐阿難謬執云所言見者必須顯然見明在暗之時既不見明豈得稱見故佛以若在暗時等防之意謂在暗不見明既名不見以此為例則在明不見暗還名不見如是則在暗在明二相俱名不見將一向冥冥豈理也哉若復下結申正義上說二俱不見不過因謬反難決無其理故此乘其必悟而申其正義焉意謂若復能知明暗二相自相陵滅自相傾奪非是汝之見性於二相中暫時滅無如是則在暗在明二相俱名為見云何不見耶以此為例則在空在塞有心無心具眼不具此見一無所損矣二正辯離見問既辯離緣已足釋疑今又辯離見其意何居答前斥權宗非第一義要必還他第一義乃可無詞若見猶帶妄仍是第二必兼妄見亦離乃可稱第一義耳是故阿難汝今當知見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞四義成就汝復應知見見之時見非是見初承示離塵意謂以是二俱名見之故阿難汝今當知既見明之時見性非是藉明見暗之時見性非是藉暗以此為例則見空之時見性非是藉空見塞之時見性非是藉塞如是則一切不藉其離塵獨立之體益可見矣四義下例示離見四義者即非明非暗等也成就者謂其理不謬一切無能破故以此為例則見見之時見性非是藉見義自可了故教以汝復應知云云言見見者以見性即是賴耶乃真妄和合而成今此中上見即真明下見即妄明然既已和合則真不復現而亦不能見妄若能以觀行力入流亡所以至寂滅現前則真見現矣真見既現乃知起心動念即乖法體是為見於妄見當此之時真明常自周徧非是藉於妄明故曰見非是見佛以此義難明故牒前四義成就而例顯之自下剖妄出真進退合明無非發明此義詳辯今教竟三例破種疑見猶離見見不能及云何復說因緣自然及和合相見猶離見者謂如上所說妙明真見不但離緣猶且離於見精中一分妄見是則妄見尚不能及況夫因緣自然等相益不能及故斥以云何復說等也和合下應有與不和合四宇或譯者脫漏觀後阿難述未開處可知問和合與不和合阿難未說何故與已說並斥耶答此有二義一者相關例言謂因緣與和合相關自然與不和合相關是則說因緣者必說和合說自然者必說不和合故彼雖未說為防言說蓋取例斥之耳二者例現破種謂因緣自然屬現行疑是已說者和合不和合屬種子疑是未說者前雖未說後來必說故兼帶言之蓋欲例前已破現行盡破未破種子科以例破種疑者以此四斥迷勉進汝等聲聞狹劣無識不能通達清淨實相吾今誨汝當善思惟為得疲怠妙菩提路汝等聲聞通指有學無學局執因緣曰狹兼惑自然曰劣由斯智無超脫慧乏明辯故曰無識清淨實相即是空如來藏離諸戱論曰實相中不容他曰清淨由無識故執諸法為實有依實有而起戱論迷於清淨障乎實相故曰不能通達此斥迷也吾今誨汝者教以捨權從實棄邪取正當善思惟者思惟今之所說畢竟如何是離見之見思到思所不及處自有雲開月現時節如是思惟方名為善既思惟已還須從性起修精進無屈便是妙菩提路若稍有疲怠即滯中途故以無得誡之此勉進也按阿難所請此之離見與上之超情乃是酧彼明義以情見皆屬無明但有粗細之異曰超曰離真明自現前矣正脈云通上十科論之初科則顯其脫根脫塵逈然而靈光獨耀二科則顯其離身離境凝然而本不動搖三科則顯其盡未來際究竟不滅四科則顯其從無始來本有不遺五科則顯其無往無還挺物表而常住六科則顯其不雜不亂超象外以孤標七科則顯其性元自在能轉物而大小何局八科則顯其體本混融譬一月而是非莫辨九科則顯其諸情不墮遠越乎外計權宗十科則顯其自相已離轉入於純真無妄顯見至此可謂顯之極矣但究未說出如何見見而又如何非見故總科為帶妄顯真帶妄顯真竟二剖妄出真正脈云二種顛倒見妄如璞蘊玉而見之真精如玉在璞故帶妄顯真如指璞說玉雖珍貴非虗而粗石未剖美玉未瑩此科剖妄出真如剖璞出玉精瑩煥發矣二一阿難並陳二請二如來各為開示初阿難白佛言世尊如佛世尊為我等輩宣說因緣及與自然諸和合相與不和合心猶未開而今更聞見見非見重增迷悶伏願弘慈施大慧目開示我等覺心明淨作是語已悲淚頂禮承受聖旨初述其未開將述未開之疑先約已開者發起故云如佛世尊等言世尊於超情科中已為阿難等宣說因緣及與自然二計俱非此其所已開者和合與不和合佛既未說爾時已有疑惑此其所未開者問離見科末既已相關帶言何必更問答語略未詳耳又此中已開未開稍欠眉目一往觀之似是望佛通拂四相然因緣自然前已詳破何必重拂或譯人略失檢校若將諸字易為而字則妥協矣而今下陳其迷悶言心猶未開已是迷悶更聞見見之時見非是見又添一層迷悶故曰重增伏願下并請開示伏願者伏俯願望弘慈者無盡之慈即哀懇重說之意正脈云慧目觀空者也佛啟清淨實相而阿難又乞慧目則此下圓發空如來藏無疑矣開謂開其未開示謂釋其迷悶正脈云纖疑在念則覺不明淨是須釋迷悶而開未開夫然後覺心無不明淨矣作是下悲禮承旨悲淚者感佛慈悲傷己愚迷也頂禮者一心歸命五體翹勤也息慮凝神虗己待教故曰承受聖旨阿難並陳二請竟二如來各為開示二一釋其迷悶二開其未開初阿難雖並陳二請而迷悶情急故先釋之二一斥迷許示二剖見釋迷初爾時世尊憐愍阿難及諸大眾將欲敷演大陀羅尼諸三摩提妙修行路告阿難言汝雖強記但益多聞於奢摩他微密觀照心猶未了汝今諦聽吾當為汝分別開示亦令將來諸有漏者獲菩提果初經家敘意憐愍者矜其愚迷感其誠懇也阿難迷悶等輩皆同故佛憐愍亦及大眾大陀羅尼指後歷談三如來藏梵語陀羅尼此云總持謂總一切法持無量義故有多字一字無字之別多字者如下頂光所說一字者如密部唵字吽字等無字者如圓覺云有大陀羅尼名為圓覺今取無字以三如來藏亦同圓覺即是總持依之而起觀行即是諸三摩提如後二十五聖所陳依之而立行位即是妙修行路如後五十五位所歷自下酬二請後便為開敷展演故云將欲預示於此為顯領見是心為彼之初方便故告阿下斥迷誡聽記識則心恒外馳雖強無功故曰但益多聞以無益於定也正以無益於定所以奢摩觀照心猶未了奢摩他此云止以寂靜為義正當寂靜時自覺六根門頭本有一段光明昭昭不昧義言觀照揀非起心對境能所熾然故以微密稱之能了此者始信自心有如來密因以縱至成佛不離此故如來斥以心猶未了者顯菩提涅槃尚在遙遠以此既未了況曰三摩禪那益無庸問矣教以諦聽者示將為說故吾當下利益現未分別開示者謂分別見見非見之義開示奢摩觀照以利現會也亦令將來等謂展轉流通利及後世以至盡際也諸有漏者通指具縛凡夫亦兼有漏二乘獲菩提果者謂既聞見見非見依奢摩而獲微密觀照自不至永沉生死終滯灰斷果矣斥迷許示竟二剖見釋迷三一雙標二見二各舉易例三進退合明初阿難一切眾生輪迴世間由二顛倒分別見妄當處發生當業輪轉云何二見一者眾生別業妄見二者眾生同分妄見初指輪出由正脈云一切眾生不止凡夫亦兼小聖輪迴世間不止七趣分段亦兼二乘變易以此是凡小俱迷之境而結尾期在圓滿菩提不生滅性故二顛倒者即於同別二境上所起執著見也良以同別二境本屬唯心所現眾生不了執為心外故曰顛倒以顛倒故於中立自立他故曰分別此即真見中一分妄見故曰見妄由此於彼當同分境處越分追求展轉發生別業而為異世之因又復於彼當別業境中非理愛染住復輪流轉變而成當來之果因果循環周而復始此生界所以不盡輪迴所以不息也而處之與業俱言當者各有深意言當處者顯是自心所現當業者顯是自業所招非離自心自業外別有境故云何下徵起標列同分即同分境也灌頂疏引瑜伽論指三千世界以是眾生共業所感貴賤人畜相依而住名為同分今經則不惟依報亦兼正報不惟此界亦兼十方以後文明言諸有漏國及諸眾生故於此不了唯心執為實有即是妄見別業即別業境也依灌頂疏引瑜伽論指眾生自身以是各隨己業貴賤苦樂不同飛走鱗甲類別名為別業今經則不唯根身亦兼器界不唯身之所到亦兼目之所及以後文明言以目觀見山河國土及諸眾生故於此不了唯業執為實有亦是妄見大抵別業境唯約現在以是宿業所招現在依止受用各有分齊之不容紊故同分境亦兼過未以是無始惑現今雖不得依止不得受用過去未來一定有分非彼一二之所能私故雙標二見竟二各舉易例二一易知別業二易知同分初三一徵舉能所二就所辯偽三結示正義初云何名為別業妄見阿難如世間人目有赤眚夜見燈光別有圓影五色重疊云何句徵起上既先標別業釋亦應爾故先徵也阿難下舉例良以別業妄見有易知者有難知者此先舉易知者為能例故云如也世間人目有赤眚例眾生依真見而有妄見也由赤眚故夜見燈有圓影例眾生由妄見故於迷位中見同分境上有別業境也別業境類分色等五塵故又以五色重疊例之是則人例一切眾生目例真見眚例妄見夜例迷位燈光例同分境圓影重疊例別業境下可准思二就所辯偽二一即燈即見辯二離燈離見辯初二一雙徵即燈即見二詳辨二俱不成初於意云何此夜燈明所現圓光為是燈色為當見色能例之法準上唯見字約眚見例妄見也此夜燈明所現圓光例迷位中同分境上重現別境問以為是燈色為當見色者例別業境為是同分境上實有為當別業見中實有耶二詳辯二俱不成阿難此若燈色則非眚人何不同見而此圓影唯眚之觀若是見色見已成色則彼眚人見圓影者名為何等初辯即燈不成復二此若句牒即燈則非下辯不成言非眚不見唯眚之觀顯圓影非燈上實有用此為例明知別業境非同分境上有矣若是下辯即見不成亦二若是句牒即見見已下辨不成言見已成色應不名見故難以名何顯既各有體知圓影非眚見上實有用此為例明知別業境非別業妄見有矣即燈即見辨竟二離燈離見辯捨即執離勢所必至故對以立破復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出離見別有應非眼矚云何眚人目見圓影初辯離燈不成復二若此二句牒離燈則合下辨不成言既離燈有何必燈上方見故難以屏張几筵應有影出意以彼等不出顯圓影非離燈有體用此為例則別業境非離同分境別有可知離見下辯離見不成亦二離見句牒離見應非下辯不成言眚見託於眼根既離眚見并眼亦離故難以應非眼矚云何句正見其必用目見既用目見知圓影非離見有體用此為例則別業境非離別業見自有亦可知就所辯偽竟三結示正義三一法說二喻明三結合初是故當知色實在燈見病為影影見俱眚見眚非病終不應言是燈是見於是中有非燈非見是故當知者承上言以是四義推求俱不可得之故當知別有正義可申也色實在燈見病為影者為猶作也言圓影之色實在燈上但非實有乃眚見病目所作之影例別業境實在同分境上亦非實有乃別業妄見所現似境耳影見俱眚者言此影既屬病作則合圓影與眚見俱係淨目眚相例別業境與別業見同為真見妄相故前文以見與見緣同為空華也見眚謂能見此俱眚者就能例中且指根言謂隨順世俗皆以根是有知自知有眚即是見眚此乃常時淨目故云非病所例中謂能見妄見者自是真見非是妄見前文云見見之時見非是見者以此終不應言者深戒之詞謂決定不應作是說也言既知見眚非病惟有淨目獨存若更於中說是燈說是見纔聞是義不成又復於中說非燈說非見其猶接虗斷風無可憑據故不應也所例中言既知見見非見惟有真見獨存若更於中說因緣說和合纔聞因緣和合不成又復於中說自然說不和合等總屬妄情計度無有實義前文云見猶離見見不能及云何復說因緣自然等者以此二喻明如第二月非體非影何以故第二之觀揑所成故諸有智者不應說言此揑根元是形非形離見非見第二月喻燈輪非體者非是真月實體非影者非是水中月影蓋言其本無所有喻燈輪之虗妄若依古德約見體月影對釋似與下科相背以下文不唯不許言是並非亦不可說故何以句徵第二下釋言正唯揑成所以非體亦非影也此揑根元指淨目說言不惟二月本無揑亦是妄唯淨目是其根元若更於淨目上說是形非形說離見非見者非愚即狂凡諸有智之人必不類此故云不應言也此中形即月形喻燈光見即揑見喻眚見是之一字雙貫形與非形離之一字雙貫見與非見其意以是形喻即燈是非形喻離燈離見喻離眚見離非見喻即眚見智者不說喻前終不應言蓋前以易知例難知此復以最易知者喻易知耳三結合此亦如是目眚所成今欲名誰是燈是見何況分別非燈非見此指燈輪亦如是者謂亦如二月是也目眚所成合二月乃揑所成故今欲名誰等者言既知目眚所成則輪眚皆妄惟淨目獨存欲以名誰是燈名誰是見謂二俱無所指也是則是燈是見尚不可說何況分別非燈非見益不可說此即合前諸有智者不應說言此揑根元是形非形等也然如來既以二月喻燈輪以燈輪例別境則不了別境者當觀燈輪不了燈輪者當觀二月即二月之非有了燈輪之無實即燈輪之無實悟別境之虗妄境既是妄見亦非真識此非真是名見見能見見者自非是妄故前云見見之時見非是見而後云覺所覺眚覺非眚中前後關楗盡在於此矣正脈云以此眚影為例即有兩重易知一者易知其為別業以於燈輪明知其為自己獨見之境二者易知其為妄見以又明知燈輪非實有也易知別業竟二易知同分三一徵舉洲國二例明所見三略顯虗妄初云何名為同分妄見阿難此閻浮提除大海水中間平陸有三千洲正中大洲東西括量大國凡有二千三百其餘小洲在諸海中其間或有三兩百國或一或二至於三十四十五十初徵起易知別業已明易知同分應說故次徵也阿難下舉洲正脈云大海即七金山外鹹水海也平陸即無水地水環陸地曰洲一大餘小數有三千此須彌之南一面洲也正中下舉國復二一大洲國數正中大洲者三千洲內此洲最大又居正中蓋即迦毗羅國及周維諸國所依洲也大國凡有等者先舉大國其餘下小洲國數觀餘之一字亦皆散布於大洲之外者也本在一海各有方隅故以諸海名之其間者一洲之間或者不定之詞謂或有一洲唯三百國或有一洲惟二百國也或一者或唯一國約最小之洲或二者或有兩國約次小之洲三四五十皆各據一洲為言然此等雖屬同分尚非所取之例但為敘出洲國為下科作源本耳二別明所見阿難若復此中有一小洲只有兩國唯一國人同感惡緣則彼小洲當土眾生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珮玦彗孛飛流負耳虹霓種種惡象若復此中者即上文所敘洲國之中有一小洲者即上文所敘次小之洲多不至三少不住一故曰只有兩國必取兩國者唯一國不顯妄故兩國同感亦不顯妄故曰唯有一國同感惡緣者謂共行不善同感之以惡業因緣致天垂應也當土者即同感惡緣之土感既惟惡應自非休故覩諸不祥不祥境界類含多種故云一切此總標也或見二日等乃各別明之孔子曰天無二日民無二王既見二日兩月自非吉祥之兆如夏桀亡時兩日并照是也雜氣環繞曰暈黑氣薄蝕曰適白氣在旁相連如衡璜曰珮中斷如半環曰玦此亦日月灾象如漢高祖圍於平城月暈七重藥師經日月薄蝕名列七難餘可知矣正脈云星芒偏指曰彗芒氣四出曰孛橫去曰飛下注曰流此皆星辰災象如宋襄公時星隕如雨秦始皇時彗星四現即藥師經亦云星宿變怪難也夾日而成負耳映日而現虹蜺又在上為負在旁為耳明者為虹暗者為蜺又負耳月亦或有如諸侯謀叛月生牙爪虹蜺唯對日出如朝現則西暮現則東此陰陽灾象也災象尚多總屬不善故以種種惡象該之然此惡象明知其是當土眾生惡緣所現例後閻浮提三千洲乃至十方有漏依正皆由眾生同惑所現總一虗妄唯是妄見而已三略顯虗妄但此國見彼國眾生本所不見亦復不聞此見彼不見者如春秋傳魯哀公六年楚有雲如赤烏夾日以飛三日杜預註雲在楚上惟楚見之禍當王身不及他國又魯昭公二十六年齊有彗星杜預註彗出齊之分野而不出魯故魯不見亦復不聞者言此國眾生縱或不見亦必得聞若彼國則并聞亦無以無感業故然既同一天象此有彼無其為妄見明矣正脈云然此亦有兩重易知一者易知其為同分以其明知與舉國同見也二者易知其為妄見以又明知他國不見也各舉易例竟三進退合明二一總標例法二依法例明初阿難吾今為汝以此二事進退合明吾今為汝等謂許以例明也以此二事者謂以此易知二事與難知二事文雖不顯難易義必具耳進退合明古釋多舛正脈立義雖精而穿鑿過當今則但就經文自具之進退釋之蓋進者進前易知例後難知退者退後難知合前易知此例合顯自有發明至下分科自見二例法例明二一例明別業二例明同分初三一進易例難二退難合易三警釋迷悶初二一取前易知二進例難知初阿難如彼眾生別業妄見矚燈光中所現圓影雖現似境終彼見者目眚所成眚即見勞非色所造然見眚者終無見咎如彼句指前目有赤眚者言赤眚自招故屬別業見境不真故屬妄見此易知也矚通能所上妄見為能矚下燈光圓影為所矚故雖現似境者言圓影雖在燈現但是似境非實有也終者究竟義言既非實有云何現見至究彼所以見者全是目眚所成前云色實在燈見病為影者即此勞字即指圓影以眚目難見強見成勞圓影斯現故而言眚即見勞者謂有眚之人即見如斯勞相此重以申明目眚所成義也色指地水火風能造一切而言非色所造者謂眚見似有淨眼觀之實無此重以申明雖現似境義也又非色所造者全託眚見是則合影與見俱為淨目眚相前云影見俱眚者即此言見眚者指淨目言謂隨順世俗皆以根是有知自知有眚即是見眚見咎即是眚病而言終無者謂不能見眚之人以有眚故將謂目病今既見眚則眚自是病而淨目終無有病前云見眚非病者即此是知此科全是取前易知別業中義蓋為將前所說取之於此以備進例也二進例難知取已說例未說如人入宅從前向後故為進也例汝今日以目觀見山河國土及諸眾生例者比例謂以前易知比例難知俾難知者亦成易故目見亦該耳聞言不唯足所踐履身所受用大凡目之所見耳之所聞皆為別業如舍衛九億家或見佛或聞名或不見不聞豈非感佛之業深淺有無各別不同乎山河國土依報境也及諸眾生正報境也依報有遠有近正報有親有疎人但知近者親者為別而不知遠者疎者於中亦有別業故總以眚見燈輪例之進易例難竟二退難合易以現說合前說如人出宅自後翻前故為退也皆是無始見病所成見與見緣似現前境元我覺明見所緣眚覺見即眚本覺明心覺緣非眚皆是者無不是也無始見病即指別業妄見成謂作成言如上所說依正雖在同分境上然非實有究竟而論皆是無始已來別業妄見之所作成此即退合雖現似境終彼見者目眚所成義也見字仍指妄見見緣仍指依正依正非實故云似現前境是則見下應逗與者并也見緣似現前境宜相連為句必言似現者顯其全託妄見是則合境與見同為真見中眚病故云元我覺明等也此中元我覺明應連下四字為句蓋覺明見指本覺妙明真見所緣眚通指見之與境言見之與境同為真見眚病唯真見能見此故稱所緣此即退合眚即見勞非色所造及影見俱眚義也覺見即眚句重釋上義言見之與境同稱為眚者以覺無二真既為真覺所見即名為眚本覺明心純真見體也純真見體能覺所緣之眚自不墮於眚中故云覺緣非眚此即退合然見眚者終無見咎義也三警釋迷悶覺所覺眚覺非眚中此實見見云何復名覺聞知見是故汝今見我及汝并諸世間十類眾生皆即見眚非見眚者彼見真精性非眚者故不名見初牒前釋悶覺所覺眚者謂真覺覺於所覺眚時覺非眚中者謂真覺自不墮於眚中此即牒前本覺明心覺緣非眚義也此實見見者謂此中覺所覺眚實即我前所說真見見於妄見然覺非覺眚時真覺既不墮於眚中見於妄見時真見自不墮於妄見故曰云何復名等言不得復名為見也覺聞知見名異體同故兼帶言之此即釋前重增迷悶意也是故下指現令悟是故汝今者承上義指現前也正脈云見我者觀佛相好也故知自惑未除雖觀佛勝相亦是眚影及汝者指阿難自身也世間即山河國土十類即十種異生合能見與所見同為無明幻出故云皆即見眚見眚謂妄見眚病也非見眚者謂其非是能見眚之真體此教以悟妄也彼見真精乃指能見眚之真體是為真性無關妄眚故曰性非眚者此教以悟真也末句乃結會前語佛意正以是真性非妄眚是故前來不許復名為見由此觀之則一切依正無論勝劣遠近親疎凡目之所見耳之所聞等均為別業所招唯是虗妄真如燈輪若更執為實有則是妄見不了由不了故必至非理愛染由愛染故生生世世不能出離前文所謂當業輪轉者以此若復知是業現頓息執持妄見既了愛染亦除唯憑願力受生不隨結業輪轉此則於別業境中得解脫身於別業見中得清淨見矣例明別業竟二例明同分三一進易例難二退難合易三誡令取證初三一取前易知二詳顯虗妄三進例難知初阿難如彼眾生同分妄見例彼妄見別業一人彼眾生指上同感惡緣者言惡緣共造故屬同分見境不實故屬妄見此易知同分也例彼妄見等者轉取例於易知別業蓋由前來易知同分中顯妄文略如云但此國見彼國眾生本所不見等易知別業中顯妄義詳如就所辦偽中有即燈即見辨離燈離見辯結示正義後又舉第二月之喻等故轉取例乃為借易知別業之虗妄顯出易知同分之虗妄然後進例難知不費詞而自明二詳顯虗妄一病目人同彼一國彼見圓影眚妄所生此眾同分所見不祥同見業中瘴惡所起俱是無始見妄所生言上以易知同分轉取例於易知別業者由彼一病目人所見之境同彼一國之人所見之境一類虗妄故也彼見圓影眚妄所生前已詳顯其妄此眾同分所見不祥即同彼見圓影同見業中瘴惡所起即同眚妄所生既事義相類不須更為詳顯而虗妄明矣文中言同分所見者謂大家共見之境同見業中瘴惡所起者謂同造見境之業於中自有災癘不善之氣故云瘴惡由斯上干天怒現諸不祥故云所起末句乃依枝尋根之論言上來一人所見眚影多人所見灾象雖同一虗妄且約枝末言之若尋其根本俱是無始真見中一分妄見所生良以真見即是真心妄見即是無明真妄和合而有業識有業識即有見相二分由見相二分復分別業同分由別業同分展轉現起眚影灾象故曰俱是無始等必言此者一則顯其虗妄之至例後難知一則顯其同出無明教令頓斷拔其本而枝末自盡矣三進例難知例閻浮提三千洲中兼四大海娑婆世界并洎十方諸有漏國及諸眾生上文以易知同分取例於易知別業且又顯其同出無明已知其為虗妄之至故躡之以進例難知閻浮提等即難知同分也三千洲既在閻浮應屬須彌南面海中而云兼四大海者則盡該三洲合此通為一四天下如此數至一千則為小千小千數至一千則為中千中千數至一千則為大千由三次言千名為三千大千世界便是一娑婆國乃釋迦一佛所化之境洎及也并及十方者兼於東西南北四維上下諸佛化境言之諸有漏國者總上娑婆十方同為無明現起故云有漏此為依報末句乃正報也既兼異域誰信同分無始成立誰信虗妄故以兩重易知者而比例之進易例難竟二退難合易同是覺明無漏妙心見聞覺知虗妄病緣和合妄生和合妄死總上若依若正萬殊一本故云同是覺明者本覺妙明純真之性也體惟不變故曰無漏用能隨緣故曰妙心即此便是真見此退合一國人心易知中雖不顯心義則必有以惡緣從心造故見聞覺知即指妄見以真唯一體無四名故此乃以真見起於妄見退合一國人心同感惡緣義也虗妄病仍指妄見以妄見即真見之虗妄病故緣字乃指依正以是虗妄病見上現起所緣境故此以所緣依正退合覩諸不祥等義也和合妄生者不了唯心於中越分追求名為和合由和合故遂致攬為別業於無生中受生故曰妄生故業未畢新業復造亦是和合新業既成故報將盡遂致業牽識走於無死中受死故曰妄死此以妄受生死退合此見彼不見等義也三誡令取證若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨本心本覺常住諸和合緣固為分段之因若不了唯心縱不和合仍招變易之果故須二俱遠離方能滅除生死因也言遠離者知是唯心頓銷妄見不趣不避不趣故離和合緣除分段因不避故離不和合除變易因二因既滅二死永亡智斷一時究竟故曰圓滿菩提不生滅性不生滅性即該斷果自是如金出鑛愈煉愈精故曰清淨本心本覺常住由此觀之則一切依正無論見與不見聞與不聞但屬有漏均為同惑所現皆如災象不實若乃妄見不了越分追求必至攬為別業成異世因前文所謂當處發生者以此然既知是惑現勿更執持追求都盡怕怖亦空乘願行以彌綸延劫海而嚴淨此則於同分境中得自在力於同分見中得無礙眼矣釋其迷悶竟二開其未開正脈云前阿難先述未開後述迷悶而佛先與釋迷悶者先其所急也今迷悶已釋次應開其未開矣愚謂此復有意以眾生所以不能遠離和合與不和合者皆由未悟本覺妙明非和合不和合義若果其能悟自不與妄境和合亦無不和合想是知此科雖為遠釋前疑亦近承上文以示遠離法耳二一據詞牒意二依迷為開初阿難汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合前阿難請詞中云如佛世尊為我等輩宣說因緣及與自然葢自述已悟也如來據此故云汝雖先悟等又請詞中云諸和合相與不和合心猶未開葢自述尚迷也如來據此故云而猶未明等二依迷為開二一先破和合二次破俱非初二一破和義二破合義初三一就塵問和二詳破和明三例破餘義初阿難吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性而自疑惑證菩提心和合起者則汝今者妙淨見精為與明和為與暗和為與通和為與塞和初示以問法復以塵問者例前法故以前破因緣等皆以前塵問也良由見對塵顯離塵無可憑故汝今下按定妄惑猶字有怪責意言和合與因緣相關前既破因緣則和合亦應無疑故以猶疑等而怪責之一切世間者既破和合且約學者世間言之和合言妄想者以真見本非和合但妄想計有耳正破和合兼帶因緣者益見其有相關之義證菩提心即指真見以是如來密因故也由來不變非和合起故責其而自疑惑則汝下先問和義已經剖顯故稱妙淨見精為與明和等逐一問過乃可以施破故二詳破和明若明和者且汝觀明當明現前何處雜見見相可辯雜何形像若非見者云何見明若即見者云何見見必見圓滿何處和明若明圓滿不合見和見必異明雜則失彼性明名字雜失明性和明非義初約和相以破意謂凡言和者必有和相可辯如朱和粉粉中必雜赤色故即就觀明難之當明二句對明塵以索和相見相二句例明塵而防混應言所見之相如青黃赤白等既分明可辯雜亦應爾故難以雜何形像若非下約和義以破意謂凡言和者必有義之可尋故雙約非見即見而難問之非見謂明與見異也異體則兩不相遇故難以云何見明今既見明是初無相離之義即見者明與見一也一體則全明成見故難以云何見見今既非見見是後無相即之義蓋必先離後即方可說和今既二無豈有和義耶必見下約和體以破意謂凡言和者必二體各虧其半方可容和汝今自覺見之與明各有所虧乎必其見性圓滿却向何處和明若其明塵圓滿是又不合容見與之相和此如來明知二俱周徧故為難問耳見必下約和名以破意謂凡言和者必當壞其本名如水既和土轉名為泥不復名水與土故以見必異明等而難問之言未和之時見是見明是明見性必異於明塵既已和雜則見固非見明亦非明應當失彼性明名字既因雜而失性明名字若更說見性和明者非其義矣三例破餘義彼暗與通及諸羣塞亦復如是若一一俱破但換塵中一字義皆取例於上故云亦復如是破和義竟二破合義問和義合義云何揀別答和如水土和泥合如函蓋相合一則不可分一則務相對也三一就塵問合二詳破合明三例破餘義初復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合亦逐一問過然後破也二詳破合明若明合者至於暗時明相已滅此見即不與諸暗合云何見暗若見暗時不與暗合與明合者應非見明既不見明云何明合了明非暗初正破合明意謂凡言合者必如函蓋相合若見與明合者如圓蓋合於圓函暗時明滅如以方函而易去圓函此見即不與諸暗合如圓蓋即不與方函合也不合則相背相背則不見故難以云何見暗若見下兼防謬計恐謬計云前見明時實與明合今雖見暗却不與合故以此防意謂若見暗時不與暗合者是見時不合矣既見時不合則應合時不見是則汝言與明合者應當不見於明今既見明自非與明合矣既不下轉顯其非恐又謬云所謂與明合者不過藉明而有有後方見當其合時實不能見故以此顯意謂凡言合者必須先見見已與合然後了知是明非暗若既不能見明云何能與明合了知是明不是暗耶是益見其非矣三例破餘義彼暗與通及諸羣塞亦復如是例上可思先破和合竟二次破俱非二一阿難轉惑俱非二如來分徵別破初阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶和合不成轉惑俱非故白佛以問如我思惟者謂佛說如是如我思惟亦然但未敢決定耳此妙覺元仍指根性純真無妄曰妙朗然現前曰覺不係新得曰元此以剖妄之後乃立斯名與諸緣塵即指明暗通塞及心念慮即指六處識心以心為識體念慮為識之用故據上如來唯言不與塵和今兼識言者以根塵識三恒時不離既已不與塵和自應不與識和故兼言之非耶二字是疑詞非決詞以決定猶待佛故二如來分徵別破二一徵破非和二徵破非合初三一對塵問非二詳破非明三例破餘義初佛言汝今又言覺非和合吾復問汝此妙見精非和合者為非明和為非暗和為非通和為非塞和初依言示問可知此妙下先徵非和雖承惑具牒而對塵單問非和為先破故非和者如磚石并砌彼此不相入也二詳破非明若非明和則見與明必有邊畔汝且諦觀何處是明何處是見在見在明自何為畔阿難若明際中必無見者則不相及自不知其明相所在畔云何成初據理定畔意謂設若見性不與明和則見與明兩不相入如磚石并砌必有彼此邊畔此據理論也汝且下教令諦觀意謂既有邊畔必有處所汝且諦觀何處是明何處是見又既有處所必有遠近試問在見在明自何為畔要必遠近處所一一分明乃可說有邊有畔阿難下破畔不成意謂設許有畔則明際中無見矣若果明際中必無見者則見性不能及於明中既不能及於明中自應不知明相所在明且不知憑何立畔故曰畔云何成畔既不成所言非和者亦無可據矣三例破餘義彼暗與通及諸羣塞亦復如是既知對明無非和之義對暗對通對塞義可例思故云亦復如是徵破非和竟二徵破非合三一對塵問非二詳破非明三例破餘義初又妙見精非和合者為非明合為非暗合為非通合為非塞合既破非和則非合之義似應不必更破但恐其依舊堅執故此重牒云又汝必謂見精非和合者或非合之義有所據乎為非明合等乃逐一問過也三詳破非明若非明合則見與明性相乖角如耳與明了不相觸見且不知明相所在云何甄明合非合理初據理定乖意謂設若見性不與明合則見之與明一屬性一屬相彼此乖違如角兩立自然不相符合此亦據理論也如耳下取喻以明意謂眼能觸色耳能觸聲有相符義世所共許今既性相乖角則如耳之與明了然不相觸矣了猶逈也見且下就謬結破意謂設許不觸則不能見既不能見亦不能知是見且不知明相所在此出謬也既不知明相所在則合與不合俱應無所甄別以無所憑故汝今云何而又甄別合非合理是知說合固為虗誕說非合尤為謬妄此結破也三例破餘義彼暗與通及諸羣塞亦復如是例義可知此後無結文者以剖妄出真已終一章之義此但超情科中餘疑釋之則已耳正脈云自此顯見已極奢摩他從根指心方便已盡向後轉名如來藏性不復呼為見性之偏名矣就根性以指真心竟二會四科而歸藏性四科謂陰入處界也藏性即如來藏性準後有三一空如來藏非一切法二不空如來藏即一切法三空不空如來藏離即離非是即非即此言空如來藏也然此性雖為因心亦即果體故稱如來雖局根中亦該萬法故云藏性藏者以含藏為義以向下陰入處界皆融會以入於此性中故問既云含藏豈得名空況陰入處界一一會入其中即本屬空藏亦成不空而大科中空藏之義云何會通答所言含藏者唯是性具非關事造豈礙名空況陰入處界既言會入則全相皆性更無別法如融冰成水不見冰相故無妨說空也問此與根性為同為異答本唯一性親疎廣狹異耳良由阿難捨妄求真如來急欲令其薦取故就其最親近者而指示之目曰根性若但執此為真則知見狹矣故又兼於最疎遠者而擴充之易曰藏性蓋欲傳一燈之火展轉以至無盡燈矣二一取例總以融會二分科別為顯示初二一取例至虗之法二融會似實有法初正脈云此一類法顯然不實人皆易見而凡外權小亦皆但知其相之妄實皆不達其性之真故佛特為剖相而出性焉愚謂剖相出性四字與今疏科義不合若易為會相入性則妥阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體佛謂阿難妄見中真見汝已知矣幻相中實性汝猶未明試當更為說浮塵者虗浮塵相如陽焰空華燈輪乾城等故云一切無而忽有有而忽無故云幻化當處出生者顯來無所從隨處滅盡者顯去無所至如是則有名無實故曰幻妄稱相稱即是名謂徒有幻妄名相耳雖徒有名相而起必由真故曰其性真為妙覺明體然妙覺明體望前即是真見望後即是藏性蓋同一本妙覺明隨緣異稱也問此等乃至虗之法取以為例者何也答正脈云有二妙義存焉一者比例知妄謂因幻化等相不實而知陰入處界皆不實也二者比例信真以彼至虗之法尚是真體況陰入處界等似實有法益信其即真體矣二融會似實有法正脈云此一類法與前法雖皆依他起性而前法人易知其為妄斯法人難覺其為虗是故凡外執為實有二乘計為心外大乘法相宗人猶言似有不無惟圓實宗人方了依他無性即是圓成今會相入性正同圓實宗義也如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得初例顯四科相妄如是者如上所說至虗之法如是以此為例則盡世間所有乃至陰入處界皆如是也陰五入六處十二界十八至下別為顯示自見正脈云別經三科此加六入而已各盡萬法不出色心對機開合故廣略殊此等皆以賴耶中自類種子為因色心二法互相由籍為緣如云由心生故種種法生由法生故種種心生和合會遇妄現無實故云虗妄有生色心二法不籍自類種子不起別離分散妄壞不真故云虗妄名滅生滅俱以虗妄名者以因緣無性故殊不下斥以迷性真實殊不能知謂絕然不知也生滅去來者謂因緣和合則生來因緣別離則滅去然既屬虗妄總非真實同彼浮塵猶若幻化識冰則冰元是水了妄則妄無不真故曰本如來藏常住等八字皆藏性中德相體自不變曰常住用恒隨緣曰妙明由不變故離於生滅去來曰不動由隨緣故通為一切法體曰周圓具此多義名妙彼此無異曰真如性也其奈凡夫執陰等為實有二乘迷諸法為心外自蔽妙明枉受淪溺故斥以絕然不知激以速發深省所謂慈悲之故有落草之談也性真下結示悟真無妄性即藏性真常偏約體言求於去來等即就體以示真空義也良由陰入處界全妄皆真秪緣一向不知妄見有彼此去來聖凡迷悟凡夫執我為迷小聖無我為悟既皆法執未了亦權分勝劣而已始終生死若知從緣無性舉體全真真亦強名況復更求去來迷悟等自應了無所得據此則益信下之所說為空如來藏矣取例總以融會竟二分科別為顯示四一約陰顯示二約入顯示三約處顯示四約界顯示初二一總徵二別示初阿難云何五陰本如來藏妙真如性云何者徵起詞良以色等五陰本是世間有為之法一旦許為藏性故須徵起然後釋明耳正脈云陰者蓋覆義謂蓋覆真性新翻為蘊蘊者積聚義謂積聚有為愚謂二義交資互為過患正以積聚有為故能蓋覆真性又以蓋覆真性故致積聚有為對下處界此為迷於心不迷於色者合色開心又為上根人聞略得悟者說也不言常住妙明等義但言妙真如性者舉總以該別故二別示五一色陰二受陰三想陰四行陰五識陰初色即十一色法俱舍云始自眼根終乎無表皆名為色清涼云形質可緣曰色變礙為義蓋變謂變壞變顯剎那無常壞顯同分無常礙謂質礙以眾微集聚自成形質能為障礙如一紙即能障眼一墻便能障身是也三一取喻空華二就喻辯妄三承辯結示初阿難譬如有人以清淨目觀晴明空唯一晴虗逈無所有其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相色陰當知亦復如是初別以喻顯人喻本源真心起信云初唯依一心為本源淨目觀空喻真如門中真智契真也真智契真一法不立故喻以唯一晴虗逈無所有目貴自如無故而欲要不動喻生滅門不守自性也起信云次依一心開二門一者心真如門二者心生滅門若欲已即覺即喻覺義今乃久瞪不轉喻不覺義起信云次依生滅門明二義一者覺義謂心體離念等二者不覺義謂不如實知真如法一故不覺心起等勞目病喻業相見病見喻轉相狂華亂動喻現相起信云次依後義生三細謂初依不覺故心動名業相由業故轉成能見名轉相由能見故則有境界妄現名現相現相既成凡夫於中執有攬為色陰二乘於中析無妄謂色空故喻云復有一切狂亂非相狂亂云一切者謂華相眾多如垂𩬊蠅翼金星等喻五根六塵即凡夫攬為色陰者也非相者對待見無如先有後無此有彼無喻析色離色即二乘妄謂色空者也色陰下總以法合喻已別明玩味自知故總以色陰合之教以當知者有二義一者當知相妄如狂華親依瞪勞現故二者當知性真如狂華轉依人目起故是知違本逐末色陰固是不實遡流窮源真外曾無異法且莫於狂華亂起處執有執無宜須向瞪勞未發時守目安人亦復如是富哉言乎取喻空華竟二就喻辯妄二一標非二處二分文各破初阿難是諸狂華非從空來非從目出空喻性空雖曰性空亦但取真如理境本來清淨言之非此頑空也目喻真智雖曰真智亦但取真如心相自具靈明言之非比事智也意言狂華無實惟依勞見現起故曰非從空來非從目出喻色陰虗妄唯依業轉幻興非性空起非真智現正顯其違本漸遠而逐末漸深也二分文各破二一破從空來二破從目出初如是阿難若空來者既從空來還從空入若有出入即非虗空空若非空自不容其華相起滅如阿難體不容阿難初因出定入當處出生隨處滅盡本無出入若謂從空來者則是從空而出然來時既從空出去時還從空入此必無之事也若有下難以非空若果其有出入者則空有內外空有內外則成有相故曰即非虗空空若下轉顯其謬言空若非空是果成有相矣相豈容相故曰自不容其華相起滅如汝阿難體是有相自應不復更容阿難於中出入然既展轉成謬決知狂華不從空來以此為喻則色陰非性空起也二破從目出若目出者既從目出還從目入即此華性從目出故當合有見若有見者去既華空旋合見眼若無見者出既翳空旋當翳眼又見華時目應無翳云何晴空號清明眼初因出定入若謂從目出者目出必在見華時也見華時既從目出不見時則應還從目入說出說入二俱招難至下自知即此下由出定見謂既此華性果從目出者自得目之氣分而狂華當合有見華若無見豈從目出此說出招難也若有下有見不成若必謂有見者雖說出無過而入尤招難以從目出去之時既能見之華在於虗空若不見時是又旋入於眼而狂華即應見眼華豈有見眼之理哉此說入招難也若無下無見不成若謂雖從目出不妨無見者無見則同彼諸物乃有礙之法矣若果有礙則入仍招難以從目出去之時既翳礙於空若旋入眼中之時自當翳礙於眼華豈有礙眼之時哉又見下重難無見又若狂華無見而有礙者則見華之時華既在空目應無翳若爾則晴空無華乃華入於目目應有翳不得清明云何舉世皆以目見晴空逈無所有時號清明眼然既展轉成謬決知狂華不從目出以此為喻則色陰非真智現也就喻辯妄竟三承辯結示是故當知色陰虗妄本非因緣非自然性以是空出目出展轉成謬之故應知色陰非性空起非真智現來無所從去無所至同彼狂華一類虗妄但能消業轉之勞見全色皆真如之智境還同淨目晴空故曰本非因緣非自然性然性即藏性其體不變故非因緣其用隨緣故非自然為業轉之元始是現相之宗極故曰本也色陰竟二受陰正脈云此下開一心法為四陰也前三即徧行心所行陰即思後一仍合八識心王略開為四耳今此受者領納為義唯識云領以為境令生覺受敷不出三謂對違順雙非之境而生苦樂捨之三受三一取喻幻觸二就喻辨妄三承辯結示初阿難譬如有人手足晏安百骸調適忽如忘生性無違順其人無故以二手掌於空相摩於二手中妄生澁滑冷熱諸相受陰當知亦復如是初別以喻顯譬如有人仍喻一心本源手足晏安喻真如不動以晏安者寂靜義也百骸調適喻性德自如以調適者和順義也忘生者忘其有生南郭子綦所謂喪我是也先已有生忽而如忘喻生滅門中覺義性無違順者喻覺則心體離念無受陰故其人無故者無故要動喻生滅門中不覺義也要動故手分為二喻不覺則真妄和合而成阿賴耶識名為業相有手必有掌喻由業故轉出能見名為轉相有掌欲摩無物可摩故自摩空喻由能見故於本無境界中妄見境界名為現相初摩之而澁冷喻苦受後摩之而滑熱喻樂受形顯兩楹唯覺中庸喻捨受也言妄生者以空本無物澁冷滑熱惟是手中妄生喻境界非真苦樂捨受唯依業相幻起葢佛以幻觸喻妄受者以受因觸顯借觸易施破故又諸識皆有覺受今取賴耶中覺受言賴耶近真覺受尚是虗妄況餘諸識體唯虗妄者乎受陰下總以法合亦唯顯受之與觸一類虗妄而已取喻幻觸竟二就喻辯妄二一標非二處二分文各破初阿難是諸幻觸不從空來不從掌出既云幻觸則體唯虗妄豈從空來掌出喻諸受亦然實不從轉相現相起也二分文各破二一破從空來二破從掌出初如是阿難若空來者既能觸掌何不觸身不應虗空選擇來觸初正破空來如是者謂如上所說如是阿難者呼其名而再告之也若謂諸觸從空來者空無邊際諸觸亦應無其邊際若爾則既能觸掌何不觸身末句兼防謬辯恐謬辯云空雖出觸亦有選擇何妨觸手而不觸身故為此防言不應者謂虗空無知何能選擇若有選擇則非虗空矣是則虗空無擇而又但能觸掌知諸觸不從空來以此為喻顯受陰不從現相起也二破從掌出若從掌出應非待合又掌出故合則掌知離則觸入臂腕骨髓應亦覺知入時踪跡必有覺心知出知入自有一物身中往來何待合知要名為觸初正申兩破若謂此觸從掌出者未合即應出觸應不待合方出此約未合不出破也又若此觸從掌出者合則掌知有觸是觸從掌中出矣若爾則離開之時不覺有觸是此觸又從掌中而入若果從掌中入者近則通於手腕遠則通於肘臂而臂腕骨髓中應亦覺知入時踪跡此約離時不入破也必有下兼防謬應恐謬應云離開之時實從掌入臂腕骨髓中亦實有覺心知出知入何勞以此為難故為此防若必謂實有覺心知出知入自應有一澁滑冷熱之物在汝身中往來爾時即合名之為觸何待合掌之後知有澁滑冷熱乃要名為觸此益見其謬也既展轉成謬知此觸不從掌出以此為喻顯受陰不從轉相起也就喻辨妄竟三承辨結示是故當知受陰虗妄本非因緣非自然性準上色陰可知受陰竟三想陰想謂懸想謂於不現前境懸遠想像故灌頂引唯識云想謂於境取像為性施設種種名言為業為要安立境分齊相方能隨起種種名言雖八識俱有唯第六最勝今所破者似惟第六中想葢以勝況劣也三一取喻酢說二就喻辨妄三承辨結示初阿難譬如有人談說酢梅口中水出思踏懸崖足心酸澁想陰當知亦復如是初並陳兩喻先約酢說喻之有人喻一切眾生凡想陰未盡者皆是談說喻能想之心酢梅者謂梅酸如酢喻所想之境喻中酢梅未至說惟懸說法中境界不現想唯懸想義相似也然說雖懸說能令口中水出喻想雖懸想能令心中愛生愛即屬水如後云貪求財寶舉體光潤心著行淫二根流液是也思踏二句次約崖思喻之思踏懸崖亦喻能想所想葢酢說喻順境上想崖思喻逆境上想故兩陳之足心謂足底中間也言踏崖雖屬懸思能令足底酸澁喻逆境雖屬懸想能令心中忿恚以酸澁忿恚皆對逆境生起故為喻也想陰下總以法合準上二陰可知二就喻辯妄三一標非二處二分文各破三崖思類明初阿難如是酢說不從梅生非從口入如是酢說初說不從梅生說已非從口入無出無入顯酢說之無實喻懸想初起不從境生暫滅非從心入無出無入知想陰之虗妄曰不曰非至下各破自見二分文各破二一破從梅生二破從口入初如是阿難若梅生者梅合自談何待人說恐謂無梅憑何說酢初說必從梅生故為此破若必謂從梅生者是梅能生說矣梅能生說即合自談何必待人而說既必待人則初說不從梅生以此為喻知懸想初起不從境生也二破從口入若從口入自合口聞何須待耳若獨耳聞此水何不耳中而出初正破口入恐謂聞說口中出水說已必從口入故為此破若必謂從口入者自合口即能聞矣口若能聞何須待耳方聞既猶待耳則說已非從口入以此為喻知懸想暫滅不從心入也若獨下兼防謬辨恐謬辯云說唯從口聞唯從耳難口令聞世間相違故為此防若謂獨耳能聞是酢說惟入於耳矣若爾此水何不耳中而出而必待口出此轉見其謬也分文各破竟三崖思類明想踏懸崖與說相類喻中懸崖之思同彼酢梅之說法中逆境之想同彼順境之想故云相類令準彼而知此也就喻辯妄竟三承辨結示是故當知想陰虗妄本非因緣非自然性既知梅說崖思出入無從自了取境想陰當體虗妄知妄即離不真何待故曰本非因緣非自然性想陰竟四行陰行者以造作遷流為義俱舍云造作遷流二義名行雜集云造作是行相由此行故令心造作謂於善惡無記品中驅役心故今經云譬如瀑流波浪相續雜集偏顯造作今經偏顯遷流其實造作遷流相資為患故俱舍兼二義言之體即徧行中思於百法內攝法最多除色受想及八識心王其餘四十九心所及二十四不相應行皆行陰攝然既屬徧行中思則八識俱有唯第七最勝以恒審思量故今所破者似指七思亦以勝況劣也三一取喻流性二就喻辨妄三承辯結示初阿難譬如瀑流波浪相續前際後際不相踰越行陰當知亦復如是初別以喻明瀑流者急流水也喻七識中行波浪者鼓動騰躍喻行陰有造作義相續者新新不住喻行陰有遷流義前際後際喻前念後念不相踰越喻各有分齊所謂一念中有九十剎那一剎那中有九百生滅是也行陰下總以法合以行陰合瀑流以造作遷流合波浪等如上可思二就喻辯妄二一標非即離二分文各破初阿難如是流性不因空生不因水有亦非水性非離空水不因空生喻行陰不因性空而有不因水有喻行陰不因識體而興亦非水性喻行陰亦非識性此總一非即義也非離空水喻行陰亦不離性空及識此且總標至下乃一一俱破二分文各破二一破即空水二破離空水初如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺若因水有則此瀑流性應非水有所有相今應現在若即水性則澄清時應非水體初破因空生瀑流下依於水上臨於空恐謂因空有流故為此破若謂瀑流因空生者則應凡有空處皆悉生流若爾則十方虗空應成無盡流矣果其成無盡流而世界之中自然俱受淪溺今既不爾則瀑流非因空生以此為喻知行陰不因性空有也若因下破因水有恐謂既不因空定是因水故為此破若謂瀑流因水有者則水如父而流如子矣若爾則瀑流性應非水性猶體也應非水者如子因父生子體決定不是父也是則水為能有流為所有能所二相今應現在可別既無可別則瀑流非因水有以此為喻知行陰不因識體有也若即下破即水性恐謂既非因水而有想應即是水性故為此破若謂瀑流即水性者是水以瀑流為自體矣若爾則澄清無流之時應反非水體豈理也哉是知瀑流非即水性以此為喻知行陰不即是識性也二破離空水若離空水空非有外水外無流空非有外者空性周徧水外無流者水為流本空性周徧離空流在何所水為流本離本焉能有流用此為喻知行陰非離性與識也是則上科唯是顯其相妄此科兼為顯其性真故下科承此而結示之就喻辯妄竟三承辨結示是故當知行陰虗妄本非因緣非自然性不即性識則觀相元妄無可指陳不離性識則觀性元真唯妙覺明若果能達妄本空知真本有則正當遷流處實即不遷肇論云旋嵐偃嶽而常靜江河競注而不流等蓋有見於此矣行陰竟五識陰識以了別為義雜集云了別是識相謂由此識故了別色聲香味觸法等種種境界小乘唯六大乘有八前五識緣性境第六識緣獨影境第七緣帶質境第八緣根器種子今此中所破似指第八以受熏持種為諸識本破其本而枝末自盡矣三一取喻瓶空二就喻辨妄三承辯結示初阿難譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國識陰當知亦復如是初別以喻明有人喻眾生凡識陰未盡者皆是也西域有鳥名迦陵頻伽此翻妙聲像此作瓶故即以頻伽名之今云取頻伽瓶者喻眾生由識陰故攬四大以為身也塞喻二執孔喻二空言眾生既以四大為身於中執我我所障蔽二空故以塞孔喻之兩孔者瓶有二口也空喻識陰言眾生二執未破不能脫此軀㲉遂致周徧之識受局於地水火風之中故以滿擎喻之千里遠行喻發心修行趣果也言眾生從初發心中歷信住行向暖頂忍世地等十重行位故以千里喻之位位皆有修證故以遠行喻之餉饋送也用餉他國者喻發心脩行斷二執證二空轉有漏識入於佛果無漏身中而為無垢淨識至下云開孔倒瓶正喻斷執證空等義也識陰下總以法合可知問此識去後來先為受報之主古德謂業牽識走如瓶擎空行捨身受身如用餉他國似甚有理今約轉有漏入無漏釋之而有何理可據答此識固為受報之主亦是成佛之源故前文呼為菩提涅槃元清淨體而後文識陰盡處則曰超出諸位入於如來妙莊嚴海況此識即是六根中性而是經之所以獨為推重者正以其用為因心決定成佛故是知此經不取捨身受身之功但取脩因契果之力為順佛意故作此配二就喻辨妄二一標非來入二分文各破初阿難如是虗空非彼方來非此方入如是虗空指已到他國之空喻佛果無垢識也非彼方來者非彼本處地方擎來喻無垢識非從凡夫有漏身中帶來非此方入者亦非既到此方始入缾中喻無垢識亦非既到佛地轉入無漏身中葢以性識周徧隨緣異稱因位有賴耶異熟之名果地擅無垢淨識之號其猶虗空任器春色分和本無去以無來又何出而何入是此科不惟顯識相之虗妄抑以見識性之真實也二分文各破二一破彼方來二破此方入初如是阿難若彼方來則本瓶中既貯空去於本瓶地應少虗空前云擎空遠行似從彼來故為此破若謂此空從彼方擎來者則是於本瓶中貯得一塊虗空去了若爾則本所置瓶之地應少一塊虗空空既不少知此空非彼方來以此為喻則無垢識非從有漏身中帶來二破此方入若此方入開孔倒瓶應見空出恐謂既非彼來定從此入故為此破若謂此空乃既到此方始入缾中者必是倒出前空乃可容此空令入若爾則開孔倒瓶時應見前空從瓶中出前既不出知此空非此方入以此為喻則無垢識非既到佛地乃入無漏身中就喻辨妄竟三承辨結示是故當知識陰虗妄本非因緣非自然性從凡至聖隨緣異稱說轉說入循業各現故云當知虗妄性識本無增減真空豈有入來故曰本非因緣非自然性也然此已上五陰據後文從真起妄因相織而成濁相反妄歸真緣作證而受羣邪要皆由於不達相妄罔識性真若果能了相元妄無復從前相織知性皆真不向中途作證則解結入圓通澄濁入涅槃之方便無越此矣有志斷證者其勿忽諸約陰顯示竟
