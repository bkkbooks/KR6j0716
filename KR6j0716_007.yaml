降伏諸魔制諸外道十方如來乘此呪心坐寶蓮華應微塵國十方如來含此呪心於微塵國轉大法輪初降魔制外用謂十方如來將欲證真多為魔外所擾不能速成執持此呪則一念不動且此呪是諸佛心印持之者必為諸佛護念以是二力自力佛力故能降魔制外以念不動則魔外不得其便佛護念則魔外不能近故十方下證真現報用謂魔外不擾剎那證真現盧舍那遍入華藏故云坐寶蓮華應微塵國言寶蓮華者即華藏世界中諸剎種也一一剎種各有二十層數一一層數各有如彼數三千大千世界微塵數佛剎圍繞今云應微塵國者且約總數言之而言乘呪心者以此呪心即是諸佛真法身故十方下依報轉輪用謂十方如來依報身欲轉法輪必於無礙智中含此呪心以此呪心即是無量法門體故依體轉法法乃無盡由此故能於微塵國轉大法輪法輪言大者以是無上根本法輪一切教法無不從此出故又以唯被法身大士諸聲聞等有眼不見有耳不能聞故二從本垂迹利後用三一迹示兩利二迹示證果三迹示付法初四一記他自記二拔苦濟難三事師近佛四攝授親因初自下皆迹門中事若不然者而上文既説乘此呪心坐寶蓮華應微塵國已是成佛而下文又説誦此呪心成無上覺則前後重復矣思之十方如來持此呪心能於十方摩頂授記自果未成亦於十方蒙佛授記初在果記他十方如來約從本垂迹現應化身言之持此呪心加被菩薩令其當來成佛故能於十方界摩頂授記正脈云此可喻蜾螺呪螟蛉也自果下在因蒙記自果未成者約示在因門言之現菩薩迹故亦仗此呪心十方蒙記問既是示現何假呪力答此有三義一為顯神呪功能二為彼實行作則三為諸不信作證由此所以雖不須呪無妨示現持呪二拔苦濟難十方如來依此呪心能於十方拔濟羣苦所謂地獄餓鬼畜生盲聾瘖啞冤憎會苦愛別離苦求不得苦五陰熾盛大小諸橫同時解脫賊難兵難王難獄難風火水難飢渴貧窮應念消散初能拔衆苦十方如來亦迹示應化也依此呪心能拔羣苦者或教以自持或代為呪願仗呪神威百靈呵護超苦海躋康衢故所謂者指釋之詞謂指下十種釋上羣苦也十種者一曰地獄有八寒八熱等苦二曰餓鬼有針咽炬口等苦三曰畜生有宰割負重等苦四曰盲聾瘖啞有色聲莫辨等苦五曰冤憎會遇有彼此報復等苦六曰恩愛別離有悲哀慘傷等苦七曰有求不得有面慚心愧等苦八曰五陰熾盛有生老病死等苦九曰大橫如藥師九橫等有夭折天年等苦十曰小橫有災禍干連等苦然橫分大小者以性命有關無關異故同時解脫者以神呪不思議力之所致也賊難下能濟衆難略明亦有十種一曰賊難有劫財奪命等事二曰兵難有衝鋒冒刃等事三曰王難有委身致命等事四曰獄難有枷鎖禁繫等事五曰風難有凜寒揮沙等事六曰火難有焚燒炙熱等事七曰水難有衝陷漂沈等事八曰飢難有絶糧枵腹等事九曰渴難有喉乾心燥等事十曰貧窮有困苦逼迫等事應念銷散者謂應其所念之呪而銷散也三事師近佛十方如來隨此呪心能於十方事善知識四威儀中供養如意恆沙如來會中推為大法王子初能事知識示在因位引攝初機故於十方世界事善知識以彼具正知見能為初機作進道之資故四威儀中謂行住坐臥時也一一時中各有應供之物皆令隨心故云供養如意法華天授品云採薪及果蓏隨時恭敬與即斯意也隨猶帶也然必帶此呪者為示初機非此呪無以發通不能遠到十方非此呪無由出生不能供養如意是知欲事知識如意作供者可不以此呪為急務耶恆沙下能近諸佛助佛揚化引攝初機故於如來會中為法王子推之為大者以其智辨具足同類莫匹斯亦呪心神力之所致也四攝受親因十方如來行此呪心能於十方攝受親因令諸小乘聞祕密藏不生驚怖行亦持也言如來與歷劫親眷互相因依自雖成佛念彼散在十方亦常持此攝受故云行此呪心能於十方云云祕密藏即最上一乘二乘不知故稱祕密權小乍聞故多驚怖如法華上德身子乍聞廢權立實猶云將非魔作佛惱亂我心耶餘多驚怖可知今言令不驚怖者謂歷劫親因設有流入權小者亦以心呪加持令其成就大志力堪受大如法華阿難得記便云我今無復疑安住於佛道其不驚不怖可知迹示兩利竟二迹示證果十方如來誦此呪心成無上覺坐菩提樹入大涅槃迹示最後身中誦呪斷習轉煩惱而為智果故云成無上覺端坐道樹寂然不動轉生死而為斷果故云入大涅槃然此既屬迹示仍須誦呪者為示此呪雖至最後身中猶不可忘耳三迹示付法十方如來傳此呪心於滅度後付佛法事究竟住持嚴淨戒律悉得清淨迹示出世事畢欲以此呪利益未來衆生故云傳此呪心於滅度後以此護法能令所付佛法中事究竟住持以此護戒能令嚴淨戒律中人悉得清淨據此則佛滅度後能令正法長存毗尼久住者端賴此呪主法主律者其勿忽諸別顯二用竟三結示無盡若我説是佛頂光聚般怛囉呪從旦至暮音聲相聯字句中間亦不重疊經恆沙劫終不能盡若我説是句有二釋一但説呪二説呪益從旦至暮者約竟日言音聲相聯者謂竟日之中無間説故字句中間亦不重疊者謂字字句句前後詮法各不同也如是而説經恆沙劫者極顯其字句之廣并説日之長故終不能盡句若約説呪者以呪是心呪攝義無盡非説可罄如華嚴一字法門海墨不書一偈是也若約説益者謂如上所説且就諸佛要用亦惟略出少分設具言之經劫莫盡以此呪所以為諸佛要用者不止此耳故正脈云此無盡方約諸佛要用非并衆生用也總上諸佛要用竟二衆生利賴三一別明利賴二總顯益普三承益勸信初八一遠魔除毒二成智免害三資發通明四遠離雜趣五常生佛前六能成衆行七滅罪除障八有求皆遂初二一聲聞賴以遠魔二凡夫賴以除毒初亦説此呪名如來頂汝等有學未盡輪回發心至誠取阿羅漢不持此呪而坐道場令其身心遠諸魔事無有是處亦説此呪句有二釋一者此呪本名悉怛多般怛囉以其為諸佛要用故亦名如來頂此結前也二者既名如來頂則知最勝故能為衆生利賴此起後也汝等有學即指阿難一類欲界尚有七番生死況復上界故曰未盡輪回發心者發修道心至誠者至極誠懇取阿羅漢者欲得人空欲得人空亦須道場修習不持此呪多滯陰境故曰令其遠魔無有是處此是反顯若正明者謂必資持呪乃可遠諸魔耳二凡夫賴以除毒阿難若諸世界隨所國土所有衆生隨國所生樺皮貝葉紙素白氎書寫此呪貯於香囊是人心昏未能誦憶或帶身上或書宅中當知是人盡其生年一切諸毒所不能害若諸世界者十方差別不同隨所國土所有衆生者無論何國何生以國土有中邊之別衆生有靈蠢之異故隨國所生者無論所生何物但可作書者皆得樺皮此土即有治令薄軟可以作書貝葉西域所出其葉長廣可以寫字紙素謂紙之素者此方抹竹為漿并楮皮桑皮等皆可為之白㲲謂氎之白者夜摩氎華如絲并高昌氎子等皆可為之夜摩㲲華如絲者夜摩即劫波羅天彼有㲲華如絲可以紡織前云此寶㲲華緝績成巾高昌㲲子者灌頂云高昌國有草實如繭其中絲如細纑名曰㲲子國人取織為細毛布柔軟白淨書寫此呪者即用上樺皮等物貯於香囊者摺令齊整以香囊盛貯取便於帶持也是人心昏者賦性暗鈍未能誦憶者無聞持力或帶身上者佩於胸前若在下身者得罪或書宅中者不必樺皮等物石壁粉牆隨便皆可但不宜在卑穢之處當知是人者即身佩宅書之人盡其生年者謂從生至死一切諸毒有內有外內則觸目驚心貪瞋癡等漸化外則因呪威靈蛇蝮蠍等遠遁故曰所不能害遠魔除毒竟二成智免害二一世間賴以成智二末世賴以免害初阿難我今為汝更説此呪救護世間得大無畏成就衆生出世間智如上所説不盡呪益故許為更説救護者救內障護外障也言世間衆生欲求出世內為煩惱所侵外為魔鬼所擾恆生畏懼難可成就由呪力故內救煩惱外護魔鬼魔鬼不擾故能令其得大無畏煩惱不侵故能成就出世間智二末世賴以免害二一別明免害二總出其由初若我滅後末世衆生有能自誦若教他誦當知如是誦持衆生火不能燒水不能溺大毒小毒所不能害如是乃至天籠鬼神精祇魔魅所有惡呪皆不能著心得正受一切呪詛厭蠱毒藥金毒銀毒草木蟲蛇萬物毒氣入此人口成甘露味一切惡星并諸鬼神磣心毒人於如是人不能起惡初能免災毒滅後則衆生無依末世則修行多障欲免自障習此心呪故曰有能自誦為銷他障傳此心呪故曰若教他誦如是誦持衆生即指自誦他誦者言火有二種一內火從心而發如欲火等二外火從緣而起如天火等內外相感輕而房舍焚燒重則身首焦爛甚至劫火洞然初禪俱壞如此皆以呪力能免故曰火不能燒水不能溺例此可知大毒如瘟疫流行小毒如蛇蠍觸螫如此皆以呪力能回故曰所不能害如是下能免惡呪天龍鬼神義攝八部中前六以夜叉名鬼二樂神一蟒神皆以神稱故得天之靈曰精得地之靈曰祇專為障道曰魔一於惑人曰魅此等皆能為呪用呪害人故以惡名一遇呪心如湯銷冰故曰所不能著如登伽梵呪可知心得下能免雜毒持此心呪持至能所雙忘不受諸受名為心得正受呪詛厭蠱毒藥者謂呪咀厭蠱呪咀毒藥厭蠱者尸毒也漢書云厭殺四百餘家毒藥者物毒也廣志云鴆毛瀝酒沾唇即死據此則厭蠱毒藥皆能害人加以惡呪咀禱則百發百中矣金毒銀毒者金銀經火瀝水飲之皆能毒人草木蟲蛇者略舉四毒餘以萬物毒氣該之入此人口成甘露味者以心得正受毒氣不能入故一切下能免陰損惡星者凶耀為殃鬼神者邪靈作祟磣人者包藏禍心此等皆人所不覺陰受其損由呪力故轉禍為福故云不能起惡二總出其由頻那夜迦諸惡鬼王并其眷屬皆領深恩常加守護頻那夜迦略舉二使者名諸惡鬼王管領諸惡鬼者并其眷屬者謂鬼王所在鬼衆隨之皆領深恩者謂素蒙佛化領佛深恩為報佛恩故於是呪常加守護以是呪即佛心故然人但知呪能免害而不知所以能免害者又賴有此等守護故特為標而出之總結成智免害竟三資發通明三一聖眷隨侍二以劣況勝三正明資發初阿難當知是呪常有八萬四千那由他恆河沙俱胝金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜隨侍呪是佛心呪在即是佛在故常有聖眷隨侍那由他此云萬億俱胝此云百億言菩薩之數俱胝不足以盡復以恆沙計之恆沙俱胝不足以盡復以那由他計之那由他恆沙俱胝不足以盡復以八萬四千計之極言其數之多也菩薩名金剛藏王者現奮怒之形具降魔之力名曰金剛蘊祕密之德攝金剛之衆故稱藏王種族者如許菩薩皆同一種類同一族姓也諸金剛衆即所統護法之衆如火頭金剛青面金剛之類而為眷屬者聽其驅使晝夜隨侍者常加守護呪且如是況復持人自應蒙護可知二以劣況勝設有衆生於散亂心非三摩地心憶口持是金剛王常隨從彼諸善男子何況決定菩提心者初舉能況散亂心者謂忽此忽彼屬不定聚非三摩地者謂盲修瞎煉屬邪定聚心憶者偶爾心憶以不定非常憶故口持者泛然口持以邪定非心持故既非常憶心持而金剛藏王常隨從彼者為報佛恩格外施護持故不定邪定通稱善男子者以既能持呪即具善根即有丈夫氣故何況下次明所況決定揀非不定菩提心揀非邪定乃屬正定聚者況意以不定邪定偶憶泛持尚蒙隨從何況入正定聚常憶心持此又不但隨從至下科自見三正明資發此諸金剛菩薩藏王精心陰速發彼神識是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑執金剛杵持祕密藏或稱金剛菩薩或稱菩薩藏王或稱金剛藏王菩薩或稱金剛菩薩藏王或稱金剛王或稱金剛藏無不可也精心者純真之心上與諸佛同一慈力下與衆生同一悲仰故能發彼神識彼字指決定菩提心人能持呪者發謂資發令神識通明也雖神識通明而彼人亦不知其所以蓋是菩薩以純真之心於陰暗中速疾資發故耳是人應時等即通明俱發也正脈云記憶似惟宿命然以過去例於現未決通三世且云周遍了知得無疑惑應兼通明何況沙劫逈超小乘八萬又為菩薩殊勝之通明矣資發通明竟四遠離雜趣從第一劫乃至後身生生不生藥叉羅剎及富單那迦吒富單那鳩槃茶毗舍遮等并諸餓鬼有形無形有想無想如是惡處從第一劫者謂從初發心經第一劫乃至後身者謂直至成佛最後身中生生者謂兩楹中間捨生受生也不生者不生下之雜趣以有通明能先知故藥叉或云夜叉捷疾鬼也羅剎此云可畏食人鬼也富單那此云臭惡鬼主熱病者迦吒富單那此云奇臭惡鬼主熱病之甚者鳩槃茶此云甕形魘魅鬼也毗舍遮或云毗舍闍此云噉精氣以能噉人精氣及五穀精氣故并諸餓鬼即飢虗鬼如大腹臭毛針咽炬口等有形即是有色如後文休咎精明無形即是無色如後文空散銷沈有想者靈通怪變如後文鬼神精靈無想者凝滯堅頑如後文精神化為土木金石如是等類各有自苦遮障聖道故云惡處然既生生不生則聖道可修宜乎其因圓果滿而至最後身矣五常生佛前是善男子若讀若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處此諸衆生縱其自身不作福業十方如來所有功德悉與此人由是得於恆河沙阿僧祇不可説不可説劫常與諸佛同生一處無量功德如惡叉聚同處熏修永無分散初依呪離苦是善男子仍指決定菩提心者不唯不生雜趣若果依此呪即人中不可樂處亦不生故對本為讀背本為誦敬寫為書使書為寫身佩名帶器貯名藏諸色供養如香華燈燭之類不生貧窮下賤不可樂處者必生富而且貴可樂處也此諸下仗佛成德恐有問云雖依呪力不作福業云何便生樂處故此釋云此諸衆生縱不作福無妨得生樂處以十方如來所有功德悉與此人故言悉與此人者以此呪即是佛心不離此呪即是不離佛心諸佛即心功德時時在己也由是下得生佛前由是等者謂由是佛德悉與之故不惟得生樂處且得於恆沙僧祇不可説不可説劫與佛同生一處所謂常在佛前是也既常在佛前又常依此呪則佛德呪德即同己德故云無量功德如惡叉聚以惡義聚果三顆一蒂不相分離喻佛德呪德無量功德同己德故末二句釋成言佛德呪德所以同於己德者以同處熏修永無分散既永無分散則常依佛德呪德熏煉修習以成己德所謂如惡叉聚者信矣六能成衆行是故能令破戒之人戒根清淨未得戒者令其得戒未精進者令得精進無智慧者令得智慧不清淨者速得清淨不持齋戒自成齋戒承上神呪以有如是利益是故能令成就衆行破戒之人如阿難八萬行中秪毀一戒戒根清淨者如阿難心清淨故尚未淪溺未得戒者如登伽宿為淫女令其得戒者如登伽今為性尼未精進者如阿難專好多聞登伽偏於淫愛令得精進者如阿難殷勤請定登伽成精進林無智慧者如登伽纏眠貪愛不知為苦令得智慧者如登伽與羅睺母同悟宿因不清淨者如登伽未蒙呪前欲𦦨飛揚速得清淨者如登伽已蒙呪後淫心頓歇齋戒謂八關齋戒與上五勝劣懸殊以彼況此不持自成可知七滅罪除障二一滅現在罪二除過去障初三一輕重俱銷二極輕同無三極重亦滅初阿難是善男子持此呪時設犯禁戒於未受時持呪之後衆破戒罪無問輕重一時銷滅持此呪時自應嚴持禁戒以佛有明誨故設犯禁戒於未受持時乃屬往𠍴既能持呪自新固應於前衆破戒罪一時銷滅羯磨云前心作惡如雲覆日後心起善似炬銷暗既云似炬銷暗乃何罪不滅故無問重輕也重謂小乘初篇大乘十重輕謂小乘餘篇大乘四十八種輕垢二極輕同無縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過設著不淨破弊衣服一行一住悉同清淨縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德無有異也初辛酒無過酒有多失經論俱載食噉五辛三漸所呵種種不淨者如肉中除三種五種之外餘皆不淨不應食噉今云縱經等者蓋指未持呪前既已持呪則已往不咎故諸佛乃至鬼神等不將為過若臨持正持之時猶故恣意食噉則天仙嫌其臭穢善神不來守護況復諸佛菩薩聖鑑在茲豈得無過勿錯會也此中金剛天仙鬼神皆指有願護呪者言設著下違教無罪準前文佛教著新淨衣然香誦呪又教六時行道三七不寐今云設著不淨破弊衣服又云一行一住然既云不淨則不局於淨衣既云破弊則不局於新衣既云一行則不局於六時既云一住則不局於三七蓋為清貧不備煩務難脫者恐其失於誦呪利益故開許雖違佛教悉同清淨謂悉同遵教者一樣清淨也雖然也須自知違教深淨其心若故意為此則不可耳縱不下越軌無罪準前文如法建壇依場行道方合如來清淨軌則今云縱不作壇等者亦為無力作壇無緣入場不暇行道者恐失呪益故縱許隨便誦持越軌無過言還同等即無過也設若有力有緣能暇者仍以建壇入場行道為是幸勿以變為常有失大益三極重亦滅若造五逆無間重罪及諸比丘比丘尼四棄八棄誦此呪已如是重業猶如猛風吹散沙聚悉皆滅除更無毫髮五逆者一弒父二弒母三弒阿羅漢四破和合僧五出佛身血造此五逆當墮無間罪之重者無越於斯故云無間重罪比丘四棄即淫殺盜妄四波羅夷也梵語波羅夷此云棄謂犯此者永棄佛法邊外清淨僧中不共住故比丘尼八棄者前四棄同上外加觸八覆隨觸謂與染心男子身相觸八謂與染心男子捉手捉衣入屏處共坐共語共行相倚相期覆謂覆他重罪隨謂隨彼被舉大僧供給衣服飲食等皆初篇極重故云如是重業若自知慚愧誦呪求懺以呪力故應念銷滅故云猶如猛風吹散沙聚言沙已成聚則微風莫吹風以猛稱喻呪具神力以呪力而銷重罪無罪不銷如以猛風而吹沙聚無聚不散故云悉皆滅除更無毫髮滅現在罪竟二除過去障阿難若有衆生從無量無數劫來所有一切輕重罪障從前世來未及懺悔若能讀誦書寫此呪身上帶持若安住處莊宅園館如是積業猶湯銷雪不久皆得悟無生忍初曩罪未懺無量無數等顯造非一世一切輕重等顯罪非一端有礙勝進故名為障從前世來未及懺悔必能遮障正修縱修三摩亦不得成要須呪銷若能下以呪得銷自覺宿世有障極力受持故曰能讀能誦欲其起坐不忘故書寫帶持取以觸目驚心故安住莊園莊謂莊宅謂常時安居處也園謂園館謂一時遊幸處也如是積業即指無量無數劫來積集輕重罪障猶湯銷雪喻其銷之疾故前云猶湯銷冰猶待少時雪則不爾但遇湯即化故甚疾也不久下速得無生宿障既銷三摩得成故云不久得忍準前即是俱空不生按後乃當第三漸次且不可作八地釋之總上滅罪除障竟八有求皆遂復次阿難若有女人未生男女欲求孕者若能至心憶念斯呪或能身上帶此悉怛多般怛囉者便生福德智慧男女求長命者即得長命欲求果報速圓滿者速得圓滿身命色力亦復如是命終之後隨願往生十方國土必定不生邊地下賤何況雜形女人不生年老無依且現為夫主所棄旁人所笑餘婦所輕故凡未生男女者莫不求孕孕謂懷其胎也若能至心憶念斯呪固應遂求設或智識暗鈍不能憶念即能身上帶此悉怛多般怛囉者亦同憶念功德故曰便生福德智慧男女男女有福有德者富而仁有智有慧者聰而賢此遂男女求也欲求長命者上自天子下至庶人無不皆然以愛生惡死人之常情故即得長命者由呪力故得延天年亦以至心持呪清心寡欲不致夭折此遂長命求也欲求果報者謂廣行惠施以求福樂更望其現前即得故曰速圓速得圓滿者福業既勝又復濟以呪力不待當來一切現成此遂福樂求也身命色力亦約有求者言謂雖有身命若無色力動轉施為常不如意故強健亦有求者亦復如是例前能遂可知此遂強健求也大悲經云誦持大悲神呪於現在生中一切所求若不果遂者不得為大悲心陀羅尼也今呪如是理應不虗命終之後者前陰已壞後陰未成時也隨願往生十方國土者言十方國土有淨有穢生前持呪願生淨國命後以持呪力即得隨願往生不惟隨願往生且生中國貴族故云必定不生邊地下賤邊地下賤尚且不生何況地獄餓鬼等雜形異報自應不墮其中此遂往生求也大悲經云誦持大悲神呪若不生諸佛國者我誓不成正覺蓋彼兼菩薩願力此兼諸佛心力以此呪是諸佛心印持此呪者必為佛護念故總結別明利賴竟二總顯益普三一諸難銷除二兆民豐樂三惡星不現初阿難若諸國土州縣聚落飢荒疫癘或復刀兵賊難鬬諍兼餘一切厄難之地寫比神呪安城四門并諸支提或脫闍上令其國土所有衆生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地一切災厄悉皆銷滅初總舉難地國土者州縣之總統州縣者國土之分治聚落者市聚村落此又為州縣所轄也飢荒者室如懸磬野無青草即飢饉難疫癘者四時不正瘟災流行即疾疫難刀兵者邊疆不靜賊難者家國不寧鬬諍者羣小為亂皆刀兵難也餘難者如旱潦不均風雹時至等凡有損於衆生者皆是寫此下教令安供寫呪安於四門者取衆所往來觸目皆蒙利益又取百靈呵護一切災難惡事不能入故支提此云可供養處雜心論云有舍利名塔無舍利名支提據此則支提者如經塔呪塔之類脫闍翻幢如尊勝幢陀羅尼幢之類熏聞訓闍作都爾雅謂之臺脫者積土脫落也今不取彼者以是梵音故此等又衆所瞻仰處也令其國土所有衆生奉迎斯呪等者以雖安城門及支提脫闍又恐有終身不入城市畢世不禮塔寺者彼又何能聞見及與瞻仰是須逼以國威令舉國奉迎禮敬供養又令各各身佩各各自安所居宅地一切下許以全銷一切災厄總指如上所説飢荒疫癘等也此等所以出於其地者皆由其地衆生十惡不善所致今以安供此呪漸知改惡遷善信受奉持自感天龍福祐化災厄而為吉祥故云悉皆銷滅二兆民豐樂阿難在在處處國土衆生隨有此呪天龍歡喜風雨順時五穀豐殷兆庶安樂在在處處國土衆生者謂無論何在何處凡有國土有衆生者皆宜有呪良以隨有此呪處天龍即歡喜故又雖曰隨有此呪亦必信受奉持方感天龍歡喜設若不生信受而輕賤穢污尚致天龍震怒何歡喜之有哉風雨順時者宜雨則雨宜風則風無過不及故五穀者黍菽麻麥稻也豐殷者豐盛殷厚謂所收之多故庶衆也儒典以民為庶今云兆庶者極顯其多故非局定十億為兆如曰百姓曰萬民皆此類也安樂者謂各安其業樂其所無事故三惡星不現二一略標二詳釋初亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢一切惡星如下科説能鎮者謂能鎮壓惡星不現變怪相故反常曰變異餘曰怪如前云彗孛飛流是也而云隨方者謂隨其所感之方而現蓋以人事作於下天道應乎上故然變怪既已不興災障自然不起災不起則各終天年故曰人無橫夭障不起則相安無事故曰杻械枷鎖不著其身晝夜安眠無有惡夢者謂災障既無難刑不加自然臥安覺安夢想亦安矣二詳釋阿難是娑婆界有八萬四千災變惡星二十八大惡星而為上首復有八大惡星以為其主作種種形出現世時能生衆生種種災異有此呪地悉皆銷滅十二由旬成結界地諸惡災祥永不能入特標娑婆界者以是穢土顯淨土無惡星故八萬四千者應衆生塵勞之數惡不自惡因災而變故云災變惡星若衆生能轉災為福則變為善星矣二十八大惡星者統約四方論之佛經世典大同小異大同者名數皆同小異者位置交錯如東方七星依孔謂昴畢觜參井鬼柳而世典則角亢氐房心尾箕也南方七星依孔謂星張翼軫角亢氐而世典則井鬼柳星張翼軫也西方七星依孔謂房心尾箕斗牛女而世典則奎婁胃昂畢參觜也北方七星依孔謂虗危室壁婁奎胃而世典則斗牛女虗危室壁也或孔約災變而世典約常度言天下無故則四方四七各住自位若災難將起則四方四七遞互交錯而言為上首者謂能總統八萬四千以是大惡星故復有八大惡星者長水謂是金木水火土羅睺計都彗而言為其主者以此八大惡星又為二十八大惡星之主故據此則八星為主二十八星為帥八萬四千星為軍衆上列天象下應人事順則福應逆則災應故曰作種種形所謂惠迪吉從逆凶也問既順則福應逆則災應何直以惡星名之答此單約災變説故出現世時能生災異者如天文書云熒𤉹舍命國為飢饉刀兵七宿黃兵大起一星亡則兵喪消災經云或被五星陵逼之時作諸災難若太白火星入於南斗於國於家及分野處作諸障難等是也有此呪地悉皆銷滅者以衆生信受供養能轉災為福故十二由旬者大論云由旬有三大者八十里十二由旬合九百六十里中者六十里合七百二十里小者四十里合四百八十里成結界地者百靈訶護指界相約不容有犯故祥兆也不取吉祥之義永不能入者謂不能入其境也總顯益普竟三承益勸信二一承前示益二勸信作證初是故如來宣示此呪於未來世保護初學諸修行者入三摩提身心泰然得大安隱更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害承上神呪有如是益是故如來宣示此呪不言於現在世而言於未來世者以佛在世時魔不得便衆生障輕故不言保護深修而言保護初學者以深修有力除魔有力斷障故不言散位而言入三摩提者以散位尚在魔屬有障不覺故身心泰然者表裏舒暢內外解脫得大安隱者實住正受非世受用更無一切等者以呪力保護也諸魔鬼神如後陰魔中説冤橫宿殃者謂冤對橫禍之宿殃舊業陳債者謂陳舊未了之業債無始相隨惱害身心三摩不成衆苦常侵今既更無宜乎其身心泰然得大安隱矣二勸信作證汝及衆中諸有學人及未來世諸修行者依我壇場如法持戒所受戒生逢清淨僧持此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語初勸信未來尚資保護現在益當信受故統言汝及諸有學人及未來諸修行者自下正脈明不犯四過一壇差二戒缺三師穢四疑悔犯一則唯種遠因難以現生取證故知前之開許乃方便非常法也愚謂四過之中疑悔為本設真能信而不疑持而不悔自不肯蹈於前過目為勸信者以此是善下作證不蹈四過名善男子於此父母生身即指現前之身不待當來也吳興曰心通者據前不出三義一者證果即端坐百日有利根者不起於座得須陀洹二者發解謂縱其身心聖果未成決定自知成佛不謬三者宿命是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑愚謂心通者即是心地開通言果能如上所説不犯四過自然心地開通設或自力未充亦必蒙佛現助如前略示中云我自現身至其人前摩頂安慰令其開悟是也不得如是則十方如來為妄語者以佛無異説我説既妄諸佛亦應為妄乃反言以決其必得以諸佛無妄我亦無妄故也如來説呪顯益竟三會衆發願護持問呪自有力何勞人護耶答帝王非不有力出巡必仗軍威神呪固自有力流通亦須人護要知人護者即神呪之功軍威者正帝王之力法喻分明可思正脈亦有問答不録二一外衆願護二內衆願護初五一金剛力士衆二兩天統尊衆三八部統尊衆四照臨主宰衆五地祇天神衆初説是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所説我當誠心保護如是修菩提者金剛者力士之稱且就迹言不同後之金剛藏王以彼現是菩薩身故如佛所説者謂審如佛説神呪有如是益也既有如是利益設有依如是呪而修菩提者理應保護故云我當誠心等以自任也二兩天統尊衆爾時梵王并天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願梵王為色界統尊帝釋四王為欲界統尊審有者果其有也如是遵式持呪修學菩提即是純善之人故曰我當盡心至誠保護一生如願者謂即於現身圓滿菩提所謂不歷僧祗獲法身也正脈云此入理悉檀若謂令其所作事事如願亦攝餘三悉檀三八部統尊衆復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿曰大將曰王曰帥皆總統尊勝義也見賢思齊故亦誓願護持令菩提心等亦一生如願之義四照臨主宰衆復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏日月為照耀世界之主風雲雷雨為臨蒞衆生之宰師法也言風雲雷雨各有其法若善用其法者則謂之師惟電稱伯者伯長也以其率四部之先故年歲巡官謂值年押歲巡察善惡如十二宮神九曜星官之類正脈謂是四直功曹亦無不可但四直功曹似是傳遞文表之神非巡官也諸星眷屬者對上年歲巡官而言以彼為星主此為星眷故亦於會中等者乃禮佛發願之語保護有二一顯護謂現相護持二密護謂運力保守是修行人指正修反聞兼能持呪者言魔鬼不敢入界妖邪無能攖敵故令安立道場得無所畏五地祇天神衆復有無量山神海神一切土地水陸空行萬物精祇并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事山神者主山之神海神者主海之神土地者主地之神水行謂水中行者陸行謂陸中行者空行謂空中行者三行中攝物最多故云萬物萬物中有得天地之精而為地祇之神者故曰精祇如水神火神藥草樹林苗稼神等風神王即主風神也以上屬欲界無色界天即四空天也不言色界者以上下既有中間可知故同時稽首者或云無色無形憑何稽首灌頂云但無粗色非無細色如涅槃云非想等天若無色者云何得有去來進止阿含云舍利弗滅無色天淚下如雨細是皆顯其無粗色有細色也故中陰經亦云無色界天禮拜世尊則今之稽首無足為異白佛即是發願保護同上上云安立道場得無所畏此云得成菩提永無魔事蓋安立道場原為求成菩提得無所畏正以無諸魔事是前後義同惟略變其詞耳外衆願護竟二內衆願護上惟據迹未彰菩薩之號故稱外衆今乃約本特顯護法之用故稱內衆三一敘儀總標二別明護持三摧邪扶正初爾時八萬四千那由他恆河沙俱胝金剛藏王菩薩在大衆中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩提正修行者菩薩名數俱如前釋在會起禮白佛者對衆發願也如我等輩者自指一類菩薩所修功業久成菩提者顯早已當取涅槃不取涅槃者乃發願仍為菩薩常隨此呪者呪所在處常相隨逐救護末世者盡未來際不忘護持修三摩提者指修習圓通之人修習圓通必先持戒誦呪如教而行即是正修行者顯非此不足以致護也二別明護持世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒衆常當隨從侍衛此人如是修心等者謂如佛所教持戒誦呪修三摩提以求正定人也既求正定則若在道場靜坐或於餘處經行皆不離誦呪及於反聞此是正定聚者乃至散心者謂欲求正定不能攝心唯以散心誦呪此是不定聚者遊戲聚落者謂欲求正定不知攝心妄謂動中取靜此是邪定聚者我等徒衆者指所統眷屬如前云一一菩薩皆有諸金剛衆而為眷屬是也又前云設有衆生於散亂心不定聚非三摩地邪定聚心憶口持是金剛王常隨從彼何況決定菩提心者正定聚此云常當隨從侍衛此人蓋前是以劣況勝此則直言俱護耳三摧邪扶正縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外除彼發心樂修禪者世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恆令此人所作如願初魔鬼不犯魔王者欲頂魔天大自在者色頂摩醯首羅彼戀塵勞此欲出離設法惱亂令不得成故曰求其方便如起信云或現天像菩薩像亦作如來像若説陀羅尼若説六度等乃至或令得通起辨或令起惑造業或令據定得禪或令食差顏變等是也而言終不可得者以有菩薩救護徒衆侍衛禁令所在無敢犯故諸小鬼神或指魔民魔女下文所謂若魔眷屬是也前云有此呪地十二由旬成結界地今云去此善人十由旬外蓋不至二十皆可言十之外故除彼下開許隨修言諸魔鬼神亦有發菩提心樂修禪者為隨行人倣效修習不在禁約之例故開除也世尊下違禁必摧如是惡魔即指上之二天惱亂行人故以惡魔稱之若魔眷屬即指諸小鬼神與魔為侶故以魔眷稱之欲來侵擾者故違禁令寶杵碎首者罪不容誅正脈云殞壞也寶杵擬之即碎如塵者極言其碎之至故問菩薩以慈悲為本十重以殺戒為先況復四種明晦言猶在耳遽發是願應為佛訶若果杵碎其首犯殺違慈其如菩薩行何答如父母之於兒女笑罵皆為教道菩薩之於衆生折攝俱屬拔濟故孤山云若涅槃殺闡提仙預誅淨行皆由住無緣慈得一子地乃能如是是知此之杵碎其首本無瞋怒下之恆令如願亦非喜愛必以如是之人乃可發如是願如來不訶非為無故幸勿以大鵬比鷃也恆令下扶正直成從因至果時時護持故曰恆令此人凡有修為永絶障難故得所作如願此上屬道場加行自阿難喻屋求門以來至此説法復為一周名選根示儀周即阿難所請三摩提也按常途三摩提翻為等至以銷幻為義今經因阿難喻屋求門而如來開示從根解結當於結心結心者不墮有為不住無為平等任持期至勝定即等至義也六結既解三空頓朗即銷幻義也圓覺疏釋為起幻銷塵今經耳門稱為如幻三摩提起幻也始而入流亡所動靜不生繼而聞所聞盡覺所覺空究極而至於生滅既滅寂滅現前皆銷塵義也正脈云全取正因佛性略兼緣因而為三摩提體今以耳根真聞即是正因佛性雖本自具足而開顯要資解結工夫即略兼緣因義也題中修證了義義統乎此問此處既為三摩盡處何無解悟之人答三摩章中選根直入是其正義故於文殊揀選之後會衆獲益詳敘四等至於道場加行不過遠為末世懸示修習軌則而已何勞又敘解悟然此處亦有增益意略見於下科之首齊此以前為開示三摩成解分竟三開示禪那成修分三一正示禪那諸位二略彰所説圓滿三會衆頓悟漸證初二一阿難謝教請位二如來對辨染淨初二一謝教述益二請位佇示初阿難即從座起頂禮佛足而白佛言我輩愚鈍好為多聞於諸漏心未求出離蒙佛慈誨得正熏修身心快然獲大饒益既悟圓通本根又聞修習儀軌欲謝佛恩故座起頂禮而白溺於多聞曰愚遲於盡漏曰鈍正由溺於多聞故一向偏好觀好為二字故知雖悟圓通本根依然聞病未除也正由遲於盡漏故曾未求離觀未求二字故知不聞修習儀軌終是漏心不出也蒙佛慈誨者既悟本根又蒙佛慈誨之以修習儀軌自是持戒誦呪建壇行道一一如法故云得正熏修以行濟聞自覺漏心可出故曰身心快然無上菩提自覺有日可證故曰獲大饒益二請位佇示世尊如是修證佛三摩提未到涅槃云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩作是語已五體投地大衆一心佇佛慈音瞪瞢瞻仰初承上結定言我之所以身心快然獲大饒益者正以如是修證為佛三摩提以諸佛初修不離此故未到下正請位次三摩雖成但得因心去佛菩提尚在遙遠故云未到涅槃既未到涅槃中間不無位次故問云何名為乾慧之地四十四心乾慧即第一位四十四心即十信十住十行十向四加也然入道多岐邪正須辨故問至何漸次得修行目修行目即辨道眼也又以四加之後即當十地但地地斷障地地證真各有方所分齊不相越踰故問詣何方所名入初地乃至詣何方所名入十地之中又以十地之後即當等覺然既等於覺即當是佛而乃名為菩薩應有差別故問云何名為等覺菩薩此是阿難隨説隨疑隨疑隨問故前後略有錯落以致古德謂有錯簡欲將至何二句移於三摩提下愚不敢也作是下作禮佇示作是語已五體投地者冀佛開示故大衆一心佇佛慈音者舉會同願故瞪瞢瞻仰者佇之殷望之切也阿難謝教請位竟二如來對辨染淨二一總標二別示初二一讚問誡許二誠聽標示初爾時世尊讚阿難言善哉善哉汝等乃能普為大衆及諸末世一切衆生修三摩提求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝説初讚善述意當場一問利及現未故重言善哉以讚美之一切衆生雖兼六道而下云修三摩提且指善道以惡道業重不能熏修故修三摩提即指耳根圓通然耳根圓通若唯訖於聞所聞盡則是小乘如前云此根初解先得人空是也若乃盡聞不住覺所覺空究極而至於寂滅現前則是大乘今約盡聞不住者言故云求大乘者從於凡夫者始自三漸以三漸次位論事修猶在凡夫地故終大涅槃者究至妙覺以妙覺位中論所證方稱大涅槃故中間五十六位理事雙融皆為正修行路位位皆該通果海故通稱無上未及到者預令知有故目為懸示要知阿難但是致問不合言示而如來讚以懸示者以因問而示問之者正所以示之也問到者自知何勞懸示答此有三意一者位位有岐恐蹈邪途預令辨識故如後云作是觀者名為正觀若他觀者名為邪觀可知此意二者得少為足恐墮小乘預示極證故如後云如是重重單復十二方盡妙覺成無上道可知此意三者妄擬高遠恐墮狂浮預示漸修故如後云奢摩他中用諸如來毗婆舍那清淨修證漸次深入可知此意汝今下誡聽許説可知二誠聽標示阿難大衆合掌刳心默然受教佛言阿難當知妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃二轉依號初大衆誠聽合掌刳心默然受教者謂端秉虔誠刳剔妄念以虗淨其心默然無語以神受其教蓋以位證難思理路絶言不可以妄心求不可以語言接故佛言下如來標示欲明諸位真源及類生妄本故教以當知蓋深警之也妙性即是真源以性本自妙故至下滅妄即名為真圓明即是妄本以明本自圓故至下生滅即名為妄離諸名相本無界生者約未涉染淨時言以未涉染淨時諸位名相十類衆生俱不可得故因妄有生者謂既本無生生云何有乃因一念妄動展轉而有衆生生焉生無常生因有生故展轉而有衆生滅焉生非真生滅非真滅故生滅俱名為妄此約真性隨染以明類生為妄有故滅妄名真者從乾慧地四十四心位位斷妄乃至十地等覺滅盡諸妄妙覺位中名為真實由真實故是稱如來無上菩提及大涅槃蓋菩提智果轉衆生所依煩惱得名涅槃斷果轉衆生所依生死得名故曰二轉依號此約真性隨淨以明諸位為真現故總標竟二別示二一依真起妄成類生二滅妄明真成諸位初三一牒欲教識二倒二分門徵起釋成三漸次以成類生初阿難汝今欲修真三摩地直詣如來大涅槃者先當識此衆生世界二顛倒因顛倒不生斯則如來真三摩地初牒其所欲觀其請示道場是欲修真三摩地觀其請示修位是欲得佛大涅槃言直詣者謂預識邪正中間自無諸委曲相故先當下教識二倒衆生即是類生世界即是所依此二皆為顛倒以本無妄有故然有不自有必有所因所謂一念妄動是也教以先識者以既識其因則當下離念顛倒不生故顛倒不生生界俱寂故為真三摩地若於此從性起修自可以上歷諸位直詣大涅槃也二分門徵起釋成二一徵釋衆生顛倒二徵釋世界顛倒初三一承前徵起二詳釋其相三總結顛倒初阿難云何名為衆生顛倒欲釋顛倒之相故先徵起二詳釋其相三一從真起妄二迷本難復三成業感果初阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸衆生性明心者性覺妙明心也性覺妙明之心由來無欠無缺故名為圓此上乃所依之真自下皆所起之妄言既無欠無缺本自圓滿無容更加妄明故曰因明發性謂因衆生不知本圓起念欲明性體殊不知只此一念便是無明由斯真妄和合發起業識之性所謂業相是也性妄見生者謂由業性動故有妄見生所謂轉相是也從畢竟無成究竟有者謂由妄見故遂於業相中有境界妄現所謂現相是也自是見相角立能所宛然故云從畢竟無成究竟有此有所有者此中轉相為能有現相為所有轉相既為能有似是能因能為現相因故現相既為所有似是所因所因轉相有故其實轉相非能因現相非所因以相見皆依自證而起顯惟有業識也然業識是住相無明是生相無明既是生相似為能住能令業相住故業相既為住相似為所住所依無明住故其實能住所住了無根本以二皆虗妄無實顯唯有真心也本此無住者以真心隨緣有無住義故若遡流窮源即是本此無住建立世界及諸衆生若論此科唯明衆生顛倒世界二字但是隨便帶言然必為是窮源之論者顯欲盡生倒須是一念不生以一念不生當下即真心故二迷本難復迷本圓明是生虗妄妄性無體非有所依欲將復真欲真已非真真如性非真求復宛成非相初牒妄無依性覺妙明無欠無缺是曰圓明世界衆生依此建立故名為本初由一念妄動晦此圓明是曰迷也然既迷此本明即是無明由是展轉生起微細虗妄之法所謂業轉現是也此有所有非因所因住所住相了無根本故曰妄性無體非有所依既非有所依但離念即是所謂一念不生即名為佛是也將欲下復真成非將欲復真者謂將欲起念復真也欲真已非真真如性者謂既欲起念復真則是變相緣如但是似真非真真故既知非真應當離念若必欲求復則決定不是故曰宛成非相三成業感果非生非住非心非法展轉發生生力發明熏以成業同業相感因有感業相滅相生承上所計之真既已成非由此於非生非住非心非法之中展轉發生生相住相心相法相故上云從畢竟無成究竟有也然此中生即無明以無明屬生相故住即業識以業識屬住相故心即見分以見分屬心相故法即相分以相分屬法相故生力發明者謂由上展轉發生之力引起智相相續執取計名等是曰發明謂漸成粗相較前更為顯著以發明即顯著義也熏以成業即起業相謂由上四相熏習能令成造種種業故同業下即業繫苦相同業相感者謂既已成業則有彼此業同者名為同業如世間父母子女究其前因必有所作等流之業乃得彼此相感相感云者謂父母與子女業同感子女以受生應之子女與父母業同感父母以生身應之前文所謂同業相纏者即此因有感業相滅相生者謂因有彼此相感之業故致相滅相生以感業既盡則相滅感業重起則相生故上云從無住本建立世界及衆生也詳釋其相竟三總結顛倒由是故有衆生顛倒承上相滅相生輪轉往復由是於本無衆生中而有衆生相現故以顛倒結之徵釋衆生顛倒竟二徵釋世界顛倒二一承前徵起二略釋其相初阿難云何名為世界顛倒衆生顛倒已經詳釋世界顛倒亦應略明故次徵之二略釋其相是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成是有所有句古德以感業為能有以衆生為所有蓋緊躡上文言之愚謂仍是遠指前文猶言所謂世界顛倒者是因能有見分與所有相分能所相對妄見有彼此方位故曰分段妄生分段謂分齊款段也既有分齊款段則界相分明故曰因此界立非因所因無住所住者如前所釋轉相非能因現相非所因無明非能住業識非所住故既非能因所因能住所住則知但是無常故曰遷流不住既遷流不住則流數歷然故曰因此世成按前衆生顛倒中此下應有總結顛倒之科今不另具者以分釋世界各有隨結之語所謂因此界立因此世成是也分門徵起釋成竟三漸次以成類生三一初成類數二次成輪轉三後成定有初三世四方和合相涉變化衆生成十二類世為遷流界為方位流數有三故曰三世謂過現未來方位有四故曰四方謂東西南北離世則界無所依無界則世不復見相依妄成故曰和合和合則遞互交參故曰相涉以涉者參入義故變化衆生者謂衆生在世界之中自應隨世界變化然世界相涉變化之數略為十二如以世涉方則四方各攝三世變為一十二數若以方涉世則三世各攝四方變數亦然此中衆生若隨方變化者生此生彼形類不同四方則分四類四類之中有過去生有現在生有未來生生生不同一類復分為三則變成十二若隨世變化者已生現生當生形類不同三世則成三類三類之中有南方生有北方生有東方生有西方生生生各異一類復分為四亦成十二此且約隨方隨世變成十二略言形類不同非定成胎卵濕化等也若下之胎卵濕化等又屬惑業招致至下自見二次成輪轉是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉承上類數既分是故因塵成業致有輪轉相也世界者六塵之總相故先言之因動有聲者世之遷流界之更變皆名為動因動故必致鼓吹故曰有聲前云卷聲成耳即在此時因聲有色者既聞其聲必尋其色故曰有色前云結色成眼即在此時因色有香者見色生染自覺有香前云納香成鼻即在此時因香有觸者聞香欲取先起邪覺故曰有觸前云摶觸成身即在此時因觸有味者覺觸生欲口發愛涎故曰有味前云絞味成舌即在此時因味知法者愛味不忘塵影常現故曰知法前云攬法成意即在此時六亂妄想即指六識蓋以根塵相對識生其中其用不定名亂其體無實名妄也妄識既興分別從起生諸煩惱造種種業是為成就業性業性既成隨業感報故云十二區分謂隨彼初成十二類數而區分之是知前之十二類數但隨世界變化至此乃轉成業招矣由此輪轉者以業有遷變報有循環故三後成定有三一承前總標二依類詳明三指數總結初是故世間聲香味觸窮十二變為一旋復乘此輪轉顛倒相故是有世界卵生胎生濕生化生有色無色有想無想若非有色若非無色若非有想若非無想是故世間等者謂以是十二輪轉之故世間六塵亦隨類生轉變如一聲塵類類不同對類變化必至窮十二變乃為一周一周既圓再變則另自首起故云旋復旋復謂周而復始也然必明此六塵變化者以六塵為造業之緣業性為輪轉之因六塵既隨類生變化則類生各依六塵成業此輪轉所以不息而類生所以定有故下文即乘此以總標之乘猶因也輪轉謂十二輪轉顛倒謂依塵成業言雖有輪轉若無顛倒則輪轉可息而類生可盡也是有者謂由顛倒故是乃定有先言世界者是所依故能依中四生為常如前云卵惟想生胎因情有濕以合感化以離應後八為變前云情想合離更相變易但以具緣多少而有差別如灌頂云有色情而合無色情而離依胎而變有想想而合無想想而離依卵而變非有色情離而合非無色情合而離依濕而變非有想想離而合非無想想合而離依化而變此且總標至下乃詳釋其相二依類詳明十二一卵生二胎生三濕生四化生五有色六無色七有想八無想九非有色十非無色十一非有想十二非無想初阿難由因世界虗妄輪回動顛倒故和合氣成八萬四千飛沈亂想如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞初略明世界義該六塵前云聲香味觸窮十二變今對卵生為第一變也由因此變而有虗妄輪回虗妄者即是懸想謂於世界六塵未現前時懸遠想像不真實故輪回者此想不了卵生不息以卵唯想生故也動顛下詳明正脈云想體輕舉名動顛倒謂由動故必至執妄為真故以顛倒名之和合氣者氣指雄雌相交陰陽氣分然此本屬虗妄由顛倒故執為真實與之和合正脈云卵以氣交是也成謂成就八萬四千者和合之中一切煩惱悉具足故雖悉具足皆由想起想心不定忽上忽下故曰飛沈亂想如是故有等者謂由如是取氣成形故有卵羯邏藍以羯邏藍乃胎分初七之相成卵即在此位故流轉國土者即是輪回義也末二句指類飛想為鳥沈想為魚兼二則為龜蛇其類者例攝不盡之屬到處皆有故云充塞二胎生由因世界雜染輪回欲顛倒故和合滋成八萬四千橫豎亂想如是故有胎遏蒲曇流轉國土人畜龍仙其類充塞初略明此中世界六塵對胎生為第二變也由因此變而有雜染輪回雜染者即是妄情謂於世界六塵現在前時虗妄情溺不清淨故輪回者此情不了胎生不息以胎因情有故也欲顛下詳明正脈云情生於愛名欲顛倒謂由欲故必至執妄為真故亦以顛倒名之和合滋者滋謂父精母血交相滋潤此亦虗妄由顛倒故執為真實與之和合正脈云胎以精交是也成就八萬四千者和合之中煩惱具故雖煩惱具皆由情起情心不定忽橫忽豎故曰橫豎亂想如是故有等者謂由如是取滋成形故有胎遏蒲曇以遏蒲曇乃胎分二七之相定胎即在此位故末二句指類豎想為人橫想為畜兼二則為龍仙以龍仙變化可橫可豎故也三濕生由因世界執著輪回趣顛倒故和合暖成八萬四千翻覆亂想如是故有濕相蔽尸流轉國土含蠢蠕動其類充塞初略明此中界塵對濕生為第三變也由因此變而有執著輪回執著者即是附合謂於世界六塵新潤境上附近就合不捨離故輪回者合心不忘濕生不斷以濕以合感故也趣顛下詳明合塵名趣背覺名倒和合暖者暖指濕物相比交相暖發此亦虗妄由顛倒故執為真實附托其中名和合也成就八萬四千者和合之中煩惱具故合心不定時仰時覆故曰翻覆亂想翻仰上覆俯下也如是故有等者謂由如是合暖成形故有濕相蔽尸以蔽尸乃濕生初相不由母腹故無前之二相末二句指類覆為含蠢其性無知故翻為蠕動其形不寧故餘可知四化生由因世界變易輪回假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南流轉國土轉蛻飛行其類充塞初略明此中界塵對化生為第四變也由因此變而有變易輪回變易者即是輕離謂於世界六塵舊所依境輕遽捨離心不恆故輪回者離心不革化生不替以化以離應故也假顛下詳明離非真離名假自以為真名倒觸即新境現前觸對舊境也新境亦是虗妄由顛倒故執為真實易志於上名為和合成就八萬四千者亦由和合具惱雖曰具惱不出離心離心不定恐粘恐阻粘謂粘舊不脫阻謂阻新難就故曰新故亂想如是故有等者謂由如是合觸成形故有化相羯南以羯南即是化生初相謂新質已成始脫故殼無蔽尸相故末二句指類故想得脫故轉蛻新想得就故飛行蛻即脫也蟬脫則飛蛇脫則行餘可類推五有色灌頂云有色情而合由因世界留礙輪回障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞初略明此中界塵對有色為第五變也由因此變而有留礙輪回留礙者謂於世界六塵情愛附合於己欲留於他生礙故輪回者情合不除有色不斷以色以情感有以合致故也障顛下詳明於他生礙名障於己欲留名倒著即顯著之處有色可見故有色可見即屬虗妄由顛倒故執為真實附托於上名曰和合和合之中具足煩惱故成八萬四千總以愛精著耀心緒靡停故曰精耀亂想如是故有等者謂由如是合著成形故有色相羯南然色相名羯南者以有色初生皆就故有顯著之物故亦無前蔽尸等相末二句指類休咎精明者謂托彼精明示現休咎如天上星宿之類又世有報吉凶神往往假託靈物亦此類攝涅槃云八十神皆由留礙想元成此精耀足可證此六無色灌頂云無色情而離由因世界銷散輪回惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散銷沈其類充塞初略明此中界塵對無色為第六變也由因此變而有銷散輪回銷散者謂於世界六塵愛寂厭有然愛寂欲銷亦屬於情厭有欲散亦屬於離情離不化無色不休故曰輪回以色因情感無由離致故也惑顛下詳明愛寂厭有名惑欲銷欲散名倒暗謂晦昧不明處也晦昧不明猶為虗妄由顛倒故執為真實趣逐於上名為和合和合之中具足煩惱故成八萬四千總以就陰欲隱情離紛然故曰陰隱亂想如是故有等者謂由如是合暗成形故有無色羯南然既是無色而仍稱羯南者以雖無明顯之色而有幽暗之色但以凡眼不見名無非真無也末二句指類陰想故為空為銷如主空神類隱想故為沈為散如滯魄鬼類七有想灌頂云有想想而合由因世界罔象輪回影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞初略明此中界塵對有想為第七變也由因此變而有罔象輪回罔象者謂於世界六塵懸想欲合蓋以懸想不真名罔欲合似有名象故輪回者想合無休有想無已以想以懸想為因有以附合成感故也影顛下詳明不真似有名影懸想欲合名倒憶謂向所憶念境也向所憶念亦屬虗妄由顛倒故執為真實神遊於上名為和合和合之中具足煩惱故成八萬四千總以潛神勝迹結氣靈蹤為憶為念故云潛結亂想如是故有等者謂由如是合憶成形故有想相羯南然想相稱羯南者以有想初生皆就故有勝迹靈蹤自應無有蔽尸等相末二句指類潛想故為鬼神如山林土地城隍川嶽諸鬼神類結想故為精靈如山精海精風精河精土精諸精靈類八無想灌頂云無想想而離由因世界愚鈍輪回癡顛倒故和合頑成八萬四千枯稿亂想如是故有無想羯南流轉國土精神化為土木金石其類充塞初略明此中界塵對無想為第八變也由因此變而有愚鈍輪回愚鈍者謂於世界六塵久想固離蓋以久想不化名愚固離不回名鈍故輪回者想離不化無想難出以想以久想成因無以固離成感故也癡顛下詳明久想固離名癡不化不回名倒頑謂無知之物無知之物定屬虗妄由顛倒故執為真實凝滯於上名為和合和合之中具足煩惱故成八萬四千總以久想不得心思灰泯故云枯稿亂想如是故有等者謂由如是合頑成形故有無想羯南然無想亦稱羯南者以既屬合頑初相即堅徑故末二句指類精化土木神為金石如華表生精望夫成山之類九非有色灌頂云非有色情離而合由因世界相待輪回偽顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞初略明此中界塵對非有色為第九變也由因此變而有相待輪回相待者謂於諸界塵情愛而不自任合常欲假他以成己欲故曰相待待心不息非有色報靡停故曰輪回偽顛下詳明待他諱己詭詐居心名偽顛倒染即情所愛境情所愛境本屬虗妄由顛倒故執為真實陽離陰待名為和合和合具惱故成八萬四千總以因勢依人心思待成故曰因依亂想如是故有等者謂由如是合染成形故有非有色相成色羯南言非有色者非是真有雖非真有却能假他成體待物有用故曰成色羯南末三句指類溫陵曰水母以水沫為體假他成體也以蝦為目待物有用也本非有色待物成色不能自用待物有用後文云飛精附人口説經法乃此類之勝者十非無色灌頂云非無色情合而離由因世界相引輪回性顛倒故和合呪成八萬四千呼召亂想如是故有非無色相無色羯南流轉國土呪咀厭生其類充塞初略明此中界塵對非無色為第十變也由因此變而有相引輪回相引者謂於諸界塵情雖耽愛隨引而合隨引而離故曰相引要引之念不除非無色相不息故曰輪回性顛下詳明引久習成名性忽合忽離名倒呪即能引之境能引之境亦屬虗妄由顛倒故執為真實與之隱顯故曰和合和合具惱故成八萬四千總以隨呼隨召為去為來意念無寧故云呼召亂想如是故有等者謂由如是合呪成形故有非無色相無色羯南言非無者非是實無以能隨呪去來雖隨呪去來而凡眼不見故仍以無色名之既名無色而又稱羯南者以有細色故末二句指類呪咀厭生者謂呪咀鬼神厭死祐生如後文云遇明為形名役使鬼愚謂世之書符來仙念呪驅鬼皆此類攝十一非有想灌頂云非有想想離而合由因世界合妄輪回罔顛倒故和合異成八萬四千回互亂想如是故有非有想相成想羯南流轉國土彼蒲盧等異質相成其類充塞初略明此中界塵對非有想為十一變也由因此變而有合妄輪回合妄者謂於諸界塵懸想而不自奪合常欲乘虗以行陰占故云合妄謂合中帶妄也合妄不休非有想報靡停故曰輪回罔顛下詳明岡猶欺也沽名不奪乘虗而占名罔陽善陰惡欺人自欺名倒異謂非己所有即指虗境虗境非己明屬虗妄由顛倒故執為真實用謀於上名為和合和合具惱故成八萬四千總以望其自避居心諱奪故云回互亂想如是故有等者謂由如是合異成形故有非有想相成想羯南非有想相者非是定有不欲奪合故成想羯南者非是定無乘虗而就故末三句指類灌頂云蒲盧亦名蜾螺細腰蜂也詩曰螟蛉有子蜾螺負之計云螟蛉青桑蟲也蜾螺運泥作房負桑蟲於其中呪祝七日化為己子此取蜾螺受生時螟蛉之性業已回互乃就其虗軀而受之故云異質相成愚謂起尸鬼等亦此類攝十二非無想灌頂云非無想想合而離由因世界怨害輪回殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞初略明此中界塵對非無想為十二變也由因此變而有怨害輪回怨害者謂於諸界塵始而懸想繼而附合終以不附己意而欲惡離故云怨害怨害之心不祛非無想報靡停故曰輪回殺顛下詳明害能奪命為殺先親後怨名倒怪即所怨害物本自異常故名為怪怪亦是妄由顛倒故執為真實依生親怨名為和合和合具惱故成八萬四千總以不思深恩反欲惡離忤逆居心故云食父母想不言亂者隨文便故例前知故如是故有等者謂有如是合怪成形故有非無想相無想羯南非無想相者非是定無本期附合故無想羯南者非是定有終成惡離故末六句指類孤山云按史記孝武本紀云祀黃帝用一梟鏡孟康曰土梟鳥名食母破鏡獸名食父黃帝欲絶其類使百祀皆用之破鏡如貙而虎眼今云鳥者或傳譯成誤耳依類詳明竟三指數總結是名衆生十二種類按前文方世相涉變成十二雖分形類尚非業招及云六亂妄想成業性故十二區分雖屬業招尚非定有至此則迷真愈遠逐妄愈深流蕩忘返乃成定有故此總結以終一章之義又十二類生餘經異解不同今按本經胎卵濕化四生已攝三界至於後八乃四心交互迭相變易不專屬於四生然亦不必更為會通色空等諸勝報也總結前來依真起妄成類生竟
