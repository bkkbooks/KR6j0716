body:
  text: 京都拈華寺賢宗後學達天通理敬述嗣法門人興宗祖旺謄清懷仁祖育較字三結示遠魔二一持本斷末二絶塵遠魔初阿難汝問攝心我今先説入三摩地修學妙門求菩薩道要先持此四種律儀皎如冰霜自不能生一切枝葉心三口四生必無因準前阿難問云欲攝其心入三摩地云何令其安立道場遠諸魔事即為攝心入三摩地故如來按定其意而結示之意謂汝前問我攝心之法意在入三摩地我今先來所説即指四種明誨即是入三摩地初心修學攝心最妙之門是故凡有求菩薩道者要先持此四種律儀必使身心皎潔如冰如霜如是則是根本已枯以淫殺盜妄屬根本戒故根本既枯枝葉無所依附故曰自不能生心三者除前淫殺盜三其餘貪瞋癡等一切差別煩惱口四者除前大妄語外其餘妄言綺語惡口兩舌等一切差別惡業皆為枝葉故曰生必無因據此則嚴持四禁稱為修學妙門者宜矣二絶塵遠魔阿難如是四事若不遺失心尚不緣色香味觸一切魔事云何發生四事之中少有不能持守則名遺失若不遺失則心常住戒縱遇塵境無復流逸故曰心尚不緣色香味觸六塵舉四者餘可例知故一切魔事云何發生者決言其必不能生以魔托塵入塵不緣而魔不得便故教以持戒遠魔竟二令其誦呪除習三一指人勸教誦呪二指呪驗其有功三況顯除習無難初若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶薩怛多般怛羅無上神呪宿習者宿世惑業種習也任運而動莫可禁制非同現業唯以持戒之力便能滅除人固有終身持戒而一朝失意者蓋宿習使然是必得神呪不思議力乃可滅除故勸其教以誦呪呪是頂光化佛所説故稱佛頂光明亦借此以表尊勝破惑義故摩訶薩怛多般怛囉此云大白傘蓋大即藏性之體橫遍竪窮大而無外故白即藏性之相具恆沙德清淨無染故傘蓋即藏性之用出生佛法蔭覆衆生故既即藏性持之可以成佛故稱無上又神用難思餘呪莫及亦無上義也誦呪而曰一心者有事有理事一心則淨念相繼諸緣不雜理一心則諦觀藏性念絶能所良以呪是心呪非一心不能相契習從心發唯了心乃可除滅理事雙持成功易致效速也二指呪驗其有功斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所説心呪且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢初指呪顯勝斯指上呪是指下顯也如來等者顯能説人勝言如來最勝無見最妙頂相最尊無為心佛即指頂光化佛以頂光化佛乃從如來無為心中現故從頂三句顯所説呪勝從頂者從化佛頂發輝者重放光明後云頂放十道百寶光明顯所説呪有破惑成智義故坐寶蓮華指化佛言後云有化如來坐寶華中前云光中出生千葉寶蓮有佛化身結跏趺坐顯所説呪有成因契果義故所説稱心呪者以是諸佛心印其體即是如來藏故且汝下驗其有功神呪之功難可思議姑就近事驗之故云且也事在今時緣因往昔故云宿世準登伽經阿難昔五百世與登伽為夫婦今云歷劫因緣據此即是以夫婦恩愛為因緣但既云歷劫又不止五百世耳恩深愛重熏習在心生生世世氣分不忘名為習氣而言非是一生及與一劫者顯習氣深厚難以解脫如前云汝愛我心我憐汝色以是因緣經百千劫所以阿難登伽才一會遇竟至淫躬撫摩將毀戒體者情有所自矣我一宣揚等文稍不足具足應云文殊持我神呪才一宣揚登伽頓證三果今又愛心永脫成阿羅漢則神呪之功何其偉哉三況顯除習無難彼尚淫女無心修行神力冥資速證無學云何汝等在會聲聞求最上乘決定成佛譬如以塵揚於順風有何艱險彼尚淫女者愛習正熾無心修行者曾未對治如是之人蒙佛神呪之力冥中資熏尚能速證無學況夫習氣微薄已知對治再加自誦神呪自應除習成佛故以云何等語而激勵之在會聲聞者兼有學及無學也有學斷見無學斷思非比登伽尚為淫女求最上乘者已發大心決定成佛者誓期不退非比登伽無心修行此下應有而不誦呪四字蓋是筆授之脫言佛意以淫女無修蒙呪已得證果云何汝等聲聞發心成佛而不誦呪乃深激其誦呪以除習也果其誦呪自能除習成佛故向下以喻明之譬如以塵等者微塵至細喻習氣順風有力喻佛呪以微塵揚於順風塵無不盡喻習氣遇於佛呪習無不除有何艱險者極言其除習成佛無艱難險阻事也先教遠魔除習竟二正示結壇行道二一就便略示二因請詳示初二一略示結壇軌則二略示行道儀式初二一重示嚴戒二誦呪結壇初若有末世欲坐道場先持比丘清淨禁戒要當選擇戒清淨者第一沙門以為其師若其不遇真清淨僧汝戒律儀必不成就末世衆生障緣偏熾修三摩地非道場不可故欲坐也定因戒生故教以先持禁戒戒而言禁者謂佛所禁制理應遮止絲毫無容犯故清謂清其源淨謂淨其流如上所云先持四種律儀自不能生一切枝葉是也但言持比丘戒者意為引小入大以比丘戒即菩薩戒之階梯故又比丘有二一菩薩比丘二聲聞比丘兩乘俱該也持戒之事前已詳明今以就便重示故從略耳要當擇師者無作戒體不易成故如模印像模必端故第一者德臘俱先為衆所推如此沙門能和合成事用以為師羯磨乃得成故真清淨僧如上所説設有戒雖清淨而德臘不足又或德臘並足而戒不清淨二俱非真雖遇如無故為不遇徒有羯磨之名而無成事之實故云汝戒律儀必不成就二誦呪結壇戒成已後著新淨衣然香間居誦此心佛所説神呪一百八遍然後結壇建立道場戒成已後者道器既完魔不得便也新衣以嚴其身然香以熏其室間居以攝其心如此誦呪者神驗可致惑習易除也遍定百八者表所治惑習之數以一切衆生煩惱惑習有百八故結界立場之法如後詳示中明然結界立場必先誦呪者有二義一謂治習淨根壇儀乃現二謂仗呪神功遠諸魔事有志行道者不可不知略示結壇軌則竟二略示行道儀式三一求佛灌頂二場中發願三行道感佛初準後文時當初七求於十方現住國土無上如來放大悲光來灌其頂準後文初七日中有頂禮佛僧誦呪圍壇而不出其所求今但出其所求而不言禮誦前後各以意含言求不徒求必假禮誦禮誦無別為求灌頂故若釋其義者求為運心禮誦期其必應此屬能感十方者東西南北四維上下現住者現坐道場成等正覺無上者圓實至尊超權越漸此屬所感光從大悲之心放出故曰放大悲光此屬能應來灌其頂者光灌以增其信大悲以除其障頂冠身心灌其頂則身心受益此屬所應感應道交而行道無慮矣二場中發願準後文時在二七阿難如是末世清淨比丘若比丘尼白衣壇越心滅貪淫持佛淨戒於道場中發菩薩願初開許四衆如是者謂如我上説結界建壇唯許比丘為如是也若壇儀已成修習則不拘故開許尼等指在末世者以立壇行道原為末世衆生起見出家二衆持戒有素故通稱清淨檀越即在家二衆不服壞色故通稱白衣然結界建檀唯許比丘者以尼衆無幹辦之力白衣乏辨界之識故壇成修習通許四衆者以一切衆生皆有佛性皆可修習正脈云雖不擇僧俗男女決定各從其類非混同一場也心滅下嚴戒發願心滅二句一往通指四衆謂俱應滅貪俱應持戒以貪淫為煩惱根本故先言之亦可心滅貪淫指在家二衆以彼不能全斷淫欲但心滅過貪及邪貪可也持佛淨戒指出家二衆以彼應遵佛制身心俱持絲毫無容犯故又此與上科雖同教嚴戒而所為不同以上為結界建壇此為發願行道故教以場中發願者以願能導行也願有廣略如後詳示中明三行道感佛準後文時當三七出入澡浴六時行道如是不寐經三七日我自現身至其人前摩頂安慰令其開悟出入澡浴者謂設遇二便出已復入必須澡浴其身意恐稍有不淨難以致應故六時行道者行道即是持呪準後詳示中云第三七中於十二時一向持呪今云六時者謂十二時中除六時便誦外惟取六時圍壇誦呪為行道故如是不寐者足知六時之外餘時亦便誦也經三七日者謂既經第三七日意指最後一日請詳後文自知我自現身等者謂上已發願此又行道行願相資足以致應故摩頂以示攝授安慰以施無畏令其開悟者教以奮起精進解結修證必至寂滅現前也就便略示竟二因請詳示二一阿難述悟請詳二如來詳示其法初阿難白佛言世尊我蒙如來無上悲誨心已開悟自知修證無學道成末世修行建立道場云何結界合佛世尊清淨軌則初自述已悟承上既教持戒遠魔又令誦呪除習末復示以結壇行道此等訓誨皆出自如來至極悲心故曰無上悲誨言我蒙者且説自己以同聽異聞餘者或悟未悟未可定故心已開悟者謂如佛所説略以領其概也自知修證無學道成者無學有二一小乘四果二大乘佛位今就阿難且約四果謂阿難既已開悟自知依之修證雖不能即至佛位而四果無學之道聊可成矣末法下請詳其法末法修行尺水丈波建立道場大非容易必須結界如法可保無虞故問以云何等意言諸佛世尊因地修行自應有遠魔離障清淨軌則必合此乃如法故二如來詳示其法二一正為詳示二應問結答初二一詳示結壇軌則二詳示行道儀式初五一塗壇定界二內外莊嚴三供養法式四像設軌則五空鏡方向初佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛惟飲雪山清水其糞微細可取其糞和合栴檀以泥其地若非雪山其牛臭穢不堪塗地別於平原穿去地皮五尺以下取其黃土和上栴檀沈水蘇合薰陸金白膠青木零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地方圓丈六為八角壇初塗壇常法雪山近地定當依用故云常法末世障重非道場難以修習故願立也立場之地恐有不淨故須另塗雪山有牛其色白其力大先取之者令其飲食如法乃取糞和香以泥地也雪山香草豐肥油膩以斯食牛則其糞香而帶膩用以塗地不唯避臭且以益其堅也雪山清水不濁不染以斯飲牛則其糞純而兼淨以斯塗地不惟無雜而且益其潔也其糞微細者精微細妙乃統上香膩純淨而總言之既云可取而又和合栴檀者精微中益求精微細妙中益求細妙故以泥其地者除其舊地覆以新泥也若非下塗壇變法雪山遠地改用黃土故云變法若非雪山其牛臭穢者以無香草可食清水可飲故牛且臭穢況於其糞恐誤用獲罪故以不堪塗地揀之不就高阜不取坳下故云別於平原以高阜恐堆積不淨坳下恐聚流穢污也穿去地皮等者以地皮浮淺恐非本來淨土必至五尺以下取其本淨黃土用之又復和上栴檀等香者以黃土雖淨無香氣故十香性益出處俟考細羅為粉者粗則不能成泥縱成泥亦不堪塗地也方圓下定壇界相方圓者圓而有楞丈六者徑過丈六為八角壇者既有八角則有八面面各六尺四寸有餘則徑過合有一丈六矣然上云塗場但是塗其地面此云為八角壇方乃起成壇相不必定言築土或木或石等皆可為之但量力求精可耳二內外莊嚴壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉取八圓鏡各安其方圍繞華鉢鏡外建立十六蓮華十六香爐間華鋪設莊嚴香爐純燒沈水無令見火初壇心莊嚴雖曰壇心亦須偏外讓出供毗盧處也金銀銅木造華者隨力所能或金或銀或銅等皆可造之亦可金銀銅木和合共造如法華妙音品有衆寶蓮華皆以閻浮檀金為莖白銀為葉金剛為鬚甄叔迦寶以為其臺之類壇心置華者預備安鉢故華中安鉢者預備盛水故鉢中盛水水安華葉者用水浸華不令萎敗故必用八月露水者露取其潔八月露濃得之易故又露水即淨八月秋空無塵其露益淨也隨安所有華葉者春則春之所有夏則夏之所有等隨其時而安之務使華葉相稱圓鏡謂團圓鏡也壇既以八面為式故圓鏡亦取八枚方各一枚懸於虗空故云各安其方圍繞華鉢自應并佛圍繞取中聞佛像華鉢映於八鏡而八鏡各帶佛像華鉢之影遞互相照影現重重略彰元境也鏡外下近外莊嚴近外者仍在壇內但相近於外也建立者安供義言壇分八面面各內狹外廣故內鏡惟八而鏡外蓮華則有十六謂八面居中八枝八角居中八枝也十六香爐間華鋪設者謂面各二爐鋪設於中角二華之間與華相間故莊嚴香爐者以灰覆火務令嚴好純燒沈水者取其香氣清幽助發定心若雜以餘香則浮濁擾定心矣無令見火者香置灰上炙之漸以自然若見火生煙則香氣粗濁人且厭聞況於佛聖今之習俗喜燒整箍大香觀此宜知其非三供養法式取白牛乳置十六器乳為煎餅并諸沙糖油餅乳糜蘇合蜜薑純酥純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩每以食時若在中夜取蜜半升用酥三合壇前別安一小火爐以兜樓婆香煎取香水沐浴其炭然令猛熾投是酥蜜於炎爐內燒令煙盡享佛菩薩初日供法式日供皆有形之物不同夜供惟用酥蜜燒煙而已白牛乳謂雪山牛乳置十六器者用以作供取其香潔故餘有八味一乳為煎餅謂煎乳成餅也二并諸沙糖謂蔗汁熬糖如沙而味甘也三油餅謂以油和麵作餅而膩脆也四乳糜謂用乳和米作粥而甘粘也五蘇合謂和合衆香煎汁成膏六蜜薑謂以蜜浸薑味辛而甘七純酥謂乳粹成酥八純蜜謂華蕊成蜜各各十六者謂亦同牛乳各置十六器也圍繞華外者謂於十六蓮華之外各有九味三三成行而圍繞之每以食時者食時即日中之時溫陵曰佛以日中受食故每日以日中致享若在下夜供法式夜供者佛不夜食唯以酥蜜燒煙享之若在中夜者謂或於中夜作供也蜜屬華蕊其味香而清酥屬身分其味甘而濁蜜取半升酥用三合者蓋欲以蜜之清融彼酥之濁故壇前別安一小火爐者壇分八面面面別安以備燒酥蜜用故享器不宜過大故火爐須小又大則有礙行道不便運用故兜樓婆此云白茅香用此煎水浴炭者取其淨而芬故恐為酥蜜所滅故然令猛熾投入也享獻也諸佛菩薩不於中夜受食故唯燒令煙盡以氣致享四像設軌則令其四外遍懸幡華於壇室中四壁敷設十方如來及諸菩薩所有形像應於當陽張盧舍那釋迦彌勒阿閦彌陀諸大變化觀音形像兼金剛藏安其左右帝釋梵王烏芻瑟摩并藍地迦諸軍茶利與毗俱胝四天王等頻那夜迦張於門側左右安置初外壇聖像外壇謂八角壇外壇室中也四外者八角壇之四外令其遍懸幡華者莊嚴壇室以備供聖像故壇室即外壇也外壇不必八角但如殿堂故惟四壁敷設者謂畫像則敷展雕鑄等像則施設故如來菩薩主伴相參十數之外多少俱得以經中原不言數故又敷設雖云四壁設有門窗礙處亦惟間空敷設而已應於下內壇聖像當陽者壇內正中面向陽與壇心華鉢相對張謂張設亦安供義盧舍那具云毗盧遮那翻有三義一曰遍一切處法身也二曰滿淨自受用身也三曰光明遍照他受用身也三身一名者以同為真身故真為應主故居其中下之四像次外落一層務使舍那高出前後左右俱見釋迦在毗盧前面南正坐以是本界主故彌勒在毗盧後面北正坐以是當來主故阿閦具云阿閦此翻不動在毗盧左面東正坐以是東方界主故彌陀具云阿彌陀此云無量壽亦云無量光在毗盧右面西正坐以是西方界主故諸大變化者如明王變像以文殊普賢等皆有明王像故又諸大變化中特標觀音及金剛藏者顯二菩薩必不可少以觀音為圓通主以文殊選圓二十五聖中唯取觀音故金剛藏為護呪主故以後云是呪常有八萬四千那由他恆河沙俱胝金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜隨侍安置左右者謂諸大變化及觀音剛藏等安置五佛左右據此則五方有佛四隅有菩薩主伴相參儼然一微妙境矣帝釋下門側護法帝釋忉利天主梵王四禪天主烏芻瑟摩火頭金剛藍地迦青面金剛軍茶利此云解怨結亦金剛異名如陀羅尼集經有金剛軍茶利菩薩是也毗俱胝此云遍滿千萬毗盧神變經云右邊毗俱胝手垂數珠鬘三目持髮髻尊形猶皓素四天王者東持國南增長西廣目北多聞等該所統部落以四大天王各統二部鬼神故也頻那此云豬頭夜迦此云象鼻二使者之名張於門側者門謂外壇之門或唯前後或兼左右但隨有門處即便張供門側謂門內兩旁也張供之法大抵以釋梵在前一左一右烏芻藍地次之亦一左一右軍茶俱胝又次之亦一左一右四大天王左右各二頻那夜迦左右分供故總云安置左右以此皆有力外護用以守壇護界使魔不得便而行人得如法行道也五空鏡方向又取八鏡覆懸虗空與壇場中所安之鏡方面相對使其形影重重相涉八鏡亦團圓鏡也覆懸虗空者懸繫於上而覆垂於下其鏡自在虗空中故壇中之鏡圍繞毗盧及壇心華鉢一方一枚而面向於外外壇之鏡一方一枚而面向於內故曰方面相對使其形影重重相涉者昔賢首國師嘗為天后以十圓鏡置八隅上下皆使相向中安佛像然燈照之則鏡鏡現相交羅齊映以表剎海十界普容無盡之旨今經亦爾如內壇八鏡內現毗盧華鉢之影外現四佛及諸大變化觀音剛藏華鉢香爐之影涉入外壇鏡中外壇之鏡外現十方如來菩薩門側護法之影內現幡華及行人禮拜供養之影涉入內壇鏡中又內壇之鏡涉入外壇鏡中時其體已帶外壇之影外壇之鏡涉入內壇鏡中時其體亦帶內壇之影又復內鏡與內鏡鄰次互現外鏡與外鏡亦爾是謂重重相涉將使行人不離本處遍入無量海會籠絡萬象齊歸方寸之中一香一華圓證無障礙門一瞻一禮頓入不思議境非僅為美觀已也準古德於結壇軌則一味約表法釋之而於事相安置全不眉目遂令後之發心菩薩結壇行道不合如來清淨軌則及尋其所表之法仍復茫然理事雙失空載虗文今本疏於塗壇定界內外莊嚴等約事相一一詳釋一目了然庶使發心菩薩結壇合制行道如法魔外不擾利益速成至於借事表法溫陵獨得其旨詳如正脈所引茲不贅焉詳示結壇軌則竟二詳示行道儀式四一初七禮誦行道二二七專心發願三三七精修致應四百日悟證無疑初廣前略示中求佛放光灌頂於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恆於六時誦呪圍壇至心行道一時常行一百八遍初七者最初一七日也必以七日者如中陰托胎七日一變謂羯羅藍頞部曇等菩薩發心行道為托聖胎故亦以七日為限十方如來佛寶也菩薩羅漢僧寶也呪即大白傘蓋法寶也頂禮持誦者為求光灌如前略明中説依起信復有二意一為仗三寶真慈增長信心如起信論發起善根增長方便文云謂勤供養禮拜三寶讚歎隨喜勸請諸佛以愛敬三寶淳厚心故信得增長二為假三寶神威却除魔障如起信論修行精進門云若人雖修信心以從先世來多有重罪惡業障故為邪魔諸鬼之所惱亂或為世間事務種種牽纏或為病苦所惱是故應當勇猛精勤晝夜六時禮拜諸佛誠心懺悔乃至常不休廢得免諸障頂禮而云至誠者七種禮中恭敬禮及起用禮也誦呪而曰圍壇者四念誦中音聲念及真實義念也灌頂云瑜伽中有四種念誦一音聲念誦出聲念也二金剛念誦合口默念三三摩提念誦心念者是四真實義念誦如字修行今既圍壇而誦必是出聲字字祕密念絶思路故是如字修行又佛僧曰禮必兼口稱將欲誦呪亦必先禮二皆出自本心各兼三業虔誠否則不足以致效故恆於六時者晝三夜三日日如是至心行道者以至誠心行方便道以此乃增信除障之方便故一時常行者每一時中照常而行勿得朝勤而夕情也一百八遍者長水曰每一時中誦心呪一百八遍意指跢姪他下唵等數句為心呪良以呪分五會各成利益至跢姪他下乃統收五會精要之義而總持之如五體不離一心但舉其心則五體俱隨矣或有曰初持全呪一遍餘則推持心呪亦無不可但要三業相應自能致驗否則通持全呪百八亦何益哉是二二七專心發願廣前略示中場中發願第二七中一向專心發菩薩願心無間斷我毗奈耶先有願教上為增信除障故六時禮誦此為擴充其志故專心發願如起信論大願平等方便文云所謂發願盡於未來化度一切衆生使無有餘皆令究竟無餘涅槃乃至云發是心故則得少分見於法性然既曰專心則不雜禮誦既曰一向則不拘六時以初心貴專故也或有曰此恐前行惰退加願堅固其心至於六時誦呪同前無異此蓋未諭一向專心意故菩薩願者略則三願斷惡修善度生四願度生斷惱學法成道廣則普賢十願禮敬諸佛等淨行百四十願等睡眠始寤等心無間斷者七日之內令心純熟乃至成佛無遺忘也毗奈耶中先有願教者如律部中凡有來求戒者先令發願言此欲其有所考稽抑以見發願之不可廢耳三三七精修致應廣前略示中六時行道感佛第三七中於十二時一向持佛般怛囉呪至第七日十方如來一時出現鏡交光處承佛摩頂即於道場修三摩地能令如是末世修學身心明淨猶如琉璃阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就初一向持呪於十二時者六時圍壇六時便持不雜餘事故云一向欲修三摩為求勝應以驗成否故持呪也至第下蒙佛摩頂第七日者謂三七日中最後一日據前略示中云我自現身至其人前此云十方如來一時出現蓋自他同一法身佛既現身諸佛亦現前後互影故也鏡交光處承佛摩頂者謂內鏡外鏡遞互相照己身佛身一齊現於鏡中摩頂之相即於鏡交光處見故即於下隨修必成既獲勝應驗知有成故應即於道場修三摩地據此則三七日中皆為修定方便自此以後乃入正修古德有謂前三七中亦具粗略定心但兼禮念願呪非不攝心反聞蓋未深思夫一向及專心語故能令等者謂果能即修自有佛力加被能令如是之人雖在末世修學亦能證入也既能證入則根塵識心應念化成無上知覺故曰身心明淨以喻言之猶如琉璃以一切諸法無不影現於其中故阿難下非機不就若此比丘者舉僧攝尼舉出家例在家以尼衆在家各有應受戒故本受戒師約比丘則三師七證若白衣受戒則惟和尚一人而已同會比丘即同壇修行人也方等陀羅尼經云行此法時十人已還然既曰已還或八衆六衆皆可今經亦爾故曰十比丘等其中者通指受戒師及同行比丘之中有一不淨則道場不成況夫有二有三益知不可要知道場不成則佛聖不臨龍天不護正定難修妙悟難發甚哉師友之不可不擇也故四分律云弟子知和尚犯戒不應去受雖受亦不得戒古德云設無同志寧可獨行不必強足十人意有見於此耳四百日悟證無疑從三七後端坐安居經一百日有利根者不起於座得須陀洹縱其身心聖果未成決定自知成佛不謬從三七後端坐安居正前所謂即於道場修三摩地也端坐者正身跏趺安居者寂然不動寂然不動即是入流亡所經一百日自然動靜不生有利根者頓覺根性現前動靜不生永斷分別見惑根性現前位當少教入流故云不起於座得須陀洹此云入流謂初見真諦乍入聖流也身心者現前身心尚未至於小乘四果況夫大乘極果故曰聖果未成縱聖果未成而根性既發已見佛性故云決定自知成佛不謬通前正為詳示竟二應問結答汝問道場建立如是準前阿難問云末法修行建立道場云何結界今將結界建壇并方便正修等法一一詳示已竟故應其所問而結答之曰汝問道場建立如是如是者謂如上所説是也然如上所説建壇之法末世行之誠為不易故下文誦呪亦許不入道場而上文有一不淨則云道場不成是知有力者固應如法建壇無力者只要持戒清淨設若有壇無戒反不如有戒無壇之為愈也正示結壇行道竟三兼彰祕密神力三一阿難重請説呪二如來説呪顯益三會衆發願護持初三一自敘請由二請説普利三會衆佇聞初阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故未證無為遭彼梵天邪術所禁心雖明了力不自由賴遇文殊令我解脫雖蒙如來佛頂神呪冥獲其力尚未親聞初恃愛未證最小之弟在俗即蒙憍愛習氣未忘故自敘出家猶恃如佛云汝我同氣情均天倫其蒙佛憍愛之意已自可見將謂如來惠以三昧無勞自修故但求多聞正以求多聞故不務真修所以方證初果未得極證無為言小乘以四果為極證故遭彼下遇邪難脫遭猶遇也彼指摩登伽女梵天邪術即指先梵天呪禁謂禁制其身不能得脫也手足宛然見聞不惑心觸客邪而不能動故曰心雖明了力不自由賴遇下蒙呪未聞頂光化佛説呪文殊持呪救護阿難因而得脫今但云賴遇文殊令脫者舉能持人以攝所持呪故蒙呪得脫實不自知故云冥獲其力真言祕語并非面聆故曰尚未親聞此請呪之由也二請説普利惟願大慈重為宣説悲救此會諸修行輩末及當來在輪回者承佛密音身意解脫初為現會請尚未親聞故惟願大慈重説不唯為己故兼云悲救此會諸修行輩即指此會三乘行芳見嫉志潔蒙垢難進易退多學少成故須求佛大悲説呪救護末及下為未來請末猶後也言如來果其重説又不惟現會蒙救且能展轉流通後及當來也凡外分段正熾權小變易未離均名在輪回者既在輪回寧無魔障故亦須承佛密音乃可以保護身意離邪網出魔罥得解脫耳三會衆佇聞於時會中一切大衆普皆作禮佇聞如來祕密章句會中大衆親見阿難蒙救信知呪力難思故聞阿難代請作禪敬佇呪稱祕密章句者只許標列章段分析句逗不可妄自論量強為解釋故古德謂其如軍中號令無敢私泄也阿難重請説呪竟二如來説呪顯益三一説前現相二正説神呪二顯示利益初爾時世尊從肉髻中涌百寶光光中涌出千葉寶蓮有化如來坐寶華中頂放十道百寶光明一一光明皆遍示現十恆河沙金剛密迹擎山持杵遍虗空界大衆仰觀畏愛兼抱求佛哀祐一心聽佛無見頂相放光如來宣説神呪初現説呪相肉髻即是佛頂以如來頂肉隆起其色紅赤在青螺紺髮正中其相如髻名肉髻相而頂不可見名無見頂準前敘分及上誦呪除習中皆言頂敘分云於時世尊頂放百寶無畏光明上云斯是如來無見頂相無為心佛所説此則但言髻不言頂者以頂依於髻言髻即兼頂故若作表法者髻在佛頭為最勝頂稱無見為最妙從中涌光者正表所説神呪最勝無有上最妙不可見故光稱百寶者光具百寶之色正表所説神呪無善不備無利不成故又光有破暗照物之功表呪有破惑明真之用既有破惑明真之用則能出生無礙圓因故以涌出千葉寶蓮表之既能出生無礙圓因自能成就無為妙果故又以化佛坐寶華中表之後文云十方如來因此呪心得成無上正遍知覺是也頂乃化佛之頂表所説神呪仍復超出無為妙果言語道斷心行處滅獨為最勝中最勝頂法後文云亦説此呪名如來頂是也從頂放光光分十道具百寶色者表所説神呪既為最勝中最勝頂法必能具足恆沙妙用出生十法界無障礙智智各互具無生不利後文云十方如來乘此呪心坐寶蓮華應微塵國十方如來含此呪心於微塵國轉大法輪乃至十方如來依此呪心能於十方拔濟羣苦等是也光中遍現十恆河沙金剛密迹等者表所生十法界智不惟智各互具無生不利且智智各具恆沙威德神力無魔不摧後文云十方如來執此呪心降伏諸魔制諸外道是也金剛而曰密迹者謂內祕菩薩之德外現金剛之迹擎山制外持杵降魔密行化道故曰金剛密迹用表呪具威力固其宜焉大衆下現聽呪相法會大衆見佛從頂放光光中化佛化佛復從頂中放光事出希有理超情量言語之所不到心思之所不及惟有景仰觀察而已既見光聚百寶之色復見金剛密化之迹折攝並現畏愛交興故曰兼抱謂二情兼抱於懷也愛則求佛哀愍攝授畏則求佛保佑護持攝授護持總賴神呪故專一其以而聽宣説前云斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所説心呪今云佛無見頂即前如來無見頂相放光如來者謂佛頂放光光中所現如來即前無為心佛不言從頂發輝坐寶蓮華者但顯能説人勝則所説法勝不待表而知故説前現相竟二正説神呪古德云翻譯經呪有四例一音字俱翻如諸經文二音字俱不翻如經籤火字三翻音不翻字如佛胸卍字四翻字不翻音如諸呪語今當第四又有五種不翻一祕密不翻如諸經呪語二多含不翻如薄伽梵六義等三此方無不翻如閻浮樹等四順古不翻如阿耨菩提等五尊重不翻如般若等今當第一是故此呪無容翻譯正脈云祕呪非但只是梵語仍是一切賢聖祕密之言蓋梵語此方不曉而天竺之人皆能曉解至於祕呪非但天竺常人不知理應下位聖賢不達上位之呪大端聖賢弘化例有顯密二教如醫療病率有二途一者授方則顯説病源藥性及炮製之法如佛顯教二者授藥則都不顯説但惟與藥令服愈病而已不必求知何藥何治如佛密教故今祕呪正同授藥不必求解若解生則呪喪矣二一別分五會二總出呪心初五一第一會二第二會三第三會四第四會五第五會初南無薩怛他蘇伽多耶阿羅訶帝三藐三菩陀寫薩怛