body:
  text: 京都拈華寺賢宗後學達天通理敬述嗣法門人興宗祖旺謄清懷仁祖育較字二滅妄明真成諸位四一正明諸位二結顯修法三推重初心四判決邪正初十一三漸二乾慧三十信四十住五十行六十向七四加八十地九等覺十妙覺初二一指前起後二正示漸次初二一指前互具成妄二起後三漸得除初阿難如是衆生一一類中亦各各具十二顛倒猶如揑目亂華發生顛倒妙圓真淨明心具足如斯虗妄亂想初指前互具如是衆生句總指十二類生一一類各各具者即是互具如一卵類現起者名動顛倒餘十一倒非是不具但是冥伏若遇緣便起如卵類既爾餘十一類皆然合之應有一百四十四倒且又於一一倒中具足八萬四千亂想實為虗之至妄之極也猶如下舉喻顯妄目喻真心揑喻一念妄動亂華發生喻十二類生各各互具蓋以真心本淨始由一念妄動展轉變起十二類生又復各具顛倒亂想如目本無華由無故妄揑展轉而有亂華發生然明知目本無華因揑而有揑亦非真放手元空揑尚不有華云何立知此喻者則顛倒虗妄之義可思知矣顛倒下以法貼合不變名妙指心體言隨緣曰圓指心用言雖隨緣而不變目曰真淨雖不變而隨緣目曰真明合此體用故曰妙圓真淨明心此合喻中目字顛倒即是妄動以真本不動動即違真故稱顛倒此合喻中揑字亂想即指八萬四千如卵生名飛沉亂想胎生名橫豎亂想然倒既互具亂想亦應互具言虗妄者本由妄動無實體故雖無實體而迷位繁興故曰具足此合喻中亂華發生蓋華雖無實滅華須待放手喻想雖虗妄除想應須離念故向下示以三漸次也二起後三漸得除汝今修證佛三摩地於是本因元所亂想立三漸次方得除滅如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露初法說佛三摩地即指耳根圓通以分修分證即成諸位圓修圓證即成佛果此以因中說果故置佛言元所亂想即指類生所具如云飛沉亂想等是也迷位本有曰元所對後為果曰本因而曰立三漸次方得除滅者不是三漸次中即能盡除蓋必三漸次後歷位修斷方得種習俱盡耳如淨下舉喻中字下文稍不足具足應云如淨器中盛以毒蜜喻真心中一念妄動具足亂想也除去毒蜜喻除其助因刳其正性違其現業也湯水喻諸位中定諸位中定仍不離前之三摩灰香喻諸位中慧諸位中慧仍不離前之圓通洗滌其器者喻諸位中盡斷種習後貯甘露者喻佛果清淨心中方堪承受最上一乘真法味也指前起後竟二正示漸次二一徵起標列二依次釋成初云何名為三種漸次一者修習除其助因二者真修刳其正性三者增進違其現業首句徵起可知一者下標列此中第三增進即是耳根圓通第二真修即是圓通方便蓋即以認真持戒為真修也至於第一修習又為真修方便良以戒不易持須先除其助因是則除其助因乃最初入手修學習演如蒙童初讀三字經之類至下別釋文甚顯然說者無容以前濫後二依次釋成三一除其助因二刳其正性三違其現業初三一承徵二正釋三結成初云何助因此承前徵起也二正釋二一教依食斷辛二明食辛過患初阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛說一切衆生皆依食住阿難一切衆生食甘故生食毒故死是故衆生求三摩提當斷世間五種辛菜初教依食住十二類生如上所說不能自全者不能自全形命依四食住者要以四食方得住持形命故也此且總標所謂下別列段食者謂人間食必有分段灌頂云經論多云摶食其義則局如漿飲等不可摶故觸食者謂鬼神等觸氣而飽即為食故此二食通欲界思食者謂禪天中但以禪思為食又如懸沙止饑望梅止渴亦思食攝識食者謂四空天惟以識定續命有食義故又如地獄餓鬼歷劫續命但依業識亦識食攝此上四食略取溫陵及灌頂中義詳於唯識避繁不録必言四者為該三界治外道故灌頂云佛成道後為除外道自餓苦行說諸衆生皆依食住正覺正說餘不能知外道嗤曰愚者亦知何惟正覺佛反問曰食有幾種外道不能答因說衆生依四食住是故佛說等乃引昔所說以證成之為斷五辛必先言此者有二義一顯不為住持形命食且不可況夫食辛目應斷除二顯既有四食何必一定食辛自取過患阿難下教斷五辛資益形命曰甘非局甜味損傷形命曰毒非局鴆酒言故生故死者顯辛葷為性命所關在一切衆生皆不可食況夫求正定人又為法身慧命所係是宜嚴禁故承此教以當斷五種辛菜者楞伽云葱蒜韭薤興渠應法師云興渠梵音訛也正云興宜慈愍三藏云根如蘿蔔出土辛臭慈愍冬至彼土未見其苗此方所無故不翻也天台梵網疏云興渠是蒠蒺雲棲發隱云蒠蒺胡荽也又楞伽云葱韭蒜等臭穢不淨能障聖道亦障人天淨處何況佛果所謂當斷者此耳二明食辛過患是五種辛熟食發淫生噉增恚如是世界食辛之人縱能宣說十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次舐其唇吻常與鬼住福德日消長無利益是食辛人修三摩地菩薩天仙十方善神不來守護大力魔王得其方便現作佛身來為說法非毀禁戒讚淫怒癡命終自為魔王眷屬受魔福盡墮無間獄初發淫增恚正脈云熟食必壯相火故發淫生噉必動肝氣故增恚佛智所鑑不爽絲毫宜敬信而深戒之如是下天遠鬼近十二部經該盡佛所說法能宣說者天仙皆應近聞今以食辛之故不惟不來近聞而且嫌其臭穢咸皆遠離如今清淨齊戒者尚避食辛之人則天仙遠離可知餓鬼歆於不淨故因彼食辛之次冥中䑛其唇吻相隨不捨故常與鬼住天仙增福咸皆遠離故福德日銷餓鬼致禍常與共住故長無利益無利益即災禍事也是食下無護遭魔修三摩地乃成佛胚胎菩薩天仙善神皆應守護以食辛故皆悉不來亦嫌其臭穢故也守護則魔不能近由不來故乃令大力魔王得其方便大力魔即天魔也知其修三摩地有志求佛故現佛身而眩惑之非毀禁戒者貶持戒為小乘讚淫怒癡者褒三毒為大道無智自辨鮮有不受其惑者吁可不畏哉命終下成魔墮獄現前受行魔教命終自為魔屬所修三摩咸資有漏故得受享魔福福盡禍至故感墮無間獄正脈云緣以臭惡之味引致阿鼻極苦有何難捨而不勇斷之哉然辛菜所以名助因者即於此科中見中發淫為淫欲助因增恚為殺生助因至於福銷禍長必至損他益己縱能說經亦屬妄談般若此等又為盜妄助因況夫魔來倒說何惡不助自為魔眷何罪不生名其為助因者宜矣正釋竟三結成阿難修菩提者永斷五辛是則名為第一增進修行漸次承上食辛既有如是過患是故凡欲修菩提者先當永斷五辛是則下言果能斷辛則是從凡夫地第一增進乃初學修行漸次除其助因竟二刳其正性三一承徵二正釋三結成初云何正性次徵第二漸次義也二正釋三一教令先斷淫殺二示以進修餘戒三詳明持戒利益初阿難如是衆生入三摩地要先嚴持清淨戒律永斷淫心不餐酒肉以火淨食無噉生氣阿難是修行人若不斷淫及與殺生出三界者無有是處初總教持戒如是衆生指已斷五辛人也已斷五辛當入三摩但定因戒發非戒則三摩不成故教以要先持戒而云嚴持者絲毫不容有犯故又云清淨者非唯執身兼以執心故永斷下首舉淫殺淫能障定殺乃違慈四根本中此二猶要故首舉之永斷淫心者現種俱盡如枯木不萌如寒灰不𦦨也斷殺中乃以輕況重之語言酒肉尚不容䬸生氣尚不容噉何況殺生自應永斷以火淨食者律明生鮮之物火淨方食不經火觸則為不淨不得便食以有生氣故儒門方長不折庭草不除大同此意皆防微杜漸耳阿難下顯示應斷修行原為出界不斷淫殺則界不能出以有相生相殺事故言此正見其首應斷也二示以進修餘戒當觀淫欲猶如毒蛇如見怨賊先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起諸戒之中獨教觀欲者以難斷故又以一切衆生皆以淫欲正性命故如毒蛇如怨賊皆狠語耳毒傷身害命怨賊劫財奪物淫欲一事喪法身傷慧命損法財滅功德故以為喻然如來如是狠語而諸衆生亦當以狠心斷之聲聞小乘人也四棄八棄小乘戒也比丘唯是四棄謂殺盜淫妄犯之者不許共住故名為棄比丘尼於四棄之外更加觸八覆隨名為八棄不先持大而先持小者亦行遠自邇登高自卑意也執身不動者非不執心力未充耳不言後篇者本立而道自生源奠而流自清故既間乎小宜進於大故云後行菩薩清淨律儀菩薩大乘人也清淨律儀大乘戒也設有絲毫動念即不清淨故曰執心不起三詳明持戒利益禁戒成就則於世間永無相生相殺之業偷劫不行無相負纍亦於世間不還宿債是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險初成超世因禁戒雖通四棄此唯偏指淫殺以淫殺難斷較之盜妄尤宜嚴禁也身心俱斷故曰成就淫斷則不復相生殺斷則不復相殺故曰永無竊取曰偷強取曰劫又偷劫亦兼妄語如偷中設詞令其不覺劫中恐嚇令其強忍是也負纍乃偷劫所致還債因負纍來償今既無偷劫自無負纍既無負纍故亦不還宿債如前云長揖世間是也又世間雖通三界而此中似唯約於欲界以生殺負還乃欲界中事故據此則持戒之人將來不生欲界縱生欲界亦不過於人中增修非為生殺負還事也是清下發相似通清淨人即指上持戒人也因戒生定因定發通故是人一修三摩便能發相似五通肉眼相似天眼故不須天眼觀見自然者不假作意十方者周遍無遺故肉耳相似天耳故亦能覩佛聞法言相似者但以戒增上力并三摩初心增上力故暫時而發非是圓通勝用下三準知親奉聖旨者相似他心通也神通遊界相似神境通也宿命亦唯相似雖曰相似却能三世無礙故曰清淨得無艱險者由宿命故永不墮三惡道中艱難險阻處也正釋竟三結成是則名為第二增進修行漸次言此果能嚴戒則是從凡夫地第二增進乃決定修行漸次蓋以對上第一名為第二又對上初學不定故以決定修行釋之此中所斷言正性者對上助因而言以上但助發乎此此乃正是罪性故也刳其正性竟三違其現業三一承徵二正釋三結成初云何現業此徵第三漸次義也二正釋三一承戒修定二頓獲法忍三教以漸修初阿難如是清淨持禁戒人心無貪淫於外六塵不多流逸因不流逸旋元自歸塵既不緣根無所偶反流全一六用不行緊躡上文以為生定之因故即就前人言之諸戒俱持而獨舉心無貪淫者以淫為壞定之魁故於外六塵等者以淫為染塵前導如因動有聲則留心淫聲因聲有色則留心淫色因色有香則留心淫香因香有味則留心淫味因味有觸則留心淫觸因觸有法則留心淫法若心無貪淫則於諸色聲等皆不留心故云不多流逸言流逸者謂神逸其中縱恣攀緣言不多者非是全無但不留心貪染耳因不流逸者牒上不多流逸為因謂外境既淡乃可反觀本根自歸元明而內觀得成也內觀既成外境全脫故曰不緣按耳根圓通此當入流亡所動靜不生以上言不多流逸未免動靜相間此則一向不緣乃動靜雙亡矣偶對也言根對塵現塵不緣則根無所對根無對而性亦不現按耳根圓通此當聞所聞盡至此則六根反流全歸一性故曰反流全一既反流全一無復結根之用故曰六用不行按耳根圓通此當覺結若執此為是則為覺所礙矣大科云違其現業即在此科以此科現業有二一流逸是現業不多則少違二六用是現業不行則全違也二頓獲法忍十方國土皎然清淨譬如琉璃內懸明月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中是人即獲無生法忍承上六用不行惟有一存若進觀此一乃對六立名六既不有一云何立是則能覺空矣能覺之見分既空所覺之相分亦復不有故云十方國土皎然清淨皎然者周遍洞徹清淨者不見有一法可當情也至此則覺所覺空唯有空存按耳根圓通此當空結若執此為是又為空所礙矣若進觀此空非斷乃是識性洞然在於大覺心中故云譬如琉璃內懸明月自是身心快然以能出離空礙故也出離空礙則空所空滅惟有滅存按耳根圓通此當滅結若執此為是猶為頂墮細障若進觀此滅乃對生言滅滅亦非真則生滅既滅故得妙圓平等蓋以無妄不盡曰妙無真不極曰圓始本不二曰平等自是三空頓朗二死忽空故曰獲大安隱寂照互融智斷具足故曰一切如來密圓淨妙皆現其中良以密圓即是智果謂收之則密放之即圓淨妙即是斷果謂體之則淨用之則妙是諸佛之所證故曰一切如來圓通因心頓該果海故曰皆現其中按耳根圓通此當寂滅現前寂滅現前一念不生故曰是人即獲無生法忍論悟證己齊佛境所謂理由頓悟乘悟併銷是也論事修唯在三漸顛倒亂想從此頓息虗妄輪回自是不復有矣三教以漸修從是漸修隨所發行安立聖位事非頓除因次第盡故教以從是漸修垢盡鏡明水長船高故示以隨所發行安立聖位謂發行有淺深立位有勝劣至下經文自見正釋竟三結成是則名為第三增進修行漸次此言果能違其現業以至獲無生忍則是從凡夫地第三增進觀行修行漸次前云如淨器中除去毒蜜即喻此也總結三漸竟二乾慧阿難是善男子欲愛乾枯根境不偶現前殘質不復續生執心虗明純是智慧慧性明圓鎣十方界乾有其慧名乾慧地二漸次中淫心永斷故曰欲愛乾枯三漸次中忘塵盡根故曰根境不偶解結中義當此根初解先得人空與小乘四果位齊故云現前殘質不復續生殘質為最後之身不續謂後有永斷此上約第二漸次及第三前半以明乾義又第三漸次中十方國土皎然清淨故曰執心虗明執心者法執之心國土皎然故虗清淨無法故明解結中義當空性圓明成法解脫至此則人法雙空故曰純是智慧又第三漸次中妙圓平等獲大安隱故曰慧性明圓慧性即三空之慧妙圓平等之性獲大安隱故曰明圓但大安似約斷德究竟明圓似約智德究竟以唯是一心故無妨各說解結中義當解脫法已俱空不生至此乃得其全體此上約三漸後半以明慧義問既唯前義何故另開一位答上唯具體此兼起用故云鎣十方界鎣猶飾也莊嚴之義謂稱體起用嚴淨十方報土按圓通中即獲二勝發三用也雖能如是依然乾有其慧故立位以乾慧名之三十信二一躡前總起後位二別明當位十信初欲習初乾未與如來法流水接即以此心中中流入圓妙開敷前云欲愛乾枯未能盡習今以乾慧位中借嚴土以治欲習未得極盡故云欲習初乾菩提涅槃尚在遙遠故云未與如來法流水接如來法即指菩提涅槃對無明生死流稱菩提涅槃流也言未接者正見其當歷事造修不可以圓通頓悟為是故此心指乾慧終心中中流入有二釋一者中謂中道以自後位位皆不離乎中道故云中中二者中謂中庸以自後修習雖不廢事亦不過執惟是中中所謂不偏不倚任運流入是也圓妙開敷者謂流入無別仍前圓通妙性但位位增進如蓮開層層漸敷耳二別明當位十信十一信心二念心三進心四慧心五定心六不退七護法八回向九戒心十願心初從真妙圓重發真妙妙信常住一切妄想滅盡無餘中道純真名信心住從真妙圓之悟重發真妙之修理事併信故曰妙信永不退失故曰常住外道趣邪凡夫趣有二乘趣空皆為妄想一切俱遣故曰滅盡無餘滅盡妄想故中道真無有遺餘故中道純既真且純信心決定故名信心住也二念心真信明了一切圓通陰處界三不能為礙如是乃至過去未來無數劫中捨身受身一切習氣皆現在前是善男子皆能憶念得無遺忘名念心住真信者即前中道純真之信明了者明明了了曾不被諸法所惑也因不被諸法所惑故於一切諸法皆能以中道正理融會貫攝故云一切圓通此二句全是躡前信心成益以為此位之因自下乃正明此位陰處界三不能為礙者正由一切圓通所以陰不能覆處不能局界不能間也如是者謂陰等不礙如是乃至者超略現在言既陰等無礙不惟現在身中今應斷之習氣憶念無忘乃至過未無數劫捨身受身已應斷當應斷之習氣皆現在前皆能憶念無忘謂無忘修治之心猶言欲寡其過而未能也以其無忘治習常時憶念故即名其為念心住三進心妙圓純真真精發化無始習氣通一精明惟一精明進趣真淨名精進心由前習氣現前欲盡未能仍復依前妙圓之悟及中道純真之信抵對妄習磨鍊真精久之真益精而起融妄之力故云發化由此融妄為真故能令彼無始習氣通為一精明也無始約過去言不言現未者以過去既融現未者不復起故此上四句全約初信中力助治二信中習以成當位之因自下乃正明當位言既無始習氣通一精明則唯以精明之理歷事造修故云進趣雖歷事造修而不住有為故云真淨是則妄盡理圓功就不就故名此位為精進心四慧心心精現前純以智慧名慧心住承上進趣真淨不住有為心精時時現前智慧時時不昧至此慧心決定純以智慧涉事故以慧心住名之住即決定義也五定心執持智明周遍寂湛寂妙常凝名定心住前位純以智慧即是臨事之時皆執持智明以照之也以智照事事事如理故曰周遍寂湛此二句亦是躡前所證以成當位之因下二句乃正明當位寂湛不住大用繁興故寂而言妙雖大用繁興而不動不擾故凝而言常清涼云智周鑑而常靜用繁興以恆如此之謂也然既曰常凝則無不定時故即以此名定心住正脈云上五信屬五根如果木之種根結於地下五信屬五力如根結既久自有不可拔之力用也六不退定光發明明性深入惟進無退名不退心慧心似偏於慧以純以智慧故定心似偶於定以寂妙常凝故此則以定資慧故曰定光發明所謂淨極光通達寂照含虗空也又能以慧資定故曰明性深入謂深入於定所謂却來觀世間猶如夢中事也據此則定慧相資日損日益故曰惟進無退由此所以名不退心此位義當進力七護法心進安然保持不失十方如來氣分交接名護法心心進者定心日進安然者不假功力由此故能任運保持永不失於定心定心成就蒙佛慈光攝照故得與如來氣分交接蓋氣分即慈心氣分也據此乃由內能自護外感佛護故以護法心名之此位義當定力以由定心日進致故八回向覺明保持能以妙力回佛慈光向佛安住猶如雙鏡光明相對其中妙影重重相入名回向心按前不退心中定慧相資上位以定深而成護法之因故曰心進保持此位以慧明而成回向之因故曰覺明保持謂覺慧益明保持不失也正由保持不失故能以妙慧之力回答佛之慈光回答無別惟是向佛安住謂念念在佛境也然上位接佛氣分蒙佛慈光是佛心中有自己之影此位回佛慈光向佛安住是自心中有諸佛之影佛心中有自影時自己入佛心中自心中有佛影時佛已入自心中自入佛心中時已帶佛影以接佛氣分時自心即有佛故佛入自心中時已帶自影以回佛慈光時佛心即有自故是則自心佛心重重相入故云猶如雙鏡等也雙鏡相對喻自心佛心慈慧相應其中妙影喻佛心中有自己之影自心中有諸佛之影重重相入喻自入佛心中時已帶佛影佛入自心中時已帶自影是則自心佛心非一非異不妨於無回向中強立回向又上位自心接佛氣分諸佛回答自心以慈光向己此位由蒙佛慈光妙力回答佛慈以自心向佛故自得回向之名五力中義當慧力以由覺慧益明致故九戒心心光密回獲佛常凝無上妙淨安住無為得無遺失名戒心住心指自心光指佛光回與回同言上二位自心回向於佛佛光回向於己俱屬潛通冥應故曰密回此雙承上二位以為當位之因自下乃正明當位獲猶得也謂由密回力故獲得佛定也那伽大定無不定時故曰常凝不唯得定且能得果故曰無上妙淨妙即菩提出煩惱纏故淨即涅槃離生死穢故而言無上者即是佛也自是上求佛道信知無佛可成下化衆生信知無生可度故曰安住無為信力增長不起絲毫有為之念故曰得無遺失此位名戒心住者以獲佛常凝即定共戒無上妙淨即道共戒無為無失即律儀戒五力中義當信力以無為正信無遺失故十願心住戒自在能遊十方所去隨願名願心住住戒自在者定共道共律儀任運清淨故定戒常凝得三昧樂正受意生身以三昧力得自在樂普入諸剎隨意無礙道戒妙淨得覺法自性性意生身覺了諸法自性如幻本無所有故能普入律儀無為得種類俱生無行作意生身隨諸衆生種類現形如鏡現相而無作為由此故能遊於十方不惟遊於十方且能所去隨願謂願何所去一念即至由此所以名為願心義當念力以憶念不忘乃成願故正脈云通論十心前六修自心後四合佛德灌頂云初一信之本體後九信之德相又前九屬內行德後一屬外化德愚謂十心中六心皆帶住字餘四例知應有良以寂滅現前時悟證已齊佛境況復十信豈更有退是知十信之名乃借漸名頓借偏名圓實不同偏漸教中十信輕如鴻毛也十信竟四十住十一發心住二治地住三修行住四生貴住五具足住六正心住七不退住八童真住九王子住十灌頂住初阿難是善男子以真方便發此十心心精發暉十用涉入圓成一心名發心住五根具足名善以善根決定故五力成就曰男以能辨後位故真方便即指耳根圓通前云聖性無不通順逆皆方便初心入三昧遲速不同倫故知耳根圓通獨為真實方便以是十方薄伽梵一路涅槃門故餘皆為似以其非是常修學淺深同說法故十種信心不離圓通妙性故云以云發也依此十心磨鍊治習則圓通之心益精益明故曰心精發暉十用涉入者上是漸發此乃圓融如十心中隨發一心餘之九心皆涉入此一心之中心心皆然遞互相攝相入至此則菩提之心真純無妄故曰圓成一心一心即菩提心也按起信論菩提心有三種一直心正念真如法故二深心樂集一切諸善法故三大悲心廣度一切諸衆生故而十心中初一中道純真即是直心從二至九皆為深心後一能遊十方義含悲心既十用涉人則隨起一心即三心具足故得圓成菩提之心以圓成故得發心住名二治地住心中發明如淨琉璃內現精金以前妙心履以成地名治地住依菩提心重起真智故曰心中發明菩提之心清淨皎潔故以琉璃喻之真實之智體精用明故以精金喻之以前妙心履以成地者謂真智一發運用前之十種妙心修真實行踐履真如以成進趣後位之地如山徑之蹊間介然用之而成路相似由此所以名治地住也三修行住心地涉知俱得明了遊履十方得無留礙名修行住心即前之妙心地即前所履地然妙心既十用涉入而所履之地亦十心涉知涉知故一心明了心心皆然故云俱得明了俱得明了故時時證真真無不融故能遊履十方得無留礙自是分身無數遍十方剎上供諸佛下利衆生以是名為修行住也問此與願心中能遊十方所去隨願語頗相似義何所別耶答彼是意生身此是現化身又彼云隨願似是徑往一方此云無礙明是遍入剎塵則勝劣固自分矣四生貴住行與佛同受佛氣分如中陰身自求父母陰信冥通入如來種名生貴住種真之行因該果海故曰行與佛同因該果海果即徹於因源故曰受佛氣分前護法心中云十方如來氣分交接蓋指慈心氣分此云受佛氣分意言真如氣分固不同也次二句舉喻言初住發心如前陰起惑二住治地如前陰造業三住修行如中陰持種遊行此既行與佛同受佛氣分故以中陰自求父母喻之佛雖未與明記以相陰信知其不退初心自雖未得顯證已得冥通覺其必證極果是知陰信冥通正是感應道交如同業相纏結成胎分故云入如來種入如來種如託王胎故名生貴住也五具足住既遊道胎親奉覺胤如胎已成人相不缺名方便具足住前云入如來種即是結成道胎而云遊者謂依此修因自在無礙如貴人處胎安樂無拘永嘉云潛幽靈於法界即斯義也自是常蒙諸佛護念法身漸漸證入故曰親奉覺胤謂親奉大覺護念為法身之胤嗣也方便智慧漸漸具足故喻以如胎已成人相不缺謂胎中七七日滿根形具足也以是義故名方便具足住六正心住容貌如佛心相亦同名正心住權智外現故曰容貌攝化衆生方便具足故曰如佛此牒上位以為當位之因自下乃正明當位以權資實內照真如名為心相理智圓滿故曰亦同同佛故成正知見如胎中七七位後心相漸著故以正心為名七不退住身心合成日益增長名不退住五住權智外現容貌如佛曰身六住實智內照心相同佛曰心兼此二義為七住因故曰合成即權實具足也權實具足二利兼進故曰日益增長如在母胎備經十月有成無壞故曰不退此與六信雖同名不退而淺深有異以彼為信心不退此為住道不退也八童真住十身靈相一時具足名童真住承上日益增長權益勝而實益深故曰十身靈相一時具足以十身為別權實二智為總如十身中菩提身法身威勢身三身皆屬實智以是自證境故願身化身力持身意生身福德身五身皆屬權智以是化他境故相好莊嚴身智身二身通於權實以相好莊嚴有報化智慧有自證化他故也按華嚴八地方具十身今經八住便具者以二經皆屬圓教固應前後互融況華嚴信滿成佛十身豈不具足但文在八地中顯言靈相者神妙無方之義此如胎滿初生雖六根四體一一圓成而純朴未散情染未形故以童真為名九王子住形成出胎親為佛子名法王子住上位十身具足即是形成出胎此牒前為因也次句乃正明當位五住中既遊道胎尚為道之所局未大自在故但言親奉覺胤而不言為子今則得大自在頓超理障能任佛法大事故曰親為佛子如世王子過十五歲稍有知識便具人君氣度以是名為法王子住十灌頂住表以成人如國大王以諸國事分委太子彼剎利王世子長成陳列灌頂名灌頂住上位名法王子即是表以成人謂表顯以為成佛人故此是牒前為因如國下正明當位佛欲與之授記先令代佛宣揚教化衆生故喻以如國大王等國大王即剎利王也剎利此云尊姓國事分委者王意以國事重大恐其不勝先且分其少分委而試之委猶託也此喻佛欲與記恐其智力不堪先令代佛宣揚攝行佛事若見其智力增長度生不怖即便與之授記故喻以彼剎利王等世子即是太子以歷世相承為王故長成者堪任國事喻菩薩智力增長度生不怖陳列者陳列四大海水灌頂者灌太子頂令其受王職位喻佛智力加被與之授記令其具足十力墮在佛數如華嚴云轉輪聖王所生太子母是正后乃至云取四大海水置金瓶內王執此瓶灌太子頂是時即名受王職位菩薩受職亦復如是諸佛智水灌其頂故是名菩薩受大智職具足如來十種力故墮在佛數然華嚴位在十地今經位在十住者以二經同宗俱有圓融行布二義約行布不無優劣以彼喻轉輪王子此喻剎利王子自不同耳若約圓融則前後該徹如前八住中明末句就喻立名可知十住竟五十行正脈云前十住方生佛家領佛家業此十行則攝行佛事也又大乘初心固即二利兼行而信住位中利他未勝故前二十四位並無顯標度生事業自下乃漸以彰顯今十行與華嚴對校明是六度而後五度乃開智度為五亦不與常途十度同也十一歡喜行二饒益行三無瞋行四無盡行五離亂行六善現行七無著行八尊重行九善法行十真實行初阿難是善男子成佛子已具足無量如來妙德十方隨順名歡喜行八住初生九住漸長十住受職故云成佛子已具足無量如來妙德者按華嚴此菩薩學習諸佛本所修行憶念諸佛本所修行乃至云住持顯現演說諸佛本所修行則佛德無不具矣十方隨順即是廣行布施華嚴云隨順方土有貧乏處以願力故往生於彼豪貴大富財寶無盡行財施乃至身肉不惜行法施則與說三世平等乃至菩提涅槃即隨順義也正脈云此則施度以華嚴首標此菩薩為大施主故結名歡喜行者有二義一者見有來乞者作福田想作善友想倍生歡喜二者隨乞施與令諸衆生悉皆滿足生歡喜心此亦華嚴中義二饒益行善能利益一切衆生名饒益行既歡喜已乃以戒德感化故曰利益言善能者戒德備於己感化成於外不勞費力而利無不周故正脈云此是戒度以華嚴首標此菩薩護持淨戒故結名饒益行者亦二義一者自能住無上戒善自饒益二者令他住無上戒亦饒益他詳如華嚴茲不繁引三無瞋行自覺覺他得無違拒名無瞋行既饒益已仍復以自覺之理覺悟於他其猶執柯伐柯其則不遠故得他無違拒無違拒故瞋恨無所由生據此則他不能覺即是違拒厭而捨化即是瞋恨今以自覺覺他他易覺而己不厭以是名為無瞋恨行正脈云此是忍度以華嚴首標此菩薩常修忍法故但彼名無違逆行蓋以甘受外難無違逆他名忍此名無瞋恨行乃取自無瞋恨堪忍教化名忍也四無盡行種類出生窮未來際三世平等十方通達名無盡行既無瞋恨仍復隨彼衆生一切種類在在出現處處受生故云種類出生生界無盡菩薩之願行亦無有盡故云窮未來際既能窮未來際則三世平等普入既能種類出生則十方通達俱隨是則橫豎皆無有盡故以無盡行為名正脈云此則進度以華嚴首標此菩薩修諸精進故但彼名無屈撓行蓋取一切境界無能屈折阻撓名進此名無盡行乃取一切時處皆能教化利益名進也五離亂行一切合同種種法門得無差誤名離癡亂行既能橫遍豎周自能與一切衆生合其心而同其事故云一切合同既一切合同自能隨類說法故云種種法門機對教而受益教對機而化行故云得無差誤如是則千難交攻而其智不昏萬機並赴而其心不擾由此故名離癡亂行正脈云此是禪度以華嚴首標此菩薩心無散亂堅固不動故若依今經即以不癡不亂為禪六善現行則於同中顯現羣異一一異相各各見同名善現行上位隨類現身一切合同乃從本起末如觀音一身能現三十二應為天現天為人現人等是今云同中現異是從末起末如一天身中又復對彼異類羣機顯現衆多異類身形人身等亦然故云則於同中顯現羣異雖顯現羣異而彼天衆於諸異相還見同己人衆等亦然故云一一異相各各見同據此則是一身能現衆多身衆多身中現一身由此所以名善現行正脈云此是理事無礙智與今疏意見不同灌頂云即智慧度又自釋云若非法界大智何能圓融顯現愚謂仍是慧度以一多無礙同異俱成正由菩薩無障礙慧善巧運用之所現故七無著行如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙名無著行承上善現身相已如是矣不唯身相乃至世界亦皆善現無礙十方下正明善現世界之相十方虗空滿足微塵者顯微塵之多並明能現者狹一一塵中現十方界者顯世界更多並明所現者廣能現所現二俱不壞其相名為現塵現界謂塵在界外不壞狹相界在塵內不壞廣相同時俱現故云不相留礙正脈云界入塵而界不小是小不留於大塵含界而塵不大是大不礙於小也華嚴云華藏世界所有塵一一塵中見法界亦同此義溫陵云此由善現行擴充圓融也結名無著行者依華嚴但是一切無著正脈云一有執著安能大小並融如此若依本經無著即是忘塵忘塵功極便能身心圓明不動道場於一毛端遍能含受十方國土等如前顯見無礙中明是知現塵現界不相留礙正由忘塵功極故以無著行名之正脈云此是事事無礙智灌頂云即方便度引華嚴此菩薩以方便化度故愚謂塵界互現大小相融正由菩薩無障礙慧大方便力之所運用八尊重行種種現前咸是第一波羅蜜多名尊重行承上不惟現身現土而一切菩薩無量妙行一時具足故云種種現前隨舉一行皆能到於最上究竟之處故云咸是第一波羅蜜多言第一者最上義波羅蜜多者究竟義又梵語波羅蜜多此云到彼岸謂離生死此岸度煩惱中流到涅槃彼岸蓋涅槃彼岸即是究竟處也又若住於涅槃雖稱究竟猶非第一蓋必不住涅槃不住生死往返度生無住而住方名第一以是無住處大涅槃故如華嚴經云菩薩住此行時不捨菩薩大願不住生死此岸不住涅槃彼岸不住煩惱中流而能運度此岸衆生至於彼岸無憂惱處而菩薩往返無有休息即今經第一波羅蜜多義也結名尊重行者以行至如此可尊可重故華嚴名難得行如世間可尊重物則難得也正脈云此是究竟彼岸智灌頂云即是願度以華嚴謂此菩薩於大乘願不退轉故愚謂種種現前咸是第一波羅蜜多乃菩薩以願導行之所致也九善法行如是圓融能成十方諸佛軌則名善法行承上種種妙行咸是一行名純而一行中具足種種妙行名雜如是純雜無礙故曰圓融清凉云萬行芬披此華開錦上即目此也依此妙行遍歷十方助佛轉輪教化衆生故云能成十方諸佛軌則結名善法行者謂一言一行同歸至善皆是佛法可謂軌轍可為準則故如華嚴云此菩薩能自清淨亦能以無所著方便而普饒益一切衆生等是也正脈云此是軌生物解智灌頂云即是力度自釋云具足三力謂修習力思擇力變化力各有文證恐繁不録愚謂所以能成善法者正由上位尊重行力之所致故十真實行一一皆是清淨無漏一真無為性本然故名真實行一一二字通該前之九行言上之善法及與前八雖大用繁興而常自如如故曰清淨清淨者即如如不動義也如如不動則離於念相離念相者等虗空界即是如來平等法身故曰無漏蓋以起心動念即乖法體即成有漏故也一真二句乃釋成皆是之義言所謂皆是清淨無漏者蓋以一真無為性本然故言一真無為等者謂菩薩當寂滅現前之時俱空不生一真獨露即證無為豈不清淨後雖獲二殊勝發三妙用歷位至此皆出於性之不然豈更有漏若爾前何不說以事修至此乃敢定故據此則行行皆真法法皆實以是義故名真實行正脈云此是會緣入實智灌頂云即是智度又自以三智釋之謂無相智成熟有情智受用法樂智亦各有文證不録愚謂清淨無漏正由圓通根本智之所成故右列十行應以十玄會之以顯圓妙第一成佛子已具足無量如來妙德如海之一滴具百川味即同時具足相應門第二一切衆生受益各別彼此隱顯如秋空片月晦明相並即隱顯祕密俱成門第三自覺覺他得無違拒如金與金色不相捨離即諸法相即自在門第四窮未來際三世平等如一夕之夢翱翔百年即十世隔法異成門第五種種法門得無差誤如琉璃之瓶盛多芥子即微細相容安立門第六同中現異異中現同如一室千燈光光涉入即一多相容不同門第七現塵現界不相留礙如一尺之鏡現千里影即廣狹自在無礙門第八種種現前咸是第一波羅蜜多如擎拳豎眉觸目皆道即托事顯法生解門第九如是圓融能成十方諸佛軌則如兩鏡相對傳耀相寫即因陀羅網境界門第十一一皆是清淨無漏如北辰所居衆星皆拱即主伴圓明具德門此依古德十喻對校經文略此會通其實一一行中皆具十門文雖不顯義可研尋十行竟六十回向灌頂云華嚴明回向即是發願良以有行無願行必茫然有願無行願惟虗設行願相資方到諸佛大涅槃海正脈引圭峯云回向不過三處即衆生佛道真如也華嚴文極浩瀚意多遍兼三處今經文簡各有隱顯如衆生顯餘二則隱佛道真如隱顯亦然顯者正當發揮隱者亦以意含非全無也十一離相回向二不壞回向三等佛回向四至處回向五無盡回向六平等回向七等觀回向八真如回向九無縛回向十無量回向初阿難是善男子滿足神通成佛事已純潔精真遠諸留患當度衆生滅除度相回無為心向涅槃路名救護一切衆生離衆生相回向是善男子指前歷修十行人也初行隨順十方二行普皆饒益乃至第七現塵現界不相留礙則妙用已極故曰滿足神通八行種種究竟九行成佛軌則乃所作俱備故曰成佛事已十行清淨無漏故純潔精真一真無為性本然故故遠諸留患此全躡前之十行以起初向義也既無留患則任運度生不見有生可度故曰當度衆生滅除度相然既曰度生則是回無為心以不住無為故也既曰除相則是向涅槃路以能達涅槃故也結名救護等者以上云度生有二義一者度令離苦即是救義二者度令得樂即是護義上云滅除度相約能度言此云離衆生相約所度言良以能所對待有能相必有所相今以不見自為能度故亦不見他為所度內外既空中亦不見度生之法是為三輪體寂乃真除相真離相也故華嚴云不見衆生相乃至想見不顛倒等若以三處會通者此位正向佛道以涅槃即佛道故亦兼向餘二以救護即向衆生離相即向真如也二不壞回向壞其可壞遠離諸離名不壞回向壞即上位滅除可壞即上位度相此承上位以起當位義也言既壞其可壞則三輪體空一切皆離名曰諸離若即守此諸離依然有壞故須並此亦復遠離結名不壞者以上位滅除度相是以空壞有此位遠離諸離乃以有壞空空有俱壞體合真如以真如不可壞故此位明是回向真如亦兼於二以壞其可壞意在回向佛道而遠離諸離仍復回向衆生問初信中道純真與此何別答彼約圓融此約行布凡有前後相似者皆準此知三等佛回向本覺湛然覺齊佛覺名等一切佛回向上位體合真如此位體中具照故以本覺稱之體既不壞照即澄清故以湛然稱之湛然故無法不悉無理不明故曰覺齊佛覺結名等一切佛者謂覺用既等一切悲智願行無不皆等也此位明是回向佛道若約悲智願行俱等亦兼餘二四至處回向精真發明地如佛地名至一切處回向二向體合真如已得不變之體故曰精真三向本覺湛然復獲隨緣之用故曰發明此雙承上二位為當位之因也言既精真發明自能以理融事以理融事則事如理融不惟覺齊佛覺兼復地如佛地地如佛地則不離本處而遍至十方故名至一切處也按華嚴此位菩薩廣修供養遍至佛處又云三業普入一切世界以作佛事然既曰廣修供養遍至佛處必是求佛所證則兼二義一回向真如二回向佛道既曰普入世界以作佛事必是利樂有情則是回向衆生五無盡回向世界如來互相涉入得無罣礙名無盡功德藏回向三向覺齊佛覺則現身無礙四向地如佛地則現界無礙現身無礙則能涉入界塵現界無礙則能涉入身毛故云世界如來互相涉入如云於一毛端現寶王剎坐微塵裏轉大法輪一多相容類一室之列千燈廣狹自在若尺鏡之映千里故云得無罣礙一一佛身一一世界皆能成就衆生莊嚴己德故結名無盡功德藏也又華嚴云住此回向時得十無盡藏一見佛二入法三憶持四決定慧五解義趣六無邊悟七福德八勇猛智覺九辨才十力無所畏以如是等皆無盡故若會通三處者以此證理則是回向真如以此趣果則是回向佛道以此化他則是回向衆生六平等回向於同佛地地中各各生清淨因依因發揮取涅槃道名隨順平等善根回向承上身依於界故云於同佛地成就無盡功德之藏故云地中各各生清淨因言清淨因者以上無盡功德純是佛因不雜餘乘故此全躡上位言也依彼淨因展轉擴充名曰發揮由擴充故直趣佛果故曰取涅槃道結名隨順平等善根者以任擴充發揮無違佛因故曰隨順與一切佛因亦無有二故曰平等佛果無盡功德皆從此生故曰善根此位明是回向佛道若約擴充發揮自他兩利亦兼餘二以自利向真如化他向衆生故華嚴名堅固善根者正以依因發揮無有退轉如彼經頌云如是回向諸善根平等堅固無退轉一切諸佛所覺了悉皆攝取無有餘七等觀回向真根既成十方衆生皆我本性性圓成就不失衆生名隨順等觀一切衆生回向上位既能隨順平等善根則是真根既成由此重起大悲等觀衆生故云十方衆生皆我本性以衆生佛性與自己佛性同故此正所謂同體之悲也性圓成就不失衆生者謂衆生既皆我之本性而我性圓滿成就豈可遺彼衆生而不度脫故須不失結名等觀一切衆生者以首言十方衆生皆我本性即是等觀末言不失衆生即是隨順此位明是回向衆生若令衆生復還本性即是回向真如若令衆生同證菩提即是回向佛道如華嚴頌云菩薩普與平等願隨其所集功德業普令三界得安隱悉使得成無上果八真如回向即一切法離一切相唯即與離二無所著名真如相回向上位既言不失衆生則建化門頭不捨一法故云即一切法雖云即一切法而亦不住於法故云離一切相以皆我本性故此躡上位言也至此則正即時離正離時即故云惟即與離二無所著所謂離即離非是即非即言語道斷心行處滅逈絶諸妄永無異體故結名真如相也此位明是回向真如若據結名亦是以真如相行回向佛道若準華嚴亦兼回向衆生如彼經頌云一切衆生與諸法悉住其中無所住真如所在無不在不得自性是真性菩薩以此心回向悉令衆生無所著九無縛回向真得所如十方無礙名無縛解脫回向上位二無所著名真如相者蓋言無所著行如彼真如之相此位承牒上意故言真得所如謂其行純真已得為真如所如矣然真如體遍十方而無障礙而其行既為真如所如自應同彼能如故亦言十方無礙無礙故不能羈繫故曰無縛無縛故出入自在故云解脫正脈云上位方得離繫解脫此位轉得自在解脫愚謂上位但是我不著彼此位乃是彼不縛我正由我不著彼彼乃不能縛我故華嚴名無著無縛解脫心回向若以三處會通者解脫則菩提可成即回向佛道無縛則攝生無礙即回向衆生無著則一念不生即回向真如十無量回向性德圓成法界量滅名法界無量回向上位無縛解脫即是性具德用圓滿成就故此承牒其意以為當位之因但上云十方無礙猶有法界分量今則性德圓成緣起無盡並彼十方分量亦無故云法界量滅言法界者即指十方法界非言十法界也以此無量德用回向三處故以法界無量名之華嚴云佛子善學此回向無量行願悉成就攝取法界盡無餘是故能成善逝力然既曰攝取法界則是回向衆生既曰能成善逝則是回向佛道又力字亦兼回向真如謂善逝以真如自性緣起為力也通前十向之文依前生後自有次第不依古德另立十中及強配十玄幸具眼者辨之總結十回向竟七四加行按瓔珞等經俱不別列此位若唯識等論則以前為資糧後為通達此為加行今雖別列而與唯識淺深懸殊以經中特標其為妙圓加行故若以喻明者如平人與本國大王同時發心欲登泰山同辦資糧擇日起程而平人之資糧所備不過數金若王之資糧動用千萬及乎起程平人不過一騎二驥若王之起程千駝萬馬再平人之一騎二驥尚多阻隔若王之千駝萬馬山開水橋尅期必登是故前之資糧業已超乎漸教此之加行豈復類彼權宗以喻詳法淺深自見是知前雖任說妙圓終是資糧此之妙圓乃稱加行亦圓融中行布意也二一結前起後二正明四加初阿難是善男子盡是清淨四十一心次成四種妙圓加行三漸之後即稱善男以不住妙悟有向上之心并丈夫之氣故雖熾然修行而不住於相故曰清淨始自乾慧終於十向故曰四十一心位位備歷故置盡言此結前也次成者次後即成四種者如下所列雖曰加功用行仍不離圓通妙性故以妙圓稱之又妙圓二字寓有兩重揀別一揀小乘粗而非妙二揀權宗偏而非圓至究其所以能揀者亦以其不離圓通妙性此起後也二正明四加四一暖位二頂位三忍位四世第一位初即以佛覺用為己心若出未出猶如鑽火欲然其木名為暖地此位躡前九向義來言九向中無縛解脫因心之德用已極已極則無可更用故此位即以佛覺用為己心謂體擬佛果德相業用為自己加功用行心也但因心欲亡未亡果用欲顯未顯故云若出未出猶如下乃喻明若出未出之相鑽火者鑽木求火喻行人自研因心以求果覺用也欲然其木者暖相現前喻所求果用將欲超出因心雖未即能已略現其相矣以是義故名為暖地唯識此位入明得定發下尋伺創觀名義自性差別四法皆空今則惟是以加行智觀因心空也二頂位又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地此位躡上十向義來言十向中法界量滅十方全成自心故此位即以自心成佛所履謂體觀自心即佛境界親依法性為諸佛所踐履也但以心相未能全忘不能實即佛境故曰若依非依如登下乃喻明若依非依之相如登高山身入虗空者喻體親自心即佛境界親依法性上云若依是也下有微礙喻心相未能全忘不能實即佛境親依法性上云非依是也以是義故名為頂地唯識此位入明增定發上尋伺重觀名等四法皆唯識變今則惟以加行漸增智力體觀自心即佛境耳問三向中本覺湛然覺齊佛覺四向中精真發明地如佛地義略似於暖頂二地前後淺深如何分別答三向但是體中具照四向方乃以理融事故曰齊曰如宛有二相至此則言為言成要泯異體此前後淺深其相不難辦也三忍位心佛二同善得中道如忍事人非懷非出名為忍地暖位以佛覺為己心而猶未能頂位以自心為佛境而亦未能故此位則心佛二同善得中道言心佛二同者謂佛覺泯同因心因心泯同佛境雖心佛歷然而因果融即也因果融即二俱不捨常於加行心中見佛業用亦於諸佛行處洞徹自心故曰善得中道雖曰善得亦唯心中了了吐露不出故曰如忍事人忍事人者善能忍事即喻善得中道人也非懷非出者亦欲訴向於他而不能啓齒喻善得中道者心中了了亦欲說向於人但以心佛二同實無能得所得而吐露不出以是義故名為忍地唯識此位入印順定發下如實觀印定四法是空今則唯以加行決定智力印前心佛相即義耳四世第一位數量銷滅迷覺中道二無所目名世第一地前三位位位遷變名世數中邊各別名間量故此位則數量銷滅以加行位滿無可遷變邊中不立間量叵得故正以無可遷變間量叵得故云迷覺中道二無所目言迷覺中道者謂暖頂二位迷於中道以暖位以佛覺為己心頂位以自心為佛境各墮一邊故至忍位則覺於中道以經中明言善得中道故也二無所目者迷覺兩忘中邊不立迷覺兩忘故超變易之世數中邊不立故絶彼此之間量以是易故名世第一地言世第一者謂此人在世間中稱為第一意顯入地則是出世人矣惟識此位入無間定發上如實觀印二取空今則唯以加行成就智力於前三無所著耳問此上四加既不同於惟識而附引唯識者何也答名既同彼若不對校恐致混亂故附引彼說使權實偏圓瓜豆分明可別瓔珞等經多不列此四位者以此四位在向地兩楹之間應是十向出心初地入心合前合後無不可者後之等覺倣此通前四加行竟八十地地有三義一者位置義謂從初至十位置不同如地本是一而高下不等二者堅實義謂地地皆以真如為體不動不壞如地載華嶽振河海不重不泄三者生長義以地地皆能生長佛地功德如地能生長萬物問加行已得地名與此何別答前之位置約行位漸深此之位置約果位漸勝前之堅實約行力堅固此之堅實約果體真常前之生長約行地力用此之生長約佛地功德雖各具三義而淺深勝劣不同若通論前後諸位更為一喻如人欲入大海採取衆寶必先學習水法及櫓棹之技三漸是也水法既精櫓棹又熟乾慧是也十信如擇日起行住行向位如備辦資糧四加行如從淺至深漸入大海十地位如從劣向勝漸歷寶所等覺位如乍到最勝諸珍寶處妙覺位如已得衆寶從海而還遍濟窘乏六十聖位法喻歷然可對今明十地十一歡喜地二離垢地三發光地四𦦨慧地五難勝地六現前地七遠行地八不動地九善慧地十法雲地初阿難是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地此位迷覺中道二無所目此位當下離念真如現前故云於大菩提善得通達以真如即菩提體故言大菩提者五菩提中一發心菩提位當十信二伏心菩提位當三賢三明心菩提位當前七地四出到菩提位當後三地五無上菩提位當佛果應是無上菩提但是通達未即實證論實證方入初地乃乍得明心菩提也乍得明心菩提即能通達無上菩提如因一隙之明便能領略萬象故稱善得覺通二句乃釋成上二句義言所謂於大菩提善得通達者蓋以能覺之智遙通如來之智所覺之理該盡諸佛境界故也結名歡喜地者經論異釋難以俱録今依金光明云昔所未得而今始得如其所願悉皆成就生極喜樂故彼經即以極喜為名二離垢地異性入同同性亦滅名離垢地上位通達佛境無復九界異生之性名為異性入同此位以生佛對立生性不有佛境奚存故將同性亦滅結名離垢地者諸經論中多約離破戒垢今則唯以證佛境空名為離垢以有佛境當情猶為微細念相依然真如中垢故三發光地淨極明生名發光地淨極二字躡上以上位同性亦滅離佛念垢名曰淨極此位真如精純靈鑑無礙故曰明生譬如古鏡重磨光彩煥發以是義故名發光地經文最明無煩異說四𦦨慧地明極覺滿名𦦨慧地明極二字躡上以自覺理智圓滿故云明極此位依自覺理智起正法𦦨生方便慧燒盡衆生煩惱成就化他功德故曰覺滿譬如明上復生餘𦦨故以𦦨慧為名諸經多謂以菩提分法燒煩惱薪唯是自利今以上位發光似惟自覺此名𦦨慧應兼覺他且經中明言覺滿若唯自利豈當此稱圓人無定各以現文釋之不必強同五難勝地一切同異所不能至名難勝地三地自覺理同四地覺他法異故承言一切同異此位則自覺覺他二俱不立故云所不能至蓋以有異有同有自有他有能覺有所覺儼屬有為功用二俱不立乃超出有為故有為功用所不能至至尚不能況於勝乎以是義故名難勝地唯識謂此地真俗兩智行相相違合令相應極難勝故然彼真俗略似此經同異正脈云彼乃合之最勝此則逈脫難齊旨趣各別但相似而已六現前地無為真如性淨明露名現前地初地即證真如但是有為以是有作功用分顯故也至上位同異不至超出有為功用即契無為真如但是性淨尚未明露以有功習影尚未盡故至此則有功習盡無為理著故云性淨明露結名現前地者即以無為真如明明現前為名唯識云此位證得無染淨真如謂此真如本性無染亦不可說後方淨故然既曰本性無染略似此中性淨既曰證得略似此中明露但性相偏圓經論異旨不得全同七遠行地盡真如際名遠行地上位無為真如方以明露無分別智未能遠行以為理所障故至此位則盡真如際然真如無際以諸法為際蓋以無分限之理全遍有分限之事故此當理事門中理遍於事門也理既遍於事中智亦隨遍以理智不異如珠與光故能盡真如際結名遠行地者即以智能遠行為名華嚴云此地修十方便慧謂雖修空無相無願三昧而慈悲不捨衆生雖知諸佛平等法而常樂供佛雖入觀空智門而勤集福德雖遠離三界而莊嚴三界乃至雖知三世唯是一念而隨衆生種種劫數意解分別度脫據此則不捨衆生常樂供佛勤集福德莊嚴三界乃至隨衆度脫等正今經盡真如際也八不動地一真如心名不動地上位盡真如際不捨一法此位不捨一法盡真如際蓋以有分限之事全同無分限之理此當理事門中事遍於理門也事既遍於理中全事全理故云一真如心據此則雖遍行一切法不離真如際由此所以名不動地華嚴云入一切法本來無生等即此中一真如心義也灌頂云三漸所獲無生法忍至此方得親證圓成無惑矣九善慧地二一正明本位二總結修習初發真如用名善慧地此位正脈所釋明如指掌今全用之正脈云前位是得真如全體此位是發真如大用稱體起用自然之理華嚴金光多指功行而此經似說本真自體自用前位如一塵一毛皆清淨本然此位則一塵一毛皆周遍法界互涉互入即遍即包等具足十玄業用故云發真如用也結名善慧地者應即法界無障礙智耳問七行之塵界互現五向之依正互涉與斯何異答五地以前俱屬有功用行況在行向豈能同此是知七行由於行增上力五向由於願增上力然亦乘悟併發如觀音之二勝三用皆圓通已後即發也又云詳此十聖行相與華嚴多所不同故推聖言以求至理非敢妄生去取按華嚴唯識金光皆言此地具四無礙辦為大法師最善說法資中曰華嚴明此菩薩具四無礙智作大法師演說無量阿僧祇句義無有窮盡故名發真如用豫謂說法固亦可以說為發用然方是大用中一故今謂是十玄業用而說法自寓於中矣此上皆依正脈亦少有更減字句唯中間答詞不同若對前二位言則彼為理事無礙此為事事無礙用也二總結修習阿難是諸菩薩從此已往修習畢功功德圓滿亦目此地名修習位是諸菩薩者但是渾言尚未指定從此已往者乃指定二地已來諸菩薩也以自二地乃入修位至六地即入無為有作行畢七地增進無為八地一真如心無作之行亦竟故云修習畢功訖於九地已獲全體大用故云功德圓滿意顯十地為修習出心諸經論中多收於修習位中今捨出存正故亦目此地已前名修習位然既曰亦目非是定指此地為修習位盡但亦可目耳是知究竟修盡不唯十地應兼等覺以既未到佛地不可便說無修但證意多而修意少也十法雲地慈陰妙雲覆涅槃海名法雲地上言修習畢功功德圓滿應即取證涅槃而所以不取涅槃者蓋為利益有情故曰慈陰妙雲覆涅槃海陰字當作去聲言慈陰妙雲者謂菩薩於功德圓滿之後重起真慈陰覆衆生如萬里青天頓興微妙之雲陰覆世間同沐清涼之樂由此所以能障佛果不得取證故云覆涅槃海結名法雲地者正以其真慈如雲覆障涅槃法故十地竟九等覺位二一正明本位二結後證前初如來逆流如是菩薩順行而至覺際入交名為等覺上位以利益有情覆障涅槃若已出慈門即入果海所以不稱妙覺者以如來逆流菩薩順至言逆流者謂已至果海倒駕慈航出涅槃入生死也言順至者謂將窮果海急棹智舟違生死向涅槃也此約斷果言之若就智果則佛出菩提覺際菩薩入菩提覺際正相交會故云入交正脈云譬如入海採寶者前商已得衆寶逆流而出到於海門後商方以進取順流而入亦到海門是二船恰齊但船頭向外向內為不同耳瓔珞經云等覺照寂妙覺寂照亦斯義也結名等覺者義取與妙覺齊等或有言去妙覺位餘有一等非今經意問此上五十五位應出斷惑分齊庶得階降分明今惟依文釋義固為簡便但此經十行十向中境界有似十地不有斷惑分齊而取證淺深何所依憑答愚以凡心測度聖境誠難自信亦只好以聖言為定量經之所有敢不發揮經之所無誰許擅益詳觀本經位次不唯與惟識不同即華嚴瓔珞等經前後淺深與此亦不相類蓋以圓人因該果海果徹因源如華嚴十信滿心攝位證覺此經等覺深位獲乾慧心詎可以前後而論淺深然佛於圓融之中亦自寓有行布之意故今唯依現文銷釋所謂經中所有敢不發揮是也至於斷惑分齊唯於信位略顯如初信則曰一切妄想滅盡無餘此斷現種也二信則曰一切習氣皆現在前憶念無忘此伏習氣也三信則曰無始習氣通一精明此盡習氣也良以理由頓悟乘悟併銷但以欲習初乾未遇法流對境起念者時乎有之乃重以增上信力圓伏圓斷至三信則如木成灰永不再焰故自四信以去文中不涉斷惑一語愚又何敢妄贅所謂經之所無誰許擅益是也或曰斷既如木成灰證即如金出礦似亦不應復存後位今何位次依然照常俱列耶答曰金既出礦便可作器作之已精而益求其精有作功用是也不求其精而自無不精無作功用是也動帝王陳宗廟貯黃流盛甘露敬天地享神明全體大用是也社稷保之兆民福之慈陰妙雲是也倣古玩類極珍覺齊佛覺是也成至寶鎮庫藏妙覺究竟是也知此喻者則斷後立位不無理據然亦諸經論中之所不見而此經僅見之者蓋為接漸入頓接偏入圓此出自世尊靈智妙辨彼謬柱鼓瑟者豈足以語此哉二結後證前阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地從乾至等已者明由淺入深是覺始獲等者顯後唯證前良以初乾慧心即具後後位中一切功德但未經歷事造修唯是性具而非修成今乃由淺入深漸次修習以至等覺而於乾慧心中所具一切功德方以親證故曰是覺始獲等也金剛心即指圓通妙心以前從根解結如來即名其為金剛王寶覺如幻三摩提而觀音自陳亦言聞熏聞修金剛三昧至文殊揀選又謂宣說金剛王如幻不思議佛母真三昧等據此仍是最初乾慧但於等覺位中始得親證實到清涼云起明東廟智滿不異於初心古德云末後牢關不離最初一步皆此意也等覺位竟十妙覺位如是重重單復十二方盡妙覺成無上道如是重重者通指乾慧已來說也言始自乾慧已來如是一重一重有單有復至十二重方盡妙覺意顯位位皆覺但加前不妙登地妙而未盡佛地方盡乃原始要終而總言之正脈以一重但局一位為單總包十位為復極是但彼依溫陵取一乾單二信三住四行五向復六暖七頂八忍九世單十地復十一等十二金單今本疏乃除金剛足妙覺也成無上道者以既盡妙覺道極究竟無有能駕於其上者矣結上正明諸位竟二結顯修法是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入是種種地者通指已上因地與果地也皆以等者顯已上因地果地皆不離圓通妙心以耳根圓通即是金剛王三昧故言觀察等者謂每歷一位必有一位功業若不觀察恐生愛著故須依彼金剛三昧而觀察之如幻十喻者如大品云觀一切業如幻一切法如𦦨一切身如水月妙色如空妙音如響諸佛國土如乾城佛事如夢佛身如影報身如像法身如化不可取不可捨一切空故此中喻雖有十而所喻之法不出度生說法嚴土供佛而已然既曰不可取則無生可度無法可說無土可嚴無佛可供既曰不可捨則任運度生任運說法任運嚴土任運供佛既曰一切空則取捨雙忘忘心亦寂此依觀成止也止久沉滯遮於勝進故又於奢摩他中用諸如來毗婆舍那奢摩他義翻為止毗婆舍那義翻為觀如莊嚴論云安心於正定此即名為止所謂奢摩他正住法分別是名為觀相謂毗鉢舍那起信論云所言止者謂止一切境界相隨順奢摩他義故所言觀者謂分別因緣生滅相隨順毗鉢舍那義故今則唯以觀法體寂不住本位名奢摩他進觀前途功德引發勝進名毗婆舍那此依止成觀也止觀雙運不即不離故云清淨修證從因至果位位遍歷故云漸次深入知此法者既無中止之弊亦無過高之行位後顯此良有以焉三推重初心阿難如是皆以三增進故善能成就五十五位真菩提路承上因地果地皆以金剛觀察如是則功歸第三漸次以三種漸次結文雖具稱增進而標章惟第三受增進之名且第三增進即是耳根圓通亦即金剛三昧若不憑此觀察後位難成故曰皆以三增進故善能成就等又且第三漸末乃云從是漸修隨所發行安立聖位故知善能成就唯指第三漸次若論由淺入深通指亦可五十五位正脈謂前除乾慧後除妙覺信住行向地為五十四加等覺為五故言五十五位以經中明言真菩提路乾慧非真妙覺非路故除之也灌頂云亦可信住行向地為五十漸乾加等妙為五愚謂第三漸末明言從是漸修隨所發行安立聖位然既曰從是漸修則知前屬頓悟如人猛然想起家鄉尚未動身灌頂收三漸為路而從是之語云何銷會且又辨妙覺為路終是矯強既云隨所發行安立聖位而乾慧執心虗明純是智慧豈非是行乾有其慧名乾慧地豈非是位既有行有位則是已涉程途正脈以非真揀除亦屬臆見今依長水合轍並以信住行向地為五十乾慧四加為五等覺已至覺際如人已到門首不得復以道路名之故唯五十五也而言善成者即取其止觀雙運不即不離之義由此觀之則欲至覺際而趣妙覺者應須先歷諸位欲善成諸位者應須先修耳根圓通欲得耳根圓通者應須加意嚴戒欲得禁戒成就者應須首斷五辛古德云初步定千里之程一簣肇萬仞之山行遠自邇登高自卑則初心豈可輕忽乎哉四判決邪正作是觀者名為正觀若他觀者名為邪觀上云是種種地皆以金剛觀察則位位之中不離圓通妙心又云如是皆以三增進故善能成就則未修之前即當先求頓悟是知耳根三昧不獨為聖位最勝準繩亦且為初心第一方便故云作是觀者名為正觀若捨此而修或著事而墮於有為或執理而沉於寂寞甚至中途成狂永陷魔外者比比而是故曰若他觀者名為邪觀如第一文云諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習亦斯意也通上正示禪那諸位竟二略彰所說圓滿阿難淫室歸來所請三名如來依次而說若果能依此則生信發解起行各有準繩不患乎菩提之不成矣誠恐將謂別有馳心更待漫將從前所說等閒看過故文殊於此諸名如來出名結答令知妙奢摩他三摩禪那義盡於此而云略彰圓滿者良以奢摩中密因久淪七趣三摩中修證時招五魔禪那中萬行多纏理障仍須詳辨以示將來至後校量持福結勸流通乃為大圓滿也二一文殊請名奉持二如來出名結答初爾時文殊師利法王子在大衆中即從座起頂禮佛足而白佛言當何名是經我及衆生云何奉持請名奉持以文殊為當機者顯總持全經非具根木大智法王真子不足興有為也起禮而白者重其事故名者義之表也今如來歷明妙奢摩他三摩禪那義亦略周故文殊請名表彰言當何名是經者正求佛因義立名俾海衆因名思義耳奉謂奉以自修持謂持以教人蓋文殊義雖冥通名未顯聞奉以自修無可不可持以教人憑何指授至若一切衆生義既未能盡悉名又不得與聞自修教人二者俱失恐佛不說故又急之曰我及衆生云何奉持二如來出名結答六一境智名二機益名三性修名四要妙名五因果名六總結答初佛告文殊師利是經名大佛頂悉怛多般怛羅無上寶印十方如來清淨海眼佛告文殊者因文殊出題名曉大衆也是經二字上指三分下通五題正脈云大等十三字全當科之境字境即諦也為智所對而以三諦釋之茲不俱引又云十方如來明諸佛同證也又云上之三諦即心海全體大用以智圓照此之心海名曰清淨海眼此正脈從境智為名相沿承用既久難以遽易姑從彼略釋愚謂此以尊勝為名所言大者即衆生心最尊最勝故以佛頂表之悉怛多般怛羅此云白傘蓋白為衆色之本即心真如門傘蓋為展覆之具即生滅門餘於顯示呪益中釋經以此名者顯經中所詮即同起信一心二門等義也得此法者可以出世成佛為法中王如世傳國之璽得之者可以為天下君故以無上寶印稱之十方如來所說十二部經清淨妙理皆從此中流出故以海眼稱之據此則成道說法全依乎此不益見其為尊且勝乎二機益名亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海正脈云阿難登伽正是此經當機凡務多聞而未全定力者皆準阿難凡欲惑熾然不思出要者皆準登伽又云菩提心即前三諦圓融之心遍知海即前遍照三諦海眼但於前題中加當機獲益勸人欣此入此也此正脈從機益為名亦依彼略釋愚謂此以力用為名親因者歷劫親眷互相因依憑此救護即是力用如度脫阿難及此會性尼即其事也若但令離分段苦得小乘樂猶未顯其力用故云得菩提心入遍知海言得菩提心者即是頓悟因心三菩提中真性菩提入遍知海者即是究竟果海十果號中正遍知號然阿難一向多聞性尼宿為淫女一旦得此入此其力用不益見其勝乎三性修名亦名如來密因修證了義正脈云如來密因為性具依此起修方成真因權小不知故曰密也又云雖知本有不妨於無修證中而起修證故曰了義非同染實之修不了義也此亦依正脈略釋愚謂此以理觀為名如來密因即是所觀之理近具根中遠該萬法亦即三如來藏之全體大用悟此則為成佛因心不悟則但是密具而已信知有此故即依之立為觀境言修者即指觀行為修非歷事造修如云初於聞中入流亡所等皆修也言證者即指妙悟為證非歷位取證如云此根初解先得人空等皆證也而言了義者有二義一謂依此修證亦唯了悟如來密因之義二謂攝義已盡了無餘義可修可證詳如總釋名題中辨四要妙名亦名大方廣妙蓮華王十方佛母陀羅尼呪正脈云上七字為最妙又云此大乃直目性體橫亘竪窮無邊底故方即是相有義相德相謂具足恆沙性德義故廣指用言稱體而周無障礙故益見斯經旨同華嚴矣蓮華取義甚多且略取於方華即果處染常淨二義亦即表於因果交徹染淨不二益見此經旨同法華矣又云末八字為最要佛母表其有出生義陀羅尼此云總持明其具含攝義又云一表出生多佛一表含攝多義豈非至道要術哉此亦略引正脈從要妙為名愚謂此以顯密為名蓋上七字為顯名下八字為密名也顯名稱大方廣者意明此經所詮即同起信論中三大並同華嚴如正脈說又稱妙蓮華王者蓮華稱妙已顯非常況復云王似指華嚴普光摩尼香水海中種種光明蕊香幢言以此華為無量香海無量華藏之所依住喻上三大為一切法門一切賢聖之所依故密名十方佛母者前云是佛頂光聚悉怛多般怛羅祕密伽陀微妙章句出生十方一切諸佛十方如來因此呪心得成無上正遍知覺即佛母義陀羅尼此云總持謂總一切法持無量義故亦云遮持謂遮惡不起持善不失故此是諸呪通名冠以十方佛母則是通別合稱以此經原有顯文密呪故以顯密為名然顯名為聖賢所依密名能出生諸佛義亦相符所謂呪即密經經即顯呪者以此五因果名亦名灌頂章句諸菩薩萬行首楞嚴按此經原係中印土那陀爛寺大道場經於灌頂部中録出別行故名灌頂章句此依總彰別意顯此經所有章句皆屬灌頂部中出故灌頂疏云印土密部有五東方阿閦佛名金剛部南方寶生佛名灌頂部西方彌陀佛為蓮華部北方成就佛名羯磨部中央毗盧佛名如來部此經是灌頂部也然既屬灌頂則誦此章句者必蒙如來智水灌頂得大開悟依之修因則為諸菩薩萬行依之證果則為究竟堅固故本疏亦同正脈從因果為名六總結答汝當奉持此是結答之語猶云以是五種名字汝等當因名思義而奉持之正脈云蓋必以智照境隨機受益從性起修盡其要妙滿其因果方為能奉持也若依本疏初則顯其尊勝令生信樂次則彰其力用令知修習修習須依理起觀成觀須顯密雙修必至因圓果滿則奉以自修持以教人二俱究竟矣略彰所說圓滿竟三會衆頓悟漸證說是語已即時阿難及諸大衆得蒙如來開示密印般怛羅義兼聞此經了義名目頓悟禪那修進聖位增上妙理心慮虗凝斷除三界修心六品微細煩惱初蒙示兼聞說是語已謂出名結答已竟時也即於此時阿難及有學大衆重增一番新氣象矣得蒙等者正敘上所聞為向下悟證之由密印者即指圓通妙性三漸重明故曰開示得此可以成佛曰印衆生不知曰密亦即前之見性藏心等第一題中所謂無上寶印是也隨所發行安立聖位即是般怛羅義若通言摩訶悉怛多般怛羅此云大白傘蓋今既無上五字則唯取傘蓋義耳傘則自覆義多覆他義少蓋則覆他義多自覆義少良以諸位之中或約自利或約利他實各互具但有多分少分如傘蓋義故此皆三漸已後之所開示兼聞者文殊所請如來所答會衆同聽故五種名目雖各顯一義實一攝一切故通稱了義以一一皆攝義盡故又經稱了義名亦隨經六釋中當作有財釋也頓悟下頓悟漸證自三漸至等覺歷歷在心故曰頓悟禪那修進聖位自境智至因果通稱了義故亦兼悟題名增上妙理理名增上妙者以了義故正當頓悟之時一切心思智慮瓦解冰銷當體寂然故曰心慮虗凝三界煩惱有二一見惑初果見道位斷二思惑修道位斷今云三界修心顯是思惑也又思惑煩惱有三一欲界思二色界思三無色界思欲界思有九品前六品在二果向斷後三品在三果向斷上二界思八地各有九品共七十二品在四果向斷而阿難等原在初果今既心慮虗凝超二向至二果故云斷除三界修心六品即欲界前六品思也而言微細煩惱者對見惑說以見惑分別名粗思惑任運為細故正脈云本經從初歷談但言奢摩他及三摩提而未言禪那直至此處始一稱之下連修進聖位足顯談聖位處乃是說禪那耳自阿難請位以來至此說法復為一周名染淨因果周即阿難所請禪那義也按常途禪邪翻為靜慮以寂滅為義今經為滅十二類生顛倒亂想立三漸次即是靜義乾慧心中乾有其慧即是慮義即以此心中中流入即寂滅義圓覺疏釋為絶待靈心今經位位不離中道即絶待靈心也正脈云全取正因佛性雙兼緣了二因為禪那體今經三漸獲無生忍即是正因佛性奢摩他中用諸如來毗婆舍那清淨修證即雙兼緣了二因也題中諸菩薩萬行義統乎此齊此以前為開示禪那成修分竟四開示楞嚴成證分問正脈科為初心緊要今疏科為證分何淺深相背若是答圓人修證歸重初心初心緊要透過自然任運證入如後識陰盡處入乾慧地便云如是乃超十信十住十行十回向四加行心金剛十地等覺圓明入於如來妙莊嚴海足證此義若此與正脈亦不相違而所以異者惟以破前三分中障成就究竟堅固之義為開示首楞嚴耳三一精研七趣以破奢摩中障二詳辨五魔以破三摩中障三重明五陰以破禪那中障初三一阿難請問二如來讚許三正為說示初三一謝前述益二陳疑致請三舉獄例問初即從座起頂禮佛足合掌恭敬而白佛言大威德世尊慈音無遮善開衆生微細沉惑令我今日身心快然得大饒益座起禮足者有二意一為謝前二為請後合掌身業虔恭敬意業虔白佛口業虔謝前請後禮應爾故十二類生顛倒妄想一時頓銷故以威德世尊稱之修進聖位增上妙理盡情吐露故以慈音無遮稱之微細沉惑即指類生妄想非佛莫見非佛莫說故曰微細自所不覺自所不知故曰沉惑喻以揑目生華教以三漸除滅皆善為開示也喜聖位之可修知生死之不繫故曰身心快然因名思義奉持可憑故曰得大饒益此皆歸功於佛故曰令我等也二陳疑致請世尊若此妙明真淨妙心本來遍圓如是乃至大地草木蠕動含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生修羅人天等道世尊此道為復本來自有為是衆生妄習生起初按定現悟若此妙明等者通領前來所說心性遍圓義也心性有隨緣義故稱妙明心性有不變義故稱真淨雖隨緣而不變雖不變而隨緣故稱妙心奢摩中如來密因三摩中圓通妙體皆指此耳本來遍圓之義前已纍說但奢摩中隨語生信三摩中阿難輩亦唯相似解發今於禪那之後心慮虗凝細惑銷除乃得真悟故通領前來所說而按定之如是下因真疑妄如是者謂本來遍圓如是乃至者超略內之根身大地者即指外之器界草木又器界之微蠕動含靈又根身之細者言既遍且圓無法不周有物皆容故凡根身器界草木蜫蟲無非從心建立故曰本元真如謂推其本元惟是一真如性也然真如之性即是成佛真體以真如即是法身證此者可成佛故佛體真實者謂既是佛體相應真實今觀七趣僞妄不能無疑故曰云何復有地獄等也文顯六道等該仙趣故後文詳明有七世尊下躡疑為問有二一問性中本來自有二問妄想習氣生起其意以性中自有則七趣不應僞妄若妄習生起則即性之義不成且即性不成是心外有法興今現悟遍圓之義似不相符所以未敢深領而致問也後云精研七趣皆是昏沉諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空華元無所著但一虗妄更無根緒則二問俱釋矣三舉獄例問舉地獄例餘趣也又上陳二問一問性有二問妄生此則唯約妄生以問以有礙現悟故也二一舉人明墮二躡獄為問初世尊如寶蓮香比丘尼持菩薩戒私行淫欲妄言行淫非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒然墮無間獄琉璃大王善星比丘琉璃為誅瞿曇族姓善星妄說一切法空生身陷入阿鼻地獄初淫妄墮者持戒行淫已屬重罪且兼妄言況又非尋常妄言而言行淫無損於他非同殺他生命偷他財物既現前無業將來亦無果報毀律誤人罪惡彌甚故華報果報二報俱受淫欲屬火故感女根生火語已即生者業力增上報不容緩故節節燒然者欲火遍身所致烏芻章云說多淫人成猛火聚信不誣矣此是現前華報華報不足以償故命終神識徑墮地獄下云九情一想下洞火輪身入風火二交過地輕生有間重生無間今蓮香雖說淫欲無報猶信殺偷有報似是九情一想受報應在水火交地但以毀律誤人罪惡極重故云墮無間獄琉璃下殺妄墮者溫陵曰琉璃匿王太子挾宿嫌誅釋種佛記七日當入地獄王怖乘般入海水中自然出火燒滅詳出涅槃及琉璃王經善星亦云善宿阿含云是佛堂弟之子或曰即調達子也涅槃云善星比丘親近惡友退失四禪生惡邪見作是說言無佛無法無有涅槃等即妄說法空也然琉璃懷瞋殺人已屬重罪且所殺又非常人乃瞿曇族姓善星妄說法空即是邪癡若更為竊取利養仍兼於偷盜二人之罪俱為極重故皆以生身陷獄下云純情即沉入阿鼻獄若沉心中有謗大乘毀佛禁戒誑妄說法虗貪信施濫膺恭敬更生十方阿鼻地獄今琉璃恣殺善星逞妄似是純情固應沉於阿鼻且琉璃伐釋欲斷佛種善星妄說虗貪信施既兼多罪或亦更生十方地獄但生身人所共見略彰華報陷後經劫無間備受果報也二躡獄為問此諸地獄為有定處為復自然彼彼發業各各私受惟垂大慈開發童蒙令諸一切持戒衆生聞決定義歡喜頂戴謹潔無犯初雙問二義言以上三人觀之則此諸地獄非本來有乃妄習生但不知為有一定處所為復自然隨彼彼人所發之業於各各處私受其報問意蓋謂若有定處則無關於業因恐墮空亡若隨業有有有顯於報應足發深省想已知是隨業但不敢自決觀下請詞重在持戒可知惟垂下請慈開發二義不決邪正未辨有類童蒙決定指示立辨是非即是開發為與是樂故唯願垂慈此為自請也令諸一切等乃為他請持戒之人為脫獄苦設有定處自覺持戒無益反生猶豫若聞波定隨業自然歡喜踊躍頂戴受持益加謹潔而無犯戒罪矣阿難請問竟二如來讚許佛告阿難快哉此問令諸衆生不入邪見汝今諦聽當汝為說正脈云快哉者合意而喜之讚詞也此問者即指上之二問二問已決邪正自辨故云令諸衆生不入邪見蓋以執有定處不信隨業即墮邪見耳末二句誡聽許說可知三正為說示四一略示升墜因由二詳明七趣輪轉三依次答釋前問四結歎以示邪正初三一依內外定升墜二由情想分趣類三緣隨業有定處初二一總標內分外分二別明情墜想升初阿難一切衆生實本真淨因彼妄見有妄習生因此分開內分外分一切二句約悟者言因彼妄見約迷者言如來意謂若果悟得真性遍圓則大地草木蠕動含靈本元真如故一切衆生實本真淨只因一切衆生不悟遍圓妄見有衆生相如是故有妄習熏生如念念不忘衆生相是也由不忘衆生相故或於衆生身分之內深生耽染或於衆生身分之外懸於勝妙故曰由此分開內分外分二別明情墜想升二一別明情墜二別明想升初阿難內分即是衆生分內因諸愛染發起妄情情積不休能生愛水是故衆生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤心著行淫男女二根自然流液阿難諸愛雖別流結是同潤濕不升自然從墜此名內分初標內分境言內分者即是衆生身分之內因諸下顯內分心因諸愛染者謂因於內分境上生諸愛染發起妄情者謂由愛染故發起種種虗妄情見情積不休者謂情見積習愛染不休能生愛水者謂愛極轉潤潤極流結此是正顯心相自下乃取事驗證是故者謂以是能生愛水之故珍羞者勝妙飲食該香味二塵憶念生愛口中水出如見人食美津唾自咽可知前人者前所遇人該聲色二塵聲色俱美故令人心憶或憐或恨者憐其聲色可狎恨其不聞不見憐恨不釋悲痛難禁故致目中淚盈此常見之事也財寶未至而心起貪求即是法塵財寶欲至而愛涎資身故生光潤如世見人色潤便賀發財可知心著行淫即是觸塵二根未交而先已流液則愛能生水之義益顯然可證阿難下結內分名諸愛雖別者取事唯四論塵該六也流結是同者如舉體光潤是水之蘊結於內目淚口水根液皆水之流通於外若流若結咸以潤濕為性故曰是同潤濕故不能上升不升從墜理所必至故曰自然是乃依內分境起內分心故曰是名內分二別明想升阿難外分即是衆生分外因諸渴仰發明虗想想積不休能生勝氣是故衆生心持禁戒舉身輕清心持呪印顧盻雄毅心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命阿難諸想雖別輕舉是同飛動不沉自然超越此名外分初標外分境言外分者即是衆生身分之外勝妙境界因諸下顯外分心因諸渴仰者謂因於外分勝妙境上生諸渴仰發明虗想者謂由渴仰故發起種種清虗想念想積不休者謂想念積習渴仰不休能生勝氣者謂仰極神飛超脫形纍此亦正顯心相自下亦取事驗知是故者謂以是能生勝氣之故心持禁戒義該念戒念施以心持即念念律儀戒能淨三業念善法戒能成勝因念饒益戒能利有情律儀唯戒餘二皆兼於施故舉身輕清者念前二戒不以自修為纍念饒益戒不以度生為擾故心持呪印即是念法以呪即是法為諸佛祕印心持乎此如佩佛祕印縱遇魔外無所畏懼故曰顧盻雄毅猛強貌也心欲生天即是念天謂厭下苦粗障欣上淨妙離也夢想飛舉者超勝之氣形於夢寐故心存佛國即是念佛如十六觀經觀想念佛之類聖境冥現者或於禪觀之中或於夢寐之際得見阿彌陀佛金色之身得歷阿彌陀佛寶嚴之士但以人所不見而己獨見故云冥現事善知識即是念僧自輕身命者如百城煙水不辭疲勞皆超勝之氣耳阿難下結外分名諸想雖別者取事唯五論念有六即教中六念門也輕舉是同者如夢飛為舉餘四皆輕若輕若舉咸以飛動為性故曰是同飛動故不至下沉不沉成超理所不踰故亦曰自然是乃依外分境起外分心故曰此名外分依內外定升墜竟二由情想分趣類二一臨終相現二情想曲分初阿難一切世間生死相續生從順習死從變流臨命終時未捨暖觸一生善惡俱時頓現死逆生順二習相交一切世間且指情世間說生死相續者謂生死死生生生死死如旋火輪無休息故從猶任也生從順習死從變流者謂生則任其隨順習氣而造善惡等業死則任其遷變流轉而受異類之身此七趣成異之大略自下乃詳明其成異之故臨命終時者六識皆已不行未捨暖觸者八識尚未離體以八識離體則暖相自盡此既未捨暖觸八識尚在乃將死而尚未死故一生善惡者謂一生所造善惡等業俱時頓現者謂俱時頓現善惡等相莫知所趣乃將生而猶未生故當此之時正在畏死求生之際故曰死逆生順謂以死為逆而欲避之以生為順而欲求之也因有避死求生之心則善惡二習交相並發善習勝者隨善相而生善趣惡習強者隨惡相而生惡趣此七趣之所由分也二情想曲分七一純想即飛生天趣二情少想多生仙趣三情想均等生人間四情多想少入橫生五七情三想入餓鬼六九情一想分二獄七純情即沈墮阿鼻初純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生初應想正生純想勝妙神遊外分故命終即飛上見天宮允符渴懷趣著不捨故致必生問此與卵唯想生之想何異答彼約受生之時一念妄染之想此約在世之時慣習勝妙之想若非生平慣習命終豈能即飛觀上心存佛國及心欲生天等語蓋想者澄心觀想非亂想也若飛下兼因易果若飛心中即是純想心中兼福兼慧者謂想不徒想兼能供佛聞法以供佛為福業聞法為慧業故及與淨願者不唯供佛聞法仍願生生世世常在佛前如回向淨土者是也凡人命終神識觀十方如聚墨杳杳冥冥不知何往今以純想及福慧力故暫昏即悟故曰自然心開又以淨願力故聖境遙現故云見十方佛一切淨土如西之彌陀安養東之藥師琉璃等是也十方俱現勝劣攸分故得隨願往生華嚴行願品云臨命終時一切所有無復相隨唯此願王不相捨離於一切時引導其前據此則往生雖由福慧實生平淨願臨終引導之耳二情少想多生仙趣情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊於四天所去無礙其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下初應想正生情少想多者如一情九想二情八想三情七想四情六想等皆是也輕舉非遠者以有情墜故灌頂云豎不越四王天橫不出二圍山也即為飛仙者如後文飛行仙類應是一情九想大力鬼王如嶽神琰魔之類應是二情八想飛行夜叉乃大力鬼王之所使役應是三情七想地行羅剎如山野鬼神應是四情六想然鬼神一道有善有惡惡者專於為禍正屬鬼類善者兼能為福旁通仙趣此中大力鬼王等約兼能為福者言之遊於二句即輕舉非遠義也其中下兼因易果其中者即上四類之中若有善願善心者謂於想心中願常近佛心恆為法如下所說是也護持我法者護佛法及持法人如藥師經十二藥叉之類或護禁戒等護戒法及持戒人如戒壇中護戒善神之類或護神呪等及持呪人如本經中百靈護呪之類或護禪定等護禪人及所得法綏猶安也參禪遇魔則於所得之法不能忍可故保而綏之如禪堂中護靜善神之類此皆約平日善願善心言之是等既有善願善心故雖為仙為鬼猶得親住如來座下三情想均等生人間情想均等不飛不墜生於人間想明斯聰情幽斯鈍情想均等者五情五想正相均等故不飛不墜者由有情故不能上飛由有想故不能下墜言既參於兩楹故得生於人間想明斯聰者對下三趣言之言人道衆生聰明過於下三者以有想心明慧故也情幽斯鈍者對上二趣言之言人道衆生鈍暗過於上二者以有情心幽暗故也四情多想少入橫生情多想少流入橫生重為毛群輕為羽族情多想少者對下七情三想應是六情四想以上云情想均等此則情多一分想少一分情為六而想為四故流入橫生者情多偏墜不能為人故下流想少欲飛不能直舉故橫生然橫生復有二類若身之重者則為毛羣如駝驢猪狗等地行類也若身之輕者則為羽族如鴿鴛鴦等空行類也亦可羽為毛羽族為水族亦該水行之類五七情三想入餓鬼七情三想沉下水輪生於火際受氣猛火身為餓鬼常被焚燒水能害己無食無飲經百千劫七情者較上更多一分三想者較上更少一分想益少而飛益難情愈多而墜愈深故曰沉下水輪謂下過於水輪也按本經地輪即是金論如前云故有金輪保持國土金輪下有水輪如前云故有水輪含十方界水輪下有火際如前云故有火光為變化性火際下有風輪如前云故有風輪執持世界再下則是虗空際矣今既沉下水輪應在風輪之上故云生於火際所以不更下沉者以猶有三分想故然既生於火際攬彼猛火氣分故云受氣猛火結氣成形故曰身為餓鬼此且標名自下乃出其得名所以蓋以常被焚燒雖上接水輪而近火成沸反以傷身故曰水能害己火際無可食之物有水反澆爛其身故曰無食無飲常受饑虗無有出期故云經百千劫施食文云五百生不聞漿水之名千萬劫常受饑虗之苦此餓鬼之所由名也婆沙云恆常饑渴不聞漿水之名設值大河即變為大炬火入口焦然腹爛亦大同此說問按後鬼有十類今何惟舉餓鬼答此之餓鬼苦最重故獨得趣名後之十鬼雖苦不至此皆此趣攝今舉總該別也六九情一想分二獄九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄不言八情二想但言九情一想者略輕取重因重知輕故想少於前益不能飛情多於前愈沉於下故前在火際今又透過火際故云下洞火輪以洞即透過義也透過火際即是風輪火因風吹風因火逼二者互相上下即取其中為二交過地有間無間皆在此地中陰至止故曰身入所以不更墜者以有微少想故輕生有間者謂設或稍輕如九情微少一想微多則生有間地獄如後文十八乃至一百八獄其中受苦猶有間故重生無間者謂若果甚重實是九情一想則生無間地獄灌頂云無間謂八大地獄一等活二墨繩三衆合四叫喚五大叫六炎熱七大熱八無間前七為別後一為總故通稱無間又此雖稱無間但約在獄受苦言之非同阿鼻無出以既惟九情罪惡未至極重猶有一想善根未至盡斷故七純情即沉墮阿鼻純情即沉入阿鼻獄若沉心中有謗大乘毀佛禁戒誑妄說法虗貪信施濫膺恭敬五逆十重更生十方阿鼻地獄初應情正墮無想不升純情唯墜故命終即沉謂無容展轉也阿鼻亦翻無間但與前不同以前約受苦此約無出乃獄苦重之尤者準觀佛三昧等經更有異翻異釋今依成論略明五種無間一趣果無間捨身即生彼故二受苦無間中無樂故三經時無間定一劫故四命無間中無絶故五形無間身形縱廣八萬由旬一人多人皆遍滿故若沉下兼罪轉報若沉心中者即是純情心中以情愛屬水也謗大乘者斷滅佛種以能障菩提心故毀禁戒者斷滅僧種以能障持戒人故誑妄說法斷滅法種以能障如來教故罪惡之重莫甚於此以其斷三寶種也虗貪信施濫膺恭敬必至作大妄語巧用偷心五逆則殺父殺母殺阿羅漢出佛身血破和合僧前四為殺業之最後一乃妄語之尤至於十重具足淫殺盜妄包羅貪瞋邪見兼此種種重罪本獄不足以償故云更生十方阿鼻地獄法華云其人命終入阿鼻獄具足一劫劫盡更生十方世界阿鼻地獄如是展轉至無數劫大般若云謗佛法罪墮阿鼻獄此土劫壞更移他方地藏經云墮無間獄求出無期此界壞時寄生他界等皆此義也結上由情想分趣類竟三緣類業有定處循造惡業雖則自招衆同分中兼有元地按前阿難問意蓋恐執有定處不信業因故雙申兩問而曰此諸地獄為有定處為復自然彼彼發業各各私受今云循造惡業者謂此諸地獄乃循其本人所造惡業而為重輕固是彼彼發業各各私受又云雖則自招衆同分中兼有元地者謂此諸地獄雖則自業所招而於衆生同分境中兼有本人無始同惑元所現地若同惑不空亦有定處不可便謂於我無分如地獄既爾七趣皆然緣以阿難問處舉獄為例故如來亦於地獄之後就便而答將使衆生了別業則私受無緣銷同惑則定處亦空返妄歸真更無有捷於此者總結上來略示升墜因由竟三詳明七趣輪轉此與上文有三不同一者上惟略示情想此則詳明雜業二者上是直墮本趣此則依次輪轉三者上唯六趣此開修羅由此三義是故重說七一獄趣二鬼趣三畜趣四人趣五仙趣六天趣七修羅初三一結前標後二徵起釋成三總示虗妄初阿難此等皆是彼諸衆生自業所感造十習因受六交報初結前言上雖循業定有二義雙許究竟以循業為是故重呼當機而再告之感者招致之義言設無自業雖本有地獄誰能驅之入哉故知此等唯是自業之所招致造十下標後十習因偏約因言六交報偏約報言然文雖從偏義實互具以有因必有報報必有因至下徵釋自見二徵起釋成二一徵釋十因二徵釋六報初十一淫習報二貪習報三慢習報四瞋習報五詐習報六誑習報七怨習報八見習報九枉習報十訟習報初云何十因阿難一者淫習交接發於相磨研磨不休如是故有大猛火光於中發動如人以手自相摩觸暖相現前二習相然故有鐵床銅柱諸事是故十方一切如來色目行淫同名欲火菩薩見欲如避火坑首句總徵十因應另為一科文略不便寄居於此阿難下正明淫習復有四義一增淫積火淫習者謂宿世淫欲熾盛現前猶有餘習故因有餘習男女相接依然發於相磨謂彼此互相研磨也研磨不休者深求欲樂不知止足然淫欲屬火如是積淫成火故有大猛火光於自心中發動是自心中預現地獄相也教中云三界唯心萬法唯識又云心作天堂心作地獄是故佛說多淫之人成猛火聚若果能如烏芻瑟摩則化多淫心成智慧火矣如人下取例驗知言二手自相磨觸尚有暖相現前況復男女二根研磨不休宜乎其有大猛火光於中發動矣二習下緣習成獄二習者宿習與現習也宿習無忘現習重增欲火更熾故曰相然由此故於命終神識見有鐵床銅柱諸事蓋前之大猛火光是獄相初萌此之鐵床銅柱乃習果成就矣是故下聖賢共惕如來為聖菩薩為賢向人形容曰色自己觀察曰目言如來向人形容名為欲火自己觀察亦名欲火其警惕之切如此菩薩學佛其警惕之心與佛無異故見欲如避火坑言不敢少有所犯也二貪習報二者貪習交計發於相吸吸攬不止如是故有積寒堅冰於中凍冽如人以口吸縮風氣有冷觸生二習相陵故有吒吒波波羅羅青赤白蓮寒冰等事是故十方一切如來色目多求同名貪水菩薩見貪如避瘴海初增貪積冷宿世多貪現前猶有餘習故曰貪習由此內熏力故彼此交相計算依然發於相吸謂兩相吸引攬為己有也吸攬不止者謂引取無度不知止足然貪心屬水吸引屬風水兼於風必致凝寒如是貪吸積冷故有積寒堅冰於自心中預現凍鎖凜冽之相如人下取例驗知言以口吸縮風氣尚有冷觸況夫彼此貪心吸攬不止宜乎其有積寒堅冰於中凍冽矣二習下緣習成獄宿習無忘現習重增貪吸更甚故曰相陵謂乘習相陵奪也如是故於命終神識見有吒吒波波羅羅青赤白蓮寒冰等事吒吒亦云阿吒吒波波亦云阿波波羅羅亦云阿羅羅皆寒逼罪人之聲青蓮華赤蓮華白蓮華皆寒逼罪人之相準餘經更有阿浮他謂凍冽成瘡泥羅浮他謂肢節脫落是為八寒總名寒冰今略舉前六後二以寒冰等事該之此相既現是習果成就矣是故下聖賢共惕同名貪水者警以遇風凝寒令息吸攬心故如避瘴海者海能沒人兼有瘴惡之氣犯之必死菩薩見貪如此其警惕之心至矣三慢習報三者慢習交陵發於相恃馳流不息如是故有騰逸奔波積波為水如人口舌自相綿味因而水發二習相鼓故有血河灰河熱砂毒海融銅灌吞諸事是故十方一切如來色目我慢名飲癡水菩薩見慢如避巨溺初增慢積水宿世多慢現在猶有餘習因有餘習彼此交相陵越依然發於相恃謂自恃族姓豪貴財勢智慧等勝也馳流不息者謂馳心上流不知息滅然我慢屬山馳流屬水山峙水馳必致奔騰如是故有騰躍縱逸競奔之波於自心中預現積波為水之相如人下取例驗知綿味者舌拄上㗁深取其舌上味也言口舌自相綿味尚因而水發況夫慢心馳流不知息滅宜乎其有騰逸奔波預現積波為水相也二習下緣習成獄宿習未忘現習重增慢流益甚故曰相鼓謂鼓激陵越也如是故於命終神識見有血河灰河熱砂毒海融銅灌吞諸事而習果成矣血河者灌頂引經云獄有兩山罪人走入兩山忽合如磨蓋壓血肉遍流如大河海血水涌沸男女萬數出沒其中灰河者經律異相云灰河地獄縱廣深淺五百由旬灰湯涌沸罪人入河鐵刺刺身膿血流出痛苦萬狀熱砂者灌頂云即黑砂地獄熱風暴起吹熱黑砂來著罪人燒皮徹骨愚謂但言熱砂不合水義或熱砂連毒海為句蓋以海沸熱砂沒溺罪人苦毒無量故也融銅灌吞者地藏經云煬銅灌口熱鐵纏身萬死萬生動經億劫此皆以類相感更有多事難以盡言故以諸字該之是故下聖賢共惕灌頂云我慢者執我我所起諸見慢相故癡水者西土有水飲之則癡迷顛倒以之例慢故曰名飲癡水亦警惕意也如避巨溺者巨海洪浪沒溺難出凡是有智者莫不嚴避菩薩避慢如之蓋不敢有犯也正脈云見慢者謂見自心起慢非見他慢四瞋習報四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金如是故有刀山鐵梱劍樹劍輪斧鉞鎗鋸如人銜怨殺氣飛動二習相擊故有宮割斬斫銼刺鎚擊諸事是故十方一切如來色目瞋恚名利刀劍菩薩見瞋如避誅戮初增瞋積金瞋習者宿世多瞋現在猶有餘習故因有餘習彼此互相衝擊依然發於相忤相忤謂逆而犯之也忤結不息者謂忤犯結恨不肯休息不得報復故心熱發火然瞋屬肝氣遇心火鑄肺氣而為金如是故有刀山鐵梱等事於自心中預現殺氣之相言刀山者聚刀為山鐵梱者正脈云梱即棍也有本梱作鐝取義皆可不過尖停之異劍樹者豎劍為樹劍輪者團劍為輪斧劈屬黃金飾斧為鉞鎗刺屬鋸解屬然人徒知此等為地獄之具而不知皆由自惑自業中現耳如人下取例驗知言世人銜怨欲報形色便有殺氣飛動況復彼此交衝忤結不息甚至心熱發火宜乎其有刀山䥫梱等於自心中預現殺氣相也二習下緣習成獄宿習未忘現習重增瞋忤愈熾故曰相擊謂乘習益相攻擊念念在殺由此故於命終神識見有宮割斬斫銼刺槌擊諸事而習報成矣宮謂割其勢名為宮割斬謂斫其首名為斬斫銼謂折其體刺謂穿其身槌謂笞其背擊謂杖其臀此皆世刑若約地獄仍合用刀山劍樹等避重文耳是故下聖賢共惕名利刀劍者犯之即傷如來如是色目故菩薩見心起瞋如避誅戮亦不敢有犯也五詐習報五者詐習交誘發於相調引起不住如是故有繩木絞校如水浸田草木生長二習相延故有杻械枷鎖鞭杖檛棒諸事是故十方一切如來色目奸僞同名讒賊菩薩見詐如畏豺狼初增詐積刑詐習者宿世慣行騙詐現在猶有餘習也因有餘習彼此交相哄誘依然發於相調調字應作去聲謂調轉牽引也引起不住者謂引心數起不肯暫住然詐以術騙引令難脫如是詐引日積故有繩木絞校於自心中預現牽引局陷之相言繩木絞校者絞以繩引謂絞而結之令不得解校以木局謂校而匣之令不得脫此亦獄相初萌耳如水下取例驗知言以水浸田尚能令草木生長況夫巧誘善引之術熏於識田宜乎其有繩木絞校預現牽引局陷相也二習下緣習成獄宿習未忘現習重增詐誘愈甚故曰相延謂乘習益相延誘也如是故於命終神識見有杻械枷鎖鞭杖撾棒諸事杻械枷鎖皆局攣罪人之具見前鞭杖檛棒皆笞責罪人之具鞭策屬杖條屬檛箠屬棒棍屬也是故下聖賢共惕奸而且僞即是詐也同名讒賊者讒言哄誘害人自害故豺狼性多詐能害人畏之如此亦深戒矣六誑習報六者誑習交欺發於相罔誣罔不止飛心造奸如是故有塵土屎尿穢污不淨如塵隨風各無所見二習相加故有沒溺騰擲飛墜漂淪諸事是故十方一切如來色目欺誑同名劫殺菩薩見誑如踐蛇虺初增誑積穢宿世多誑現在猶有餘習故云誑習由此內熏力故彼此交相斯瞞依然發於相罔謂誣罔蒙蔽也誣罔蒙蔽不知戒止又自以為得計飛動其心造設奸謀是居心總為障他立行反以穢己如是誑罔日積故有塵土屎尿於自心中預現障蔽穢污不淨之相如塵下取例驗知如塵隨風者塵以風亂風以塵昏塵以風亂而不見定相見以塵昏而不見淨相故云各無所見取此為例者言塵隨於風尚昏亂而各無所見況夫彼此交欺誣罔不止宜乎其有塵土尿屎預現障他穢己穢污不淨相也二習下緣習成獄宿習無忘現習重增誑罔愈甚故曰相加謂倍造誑業也如是故於命終神識見有沒溺騰擲飛墜漂淪諸事而習報成矣沒溺者似是沸屎地獄謂屎尿沸溢罪人沒溺於其中也騰擲者似是黑砂地獄謂風吹黑砂罪人騰擲於其中也飛墜者隨風上下之相漂淪者隨沸浮沉之相是故下聖賢共惕欺誑誣罔害人自害故同名劫殺劫殺者謂劫財殺命極言其可畏也蛇之與虺時常含毒螫人況復踐之菩薩見誑如此亦警惕之甚矣問誑之與詐有何差別答詐謂誘他期墮我術明取其利誑謂欺他恐泄我機暗取其利皆屬妄語而舉心不同也七怨習報七者怨習交嫌發於銜恨如是故有飛石投礰匣貯車檻甕盛囊撲如陰毒人懷抱畜惡二習相吞故有投擲擒捉擊射拋撮諸事是故十方一切如來色目冤家名違害鬼菩薩見怨如飲鴆酒初增怨積害宿世懷怨不釋現在猶有餘習故曰怨習由此內熏力故彼此互相嫌隙依然發於銜恨謂銜冤懷恨誓期報復也然報復者設方在心如是故有飛石投礰匣貯車檻甕盛囊朴於自心中預現為害之相飛石者飛以石塊投礰者投以碎石匣貯者匣床盛貯車檻者車內檻禁甕盛者盛人於甕而外以火炙如昔人有請公入甕者是也囊撲者收人於囊而舉以撲之如始皇囊撲二弟之類是皆由於銜怨害入而害具即從自心中生也如陰下取例驗知如陰藏毒害之人懷抱畜積俱屬惡事況復銜冤懷恨誓期報復宜乎其有飛石投礰等事預現於自心中也二習下緣習成獄宿習未忘現習重增怨恨益深故曰相吞謂恨不生噉也如是故於命終神識見有投擲擒捉擊射拋撮諸事投擲者礰投石擲擒捉者擒拏捉取入匣車入甕囊也擊射者礰則擊其頭石則射其身拋撮者拋謂拋撲令死所謂囊撲者是也撮謂撮折其身所謂匣貯車檻甕盛者是也始而心欲害人究竟反為自害懷怨者宜知驚心是故下聖賢共惕違害鬼即懷冤鬼也冤不能申曰違常欲傷人曰害如來雖不懷冤而色目懷冤之家名違害鬼亦警惕於人也菩薩遵奉佛敕不敢有犯所以見有懷冤之心如飲鴆酒宜急解之不然則斷腸死矣正脈云鴆鳥最毒羽毛瀝酒飲之則腸寸寸斷八見習報八者見習交明如薩迦耶見戒禁取邪悟諸業發於違拒出生相反如是故有王使主吏證執文籍如行路人來往相見二習相交故有勘問權詐考訊推鞠察訪披究照明善惡童子手執文簿辭辨諸事是故十方一切如來色目惡見同名見坑菩薩見諸虗妄偏執如臨毒壑初增見積證見習者謂宿世邪見諸見之總熾盛現在猶有餘習也因有餘習彼此交相立破欲明己見故曰交明恐人不知何為交明故云如薩迦耶等薩迦耶此云有身即是身見見戒禁取應云見取與戒禁取蓋取字兩通耳見取見謂非果計果如以無想為涅槃之類戒禁取見謂非因計因如牛狗等戒之類邊見背中邪見違正皆為邪悟如上五見各有所作故云諸業所言諸業者無非互相破壞故云發於違拒各自立宗立論故云出生相反相反者以我證彼立宗立論務期壞他如是存心積業故有王使主吏證執文籍於自心中預現證據是非之相王使者琰魔王使主吏者主掌判吏證執者證其所執文籍者文書簿籍如行下取例驗知言堂堂大路誰來誰往旁觀自能相見況夫明明中道互立互破宜乎其有王使主吏等預現證據之相所謂自心難瞞者信矣二習下緣習成獄宿習未忘現習重增彼此諍執不解故曰相交交謂撕結不開之貌由此故於命終神識見有勘問權詐等相言勘問權詐等者謂始而勘校審問權稱詐僞此似王使事也勘權不明轉啓有司逼考訊問嚴推重鞫從旁體察訪問此似主吏事也體察訪問不得其情仍復披究生前見業照明神識習氣於時則有善惡童子手執文簿證之如不服罪仍以辭辨折之直得無理可申地獄重罪乃甘心領受矣問前後十種獄相惟此中最極周密且是令其服罪不出正罰者何也答十業中惟見業最極難辨十報中唯見報難定難定必先盡得其情果其有毀謗正法斷滅佛種等事自應直入阿鼻諸教常說不出而自知故是故下聖賢共惕五者總為惡見如來形容觀察同以見坑名者以其誤陷衆生一入而不能出故見理不真曰虗妄非他是己曰偏執五見率皆如是菩薩見之如臨毒壑者顯急宜退避以邱壑中有毒蛇等物不退則必遭其害也九枉習報九者枉習交加發於誣謗如是故有合山合石碾磑耕磨如讒賊人逼枉良善二習相排故有押捺槌按蹙漉衡度諸事是故十方一切如來色目怨謗同名讒虎菩薩見枉如遭霹𮦷初增枉積迫宿世好為屈枉駕禍逼人現在猶有餘習故曰枉習由此內熏力故彼此互相加迫依然發於誣謗誣謗者本無其事而妄毀之也妄毀不認必至設法相迫如是居心故有合山合石碾磑耕磨於自心中預現逼迫之相合山者兩山竪夾合石者兩石橫夾碾以石礫磑以石研耕以犁其舌磨以研其頂是未及迫人而迫己之具先從自心而生吁可畏哉如讒下取例驗知讒𧮂也賊害也讒𧮂為害名讒賊人如是之人逼枉良善核得其情罪必反坐呪夫誣謗日積宜乎其有合山合石等預現逼迫相也二習下緣習成獄宿習不忘現習重增枉業愈盛故曰相排排者逼迫之貌由此故於命終神識見有押捺槌按等相言押捺槌按等者謂押掬揉捺槌打按壓令其服罪也設不服罪蹙其身於囊袋壓之而漉其血名曰蹙漉若終不承認掛其身於權衡度之而令其無詞名曰權度是其心初欲害人而終於害己所謂自作自受者信矣是故下聖賢共惕怨謗者怨言以謗竦聽者心故讒𧮂口傷義同於虎故曰讒虎屈逼聲惡義同如雷故曰霹𮦷然人皆知避虎畏雷而自心中養虎蓄雷恬然不知畏避亦可慨矣問誑之與枉有何差別答二者皆隨煩惱而所隨不同蓋誑者障他利希自利隨貪一分隨癡一分即以貪癡二分為體而枉即是害隨瞋一分即以瞋恚一分為體故前後各出也十訟習報十者訟習交誼發於藏覆如是故有鑑見照燭如於日中不能藏影二習相陳故有惡友業鏡火珠披露宿業對驗諸事是故十方一切如來色目覆藏同名陰賊菩薩觀覆如戴高山履於巨海初增訟積照宿好攻訟現在猶有餘習故曰訟習由此內熏力故彼此交相喧訴依然發於藏覆謂各自藏覆己過也雖各自藏覆而自心難昧如是故有鑑見照燭於自心中預現其相鑑見者謂鏡鑑以見其形像照燭者謂珠照以燭其心曲如於下取例驗知言身在日中不能藏曲直之影況心在本覺圓明之中欲覆己過豈可得哉宜乎其有鑑見照燭預現對驗相也二習下緣習成獄宿習未忘現習重增訟覆交陳如是故於命終神識見有惡友業鏡火珠等相言惡友者謂宿世同造之人業鏡者能鑑宿業之鏡火珠者能燭心曲之珠惡友同造故能披露宿業鏡鑑珠燭故能相對證驗類此更有故總以諸事該之是知覆藏者徒昧自心攻訟者空喪天和然自有不可逃之罪案於其間也是故下聖賢共惕好訟者必易覆色目覆藏正所以警惕訟習同名陰賊者謂家有陰賊久必遭劫喻覆藏己過終必為害此如來警惕於人者如此戴高山履巨海終不能出意顯覆重罪墮極苦無由得脫此菩薩自相警惕者如此然人非聖賢孰能無過宜常自揀典無輕於攻訟既薄熏染之習即脫地獄之苦得生人中整心慮趣菩提何其幸哉此上十種習因從古異說良以業報不可思議非衆生心識現量之境誰是誰非亦不必辨今謂如來明言習因足知墮獄一事不是一生所造之業蓋由熏習在心相續不斷從惑積惑從業積業曾無絲毫善緣惟惡業相應如十段中淫貪等十字乃宿世所造之業而十箇習字皆指熏染在心以至今生猶能續起惑業但宿世造業必是彼此互相為對熏習在心今生亦然故文中交接計等即今生彼此續起之惑而發於相磨發於相吸等即今生彼此續造之業當此之時心是地獄之心故有猛火積寒等相現於自心之中如昔有善𦘕馬者念念在馬睡時自現馬相作水觀者念念在水定中自現水相而念念心心造地獄業自現地獄之相理應然矣但此理難信故十段中各舉易知之例而驗證之不可作譬喻說也然此時雖有地獄相現尚是心中影相未及招受若於此知畏尚可回轉其奈宿習現習相然相陵等重起增上惑業由是於命終神識見有地獄相現呌苦難脫及乎身入其中求出無期所謂臨崖勒馬收韁晚船到江心補漏遲此聖賢所以共惕類此者亦知警心可也總結徵釋十因竟二徵釋六報二一總徵釋二躡徵詳釋初云何六報阿難一切衆生六識造業所招惡報從六根出初總徵十因已示六報當明故此徵也阿難下略釋一切衆生指惡報最重者言以輕者不墮獄故六識造業有二一自起二交作自起者但是一根造業如見色惟依色起業交作者如因見色而起聞聲之業名為與聞業交因見色而起嗅香之業名為與嗅業交等如見業既爾聞聲等亦然是皆不離六識故云六識造業又雖云六識亦兼六根以識托於根離根無見分別無由起故所招惡報亦二一自業報二交業報自業報者如見業所招臨終先見猛火等交業報者如見火燒聽能為鑊湯洋銅見火燒息能為黑烟紫𦦨等如見火既爾聞水等亦然是皆不離六根故云從六根出又雖云六根亦兼六識以根借乎識離識無明報應無由分故二躡徵詳釋二一躡前徵起二詳釋六報初云何惡報從六根出此躡前略釋之語而轉徵之二詳釋六報六一見報二聞報三嗅報四味報五觸報六思報初二一標定二報二依次釋成初一者見報招引惡果見報即自業報此是依見業招故云見報招引惡果即交業報雖由交業所感亦必自報招引以設無見火無由燒聽燒息等也二依次釋成二一自業報二交業報初此見業交則臨終時先見猛火滿十方界亡者神識飛墜乘烟入無間獄發明二相一者明見則能遍見種種惡物生無量畏二者暗見寂然不見生無量恐見業既成五業交作故云此見業交據此則是業已熟矣已熟則將欲捨命故云臨終溫陵曰見覺屬火故臨終先見猛火愚謂見業遍造故見火滿十方界見火欲飛奈為九情所墜落於烟中故曰飛墜乘烟煙氣迷暗不覺沉淪故曰入無間獄既入獄中仍復依彼見業發明二相發明即顯現義也一者明見由明處造業所感遍見種種惡物者如火狗火蛇及鐵嘴諸蟲等恐其為害故云生無量畏二者暗見暗中造業所感寂然無聲不見無相無聲無相不知神識落在何處故云生無量恐二交業報如是見火燒聽能為鑊湯洋銅燒息能為黑烟紫𦦨燒味能為焦丸鐵糜燒觸能為熱灰爐炭燒心能為星火迸灑煽鼓空界如是見火者謂如是上來所說見報火也按後五報此下當有燒見能為烈火猛𦦨之語觀後聞波注聞嗅氣衝息等皆先與現前本根交故但諸本皆無存而不論可也燒聽者見報之火燒於現前耳根以耳根屬水故鑊湯洋銅水而兼熱燒息者見報之火燒於現前鼻根以鼻根屬息故黑烟紫𦦨息而兼熱燒味者見報之火燒於現前舌根以舌根屬味故焦丸鐵糜味而兼熱燒觸者謂見報之火燒於現前身根以身根屬觸故熱灰爐炭觸而兼熱燒心者見報之火燒於現前意根以意根屬風故星火迸灑風而兼熱此是六種交報由於交業之所感招二聞報二一標定二報二依次釋成初二者聞報招引惡果聞報謂先見波濤等自業報也招引惡果謂注聞注見等交業報也二依次釋成二一自業報二交業報初此聞業交則臨終時先見波濤沒溺天地亡者神識降注乘流入無間獄發明二相一者開聽聽種種閙精神愗亂二者閉聽及無所聞幽魄沉沒因聞起業名為聞業因於聞業起於見色嗅香等業名之為交謂聞業與餘業交作而地獄之因成矣因成捨報則是臨終時也溫陵曰聞聽屬水故臨終先見波濤愚謂聞業殊勝故波濤沒溺天地見水欲升奈為九情所墜下沉波中故曰降注乘流乘流不覺愈沉愈下故云入無間獄既入無間仍復依彼聞業發明二相一者開聽動處造業所感聽種種閙者如吒吒波波羅羅等及淹沒呌苦之聲驚散陽魂故曰精神愗亂蓋精屬陽神為魂愗不明亂不定也二者閉聽靜中造業所感寂無所聞者闃然無聲滯成陰鬼故曰幽魄沉沒蓋幽為陰魄屬鬼沉不浮沒不顯也二交業報如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧灑諸毒蟲周滿身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄如是聞波者謂如是上來所說聞報波也注聞者謂聞報之波注於現前耳根以耳根屬水波見水而聲益怒故為責為詰皆聲而帶怒此中既聞波注聞上科自應有見火燒見火見火而燒益熾故應為烈火猛焰燒而帶熾是知上科定有闕文恐有不以為然故就此重以申明注見者謂聞報之波注於現前眼根以眼根屬火波遇火而暴蒸故雷吼惡氣暴聲而兼蒸熱吼謂雨將來時雲中有吼聲也注息者聞報之波注於現前鼻根以鼻根屬息波遇息而騰潤故雨霧灑蟲謂雨霧中灑諸毒蟲也飛騰而兼潤濕注味者聞報之波注於現前舌根以舌根屬味波遇味而腥濁故膿血雜穢腥臭而兼渾濁注觸者聞報之波注於現前身根以身根屬觸波遇觸而傷垢故鬼畜糞尿傷害而兼垢汙注意者謂聞報之波注於現前意根以意根屬風波遇風而灑摧故為電為雹霔灑而兼摧壞此等名為交業所感三嗅報二一標定二報二依次釋成初三者嗅報招引惡果嗅報謂先見毒氣等乃嗅業所感報也招引惡果謂衝息則能為質為履等乃交業所感報也二依次釋成二一自業報二交業報初此嗅業交則臨終時先見毒氣充塞遠近亡者神識從地涌出入無間獄發明二相一者通聞被諸惡氣熏極心擾二者塞聞氣掩不通悶絶於地因嗅起業名為嗅業因於嗅業引起見色聞聲等業名之為交謂嗅業與餘業交作而獄因成矣因成捨命故曰臨終然嗅息屬氣故臨終先見毒氣嗅業遍造故毒氣充塞遠近神識地涌者謂初見毒氣入地避之奈毒氣充塞於地故復涌出九情所墜不覺又沉故云入無間獄既入無間仍復發明二相一者通聞嗅香處造業所感被諸惡氣者如前所云黑烟紫𦦨諸惡毒氣之類熏極心擾者熏極難忍心神擾亂也二者塞聞無嗅時造業所感謂先時嗅香後於無嗅時依之造業仍感鼻家之報氣掩不通者如人睡熟被物所壓氣不能申悶絶於地者悶極氣絶昏臥於地也二交業報如是嗅氣衝息則能為質為履衝見則能為火為炬衝聽則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千眼無量咂食衝思則能為灰為瘴為飛砂礰擊碎身體如是嗅氣者謂如是上來所說嗅報氣也衝息者謂嗅報之氣衝於現前鼻根以鼻根屬息氣見息而益惡故為質為履質謂質證其罪履謂踐踏其身皆帶惡氣衝見者嗅報之氣衝於現前眼根以眼根屬火氣見火而成炙故為火為炬皆帶炙氣衝聽者嗅報之氣衝於現前耳根以耳根屬水氣見水而成溷故沒溺洋沸謂沒溺於洋湯沸屎之中皆帶溷氣衝味者嗅報之氣衝於現前舌根以舌根屬味氣見味而成臭故為餒為爽魚敗曰餒羮敗曰爽皆帶臭氣衝觸者嗅報之氣衝於現前身根以身根屬觸氣見觸而成殺故綻爛肉眼謂綻其皮爛其肉肉長成山而眼中蟲咂也皆帶殺氣衝思者嗅報之氣衝於現前意根以意根屬思思動屬風氣遇風而成揚故灰瘴砂礰謂揚灰潑瘴飛砂走石也皆帶揚氣此等亦是交業感招四味報二一標定二報二依次釋成初四者味報招引惡果味報者味業所感如下云臨終先見鐵網等引果者交業所感如下云歷嘗則能為承為忍等二依次釋成二一自業報二交業報初此味業交則臨終時先見鐵網猛𦦨熾烈周覆世界亡者神識下透挂網倒懸其頭入無間獄發明二相一者吸氣結成寒冰凍冽身肉二者吐氣飛為猛火焦爛骨髓此味業交昨謂此嘗味之業與餘業交作積成地獄因也地獄因成人中報壞故曰臨終然嘗味之業最重者必至網捕禽獸烹煎蒸炙故感先見鐵網猛𦦨熾烈因味造殺無處不至故感周覆世界亡者神識下透挂網者謂既見鐵網又見猛𦦨荒錯迷倒側身下透挂於網間也倒懸其頭入無間獄者謂足上頭下不覺不知愈沉愈下也每見世之網捕禽鳥者及其捕得之時急欲又網不顧彼之顛倒上下宜乎其有此慘報既墮獄中發明二相一者吸氣謂忍覺氣從外入外入氣冷故結成寒冰凍冽身肉此由吸氣貪味所感二者吐氣謂忽覺氣從內出內出氣熱故飛為猛火焦爛骨髓此由吐氣嫌味所感問嫌味不貪何以感報答嫌味不美吐而棄之更為貪之甚者二交業報如是嘗味歷嘗則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為弩為射歷思則能為飛熱鐵從空雨下如是嘗味者謂如是上來所說嘗味所感之報如鐵網猛𦦨等諸殺具也歷嘗者味報殺具歷於現前舌根以殺具而遇舌根無可如何故能為承為忍謂承領忍受也歷見者味報殺具歷於現前眼根以殺具而遇見火火鑠具鎔故能為然金石歷聽者味報殺具歷於現前耳根以殺具而遇聞水水淬金利故能為利兵刃歷息者味報殺具歷於現前鼻根以殺具而遇息氣氣蒸金透故能為鐵籠彌覆歷觸者味報殺具歷於現前身根以殺具而遇身觸身受具觸故能為弓箭弩射歷思者味報殺具歷於現前意根以殺具而遇思風風吹具揚故能為熱鐵飛空業交報交理應如是五觸報二一標定二報二依次釋成初五者觸報招引惡果作業時觸業先起招引餘業受報時觸報先現招引餘報惡果即餘報也二依次釋成二一自業報二交業報初此觸業交則臨終時先見大山四面來合無復出路亡者神識見大鐵城火蛇火狗虎狼獅子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄發明二相一者合觸合山逼體骨肉血潰二者離觸刀劍觸身心肝屠裂此觸業交者謂觸業先起引起交業成地獄因也獄因已成世報欲謝故曰則臨終時然觸業最重者莫如貪淫強逼貪淫強逼令其喪志失節無所逃避故感大山來合無復出路蓋自身地水火風即是四山始而以此逼人今則轉為逼己事也亡者神識見大鐵城等者言正恐山合忽見鐵城才喜有趣避處又見其中火蛇火狗虎狼獅子等乃不敢入奈有牛頭獄卒馬頭羅剎鎗矟灌頂云矟矛屬長丈八者驅逼不得不入入之即是無間獄也既墮獄中仍復發明二相以觸業有二故一者合觸謂貪於合觸造業所感合山逼體骨肉血潰者如四山來合逼體碎骨和肉與血而俱潰也二者離觸謂貪於離觸造業所感問離觸何以造業答合觸生厭致死惡離其為業更慘刀劍觸身心肝屠裂者如刀斫劍刺壞其身體連心洎肝而俱傷也二交業報如是合觸歷觸則能為道為觀為廳為案疑是錯簡應云為撞為擊為剚為射歷見則能為燒為熱歷聽則能為撞為擊為剚為射疑與上互錯應云為道為觀為廳為案歷息則能為括為袋為考為縛歷嘗則能為耕為鉗為斬為截歷思則能為墜為飛為煎為炙如是合觸者謂如是上來所說觸業所感合山等諸觸逼迫事也歷觸者諸觸逼迫歷於現前身根以身根而遇逼迫則能為撞為擊為剚為射蓋撞以杵觸擊以丈觸剚以刃觸射以箭觸皆身觸遇逼迫事故若依原文殊難銷會歷見者諸觸逼迫歷於現前眼根以眼根而遇逼迫則能為燒為爇以眼見屬火火遇逼迫逼住則為爇逼不住則為燒故歷聽者諸觸逼迫歷於現前耳根以耳根而遇逼迫則能為道為觀為廳為案蓋道為地獄之途觀為獄主之宮廳為理獄之所案為判罪之據道多呌苦聲觀多傳呼聲廳多審罰聲案多判結聲皆耳聞遇逼事故若依原文亦難銷會暫與歷觸下交互用之俟高明者再辨歷息者諸觸逼迫歷於現前鼻根以鼻息而遇逼迫則能為括為袋為考為縛蓋括以布纏袋以囊閉考謂括而復考縛謂袋而復縛務令氣不得伸皆鼻息遇逼迫事也歷嘗者諸觸逼迫歷於現前舌根以舌嘗而遇逼迫則能為耕為鉗為斬為截耕謂犂其舌鉗謂拔其舌斬謂從根而割截謂當中而斷皆舌嘗遇逼迫事也歷思者諸觸逼迫歷於現前意根以意思而遇逼迫則能為墜為飛為煎為炙蓋為墜為飛者忽下忽上為煎為炙者發熱發燥皆意思遇逼不寧之相然此中交報與上四文勢稍別佛語自在以義求之可也六思報二一標定二報二依次釋成初六者思報招引惡果思報者思業所感之報如臨終先見惡風等招引惡果者謂依於思報招引交業所感惡果如結思則能為方為所等二依次釋成二一自業報二交業報初此思業交則臨終時先見惡風吹壞國土亡者神識被吹上空旋落乘風墮無間獄發明二相一者不覺迷極則荒奔走不息二者不迷覺知則苦無量煎燒痛深難忍此思業交者謂思業先起後復興餘業交作則獄因熟矣獄因熟而世報謝故曰則臨終時然思業屬風而有善有惡善則能成惡則能壞今約惡業故感惡風吹壞國土國土既壞神識無依故被吹上空又以九情所墜故方起旋落乘於風力不覺轉入無間故云墮也既墮獄中仍復發明二相以思業有覺不覺故感報亦然一者不覺之相謂迷悶之極心神荒亂奔走不息二者不迷之相不迷即覺謂才有覺知則是苦境無量煎燒痛徹深髓難可忍受二交業報如是邪思結思則能為方為所結見則能為鑑為證結聽則能為大合石為冰為霜為土為霧結息則能為大火車火船火檻結嘗則能為大呌喚為悔為泣結觸則能為大為小為一日中萬生萬死為偃為仰如是邪思者準上五應約邪思所感報風言之結思者謂思業報風結於現前意根以意思而遇報風被迷思處則能為方為所謂受罪處也結見者思業報風結於現前眼根以眼見而遇報風因昧思明則能為鑑鏡照為證人質謂令昧為明也結聽者思業報風結於現前耳根然耳聞屬水以水遇風若二力俱勝鼓激過分則能為大合石如傾湫倒嶽即其證也若風寒水冷則能為冰為霜如秋霜冬冰即其證也若水勢劣風風勢劣水則能為土為霧如微旱起塵帶濕見霧即其證也結息者思業報風結於現前鼻根然鼻息屬風風遇風而磨蕩成火則能為大火車火船火檻皆地獄苦具相也結嘗者思業報風結於現前舌根然舌嘗貪味味遇風而便失則能為大呌喚為悔為泣皆饑渴逼惱聲也結觸者思業報風結於現前身根然身觸從緣風性無定或遇風而展舒則為大身或遇風而局促則為小身或遇風而忽活則能為生或遇風而忽斃則能為死或被風吹而腹俯於地則能為偃或被風吹而面向於天故能為仰此等皆為思報之所招引此上十因六報雖然似不經而理所必至良以三界唯心萬法惟識所以華嚴一偈能空諸獄若果能絶生前之十業了現心之妄習六業不交六報安在是知佛之所以詳陳其相者將使衆生轉惡業為善因心作天堂變生心為佛心即心作佛也徵起釋成竟三總示虗妄三一總結妄造二別分重輕三重釋問意初阿難是名地獄十因六果皆是衆生迷妄所造結前十習為地獄因六報為地獄果故曰是名等也皆是者因果皆是迷妄者迷於妄見迷於妄見不達衆生相空由此於諸衆生分內起於妄情十因六果莫不資始乎此故為所造前云因於妄見有妄習生由此分開內分外分則地獄天堂皆迷妄所造明矣二別分重輕三一十因圓造入阿鼻二六業交作入無間三六業具缺分三等初若諸衆生惡業圓造入阿鼻獄受無量苦經無量劫惡業者即前淫貪慢瞋詐誑冤見枉訟也圓造者一一具造又造之必盡其極前之所謂純情者以此純情即沉故云入阿鼻獄此是正獄以下之八獄皆眷屬獄故入此獄中諸苦備歷故云受無量苦若沉心中有謗大乘等劫盡更生他方阿鼻故云經無量劫二六業交作入無間六根各造及彼所作兼境兼根是人則入八無間獄前總徵略釋疏云六識造業有二一自起二交作自起者但是一根造業如見色惟依色起業聞聲唯依聲起業等今云六根各造是也交作者如因見色而起聞聲之業是見業與聞業交因聞聲而起見色之業是聞業與見業交等今云及彼所作兼境兼根是也言兼境兼根者謂除當根各造外復兼餘境及餘根故是人則入八無間獄者其中亦兼二報一者自業報如前見業成熟臨終先見猛火神識乘烟入獄等今云則入是也二者交業報如前見火燒聽能為鑊湯洋銅燒息能為黑烟紫𦦨等今云無間是也又前云九情一想下洞火輪身入風火二交過地輕生有間重生無間此科即重生無間者也三六業具缺分三等三一具六入重獄二缺二入中獄三缺四入輕獄初身口意三作殺盜淫是人則入十八地獄六根不交作故唯言身口意三十因不圓造故惟言作殺盜淫良以身口意為六根總相殺盜淫為十因總相不交不圓各未盡極故不言別相反顯上之墮阿鼻者必是十因圓造六根交作入無間者必是六根交作或十因不圓造耳是知此科之罪較上微輕而對下則重故曰是人則入十八地獄經律異相云阿鼻大地獄外復有十八小獄然既云小獄應是有間者也科云具六者謂能作三業所作三業六業皆具足故入重獄者對下而言以有間獄中此最重故二缺二入中獄三業不兼中間或為一殺一盜是人則入三十六地獄三業不兼者謂身口意具而三種惡業不兼造也不唯不兼於三且亦不兼於二故曰中間或為一殺一盜不言一淫者可思而知故若具足言之應云或為一殺謂身口意但作一殺或為一盜謂身口意但作一盜或為一淫謂身口意但作一淫其罪又輕於前故曰是人則入三十六地獄上云十八此云三十六者應是上之隨獄蓋一獄隨二亦是有間可知三缺四入輕獄見見一根單犯一業是人則入一百八地獄見見者妄見見於妄境時也一根者或身或口或意三根惟一根起一業者或殺或盜或淫三業唯一業犯雖一根一業乃約其最重者言如殺則出佛身血等淫則汙比丘尼等盜則偷僧祇物等故應墮獄而其罪又輕於前故曰是人則入一百八地獄又有間之輕者按經律異相有十八鐵丸十八沸銅十八刀輪十八劍林十八鐵蛇十八鐵鳥然數既吻合無妨引用但地獄名數經論異出良以業有千差報感萬殊絶非思議之境惟佛盡知唯佛盡見隨便警示要在令人知懼而已此上三科於九情一想中義當輕生有間問既皆九情一想輕重何分答亦有九情微少但少不至八一想微多但多不至二故皆約九情一想言之別分重輕竟三重釋問意由是衆生別作別造於世界中入同分地妄想發生非本來有准前阿難總問七趣云此道為復本來自有為是衆生妄習生起又別問地獄云此諸地獄為有定處為復自然彼彼發業各各私受如來於分類趣後已略釋云循造惡業雖則自招衆同分中兼有元地恐猶未明故就此重釋言上來首自阿鼻終至一百八獄所以差別不同者由是衆生別作別造此釋彼彼發業各各私受問也然既別作別造而又多人同處一獄者蓋以多人業同於是界中入同分地此釋為定處問也又雖曰入同分地亦屬妄想發生非是本來自有此釋為復本來自有為是妄習生起問也獄趣竟二鬼趣三一躡前起後二詳列十種三推本顯妄初復次阿難是諸衆生非破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然然還罪畢受諸鬼形是諸衆生即指十因六報者言律儀雖通大小且指小乘戒說以小乘治身律儀偏重故非破者非為小乘忍心自破造業飾非者類多如是菩薩戒大乘戒也既已非破律儀不屑拘守小乘即當嚴護心地受持菩薩自性妙戒及究其居心却又逐一違反故曰犯也此約毀戒言之涅槃至理大乘深教或斥為斷滅或訶為虗妄故曰毀也此約毀乘言之夫乘戒二法乃出苦之津梁實成佛之樞要互為緩急尚且不可何況俱毀真為斷滅佛種仍復陷害衆生罪之極重莫甚於此前云若沉心中有謗大乘毀佛禁戒等即指此也諸餘雜業總指十因六交等業報感地獄常受衆苦如處猛火故曰歷劫燒然燒盡宿業之後名為酬還罪畢此方了得純情無想及九情一想等業良以衆生造業類多從輕至重身後受報類多從重至輕今重報既盡輕報現前故仍受諸鬼形然世人多以地獄為鬼今既分二趣應知不同論明地獄純是化生鬼則具四兼有父母兄弟眷屬但勝者為神如前大力鬼王等附於仙趣是也劣者為鬼如下所列又下所列十類率皆不免饑虗均屬餓鬼趣攝但與前之七情三想沉下水輪者不同以彼生於火際乃鬼道中苦之尤者似由惡業直墮若下之十明是地獄餘報不過藉之以略彰其趣耳二詳列十種資中云由前十因餘報不同故鬼趣分為十類謂貪物貪習貪色淫習貪惑詐習貪恨怨習貪憶瞋習貪慠慢習貪罔誑習貪明見習貪成枉習貪黨訟習長水依之正脈以貪惑為誑習貪罔為枉習貪恨為瞋習貪憶為怨習貪成為詐習餘五仍舊今疏依之環師謂其不必局配是厭於推詳也然地獄既以十習為因今出為鬼自應由彼餘習但佛語自在稍不次第耳十一怪鬼二魃鬼三魅鬼四蠱鬼五癘鬼六餓鬼七魘鬼八魍魎九役使十傳送初若於本因貪物為罪是人罪畢遇物成形名為怪鬼本因者指在人道中說貪物為罪者即指貪習謂貪求財物而為地獄罪故是人罪畢者歷劫燒然地獄業盡時也因有貪物餘習出而附諸異物現形現跡故曰遇物成形山之為精石之為怪類多由此故曰名為怪鬼二魃鬼貪色為罪是人罪畢遇風成形名為魃鬼不言本因者例上可知故仍以貪名者貪為煩惱之首貫一切業故下皆准此貪色為罪者即指本因淫習謂貪求美色而為地獄罪故罪畢出獄因有貪色餘習心愛遊蕩故即遇風成形名為魃鬼者神異經云魃鬼長二三尺其行如風所現之處必大旱蓋以酷淫則致陰陽不合妖風能令雲雨不成也三魅鬼貪惑為罪是人罪畢遇畜成形名為魅鬼貪惑為罪者即指因中誑習謂貪求誑惑而為地獄罪故罪畢得出因有貪惑餘習假異形以惑人存畜心而誑他故即遇畜成形正脈云如倀鬼附虎雞鼠成精之類名為魅鬼者說文云老精物也人面鬼身四足好惑人山林異氣所生四蠱鬼貪恨為罪是人罪畢遇蟲成形名蠱毒鬼貪恨為罪者即指因中瞋習謂貪求瞋恨而為地獄罪故罪畢得出因有貪恨餘習時懷瞋毒故即遇蟲成形蟲謂毒蟲如蟒蛇蜈蚣之類名蠱毒鬼者灌頂云兩廣習妖術令人成蠱脹者即此鬼也五癘鬼貪憶為罪是人罪畢遇衰成形名為癘鬼貪憶為罪者即指怨習謂貪憶宿怨蓄惡欲雪而為地獄罪故罪畢得出因有貪憶餘習樂為衰敗故即遇衰成形謂附彼四時不正陰陽衰敗之氣散瘟行疫故名癘鬼癘謂疫疾時氣不和之症六餓鬼貪慠為罪是人罪畢遇氣成形名為餓鬼貪慠為罪即指慢習謂本在人中貪求慠慢而為地獄罪故罪畢得出因有貪慠餘習常懷高舉故即遇氣成形氣謂地下之氣言地下有水輪有火際水降火騰蒸熱之氣發於地上升於虗空希望高舉故附以成形無所主掌不得祭祀故名為餓鬼正脈問餓鬼為一趣之總名何慢習餘報獨受此稱又餓鬼乃苦之最重今十習地獄苦均何餘報唯慢招獨重耶答鬼趣有四不同一勝趣貶墜二修帶瞋殺此二多居上品三獄前華報多居下品四獄後餘殃多居中品而聖賢示現者不與焉然雖分上中下品率皆不免饑虗但有輕重之異故總名餓鬼今經十種既是地獄餘報應俱屬中品亦通為餓鬼但依因招果果必類因十種各以因果相類之義立名此慢習餘報獨名餓鬼者以彼常懷高舉遇氣成形有饑虗義故其受苦仍與餘九相等非獨重也此如六塵中色惟是眼之所對不同色法十一之色總該五根及於六塵昧別為總問不應理七魘鬼貪罔為罪是人罪畢遇幽為形名為魘鬼罔者暗昧不明之義貪罔為罪者即指枉習謂貪求暗昧不明之事誣枉於他而為地獄罪故罪畢得出因有貪罔餘習趣逐暗昧故即遇幽為形幽謂幽隱暗昧陰陽不分之氣附此成形乘睡魘人令其氣不得伸故即名為魘鬼蓋魘鬼暗中逼人與枉習頗肖也八魍魎鬼貪明為罪是人罪畢遇精為形名魍魎鬼貪明為罪即指見習謂貪求邪見妄作聰明而為地獄罪故罪畢得出因有貪明餘習故即遇精為形精謂日月精華之氣附以成形顯靈異於川澤故名為魍魎鬼魍謂其形暗昧魎謂其形不定也抱朴子曰魍魎山精形如小兒獨足善犯人又好學人聲迷惑於人與見習頗肖九役使鬼貪成為罪是人罪畢遇明為形名役使鬼貪成為罪者即是詐習謂貪求詐術誘他成己而為地獄罪故罪畢得出因有貪成餘習故即遇明為形明謂呪符類也附以成形聽役使以作禍福故即名役使鬼然世人但知以詐成己不知反為人所使役觀此地獄餘報應發深省十傳送鬼貪黨為罪是人罪畢遇人為形名傳送鬼貪黨為罪者即指訟習謂貪求朋黨助惡興訟而為地獄罪故罪畢得出因有貪黨餘習故即遇人為形環師云附巫祝而傳吉凶者是也良以因中結黨傳遞隱暗之事而訐露於人今為鬼亦附人發泄傳說吉凶等事故即名傳送鬼以名求實訟習頗肖問此之鬼趣既與前之獄趣後之畜趣等並論應取餓鬼全分何得偏取從獄出者答佛意為顯十習業重地獄不足以償餘報為鬼鬼復不足以償餘報為畜畜復不足以償轉生為人猶有餘苦故鬼趣偏取從獄出者畜趣偏取從鬼出者人趣偏取從畜出者蓋急欲令人革十習因離惡趣苦而全分例此可知詳列十種竟三推本顯妄阿難是人皆以純情墜落業火燒乾上出為鬼此等皆是自妄想業之所招引若悟菩提則妙圓明本無所有是人者即指十種鬼道中人始在阿鼻皆以純情墜落漸經無間及與有間乃得業火燒乾良以純情墮於阿鼻若以業報苦火燒乾一情則唯餘九情應退入無間若更以業報苦火燒乾九情中少分則惟餘八情之餘應退入有間若更以業報苦火燒乾一情之餘則唯餘七情自應上出為鬼以餓鬼元以七情三想為墮因故此推本也皆是下顯妄妄想即是惑道業即業道獄鬼即是苦道言獄鬼苦雖至重亦由自心深重惑業之所招引故云皆是若悟菩提者一念回光反照自心悟得本性菩提既已悟得本性菩提則苦不能繫業不能局惑不能蔽故曰妙曰圓曰明既曰妙曰圓曰明則地獄餓鬼本來無所有矣問前云七情三想沉下水輪似是餓鬼極苦此云業火燒乾上出為鬼但是獄後餘殃其罪既輕何得同以七情三想判之答一從獄升一從人墜雖同為七情三想而不妨輕重有異如山上一人失足下墜山下一人舉足上升各到中間石叢而止則從上而墜者所傷必重從下而升者所傷必輕是故上之十鬼雖亦生於餓鬼趣中而猶能為怪為魃乃至為役使為傳送如從下而升之人雖在石叢猶能展轉故也鬼趣竟三畜趣三一躡前起後二詳列十種三結妄推無初復次阿難鬼業既盡則情與想二俱成空方於世間與元負人冤對相值身為畜生酬其宿債墮鬼之業本以七情三想今以鬼報苦終墮鬼業盡業既盡則情減一分想增一分超出鬼道情想故二俱成空據此則唯餘六情還復四想所謂情多想少是也前云情多想少流入橫生是約人中下墜此云方於世間等是約鬼趣上升雖升墜不同而分齊相等同為畜道元負人者謂元在人中被負之人所謂或缺彼財物或缺彼形命是也向以墮獄墮鬼彼雖銜冤欲報無能為對今既生於世間債繫難逃故曰冤對相值身為畜生者略如下之十類餘可例知或被烹割或受驅使償命償財故曰酬其宿債二詳例十種十一梟類二咎類三狐類四毒類五蛔類六食類七服類八應類九休類十循類初物怪之鬼物銷報盡生於世間多為梟類物怪之鬼者即前遇物成形名為怪鬼物銷報盡者業盡形謝苦終果壞故七情三想轉為六情四想故得生於世間流入橫生因有貪物為怪餘習故多為梟類蓋梟類附塊成形即貪物餘習以子食母即為怪餘習大率如是故云多為獨舉梟類者以一類餘故准前云和合怪成八萬四千食父母想又云其類充塞則怪畜非一種矣問前云酬其宿債此酬何等答此類子成母遭其食即償形命又世傳梟肉烹食最美或亦有食之者又黃帝敕百祀用梟世人捕之貨利即償財物也二咎類風魃之鬼風銷報盡生於世間多為咎徵一切異類風魃之鬼者即前遇風成形名為魃鬼業盡形謝苦終果壞故曰風銷報盡唯餘六情還復四想故得生於世間因有貪色為魃餘習故多為咎徵異類如商羊舞水𧌘𧔥出旱等即為魃兆災餘習或為色禽或為淫獸等一切異類即貪色餘習問此酬何債答咎必遭害即償形命害彼受功即償財物三狐類畜魅之鬼畜死報盡生於世間多為狐類畜魅之鬼者即前遇畜成形名為魅鬼業盡則所依畜死苦終則所感報盡超出鬼道情想故得生於世間雖生世間猶有貪惑為魅餘習故多為狐類蓋狐貍善於惑人即貪惑餘習郭氏記云千歲狐為淫婦百歲狐為美女即魅鬼餘習也四毒類蟲蠱之鬼蠱滅報盡生於世間多為毒類蟲蠱之鬼者即前遇蟲成形名為蠱鬼蠱滅報盡者蠱字準前後應是蟲字謂業盡則所依蟲滅苦終則所感報盡也自是超出鬼道情想故得生於世間因有貪恨為蠱餘習故多為毒類如蚖蛇蝮蠍蜈蚣蚰蜒等時時蓄毒即貪恨餘習或無故便螫或觸之乃傷皆蠱鬼餘習也五蛔類衰癘之鬼衰窮報盡生於世間多為蛔類衰癘之鬼者即前遇衰成形名為癘鬼業盡則衰氣窮散苦終則癘報盡息七情三想變為六情四想故得生於世間因有貪憶為癘餘習故多為蛔類蛔謂腸胃中蟲後文云蟯蛔是也回轉上下不離腸胃即貪憶餘習乘癩而生致結蛔症即為癘餘習也問此償何報答本因貪憶懷怨常欲穢污於人令人身心不安今感回轉穢汙受局腸胃以償彼也六食類受氣之鬼氣銷報盡生於世間多為食類受氣之鬼者即前遇氣成形名為餓鬼業盡則所受氣銷苦終則餓鬼報盡生於世間猶帶遠近二習遠習貪慠近習餓鬼故多為食類如虎豹豺狼等自恃形勢常欲食他即貪慠餘習求食不得呌呼馳走即餓鬼餘習也七服類綿幽之鬼幽銷報盡生於世間多為服類綿幽之鬼者纏綿幽暗之鬼即前遇幽為形名為魘鬼也幽銷者幽暗氣銷幽暗氣銷無所依附則鬼苦終而魘報盡矣報盡果轉故得生於世間雖生世間猶有貪罔為魘餘習故多為服類異物志云山梟體有文色土俗因形名之曰服亦名隻狐晝伏夜出亦名禍鳥鳴則有禍蓋晝伏夜出即貪罔餘習鳴則有禍即魘鬼餘習也八應類和精之鬼和銷報盡生於世間多為應類和精之鬼者附和精氣之鬼即前遇精為形名魍魎鬼也和銷報盡者和字准前後應是精字謂所和之精既銷魍魎之報已盡報盡果轉故得生於世間因有貪明魍魎餘習故多為應類如春燕秋鴻等知時知節即貪明餘習忽南忽北即魍魎餘習也九休類明靈之鬼明滅報盡生於世間多為休徵一切諸類明靈之鬼者藉明顯靈之鬼即前遇明為形名役使鬼也所附之明力已謝役使之鬼物不靈故云明滅報盡鬼道之情想俱空故得生於世間因有貪成役使餘習故多為休徵諸類休徵者如嘉鳳祥麟等兆休明徵聖治即貪成餘習諸類者如靈禽巧獸等識語言隨呼喚即役鬼餘習也十循類依人之鬼人亡報盡生於世間多為循類依人之鬼者依附於人之鬼即前遇人為形名傳送鬼所依之人既亡傳送之鬼報已盡墮鬼情想二俱成空故得生於世間因有貪黨傳送餘習故多為循類循者依也馴也如猫狗等依人飲食馴順於人餘習酷似也詳列十種竟三結妄推無二一正以結推二重答前問初阿難是等皆以業火乾枯酬其宿債旁為畜生此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有是等者總指上之十類言上之十類皆以獄鬼業報苦火燒盡純情九情七情故云業火乾枯超出二道生於世間冤對相值償財償命故曰酬其宿債重為毛羣輕為羽族故以旁為畜生言旁為者以畜生為旁行故此且明其從獄出鬼從鬼至畜若更推此等本因亦皆向在人中自己所作虗妄惑業之所招引如前十因六業等是也然惑業既屬虗妄果報豈是真實惟是不悟菩提幻作幻受若悟菩提則心無剩法此業與報猶如眚見燈輪故曰妄緣清淨目中都無是事故曰本無所有古德云有人識得心大地無寸土寸土尚無此等豈真有哉二重答前問三途惡趣已畢將說善趣故此重答欲令悟自非他改惡遷善悟妄非真轉惡道為善道也如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為浮虗妄想凝結如汝所言等牒前所問墮獄三人如是惡業者以三人墮獄之業例一切衆生墮落三途之業以一妄一切妄故前阿難偏問地獄今如來總答三途者以同為惡趣又以此答在畜趣後也本自發明者正脈云藏性真心萬用俱含自造何等之業即隨自業發明何等之報譬如米中諸味皆具成糖成醋成酒皆自造耳非天降非地出非人與顯非從外得自妄所招還自來受顯是我自致菩提心中浮想凝結顯本無實體據前阿難有總別二問初總問七趣云此道為復本來自有為是衆生妄習生起此云自妄所招還自來受是答以妄習生起菩提心中浮想凝結是答以非本來有次別問地獄云此諸地獄為有定處為復自然彼彼發業各各私受此云自妄所招還自來受是答以自然彼彼發業各各私受皆為浮虗妄想凝結是答以縱有定處亦屬浮想凝結良以前云衆同分中兼有元地似有一定之處故今并遣言衆生初以一念妄動業識潛興名為浮想次以見分俄興結為現境是曰凝結為七趣所共依呼為同分若衆生之自招乃稱別業一人發真歸元十方虗空悉皆銷殞況諸地獄鬼畜等又在虗空中耶是知菩提心中都無所有果其徹證無勞更疑若乃未悟先空只恐誤人自誤古德云了即業障本來空未了應須還宿債可弗慎歟畜趣竟四人趣正脈云此趣來處除聖賢示現諸趣皆通以人道為修進通途諸趣皆願為之且人中具有六趣形相如富貴慈善者似天聰明修煉者似仙剛暴者似修羅愚癡者似畜生貧賤者似鬼囚繫者似獄故知通有諸趣來者今亦順序而談偏取從畜來者餘亦意含四一躡前起後二就便警示三詳列十種四指因結嘆初復次阿難從是畜生酬償先債若彼酬者分越所酬此等衆生還復為人反徵其剩先在獄鬼唯了自業不暇償債今以為畜乃償故云從是畜生酬償先債先債酬畢畜生報滿自此捨命理應彼此相安無復牽墜然亦有不爾故下約反徵者言之若彼酬者指彼受酬之人所受之分過於應酬之數名為分越所酬如鞭策過用其力瞋怒枉殺其身等皆是此等衆生指彼能酬之人酬過其分怨習不忘還復為人故必反徵其剩謂反徵其應酬之外所剩餘分令彼倒償也據此則人之於畜宜留心愛養勿苦驅其身勿輕殺其命則庶幾可耳二就便警示二一明其必償二警以慎殺初如彼有力兼有福德則於人中不捨人身酬還彼力若無福者還為畜生償彼餘直初報勝現償如彼有力者彼指被徵之人有力者過去業力猶未盡故兼有福德者富而仁貴而賢也力未盡不應捨命故依然在於人中有福德徵不能墜故無庸捨人為報酬還彼力者唯以福德酬還其過用之力如被惡子華費怨賊劫奪及遭彼無義之交設奸騙詐無賴之親非理負纍等皆是若無下報劣當償無福者無有福德縱業力未盡不能敵於債力故致不終天年還為畜生或自供使用或轉售錢財或直恣口腹皆為償彼餘直謂償彼過用所直之數也據此則現前過用得意即當來反償之不得意普願舉世仁人君子當其得意時須防有不得意時耳二警以慎殺阿難當知若用錢物或役其力償足自停如於中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息除奢摩他及佛出世不可停寢初反徵可停當知二字借阿難警世間也若用二句指反徵者言之言被徵之人若有福德尚在人中則反徵者不過用其錢物若無福者則為畜生而反徵者自應役其身力是皆可以償足自停但不分越所酬則己也如於下反殺難寢於中者謂於反徵之中殺彼身命者謂自行殺事或食其肉者謂教他殺而但食其肉怨習難忘故至塵劫以肉還肉以命還命故云相食相誅遞相報復無有窮已故曰猶如轉輪前云以人食羊羊死為人人死為羊即互為高下義也又云十生之類互來相噉窮未來際即無有休息義也除奢下極言警覺奢摩他為自性定得之者罪性本空輪轉何有佛出世名照世燈遇之者無結不解有怨皆釋捨此二緣難免報復故曰不可停寢寢猶息也然此中警覺有二一為未得停寢者令其修定令其見佛以除此二緣不能停寢故二為已得停寢者令其勿殺令其勿食以奢摩難成佛世難遇故皆至極之言耳就便警示竟三詳列十種十一頑類二異類三庸類四很類五微類六柔類七勞類八文類九明類十達類初汝今應知彼梟倫者酬足復形生人道中參合頑類首句總以警悟畜生報盡為人猶帶餘習幸得為人豈可更蹈前非故今以應知令其及早省悟彼梟下正明本類梟倫附塊成形已屬無知兼復食父食母猶為頑嚚故雖酬足先債還復竪形生於人道之中而頑習未盡猶固參合頑類正脈云頑謂愚而兼惡不可化為一毫之善者也言參合者非頑類皆屬梟化但言梟化者參於其中故下皆准此二異類彼咎徵者酬足復形生人道中參合異類咎徵兆災殊為怪異酬足復形尚帶餘習故雖生於人道依然參合異類異類者幸災樂禍乖戾異常人也三庸類彼狐倫者酬足復形生人道中參於庸類狐倫專於媚人殊為庸鄙復形生於人道豈能超拔故惟參於庸類庸類者無超拔之度多諉靡之行所謂碌碌庸人不足為士者是也四很類彼毒倫者酬足復形生人道中參合很類毒類螫人很惡無度雖生人道依然參合很類餘習使之無足怪耳很類者剛暴自用不受善諫人也五微類彼蛔倫者酬足復形生人道中參合微類蛔倫回轉穢污受局腸胃殊為卑微習與性成不自覺知故復形仍參微類微類者卑微下賤糞穢塗身無賴求食每見倒街臥巷呌苦乞憐討得一錢半文自為得計何莫非宿習致之然耶六柔類彼食倫者酬足復形生人道中參合柔類食倫性嗜肉食每求不得因餓致柔故復形猶帶柔習而為人參合柔類柔類者罷軟無能任人揉捺者也又此類先在人中原以貪慠墮獄雖中間為鬼為畜皆帶慠習而究以饑虗之報令其慠無所施今復為人不惟慠無所施且致任人揉捺亦循環之理也七勞類彼服倫者酬足復形生人道中參合勞類服倫夜出求食殊為勞纍復形為人猶帶勞纍餘習故即參合勞類勞類者東奔西馳徹夜不寐至死不歇心人也八文類彼應倫者酬足復形生人道中參於文類應倫知時知節來往應序似有文禮復形人道猶有餘習故即參於文類正脈云文類者通字義解陰陽流入文思人也合轍云小有才能通文合禮與人應接不失其序非經天緯地之大文也九明類彼休徵者酬足復形生人道中參合明類休徵現瑞兆聖似有明識既得復形為人其性益靈理應參於明類灌頂云明類者世智辨聰非仰觀俯察之大明也十達類彼諸循倫酬足復形生人道中參於達類循倫依人呼喚馴順隨從通喜怒識趣避況復生於人道自應益聰故得參於達類灌頂云達類者諳練世故了達人情非博古窮經之大達也詳列十種竟四指因結嘆阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者初近指前世是等者總指前之十類原其前世為畜本因債纍今既宿債畢酬自然復形人道皆無下遠指多生言既得為人不應更結深冤乃爾生殺不忘者非止一世餘習故云皆是無始等蓋欲人清其源而絶其流耳業謂無始已來多生殺業計謂妄計徵償顛倒謂不知解脫人死為羊羊死為人故相生汝負我命我還汝債故相殺也不遇下無緣難脫無始業計塵勞唯佛法乃能滅除設若不遇如來不聞正法依舊業計顛倒在於塵勞之中然塵勞屬惑有惑必有業有業必有報如惡叉聚自然不離故云法爾輪轉末句動佛哀矜裴公圓覺序云可以整心慮趣菩提唯人道為能今幸生人道宜自珍惜若乃一念不忘轉眼復成淪墜仙天無路可升佛道永矣絶分如因一朝之忿亡其身以及其親是為大惑故歎其為可憐愍者人趣竟四仙趣灌頂云老而不死曰仙故莊生云千歲厭世去而上仙言仙者遷也此有二義一謂遷入山林人不及處故仙字從人從山二謂遷其形神延年益壽故下云存想固形正脈云仙道起於厭懼無常想身常生妄設多途無非志於長生不死蘇子云蓋將自其變者而觀之則天地曾不能以一瞬夫天地尚不能以一瞬何況仙趣又在天地之中乎又云自其不變者而觀之則物與我皆無盡也然既曰物之與我皆無有盡而又何羡於長生乎蘇子卓識如來誠言合而觀之修仙者宜知顛倒三一躡前標後二詳列十仙三結判同輪初阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十種仙從人者從於人趣也雖曰從於人趣不局上之十類言上之十類從畜道來人多下品豈能修仙或亦有之如文類達類等但勿拘判又前云情少想多則為飛仙大力鬼王飛行夜叉地行羅剎然四類雖皆情少想多而言總意別若以類分之應云一情九想則為飛仙二情八想為大力鬼三情七想為飛行夜叉四情六想為地行羅剎然仙趣既惟餘一情自應不躡前之餘習而正脈云仙趣已上方與十習無干以是而知不應拘判言復有者有二義一者揀前十人言前之十人尚在徵償此外復有從於人道仰慕清升而修仙品者二者揀我自宗言自宗中人依正覺修此外復有從於人道不依正覺而起妄修者不依正覺亦有二義一者正覺即佛謂不依佛說也二者正覺即心謂不依自心也捨此二途縱修三摩亦非真實矣別修妄念者撥弄精魂存想固形者注意長生注意長生即是不依佛說以佛說一切有為如夢幻等故撥弄精魂即是不依自心以自心從本已來絶言思等故下之十種率皆不出此二正脈云山林人不及處者即名山洞府神仙隱跡之處彼宗所謂洞天福地䦘苑崑崙者是也又華嚴十寶山中有神仙山古德謂是神仙所居然既屬人不及處而彼獨能遊則神仙具五通矣有十種仙者但以其修念固形之術而分別之二詳列十仙十一地行仙二飛行仙三遊行仙四空行仙五天行仙六通行仙七道行仙八照行仙九精行仙十絶行仙初阿難彼諸衆生堅固服餌而不休息食道圓成名地行仙彼諸衆生者總指前來別修妄念存想固形人也堅固下乃別明本行堅固者立志不退服餌者服食餌藥謂以諸藥物炮煉修治為丸作餅執此可以延年可以益壽故堅固服之此即存想固形者也而不休息者期於必效無間斷故食道圓成者服食既久道理相應故不惟百體康壯壽年延永必至身輕行疾乃為圓滿成就名地行仙者雖身輕行疾依然在於地上不能升空故此與下四行字俱作平聲以同是外修唯以步履重輕近遠分極而分勝劣二飛行仙堅固草木而不休息藥道圓成名飛行仙草如參根蘇苗之類木如松枝柏葉之類灌頂云百卉五果根莖枝葉皆名為藥執此養身故立志堅固食之亦存想固形者也異前餌者不用烟火生與熟為別故久食有功名為藥道圓成行步如飛升高越壑身輕勝前故以飛行名之古人云煉得身形似鶴形即斯意也此對上科約身重身輕以分勝劣三遊行仙堅固金石而不休息化道圓成名遊行仙堅固金石者正脈云如烹煎鉛汞煉養丹砂號九轉大還者是也灌頂云煉銀丹者一琉黃砂硃砂二栽砂七日三養砂七日亦名養火四陰煉七日五陽煉七日蓋曰陰開曰陽六上明爐過關七日七洗母七日八煉母七日九交母七日此用黑軟鉛水銀白砒煉也煉金丹者謂黃阿鉛膽礬雌黃石緑石青大罐煉一晝夜點銀成金化有二義一者變化謂服之長生變凡身為仙骨二者點化用以濟世點白石為黃金各獲其效名為化道圓成為超脫而遊世外因利濟而遊世中以是義故名遊行仙四空行仙堅固動止而不休息氣精圓成名空行仙動以運氣調身止以養精安神身調則可以永年神安則可以長生執此為真故堅固而運養之運養不息氣精兩化形神俱妙故曰氣精圓成乘雲御龍遊乎上下故以空行名之如姑射神人之類莊子逍遙篇云藐姑射之山有神人居焉肌膚若冰雪淖約若處子不食五穀吸風飲露乘雲氣御飛龍而遊乎四海之外會曰肌膚若冰雪淖約若處子其氣精圓成可知不食五穀吸風飲露其為神仙可知乘雲氣御飛龍其為空行可知引以為證理可思得此對上科乃約行近行遠而分勝劣五天行仙堅固津液而不休息潤德圓成名天行仙津液者口中水也嗽出為津下咽為液彼宗所謂鼓天池咽玉液是也執此能令水升火降水火既濟而成造化之功故堅固而嗽咽之嗽咽不息內外通融舉身輕清與物無纍故曰潤德圓成乘正御氣遊乎無窮故以天行名之莊生所謂至人神人聖人者是也莊子逍遙篇云夫列子御風而行冷然善也旬有五日而後返彼於致福者未數數然也此雖免乎行猶有所待者也若夫乘天地之正而御六氣之變以遊乎無窮者彼且惡乎待哉故曰至人無己神人無功聖人無名會曰列子御風而行冷然善也其潤德圓成可知雖免乎行猶有所待以未能忘身也乘天地之正御六氣之變又是潤德圓成之後增修功業至云遊乎無窮惡乎待哉其為天行可知是知彼之所謂至人神人聖人者依然在天仙之數也此對上四乃是以分成極成而分勝劣又此上五仙前二似屬彼之小乘以只知存想固形全無利濟之心但以有烟火無烟火分之為二後三似屬彼之大乘以兼有利濟之心但遊行未能忘身不能遠達高舉而空行則形神俱妙雖能高舉遠達而猶有分齊至於天行則與天地合其德與六氣合其用利萬物而不宰處寰中而無跡是不唯潤德圓成而圓成之後應別有真訣但以不了自心故止於天行而已六通行仙堅固精色而不休息吸粹圓成名通行仙堅固精色者謂堅固其心吸日月之精華餐雲霞之彩色也然日月非實有精華可吸雲霞非實有彩色可餐但憑虗想以求妄理相應故此與下四皆屬別修妄念執此可以得通久久行之故曰而不休息妄理相應形與氣化故曰吸粹圓成粹謂精粹即日月雲霞之精粹也形與氣化神與物通穿金石蹈水火任運無礙以是義故名通行仙如黃眉翁之類漢武內傳東方朔遇黃眉翁曰吾却食服精氣三千年一轉反骨洗髓三千年一轉剝皮伐毛吾生已三洗髓三伐毛矣所以視天地若蜉蝣等古今猶旦暮也會曰却食服精即堅固精色也三洗髓三伐毛其吸粹圓成可知視天地若蜉蝣等古今猶旦暮其為通行可知此與下四行字皆作去聲以同是內修唯約道行淺深薄厚粗妙而分勝劣七道行仙堅固呪禁而不休息術法圓成名道行仙堅固呪禁者呪謂呪咀禁謂禁制然各俱二義呪則延年益壽護國祐民禁則制嗜戒欲降妖祛邪執此可以留生可以濟世故堅固而行持之行持呪禁唯憑心念故此亦屬別修妄念持久不息呪靈禁驗名為術法圓成蓋呪即是術禁即是法也又二俱為道用此道以養身推此道以濟世以是義故名道行仙此對上科乃是以行淺行深而分勝劣以上科似唯自利故淺此科顯有兼懷故深也八照行仙堅固思念而不休息思憶圓成名照行仙灌頂云思念者謂存想頂門而出神繫心丹田而煉氣也執此可以尸解可以駐年故堅固其心而修習之存想之工無間繫心之學靡停故曰而不休息神則出入自在氣則上下交通故曰思憶圓成此由對境立照故即名照行仙略似吾宗修觀之法但所趣不同耳九精行仙堅固交遘而不休息感應圓成名精行仙堅固交遘者易云乾道成男坤道成女男女遘精萬物化生灌頂云此以腎水為坎男心火為離女取坎填離降火提水令其交合以成仙胎執此可以成丹故堅固其心而取填之降火提水內工無間故曰而不休息藥成而為仙體丹成而上九天故曰感應圓成感應者即交遘義也此以坎男離女遘精成行故即名精行仙此對上科乃以行薄行厚而分勝劣以上唯修神煉氣故薄此實遘精結丹故厚也孤山引仙傳云彭祖治為房術張道陵亦勸人行正脈云用女子為鼎器而採陰助陽內教固闢為魔論而仙道亦鄙為下品此為投人之欲世多惑之宜絶口遠避也十絶行仙堅固變化而不休息覺悟圓成名絶行仙變化者變彼為此化此為彼如西域迦毗羅仙等諸大幻師之類前云求太陰精用和幻藥即變化之術也執此可以竦愚迷成教化行利濟修仙業故堅固其心而推求其術也深窮物理精研化性久久體驗冀其有成故曰而不休息物理既通化性已達隨意變現自在無礙名為覺悟圓成借此修仙定為絶品故即名絶行仙灌頂云昔老成子學幻於尹文先生尹文曰有生之氣有形之壯盡幻也造化之所始陰陽之所終者謂之生死窮數達變因形移易者謂之幻化知幻化之不異生死始可與學幻矣吾與汝皆幻也何須學哉老成子歸用尹文之言深思三月遂能存亡自在翻校四時冬起雷夏造冰飛者走走者飛終身不著其術故世莫傳會曰老成子學幻於尹文先生是堅固變化也用尹文之言深思三月是而不休息也存亡自在翻校四時等其為覺悟圓成可知終身不著其術其為仙中絶品可知此對前四科乃約行粗行妙以分勝劣以前四唯憑虗想名粗此科兼有實悟名妙也詳列十仙竟三結判同倫阿難是等皆於人中煉心不修正覺別得生理壽千萬歲休止深山或大海島絶於人境斯亦輪回妄想流轉不修三昧報盡還來散入諸趣初結示因果是等者總指前之十仙大率皆以世壽不常羡慕久生故即於人中煉心所謂撥弄精魂是也不知本覺真心即是佛果不生滅性故亦不修正覺所謂不依正覺修三摩地是也食道圓成乃至覺悟圓成故云別得生理別有二義一者不依自心不生滅性別以食道藥道等而得長生之理二者十仙為門各別門門各得長生之理以彼總以長生為趣故也壽千萬歲者妄理相應或千歲或萬歲但以世人不見其死渾言之耳休止下判同輪回休止者休心依止深山海島者如崑崙蓬萊之類絶於人境將謂可以避死殊不知非空非海中非入山石間無有地方所脫之不受報也斯亦輪回者所依之處既未超乎三界能依之身豈能脫於輪回是知上之所謂壽千萬歲者但是後死非真不死猶如松柏後凋非真不凋耳妄想流轉者出成輪回所以良以法性本自真常色身由來生滅怖速死而求長生即屬妄想依妄想而墮生滅正在流轉所謂斯亦輪回者以此不修下警令正修言欲免輪回須斷妄想欲斷妄想須憑三昧設不修三昧則仙報盡時依然各隨無始遠習散入諸趣所謂饒經八萬劫終竟落空亡況夫壽千萬歲又何足恃哉是知楞嚴三昧神仙亦所當修勿負長年宜早努力總結仙趣竟六天趣灌頂引論云天者清淨光潔最勝最尊文句云身勝樂勝故名為天或謂天者天然自在首出庶物以上品十善及世間禪定為因故上云絶想即飛必生天上正脈云天趣與仙趣不同世人仙天不分而學仙者濫附於天且謂諸天皆彼祖先然佛既分為二趣豈可混同辨有二義一者仙以人身而戀長生最怕捨身受身諸天皆捨人身而受天身二者仙處海山皆人間境四王忉利尚無卜居況復空居及與上二是知天趣最為界內尊勝之流逈非仙與鬼神類也二一別分勝劣二總斥迷輪初三一六欲天二四禪天三四空天初二一約欲分六二就欲結判初正脈云此乃自須彌腰頂二天以至空居四天皆有飲食淫欲睡眠具足三欲故號欲天其男女婚配亦如人間但以欲心輕重而分六重六一四王天二忉利天三夜摩天四兜率天五化樂天六他化天初阿難諸世間人不求常住未能捨諸妻妾恩愛於邪淫中心不流逸澄瑩生明命終之後鄰於日月如是一類名四天王天諸世間人仍指前之人道以天仙二趣皆從人中修故亦有不爾今約多分言之不求常住者無出世心未能捨諸妻妾恩愛者樂世間法遵守五戒故曰於邪淫中心不流逸以邪淫乃五戒之一故不言不殺等者以欲界六天惟以欲心輕重分故流謂流動不流動則心常澄清逸謂縱逸不縱逸則心常瑩淨澄清瑩淨故心光遍照故曰生明由是能與日月合德故感命終之後鄰於日月名四天王天者以四天王居須彌腰齊日月宮故二忉利天於己妻房淫愛微薄於淨居時不得全味命終之後超日月明居人間頂如是一類名忉利天不言諸世間人不求常住者例上可知故下四天準此於己者顯無外貪妻房者顯無妾室淫愛微薄者雖不盡斷亦不過濃所謂有時有節是也於淨居時不得全味者謂淨心不純間有念起禪思之味不得全故雖不得全亦勝前人以前人但不邪淫此則并正淫亦淡故既勝前人自應命終之後超日月明以因勝果亦勝故人間頂即須彌頂也言須彌頂下接人間再上即是空居則人間不相接矣忉利者梵言也此云三十三此天在須彌山頂四方各八天中為善見城乃帝釋所居智論云昔有婆羅門姓憍尸迦與知友三十二人共修福德命終皆生須彌山頂憍尸迦為天主三十二人為輔臣淨明疏云昔迦葉佛滅後有一女人發心修塔報為天主三十二人助修報為輔臣二緣不同者以既在輪回不無更易故三夜摩天逢欲暫交去無思憶於人間世動少靜多命終之後於虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須𦦨摩天逢欲暫交者事前全無預念去無思憶者事後不復追想此則於淨居時得全味也既得全味逢欲縱有微念亦不過為了人間之事非有深染故曰於人間世動少靜多動少靜多漸近清虗故感命終之後生於虗空明明在空而宮殿不墜故曰朗然安住正脈問空居諸天宮殿池樹皆何所踞答七寶琉璃與大地無異但欲下之時即虛豁無礙例如人間大地聖賢天仙神鬼皆能出入自在當知萬法本空由業力轉虛實並現而昧者未達也前天雖超日月光猶可及此天又高故云日月光明上照不及自有光明者依正二報皆有光明不須日月照故須𦦨摩此云善時分以日月不及應無晝夜而此天以蓮華開合善知時分隨時受樂各別相應故諸經多云夜摩科名依之令聞者便知也四兜率天一切時靜有應觸來未能違戾命終之後上升精微不接下界諸人天境乃至劫壞三災不及如是一類名兜率陀天上科逢欲暫交此則逢欲亦無交心故云一切時靜謂不來不就也有應觸來者謂設有相應之觸來相逼迫未能違戾者謂不能拒絶不行以猶覺有味故此既較勝於前故感命終之後上升精微精微即指兜率以兜率有內院有外院外院則精以對下雜染為名內院則微以對外盡奧加稱不接下界諸人天境者且就外院言之言夜摩雖屬空居猶與下界人天境接是淨而未精今既不接正見其淨而精故乃至劫壞三災不及者乃約內院言之言外院雖不接於下界猶為三災所壞是精而不微若從外向內乃至菩薩住處縱遇劫壞三災不及正見其精而微也兜率陀或云覩史多唐翻知足謂此天於五欲境知止足故或翻喜足謂此天得少意悅為喜更不求餘為足又佛地論云菩薩於中教化多修喜足行故五化樂天我無欲心應汝行事於橫陳時味如嚼蠟命終之後生越化地如是一類名樂變化天前天有應觸來未能違戾此則有應觸來便違戾曰我無欲心應汝行事蓋深拒之也於橫陳時味如嚼蠟者謂拒之不已猶故相逼於彼橫陳之時反覺生厭故云味如嚼蠟以蠟味羶膩嚼之而反欲嘔故是知前天未能違戾是橫陳時猶覺有味此則不惟無味且深厭之耳橫陳者司馬相如賦云華容自獻玉體橫陳宋玉賦云怵惕之心兮徂之牀橫自陳兮君之旁蓋是橫放其身陳獻旁意也此既較勝於前故感命終之後生越化地言生越者越亦同升謂生而便升化樂地故地猶位也結名樂變化者謂樂其自所變化五欲境故餘經或但稱化樂謂自化五塵還自受樂今科名依之六他化天無世間心同世行事於行事交了然超越命終之後遍能出超化無化境如是一類名他化自在天無世間心者厭離世間淫欲不淨全無樂著心故同世行事昨欲離未能權同世間行男女婚配事故統前五因而論初則有交而正次則有交而微三則有交而暫四則行事有味五則行事無味今此第六雖曰同世行事不過隨順世間有婚配之禮而於行欲之事相交之情以併決絶故云了然超越此既通勝於前故感命終之後出超化無化境言遍能者以前五天四天無化後一有化此遍超故結名他化自在者謂假他所化五欲境界以成己樂顯自在義故問台宗別行疏云欲界頂天即魔王天為然歟否答安立圖引因本經云梵王天下有魔羅波旬宮在他化天上經律異相引阿含樓炭等經智度等論亦同此說瑜伽論云第六天上別有魔羅所居天宮即他化自在攝是知魔天別是一類說攝或可說即則不可也約欲分六竟二就欲結判阿難如是六天形雖出動心迹尚交自此以還名為欲界如是六天初則離於邪動次則正動而微三則動少靜多四則出動以一切時靜故然形雖則動未免心交觀其應觸來時未能違戾是猶覺有味故知其心尚交也至第五味如嚼蠟第六了然超越并心交亦無但未能無迹以第五猶有欲境橫陳第六權同世間行事宛有欲迹故言其迹尚交也此通約六因言之若就果中說者如俱舍頌云六受欲交抱執手笑視淫正脈引偈云四王忉利共相抱夜摩執手兜率笑化樂熟視他暫視此是六天真快樂蓋相抱執手俱屬形動而分輕重之異至於兜率之笑雖形出乎動而未能無心若後二天但唯目視雖無交心而猶似有迹故合云形雖出動心迹尚交自此以還句文雖局於六天義實通乎五趣謂自此六天以還由仙及人乃至地獄總名欲界以未離欲境故九地中名五趣雜居地也問天台云六天果報十善為本兼護法生四王兼慈化生忉利兼不惱衆生善巧純熟生夜摩兼修禪定粗細而住生兜率兼欲界定生化樂兼未到定生他化是知六天通以十善為因前三天各兼功行後三天各兼禪定今何惟約欲事輕重分六天耶答功行禪定為緣通修十善為因但十善之中斷欲為要設不斷欲十善何成如來為人從要故唯約欲輕欲重而分勝劣通結六欲天竟
