body:
  text: 京都拈華寺賢宗後學達天通理敬述嗣法門人興宗祖旺謄清懷仁祖育較字二四禪天溫陵曰前明六天雖離塵擾而未能絶欲故通名欲界自此而上明十八天雖離欲染尚有色質故通名色界又通名梵世為已離欲染故亦通號四禪為已離散動故正脈云前天形雖出動心迹尚交足知此上絶無女人心迹俱離無所交接兼無食睡三欲俱忘稍涉饑倦即入禪定出定則飽滿精明是但以禪悅為食為息已離粗重身心矣略分四重各有本定詳分勝劣則有十八二一歷明諸天二結屬色界初四一初禪三天二二禪三天三三禪三天四四禪九天初二一別明二總結初三一梵衆天二梵輔天三大梵天初阿難世間一切所修心人不假禪那無有智慧但能執身不行淫欲若行若坐想念俱無愛染不生無留欲界是人應念身為梵侶如是一類名梵衆天世間仍指欲界以色界衆生亦從欲界中修故一切所修心人謂泛指一切所有修行人也言修心者原其本意言之蓋本意原為修心但以不得其法誤入天趣耳禪那此云靜慮謂由靜而慮修心者首應依之今云不假者正見其不得法也無有智慧者不能得大開悟從性起修但能執身者唯依事相修習嚴持禁戒初則以執持力不行淫欲但未能無心次則若行若坐想念俱無則並心亦亡後則愛染不生無留欲界則上界因成因成而果自隨心故應其離欲之念而身為梵侶已超欲天未及梵輔故稱梵衆正脈云即梵世庶民也二梵輔天欲習既除離欲心現於諸律儀愛樂隨順是人應時能行梵德如是一類名梵輔天躡前愛染不生無留欲界故曰欲習既除謂欲界淫習既已伏除也躡前是人應念身為梵侶故曰離欲心現謂離欲淨心已得現前也自是不假執持能合梵律儀則故曰愛樂隨順言愛樂者無勉行之苦隨順者有安行之樂而梵輔之因成矣因成果遂故曰是人應時能行梵德言應時者顯是本天轉升非同前天離下生上猶待異時也梵行成就即名為德上輔下化即名為行已超梵衆未及大梵故稱梵輔正脈云既輔化即天臣矣三大梵天身心妙圓威儀無缺清淨禁戒加以明悟是人應時能統梵衆為大梵王如是一類名大梵天躡前愛樂隨順故曰身心妙圓以愛樂則心無拘隨順則身無局無拘無局故以妙圓稱之躡前能行梵德故曰威儀不缺以既曰能行則行住坐臥之間有威可畏有儀可仰故以不缺稱之威儀尚且不缺禁戒自然清淨至此天則不唯清淨且加以明悟謂知持知犯知開知遮也既能知持知犯知開知遮自能處斷重輕昭示賞罰而成大梵因矣因成果轉故應時能統梵衆位超梵輔故稱為大梵衆所尊故稱為王按初禪覆四天下而梵王自應各有分封今就其德位相等名為一類然既稱為王仍名為天者為揀餘趣如人王亦名為人故別名竟二總結阿難此三勝流一切苦惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪此三稱勝流者以身勝樂勝超下界故一切苦惱指下界粗重極苦依未到定發初禪色時已離此等苦惱況初禪有覺有觀豈更能逼故直曰不能前云不假禪那故非正修又云無有智慧故非真三摩地唯於持戒清淨心中欲界諸漏所不能動蓋即以此不動義故名為初禪具有五支功德謂覺觀喜樂一心也九地中名離生喜樂地謂離下界苦惱等諸不善法生初禪喜樂等諸善法故初禪三天竟二二禪三天二一別明二總結初三一少光天二無量光天三光音天初阿難其次梵天統攝梵人圓滿梵行澄心不動寂湛生光如是一類名少光天其次梵天者謂其次二禪天本從初禪梵天中來也蓋由梵天中統攝梵人所致圓滿梵行者統攝既久化他功深而自行益純故澄心不動者梵行既圓淨心力固而禪定益著故禪定益著少光之因成矣因成果就故曰寂湛生光謂寂然不動而湛然澄清內外皎潔而身心光耀也正以其局在身心未及遠映故以少光名之二無量光天光光相然照耀無盡映十方界遍成琉璃如是一類名無量光天光光相然者謂依於前天定力轉增身光心光展轉相然如以火傳火熾然盛發也既熾然盛發則照耀無盡而無量光之勝因成矣因勝果遷故曰映十方界遍成琉璃謂所依依報亦同正報身心內外明徹而淨無瑕穢故真際曰映十方界者約其定光隨所受用東西南北等言之據此則所稱十方界者乃指二禪中之十方界也或指小千亦可以二禪天覆小千界故結名無量光者對前有量言之又前天光明此天能量此天光明前天無能量故三光音天吸持圓光成就教體發化清淨應用無盡如是一類名光音天受教者吸取法義施教者執持音聲惟依圓滿光明蓋此天即以圓滿光明成就教體如淨名云或有佛國以光明而作佛事可以例此按古德引諸經論多言二禪以上無語言法唯資中沇師而說恐未必然又法華亦云光音及遍淨乃至有頂天言語之音聲悉皆得聞之是知古德所引無語言者但無舌辨之語言以語言由於光發如後云圓光成音是也發化者依於圓光發宣化理清淨者自然成教無作無為由斯所以應用無盡而為二禪中最勝報矣結名光音者即以其圓光成音言之別明竟二總結阿難此三勝流一切憂懸所不能逼雖非正修真三摩地清淨心中粗漏已伏名為二禪此三稱勝流者不惟勝於欲界兼復勝於初禪以後後轉勝故一切憂懸指初禪微苦以初禪乍離欲苦恐其復墜憂愁懸掛時時以覺觀拒之今至二禪離欲漸遠恐墜心息故憂懸不逼而入無覺無觀境矣雖無覺無觀依然屬於有漏故亦非正修真三摩地粗漏即初禪中愛雖不能斷而於二禪清淨心中無所由起故曰已伏據此則已超初禪未及三禪故以二禪名之具有四支功德謂內淨喜樂一心也九地中名定生喜樂地以定勝初禪有覺有觀帶憂懸之喜樂生獲二禪無覺無觀純內淨之喜樂故二禪三天竟三三禪三天二一別明二總結初三一少淨天二無量淨天三遍淨天初阿難如是天人圓光成音披音露妙發成精行通寂滅樂如是一類名少淨天如是天人仍指前之光音躡前吸持圓光成就教體故云圓光成音謂圓滿光明成就音聲而為教體也躡前發化清淨應用無盡故曰披音露妙謂披發音聲顯露化理而成妙用也按初禪離動求靜二禪依靜現動雖依靜現動動時未免違靜發行猶粗今至此天定力轉深動不違靜故曰發成精行據此則動靜雙亡是曰寂滅寂滅之樂妙勝於前但以初入此境故言通耳結名少淨者謂寂滅名淨以境純故乍通名少以量局故又對前名淨對後名少也二無量淨天淨空現前引發無際身心輕安成寂滅樂如是一類名無量淨天前天雖通寂滅但以淨境未亡是尚為淨之所局乃有量之淨今至此天定力轉深并淨亦空故曰淨空現前既淨空現前以空引淨淨與空發等太虗而為量故云引發無際謂以空引發之淨則無際也淨既無際自覺現前身心如太虗之一塵無纍無拘故曰輕曰安揀前初通寂滅故云成也結名無量淨者即約其淨境無際言之又前天淨境此天能量此天淨境前天無能量故三遍淨天世界身心一切圓淨淨德成就勝託現前歸寂滅樂如是一類名遍淨天前天雖淨境無際而依正猶未盡亡以既有身心即有世界故既有身心世界是淨雖無量而未極圓遍今至此天定力轉深乃並諸身心世界泯同一體蕩然無雜故曰一切圓淨淨德者純淨之德既已圓遍故曰成就有漏之樂至此已極自覺殊勝可託故曰勝託現前不知尚屬有漏趣住不捨故云歸寂滅樂若合前二分勝劣者初則始通如得路次則方成如入門今則已圓如升堂入堂淺深歷然可別結名遍淨者即約其淨境圓遍言之問欲界六天按三摩文中頗似道場嚴戒按禪那文中頗似二漸刳性自入色界以來歷談至此按三摩中頗似道場定慧按禪那中頗似歷位深修況涅槃亦翻寂滅而結盡亦曰寂滅現前何此之寂滅與彼勝劣天淵請示深故以防錯修答善哉問也愚正欲言按前佛示三摩文云汝等決定發菩提心於佛如來妙三摩提不生疲倦應當先明發覺初心二決定義是知正修之人必先發菩提心依真三昧用不生滅心如巧金師欲祀上帝依善好爐錘用金作器初作即貴作成更為尊器結盡所謂寂滅現前涅槃所以翻為寂滅是也今前云諸世間人不求常住是不發菩提心也又云不假禪那無有智慧是不依真三昧也況生天之因始於純想是不以不生滅心而用生滅心也如拙庖人欲飽田夫以破漏釜竈用砂作飯初作原非飯本塵劫只名熱砂初禪中所謂明悟三禪中所謂寂滅是也識此深故自無錯修問前途既錯如何改修答福愛天中有二岐路若從廣果上歷不還超空窮空二皆不失正果則向修不無少益若無想窮空不歸迷漏便入輪轉則已往俱係徒勞此改修善不善之辨也問此之世界身心一切圓淨與我空法空何別答二空因悟而證二淨由想而伏差之毫釐失之千里不可不辨別明竟二總結阿難此三勝流具大隨順身心安隱得無量樂雖非正得真三摩地安隱心中歡喜畢具名為三禪此三勝流又勝於前可知初則始通曰隨順如得路無乖違也次則方成曰安隱如入門無險難也三則已圓曰得樂如升堂入室住持常受用也又隨順云大者揀光音發行未精已小隨順而非大故安隱曰身心者揀少淨初通寂滅身雖已安而心猶未隱故得樂云無量者揀無量淨非真無量而樂猶可量故遍淨之樂無能揀者故通揀以非正非真也雖非正非真而世樂已極故曰安隱心中歡喜畢具安隱心即三禪心也初禪二禪離障增勝故曰清淨心三禪得樂增勝故曰安隱心又初禪離欲界苦惱故喜二禪離初禪憂懸故喜至第三禪於彼二喜亦無但見其樂故曰安隱雖但見其樂而安隱心中亦有自諭之歡莫壯之喜要非人所能知故特表其為歡喜畢具顯樂妙也二禪之上四禪之下得三禪名具有五支功德謂捨念智樂一心也九地中名離喜妙樂地以離前二禪對苦對憂粗相易見之浮喜得第三禪自安自隱細相難知之妙樂故三禪三天竟四四禪九天溫陵曰四禪凡有九天然四禪報境但有三天第四無想乃第三廣果別開此外復有五不還天乃聖賢別修靜慮但以同入捨禪故於捨心同分中立安居處二一凡外四天二不還五天初二一別明二總結初四一福生天二福愛天三廣果天四無想天初阿難復次天人不逼身心苦因已盡樂非常住久必壞生苦樂二心俱時頓捨粗重相滅淨福性生如是一類名福生天復次天人雖指四禪敘因元從三禪中來初禪已離苦惱二禪又離憂懸故云不逼身心初禪諸漏不動二禪粗漏已伏故曰苦因已盡顯三禪中惟有妙樂及細漏也上云勝託現前即是妙樂歸寂滅樂即是細漏樂非常住等者謂定力轉深又覺三禪之樂亦非常住福業盡時久必壞生由是於離苦住樂二心以并伏除故曰俱時頓捨正以二心俱捨名粗重相滅以二心相待即粗重相故淨福性生者捨心不動即淨福性此定暫發即名為生故結名福生者蓋即以淨福性生為名二福愛天捨心圓融勝解清淨福無遮中得妙隨順窮未來際如是一類名福愛天上雖苦樂二心俱時頓捨未免有能有所是捨心猶有限礙至此天捨定益深能所相忘故曰捨心圓融於此圓融捨心了了分明名曰勝解印持此心不令能所復萌於念名曰清淨福無二句言既捨心圓融無限無礙而所感淨福自應無有遮限據此則較勝於前淨福方生明矣言既勝解清淨自應於此無遮福中不住不著故曰得妙隨順妙善也謂於後廣果已能善巧隨順修習故也窮未來際者謂窮究捨心未來至何邊際非是工夫能窮至盡未來際不可以辭害意耳又此天正果惟是淨福無遮而得妙隨順又是廣果方便若窮未來際更是無想方便所以下言此天有二岐路也結名福愛者有二義一淨福無遮可愛樂故二已得淨福無遮福愛廣果勝妙故三廣果天阿難從是天中有二岐路若於先心無量淨光福德圓明修證而住如是一類名廣果天初總標二岐從是天中者謂從是福愛天中有二岐路者謂上去之路有二岐也若於下先明廣果若於先心者先心即指前天圓融捨心勝解清淨故云無量淨光以勝解即是智慧光故福德圓明者謂清淨福德圓滿明淨即前福無遮義修之一字即前得妙隨順此躡前天為此天之因證之一字乃是此天之果謂深證捨禪淨福益勝故問淨福勝前其相云何答前天如寶月離雲初得圓滿明淨此天如寒光無際萬方一時俱照蓋前方備體此則顯用也愛樂此福名曰而住豈知非是無為終有輪轉福業既盡從此便墜譬如登山已到絶頂無久住理若無乘虗之力自應就道而下前功盡廢殊可憐愍結名廣果者清涼云異生善果此最廣故所有功德勝下天故四無想天若於先心雙厭苦樂精研捨心相續不斷圓窮捨道身心俱滅心慮灰凝經五百劫是人既以生滅為因不能發明不生滅性初半劫滅後半劫生如是一類名無想天若於先心者先心二字與前科不同前科惟躡福愛此則兼躡福生以福生苦樂二心俱時頓捨故云雙厭苦樂福愛福無遮中得妙隨順故云精研捨心謂修習捨定也修習捨定勤勇無間故曰相續不斷不欲修證而住故云圓窮捨道謂必欲窮究捨心未來至何邊際福愛天中所謂窮未來際是也捨而云道者蓋即以捨心為涅槃道故然既圓窮捨道必須先伏五識故曰身心俱滅身心者身家之心意含前五識以眼耳鼻舌皆屬身分故五識既眠外緣不行六識未伏內心猶動於是進伏六識令其緣慮不動故曰心慮灰凝灰滅也凝不動也然雖曰灰曰凝但如蟄蟲冰魚非是真斷以細想猶存故此即無想之果而言經五百劫者定力攝持經如許時報形不壞故五百劫後依舊輪轉故次下即出其輪轉之故生滅為因者強制識心令其灰凝是不知妄本而錯修也不能發明不生滅性者迷失根性違遠圓通是不知真本而亂習也錯亂修習由此所以不出輪回初半劫滅者謂初生此天宿定暫壞半劫漸滅想心宿定乃成故後半劫生者謂後將報終現定未失半劫漸生想心現定仍壞故既有成有壞雖中經四百九十九劫不過如重睡人眠熟床枕至若不起滅定現諸威儀彼又烏能知哉結名無想天者謂依於捨禪滅除前六識心心所法令不現行想滅為首故別明竟二總結阿難此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪俱稱勝流者並超下地故一切世間通指欲界已來以至第三禪也欲界苦樂俱粗初禪二禪苦樂漸細率皆苦樂相間至三禪則純樂無苦四禪則樂亦不受故曰諸苦樂境所不能動如石壓草似冰夾魚故非無為真不動地又不動有四一四禪不動二小乘不動三大乘權教不動四一乘實教不動今云非無為者通揀後三以小乘有三無為大乘權教有六無為一乘實教有一無為皆有不動義故而云非真不動者唯揀後一以前二雖是無為猶是似不動非真不動故是知四禪捨定強伏粗識正是有為縱許不動尚不及於小乘況夫大乘及於一乘名同義別不可不辨有所得心即修習四禪心也計為真實期其必得名有所得正顯其是有為心故功用純熟不假免強任運伏識任運成定正顯其有不動義故居三禪上名為四禪而有四支功德謂不苦不樂捨念清淨一心也九地中名捨念清淨地謂捨三禪樂不生悔心念四禪清淨作證住故正脈云初禪共戒戒德增上二禪喜俱光明增上三禪樂俱淨樂增上四禪捨俱於中前三天福德增上後一天捨定增上此其別也凡外四天竟二不還五天俱舍云雜修靜慮有五品不同故生五淨居天雜修者初起無漏次起有漏後起無漏以有漏無漏間雜而修故淨慮者定慧均等之謂五品者下中上上勝上極也問何故雜修靜慮答為生淨居天故為受現法樂故為遮思煩惱故問以何義故名為淨居答離欲聖人以聖道水濯煩惱垢故名為淨淨身所止故名淨居或住於此窮生死邊如還債盡故名為淨淨者所住故名淨居或此無異生雜純聖所止故名淨居今云不還者的指三果人住故三一出由標居二指果顯異三結示勝妙初阿難此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙亡下無卜居故於捨心衆同分中安立居處此中者即指四禪天中復有者除前復有五天俱以不還稱者謂已生此天不復還來欲界生故下界即指欲界習氣即指思惑與生俱生故以習氣名之習氣難除分九品斷斷前六品盡證二果後三品盡證三果共潤七番生死謂七生天上七返人間方乃斷盡所謂獨也二共也二獨也一共也一獨也半共也半也俱時滅盡者謂俱於欲界時滅盡顯欲界中無潤生惑矣苦樂雙亡者謂於初禪二禪苦樂相間及三禪純樂以並俱亡以於那含向中七生天上時色界初三地思先以斷盡而初二三禪亦無潤生惑矣既於下地都無潤生之惑縱擬再生無因可託故云下無卜居卜擬占也既下無卜居宜生四禪且苦樂雙亡進契捨心故於捨心衆同分中安立居處然安立雖在同分而雜修靜慮應另有別業之境觀後文四禪四王獨有欽聞等已可見矣二指果顯異五一無煩天二無熱天三善見天四善現天五色究竟天初阿難苦樂兩滅鬬心不交如是一類名無煩天此天於雜修五品中應屬下品出由中言苦樂雙亡此云苦樂兩滅兩滅即雙亡義也鬬心即能滅之心滅苦滅樂二心相勝有鬬義故並此亦無故曰不交謂不交鬬也熏蒸燥熱曰煩如火被覆不得發泄之象設有鬬心不得發泄其狀如之然亦不交故以無煩名之二無熱天機括獨行研交無地如是一類名無熱天此天於雜修五品中應屬中品鬬心發動曰機收攝不交曰括唯餘一念故曰獨行研交無地者言一念若存雖曰不交終有交時則一念正相交之地也若更以雜修靜慮研究此念了不可得則不唯無交即欲交亦無地矣煨熥遺暖曰熱如火已除爐尚可炙之象鬬機已括一念獨行其狀如之今既研交無地是一念亦不可得故以無熱為名三善見天十方世界妙見圓澄更無塵象一切沉垢如是一類名善見天此天於雜修五品中應屬上品前天研交無地定深慧明至此天天眼頓發故得十方世界妙見圓澄正脈云十方世界即指一大千量也灌頂云報與四禪同分天眼亦同四禪見通大千總相愚謂此是定發恐非四禪報得所及觀下妙之一字可見言妙見者天眼勝妙踰四禪也圓澄者圓遍澄凝用益周而體益淨故塵象即是外境沉垢即是內影言更無者謂外境不能礙其圓內影不能擾其澄也用周體淨澄圓無礙故以善見名之四善現天精見現前陶鑄無礙如是一類名善現天此天於雜修五品中應屬上勝品前天妙見圓澄用周體淨故曰精見現前謂精妙之見已現前也至此天則陶鑄無礙謂隨其所見遍現神足成就化機如陶師之範土為瓦鑄匠之模金作像心之所至手之所到任運成就得自在故結名善現者即取其神足無礙之義五色究竟天究竟羣幾窮色性性入無邊際如是一類名色究竟天此天於雜修五品中應屬上極品上二天天眼神足雖皆於境無礙但由通力所得境實未空至此天乃以析觀而究竟之幾微也言究竟者謂修此觀時初以假想析三千界地為七分次以七分分分轉析為七如是展轉分析名曰究竟至於微塵名曰羣幾羣幾猶衆微也雖至衆微猶有微礙其次又以七分分之則成極微若更析極微則成鄰虗名為窮諸色性以色相體性至此盡故若更析鄰虗則實空性故曰窮色性性上性字指色體下性字指空體謂窮盡色性至於虗空性也又色依空現空性即色性之性故至此雖身相未泯而境界全空故云入無邊際無邊際謂空處邊際也空處邊際即是色界極頂故以色究竟名之俱舍云從此向上無復所居此處最高名色究竟約本經亦可言於諸色性究竟窮研以因立果名也總上指果顯異竟三結示勝妙阿難此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間粗人所不能見初正以結示此不還天總指上之五天彼諸四禪總指前之四地四位天王者初禪大梵二禪光音三禪遍淨四禪廣果也按唯識論二禪以上不分王臣今通稱天王者以王有三義一統攝義統攝梵衆及梵輔故大梵是也二自在義於本天中得自在故光音遍淨是也三尊勝義於諸天中最尊勝故廣果是也初一如世主稱人王實有君臣次二如菩薩名藥王後一如世尊號法王不必定以君臣論也若取捨心同分則彼諸四禪亦可別指第四而四位天王即指凡三外一首二自在廣果尊無想勝皆可以王稱故獨有欽聞不能知見者略有三異一惑有伏斷異謂四禪伏惑不還斷惑二禪分染淨異謂四禪有漏不還無漏三位別凡聖異謂四禪為凡不還為聖彼此懸隔故唯欽仰其德聞稱其名至於依正受用不惟不知亦復不見其勝妙之義已自可見如今下取例顯明世間為衆生同分例第四禪為捨心同分於上二義中此取後義若取前義應云例四禪為色天同分曠野無人深山絶域皆羅漢別境故云聖道場地雖屬羅漢別境亦在世間之內例不還為三果別業亦在捨心同分中故羅漢住持者如入大乘論云賓頭盧等十六羅漢散在諸山海中例三果聖人雜修五品靜慮寄居五不還中世間粗人者無出世心及細妙行例四禪四王無斷惑心不修無漏禪定所不能見者聖凡相隔例四王之與不還獨有欽聞不能知見以能例所而勝妙之義益為顯明歷明諸天竟二結屬色界阿難是十八天獨行無交未盡形纍自此已還名為色界獨行者絶配偶無交者離情欲顯已超欲界未盡形有色質未盡纍餘上思顯不及空處自此已還者從不還至梵衆該兩楹中間天也名為色界者業果色定果色二俱有故通結四禪天竟三四空天四皆言空者無業果色故二一頓超四空二漸窮四空初復次阿難從是有頂色邊際中其間復有二種岐路若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為回心大阿羅漢初總標二岐從是有頂即指色究竟天以其居有色頂故名有頂上鄰空界故曰色邊際中有二岐路者上進之路有二岐也良以福愛天中有二岐路一廣果二無想廣果天中復有住與不住若作證而住則報盡仍墜若不作證則雜修靜慮以入五不還天五不還天復分利鈍利者於無煩天中斷四禪思無熱以至究竟斷四空思從究竟天則頓超四空而證阿羅漢果以根利故回心修大此一岐也若鈍根者於五不還中惟斷四禪殘思尚餘三十六思須待四空中斷於是從色究竟漸窮四空斷四地思成阿羅漢以根鈍故不知回心此又一岐也故曰從是復有二種岐路若於下先明頓超捨心仍指四禪四禪苦樂雙亡名為捨心發明三句乃指無煩等五天無煩鬬心不交無熱研交無地是智慧漸發善見妙見圓澄是智慧始明善現陶鑄無礙是慧光始圓色究竟窮色性性是慧光始通已盡空界三十六思上地無潤生之惑故自此便出塵界離分段生證偏空理故曰成阿羅漢不以小果為足進修大因故云入菩薩乘既已入菩薩乘則是回小乘心向大乘果但據迹猶在聲聞故仍稱羅漢而以大字揀之二漸窮四空初厭色依空名空處二厭空依識名識處二色空識滅而依識性名無所有處四滅窮識性不得真滅名非非想處有定果色無業果色故亦名無色界也此復有二一從福愛分岐由廣果而轉入不還由不還而漸窮二從福愛分岐不由廣果緣無想而直入漸窮如夷路而長直入如險路而近今約漸窮者言之無想直入至後總結自見二一別明四天二總結兩類初四一空無邊處天二識無邊處天三無所有處天四非非想處天初若在捨心捨厭成就覺身為礙銷礙入空如是一類名為空處若在捨心遠指福愛言之言福愛雖捨心圓融勝解清淨依然未出捨心故云在也捨厭成就者謂依此捨厭之心成就廣果乃至色究竟天諸勝報也色究竟天雖已窮色性性入無邊際其奈未盡形纍故猶自覺身為礙銷礙入空者華嚴云超一切色想滅有對想不念種種想入無邊虗空住虗空無邊處清涼釋云超色想者超可見有對色謂眼所見色滅有對想者耳鼻舌身和合想滅故此滅不可見有對色謂耳等四根所對聲等四塵不念種種想者不念意識和合想故意識分別一切法故說名種種此滅不可見無對色謂意所緣法入無邊虗空者三色想絶則入空理廓爾無邊智論義亦同此但文有少異耳然此固是銷礙入空乃泛約一切修空定者言之今此既從色究竟來似不必更銷外色以彼業已窮色性性入無邊際唯覺有身為礙若銷礙者只須仍用析觀分析此身以至於無則是入空況前既能以此空界今仍以此空身豈不更易蓋同一空處而修法不同勿拘泥也名為空處者以身界俱空惟覺虗空無邊為識所依所謂厭色依空是也二識無邊處天諸礙既銷無礙無滅其中唯留阿賴耶識全於末那半分微細如是一類名為識處有頂已銷界礙空處又銷身礙故云諸礙既銷顯唯有空存也今以緣空無邊令心散漫乃作意欲忘久久定成并前無礙之無無字宜作空字亦復俱滅顯惟有識存也其中者即指所存識中唯留賴耶等顯六識已滅也言六識乃托塵似有離塵實無今既色空俱滅六識無托已與之而滅故阿賴耶識但是帶言其意為顯末那言末那以賴耶為體唯有賴耶方能保全今所留者乃阿賴耶識所保全之末那而又言半分微細者以末那外緣六識行相粗顯內緣八識行相微細今六識既滅則外緣六識半分之粗顯者已滅故所留者唯內緣八識半分之微細者也是知此之識定唯以末那為能緣心賴耶為所緣境耳按古德半分微細之解種種異說各有所據今則唯據本經不必強同一音異解亦不必辨名為識處者色空俱滅唯覺識心無邊所謂厭空依識是也三無所有處天空色既亡識心都滅十方寂然逈無攸往如是一類名無所有處空處亡色識處亡空故曰空色既亡顯唯有識也識心都滅者不唯六識及末那粗分不行乃并彼末那細分亦復俱滅以前天唯留末那細分今復厭其恆審思量作意欲滅久久定成思量都盡顯唯有賴耶獨存但賴耶無有分別唯覺十方寂然杳杳冥冥向去不知是何境界故曰逈無攸往攸猶所也合轍云老莊呼為混成外道執為冥諦盡在於此名無所有處者色亡空亡末那亦亡唯存賴耶無分別性故無所有所謂色空識滅而依識性是也四非非想處天識性不動以滅窮研於無盡中發宣盡性如存不存若盡非盡如是一類名為非想非非想處識性即指賴耶性者根本義以賴耶為諸識本故楞伽云藏識海常住境界風所動種種諸識浪騰躍而轉生是知空處亡色識處亡空略似於境界風息無所有處識心都盡略似於識浪不騰但以法執俱在我執暫伏唯以滅定窮研如入室避風似引水觀浪風實不息而浪猶正躍所以不見本識唯覺十方寂然逈無攸往今云識性不動者言寂無攸往正是識性不動之境藏海常住之源奈為二執所障不能薦取亦唯略似而已錯亂修習不可不辨以滅窮研者因不能於識性不動處薦取藏海常住仍復以滅定窮研欲滅本識識實不滅唯覺滅定益深是為於無盡中發宣盡性其猶患目羞明以障覆燈燈實不滅惟見障外無明是非非想因成矣識實不滅而為滅定所障故如存不存雖為滅定所障而識實不滅故若盡非盡是非非想果現矣名為非想非非想處者如障覆燈障外不見以障外不見故作非想以滅障識亦復如是如障微開燈明微露以燈明微露故作非非想滅定稍虧亦復如是所謂滅窮識性不得真滅是也別明四天竟二總結兩類此等窮空不盡空理從不還天聖道窮者如是一類名不回心鈍阿羅漢若從無想諸外道天窮空不歸迷漏無聞便入輪轉初總結非真此等者總指四空天也正脈云初天窮色令銷二天窮空令無三天窮識令滅四天窮性令盡前二窮境後二窮心欲令心境雙空故總為窮空不盡空理者有二義一不達法空下文聖道窮者是也二我空未極下文外道窮者是也從不下依來分岐即分為二初超輪一類謂始從福愛分岐由廣果而入不還由不還而漸窮四空今略其遠因故唯言從不還天初果即入聖流今約三果故曰聖道窮者以根鈍故不還天中唯斷四禪殘思今於四空天中以窮空力漸斷三十六思證我空理成阿羅漢而名不回心者蓋以其沉空滯寂不思度生對前頓超一類名為鈍也若從下入輪一類謂始自福愛分岐不由廣果便入無想非正道故名為諸外道天此復有二一非果計果報盡便入輪轉二不自作證窮空直入空界以於無想天中身心俱滅心慮灰凝其奈初半劫滅後半劫生滅時似無生時還有以還有故厭離無想修空界定直入空處以至非非想處作證而住故曰不歸但以迷於有漏不知斷惑無聞聖道不求真證斷證既無定壞還墮故云便入輪轉所謂饒經八萬劫終竟落空亡也然此以上四天經論異說諸家廣引多約不論何界何人但修何定即得何果今既皆順序而談承前起後與諸家所引不得全同故今疏唯就本經解釋不能一一附會諸說蓋恐多岐亡羊賜覽高賢幸垂原諒通結以前別分勝劣竟二總斥迷淪三一依空界結顯前天二即空界結顯後無三出迷真斥以妄淪初阿難是諸天上各各天人則是凡夫業果酬答答盡入輪彼之天王即是菩薩遊三摩提漸次增進回向聖倫所修行路初天人入輪是諸天上者指空天以上所說色界及欲界天也上字宜作前字因譯字少混遂致古德欲將此科移於下科之後各各天人者指二界天民則是凡夫者除不還天以不還是聖人天故業果酬答者以既是凡夫則是有漏業果縱獲勝福不過酬答前因天福受盡還生人間故曰答盡入輪如永嘉所喻仰箭射空勢盡還墜是也彼之下天王向聖彼之天王者即指四禪四王六欲六王即是菩薩者除不還天猶屬小聖故又即是菩薩者按華嚴仁王瓔珞等經皆有菩薩寄報天王然亦隨教各別似皆不合本經今按本經既云遊三摩提應是已得圓通遊戲於三摩境者講者即當以本經聖位配之謂乾慧菩薩寄報四王為接人間衆生於欲令輕也十信寄報五欲為接四王衆生於欲漸離也十住寄報初禪為接六欲衆生於欲永斷也十行寄報二禪為接初禪衆生令離覺觀也十向寄報三禪為接二禪衆生令離喜樂也十地寄報四禪為接三禪衆生令捨妙樂也不言加行寄報者諸經多不開故或前二隨十向寄報後二隨十地寄報亦可問四禪既屬有漏豈無接者答等覺位接寄報應在色究竟天但本經色究竟天不顯有王按別經亦有摩醯首羅天王說寄亦可漸次增進者接物利生或就己德行漸增而位漸進故回向聖倫者回寄報因向菩提果以是悟後之修行行位位皆不離菩提心故既不離菩提之心則行行位位皆為所修行路也問前云五不還天天王獨有欽聞不能知見今何言其即是菩薩答前據迹論此約本說不可為難二即空界結顯後無按前欲界色界最後皆有結屬之文空界之後暫結兩類至此方以結屬者為顯向後無天觀文言逮終可見阿難是四空天身心滅盡定性現前無業果色從此逮終名無色界即就空界而言故曰是四空天身心滅盡者謂空處滅身識處猶有心在至無所有處非非想處則並彼所執以為自心者亦復俱滅若論識性本不可滅但非彼所能知彼惟定伏自覺為滅耳定性現前者謂深定之體現前能發定果色故謂定中現起微細身境自在受用顯揚論中所謂定自在所生色者是也無業果色者謂業報所感粗顯身境不復更有以不同前之諸天兼有雜修業故從此二句雖是結屬寓有顯後無天之意逮及也終盡也謂從此空天天及於盡也雖尚存天名而無色可見故以無色名之三出迷真斥以妄淪此皆不了妙覺明心積妄發生妄有三界中間妄隨七趣沉溺補特伽羅各從其類此皆二字統該三界諸天妙覺明心指本覺言本無識心分別曰妙本無色空頑冥曰覺本無欲塵蒙蔽曰明此顯本覺心中無三界也一念妄動遂成晦昧名曰不了由不了故從迷生迷故曰積妄由積妄故業轉現三次第而起名曰發生由發生故遂於無同異中見同見異故曰妄有三界無同異即業相見即轉相異即世界同即虗空此二皆屬現相該三界也中間者即指三界中間妄隨者虗妄隨順謂認為實有取著造業也取著造業今感天趣展轉趣於餘趣故曰七趣沉溺問今論天趣何言七趣沉溺答補特伽羅各從其類補特伽羅此云數取趣謂天報已盡於中有身數數取著趣於餘趣故各從其類者謂無始業種眠伏藏識次第而發若修羅業發則從修羅一類若人道業發則從人道一類乃至若地獄業發則從地獄一類也問若爾則天福獨不可修耶答若悟而後修不復妄隨則天福即聖道之階梯如前所謂漸次增進回向聖倫者是也若不悟而修不達妄有則天樂即苦趣之前導如前所謂業果酬答答盡入輪者是也汝正不必問天福之可修與不可修只須問汝心之能悟與不能悟觀文中曰妄有曰妄隨曰七趣曰沉溺其警惕之意亦深切矣總結天趣竟七修羅二一總標種類二別分勝劣初復次阿難是三界中復有四種阿修羅類按諸經論修羅所居似唯局在欲界今言三界中者以是同分境故如下云乘通入空又云能與梵王帝釋爭權則知三界之中皆有修羅同分地也四種者種族有四以胎卵濕化不同故雖種族有四而同名修羅以性多瞋行多妬性行多相類故清涼疏云阿修羅阿素洛梵音楚夏耳瑜伽論譯為非天古德釋云有天福無天德故舊翻無端正長阿含云修羅生女端正生男多醜從男彰名什曰秦言不飲酒雜寶藏云妬天飲酒採華醞釀瞋無和氣不成終不得飲二別分勝劣四一卵生鬼攝二胎生人攝三化生天攝四濕生畜攝初微劣若於鬼道以護法力乘通入空此阿修羅從卵而生鬼趣所攝若於鬼道者謂前因從鬼道中來來非無因故云以護法力謂彼以善願心護經護呪護戒或受佛遺囑護持修法行道之人皆得以護法稱之由此善業力故出於鬼倫來入修羅道中則福勝於鬼矣鬼道即具五通加以護法為因果中益勝故能乘通入空故知空界中有其同分地也鬼多浮想故轉報仍從卵生神通類鬼雖改形猶屬鬼攝此類雖不言住處以義推之應與鬼鄰如婆沙云妙高山中空缺之處如覆寶器修羅所住如堅手天等三界安立圖說云自須彌山根上去一萬由旬有堅手天堅手上有持鬘天持鬘上有恆憍天此三天皆鬼神所居二胎生人攝微勝若於天中降德貶墜其所卜居鄰於日月此阿修羅從胎而出人趣所攝若於天中者原從天道中來來非無因故曰降德貶墜色天以梵行持者欲天以少欲為德若梵行稍虧情欲稍重皆為降德謫謝天位改報修羅即為貶墜故古德釋云有天福無天德也福報似天住亦相類故卜居鄰於日月正法念云有阿修羅住須彌山側於欲界中化身大小隨意能作即此類也情重被貶故感從胎而出以胎因情有故也下既鄰於日月下即接於人境又以其情欲同人故為人趣所攝三化生天攝上勝有修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿修羅因變化有天趣所攝此類不出前因以果詳之似從人道中來以人中有大福德應生天上但以勝負心重有爭王圖霸之業執分疆裂土之功事不遂意瞋妬結心故感為修羅王福報同天人中大福所感性好鬬諍心有勝負所感爭王圖霸之心未了分疆裂土之習猶在故感執持世界正脈云執持世界者亦能驅役鬼神禍福人間如孔經有修羅所罰之語其意可見愚謂世界二字言總意別以七趣各有世界亦各有王執持今既為修羅王其所執持者應即修羅世界力洞無畏者神通之力洞達無礙上天下地無所畏懼此亦由於有大福德及勇敢之心所致能與等者灌頂云梵王大千之主帝釋三十三天中尊四王四洲都統各有專司修羅不攝妬心起諍欲竊其權時來與戰又引經證云修羅初來戰時先四天神次餘散天次四天王四王力敵不勝方報天帝天帝力不能敵然後展轉乞力上天乃至梵王下天助之但未指出何經想必有所見然此類既能與梵釋四天爭權則色欲二界皆應有其同分境矣福德力大不受胎藏但離人間報軀即現修羅幻形故云因變化有以化以離應故也福報似天故為天趣所攝或以住處鄰於天宮如正法念經云有力大福者住於衆相山間是也四濕生畜攝下劣阿難別有一分下劣修羅生大海心沉水穴口旦遊虗空暮歸水宿此阿修羅因濕氣有畜生趣攝此亦不出前因以果詳之似從畜道中來如畜道中有秉歸受戒之鳥興雲致雨之龍雖有善業福因而畜習未除故報感下劣修羅而言別有一分者謂下劣修羅不止濕生一類餘生尚多此濕生者但是下劣中一分故而言下劣者約因來處不及上三約果住處福德神力皆不及於上三若與上三對論勝劣則化生者為王胎生者似臣卵生者似民此濕生者似為修羅奴耳生大海心者海心即是海底但約中間言之沉水穴口者水穴或指尾閭但世典所載尾閭在碧海之東乃川名也今云海心似別目海底有泄水處故又二句亦可分為二類如金翅食龍餘習故感生大海心孽龍避苦餘習故感沉水穴口旦遊虗空者白晝以供驅使夜歸水宿者黑夜以息勞役故判其為修羅奴也計海為勝而欲附合故感因濕氣有以濕以合感故也畜道中來猶帶餘習故為畜趣所攝或以住處接於龍界如正法念經云無力少福者住下大海心底是也按諸經論中所說修羅住處不得全同然亦惟佛能知惟佛能說殆非凡夫心量所及今亦唯據現經所說因果相類之義釋之餘不俱載總結詳明七趣輪轉竟三依次答釋前問二一答前總問二答前別問初答前總約七趣問也阿難如是地獄餓鬼畜生人及神仙天洎修羅精研七趣皆是昏沉諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空華元無所著但一虗妄更無根緒如是二字總指以上所說地獄餓鬼畜生三惡道也人及仙天三善道也常途六道無仙攝歸天趣以世人仙天不分順世而說今論七趣故開之也常途修羅居人天之次約善道三品說之今居最後以有四趣不專善道不專惡道故精研七趣者精心研究七趣本因無明不覺曰昏起惑造業曰沉隨業受報曰諸有為相妄想二句乃釋成有為之義言分趣唯以妄想受生輪轉亦惟妄想隨業既唯妄想所作非有為而何哉本心即本元真如前云本元真如即是如來成佛真體故云無作不為妄想所蔽曰明不為七趣所礙曰圓不為業報所遷曰妙特為不了此心妄有七趣若果能了此則輪轉何有故云皆如空華其意以虗空喻真心以狂華起滅喻七趣輪轉也元無所著者當處出生隨處滅盡豈有著落是知七趣但一虗妄更無根本頭緒可研究耳據前阿難問云此道為復本來自有為是衆生妄習生起今云妄想受生妄想隨業是答以妄習生起也又云但一虗妄更無根緒是答以非本來有也二答前別問答前別約地獄問也據前阿難雖別問地獄乃以一例六故今結答仍躡七趣言之阿難此等衆生不識本心受此輪回經無量劫不得真淨皆由隨順殺盜淫故反此三種又則出生無殺盜淫有名鬼倫無名天趣有無相傾起輪回性若得妙發三摩提者則妙常寂有無二無無二亦滅尚無不殺不偷不淫云何更隨殺盜淫事阿難不斷三業各各有私因各各私衆私同分非無定處初兼釋前疑此等衆生句佛亦總約七趣言之蓋明知阿難問地獄例六趣也據前阿難疑云佛體真實云何復有地獄餓鬼畜生修羅人天等道今如來以不識本心等釋之不識本心者謂不知佛體真實既不知佛體真實自應以妄想隨業受此輪回此七趣之所以有也七趣既有輪回不息故云經無量劫惡道固為不淨善道淨亦非真故曰不得真淨蓋以不識本心終成有漏故也皆由下申明隨業言所以不得真淨者皆由隨順殺盜淫故十惡之中獨舉殺盜淫者以貪等屬惑攝在隨順之中妄等屬口生自身業之表輪回正因唯身業為要故反此三種者知其為惡道之因而欲違之也出生者漸次伏除除得一分有生得一分無也若隨順而至於全有則報感鬼獄故曰有名鬼倫蓋地獄亦餓鬼之倫類故若出生而至於全無則報感上界故曰無名天趣蓋全無非欲天所能故傾猶奪也有無相傾者言有不終有或時為無所奪而漸至於無無不終無或時為有所奪而漸至於有漸至於無則從天洎仙及人展轉輪回於善道漸至於無則從獄洎鬼及畜展轉輪回於惡道由是於無作本心顛倒相續故曰起輪回性輪回稱性者以是有為生滅性故若得下教以息輪妙發三摩者不離六根門頭親見不生滅性也不生滅性有不能有曰妙無不能無曰常對待既絶中亦不立曰寂然既有不能有不待有而立無無不能無不待無而立有故曰有無二無謂有與無之二邊皆無有也二邊既無不待邊以立中故曰無二亦滅謂無二之中道亦俱滅也自是淨極光通寂照含虗却來觀世猶如夢事隨緣現無而不住於無故曰尚無不殺不偷不淫隨緣現有而不住於有故曰云何更隨殺盜淫事是則七趣之所不輪而如來密因常現前矣阿難下應問結答不斷三業各各有私者謂業各不同受報亦各有私此答阿難自然彼彼發業各各私受問也因各各私衆私同分者謂各各私中亦有彼此業同者同在一處受報是為衆私同分之地此則亦有定處故曰非無如地獄中輕者定生有間重者定生無間此答阿難為有定處問也通上依次答釋前問竟四結歎以示邪正自妄發生生妄無因無可尋究汝勗修行欲得菩提要除三惑不盡三惑縱得神通皆是世間有為功用習氣不滅落於魔道雖欲除妄倍加虗僞如來說為可哀憐者汝妄自造非菩提咎作是說者名為正說若他說者即魔王說初顯妄勸修承上受報雖有定處而究其遠本亦皆由於一念妄動變起賴耶識境故曰自妄發生蓋妄之一字即指最初一念目為無明者是也若更究其無明之所從生則別無所由故曰生妄無因如前所謂妄性無體非有所依是也既非有所依則離念即是故云無可尋究如前所謂將欲復真欲真已非真真如性是也然既無可尋究惟是從粗向細漸次伏除故教以汝勗修行最勉力也修行者即指漸次伏除行故漸次伏除不易可得欲得菩提從何入手故示以要除三惑三惑者即指淫殺盜三於中執迷不了即名為惑而云要除者若但離於有不名為除蓋必至有無二無無二亦滅乃名為除也不盡下出過結歎謂設若不盡三惑不唯七趣輪回縱以禪定之力得發相似神通亦不能超出世間成就無作妙力故云皆是世間有為功用蓋以習氣不滅對境復發上品必為魔王中品必為魔民下品必為魔女故云落於魔道原其初修之時雖欲除妄及乎落於魔道倍加虗僞魔福受盡業報現前阿鼻極苦還自來受是故如來說此名為可哀憐者然亦警之至矣汝妄下斥疑揀魔據前阿難疑云佛體真實云何復有地獄餓鬼畜生修羅人天等道今云汝妄自造非菩提咎蓋斥其所疑之不當耳要使知自疑不當令其信佛之所說故示以若有作是說者名為正說設若他有所說如言本來自有非業所招違越誠言故知即是魔王所說是乃如來恐後世惑於魔說造無間業而預為揀示也總結大科精研七趣以破奢摩中障竟二詳辨五魔以破三摩中障三一如來指魔誡聽二會衆喜聽慈誨三如來次第為說初四一將罷回告二結說標魔三指魔顯害四誡聽許示初即時如來將罷法座於師子床攬七寶几回紫金山再來憑倚普告大衆及阿難言七趣不輪密因離障自此三摩可修禪那易成佛心稍慰玄音欲息故云將罷法座攬七寶几者按之而起回紫金山者轉身離座此即將罷法座之相床以師子名者師表說法無畏或即像師為床亦可几以七寶名者寶表聖財普利或即用寶為几亦可紫金山如來身也丈六金軀圓光四布巍巍如山故以為名再來者再轉身來憑倚者憑几倚座然既回紫金山而又再來憑倚者將恐魔起五陰事障三摩欲為詳辨也普告大衆及阿難言者微細魔事人各應知傳示末法阿難任重故二結說標魔汝等有學緣覺聲聞今日回心趣大菩提無上妙覺吾今已說真修行法汝猶未識修奢摩他毗婆舍那微細魔事初結前已說真法上云普告大衆此中獨呼有學者正為有學以魔重故無學魔輕亦應兼為汝等二字攝故回心者回小乘心趣大者向大乘路以前總請別請皆有回小向大之意既同為一會無妨渾約今日言之大乘菩提亦有權實分圓為揀權分故云無上妙覺顯會衆所趣者乃實教圓證最上一佛乘故奢摩三摩禪那皆為真修行法如前備明故云吾今已說據此則真修有路無上妙覺可趣所以上科有將罷法座語也汝猶下標後未識魔事奢摩他即三摩中止毗婆舍那即三摩中觀如六結中解前進後具有止觀義故陰境現前不自覺知故云微細魔事法席將輟未經辨析故慮其猶未識也後會無定不如就座指示故此標顯至下乃詳為研辨三指魔顯害魔境現前汝不能識洗心非正落於邪見或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認賊為子又復於中得少為足如第四禪無聞此丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄初不識落邪首二句牒前不識以為落邪之因次二句承言洗心非正落於邪見言修定原為洗心魔境不識則蔽諸正見縱欲洗心亦不得其正矣不得其正必落於邪如下之五陰魔境總由認邪為正皆邪見也或汝下歷指魔境然亦不必分屬五陰蓋五陰中每陰有十魔而十魔之中或有唯是陰魔者或有陰魔之外復兼天魔者或有陰魔之外復著鬼神者或有陰魔之外轉遭魑魅者如色陰中前九似惟陰魔而第十則曰此名邪心含受魑魅或遭天魔入其心腹又如受陰中發無窮悲等皆為陰魔乘此則有悲魔等入其心腹而悲魔等或是天魔或是魑魅俱未可定況第九中亦言鬼心久入是知陰魔通於五十而天魔鬼神魑魅有具者有不具者且總為指出耳此即上之所謂魔境心中不明者即是不識認賊為子者即是落邪乃取喻言之又復下作證墮獄於中者亦是通指五陰魔中如前四中皆有自言登聖之語而識陰中且更自言滿足菩提同是得少為足一例不免輪回不責誤修反謗實證阿鼻極苦自分當受佛恐疑誤後人取例警覺故云如第四禪無聞比丘等也智度論云有一比丘師心自修無廣聞慧不識諸禪三界地位修得初禪便謂初果乃至四禪便謂四果命欲盡時見中陰相便生邪見謗無涅槃羅漢有生以是因緣即墮泥犁獄中今云無聞比丘即論中有一比丘無廣聞慧稱為第四禪者即論中修得初禪乃至四禪妄言證聖即論中便謂初果乃至四果天報已畢即論中命欲盡時衰相現前即論中見中陰相謗阿羅漢身遭後有即論中謗無涅槃羅漢有生墮阿鼻獄即論中以是因緣墮泥犁中蓋經論一事而詳略異耳四誡聽許示汝應諦聽吾今為汝子細分別誡以諦聽者魔事微細非粗聞可了故許以子細分別者慈悲諄切恐漫說難明故子孳也謂孳孳無已也正脈云不但分別而更許子細者一以魔相幽微難見一以魔害酷烈難堪故勞真慈費委悉也如來指魔誡聽竟二會衆喜聽慈誨阿難起立并其會中同有學者歡喜頂禮伏聽慈誨阿難起立者聞害竦動故唯并有學者魔重偏憂故蒙許子細分別故歡喜頂禮承教虗心樂聞故伏聽慈誨三如來次第為說三一出由令覺二辨相令識三遵古結勸初三一總舉妄本二各出其由三不覺成害初佛告阿難及諸大衆汝等當知有漏世界十二類生本覺妙明覺圓心體與十方佛無二無別由汝妄想迷理為咎癡愛發生生發遍迷故有空性化迷不息有世界生初先明所迷之真論魔境有學偏重論妄本無學同迷故佛告阿難亦及大衆有漏世界依報也十二類生正報也遠由惑現近由業招故曰有漏揀非法性及受用身土以彼為無漏故也離無明不覺曰本覺離妄想昏亂曰妙明諸佛依此出生曰覺圓世界衆生依此建立曰心體據此則生心即是佛心故云與十方佛無二無別由汝下正明所起之妄近由迷事妄想遠由迷理無明故曰由汝妄想迷理為咎此總明下乃詳釋癡即無明以不如實知真如法一故即名為癡不覺心起而有其念即名為愛如前云性覺必明妄為明覺蓋即指欲明覺體之念為愛也由愛故真妄和合變起賴耶本識名曰發生所謂以依不覺故心動說名為業如前云覺非所明因明立所是乃以立所為發生也生發者謂依前所生業識發起能見見分所謂依動故能見如前云所既妄立生汝妄能是乃以妄能為生發也遍迷者謂由能見故於前本覺真心全成晦昧不見真覺唯見頑虗是曰故有空性如前偈云迷妄有虗空是也化迷不息者謂以見對空轉覺迷悶復起化迷之心相續不息遂於空中見有色相是曰有世界生如前云依空立世界是也此空此界且約細相中國土言之不言衆生者以動魔之由唯在國土振裂無關衆生故亦不言粗相者以粗相業招屬別業境迷事妄想所致細相惑現屬同分境迷理無明所致別業境振不足致魔以別業自見故同分境裂乃足致魔以同分共見故二各出其由三一動魔之由二成魔之由三超魔之由初三一承顯界妄二因示禪境三由變動魔初則此十方微塵國土非無漏者皆是迷頑妄想安立當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶汝等一人發真歸元此十方空皆悉銷殞云何空中所有國土而不振裂初承上直顯則字緊承上文十方指同分境也微塵有二義一約喻顯國土之多二約體乃微塵所成若論同分則約喻為長如同分妄見文云娑婆世界并及十方諸有漏國同是覺明無漏妙心虗妄病緣然既通十方則數等微塵不為多矣若取有漏則約體亦可以衆生法執未了計為微塵所成如金剛般若經云譬如三千大千世界碎為微塵然界既可碎則體為微塵是所計矣二義並存隨意取用可也非無漏者即是有漏遮詮表詮異故皆是迷頑妄想安立者謂由遍迷有頑空如前云生發遍迷故有空性由妄想化迷有世界安立如前云化迷不息有世界生此世界虗妄之義已可見矣當知下以空況界一切衆生皆以虗空為大今言生汝心內是本覺真心猶在虗空之外前云空生大覺中即斯義也又一切衆生共計虗空不壞今云猶如片雲點太清裏太清即指天際據世典以清氣為天且居最上故以太清稱之片雲即是浮雲浮雲至虗且唯一片而又點於太清渺乎微矣豈能久存以此喻空則空之易壞可知空且易壞況諸世界又在虗空之中其虗妄之義不益可見乎哉前云如海一漚發亦大同此義汝等下指證必變若有生皆證空界全銷以下言國土但是振裂故唯約一人言之發真歸元即指解結修證如云入流亡所動靜不生根塵雙脫覺心獨露是曰發真若更能覺所覺空空所空滅生滅既滅寂滅現前名曰歸元歸元無迷則方空銷殞以虗空原因迷妄有故如前云生發遍迷有虗空性是也問佛久成道虗空猶在銷殞之義云何會通答所言銷殞者但是全空全真證者見真不見於空義言銷殞若未證者依然見空如法華見淨見燒義可準思然證者既不見空亦不見界是乃於同分境中撤去一分當此之時異生必見振裂故以云何空中等而反徵之意顯其決無不變理也問證者不見空未證者依然見空不變證者不見界未證者何故見界振裂答空本無形撤去一分不覺如十燈光遍照一室撤去一燈餘九光依然遍滿界乃有形撤去一分應變如十水共注一器撤去一水而全器之水皆應動搖理所必至不應為難二因示禪境汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通吻當處湛然汝輩修禪飾三摩地者言汝輩欲修禪那以歷聖位先當嚴飾三摩地境所謂解六結而越三空也設若此根初解先得人空則是心精現前而十方初心菩薩及諸無漏大阿羅漢所證人空之理與此正相吻合若更至空性圓明成法解脫解脫法已俱空不生則當處湛然渾同佛境是即於同分境中撤去一分也三由變動魔一切魔王及與鬼神諸凡夫天見其宮殿無故崩裂大地振坼水陸飛騰無不驚懾凡夫昏暗不覺遷訛彼等咸得五種神通唯除漏盡戀此塵勞如何令汝摧裂其處是故鬼神及諸天魔魍魎妖精於三昧時僉來惱汝初魔等見變一切魔王欲頂天主也不言魔民魔女者舉主攝伴故及與鬼神者大力鬼神亦攝飛行夜叉地行羅剎等諸凡夫天者六欲四禪亦攝外道無想天等然魔鬼等雖具五通不能知其故於未然故但見其宮殿無故崩裂大地下異生驚訛言不惟魔鬼等宮殿崩裂乃並諸大地亦皆振搖而坼裂也水即水行陸即陸行飛騰即是空行然行雖有三咸居地上地既振坼而三行衆生自應亂走亂飛亂沉故曰無不驚懾驚懾者恐懼不安之貌凡夫無自覺之智無預見之明故曰昏暗由昏暗故不覺被境所遷而訛傳謬說如言陰陽失度及神鰲動目等皆是也彼等下魔等來惱彼等者仍指魔王鬼神等修有漏禪發有漏通故曰咸得因是有漏故唯五種以於六通中惟除漏盡通故既無漏盡自應戀此塵勞不求出離如何令汝任運成道而摧裂其處自不甘也是故者承上不甘摧裂起下來惱之義鬼神天魔專於惱害正修不言諸凡夫天者以彼雖見振裂不為惱害事故魍魎妖精或即魔鬼之所使役僉猶皆也言汝正在三昧彼等即見振裂恐將來必壞故皆來宣淫導妄惱亂於汝令汝三昧不得成就動魔之由竟二成魔之由二一魔本無害二心迷乃成初然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅冰暖氣漸鄰不日銷殞徒恃神力但為其客彼既來惱自應有怒且因壞其宮殿怒非尋常故云大也而云雖者顯與我無傷反以損彼故彼塵勞內者明其猶在生滅法中汝妙覺中者明其已住真常理內以生滅而欲壞真常故曰如風吹光以怒氣而欲惱定心故曰如刀斷水了不相觸者光不受吹而水不受斷喻真常定心雖遇魔惱而亦無所傷也又汝妙覺中者真常之智正明正明故猶如盛沸之湯彼塵勞內者生滅之見正執正執故猶如結堅之冰若沸湯之暖氣漸鄰於冰而堅冰之結寒不日銷殞喻真智照魔自有破魔之功邪執對真自無久立之勢而反以自損也據此則魔雖百計欲惱不過徒恃神力與汝無傷縱有大怒亦不過但為其客不久便去是在行人唯以正知正見待之可也二心迷乃成成就破亂由汝心中五陰主人主人若迷客得其便承上魔本無害所以能成就彼志而破亂於汝者究是誰之所使故曰由汝心中五陰主人五陰主人即向下所說五重陰境及三摩中觀智心也良以陰境現前觀智稍虧則天魔波旬等乘機而入故向下以主人若迷客得其便喻之蓋喻中惟以住者名主不住名客不必定約賓主之義言之以賓主有相契之義則法喻不齊耳正脈云魔擾行人如客賊劫主主若深居不動賊乃莫測愈近愈恐俗云強賊怕弱主是也主若自守不定驚慌出走為賊所執方得其便以法對喻足知患在主也成魔之由竟三超魔之由當處禪那覺悟無惑則彼魔事無奈汝何陰銷入明則彼羣邪咸受幽氣明能破暗近自銷殞如何敢留擾亂禪定初出由顯超言如上所說則知行人正當處於禪那之際但應覺悟無惑不言三摩而云禪那者以禪那翻為靜慮蓋以三摩中兼於定慧言之覺悟者覺其是魔悟非善境既已覺其是魔悟非善境自應不受其惑不受其惑則定益深而慧益明魔難入而邪難近故曰無奈汝何陰銷下詳釋其故良以覺悟無惑則陰境漸銷而精明漸著故曰陰銷入明如前云聞熏精明明遍法界是也羣邪者魔與鬼等言彼等成形皆為稟受幽暗之氣如羅剎向日不見可為明證據此則汝之精明能破彼之幽暗彼若近汝自當銷殞如前云則諸幽暗性不能全是也如何敢留者決言其不敢久留留且不敢又何能擾亂汝之禪定通上各出其由竟三不覺成害若不明悟被陰所迷則汝阿難必為魔子成就魔人如摩登伽殊為眇劣彼唯呪汝破佛律儀八萬行中只毀一戒心清淨故尚未淪溺此乃隳汝寶覺全身如宰臣家忽逢籍沒宛轉零落無可哀救初被迷落魔若不明悟者不能明其是魔悟非善境也既不能明其是魔悟非善境必至誤為聖證被陰境所迷矣既被陰境所迷則外魔得便壞汝定心亡失正見流入邪思故曰必為魔子既為魔子則所修皆為魔業將來亦惟成就魔道中人如摩下舉例顯害如來意謂汝先發心請定原以登伽為害起見以今較之如摩登伽女之害殊為眇劣眇謂微小劣謂少力言其為害不大而為禍無力也何以見之言彼摩登伽女唯以先梵天呪呪汝並無別術較之陰境疊出魔相百變其能害之術已屬眇劣縱使攝入淫席淫躬撫摩亦唯破佛所制律儀而於八萬行中以三聚收之亦只毀一攝律儀戒較之身為魔子成就魔人其所成之害又極眇劣且彼時將毀戒體並非汝之故起淫愛由於心清淨故尚不至以破戒罪淪溺三途尤見其為害不大而為禍無力也此字即指陰魔言陰境現前不能明悟外魔得便壞其定心永殞善根深入邪見法身從此而斷慧命由茲而絶故曰隳汝寶覺全身寶取其體不變覺取用能隨緣即是法身亦兼慧命故以全身稱之如宰下設喻警覺宰臣向歸王化喻阿難等本屬佛界人也一旦著邪佛界之所不容如宰臣叛王忽逢籍沒之事籍沒者沒其籍貫如漢書云除其屬籍是也既已除其屬籍自應屏諸遠方斥之異域至親不能見憐義友難以援濟故曰宛轉零落無可哀救意喻著邪見者佛界不容必至輪轉三途塵劫莫返雖有慈心菩薩悲願知識亦無策以相救可不慎哉可不慎哉通結已上出由令覺竟二辨相令識五一色陰魔相二受陰魔相三想陰魔相四行陰魔相五識陰魔相初四一始修未破色陰二終破顯露妄源三中間所現魔相四總結以示警囑初阿難當知汝坐道場銷落諸念其念若盡則諸離念一切精明動靜不移憶忘如一當住此處入三摩提如明目人處大幽暗精性妙淨心未發光此則名為色陰區宇初念盡心純如上所說陰魔既有如是過患不可不知故教以當知以示警覺意也汝坐道場者指欲修三摩初坐道場時言初坐道場必先止息散心故云銷落諸念銷落者謂以反聞力忘其所緣塵象則分別念慮之心自然銷落非離反聞別有銷落法也其念若盡者果其塵亡念盡則諸離念者自應別有離念之心離念之心即是根性現前於一切時不雜不昧故曰精曰明動靜不移者動去靜來其性自爾即不雜義憶忘如一者憶生忘滅其體恆然即不昧義又動靜不移指耳根聞性憶忘如一指意根知性六根舉二餘四以意攝故當住下定現色區當住此處者住心於根性處也動靜憶忘等相悉皆不生故云入三摩提當此之際雖根性昭昭而亦不知是何境界故曰如明目人處大幽暗蓋以六精之性尚為色陰所覆雖微妙清淨而心未發光故曰此則名為色陰區宇區小屋也宇謂屋四垂也意言精性妙淨之心本自周遍受局蔽於色陰如小屋之四垂也問其念若盡似乎無色可見何故猶為色陰區宇答雖似無色全未忘空以幽暗即喻空也空既未忘色非真無但是一味反聞定深不見耳二終破顯露妄源若目明朗十方洞開無復幽黯名色陰盡是人則能超越劫濁觀其所由堅固妄想以為其本前以亡色住空雖根性昭昭不知是何境界故喻以如明目人處大幽暗以乃以定力轉深并空亦忘故喻以若目明朗十方洞開無復幽黯自此精性妙淨心光遍圓故曰名色陰盡按耳根圓通此當動靜不生能超劫濁者此經劫濁以空見相織為體如前劫濁文云汝見虗空空見不分相織妄成名為劫濁是知上之如明目人處大幽暗不知是何境界正是劫濁之相今以定力轉深并空亦忘見無所織故能超越超越之後回觀色陰之所由生即是於空見不分之際堅執欲見遂致結成色相故云堅固妄想以為其本前云化迷不息有世界生然化迷不息正堅固妄想也三中間所現魔相十一精明流溢前境相二精明流溢形體相三精魄遞相離合相四心魂靈悟所染相五抑按功力逾分相六心細密澄其見相七塵併排大入純相八欣厭凝想日深相九迫心逼極飛出相十邪心含受魑魅相初阿難當在此中精研妙明四大不織小選之間身能出礙此名精明流溢前境斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪當在此中即指未破將破時也上云如明目人處大幽暗雖曰未破已及將破之時若住於此境正宗家所謂墮一色邊故須於此精研妙明妙明者仍指六根中性但更加精心研究耳精心研究暫忘色塵不唯外色并內亦忘故曰四大不織以地水火風皆屬色塵故也織者彼此相入即和合義也圓覺經云一切衆生妄認四大和合為自身相今既不織則身相不有故曰少選之間身能出礙少選謂須臾頃也身能出礙者不是現前肉身蓋以四大不織另覺有清虗之身出離四大礙故然清虗之身即是精明出離四大之礙自應流行洋溢於前境之上故曰此名精明流溢前境斯但功用者謂斯境非真但由精研妙明功用所現若功用稍虧斯境即滅故云暫得如是既不常住即屬虗妄故曰非為聖證以聖證必無滅故不作聖證之心依舊精研妙明正是破陰前相故曰名善境界若作聖證之解正宗家所謂奪弄精魂魔得其便乘隙而入故曰即受羣邪二精明流溢形體相阿難復以此心精研妙明其身內徹是人忽然於其身內拾出蟯蛔身相宛然亦無傷毀此名精明流溢形體斯但精行暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪雖現前境不作聖解仍用前觀故曰復以此心精研妙明此心即能觀之心妙明即所觀之性但心則益精明則更妙耳觀照既深不復外溢一味反聞自應流溢於內故曰其身內徹問前相原以精研妙明功用所現今既復以此心精研妙明前相應當益著何故不溢於外而反流於內耶答前云如明目人處大幽暗雖曰精研妙明未免有悶極欲出之心故致精明外溢今以不作聖解仍復精研妙明未免有捨外向內之心故致精明內流古德云枯木堂前岔路多信不誣矣於其身內拾出蟯蛔者亦是另覺有清虗之身於其現前身內拾出非是現前肉身自拾蓋以精明從外向內觀肉身如木偶故得拾出蟯蛔而宛然無傷也此乃前之精明隨其捨外向內之念還照臟腑故曰流溢形體斯但精行者謂斯亦非真但以研究之行更精於前故現斯境暫得下准前可知文中蟯蛔者腸胃中蟲也短細者為蟯長大者為蛔三精魄遞相離合相又以此心內外精研其時魂魄意志精神除執受身餘皆涉入互為賓主忽於空中聞說法聲或聞十方同敷密義此名精魄遞相離合成就善種暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪初以精研妙明稍間外出之心遂致精明外溢次以精研妙明微雜向內之念遂致精明內流今則二俱不著仍以觀照之心於前內外二相處精研妙明本體故曰又以此心內外精研其時以內外精研之力妙明通融故致內之六氣互涉外之二音交陳也魂魄意志精神外典所載不得全同按字彚釋臟字義云臟者藏也謂精藏於腎神藏於心魂藏於肝魄藏於肺志藏於脾對今經六中缺意而亦不言魂等何物云何應藏於肝等此一說也正脈引醫經云魂藏於肝魄藏於肺意藏於脾志藏於膽或曰左腎精藏於腎神藏於心對今經名數俱同而與字彚稍異此二說也灌頂引扁鵲難經云五臟者有七神各何所藏也答曰藏者人之神氣所含藏也故肝藏魂肺藏魄心藏神脾藏意與智腎藏精與志對今經多智而與字彚醫經亦各有異此三說也愚素不善外典亦不敢妄評姑録之備考然佛稱一切智人凡有所說皆由現量所見降斯已還比非莫定今擬以六氣釋之良以人稟天地之氣天地之氣有六所謂陰陽晦明風雨人亦應有所謂魂魄意志精神言氣之上升者為魂下沉者為魄宛似天地陰陽二氣氣之斂靜者為志散動者為意宛似天地晦明二氣氣之充和者為神氣之浸潤者為精宛似天地風雨二氣但唯約一身言之是則六氣為所執受身為能執受而言除執受身者以是總相無可涉故餘皆涉入者如魂本上升而亦能下沉魄本下沉而亦能上升等互為賓主者魂若下沉則魄為主而魂為賓魄若上升則魂為主而魄為賓餘四例此可知然此猶約三二對涉若更約魂涉於五則五皆為主而魂獨為伴魄等涉五亦然故曰互為此由妙明通融於內故致然也忽聞空中等者言妙明本自周遍佛法由來現成向以生發遍迷故有空性化迷不息有世界生空界既彰佛法斯蔽今以色陰將開空界將盡性具之佛法將現本來之圓音預兆故忽聞空中說法十方敷義敷義說法空方互影不必以顯密強分此由妙明通融於外故致然也此名精魄等者六氣舉二餘以義攝故遞相離合者離合即是涉入以凡言涉入必是離本位而合於他故至於空中說法十方敷義乃由妙明通融二音預兆還與精魄等六氣中熏染成就當來善種下科云心魂靈悟所染相蓋由此也四心魂靈悟所染相又以此心澄露皎徹內光發明十方遍作閻浮檀色一切種類化為如來於時忽見毗盧遮那踞天光臺千佛圍繞百億國土及與蓮華俱時出現此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪前以觀照之心內外研窮故致內之精魄遞相離合外之空界成就善種今則不著前境仍以觀照之心澄然顯露於內皎然洞徹於外也澄然顯露於內故致內光發明皎然洞徹於外故致十方遍作金色一切化為如來蓋以十方法界一切種類本為自性緣起同依法身建立向以色陰所覆情器未融金色不形妙體安在今以色陰將開情器將融十方法界預作金色一切種類預化妙體此法身性土將來必證之兆雖現此境觀照不息功用增上報化預形故於此時忽見毗盧等也毗盧遮那翻有三義一曰遍一切處似指法身二曰滿淨似指自報三曰光明遍照似指他報今兼二報踞猶憑也天光臺者梵網云爾時蓮華臺藏世界赫赫天光師子座上盧舍那佛蓋今之毗盧遮那即彼之盧舍那故灌頂云毗盧遮那與盧舍那梵音賖切耳然彼既云座上即是踞也今云臺即彼之蓮華臺藏世界譯之略耳天光二字即彼之赫赫天光師子座良由座依於臺故云天光臺也千佛圍繞等者彼經偈云周匝千華上復現千釋迦一華百億國一國一釋迦蓋以蓮華臺藏世界中央一大蓮華即毗盧所踞周匝復有千華一華上有一佛為主今云千佛圍繞是也又一華有百億葉有百億國土有百億釋迦今云百億國土及與蓮華蓮華即佛之所坐雖不言佛可以意會然遮那為報佛釋迦為化佛俱時出現乃報化身土將來必得之兆此名心魂靈悟所染者以前境中二音交陳心魂靈悟所染習故言心魂者心即是意亦六氣與二餘以義攝故良以六氣依於妙明既二音交陳於妙明則六氣中皆有靈通慧悟熏染習氣特人不自覺耳既不自覺云何忽於觀境中現故曰心光研明照諸世界心光研明者謂觀照之心澄露於內照諸世界者謂觀照之心皎徹於外前云內光發明即心光研明之相十方遍作金色一切化為如來等即照諸世界之相暫得下亦準前可知五抑按功力逾分相又以此心精研妙明觀察不停抑按降伏制止超越於時忽然十方虗空成七寶色或百寶色同時遍滿不相留礙青黃赤白各各純現此名抑按功力逾分暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪雖見前境不作聖解仍用前觀故云又以此心精研妙明雖復精研妙明而前境不亡即以觀慧而觀察之如起信云行者常應智慧觀察勿令此心墮於邪網又云當念惟心境界則滅皆觀察義也而言不停者非是用觀不停謂雖爾觀察前境不得停也因不得停改修於止故曰抑按降伏抑按者不得抑按前境但唯抑止自心按定不動如起信云不得隨心念外境界又云久習淳熟其心得住皆抑按義也以此對治前境銷滅即是降伏又古德相傳禪境現前當以三法驗之一以定研磨二依本修治三智慧觀察如經言欲知真金以三法試之謂燒打磨行人亦爾智慧觀察如燒以定研磨如磨依本修治如打今此中又以此心精研妙明即是依本修治觀察二字即是智慧觀察抑按降伏即是依定研磨既降伏已仍復精研妙明自得陰開性現鉛盡金純可為明喻若一味抑按即是制止超越觀慧致有下之境相現前於時者即於此時也忽然等者良以前之佛相依於慧心幻起前之界相依於定境妄現今因一味抑按故惟見界存且又以超越觀慧故不見佛相佛相既已不現臺華因之俱隱故唯見十方虗空等也七寶百寶依然報土之相或分自報他報以自報為自所受用故唯七寶他報乃別應十地故兼百寶雖是幻起妄現亦能交涉互容故曰同時遍滿不相留礙若仍厭其雜制止轉增則青黃赤白各各純現謂忽爾純現青色忽而純現黃色等此報土相盡而性土相現也上科性土惟一金色今言四色各純以凡是純而無雜即性色故此名抑按等者抑按即是制止逾分即是超越以上云制止超越故也餘俱同上六心細密澄其見相又以此心研究澄徹精光不亂忽於夜半在暗室內見種種物不殊白晝而暗室物亦不除滅此名心細密澄其見所視洞幽暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪既見前境覺得抑按逾分故又以此心研究妙明所謂心若沉沒以觀起之也既令定慧均等仍復澄靜其見而照徹前境所謂推驗根源畢竟從何處起也精光不亂者澄靜其見所致夜暗見物者照徹前境所致夜半中夜也暗室無燈也見種種物者謂室外所有種種物象亦皆能見不殊白晝者謂暗室所見了了分明亦如日中是室之與暗皆不能為礙也雖不能為礙而暗之與室及室中之物亦不除滅不除不滅而無障無礙是陰開之前相現矣此名心細等者謂觀照之心研究精細見性雖未全彰然亦密得澄靜故云密澄其見上云精光不亂即其相也既已密得澄靜於所見境自能洞徹幽微故云所視洞幽上云夜暗見物即其相也如是光影倐起倐滅故云暫得聖證常光耀古騰今故此非為若不取著邪亦成正況夫本是善相故曰不作聖心名善境界若生取著正亦成邪況夫本屬光影故曰若作聖解即受羣邪七塵併排大入純相又以此心圓入虗融四體忽然同於草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木此名塵併排四大性一向入純暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪又以此心者仍以觀照之心研究妙明也研究功極身界俱忘內外合一空洞無礙故曰圓入虗融內外合一故四體忽然同於草木空洞無礙故火燒刀斫曾無所覺此約微燒輕斫而言謂微燒不覺其爇輕斫不覺其痛以同於草木故也又則火光等者言不惟微燒任其火光勝發亦不能燒之令爇不唯輕斫縱使割其身肉亦猶如削木無關也問此與觀音火不能燒刀段段壞有何差別答彼是圓通勝用因機而現此是色陰將開由作而成真妄逈異勿錯會也此名塵併者身界俱忘內塵外塵併為一體也雖併為一體而四大之性猶未全忘若復以研究之力排遣四大之性以至空洞無礙則是一向入純上云圓入虗融是也火燒刀斫曾無所覺等相由此而現暫得下例上可思八欣厭凝想日深相又以此心成就清淨淨心功極忽見大地十方山河皆成佛國具足七寶光明遍滿又見恆沙諸佛如來遍滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受羣邪上雖圓入虗融未極清淨以猶有火燒刀斫等相故厭此欲離故又以觀照之心精研妙明蓋為欣求極淨成就清淨心故淨心功極者為淨其心觀照功極也忽見大地等者頓現染淨無礙境故十方山河皆成佛國者即染而淨之相具足七寶者明是淨國光明遍滿者七寶交輝於其中也又見恆沙諸佛者以十方山河皆成佛國一國一佛其數應有恆沙之多故遍滿空界樓殿華麗者上國土為總報此樓殿為別報總報既已七寶交輝樓殿自應華藻流麗以一淨一切淨故下見地獄上觀天宮者即淨而染之相言既為淨國應絶染相而依然見獄見天明是即淨而染也得無障礙者有二釋若惟就天獄則是上觀下見得無障礙若通約佛國則是染淨相即得無障礙問上釋行人原為成就淨心應惟現淨相何故染淨俱現得毋與心不相應耶答離染成淨非為真淨以有對待故是必染淨無礙方為真淨行人悟此頓息欣厭則是成就淨心即善境界此名欣厭等者以為厭前境欣求淨心仍以精研妙明之力凝心注想想久入化以成真淨染淨無礙之境由此現也九迫心逼極飛出相又以此心研究深遠忽於中夜遙見遠方市井街巷親族眷屬或聞其語此名迫心逼極飛出故多隔見非為聖證不作聖心名善境界若作聖解即受羣邪由前染淨無礙欣厭心息頓覺妙明真心周圓無際橫豎無垠故又以觀照之心研究妙明以求深遠之境也中夜正暗不應有見今云忽於中夜能見者顯暗不能蔽且云遙見遠方者顯境不能隔此正色陰將開見性將圓之兆交易之處曰市上古多於有井之處立市交易故曰市井市井通衢曰街旁通曲街曰巷親兼內外六親族該遠近一姓眷屬者男女大小凡在眷念所屬者皆是也或聞其語者見性將圓聞性亦爾以元是一精明故正脈云豫親見河南僧在潞偶然靜坐忽見鄉里市井宛然其兄被官責打計其時日不久有同鄉至潞問之果然此必禪境所發略同乎此惜其僧不知自重也愚謂既曰遠方遙見不必定是自己親族眷屬蓋凡有彼之親族眷屬共住共語皆能見皆能聞故又中夜尚能見聞白晝可知此名迫心等者謂研究妙明以求深遠即是功力逼迫逼迫之極妄理相應似覺自心有飛出之相由此所以暗不能蔽境不能隔問上疏釋云由前染淨無礙欣厭心息頓覺妙明真心周圓無際橫豎無垠既無際無垠云何又有飛出相耶答前以欣厭乍息影嚮暫現及乎用力研究依然局在根中即今逼極飛出亦屬影嚮古德云分明月在梅華上尋到梅華月轉無殆有見於此耳十邪心含受魑魅相又以此心研究精極見善知識形體變移少選無端種種遷改此名邪心含受魑魅或遭天魔入其心腹無端說法通達妙義非為聖證不作聖心魔事銷歇若作聖解即受羣邪前之九相總以不作聖心更研妙明為由惟此最後一相乃是於前逼極飛出之相作聖證解更求精極為由故云又以此心研究精極雖欲研究精極但一作聖心早受羣邪故致見善知識形體變移言善知識者略有二釋一者即是素所親近知識但見其形體變移此魔力所使也二者本無知識但妄見有且見其形體變移此魔力所現也起信云或現天像或現菩薩像亦作如來像等即形體變移之相少選者不待多時無端者不假因由種種遷改者忽而天變為佛忽而佛變為天等所謂頃刻之間而千變萬化也此名邪心等者一作聖證即是邪心招引羣邪即是含受前云主人若迷客得其便者正喻此耳而言魑魅者但是魔之所使若急能覺悟頓息前心不久自銷為害猶細設或不自覺知仍遭天魔入其心腹不惟外見魔形而且內染魔慧無端便能說法相似通達妙義前云必為魔子成就魔人是也但是魔力所持故曰非為聖證覺悟無惑不作聖心依本修治魔自銷歇若依舊不了作聖證解即更受羣邪前云宛轉零落無可哀救是也中間所現魔相竟四總結以示警囑阿難如是十種禪那現境皆是色陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等當依如來滅後於末法中宣示斯義無令天魔得其方便保持覆護成無上道初出由警惕如是十種者通指以上所說不言三摩現境而言禪那者以此境雖在三摩而究其所以能現者略兼靜之與慮如前云修奢摩他毗婆舍那微細魔事是也後皆倣此皆是色陰者指將破未破之時用心交互者觀心不純正念與邪念交互而起也良以若無邪念魔事不興若無正念縱興不至於十唯是二念交互乃至乍興乍滅旋滅旋興展轉至十是曰故現斯事衆生頑迷者謂賦性頑鈍觸事昏迷不自忖量者言位在凡流乍現聖境應自忖量我何人斯而能自茲勝應由彼頑而且迷故不能也逢此因緣者以前十種皆是色陰將破因緣迷不自識者不識其是禪那現境謂言登聖者不自量其分是凡流未得謂得未證言證故云大妄語成而言墮無間獄者極顯其為害無已以示警惕意耳汝等下囑令宣護如來在世魔無能為故教以當依如來等謂當依佛說待至如來滅度後也如來滅後正像猶可故又教以於末法中當斯時也魔強法弱故須宣示斯義知而預防魔不得便倘有疏忽為害非細故以無令得便囑之保持覆護者保持末法覆護正修成無上道者透過十心色陰破而根性顯進破餘四六結解而圓通證矣總結色陰魔相竟二受陰魔相四一始修未破受陰二終破顯露妄源三中間所現魔相四總結以示警囑初阿難彼善男子修三摩提奢摩他中色陰盡者見諸佛心如明鏡中顯現其像若有所得而未能用猶如魘人手足宛然見聞不惑心觸客邪而未能動此則名為受陰區宇彼善男子指透前境人也正脈云於上十境或備經或不備經或相類更多總以不為所惑即透過耳透過前境仍復精研故曰修三摩提此中修三摩提望色陰為終修望受陰為初修也奢摩他仍是止義蓋以透過前境修三摩提永絶異念以成深止即於此中心精湛朗超出空昧名為色陰盡者色陰既盡空色俱忘心光遍圓相似同佛故曰見諸佛心殆即於自心見佛心也雖見佛心猶為受陰所覆不過於虗明中暫見佛心影像故以明鏡現像喻之若有二句合上喻起下喻也相似見諸佛心故曰若有所得合上見鏡中像非是親證故曰而未能用此合鏡像雖現而實未能取喻雖不具意必有故恐猶未明故次下復以魘人喻之魘人者邪鬼所魘喻行人為受陰所覆也雖為受陰所覆而自心中本具佛心功德昭昭不昧故以手足宛然見聞不惑喻之雖宛然不惑奈自心觸著客邪而不能動受陰所覆亦復如是雖自心本具佛心功德昭昭不昧而蔽於受陰不能隨緣顯現也既不能隨緣顯現如才出一屋又入一屋故名受陰區宇二終破顯露妄源若魘咎歇其心離身反觀其面去住自由無復留礙名受陰盡是人則能超越見濁觀其所由虗明妄想以為其本前以受陰所覆如人被魘若受陰既破則是魘咎歇也夫受陰無別即是見分照用以有照用則有領衲名為根本受陰凡屬受陰者皆從此中生故由有根本受陰攬色成根而起身見設如受陰未破身見亦未全忘須待受陰盡時方乃脫於身籠故曰其心離身不惟離身且能反觀其面不唯反觀其面且能得意生去住自由無復留礙亦如魘咎既歇手足見聞皆能動作施為自覺能如是者名為受陰盡相按耳根圓通此當聞所聞盡問色陰先盡云何復有身面答所謂盡者但盡其陰非盡其色若必令盡色則色陰盡者全同無色豈理也哉超越見濁者此經見濁以性大相織為體如前見濁文云汝身現摶四大為體四性壅令留礙四大旋令覺知相織妄成名為見濁今以受陰既破無復攬色成根性大不織身見亦忘故能超越超越之後回觀受陰之所由生蓋即見分照用虗妄領納故曰虗明妄想以為其本三中間所現魔相十一功用抑摧過越相二功用陵率過越相三修心無慧自失相四用心忘失恆審相五修行失於方便相六輕安無慧自禁相七見勝無慧自救相八因慧獲諸輕清相九定心沉沒失照相十定境安順入心相初二一示相教悟二警迷顯害初阿難彼善男子當在此中得大光耀其心發明內抑過分忽於其處發無窮悲如是乃至觀見蚊虻猶如赤子心生憐愍不覺流淚此名功用抑摧過越悟則無咎非為聖證覺了不迷久自銷歇彼善男子指受陰將破未破人也將破未破勢處兩楹故曰當在此中見色陰銷受陰明白故云得大光耀良以受陰即見分虗明向墮色區不顯其大今破色陰虗明體露故以大光耀名之其心發明者即於自心見佛心也不知尚為受陰所覆自謂同佛深責不度衆生故曰內抑抑猶尅責義也然此心固善若一味如此忘其正受則為過分忽於其處者即指有衆生處發無窮悲者謂悲哀不能自已如是凡見一切乃至蚊虻蛆蟲等作一子想故曰猶如赤子小兒始生血色未退心生憐愍亦所當然但不覺淚流即墮愛見矣此名有功用心抑責摧傷過越其分致現斯相悟之則隨緣利生不失正受故曰無咎受陰暫現故曰非為聖證不作聖解即是覺了不迷果其正見分明自然愛見不生故云久自銷歇二警迷顯害若作聖解則有悲魔入其心腑見人則悲啼泣無限失於正受當從淪墜若作聖解者妄謂同於諸佛大悲觀音悲仰魔得其便以類相致故有悲魔入其心腑悲魔謂苦死滯魄年老成魔類也入其心腑持其神識故令見人則悲啼泣無限由此起諸顛倒生於邪見故曰失於正受命終必為魔王眷屬宛轉零落故曰當從淪墜功用抑摧過越相竟二功用陵率過越相二一示相教悟二警迷顯害初阿難又彼定中諸善男子見色陰銷受陰明白勝相現前感激過分忽於其中生無限勇其心猛利志齊諸佛謂三僧祇一念能越此名功用陵率過越悟則無咎非為聖證覺了不迷久自銷歇詳觀前之色陰十境明是從前向後次第相生透過一層又現一層灌頂云色境竪發是也此之受陰十境乃各別現起蓋是境同見異隨見成魔灌頂云受魔橫開是也色陰既開仍修三摩以窮受陰故還以定中男子稱之見色陰銷者剝去一層色礙粗境如脫外衣受陰明白者露出一種虗明境界如現內衣義同上科得大光耀勝相現前者於自心中見諸佛心義同上科其心發明是悟證之境同也不知尚為受陰所覆獨傷不自策勵故云感激謂感傷激勵恨不速成此所起之見異也然此心亦善但只管如此即為過分忽於其中者即指感激心中生無限勇者勇鋭不能自禁如是則冒難歷險總以無畏蹈湯赴火亦所不辭故曰其心猛利自覺立地可成極果故曰志齊諸佛將比龍驟何似蟻步故謂三祇念越此名有功用行志欲陵跨佛乘率爾自在未免過越其分致現斯相悟之則任運求佛不失正受故曰無咎受陰暫現故非聖證覺了不迷依然正見分明安住正受久之自然銷歇二警迷顯害若作聖解則有狂魔入其心腑見人則誇我慢無比其心乃至上不見佛下不見人失於正受當從淪墜若作聖解者不自忖量計為聖證也忘失正受魔得其便以類相致故有狂魔入心狂魔者世間狂人不得志而死者滯魄不生年老成魔故入其心腑攝其神識故令見人則誇謂矜誇己德也我慢無比者謂因我起慢無有比倫其心不唯無有三乘乃至上不見佛以縱是成佛不過與我平等下不見人以人既在凡豈能知我所證由此起諸邪見失於正受成就魔人當從淪墜吁可畏哉灌頂云破色陰之聖人陵率過越尚致狂魔入心今之宗徒自謂破參效顰呵佛罵祖者正不知能破幾陰乃爾恬不知懼耶功用陵率過越相竟三修心無慧自失相二一示相教悟二警迷顯害初又彼定中諸善男子見色陰銷受陰明白前無新證歸失故居智力衰微入中隳地迥無所見心中忽然生大枯渴於一切時沉憶不散將此以為勤精進相此名修心無慧自失悟則無咎非為聖證悟證之境同前不言勝相現前者色盡必有譯語略故良由於自心中見諸佛心不知尚為受陰所覆不能進破故曰前無新證雖見佛心若有所得而未能用仍思歸託色身加功用行又見色陰已銷無可依託故曰歸失故居然既見色陰已銷正好依色修習以雖依無覆故也既見受陰明白正好進破受陰以虗明非真故也二俱不能是曰智力衰微以不達色陰空而不空受陰有而不有義故由此於兩楹中間灰心泯志故曰入中隳地自是不見有一事可作故曰迥無所見此所起之見與前不同也心中者即指中隳心中一事不作望其有得故曰生大枯渴謂如枯待雨如渴待水也沉憶不散者謂沉靜其心憶念中隳之境時刻不敢有放故自謂沉憶之久必有所得渾忘本修三摩故即將此以為勤精進相此名修心等者言色陰既盡正好假託幻色增修三摩修治虗明之心而乃無有了達之慧致現大枯渴相悟之則頓捨沉憶還依本修故曰無咎非為聖證者以不同聖證前後坐斷中亦不立故文缺覺了二句亦譯者略也二警迷顯害若作聖解則有憶魔人其心腑旦夕撮心懸在一處失於正受當從淪墜前無新證歸失故居自謂前後坐斷入中隳地迥無所見自謂中亦不立一切時沉憶不散自以為勤精進相凡此皆為作聖解也忘失本修魔得其便以類相致故有憶魔入心憶魔者世間狷謹之人遇事懸心抑而死者滯魄不生年老成魔故入其心腑拘其神識故令旦夕撮心謂從朝至暮拘促其心也懸在一處者謂繫於方寸絲毫不敢放故一味如此故令失於正受無慧自濟當來必從淪墜問致心一處無事不辦何故反失正受答此是開示初心攝散心看話頭語耳已破色陰不應泥此況此乃魔力所攝勿錯會也修心無慧自失相竟四用心亡失恆審相二一示相教悟二警迷顯害初又彼定中諸善男子見色陰銷受陰明白慧力過定失於猛利以諸勝性懷於心中自心已疑是盧舍那得少為足此名用心亡失恆審溺於知見悟則無咎非為聖證悟證境中亦應有勝相現前之語慧力過定者歡喜體任忘其收攝故忘其收攝不知增修本定不能透過此境故云失於猛利歡喜體任一味尊重己靈將謂自心有佛故以勝性懷心所謂太尊貴生是也言勝性者即指自心中佛心既以此為懷故於自心疑是舍那又前於色陰盡時十方洞開無復幽黯似是光明遍照今又於自心中見諸佛心合此二相致有是疑言已疑者謂已起是疑但少有未安耳雖少有未安然亦不思增修故云得少為足此名用心等者謂偏用慧心急於體任亡失恆常審察自己分位一味溺於悟證知見致現斯相悟則不溺仍復增修本定故曰無咎受陰所覆如鏡現相故曰非為聖證二警迷顯害若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失於正受當從淪墜若作聖解者自任舍那執迷不返雖少有未安不復增修以類相致故有下劣易知足魔入其心腑下劣易知足魔者如世間無聞比丘見取外道等死而不化年老成魔者皆是也入其心腑攝其精神故令見人自言我得無上涅槃第一義諦此非果計果之餘習假諸人而發泄其志故失於正受者心隨魔變當從淪墜者死墮三途是可為魔王快心而賢聖悼歎也用心亡失恆審相竟五修行失於方便相二一示相教悟二警迷顯害初又彼定中諸善男子見色陰銷受陰明白新證未獲故心已亡歷覽二際自生艱險於心忽然生無盡憂如坐鐵床如飲毒藥心不欲活常求於人令害其命早取解脫此名修行失於方便悟則無咎非為聖證首四句可知新證二句古德皆謂與第三見同愚則謂之半同半異言半同者新證未獲即是前無新證言半異者前云歸失故居是欲歸託色陰加功用行自覺色陰已盡無可依託此云故心已亡者以前於色陰盡時十方洞開無復幽黯似覺心光遍滿然彼不過功用暫現久自銷歇今前境既已銷歇而故心自然不復有矣古德云初見道者見山不是山水不是水既見道後山還是山水還是水即斯意耳歷覽者前後遍觀二際者過去際與未來際也未來新證未獲不知如何用功過去故心已亡恐其將有退失故曰自生艱險於心者即於艱險心中忽然生無盡憂者未證則憂其無進已證則憂其有退故如坐鐵床者涼則冰熱則煎喻坐臥不寧如飲毒藥者吞亦難吐亦苦喻飲食不安心不欲活者將謂死即無退由是恨不速死故求人害命其意已速死離憂故云早取解脫此名修行等者謂有心修行失於方便智慧超脫無路致現斯相悟之則故心已亡正好捨舊趣新新證未獲正好增修本定故曰無咎欲死求脫明係謬誤故曰非為聖證二警迷顯害若作聖解則有一分常憂愁魔入其心腑手執刀劍自割其肉欣其捨壽或常憂愁走入山林不耐見人失於正受當從淪墜若作聖解者以虗明為聖證執捨命為解脫魔得其便以類相致故有常憂愁魔入其心腑常憂愁魔者如世間深厭世故無力超脫憂而死滯魄不化年老成魔者是也入其心腑濟其憂愁故令自割其肉欣其捨壽速死此其甚者或有微輕惟是常懷憂愁走入山林深厭世故不耐見人此心神為魔習所熏也不能自返故致失於正受唯習魔業自然從淪墜修行失於方便相竟六輕安無慧自禁相二一示相教悟二警迷顯害初又彼定中諸善男子見色陰銷受陰明白處清淨中心安隱後忽然自有無限喜生心中歡悅不能自止此名輕安無慧自禁悟則無咎非為聖證色銷受明同前處清淨中者新證未獲不以為艱故心已亡不以為險但不知增修本定惟是一味無事宗家所謂墮在無事甲裏是也清淨之久內心寧謐自覺安妥隱順名為心安隱後不知但是一時輕安將謂得大自在故忽然有無限喜生無限喜生其相云何謂心中歡悅不能自止此宗家之大忌也此名輕安等者謂清淨心中暫現輕安無有智慧不能自禁致現斯相悟之則不以為喜急尋本修故曰無咎暫現不常有類光影故曰非為聖證二警迷顯害若作聖解則有一分好喜樂魔入其心腑見人則笑於衢路傍自歌自舞自謂已得無礙解脫失於正受當從淪墜若作聖解者以清淨為正定以輕安為解脫以歡喜為樂道以類相致故有好喜樂魔入其心腑好喜樂魔者如世間本無正知正見妄自倨傲托跡山水猖狂而死年老成魔之類入其心腑發其狂解故令見人則笑甚至於衢路傍自歌自舞了無忌憚其意蓋是自謂已得無礙解脫不自覺知由此失於正受死入魔屬故云當從淪墜輕安無慧自禁相竟七見勝無慧自救相二一示相教悟二警迷顯害初又彼定中諸善男子見色陰銷受陰明白自謂已足忽有無端大我慢起如是乃至慢與過慢及慢過慢或增上慢或卑劣慢一時俱發心中尚輕十方如來何況下位聲聞緣覺此名見勝無慧自救悟則無咎非為聖證見色陰銷以為無妄不盡見受陰明白以為無真不圓不知方是色開受現之相故自謂已足既自謂已足將必以我為勝故致忽有大我慢起言我慢者謂因我起慢如言我即是佛等故稱為大若果有實證則是有端起慢今以無而計有故云無端依於此慢以為根本如是乃至見劣計我勝見等計我等名之為慢此但慢也又復於等計我勝於勝計我等名為過慢以過於前慢故又復於勝計我勝為慢過慢以較前過慢其慢更甚故又復於未得者謂得未證者言證此則惟以增上心而慢他也又復於彼有德有智不敬不求名卑劣慢此則自甘卑劣反以慢人也古德云七慢之中惟缺邪慢愚謂本非正知正見而諸慢併發即是邪慢既七慢具足無前無後故云一時俱發言俱發者但是心中俱有遇境即現耳心中下乃釋成俱發之義言心中尚輕十方如來何況如來以下諸位菩薩及小乘聲聞緣覺則諸慢俱發可知此名見勝等者謂見己為勝設以慧照則一切諸法一性平等尚不見有一衆生可慢何況於彼諸佛菩薩等而生慢心特以無慧自救致現斯相悟之則不見己勝諸慢併銷故曰無咎受陰暫發故曰非為聖證二警迷顯害若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是氎華肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄地中疑誤衆生入無間獄失於正受當從淪墜若作勝解者見勝不返執迷不回以類相致故有大我慢魔入其心腑言大我慢魔者如見慢外道死而不化年老成魔者是也入其心腑資其邪慢故令不禮塔廟甚至摧毀經像設遇檀越駭諫而便謂言此佛像者本是金銅所造或是土木所成此經法者本是貝葉所書或是㲲布所印既屬無情何有靈驗設又問言何者為佛何者為法而又謂言現前肉身既有覺知恭敬保愛即是真佛即是常法何乃不自恭敬却去尊崇土木捨近求遠實為顛倒此魔王借口於人斷滅佛法而欲昌其教也檀越聞之疑信交抱其有深信者聽從其言毀碎經像埋棄地中此魔教陷入致造阿鼻業也據此則疑信交抱者但受其疑深信其言者直遭其誤故云疑誤衆生疑者為地獄遠因誤者為地獄近因故總言入無間獄聞其說者尚致如此況復本人自應失於正受當從淪墜正脈問祖師門下呵佛罵祖何以異此答祖師極欲人悟一性平等心外無佛剿絶佛見而已豈真增長高慢反失平等哉合轍問臨濟不禮祖塔丹霞之燒木佛德山說一大藏教如拭涕帛嚴頭說祖師言句是破草鞋非大我慢乎答此為執外求而不達自心執言教而不肯進修者故作此峻厲之語而激之實一片真慈誰曰慢心若使祖師真有慢心則亦不免泥犁況其他乎本疏問此上所引諸老何以知其不是魔入心腑耶答若固執此說一向不歸則是魔入心腑而上之諸老皆是行解相應但一時應機語耳見勝無慧自救相竟八因慧獲諸輕清相二一示相教悟二警迷顯害初又彼定中諸善男子見色陰銷受陰明白於精明中圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在此名因慧獲諸輕清悟則無咎非為聖證色銷受明所見之境同前精明即是自心以衆生分中無純真之心即以識精元明為自心故精理即是佛心言佛心雖極精微亦不離自心之中此二句仍是於自心中見諸佛心但變其文耳自覺因該果海果徹因源因心果覺兩不相違故曰得大隨順回觀色陰既銷超然無纍故於其心忽生無量輕安現見受陰虗明瑩然澄徹故自己言成聖得大自在此名因慧等者謂因於精明心中圓悟精理之慧回觀色陰現見受陰獲諸輕安澄清之相悟之則不以輕安自守不以澄清自任乘此圓悟之慧增修本定故曰無咎正墮受區故非聖證二警迷顯害若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑誤衆生墮阿鼻獄失於正受當從淪墜若作聖解者以悟慧為菩提以輕清為涅槃以類相致故有好輕清魔入其心腑好輕清魔者如世不依正覺修三摩提一向攝念靜坐稍獲輕清生自足想死而不化年老成魔者是也入其心腑持其神識故令自謂滿足更不求進師心自是不知近善知識不聞勝妙之法故曰此等多作無聞比丘及於命終覺無實證毀傍正修無益唱言佛法賺人或聞而生疑或直受其誤成謗法因斷菩提種故曰墮無間獄況復本人既已被魔所著自應失於正受自誤誤人豈不當從淪墜因慧獲諸輕清相竟九定心沉沒失照相二一示相教悟二警迷顯害初又彼定中諸善男子見色陰銷受陰明白於明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解此名定心沉沒失於照應按色陰十境及受陰之前八後一是處皆有此名等語蓋撮略其相而總言之故皆依此以立科名唯此科獨缺或是筆授脫漏今準前後撮略本科中意而補足之亦不敢自以為是俟高明者更辨之上下皆以圈隔之使與佛語有別令其知是補入以避僭妄之罪悟則無咎非為聖證首四句可知上科云於精明中圓悟精理即是明悟此則於明悟中體觀受陰唯是虗明妄想其所依之體乃寂然不動之性故曰得虗明性認此為真忘失本修一味沉空心相逈寂故曰其中忽然歸向永滅將謂即此便是不假修為故曰撥無因果從此無佛可成無生可度故云一向入空萬有到前一空莫敵故曰空心現前空心現前對境不生乃至縱有心生亦惟增長斷滅之解補云此名定心等者謂得虗明性歸向永寂未免沉沒越分若能以觀慧照之正是受陰將破時節其奈失於照應致現撥無因果等相悟之則不滯永滅不住空心止觀雙流受陰可破故曰無咎一合偏枯不合中道故云非為聖證二警迷顯害若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常於信心檀越飲酒噉肉廣行淫穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿與酒肉等一種俱空破佛律儀誤入人罪失於正受當從淪墜若作聖解者執空為是長滅不歸一類相致故有空魔入心言空魔者如世纏空外道死而不化年老成魔者是也入其心腑資斷滅解故令謗持戒為小乘以悟空為菩薩且言菩薩悟空有何持犯設有信心檀越素嫌僧倫酒肉淫穢而其人偏常於彼飲酒噉肉廣行淫穢自謂行於非道通達佛道因於魔附力故攝其現前之人謂是逆行不生疑謗不知其為魔所使耳愚親見一僧自稱洞下兒孫常於施主家飲酒噉肉而施主敬之如佛及詢其所以教施主者多分皆隨順淫穢嗚呼魔入心腑經有明證而世多從之不疑亦可怪矣原屬滯魄之鬼年老成魔故無妨仍稱鬼心入之既久熏染已深鬼習喜穢故令食屎食尿與酒肉等或亦因人為難既悟空理應淨穢俱空既食酒肉何不亦食屎尿彼便淨穢俱食而謂一種俱空是人已自破佛律儀而又以誤言入人於罪自陷陷他自應失於正受當從淪墜定心沉沒失照相竟十定境安順入心相二一示相教悟二警迷顯害初又彼定中諸善男子見色陰銷受陰明白味其虗明深入心骨其心忽有無限愛生愛極發狂便為貪欲此名定境安順入心無慧自持誤入諸欲悟則無咎非為聖證色銷受明境同於前味其虗明者不知虗明是受陰相極力研味畢竟從何處起也深入心骨者不知向性地追求一味在方寸及骨節間跟究故由此虗明內映方寸骨節精瑩煥發自覺安然順適故於其心忽有無限愛生愛極生潤情動發狂淫境現前不能自持故致便為貪欲世之不知修心惟思調養幻形鮮有不墮於此者此名定境等者謂定中研味虗明內映心骨安然順適之境入於定心愛極情狂無慧自持致有誤入諸欲之相悟之則知是虗明惟究實性正是受陰將破之時故曰無咎縱使安順入心遇境便墮故曰非為聖證二警迷顯害若作聖解則有欲魔入其心腑一向說欲為菩提道化諸白衣平等行欲其行淫者名持法子神鬼力故於末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬魔心生厭離其身體威德既無陷於王難疑誤衆生入無間獄失於正受當從淪墜若作聖解者不知身骨精瑩為虗明內映之相以肉團為主人計身骨為家寶認安順為受用愛極成欲以類相致故有欲魔入心言欲魔者即欲頂大自在魔王也觀下文曰神曰鬼似是魔所使耳入其心腑增其欲念故令一向說欲謬謂生生不息即常住菩提之道化諸白衣平等行欲者教以不分自他不擇好醜謬謂平等行欲即菩薩行故其有信其說者依教行淫名持法子謬謂其能傳菩提法故恐有問云猥媟穢劣不堪至此人何信之故曰神鬼力故謂魔神魔鬼力也然正像之際尚無此事至於末世之中攝其凡愚其數竟至於百如是由少及多乃至一百二百或至五百六百甚至多滿千萬雖是魔力所攝亦由貪欲是人之所好故魔入心腑托以行欲及乎身衰力微則魔心生厭離其身體魔力既退徒衆解散故曰威德既無舊事發覺坐以扇衆故致陷於王難或疑之而謗正或誤之而入邪故云疑誤衆生謗正入邪皆為阿鼻之因故致入無間獄前功盡廢故云失於正受後身必墮故云當從淪墜正脈云近世尚未見此稍有陰似者亦未能如是之盛但佛言不妄當來末法之深想必有矣中間所現魔相竟四總結以示警囑阿難如是十種禪那現境皆是受陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等亦當將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道初出由警惕汝等下囑令傳護正脈云此科全同色陰然此之十種魔事已成非但如前方為引發之端亦但言魔以類至而不歷言天魔飛精據此則無令天魔得便之語與前科稍異前以若不預防恐天魔得便而入故教以宣示斯義無令得便此以天魔得便驅使十魔來惱故教以遍令開悟無令得便遣使總結受陰魔相竟三想陰魔相四一始修未破想陰二終破顯露妄源三中間所現魔相四總結以示警囑初阿難彼善男子修三摩提受陰盡者雖未漏盡心離其形如鳥出籠已能成就從是凡身上歷菩薩六十聖位得意生身隨往無礙譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其語此則名為想陰區宇彼善男子亦指透過前境之人備經不備經等亦同前說透過前境仍復精研故曰修三摩提此中修三摩提望受陰為終修望想陰為初修也永絶前之十心虗明漸銷名為受陰盡者受陰雖盡猶為想陰所覆故未漏盡而言雖者亦有似盡意故心離其形者以無受陰即無領衲不復攬塵成根親見離根之體恐猶未明故又以如鳥出籠喻之蓋以鳥喻離根之體籠喻所結之根也既得離根之體似得漏盡勝用故云已能成就等謂已能從博地凡夫由三漸次上歷諸位菩薩乃至第六十妙覺聖位以彼所有身相功德皆能現故所謂能現者非是實證上合下同故曰得意生身三種中應是覺法自性性意生身以離根之體即是第八本識一切諸法皆依此識變現既得此識即能覺了一切諸法自性如幻以唯識變故故知此是覺了諸法自性性意生身也得此身已不惟能現且能普入諸剎故云隨往無礙恐猶未明故以譬如有人等喻之熟寐睡深也寱言夢語也不云極醒朗言而云熟寐寱言者以有想陰所覆非實證唯意生故無別所知者謂但唯寱言而於所說之事無復別有所知喻想陰未盡者雖現聖現凡唯是意生而於上合下同實未親證故其言已成音韻倫次等謂雖無所知而其所說之言已成音韻可聽已有倫次可別令現前不寐之人皆能明悟其語喻想陰未盡者雖非實證合同而其所現儼有身相可見凡位聖位可別令彼實證者咸知其所現不誤既所現不誤而又未得實證明是想陰所覆故曰此則名為想陰區宇二終破顯露妄源若動念盡浮想銷除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁觀其所由融通妄想以為其本動念者即指第八識中所含六識種子以有微細動相故以動念稱之動必有想即是根本想陰六識浮想皆以此想起故此想既盡六識中枝末浮想無所從起故云浮想銷除覺明心即指第八本識以帶妄故不言妙覺明心動念既盡浮想不生故云如去塵垢蓋以識性覺明如鏡六識浮想如塵微細動相如垢也一倫生死者謂十二類生一類一類所有生死以倫即是類故首尾圓照者謂首從卵生尾至非無想生皆能圓照以覺明現前生死根元從此披露如後文云見諸十方十二衆生畢殫其類是也然類生生死根元即是行陰行陰既現則是超出想陰故曰名想陰盡按耳根圓通此當覺所覺空言前於聞所聞盡時覺得有箇聞所聞盡宛而有箇能覺之心即是第八識中六識種子微細動相今想陰既盡微細動相亦無故能覺與所覺而俱空矣所以不能復真者以猶為管陰所覆故超煩惱濁者此經惱濁以根塵織成六識為體如前惱濁文云又汝心中憶識誦習離塵無相離覺無性相織妄成名煩惱濁今以動念既盡浮想銷除想除識空故能超越超越之後回觀想陰之所由生蓋即第八識所含六識種子微細動相融即未分體通六識故曰融通妄想枝末浮想皆依此起故曰以為其本三中間所現魔相十一怪鬼年老成魔相二魃鬼年老成魔相三魅鬼年老成魔相四蠱鬼年老成魔相五厲鬼年老成魔相六大力鬼老成魔相七鬼神年老成魔相八精魅年老成魔相九氣靈年老成魔相十自在天魔所使相初四一致魔得便二附人來惑三受惑成咎四出名警悟初阿難彼善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛圓明鋭其精思貪求善巧爾時天魔候得其便彼善男子即指前來已破受陰者言受陰二字仍取未破之名以離此無可稱故虗妙二字乃加以已破之號以假名為陰實無所覆名虗唯有正受不受餘受名妙也不受餘受故不遭十種邪慮謂受魔中十相實無所覆故惟覺圓定發明謂於圓通妙定中發起神通變化之明如前云已能成就從凡至聖意生無礙是也雖見此相若仍依本修驀直前去則想陰可進破矣乃忽爾心愛圓明謂於圓定發明境上心生愛慕即計為聖證意也計為聖證必至鋭其精思貪求善巧鋭其精思者謂勇鋭其志精進思惟貪求善巧者謂貪求變化更進善巧故爾時天魔候得其便者設若一向住三摩地則見與見緣并所想相如虗空華本無所有不唯無魔即有魔亦惟候之而已只緣有愛有思有求天魔乘隙可惑故云得便而言候者顯定益深而魔益怖故二附人來惑飛精附人口說經法其人不覺是其魔著自言謂得無上涅槃來彼求巧善男子處敷座說法其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或寢暗室身有光明飛精附人者非是身附但飛其精氣以附其身故不附本人而附旁人者正脈云受陰盡者不能入其心腑故假旁人惑之轉令自亂耳口說經法者由精附力資其邪慧便能口說相似經法非真能說佛法若真能說佛法即非魔矣其人素不能說一旦能說即應覺知乃竟不覺是其魔著而反自言我能說法謂得無上涅槃又復隨其邪精所轉來彼求巧善男子處蓋欲設方詃惑之耳敷座說法者應其所求為說善巧示現神通法故徒說無憑故又於斯須現相惑之斯須少時也或作比丘者投其所好先為現同類之身令彼人見者不見不足以取信故或為帝釋及女尼者顯其神異次與現異類之身不言令彼人見者例上可知故或寢暗室身有光明者竦其必信以其心愛圓明故也起信云座中或現端正男女等相又云或現天像菩薩像亦作如來像等但彼乃魔自來現此乃附人轉現又彼但見所現之相不見魔之本身或可有疑此則親見其人斯須變化如此非有深定妙慧鮮有不被其惑者三受惑成咎是人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲口中好言灾祥變異或言如來某處出世或言劫火或說刀兵恐怖於人令其家資無故耗散忘其本修曰愚不辨邪正曰迷見其說法現身謂是圓通勝用故惑為菩薩既已信其教化必以艷色美聲搖蕩其心因而破佛律儀與諸魔人潛行貪欲此正中魔王之計蓋由行人因戒生定因定發慧策修既精魔宮欲震故致魔精附人乘便來惑本為破其律儀壞其定慧衲為魔侶魔宮奠安若具正知正見者此正可為驗魔之要以大凡誘淫破戒任其神變總為魔業依本修治不久散壞今既惑為菩薩正慧先壞搖蕩其心本定又失潛行貪欲律儀全廢惜乎魔王得計而行人之寶覺全身從此隳矣此且明自受其害口中好言等乃更明世受其惑也灾謂咎徵祥謂休徵變異者此二皆非常事故然子不語怪佛不重神而彼獨好言灾祥變異怪鬼餘習固如是也或言如來某處出世教以懷資而往此好言祥徵也或言此處將遇劫火大三災起或言此處當有刀兵小三災動恐怖於人教以捨家而逃此好言咎徵也世間愚迷不辨真僞聞某處有佛則傾資求其接引聞劫火刀兵則罄家乞以救脫故曰令其家資無故耗散前云末法之中多此妖邪熾盛世間詃惑無識恐令失心所過之處其家耗散亦大同此意四出名警悟此名怪鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄前云若於本因貪物為罪是人罪畢遇物成形名為怪鬼年老成魔者作鬼既久通力殊勝兼知修有漏福天魔收為伴侶亦天魔攝惱亂是人者非精附彼惱亂是修禪人故厭足心生者所附之人色力衰微故魔心生厭所惱之人定慧俱失故魔心生足既厭且足故去彼人體而不附之魔既不附即無威德執法者坐以扇惑衆心株連餘黨故曰弟子與師俱陷王難言弟子者不惟修禪之人而修禪之人亦在其中按阿難此時位在二果受陰尚未盡破況復想陰將來進修圓通此境必有故教以汝當先覺謂不待魔來應先覺悟離愛離思離求一味䇿修窮盡想元一倫生死首尾圓照自然不入輪回而天魔束手矣若魔尚未來而先自迷惑及其已來而猶故不知不惟輪回不出且當墮無間獄可不慎哉孤山云受開以後上歷聖位應無墮義正脈云彼特領佛上歷聖位一語而遂違佛二十八俱墮無間之明言依正脈意乃謂權漸教中歷位取證無退如走者登山遲則遲矣有升無墜圓頓教中一超直入有退如飛者登山速則速矣升墜無定愚己向著經從不敢指摘古德論其得失今以二師所說俱違教旨因不避口業略為辨正非好也不得已也請試論之詳孤山言無墮者特由未了上歷聖位之語然前云已能成就從是凡身上歷菩薩六十聖位乃是約受陰開後得意生身隨意顯現如來喻為夢中寱語已自可見正脈批其違佛明言誠是而謂其領佛上歷聖位之語者非是以彼實未能領也然正脈謂權漸教中經劫取證無墮而身子六心墮落塵劫聲聞非權漸教中意乎又謂圓頓教中一超直入有墮而善財一生事書龍女當下成佛非圓頓教中意乎依自語則與教意相違依教意則自語非是蓋二師總以悟證與修證不分理銷與事銷俱迷徒費辨論終不極成或問汝意云何答後云理則頓悟乘悟併銷事非頓除因次第盡按此中破色陰乃在動靜不生之時破受陰乃在聞所聞盡之時破想陰乃在覺所覺空之時破行陰乃在空所空滅之時破識陰乃在寂滅現前之時所謂乘悟併銷是也然既在解結之時方是修圓通之際起心動念便有魔生安得無墮是知圓頓教中初心有墮即前所云此根初解先得人空空性圓明成法解脫解脫法已俱空不生唯是悟證而已至於圓通已後隨所發行安立聖位仍是依前所悟之理重起事造之修以萬行之砥硎利未磨之智刃於前所空色等五陰一一從頭體驗於一切時一切處無不相應所謂因次第盡是也然既住圓通之後乃是從乾慧心中中流入之行無修而修修即無修安得有墮是知圓頓教中悟後修位無墮華嚴云發心究竟二不別如是二心先心難亦略示此義若夫權漸教中不惟初心有墮凡未到不退位者皆有墮也怪鬼年老成魔相竟二魃鬼年老成魔相四一致魔得便二附人來惑三受惑成咎四出名警悟初阿難又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛遊蕩飛其精思貪求經歷爾時天魔候得其便前四句準前可知前云得意生身隨往無礙有遊蕩義不知其猶為想陰所覆但如夢中寱語起心愛之即此便為致魔之端以既愛遊蕩必致飛動其心精進思惟貪求經歷者貪求神通周遍經歷更勝於前故末二句亦准前可知二附人來惑飛精附人口說經法其人亦不覺知魔著亦言自得無上涅槃來彼求遊善男子處敷座說法自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚一衆聽人各各如是得未曾有飛精二句謂飛其精氣轉附旁人口說相似經法扇惑衆心使行人聞之也其人二句謂亦如前之不覺魔著亦如前之未得謂為得也來彼求遊處者亦是邪精所轉應求而來敷座說法者欲以惑亂其心為說神通妙用最勝遊歷法故自形無變者不同前之斯須變易意欲顯其無作無為而妙用自具故其聽法者不專指於行人蓋凡有在座者皆是也坐寶蓮華者座同佛座體化金聚者身同佛身既座同佛座身同佛身則不離本處而遍至十方自覺可希冀矣一衆三句謂一座之衆聽法之人各各自見如是咸慶得未曾有三受惑成咎是人愚迷惑為菩薩淫逸其心破佛律儀潛行貪欲口中好言諸佛應世某處某人當是某佛化身來此某人即是某菩薩等來化人間其人見故心生傾渴邪見密興種智銷滅愚迷同前見其自能說法又見聽衆獲益故惑為菩薩既信其人必受其教先以淫境相鈎而縱逸其心次以戒律無憑而誹破其儀終以貪著欲樂而潛行其事惜乎昔為佛子而今為魔民矣此亦且明自受其害口中好言等乃兼明世受其惑諸佛出世如優曇華好言諸佛應世亦屬妄誕且指出某處某人當是某佛此又妄之至而誕之極也稍有正見者必不至受其惑矣言是化身來此者正是遊歷之事蓋為貪求遊歷者說故有佛出世必有菩薩相隨輔化故又指定某人即是某菩薩等來化人間原魔意蓋為顯其言確事的令人易信也其人見故等者其人指所指之人因彼指其為佛為菩薩等不自量德將謂蒙記故見之心生傾渴日親日近時熏時染故致邪見密與邪風日扇正見日晦故令種智銷滅惜乎佛種斷滅而地獄苗遍矣四出名警悟此名魃鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄前云若於本因貪色為罪是人罪畢遇風成形名為魃鬼餘皆準上可知魃鬼年老成魔相竟三魅鬼年老成魔相四一致魔得便二附人來惑三受惑成咎四出名警悟初又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛綿㳷澄其精思貪求契合爾時天魔候得其便首四句準前可知心愛綿㳷者正以不遭那慮自覺定心綿密圓定發明自覺妙用㳷合謂㳷合菩薩上同下合之德也由此於三摩地中心起愛慕即此便為招魔之故以既愛綿㳷必至澄凝其心精進思惟以雖覺定心綿密妙用㳷合恐非真實必欲貪求契合真實圓通體用然此心固善但有愛有思有求則是自開其釁宜乎其魔王得便矣二附人來惑飛精附人口說經法其人實不覺知魔著亦言自得無上涅槃來彼求合善男子處敷座說法其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易或得宿命或有他心或見地獄或知人間好惡諸事或口說偈或自誦經各各歡娛得未曾有飛精附人等同前求合男子即指上貪求契合人也敷座說法者應即為說相似契合圓通體用法故第二魔中第一附人令自變形第二附人令他變形今則其形及彼聽法之人外相皆無遷變原魔意蓋為顯示即凡即聖相似體用綿㳷義也心自開悟者相似得圓通體念念移易者相似得圓通用或得宿命者知過去事或有他心者知他心境或見地獄者了極苦之情況或見人間等識趣向之岐途此皆相似㳷合凡心或口說偈者自能口說偈讚或自誦經者自能背誦經言此皆相似㳷合聖心合聖合凡略有似於上合下同自謂已得故各各歡娛自他同慶故得未曾有三受惑成咎是人愚迷惑為菩薩綿愛其心破佛律儀潛行貪欲口中好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然其人見故洗滌本心易入邪悟愚迷之義亦同前可知但見其無端便能說法無端令人開悟等由此惑為菩薩既已惑為菩薩必至纏綿親愛密結其心信其教而破佛律儀行其事而潛行貪欲此亦自受其害口中好言等乃世受其惑未至覺圓不得稱佛既稱為佛則無大小而言佛有大小者其意以欲頂魔王為大佛怪等十魔為小佛也佛佛道同古今一致忘跡論佛即無先後而言某佛先佛其佛後佛者其意以怪魃二魔先現為先佛蠱等七魔後現為後佛也妄盡真極乃名為佛既名為佛即無真假而言真佛假佛者意指過去佛像無言無說為假佛現前肉身敷座說法為真佛情欲都盡因目為佛既目為佛豈有男女而言男佛女佛者意指魔精所附行欲無厭為男佛受其欲者承順魔意為女佛且又以受化男女倣行欲事即是菩薩故曰菩薩亦然前云其行淫者名持法子亦斯意耳其人見故等者謂因其所說洗滌本所修心改行魔業邪悟易得成就蓋由向所修習資發故也四出名警悟此名魅鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄前云若於本因貪惑為罪是人罪畢遇畜成形名為魅鬼餘准上魅鬼年老成魔相竟四蠱鬼年老成魔相四一致魔得便二附人來惑三受惑成咎四出名警悟初又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛根本窮覽物化性之終始精爽其心貪求辨析爾時天魔候得其便首四句同前心愛根本者正以受陰虗妙不遭邪慮露出微細動相不知其是六識種子根本想陰謬謂其因動有生而為萬物之根由是心愛忘其本修一味窮覽物化其意蓋欲究其性之終始舉全體大用而俱得之殊不知此機一發便是招魔之關以既曰窮覽必至精勤爽速其心令其無懈慢也期其必得故曰貪求辨析辨析謂辨別物理分析化性然此心已妄呪復曰心愛曰精爽曰貪求更為可乘之隙故曰爾時天魔候得其便二附人來惑飛精附人口說經法其人先不覺知魔著亦言自得無上涅槃來彼求元善男子處敷座說法身有威神摧伏求者令其座下雖未聞法自然心伏是諸人等將佛涅槃菩提法身即是現前我肉身上父父子子遞代相生即是法身常住不絶都指現在即為佛國無別淨居及金色相其人信受忘失先心身命歸依得未曾有初附人為主先不覺知者謂彼先不自覺知是魔精所附故亦言得涅槃者正由不自覺知設能自覺何至妄說若此應求而來敷座說法應即妄說物化本元性也身有下攝衆為伴魔精所附亦有威嚴可畏之相神通攝持之力故曰身有威神能令求元之人不敢違越故云摧伏求者不惟求者又能令座下之衆來便傾倒故曰雖未聞法自然心伏是諸下主伴共惑是諸人等兼上主伴言之將猶謂也涅槃斷果菩提智果法身為智斷所依離生滅絶妄染而乃謂其即是現前我肉身上者蓋是以其有求元之心以邪知妄見而妄惑之言不唯物化乃至涅槃菩提法身亦不離現前肉身以為其本也父父子子遞代相生正是欲貪為本業果相續而乃謂其是法身常住哀哉以纏縛為解脫以欲根為佛性邪說誤人殃及纍劫稍有正見者掩耳避之可也都指現在即為佛國者謬竊佛經即染即淨之說無別淨居及金色相者妄擬禪家無土無佛之言如狐鼠依於城社令人不敢焚燒究竟狐鼠城社具眼者自能辨之其人下信受歸慶其人者即指求元之人見其威神攝衆心已摧伏聞其所說異常豈敢違越故曰信受原其先心本欲辨析物化之性以期得乎全體大用今因被魔所摧反以現前肉身為生法之元且言涅槃菩提法身不離乎此且言父子相生為法身不斷且言別無淨居及金色之佛顛倒特甚從流無返故云亡失先心認邪為正故𢬵其身命歸依將魔作佛故慶其得未曾有三受惑成咎是等愚迷惑為菩薩推究其心破佛律儀潛行貪欲口中好言眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處彼無知者信是穢言前云是人愚迷惟指行人此云是等愚迷乃兼彼所攝之衆言之行人先摧攝衆後伏故皆惑為菩薩推究其心者信其所說推究現前身上唯有貪欲之心計其為生化之元故致破佛律儀潛行貪欲此且明現受害者口中好言等乃兼明當受惑人若為對治權宗令其薦取根性說眼耳等為淨土於理或可若一向好言則是外道邪見況復以男女二根穢污不淨之本而謂其為菩提涅槃真處褻瀆聖證壞亂佛乘稍有人心者必不忍出之於口正脈云大意無非誘人恣淫破戒壞大定耳無知男女只知順其情欲不覺其非故多信是穢言淪入魔隊四出名警悟此名蠱毒魘勝惡鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄此魔本從二類中來謂蠱毒鬼魘勝鬼也前云若於本因貪恨為罪是人罪畢遇蟲成形名蠱毒鬼又云貪罔為罪是人罪畢遇幽為形名為魘鬼今云魘勝者謂魘人之力最勝故餘淮上蠱鬼年老成魔相竟五癘鬼年老成魔相四一致魔得便二附人來惑三受惑成咎四出名警悟初又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應周流精研貪求冥感爾時天魔候得其便首四句同前三摩地中心愛懸應者自覺想陰未破勝用未圓欲求圓通知識聖位菩薩懸應自心資發神慧也周流精研者現意生身周遍流轉十方世界精心研求諸善知識及菩薩也貪求冥感者出其周流之故蓋為貪求冥相契合以期至於感格聖應而已殊不知此志一興定心不密有隙可乘有法能陷故令天魔候得其便二附人來惑飛精附人口說經法其人元不覺知魔著亦言自得無上涅槃來彼求應善男子處敷座說法能令聽衆暫見其身如百千歲心生愛染不能捨離身為奴僕四事供養不覺疲勞各各令其座下人心知是先師本善知識別生法愛粘如膠漆得未曾有初附人現應無端口說經法必是魔精所附所以不自怪者以其人元不覺知是魔所著也不唯不能覺知反以滋其邪慢故亦言自得涅槃應求而來敷座說法應即為說冥感懸應之法能令下攝衆現感能令者魔力所攝故暫猶頓也言魔力所攝能令凡有聽者頓見魔精所附之人宛爾深修久證故云如百千歲由此愛染不捨且以身為奴僕四事供養而不覺為勞也各各下率徒歸依各各者指上所攝之衆座下人又指此衆之徒言所攝之衆既已身為奴僕又復各各開示令其座下徒衆知彼魔附之人是先世師承本地知識別生一番為法相愛之心如膠似漆而粘不可解得未曾有而深以為慶也三受惑成咎是人愚迷惑為菩薩親近其心破佛律儀潛行貪欲口中好言我於前世於某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或言別有大光明天佛於中住一切如來所休居地彼無知者信是虗誑遺失本心既聞其法又見其所攝之衆率徒歸依其感化之神如此故惑為菩薩既惑為菩薩必至心相親近故云親近其心信其邪說故致破佛律儀染其邪行故致潛行貪欲此自受其害也口中下亦世受其惑前云佛滅度後敕諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉終不自言我真菩薩真阿羅漢惟除命終陰有遺付今既未至命終言且不可況復好言其邪而非正可知且所言我於某生先度某人儼然以本師自居又言當時是我妻妾兄弟明明以愛欲鈎牽至說今來相度乃順其懸應之愛并說歸某世界供養某佛又要其冥感之求妖言惑衆邪氣逼人奈何世間愚迷喜參聖證不自忖量抑可怪也或言別有等者謬指欲頂魔宮為大光明天謬稱欲頂魔王為佛於中住謬謂信其說歸其教者同生此天為一切如來所休居地大妄語成阿鼻極苦不旋踵而即至稍有知識者決不肯信故云彼無知者信是虗誑由此深著邪見至死不歸故云遺失本心四出名警悟此名癘鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄前云若於人中貪憶為罪是人罪畢遇衰成形名為癘鬼餘并可知癘鬼年老成魔相竟六大力鬼老成魔相此下五魔與前文勢不同三一致魔得便二附人來惑三出名警悟初又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛深入尅己辛勤樂處陰寂貪求靜謐爾時天魔候得其便首四句同前三摩地中心愛深入者自覺想陰未破勝用未圓心愛深入圓通境故此與上科所見是同而所求各異上科求他加故愛懸應此科求自力故愛深入尅己者尅責自己辛勤者辛苦勤求樂處陰寂者以陰暗寂靜之處可以進求貪求靜謐者以寂靜寧謐之境可以入圓殊不知三摩地中不容起心動念才有愛樂魔徑斯啓一涉貪求妖戈便入故曰爾時天魔候得其便二附人來惑飛精附人口說經法其人本不覺知魔著亦言自得無上涅槃來彼求陰善男子處敷座說法令其聽人各知本業或於其處語一人言汝今未死已作畜生敕使一人於後踏尾頓令其人起不能得於是一衆傾心欽伏有人起心已知其肇佛律儀外重加精苦誹謗比丘罵詈徒衆訐露人事不避譏嫌口中好言未然禍福及至其時毫髮無失初附人說法敷座說法者順其愛樂求陰入靜之心謬說深證圓通法故餘準上令其下魔力攝衆各知本業者非是聽人實能自知蓋是聽其所說汝前世本是何人所作何業遂自以為知也此顯前通過去或於其處者即於說法之處語一人言者特向一人說故汝今未死已作畜生者示以將來必墮恐未心伏又敕使一人於後踏尾魔力所持乃頓令其人起不能得因有如是證驗故一時之衆皆傾倒其心而欽伏之此顯後通未來設使有人起心已知其起心之始肇自何緣此顯立通現在魔意將謂能通三世即是圓通而不知圓通勝用實不止乎此耳佛律下更現詭異佛制律儀無過不及依而行之便為中行之士今於此外重加精苦乃故為詭異之行以竦世也灌頂云重加精苦者如斷五味裸四肢拔髮熏鼻投灰臥棘等皆是誹謗比丘者斥其不能精苦罵詈徒衆者顯己無有私愛訐露人事者攻發人之陰私不避譏嫌者自謂直心為人好言禍福者顯己未到先知時至無失者示己所言必應凡此者又故為詭異之語以詃世也嗚乎碌碌庸人一旦為魔精所附便能如是詭言異行非具正知正見鮮有不惑為菩薩而深受其害者三出名警悟此大力鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄此大力鬼但取其有神有通力能惑人非前所說上品大力鬼王類也大力鬼老成魔相竟七鬼神年老成魔相三一致魔得便二附人來惑三出名警悟初又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛知見勤苦研尋貪求宿命爾時天魔候得其便心愛知見者或因修三摩地四事窘乏或因利益衆生諸緣不備欲知宿命所遺金寶欲見地中所隱伏藏熏習在心故於三摩地中起諸心愛影也勤苦研尋者謂精勤辛苦各處研尋貪求宿命者謂貪求宿命所遺之物此又因事起貪較前由理起愛者更為致魔之速遺乎令天魔得便二附人來惑飛精附人口說經法其人殊不覺知魔著亦言自得無上涅槃來彼求知善男子處敷座說法是人無端於說法處得大寶珠其魔或時身為畜生口銜其珠及雜珍寶簡䇿符牘諸奇異物先授彼人後著其體或誘聽人藏於地下有明月珠照耀其處是諸聽者得未曾有多食藥草不餐嘉饌或時日餐一麻一麥其形肥充魔力持故誹謗比丘罵詈徒衆不避譏嫌口中好言他方寶藏十方聖賢潛匿之處隨其後者往往見有奇異之人初飛精直附惑殊絶也殊不覺知謂絶然不覺知也敷座說法者應其知見之愛宿命之求謬說修習神通法故是人者仍指魔所附人無端者現前無端顯是宿命所遺即於說法處得者顯珠非他有乃自己先世物也其魔下先兆後附惑或時化為等者謂或有其時不飛精而直附乃先化為畜生如瑞鳳祥麟之類口銜其珠及雜珍寶等為兆聖作之瑞如龍馬負圖之類韋編名䇿竹削名簡竹刻為符木片為牘春秋左傳敘云大事書之於策小事簡牘而已符為符信漢制以竹為之長六寸刻約信於其中二人各持其半扶而合之相符則可信也諸奇異物者謂世間多所不見如龍光寶鏡之類先授彼人後著其體者魔力所作顯其是奉天乘符作之師以化世故或誘聽人等謂誘攝聽法之人令信其教先將諸奇異物藏於說法地下又有明月之珠照耀其處是諸聽者目覩其兆心信其說自應得未曾有多食下更現詭異惑藥草非常食之物乃故為多食嘉饌乃人所共欣却矯情不餐日中一食人尚不能乃甘心日餐一麻一麥而其身猶故肥充竟不瘦不枯者魔力所執持故此皆詭異之行誹謗比丘等乃詭異之語准前可知好言他方寶藏者以世間利益惑人好言聖賢潛處者以出世利益惑人亦詭語也隨其後者見有異人蓋是魔力所為顯其非常以有善神衛護亦詭行也三出名警悟此名山林土地城隍川嶽鬼神年老成魔或有宣淫破佛戒律與承事者潛行五欲或有精進純食草木無定行事惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄山林謂掌管山林者土地城隍川嶽俱約掌管者言之於中有鬼有神前文所謂大力鬼王飛行夜叉地行羅剎附於仙趣者是也然既附仙趣何以成魔蓋以廟祀血食其樂不及魔宮年老生厭樂脫本倫加以聰明福德動念即升魔界故能成也附精惑人略以三法或有宣說淫穢破佛清淨戒律與彼承事弟子潛行世間五欲此以欲破戒法也或有無益精進愚癡盲修一味食草食木令人效行此以愚破慧法也或有數瞋數喜數勤數怠數信數疑無定行事一味惱亂是人令失本修此以亂破定法也厭足下準前可知鬼神年老成魔相竟八精魅年老成魔相三一致魔得便二附人來惑三出名警悟初又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力爾時天魔候得其便心愛神通等者謂自覺想陰未破圓通未及深證神用無由妙發心愛菩薩神通自在種種變化如三十二應十四無畏四不思議等也由此研究變化之元貪取神通妙力然變化之元由圓通而發神通妙力乃無作而現但依本修盡破後陰時節若至其理自彰若乃起心研究即落邪思著意貪取宛爾有作安得不令天魔精魅候得其便哉二附人來惑飛精附人口說經法其人誠不覺知魔著亦言自得無上涅槃來彼求通善男子處敷座說法是人或復手執火光手撮其光分於所聽四衆頭上是諸聽人頂上火光皆長數尺亦無熱性曾不焚燒或水上行如履平地或於空中安坐不動或入瓶內或處囊中越牗透垣曾無障礙惟於刀兵不得自在自言是佛身著白衣受此丘禮誹謗禪律罵詈徒衆訐露人事不避譏嫌口中常說神通自在或復令人旁見佛土鬼力惑人非有真實讚歎行淫不毀粗行將諸猥媟以為傳法初應求說法惑應求而來敷座說法應即為說神通變化法也餘同上是人下隨求現通惑唯說不足取信欲令現見故次為現通手執火光已為神異況復撮碎其光分散於四衆頭上而又各長數尺不熱不燒此又神異之至者水上能行已足惑人況復如履平地此又惑人之尤者又此二事略有似於火難水難二種無畏但彼由旋見旋聞妙力旋火旋水此由見業聞業業力現火現水故不同耳空中安坐不動宛似色空相即瓶囊可以容身宛似大小相含但彼是性海緣起此由魔力所作久暫不同有智者自能辨識牖則閉之可越垣則阻而能透此亦異似神境但魔力所作自不同於二乘修發及大乘性發也惟於刀兵不得自在者以魔未離欲身見未亡不能使刀不傷故自言下說現並示惑為惑愚迷故自言是佛設有無智比丘信其所說甘心禮拜彼即身著白衣受比丘禮誹謗禪律者毀禪宗為狂參非持律為小乘不撥說教者謬謂自己所說即是佛說宜遵信故蓋自言是佛為壞佛寶受比丘禮為壞僧寶誹謗禪律為壞法寶信其說效其行者斷三寶種而為地獄種矣罵詈徒衆者自以為公訐露人事者自以為直謬謂既公且直何怕譏嫌故不避也常說神通者為慰求者心故令見佛土者為證自是佛故鬼力二句直斥其是妄非真讚歎行淫者如云男女二根即是菩提涅槃真處等不毀粗行者如言現前眼耳鼻舌皆為淨土等將諸猥媟鄙穢之事以為傳法者如言能行淫者名持法子等三出名警悟此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅或壽終仙再活為魅或仙期終計年應死其形不化他怪所附年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄天地大力四字通指下之五精以是天地間大力精故言山海河風土各有掌管之者而有正有邪正者為神邪者為精以能與正神分權故其力最大一切草木等者謂奇草異木積劫不死受天地日月之精而為魅鬼也或復龍魅者非是興雲致雨之龍或是守天宮龍及與守庫藏龍一則竊天之靈一則盜物之精皆可以為妖為魅或壽終仙再活為魅者本期長壽不謂有終死不甘心附本質而再活不信仙術別作妖孽故名為魅或仙期終計年應死等者謂仙期或五百年或一千年或三千年等約之必有終盡時節既有終盡則計其年歲應死但以煉精養氣神去而形猶不化故致他怪所附借其質而為魅也然仙術本為長生煉形原期不化其奈時節既至神識難留徒遺虗軀為怪所占可惜已往功行反資妖孽不修三摩而存想固形者宜知猛省年老二句謂如上所說精魅年老成於魔侶魔使附精蓋為惱亂是人餘可思知精魅年老成魔相竟九氣靈年老成魔相三一致魔得便二附人來惑三出名警悟又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛入滅研究化性貪求深空爾時天魔候得其便心愛入滅者自覺受陰已滅於八識體上露出根本想陰微細動相由是心愛入滅謂并彼根本想陰微細動相而俱滅故一切諸法猶如幻化因動而有即是其性今云研究化性者即是研究根本想陰微細動相必期於盡耳必期於盡蓋為貪求深空言深空者不惟心境俱寂兼復隱顯自在然志固善矣但心生愛樂忘其本修一味貪求先闢邪徑天魔得便固其宜矣二附人來惑飛精附人口說經法其人終不覺知魔著亦言自得無上涅槃來彼求空善男子處敷座說法於大衆內其形忽空衆無所見還從虗空突然而出存沒自在或現其身洞如琉璃或垂手足作栴檀氣或大小便如厚石蜜誹毀戒律輕賤出家口中常說無因無果一死永滅無復後身及諸凡聖雖得空寂潛行貪欲受其欲者亦得心空撥無因果初說法現空敷座說法者應其所求謬說心境俱空法故托之空言恐其不信故次為現空正在大衆之內忽空無見者顯是即有而空正當形空無見突從空出者顯是即空而有如是存沒自在略有似於真空妙有蓋為順其貪求深空之心詐現如是無礙之相魔力所作勿誤認也或現下顯異惑衆身為欲愛所生忽現洞如琉璃顯是即染而淨手無不觸足多汗垢忽作栴檀之氣大便臭濁小便穢臊忽如石蜜之甘此皆即臭而香意顯有既可空染即可淨臭亦可香此等神異最易駭俗且身為欲本亦欲假此作誘淫術也誹毀戒律者斥以持戒束身非身何束輕賤出家者謂其不能身空徒自繫縛此亦天魔竊經教之唾餘資附人之談鋒設有類是者宜知自愧口中下撥無因果上以相似真空之事引入魔隊此亦究竟斷滅之言漸隳佛種故常說無因無果一死永滅如前波斯匿王見迦旃延毗羅胝子咸言此身死後斷滅正墮此見無復後身及諸凡聖者無後身則善惡無報無凡聖則修證空談是乃以一切斷滅為得空得寂也既以斷滅為得空得寂自以行欲為無傷無礙故曰雖得空寂潛行貪欲受其欲者為持法子密傳斷滅之法令學撥無之見故曰亦得空心撥無因果永嘉云豁達空撥因果莾莾蕩蕩招殃禍況是魔所使哉三出名警悟此名日月薄蝕精氣金玉芝草麟鳳龜鶴經千萬年不死為靈出生國土年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄日月薄蝕者黑氣相迫曰薄蔽其精耀曰蝕即今日月交食是也然日為陽精月為陰精各有光華之氣周遍散注當其薄蝕之際不得散注直貫於地地上之金玉芝草麟鳳龜鶴得之可以久生可以育秀故云經千萬年不死為靈出生國土者為物仙為禽仙為獸仙與前所稱積劫精魅者不同也年老成魔等准前可知氣靈年老成魔相竟十自在天魔所使相三一致魔得便二附人來惑三出名警悟初又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲棄分段生頓希變易細相常住爾時天魔候得其便受陰既破露出微細動相根本想陰自覺六識浮想由此而興無邊生死由此而作由是心愛長壽蓋為破想陰出生死也幾微也即指微細動相然此微細動相不可以有心研究但依本修定深自滅如澄濁水貯於靜器靜深不動沙土自沉今以辛勤勞苦研究微幾已為失計且又貪求永歲而棄分段之生頓希變易而望細相常住是為重增妄想無怪乎天魔伺候得其便矣二附人來惑飛精附人口說經法其人竟不覺知魔著亦言自得無上涅槃來彼求生善男子處敷座說法好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物或於一處在一宅中數步之間令其從東詣至西壁是人急行纍年不到因此心信疑佛現前口中常說十方衆生皆是吾子我生諸佛我出世界我是元佛出世自然不因修得初來為說法而言竟不覺知者寓有深怪之意言其人本以博地凡夫無端口說經法明是魔著乃竟不覺知亦可怪也敷座說法者順其所求謬說自有常住法故好言下現神竦動好言他方往還無滯者示得變易身故或經萬里瞬息再來者唯說無憑現前令見故皆於彼方取得其物者證其所到不虗故余聞道教中人以薛道光修性不修命但能出陰神不能遠方取物張紫陽性命雙修兼能出陽神能遠方取物由此觀之縱能遠方取物仍不出天魔伎倆又豈能與法華普現色身三昧及本經圓通勝用校其優劣論其淺深也哉一處一宅數步其量至近從東至西急行纍年不到却似甚遠然上明在己則行遠若近此明在他則令近如遠略有似於十玄門中廣狹自在魔力幻法亦難思議因此竦動其心幾欲信以為真但未決定故云疑佛現前然既曰信又曰疑幸其猶在疑信相參之際尚未深入或可救耳口中下示以常住口中常說者恐其疑信相參常以魔語熏習之也衆生皆子顯未有衆生以前即有也我生諸佛顯未生諸佛以前即生也我出世界顯未出世界以前即出也衆生依之而有諸佛依之而生世界依之而出故曰我是元佛謂根本元佛也既是根本元佛至今猶在而壽命之長應無有更踰於此者矣末言出世自然不因修得者正顯其徒修無益欲惑正修而納之於魔也三出名警悟此名住世自在天魔使其眷屬如遮文茶及四天王毗舍童子未發心者利其虗明食彼精氣或不因師其修行人親自觀見稱執金剛與汝長命現美女身盛行貪欲未逾年歲肝腦枯竭口兼獨言聽若妖魅前人未詳多陷王難未及遇刑先已乾死惱亂彼人以至殂殞汝當先覺不入輪回迷惑不知墮無間獄初躡前出名顯故住世自在天魔者孤山云即欲界第六天上別有魔王居處亦他化天攝因其無出離心故以住世名之然行人已破受陰即得人空又欲進破想陰志在決定出離天魔不忍故使其眷屬飛精附人而惑亂之如遮文茶等者於眷屬中略舉二類遮文茶此云嫉妬女亦翻怒神多妬恚為魔女故毗舍童子即毗舍暗鬼或名毗舍遮此云噉精氣謂能噉人及五精氣故必連天王稱者以是其所轄也既是四王所轄應覆護世界保綏真修而乃附人來惑者以是鬼童蒙昧未發護世及保綏真修心故然必使遮文茶者為欲與之相狎取利其虗通明慧以資發邪見又必使毗舍童子者以欲與之相親食噉其精髓血氣以助養邪神是不惟欲壞正修亦兼以為利魔眷也或不下更明不因師者言上說飛精附人與之為師而行人乃因師受惑然不必定爾故曰或不因師既不因師何以受惑故曰親自觀見稱執金剛等者先現力士堅固之相許以長命之術令其不懼損身然後現美女身與之盛行貪欲殊不知長命之說徒託空言損身之害實有成驗故云未逾年歲等謂未踰一年半歲其肝血腦膜已自枯竭今之信房術而以縱淫為無礙者多招此弊口兼獨言者謂時常自言自語此有二說一者灌頂云氣虗發譫語也二者正脈云自見魔現與之行欲他人不見謂彼獨言彼實與魔言也所言無定或多怪異故致聽若妖魅所謂魔言魔語是也前人下雙明二俱為害言前來因師受惑之人未詳其是魔精所附多致弟子與師俱陷王難若此之不因師者則未及遇刑先已乾死其為害猶速也此二者皆足以惱亂彼之行人以至殂軀殞命餘可知通結以上中間所現魔相竟四總結以示警囑四一預示魔患二勸以悲救三結由警惕四囑令傳護初阿難當知是十種魔於末世時在我法中出家修道或附人體或自現形皆言已成正遍知覺讚嘆淫欲破佛律儀先惡魔師與魔弟子淫淫相傳如是邪精魅其心腑近則九生多逾百世令真修行總為魔眷命終之後必為魔民失正遍知墮無間獄初妄稱極果十種魔者前九鬼神精靈等年老成魔與天魔為黨與後一遮文茶毗舍童子為魔所使與天魔為眷屬故前十種中皆言天魔得便於末世時佛法衰微時也佛法衰微魔道興盛不必一定如前伺便惑人亦有乘願壞教現為出家在佛法中而修道者如通議引云昔佛住世諸魔壞法佛神力故皆不能壞魔作誓言我於如來滅後依教出家破壞佛法佛即墮淚曰無奈汝何譬如師子身中蟲自食師子肉是知今之壞法僧人皆魔所屬皆師子身中蟲正信出家者不可不辨又不可不防也或附人體如十中通說或自現形如後一附明或亦十中通有唯後一顯之耳前十魔中各各皆言自得無上涅槃是約斷果此則皆言已成正遍知覺是約智果蓋恐人謂其是邪是遍故先且自言是正是遍賊人膽虗固如是也前云云何賊人假我衣服造種種業皆言佛法等正為此等痛罵讚歎下宣淫為患讚歎淫欲者順世宣化人易從故破佛律儀者訕正為邪欲壞教故先過去也謂過去諸惡魔師與魔弟子皆是以淫傳淫故曰淫淫相傳既淫淫相傳亦淫淫相承如是則前魔邪精魅其後人心腑舉世不覺漸入魔網故云近則九生多踰百世等也九生百世皆約自佛滅後言之按佛在世時人壽百歲大率以百年為一生九生當是九百年也正法將盡邪教方興發心修行誤入魔眷者時乎有之故曰近則九生謂九生即有也多逾百世者通議云三十年為一世百世當是三千年也時當末法人多垢重本期真修反成魔業如前所說十種皆是以真修為魔眷耳既為魔眷將來必為魔民愈趣愈下自致失正遍知而墮無間之獄二勸以悲救汝今未須先取寂滅縱得無學留願入彼末法之中起大慈悲救度正心深信衆生令不著魔得正知見我今度汝已出生死汝遵佛語名報佛恩初正以示勸自未得度先度人者菩薩發心阿難願學菩薩久矣故教以未須先取寂滅阿難此時已斷三界修心六品自知修證無學道成故勸以縱得無學還要留願教以入末法者以是魔強法弱時故起大慈悲者與正知正見之樂拔邪知邪見苦也正心者發菩提心深信者信知衆生心中有佛性故救度此等衆生修真三昧令不著魔發妙耳門得正知見即是大慈悲力正脈云觀佛此言足知阿難四分入滅亦假示現而依佛留願在世冥救也必矣我今下兼為激發阿難雖在二果力可得道但為侍佛故留殘結佛知其分段不羈故曰我今度汝已出生死既出生死當報佛恩報恩無別只須遵依佛語以遵依佛語慈悲救世即名報佛恩故正脈云欽聞斯囑而不痛心下淚者木石人也三結由警惕阿難如是十種禪那現境皆是想陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄此科全同受陰義亦准知四囑令傳護汝等必須將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道亦同受陰但彼云亦當其囑意稍緩此云必須其囑意更急良以行深魔重將成忽失亦可愍也總結想陰魔相竟
